<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sit Back and Relax</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 600px;
    }
    h1 {
      font-size: 2.4rem;
      color: #fff;
      margin-bottom: 0.5rem;
    }
    .tagline {
      font-size: 1rem;
      color: #888;
      margin-bottom: 3rem;
    }
    .game-card {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 12px;
      padding: 2rem;
      margin-bottom: 2rem;
    }
    .game-title {
      font-size: 1.8rem;
      color: #e94560;
      margin-bottom: 0.5rem;
    }
    .game-subtitle {
      font-size: 1rem;
      color: #aaa;
      margin-bottom: 1.5rem;
    }
    .game-desc {
      font-size: 0.95rem;
      line-height: 1.7;
      color: #ccc;
      margin-bottom: 1.5rem;
    }
    .play-link {
      display: inline-block;
      background: #e94560;
      color: #fff;
      text-decoration: none;
      padding: 0.7rem 2rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      transition: background 0.2s;
    }
    .play-link:hover {
      background: #c73650;
    }
    .coming-soon {
      font-size: 1.2rem;
      color: #555;
      margin-top: 2rem;
    }
    footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Sit Back and Relax</h1>
    <p class="tagline">ボードゲーム &amp; デジタルゲーム</p>

    <div class="game-card">
      <div class="game-title">pfff!</div>
      <div class="game-subtitle">ぷふー！ ふっ飛ばせ！カードゲーム</div>
      <p class="game-desc">
        家を建て、風で吹き飛ばし、鳥居で守る。<br>
        3人の個性豊かなAIと繰り広げる戦略カードゲーム。<br>
        Spiel Essen 2026 出展予定。
      </p>
      <a class="play-link" href="https://aokings.itch.io/pfff" target="_blank" rel="noopener">
        ブラウザで遊ぶ（itch.io）
      </a>
    </div>

    <p class="coming-soon">— More games coming soon —</p>
  </div>

  <footer>&copy; 2026 Sit Back and Relax</footer>
</body>
</html>
