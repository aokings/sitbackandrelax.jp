// 飛行カードコンポーネント（山札から出発）
// ユニットベース座標に移行
const FlyingCardDisplay = ({ flyingCard, deckPos }) => {
  if (!flyingCard) return null;
  
  const { card, phase, playerIdx, target, handCount = 0 } = flyingCard;
  const isPlayer0 = playerIdx === 0;
  
  // サイズ設定（ユニットから計算）
  // v2.0.0: market は burn サイズ（48px × 70px）
  let cardWidth, cardHeight, borderWidth;
  if (target === 'market') {
    cardWidth = UNIT.toPixelX(6);  // burn サイズ: 48px
    cardHeight = UNIT.toPixelY(5); // burn サイズ: 70px
    borderWidth = 1;
  } else if (target === 'stall') {
    // v2.0.7: 屋台への飛行はsmallサイズ
    cardWidth = UNIT.toPixelX(LAYOUT.cardSmall.w);  // 72px
    cardHeight = UNIT.toPixelY(LAYOUT.cardSmall.h); // 98px
    borderWidth = 2;
  } else if (target === 'stallExchange') {
    // v2.0.7: 交換アニメーションはsmallサイズ
    cardWidth = UNIT.toPixelX(LAYOUT.cardSmall.w);  // 72px
    cardHeight = UNIT.toPixelY(LAYOUT.cardSmall.h); // 98px
    borderWidth = 2;
  } else if (target === 'housePlace') {
    // v2.0.7: 家配置アニメーションはsmallサイズ（家の人物カード位置）
    cardWidth = UNIT.toPixelX(LAYOUT.cardSmall.w);  // 72px
    cardHeight = UNIT.toPixelY(LAYOUT.cardSmall.h); // 98px
    borderWidth = 2;
  } else if (target === 'stallPlace') {
    // v2.0.7: 屋台配置アニメーション（P0: largeサイズ）
    cardWidth = UNIT.toPixelX(LAYOUT.cardLarge.w);  // 104px
    cardHeight = UNIT.toPixelY(LAYOUT.cardLarge.h); // 140px
    borderWidth = 3;
  } else if (target === 'windAttack') {
    // v2.0.7: 風カード攻撃はlargeサイズ（P0から）またはsmallサイズ（AIから）
    cardWidth = isPlayer0 ? UNIT.toPixelX(LAYOUT.cardLarge.w) : UNIT.toPixelX(LAYOUT.cardSmall.w);
    cardHeight = isPlayer0 ? UNIT.toPixelY(LAYOUT.cardLarge.h) : UNIT.toPixelY(LAYOUT.cardSmall.h);
    borderWidth = isPlayer0 ? 3 : 2;
  } else if (isPlayer0) {
    cardWidth = UNIT.toPixelX(LAYOUT.cardLarge.w);  // 104px
    cardHeight = UNIT.toPixelY(LAYOUT.cardLarge.h); // 140px
    borderWidth = 3;
  } else {
    cardWidth = UNIT.toPixelX(LAYOUT.cardSmall.w);  // 72px
    cardHeight = UNIT.toPixelY(LAYOUT.cardSmall.h); // 98px
    borderWidth = 2;
  }
  
  // 座標設定（ユニットベース → ピクセル変換）
  // v2.0.0: marketPos: zone-middle(22U) + padding(1U) + market-label(2U) = 25U
  // x: self-field(38U) + deck(24U) + game-info(30U) + padding(1U) = 93U
  const marketPos = { 
    x: UNIT.toPixelX(93),  // 744px
    y: UNIT.toPixelY(25)   // 350px
  };
  
  // 引札ゾーン座標（ユニット定義から取得）
  const drawZonePos = {
    0: { x: UNIT.toPixelX(LAYOUT.drawZone[0].x), y: UNIT.toPixelY(LAYOUT.drawZone[0].y) },
    1: { x: UNIT.toPixelX(LAYOUT.drawZone[1].x), y: UNIT.toPixelY(LAYOUT.drawZone[1].y) },
    2: { x: UNIT.toPixelX(LAYOUT.drawZone[2].x), y: UNIT.toPixelY(LAYOUT.drawZone[2].y) },
    3: { x: UNIT.toPixelX(LAYOUT.drawZone[3].x), y: UNIT.toPixelY(LAYOUT.drawZone[3].y) },
  };
  
  // 手札の位置（新しいカードが入る位置 = 現在の枚数 × pitch）
  // 動的pitch計算対応
  const calcHandX = (pIdx, count) => {
    if (pIdx === 0) {
      // P0: 動的pitch計算（枚数+1で計算 = 新しいカードの位置）
      const pitch = calcCardPitch(count + 1, LAYOUT.handArea.self, LAYOUT.cardLarge.w, LAYOUT.minGap);
      return UNIT.toPixelX(1) + count * pitch;
    } else {
      // P1-P3: プレイヤーブロック内、動的pitch計算
      const baseX = (pIdx - 1) * UNIT.toPixelX(LAYOUT.playerBlock.w) + UNIT.toPixelX(1);
      const pitch = calcCardPitch(count + 1, LAYOUT.handArea.opp, LAYOUT.cardSmall.w, LAYOUT.minGap);
      return baseX + count * pitch;
    }
  };
  
  const handPos = {
    0: { x: calcHandX(0, handCount), y: UNIT.toPixelY(LAYOUT.zoneCTop + 1) },  // 38U + 1U padding = 39U
    1: { x: calcHandX(1, handCount), y: UNIT.toPixelY(LAYOUT.zoneATop + 3) },  // 2U + 2U nameplate + 1U padding = 5U
    2: { x: calcHandX(2, handCount), y: UNIT.toPixelY(LAYOUT.zoneATop + 3) },
    3: { x: calcHandX(3, handCount), y: UNIT.toPixelY(LAYOUT.zoneATop + 3) },
  };
  
  // フェーズに応じた位置とトランジション
  let left, top, transition, transform = 'none', opacity = 1;
  // P0の引札ゾーン・手札スライド時は表向き
  // showFrontにforceFront対応を追加
  const { forceFront } = flyingCard;
  const showFront = forceFront || (isPlayer0 && (phase === 'inDrawZone' || phase === 'toHand'));
  
  // v2.0.0: 共通のcalcFlyShadow関数を使用
  // フェーズに応じたZ高さ
  let flyZ = 0;
  if (phase === 'toDrawZone') flyZ = 3;      // 高空飛行
  else if (phase === 'inDrawZone') flyZ = 1; // 低空（引札ゾーン）
  else if (phase === 'toHand') flyZ = 2;     // 中空（手札へ）
  else if (phase === 'flying') flyZ = 3;     // burn用高空
  else if (phase === 'atHouse') flyZ = 2;   
  else if (phase === 'exitLeft') flyZ = 3;  
  
  const boxShadow = calcFlyShadow(flyZ);
  
  // sourceX, sourceYがある場合は出発点として使用（ババ抜き用）
  // houseX, houseYも追加（家からの飛行用）
  const { sourceX, sourceY, houseX, houseY } = flyingCard;
  
  if (phase === 'atDeck') {
    left = deckPos.x;
    top = deckPos.y;
    transition = 'none';
  } else if (phase === 'atSource' && sourceX !== undefined) {
    // ババ抜き: 相手の手札位置から出発
    left = sourceX;
    top = sourceY;
    transition = 'none';
  } else if (phase === 'atHouse' && houseX !== undefined) {
    // 家の位置から出発
    left = houseX;
    top = houseY;
    transition = 'none';
  } else if (phase === 'exitLeft') {
    // 左へ退場
    left = UNIT.toPixelX(LAYOUT.exitLeft);
    top = houseY || sourceY || deckPos.y;
    transition = 'all 300ms ease-in';
    opacity = 0;
  } else if (target === 'market' && phase === 'flying') {
    // v2.0.0: 市場への飛行（表向き）
    left = marketPos.x;
    top = marketPos.y;
    transition = 'all 90ms ease-out';
    transform = 'scale(1)';  // 市場は小サイズなのでスケール不要
  } else if (target === 'stall') {
    // v2.0.7: 市場→屋台への飛行
    const { stallX, stallY } = flyingCard;
    if (phase === 'atMarket') {
      left = sourceX;
      top = sourceY;
      transition = 'none';
    } else if (phase === 'toStall') {
      left = stallX;
      top = stallY;
      transition = 'all 200ms ease-in-out';
    }
  } else if (target === 'stallExchange') {
    // v2.0.7: 交換アニメーション（市場カード→屋台、屋台カード→市場を同時に）
    const { stallX, stallY } = flyingCard;
    if (phase === 'exchange') {
      left = sourceX;
      top = sourceY;
      transition = 'none';
    } else if (phase === 'exchangeFlying') {
      left = stallX;
      top = stallY;
      transition = 'all 300ms ease-in-out';  // v2.0.7: 飛行アニメーション（300ms）
    }
  } else if (target === 'housePlace') {
    // v2.0.7: 家配置アニメーション（手札→家の位置）
    const { houseX, houseY } = flyingCard;
    if (phase === 'atSource') {
      left = sourceX;
      top = sourceY;
      transition = 'none';
    } else if (phase === 'toHouse') {
      left = houseX;
      top = houseY;
      transition = 'all 300ms ease-in-out';  // v2.0.7: 飛行時間300ms（屋台と統一）
    }
  } else if (target === 'stallPlace') {
    // v2.0.7: 屋台配置アニメーション（屋台カード：手札→家位置、人物カード：手札→家位置下段）
    const { houseX, houseY } = flyingCard;
    if (phase === 'atSource') {
      left = sourceX;
      top = sourceY;
      transition = 'none';
    } else if (phase === 'toHouse') {
      left = houseX;
      top = houseY;
      transition = 'all 300ms ease-in-out';  // 飛行時間300ms
    }
  } else if (target === 'windAttack') {
    // v2.0.7: 風カード攻撃アニメーション（高い位置から急降下→ディゾルブ消滅）
    const { houseX, houseY } = flyingCard;
    if (phase === 'atSource') {
      // 浮上した位置から開始
      left = sourceX;
      top = sourceY - 20;  // 浮上分
      transition = 'none';
      transform = 'scale(1.05)';
    } else if (phase === 'diving') {
      // 急降下（加速：ease-in）
      left = houseX;
      top = houseY;
      transition = 'all 400ms cubic-bezier(0.55, 0.055, 0.675, 0.19)';  // ease-in-cubic（加速）
      transform = 'scale(1)';
    } else if (phase === 'vanish') {
      // ディゾルブ消滅（その場で透明化、風が散るように）
      left = houseX;
      top = houseY;
      transition = 'opacity 350ms ease-out, filter 350ms ease-out';
      transform = 'scale(1)';  // サイズは維持
      opacity = 0;
    }
  } else {
    const dzPos = drawZonePos[playerIdx] || drawZonePos[0];
    const hPos = handPos[playerIdx] || handPos[0];
    
    if (phase === 'toDrawZone') {
      left = dzPos.x;
      top = dzPos.y;
      transition = 'all 90ms ease-out';
    } else if (phase === 'inDrawZone') {
      left = dzPos.x;
      top = dzPos.y;
      transition = 'none';
    } else if (phase === 'toHand') {
      left = hPos.x;
      top = hPos.y;
      transition = 'all 180ms ease-in-out';
    }
  }
  
  // UnifiedCardを使用してカード内容を描画
  // v2.0.0: market は burn サイズで常に表向き
  // v2.0.7: 相手から引いた時は引札ゾーンで反転アニメーション
  const renderCardContent = () => {
    if (target === 'market') {
      return <UnifiedCard card={card} size="burn" showFront={true} style={{ width: '100%', height: '100%' }} />;
    }
    // v2.0.7: 屋台への飛行はsmallサイズで表向き
    if (target === 'stall' || target === 'stallExchange') {
      return <UnifiedCard card={card} size="small" showFront={true} style={{ width: '100%', height: '100%' }} />;
    }
    // v2.0.7: 家配置アニメーションはsmallサイズで表向き
    if (target === 'housePlace') {
      return <UnifiedCard card={card} size="small" showFront={true} style={{ width: '100%', height: '100%' }} />;
    }
    // v2.0.7: 屋台配置アニメーション（P0: largeサイズ、表向き）
    if (target === 'stallPlace') {
      return <UnifiedCard card={card} size="large" showFront={true} style={{ width: '100%', height: '100%' }} />;
    }
    // v2.0.7: 風カード攻撃は発動元のサイズ
    if (target === 'windAttack') {
      const size = isPlayer0 ? 'large' : 'small';
      return <UnifiedCard card={card} size={size} showFront={true} style={{ width: '100%', height: '100%' }} />;
    }
    const size = isPlayer0 ? 'large' : 'small';
    
    // v2.0.7: flippedフラグがある場合は反転カードを使用
    const { flipped } = flyingCard;
    if (flipped !== undefined && isPlayer0) {
      return <FlippingCardLarge card={card} flipped={flipped} style={{ width: '100%', height: '100%' }} />;
    }
    
    return <UnifiedCard card={card} size={size} showFront={showFront} style={{ width: '100%', height: '100%' }} />;
  };
  
  // v2.0.7: 交換アニメーション用の2枚目カード位置
  let exchangeLeft, exchangeTop, exchangeTransition;
  if (target === 'stallExchange' && flyingCard.exchangeCard) {
    const { exchangeFromX, exchangeFromY, exchangeToX, exchangeToY } = flyingCard;
    if (phase === 'exchange') {
      exchangeLeft = exchangeFromX;
      exchangeTop = exchangeFromY;
      exchangeTransition = 'none';
    } else if (phase === 'exchangeFlying') {
      exchangeLeft = exchangeToX;
      exchangeTop = exchangeToY;
      exchangeTransition = 'all 300ms ease-in-out';  // v2.0.7: 飛行アニメーション（300ms）
    }
  }
  
  // v2.0.7: 屋台配置アニメーション用の2枚目カード（人物カード）位置
  let personLeft, personTop, personTransition;
  let personCardWidth, personCardHeight;
  if (target === 'stallPlace' && flyingCard.personCard) {
    personCardWidth = UNIT.toPixelX(LAYOUT.cardLarge.w);  // largeサイズ
    personCardHeight = UNIT.toPixelY(LAYOUT.cardLarge.h);
    const { personFromX, personFromY, personToX, personToY } = flyingCard;
    if (phase === 'atSource') {
      personLeft = personFromX;
      personTop = personFromY;
      personTransition = 'none';
    } else if (phase === 'toHouse') {
      personLeft = personToX;
      personTop = personToY;
      personTransition = 'all 300ms ease-in-out';  // 飛行時間300ms
    }
  }
  
  return (
    <>
      <div style={{
        position: 'absolute',
        left: left,
        top: top,
        width: cardWidth,
        height: cardHeight,
        zIndex: 1000,
        pointerEvents: 'none',
        transition: transition ? `${transition}, box-shadow 90ms ease-out, opacity 300ms ease-in` : 'box-shadow 90ms ease-out',
        transform: transform,
        transformOrigin: 'top left',
        boxShadow: boxShadow,
        borderRadius: target === 'market' ? 3 : (isPlayer0 && target !== 'stall' && target !== 'stallExchange' && target !== 'stallPlace' ? 5 : 4),
        opacity: opacity,
      }}>
        {renderCardContent()}
      </div>
      {/* v2.0.7: 屋台配置時の2枚目カード（人物カード） */}
      {target === 'stallPlace' && flyingCard.personCard && (
        <div style={{
          position: 'absolute',
          left: personLeft,
          top: personTop,
          width: personCardWidth,
          height: personCardHeight,
          zIndex: 1001,
          pointerEvents: 'none',
          transition: personTransition ? `${personTransition}, box-shadow 90ms ease-out` : 'box-shadow 90ms ease-out',
          boxShadow: boxShadow,
          borderRadius: 5,
        }}>
          <UnifiedCard card={flyingCard.personCard} size="large" showFront={true} style={{ width: '100%', height: '100%' }} />
        </div>
      )}
      {/* v2.0.7: 交換時の2枚目カード（屋台→市場） */}
      {target === 'stallExchange' && flyingCard.exchangeCard && (
        <div style={{
          position: 'absolute',
          left: exchangeLeft,
          top: exchangeTop,
          width: cardWidth,
          height: cardHeight,
          zIndex: 1001,
          pointerEvents: 'none',
          transition: exchangeTransition ? `${exchangeTransition}, box-shadow 90ms ease-out` : 'box-shadow 90ms ease-out',
          boxShadow: boxShadow,
          borderRadius: 4,
        }}>
          <UnifiedCard card={flyingCard.exchangeCard} size="small" showFront={true} style={{ width: '100%', height: '100%' }} />
        </div>
      )}
    </>
  );
};

// 家カード退場演出コンポーネント（風カード使用時に家カードが左へ消える）
const HouseExitDisplay = ({ houseExitAnimation }) => {
  if (!houseExitAnimation) return null;
  
  const { houseCard, playerIdx, houseIdx, phase, startX, startY } = houseExitAnimation;
  const isPlayer0 = playerIdx === 0;
  
  const cardWidth = isPlayer0 ? UNIT.toPixelX(LAYOUT.cardLarge.w) : UNIT.toPixelX(LAYOUT.cardSmall.w);
  const cardHeight = isPlayer0 ? UNIT.toPixelY(LAYOUT.cardLarge.h) : UNIT.toPixelY(LAYOUT.cardSmall.h);
  
  const d = CARD_DATA[houseCard?.id] || {};
  
  let left, top, opacity, transition;
  
  if (phase === 'start') {
    left = startX;
    top = startY;
    opacity = 1;
    transition = 'none';
  } else if (phase === 'exit') {
    left = UNIT.toPixelX(LAYOUT.exitLeft);
    top = startY;
    opacity = 0;
    transition = 'all 300ms ease-in';
  }
  
  // v2.0.0: UnifiedCardを使用（PRN削除、STL追加）
  const borderTopColor = houseCard?.id === 'RUI' ? 'var(--color-ruin)' : 
                        houseCard?.id === 'STL' ? 'var(--color-stall, var(--color-house))' : 'var(--color-house)';
  const renderCard = () => {
    const size = isPlayer0 ? 'large' : 'small';
    return <UnifiedCard card={houseCard} size={size} showFront={true} style={{ width: '100%', height: '100%', borderTopColor }} />;
  };
  
  // v2.0.0: 共通のcalcFlyShadow関数を使用
  // フェーズに応じたZ高さ
  let flyZ = 0;
  let boxShadow;
  if (phase === 'start') {
    flyZ = 1;  // 開始時は低空
    boxShadow = calcFlyShadow(flyZ);
  } else if (phase === 'exit') {
    flyZ = 3;  // 退場時は高空
    boxShadow = calcFlyShadow(flyZ);
  }
  
  return (
    <div style={{
      position: 'absolute',
      left: left,
      top: top,
      width: cardWidth,
      height: cardHeight,
      zIndex: 999,
      pointerEvents: 'none',
      transition: transition,
      opacity: opacity,
      borderRadius: isPlayer0 ? 5 : 4,
      boxShadow: boxShadow,
    }}>
      {renderCard()}
    </div>
  );
};

// ペア成立演出コンポーネント
const PairAnimationDisplay = ({ pairAnimation, getCardPosition }) => {
  if (!pairAnimation) return null;
  
  const { drawnCard, pairCard, pairCardIndex, playerIdx, phase, handCount } = pairAnimation;
  const isPlayer0 = playerIdx === 0;
  
  // カードサイズ
  const cardWidth = isPlayer0 ? UNIT.toPixelX(LAYOUT.cardLarge.w) : UNIT.toPixelX(LAYOUT.cardSmall.w);
  const cardHeight = isPlayer0 ? UNIT.toPixelY(LAYOUT.cardLarge.h) : UNIT.toPixelY(LAYOUT.cardSmall.h);
  
  // 浮上量（2ユニット = 28px）
  const floatAmount = UNIT.toPixelY(2);
  
  // ペア対象カードの位置（手札内）
  const pairCardPos = getCardPosition(playerIdx, pairCardIndex, handCount);
  
  // 引いたカードの位置（最後に追加された = handCount番目）
  const drawnCardPos = getCardPosition(playerIdx, handCount, handCount + 1);
  
  // 退場位置（左へ）
  const exitX = -cardWidth - 20;
  
  // v2.0.0: 共通のcalcFlyShadow関数を使用
  // フェーズに応じた位置とスタイル
  let pairCardStyle, drawnCardStyle;
  
  if (phase === 'float') {
    // ペア対象カードが浮上
    pairCardStyle = {
      left: pairCardPos.x,
      top: pairCardPos.y - floatAmount,
      transition: 'all 200ms ease-out',
      boxShadow: calcFlyShadow(3),
    };
    drawnCardStyle = {
      left: drawnCardPos.x,
      top: drawnCardPos.y,
      transition: 'none',
      boxShadow: calcFlyShadow(1),
    };
  } else if (phase === 'merge') {
    // 引いたカードがペア対象の隣へ移動、両方浮上
    const mergeX = pairCardPos.x + cardWidth + 4; // 4pxギャップ
    pairCardStyle = {
      left: pairCardPos.x,
      top: pairCardPos.y - floatAmount,
      transition: 'none',
      boxShadow: calcFlyShadow(3),
    };
    drawnCardStyle = {
      left: mergeX,
      top: pairCardPos.y - floatAmount,
      transition: 'all 250ms ease-in-out',
      boxShadow: calcFlyShadow(3),
    };
  } else if (phase === 'exit') {
    // 2枚が左へ退場
    pairCardStyle = {
      left: exitX,
      top: pairCardPos.y - floatAmount,
      transition: 'all 300ms ease-in',
      boxShadow: calcFlyShadow(3),
      opacity: 0,
    };
    drawnCardStyle = {
      left: exitX + cardWidth + 4,
      top: pairCardPos.y - floatAmount,
      transition: 'all 300ms ease-in',
      boxShadow: calcFlyShadow(3),
      opacity: 0,
    };
  }
  
  // UnifiedCardを使用
  // v2.0.7: 相手ペアは反転アニメーション対応
  const renderCard = (card, isLarge, showFront, useFlip = false, flipped = false) => {
    const size = isLarge ? 'large' : 'small';
    if (useFlip) {
      // 反転カードを使用
      return isLarge 
        ? <FlippingCardLarge card={card} flipped={flipped} style={{ width: '100%', height: '100%' }} />
        : <FlippingCardSmall card={card} flipped={flipped} style={{ width: '100%', height: '100%' }} />;
    }
    return <UnifiedCard card={card} size={size} showFront={showFront} style={{ width: '100%', height: '100%' }} />;
  };
  
  // P0は常に表向き（FlippingCard不要）
  // P1-P3は全フェーズでFlippingCardを使用し、merge/exitで反転
  const showFront = isPlayer0;
  const useFlipAnim = !isPlayer0; // 相手は常にFlippingCardを使用
  const flipState = phase === 'merge' || phase === 'exit'; // floatは裏、merge/exitで表
  
  return (
    <>
      {/* ペア対象カード */}
      <div style={{
        position: 'absolute',
        width: cardWidth,
        height: cardHeight,
        zIndex: 1001,
        pointerEvents: 'none',
        borderRadius: isPlayer0 ? 5 : 4,
        ...pairCardStyle,
      }}>
        {renderCard(pairCard, isPlayer0, showFront, useFlipAnim, flipState)}
      </div>
      {/* 引いたカード */}
      <div style={{
        position: 'absolute',
        width: cardWidth,
        height: cardHeight,
        zIndex: 1002,
        pointerEvents: 'none',
        borderRadius: isPlayer0 ? 5 : 4,
        ...drawnCardStyle,
      }}>
        {renderCard(drawnCard, isPlayer0, showFront, useFlipAnim, flipState)}
      </div>
    </>
  );
};

const DangerCardInHandDisplay = ({ dangerCardInHand, getCardPosition }) => {
  if (!dangerCardInHand) return null;
  
  const { card, cardIndex, handCount, phase } = dangerCardInHand;
  const d = CARD_DATA[card?.id] || {};
  const isWitch = card?.id === 'WIT';
  
  // P0（自分）の手札内での演出
  const cardWidth = UNIT.toPixelX(LAYOUT.cardLarge.w);
  const cardHeight = UNIT.toPixelY(LAYOUT.cardLarge.h);
  const floatAmount = UNIT.toPixelY(LAYOUT.floatAmount);
  
  // カード位置を取得
  const pos = getCardPosition(0, cardIndex, handCount);
  
  let left, top, transform, boxShadow, transition;
  
  if (phase === 'float') {
    // 浮上
    left = pos.x;
    top = pos.y - floatAmount;
    transform = 'none';
    boxShadow = isWitch 
      ? '0 0 20px rgba(107, 58, 91, 0.8), 0 0 40px rgba(107, 58, 91, 0.4)' 
      : '0 0 20px rgba(201, 162, 39, 0.8), 0 0 40px rgba(201, 162, 39, 0.4)';
    transition = 'all 200ms ease-out';
  } else if (phase === 'shake') {
    // 揺れ（CSSアニメーションで処理）
    left = pos.x;
    top = pos.y - floatAmount;
    transform = 'none';
    boxShadow = isWitch 
      ? '0 0 30px rgba(107, 58, 91, 1), 0 0 60px rgba(107, 58, 91, 0.6)' 
      : '0 0 30px rgba(201, 162, 39, 1), 0 0 60px rgba(201, 162, 39, 0.6)';
    transition = 'none';
  } else if (phase === 'settle') {
    // 元に戻る
    left = pos.x;
    top = pos.y;
    transform = 'none';
    boxShadow = '1px 1px 0px rgba(0, 0, 0, 0.15)';
    transition = 'all 200ms ease-in';
  }
  
  return (
    <div style={{
      position: 'absolute',
      left: left,
      top: top,
      width: cardWidth,
      height: cardHeight,
      zIndex: 1001,
      pointerEvents: 'none',

function HouseAndWindGame() {
  // ターンアクションStateをuseReducerで統合
  // v2.0.0: hasPeekedThisTurn 削除（覗見カード廃止）
  // v2.0.4: windMarketTargetMode追加（強奪特例：場に家が0枚の時、市場から取得可能）
  const turnActionReducer = (state, action) => {
    switch (action.type) {
      case 'RESET_TURN':
        return {
          hasDrawn: false,
          hasActioned: false,
          selectedCard: null,
          actionMode: null,
          windTargetMode: false,
          windMarketTargetMode: false,  // v2.0.4: 市場ターゲットモード
          selectedWindCard: null,
        };
      case 'SET_DRAWN':
        return { ...state, hasDrawn: true };
      case 'SET_ACTIONED':
        return { ...state, hasActioned: true };
      case 'SELECT_CARD':
        return { ...state, selectedCard: action.card, actionMode: action.mode };
      case 'CLEAR_SELECTION':
        return { ...state, selectedCard: null, actionMode: null };
      case 'START_WIND_TARGET':
        return { ...state, windTargetMode: true, windMarketTargetMode: false, selectedWindCard: action.card, selectedCard: action.card, actionMode: 'wind' };
      case 'START_WIND_MARKET_TARGET':  // v2.0.4: 強奪特例（市場から取得）
        return { ...state, windTargetMode: false, windMarketTargetMode: true, selectedWindCard: action.card, selectedCard: action.card, actionMode: 'wind' };
      case 'CANCEL_WIND':
        return { ...state, windTargetMode: false, windMarketTargetMode: false, selectedWindCard: null, selectedCard: null, actionMode: null };
      case 'COMPLETE_WIND':
        return { ...state, windTargetMode: false, windMarketTargetMode: false, selectedWindCard: null, selectedCard: null, actionMode: null };
      default:
        return state;
    }
  };
  
  const [turnAction, dispatchTurnAction] = useReducer(turnActionReducer, {
    hasDrawn: false,
    hasActioned: false,
    selectedCard: null,
    actionMode: null,
    windTargetMode: false,
    windMarketTargetMode: false,  // v2.0.4: 市場ターゲットモード
    selectedWindCard: null,
  });
  
  // turnActionから個別の値を展開（既存コードとの互換性のため）
  // v2.0.0: hasPeekedThisTurn 削除
  // v2.0.4: windMarketTargetMode追加
  const { hasDrawn, hasActioned, selectedCard, actionMode, windTargetMode, windMarketTargetMode, selectedWindCard } = turnAction;
  
  // 互換性のためのsetter関数
  // v2.0.0: setHasPeekedThisTurn 削除

  const setHasActioned = (val) => { if (val) dispatchTurnAction({ type: 'SET_ACTIONED' }); };
  const setSelectedCard = (card, mode) => {
    if (card === null) {
      dispatchTurnAction({ type: 'CLEAR_SELECTION' });
    } else {
      dispatchTurnAction({ type: 'SELECT_CARD', card, mode: mode !== undefined ? mode : (card.type === 'house' ? 'house' : null) });
    }
  };
  const setActionMode = (mode) => {
    // actionModeだけを変更する場合は、現在のselectedCardを維持
    if (mode === null) {
      dispatchTurnAction({ type: 'CLEAR_SELECTION' });
    }
  };
  const setWindTargetMode = (val) => { if (!val) dispatchTurnAction({ type: 'CANCEL_WIND' }); };
  const setSelectedWindCard = (card) => { if (card) dispatchTurnAction({ type: 'START_WIND_TARGET', card }); };
  const resetTurnAction = () => dispatchTurnAction({ type: 'RESET_TURN' });

  // トーナメントモード
  const [tournamentMode, setTournamentMode] = useState(false);
  const [tournamentRounds, setTournamentRounds] = useState(1); // 総当たり回数
  const [tournamentProgress, setTournamentProgress] = useState({ current: 0, total: 0 });
  const [tournamentMatches, setTournamentMatches] = useState([]); // 全対戦組み合わせ
  const [tournamentResults, setTournamentResults] = useState(null); // 結果データ

  const tournamentMatchesRef = useRef([]); // fix: マッチリスト（非同期問題対策）

    babanukiTurns: 0,
    phaseTransitionTurn: 0  // 探索→ババ抜き移行ターン
  });
  
  // トーナメントデータ初期化
  const initTournamentData = (participants) => {
    const data = {
      participants: participants, // [{id, name, strategy}]
      rounds: tournamentRounds,
      matches: [], // 各ゲームの結果
      
      // A. 戦略分析用
      playerStats: {}, // プレイヤーごとの統計
      headToHead: {},  // 対戦成績マトリクス
      strategyStats: { // 戦略別統計
        // v2.0.0: housePreference から prison/ruin 削除、stall 追加
        housePreference: { house: {wins:0,games:0}, stall: {wins:0,games:0}, random: {wins:0,games:0} },
        storeThreshold: { 1:{wins:0,games:0}, 2:{wins:0,games:0}, 3:{wins:0,games:0}, 4:{wins:0,games:0}, 5:{wins:0,games:0} },
        // v2.0.0: attackTarget（Ghibli対象選択）
        attackTarget: { highValue: {wins:0,games:0}, degraded: {wins:0,games:0}, stall: {wins:0,games:0}, random: {wins:0,games:0} },
        speculativeHouse: { low:{wins:0,games:0}, mid:{wins:0,games:0}, high:{wins:0,games:0} }, // 0-30, 31-70, 71-100
        speculativeWind: { low:{wins:0,games:0}, mid:{wins:0,games:0}, high:{wins:0,games:0} }
      },
      actionStats: {}, // プレイヤーごとの行動統計
      
      // B. ゲーム性検証用
      gameplayStats: {
        totalGames: 0,
        winConditions: { agari: 0, purification: 0, stalemate: 0 },
        turnCounts: [], // 各ゲームのターン数
        positionWins: [0, 0, 0, 0], // P1,P2,P3,P4の勝利数（先手順）
        reversals: 0, // 逆転勝利数（中盤最下位→勝利）
        comebacks: 0, // 劣勢からの逆転数
        closeFinishes: 0 // 僅差フィニッシュ（上位2人が5点差以内）
      }
    };
    
    // プレイヤー統計初期化
    participants.forEach(p => {
      data.playerStats[p.id] = {
        name: p.name,
        strategy: p.strategy,
        wins: 0, games: 0, totalScore: 0,
        positions: [0, 0, 0, 0], // 1位,2位,3位,4位の回数
        winsByCondition: { agari: 0, purification: 0 },
        actions: { windUsed: 0, houseStored: 0, houseBreak: 0 }
      };
      data.headToHead[p.id] = {};
      participants.forEach(q => {
        if (p.id !== q.id) data.headToHead[p.id][q.id] = { wins: 0, losses: 0 };
      });
    });
    
    return data;
  };
  
  // 組み合わせ生成（nCr）
  const generateCombinations = (arr, r) => {
    const result = [];
    const combine = (start, combo) => {
      if (combo.length === r) { result.push([...combo]); return; }
      for (let i = start; i < arr.length; i++) {
        combo.push(arr[i]);
        combine(i + 1, combo);
        combo.pop();
      }

      // ゲーム統計
      data.gameplayStats.totalGames++;
      data.gameplayStats.turnCounts.push(currentTurn);
      
      // 勝利条件
      if (condition === 'agari') data.gameplayStats.winConditions.agari++;
      else if (condition === 'purification') data.gameplayStats.winConditions.purification++;
      else if (condition === 'draw') {
        // 引き分け用カウンタがなければ作成
        data.gameplayStats.winConditions.draw = (data.gameplayStats.winConditions.draw || 0) + 1;
      }
      else data.gameplayStats.winConditions.stalemate++;
      
      // 各プレイヤーのスコア計算（引き分け時は全員0）
      const scores = ps.map((p, i) => {
        if (isDraw) {
          return { idx: i, score: 0, isWinner: false, isDraw: true };
        } else if (i === winnerIdx) {
          let gained = 0;
          ps.forEach((op, oi) => { if (oi !== winnerIdx) gained += calculateScore(op.hand); });
          return { idx: i, score: gained, isWinner: true };
        } else {
          return { idx: i, score: -calculateScore(p.hand), isWinner: false };
        }
      });
      
      // 順位決定（同スコアは勝者優先）
      const sorted = [...scores].sort((a, b) => b.score - a.score);
      
      // 僅差フィニッシュ判定（1位と2位が5点差以内）
      if (sorted.length >= 2 && Math.abs(sorted[0].score - sorted[1].score) <= 5) {
        data.gameplayStats.closeFinishes++;
      }
      
      // プレイヤー統計更新
      ps.forEach((p, i) => {
        const playerId = p.odIndex !== undefined ? p.odIndex : i;
        if (data.playerStats[playerId]) {
          const stat = data.playerStats[playerId];
          stat.games++;
          stat.totalScore += scores[i].score;
          
          // 順位
          const position = sorted.findIndex(s => s.idx === i);
          if (position >= 0 && position < 4) stat.positions[position]++;
          
          // 勝利
          if (i === winnerIdx) {
            stat.wins++;
            if (condition === 'agari') stat.winsByCondition.agari++;
            else if (condition === 'purification') stat.winsByCondition.purification++;
            
            // 先手勝率（このゲームでの順番）
            data.gameplayStats.positionWins[i]++;
          }
          
          // 戦略別統計
          const strat = p.individualStrategy || p.strategy || {};
          if (strat.housePreference && data.strategyStats.housePreference[strat.housePreference]) {
            data.strategyStats.housePreference[strat.housePreference].games++;
            if (i === winnerIdx) data.strategyStats.housePreference[strat.housePreference].wins++;
          }
          if (strat.storeThreshold && data.strategyStats.storeThreshold[strat.storeThreshold]) {
            data.strategyStats.storeThreshold[strat.storeThreshold].games++;
            if (i === winnerIdx) data.strategyStats.storeThreshold[strat.storeThreshold].wins++;
          }
          // v2.0.0: windPreference → attackTarget
          if (strat.attackTarget && data.strategyStats.attackTarget[strat.attackTarget]) {
            data.strategyStats.attackTarget[strat.attackTarget].games++;
            if (i === winnerIdx) data.strategyStats.attackTarget[strat.attackTarget].wins++;
          }
          // 投機度
          const specHouse = strat.speculativeHouse || 50;
          const specHouseKey = specHouse <= 30 ? 'low' : specHouse <= 70 ? 'mid' : 'high';
          data.strategyStats.speculativeHouse[specHouseKey].games++;
          if (i === winnerIdx) data.strategyStats.speculativeHouse[specHouseKey].wins++;
          
          const specWind = strat.speculativeWind || 50;
          const specWindKey = specWind <= 30 ? 'low' : specWind <= 70 ? 'mid' : 'high';
          data.strategyStats.speculativeWind[specWindKey].games++;
          if (i === winnerIdx) data.strategyStats.speculativeWind[specWindKey].wins++;
        }
      });
      
      // 対戦成績更新
      ps.forEach((p1, i) => {
        const p1Id = p1.odIndex !== undefined ? p1.odIndex : i;
        ps.forEach((p2, j) => {
          if (i !== j) {
            const p2Id = p2.odIndex !== undefined ? p2.odIndex : j;
            if (data.headToHead[p1Id] && data.headToHead[p1Id][p2Id]) {
              if (i === winnerIdx) data.headToHead[p1Id][p2Id].wins++;
              if (j === winnerIdx) data.headToHead[p1Id][p2Id].losses++;
            }
          }
        });
      });
      
      // 進捗更新（refを先に更新、Stateは表示用）
      tournamentCurrentRef.current++;
      setTournamentProgress(prev => ({ ...prev, current: tournamentCurrentRef.current }));
    }
    
    // 勝利演出3秒後にゲーム終了画面へ
    const victoryDuration = (!autoPlayModeRef.current && animSettings.winEffect) ? 3000 : 0;
    
    // NotationLogger - ゲーム終了記録（統計をgameStatsRefから取得）
    const ruinPileUsed = 2 - (ruinPileRef.current?.length || 0);
    const stats = gameStatsRef.current;
    const notationStats = {
      totalTurns: turnRef.current,
      explorationTurns: stats.phaseTransitionTurn > 0 ? stats.phaseTransitionTurn : turnRef.current,
      babanukiTurns: stats.phaseTransitionTurn > 0 ? turnRef.current - stats.phaseTransitionTurn : 0,
      degradeCount: stats.degradeCount,
      destroyCount: stats.destroyCount,
      windUsed: stats.windUsed,
      housePlaced: stats.housePlaced,
      stallPlaced: stats.stallPlaced,
      marketExchanges: stats.marketExchanges
    };
    // 重要: marketRef.currentを使用（Stateは非同期のため正確な値を取得）
    NotationLogger.recordGameEnd(winnerIdx, condition, ps, marketRef.current, ruinPileUsed, notationStats);
    
    setTimeout(() => {
      setVictoryAnimation(null);
      setGameState('gameOver');
    }, autoPlayModeRef.current ? 0 : victoryDuration);
  }, [addLog, animSettings.winEffect]);

  // v2.0.9: 迷い箸演出（AIがババ抜きで引く時）
  const performHesitation = useCallback(async (aiIdx, finalTargetIdx, finalCardIdx, players) => {
    const t = getT();
    if (t.hesitationStep === 0) return; // オートプレイ時はスキップ
    
    hesitationSkipRef.current = false;
    
    // 有効なターゲット（自分以外で手札あり）
    const validTargets = players
      .map((p, i) => ({ idx: i, handLength: p.hand.length }))
      .filter(p => p.idx !== aiIdx && p.handLength > 0);
    
    if (validTargets.length === 0) return;
    
    // 迷い度の計算
    const totalCards = players.reduce((sum, p) => sum + p.hand.length, 0);
    const handLengths = validTargets.map(t => t.handLength);
    const maxHand = Math.max(...handLengths);
    const minHand = Math.min(...handLengths);
    const handVariance = maxHand - minHand;
    
    // 迷い度: 0.3〜1.0（手札差が小さい・終盤ほど高い）
    const endgameFactor = Math.max(0.3, 1 - totalCards / 30);
    const varianceFactor = Math.max(0.3, 1 - handVariance / 5);
    const hesitationLevel = Math.min(1.0, (endgameFactor + varianceFactor) / 2 + 0.2);
    
    // 全カード位置をフラット化（プレイヤー横断）
    const allCards = [];
    validTargets.forEach(target => {
      for (let i = 0; i < target.handLength; i++) {
        allCards.push({ playerIdx: target.idx, cardIdx: i });
      }
    });
    
    if (allCards.length === 0) return;
    
    // ヘルパー: ランダムな速度（0.5〜1.5倍の揺らぎ + たまに「止まる」）
    const getRandomDelay = (base) => {
      const pauseChance = Math.random();
      if (pauseChance < 0.1) {
        // 10%の確率で少し長く止まる（迷ってる感）
        return base * (1.5 + Math.random() * 1.0);
      } else if (pauseChance < 0.25) {
        // 15%の確率で速く通過
        return base * (0.4 + Math.random() * 0.3);
      }
      // 通常の揺らぎ
      return base * (0.6 + Math.random() * 0.8);
    };
    
    // ヘルパー: 部分範囲を生成（端まで行かないこともある）
    const getPartialRange = (cards, minCoverage = 0.5) => {
      if (cards.length <= 2) return { start: 0, end: cards.length - 1 };
      
      // 最低でもminCoverage分はカバーする
      const minCards = Math.max(2, Math.ceil(cards.length * minCoverage));
      const rangeSize = minCards + Math.floor(Math.random() * (cards.length - minCards + 1));
      
      // 開始位置をランダムに（ただし最終カードは含まれるように調整される可能性あり）
      const maxStart = cards.length - rangeSize;
      const start = Math.floor(Math.random() * (maxStart + 1));
      const end = start + rangeSize - 1;
      
      return { start, end };
    };
    
    // フェーズ1: 全体スキャン（揺らぎあり）
    const scanPasses = hesitationLevel > 0.6 ? (2 + Math.floor(Math.random() * 2)) : (1 + Math.floor(Math.random() * 2));
    
    for (let pass = 0; pass < scanPasses && !hesitationSkipRef.current; pass++) {
      // 毎回違う範囲をスキャン（端まで行かないことも）
      const { start, end } = getPartialRange(allCards, 0.4 + Math.random() * 0.3);
      const goingRight = pass % 2 === 0;
      
      if (goingRight) {
        for (let i = start; i <= end && !hesitationSkipRef.current; i++) {
          setHesitationState({ highlightedCards: [allCards[i]] });
          await delay(getRandomDelay(t.hesitationStep));
        }
      } else {
        for (let i = end; i >= start && !hesitationSkipRef.current; i--) {
          setHesitationState({ highlightedCards: [allCards[i]] });
          await delay(getRandomDelay(t.hesitationStep));
        }
      }
      
      // パス間で少し間を置くことも
      if (Math.random() < 0.3 && !hesitationSkipRef.current) {
        await delay(t.hesitationStep * (0.5 + Math.random() * 0.5));
      }
    }
    
    // フェーズ2: ターゲットプレイヤーに絞り込み
    if (!hesitationSkipRef.current && validTargets.length > 1) {
      const targetCards = allCards.filter(c => c.playerIdx === finalTargetIdx);
      const narrowPasses = hesitationLevel > 0.7 ? (2 + Math.floor(Math.random() * 2)) : (1 + Math.floor(Math.random() * 2));
      
      for (let pass = 0; pass < narrowPasses && !hesitationSkipRef.current; pass++) {
        const { start, end } = getPartialRange(targetCards, 0.5 + Math.random() * 0.3);
        const goingRight = pass % 2 === 0;
        
        if (goingRight) {
          for (let i = start; i <= end && !hesitationSkipRef.current; i++) {
            setHesitationState({ highlightedCards: [targetCards[i]] });
            await delay(getRandomDelay(t.hesitationStep * 1.1)); // 絞り込み時は少しゆっくり
          }
        } else {
          for (let i = end; i >= start && !hesitationSkipRef.current; i--) {
            setHesitationState({ highlightedCards: [targetCards[i]] });
            await delay(getRandomDelay(t.hesitationStep * 1.1));
          }
        }
      }
    }
    
    // フェーズ3: 最終カード付近でうろうろ（たまに）
    if (!hesitationSkipRef.current && Math.random() < 0.4) {
      const targetCards = allCards.filter(c => c.playerIdx === finalTargetIdx);
      const finalIdx = targetCards.findIndex(c => c.cardIdx === finalCardIdx);
      if (finalIdx >= 0 && targetCards.length > 1) {
        // 最終カードの前後を1〜2回行き来
        const wobbles = 1 + Math.floor(Math.random() * 2);
        for (let w = 0; w < wobbles && !hesitationSkipRef.current; w++) {
          const neighborIdx = finalIdx + (Math.random() < 0.5 ? -1 : 1);
          if (neighborIdx >= 0 && neighborIdx < targetCards.length) {
            setHesitationState({ highlightedCards: [targetCards[neighborIdx]] });
            await delay(getRandomDelay(t.hesitationStep * 0.8));
          }
          if (!hesitationSkipRef.current) {
            setHesitationState({ highlightedCards: [targetCards[finalIdx]] });
            await delay(getRandomDelay(t.hesitationStep * 0.8));
          }
        }
      }
    }
    
    // フェーズ4: 最終カードで停止
    if (!hesitationSkipRef.current) {
      setHesitationState({ highlightedCards: [{ playerIdx: finalTargetIdx, cardIdx: finalCardIdx }] });
      await delay(t.hesitationPause * (0.8 + Math.random() * 0.4));
    }
    
    // クリア
    setHesitationState(null);
    hesitationSkipRef.current = false;
    
    console.log(`[Hesitation] Completed: level=${hesitationLevel.toFixed(2)}, target=P${finalTargetIdx}, card=${finalCardIdx}`);
  }, []);

  // AIターンを非同期に変更（ドローアニメーション対応）

    // 2. ペア処理（v1.8.6.1: 演出付き）
    if (drawnCard) {
      const result = await processPairWithAnimation(drawnCard, handBeforeDraw, idx, skipAnim);
      // v2.0.0: 浄化は即勝利ではなく全送還
      if (result.hadPurification) { 
        if (await handlePurificationEffect(idx)) return; // ゲーム終了した場合
        aiHand = playersRef.current[idx].hand; // 更新された手札を取得
      } else {
        aiHand = result.hand;
      }
    } else {
      // ドローしなかった場合（通常は発生しない）
      aiHand = handBeforeDraw;
    }
    // 詳細ログ - 勝利判定前の手札状態
    const hbAfter = GameLogger.getHandBreakdown(aiHand);
    GameLogger.debug(`[executeAiTurn] After pair: 人物=${hbAfter.chars}(${hbAfter.charNames}), 家=${hbAfter.houses}(${hbAfter.houseNames}), 風=${hbAfter.winds}(${hbAfter.windNames})`);
    if (checkWin(aiHand)) { 
      GameLogger.debug(`[executeAiTurn] WIN! Player ${idx} has 0 character cards (total hand=${aiHand.length}, winds=${hbAfter.winds}, houses=${hbAfter.houses})`);
      endGame(idx, 'agari'); 
      return; 
    }

    // 3. v2.0.0: 統合アクション判断（比較評価ベース、v7.0ルール対応）
    const currentPhase = phaseRef.current;
    const myHouses = playersRef.current[idx].houses;
    
    // 最善手を決定（v2.0.0: peekedHouses引数削除）
    const bestAction = CriticAI.decideBestAction(aiHand, myHouses, ps, idx, currentPhase, strategyWithSpeculative);
    
    // アクション実行
    if (bestAction.type === 'steal') {
      // v2.0.0: 強奪（2段階効果対応）
      const { windCard, targetPlayer, targetHouse, storedCard, houseCard, willDegrade, willDestroy } = bestAction;
      const targetP = ps[targetPlayer];
      
      // 統計更新
      gameStatsRef.current.windUsed++;
      
      const windCardIdx = aiHand.findIndex(c => c.uid === windCard.uid);
      aiHand = aiHand.filter(c => c.uid !== windCard.uid);
      console.log(`[executeAiTurn] Player ${idx} uses ${windCard.name} on Player ${targetPlayer}'s house ${targetHouse}`);
      GameLogger.full(`[T${turn}] P${idx} decision: 風カード ${windCard.name} → P${targetPlayer}の${houseCard.name}(${storedCard.name})`);
      
      // v2.0.7: 風カード飛行アニメーション（AI用 - ダイブ＆消滅）
      if (!skipAnim) {
        const t = getT();
        const housePos = getHousePosition(targetPlayer, targetHouse);
        
        // 手札から風カードを削除
        setHand(idx, aiHand);
        
        // AIの手札内の風カード位置を取得
        const oppHandPos = getPlayerCardPosition(idx, windCardIdx, ps[idx].hand.length);
        
        // 風カードを浮上位置から開始
        setFlyingCard({
          card: windCard,
          target: 'windAttack',
          playerIdx: idx,
          phase: 'atSource',
          sourceX: oppHandPos.x,
          sourceY: oppHandPos.y,
          houseX: housePos.x,
          houseY: housePos.houseY,
          forceFront: true
        });
        await delay(150);  // 浮かぶタメ（P0と統一）
        
        // 急降下（加速しながらターゲットへ）
        setFlyingCard(prev => prev ? { ...prev, phase: 'diving' } : null);
        await delay(450);  // ダイブ時間
        
        // 消滅（風だから）
        setFlyingCard(prev => prev ? { ...prev, phase: 'vanish' } : null);
        await delay(400);  // v2.0.7: ディゾルブ消滅時間
        
        setFlyingCard(null);
      } else {
        setHand(idx, aiHand);
      }
      
      if (willDestroy) {
        // 統計更新（破壊）
        gameStatsRef.current.destroyCount++;
        // 荒屋/屋台: 破壊して強奪
        aiHand.push(storedCard);
        setHousesForPlayer(targetPlayer, prev => prev.filter((_, i) => i !== targetHouse));
        addLog(`${ai.name}が${targetP.name}の${houseCard.name}を破壊し${storedCard.name}を強奪`, 'wind');
        // NotationLogger - 風カード使用（破壊）
        NotationLogger.recordWind(windCard, targetPlayer, { houseCard, storedCard }, 'destroy', storedCard);
        
        const stealResult = processPairsSync(aiHand, idx);
        if (stealResult.hadPurification) { if (await handlePurificationEffect(idx)) return; aiHand = playersRef.current[idx].hand; }
        aiHand = stealResult.hand;
        if (checkWin(aiHand)) { endGame(idx, 'agari'); return; }
        setHand(idx, aiHand);
      } else if (willDegrade) {
        // 統計更新（劣化）
        gameStatsRef.current.degradeCount++;
        // 家(HOU): 荒屋に劣化（中身は公開されるが強奪されない）
        // v2.0.0: 脇の荒屋から1枚取得
        const currentRuinPile = [...ruinPileRef.current];
        if (currentRuinPile.length > 0) {
          const ruinCard = currentRuinPile.pop();
          setRuinPile(currentRuinPile);
          ruinPileRef.current = currentRuinPile;
          
          // v2.0.7: 反転アニメーション（劣化で中身公開）
          if (!skipAnim) {
            setDegradeFlipAnimation({ playerIdx: targetPlayer, houseIdx: targetHouse, flipped: false });
            await delay(100);
          }
          
          setHousesForPlayer(targetPlayer, prev => prev.map((h, i) => {
            if (i !== targetHouse) return h;
            return {
              houseCard: { ...ruinCard, uid: `${ruinCard.uid}_degraded_${Date.now()}` },
              storedCard: h.storedCard
            };
          }));
          
          // v2.0.7: 反転実行
          if (!skipAnim) {
            setDegradeFlipAnimation(prev => prev ? { ...prev, flipped: true } : null);
            await delay(500); // 反転アニメーション待ち
            setDegradeFlipAnimation(null);
          }
          
          addLog(`${ai.name}が${targetP.name}の${houseCard.name}を荒屋に劣化（${storedCard.name}が公開）`, 'wind');
          // NotationLogger - 風カード使用（劣化）
          NotationLogger.recordWind(windCard, targetPlayer, { houseCard, storedCard }, 'degrade', null);
        } else {
          // 統計更新（荒屋枯渇で破壊）
          gameStatsRef.current.destroyCount++;
          // 荒屋が尽きた場合は直接破壊
          setHousesForPlayer(targetPlayer, prev => prev.filter((_, i) => i !== targetHouse));
          aiHand.push(storedCard);
          const stealResult = processPairsSync(aiHand, idx);
          if (stealResult.hadPurification) { if (await handlePurificationEffect(idx)) return; aiHand = playersRef.current[idx].hand; }
          aiHand = stealResult.hand;
          if (checkWin(aiHand)) { endGame(idx, 'agari'); return; }
          addLog(`${ai.name}が${targetP.name}の${houseCard.name}を破壊＆強奪（荒屋枯渇）`, 'wind');
          // NotationLogger - 風カード使用（荒屋枯渇で破壊）
          NotationLogger.recordWind(windCard, targetPlayer, { houseCard, storedCard }, 'destroy_no_ruin', storedCard);
        }
        setHand(idx, aiHand);
      }
      
    } else if (bestAction.type === 'stealFromMarket') {
      // v2.0.4: 強奪特例 - 市場から取得
      const { windCard } = bestAction;
      const currentMarket = marketRef.current;
      
      if (currentMarket.length > 0) {
        // 統計更新
        gameStatsRef.current.windUsed++;
        
        // 市場から最適なカードを選択（ペアになるカードがあればそれ、なければ最高点）
        const charIds = aiHand.filter(c => c.type === 'character').map(c => c.id);
        let selectedCard = currentMarket.find(c => charIds.includes(c.id));  // ペアになるカード
        if (!selectedCard) {
          selectedCard = selectBestMarketCard(currentMarket);  // 最高点カード
        }
        
        if (selectedCard) {
          console.log(`[executeAiTurn] Player ${idx} uses ${windCard.name} to take ${selectedCard.name} from market (special rule)`);
          GameLogger.full(`[T${turn}] P${idx} decision: 強奪特例 ${windCard.name} → 市場 → ${selectedCard.name}`);
          
          // 風カードを手札から除去
          aiHand = aiHand.filter(c => c.uid !== windCard.uid);
          
          // 市場からカードを除去して手札に追加
          const newMarket = currentMarket.filter(c => c.uid !== selectedCard.uid);
          marketRef.current = newMarket;
          setMarket(newMarket);
          
          aiHand.push(selectedCard);
          addLog(`${ai.name}が強奪で市場から${selectedCard.name}を取得`, 'wind');
          // NotationLogger - 市場からの強奪（特殊記法）
          NotationLogger.comment(`WIND_MARKET: ${NotationLogger.toNotation(windCard)} -> [MKT] -> ${NotationLogger.toNotation(selectedCard)}`);
          
          const stealResult = processPairsSync(aiHand, idx);
          if (stealResult.hadPurification) { if (await handlePurificationEffect(idx)) return; aiHand = playersRef.current[idx].hand; }
          aiHand = stealResult.hand;
          if (checkWin(aiHand)) { endGame(idx, 'agari'); return; }
          setHand(idx, aiHand);
        }
      }
      
    } else if (bestAction.type === 'break') {
      // 家破壊
      const { houseIdx, storedCard, houseCard } = bestAction;
      
      console.log(`[executeAiTurn] Player ${idx} breaks own house ${houseIdx} to get ${storedCard.name}`);
      GameLogger.full(`[T${turn}] P${idx} decision: 家破壊 → ${storedCard.name}を取り出し`);
      
      setHousesForPlayer(idx, prev => prev.filter((_, i) => i !== houseIdx));
      addLog(`${ai.name}が自分の${houseCard.name}を破壊（${storedCard.name}を取り出し）`, 'action');
      // NotationLogger - 家取り出し
      NotationLogger.recordHouseRetrieve(houseCard, storedCard);
      
      aiHand.push(storedCard);
      const breakResult = processPairsSync(aiHand, idx);
      if (breakResult.hadPurification) { if (await handlePurificationEffect(idx)) return; aiHand = playersRef.current[idx].hand; }
      aiHand = breakResult.hand;
      if (checkWin(aiHand)) { endGame(idx, 'agari'); return; }
      setHand(idx, aiHand);
      
    } else if (bestAction.type === 'house') {
      // 家格納
      const { houseCard, character } = bestAction;
      
      console.log(`[executeAiTurn] Player ${idx} house decision: ${character.name} -> ${houseCard.name}`);
      GameLogger.full(`[T${turn}] P${idx} decision: 家格納 ${character.name} → ${houseCard.name}`);
      
      let newHand = [...aiHand];
      const hIdx = newHand.findIndex(c => c && c.uid === houseCard.uid);
      const cIdx = newHand.findIndex(c => c && c.uid === character.uid);
      if (hIdx >= 0 && cIdx >= 0) {
        [hIdx, cIdx].sort((a, b) => b - a).forEach(i => newHand.splice(i, 1));
        
        // v2.0.0: 屋台の場合は市場交換
        // 重要: 連続AI処理のため、marketRef.currentを使用（State更新の非同期問題回避）
        const currentMarket = marketRef.current;
        if (houseCard.id === 'STL' && currentMarket.length > 0) {
          // 統計更新（屋台配置＆市場交換）
          gameStatsRef.current.stallPlaced++;
          gameStatsRef.current.marketExchanges++;
          // 市場から最高点カードを選択
          const selectedMarketCard = selectBestMarketCard(currentMarket);
          if (selectedMarketCard) {
            // v2.0.7: 屋台配置アニメーション（AI用）- 正しい交換演出
            if (!skipAnim) {
              const t = getT();
              
              // 手札から削除
              setHand(idx, newHand);
              
              // 屋台を場に配置（人物カードを一時的に格納）
              const newHouseIdx = playersRef.current[idx].houses.length;
              setHousesForPlayer(idx, prev => [...prev, { houseCard, storedCard: character }]);
              await delay(100);
              
              // 交換アニメーション
              const marketIdx = currentMarket.findIndex(c => c.uid === selectedMarketCard.uid);
              const marketCardPos = getMarketCardPosition(marketIdx);
              const stallPos = getHousePosition(idx, newHouseIdx);
              
              // 屋台の中身を一時的に非表示
              setHousesForPlayer(idx, prev => prev.map((h, i) => {
                if (i === newHouseIdx) {
                  return { ...h, storedCard: null };
                }
                return h;
              }));
              
              // 両方のカードを同時に飛行
              setFlyingCard({
                card: selectedMarketCard,
                target: 'stallExchange',
                playerIdx: idx,
                phase: 'exchange',
                sourceX: marketCardPos.x,
                sourceY: marketCardPos.y,
                stallX: stallPos.x,
                stallY: stallPos.y + UNIT.toPixelY(2),
                forceFront: true,
                exchangeCard: character,
                exchangeFromX: stallPos.x,
                exchangeFromY: stallPos.y + UNIT.toPixelY(2),
                exchangeToX: marketCardPos.x,
                exchangeToY: marketCardPos.y
              });
              await delay(150);  // v2.0.7: 浮かぶタメ（P0と統一）
              
              // 市場から除外
              const tempMarket = currentMarket.filter(c => c.uid !== selectedMarketCard.uid);
              marketRef.current = tempMarket;
              setMarket(tempMarket);
              
              // 飛行開始
              setFlyingCard(prev => prev ? { ...prev, phase: 'exchangeFlying' } : null);
              await delay(350);  // v2.0.7: 飛行時間（P0と統一）
              
              setFlyingCard(null);
              
              // 市場に人物カードを追加
              const finalMarket = [...tempMarket, character];
              marketRef.current = finalMarket;
              setMarket(finalMarket);
              
              // 屋台に格納
              setHousesForPlayer(idx, prev => prev.map((h, i) => {
                if (i === newHouseIdx && h.houseCard.id === 'STL') {
                  return { ...h, storedCard: selectedMarketCard };
                }
                return h;
              }));
            } else {
              // アニメーションなし
              const newMarket = [...currentMarket, character].filter(c => c.uid !== selectedMarketCard.uid);
              marketRef.current = newMarket;
              setMarket(newMarket);
              setHousesForPlayer(idx, prev => [...prev, { houseCard, storedCard: selectedMarketCard }]);
              setHand(idx, newHand);
            }
            
            addLog(`${ai.name}が${character.name}を市場へ送り、${selectedMarketCard.name}を屋台に入れた`, 'action');
            GameLogger.full(`[T${turn}] P${idx} stall exchange: ${character.name} → market, ${selectedMarketCard.name} → stall`);
            // NotationLogger - 屋台配置＆市場交換
            NotationLogger.recordHousePlace(houseCard, selectedMarketCard, true, { sent: character, got: selectedMarketCard });
          } else {
            // 市場が空の場合は通常の家として配置
            setHousesForPlayer(idx, prev => [...prev, { houseCard, storedCard: character }]);
            setHand(idx, newHand);
            addLog(`${ai.name}が${houseCard.name}に格納した`);
            // NotationLogger - 屋台配置（市場空）
            NotationLogger.recordHousePlace(houseCard, character, true, null);
          }
        } else {
          // 統計更新（家配置）
          gameStatsRef.current.housePlaced++;
          
          // v2.0.7: 通常の家配置アニメーション（AI用）
          if (!skipAnim) {
            const t = getT();
            
            // 手札から削除
            setHand(idx, newHand);
            
            // 新しい家の位置を取得
            const newHouseIdx = playersRef.current[idx].houses.length;
            const housePos = getHousePosition(idx, newHouseIdx);
            
            // 手札内のカード位置を取得（人物カード）
            const oppHandPos = getPlayerCardPosition(idx, cIdx, aiHand.length);
            
            // 人物カードを家の位置へ飛行
            setFlyingCard({
              card: character,
              target: 'housePlace',
              playerIdx: idx,
              phase: 'atSource',
              sourceX: oppHandPos.x,
              sourceY: oppHandPos.y,
              houseX: housePos.x,
              houseY: housePos.y + UNIT.toPixelY(2),
              forceFront: true
            });
            await delay(150);  // v2.0.7: 浮かぶタメ（屋台と統一）
            
            setFlyingCard(prev => prev ? { ...prev, phase: 'toHouse' } : null);
            await delay(350);  // v2.0.7: 飛行時間（屋台と統一）
            
            setFlyingCard(null);
            
            // 家を配置
            setHousesForPlayer(idx, prev => [...prev, { houseCard, storedCard: character }]);
          } else {
            // アニメーションなし
            setHousesForPlayer(idx, prev => [...prev, { houseCard, storedCard: character }]);
            setHand(idx, newHand);
          }
          
          addLog(`${ai.name}が${houseCard.name}に格納した`);
          // NotationLogger - 家配置
          NotationLogger.recordHousePlace(houseCard, character, false, null);
        }
        
        if (checkWin(newHand)) { endGame(idx, 'agari'); return; }
      }
    }
    // else: bestAction.type === 'pass' → 何もしない

    // NotationLogger - ターン記録を確定
    const finalHandCount = playersRef.current[idx].hand.filter(c => c.type === 'character').length;
    const isWin = checkWin(playersRef.current[idx].hand);
    NotationLogger.finishLine(playersRef.current[idx].hand.length, isWin, false);

    // 5. 次のターンへ
    setTimeout(() => startNextTurn(idx), D * 50);
  }, [addLog, endGame, D, startNextTurn, setHand, setHousesForPlayer, animSettings.dealingAnim, animSettings.phaseOverlay, market, selectBestMarketCard]);

  // 山札ドローアニメーション付き
  const handleDraw = useCallback(async () => {
    // 配札中は無効化（refを使用してstate遅延を回避）
    if (dealingPhaseRef.current !== 'ready') return;
    if (hasDrawn || currentPlayerIndexRef.current !== 0 || isProcessing || gameEndedRef.current) return;
    if (phaseRef.current !== PHASES.EXPLORATION || deckRef.current.length === 0) return;
    setIsProcessing(true);
    
    const t = getT();
    const skipAnim = !animSettings.dealingAnim || (autoPlayModeRef.current && !animSettings.autoPlayAnim);
    const newDeck = [...deckRef.current]; const card = newDeck.pop();  // deckRef使用
    console.log(`[handleDraw] Player 0 drew ${card.name} from deck`);
    
    // NotationLogger - 山札ドロー記録
    const isLast = newDeck.length === 0;
    NotationLogger.recordDeckDraw(0, card, playersRef.current[0].hand.length + 1, isLast);
    
    // デッキ更新
    setDeck(newDeck); deckRef.current = newDeck;
    
    
    // 引く前の手札を保存（ペア演出用）
    const handBeforeDraw = [...playersRef.current[0].hand];
    
    if (!skipAnim) {
      // 飛行カードアニメーション（配札と同じ）
      const handCount = playersRef.current[0].hand.length;  // playersRef使用
      
      // Phase 0: 山札位置に出現（裏向き）
      setFlyingCard({ card, target: 'hand', playerIdx: 0, phase: 'atDeck', handCount, flipped: false });
      await delay(20);
      
      // Phase 1: 山札 → 引札ゾーンへ飛行（裏向きのまま）
      setFlyingCard({ card, target: 'hand', playerIdx: 0, phase: 'toDrawZone', handCount, flipped: false });
      await delay(t.flyToDrawZone);
      
      // v2.0.7: 引札ゾーンで反転アニメーション
      setFlyingCard({ card, target: 'hand', playerIdx: 0, phase: 'inDrawZone', handCount, flipped: false });
      await delay(50); // 一瞬待ってから反転
      setFlyingCard(prev => prev ? { ...prev, flipped: true } : null);
      await delay(500); // v2.0.7: 反転アニメーション完了待ち（0.5秒）
      await delay(150); // v2.0.7: タメ（ゲーム中は少し長め）
      
      // Phase 3: 引札ゾーン → 手札へスライド（表向き）
      setFlyingCard({ card, target: 'hand', playerIdx: 0, phase: 'toHand', handCount, flipped: true });
      await delay(t.slideToHand);
      
      setFlyingCard(null);
    }
    
    addLog(`${playerName}が山札から${card.name}を引いた`);
    setHasDrawn(true);
    
    if (newDeck.length === 0) { 
      setPhase(PHASES.BABANUKI); 
      phaseRef.current = PHASES.BABANUKI; 
      addLog('ババ抜きフェーズに移行', 'system');
      // フェーズ移行ターンを記録
      gameStatsRef.current.phaseTransitionTurn = turnRef.current;
      // フェーズ移行の詳細ログ
      GameLogger.debug(`[Phase] exploration → babanuki (deck exhausted)`);
      // NotationLogger - フェーズヘッダー
      NotationLogger.recordPhaseHeader('babanuki');
      // フェーズ移行演出
      if (animSettings.phaseOverlay && !autoPlayModeRef.current) {
        setPhaseOverlayText({ title: 'ババ抜きフェーズ開始！', subtitle: '相手の手札からカードを引こう' });
        setShowPhaseOverlay(true);
      }
    }
    
    // ペア演出付きペア処理
    const result = await processPairWithAnimation(card, handBeforeDraw, 0, skipAnim);
    if (result.hadPurification) { if (await handlePurificationEffect(0)) return; }
    if (checkWin(result.hand)) { endGame(0, 'agari'); return; }
    setIsProcessing(false);
  }, [dealingPhase, hasDrawn, phase, deck, currentPlayerIndex, players, playerName, addLog, isProcessing, gameEnded, endGame, animSettings.dealingAnim, animSettings.phaseOverlay, animSettings.pairEffect]);

  // ババ抜きフェーズでのカードドロー（アニメーション対応）
  const handleDrawFromPlayer = useCallback(async (targetIdx, cardIndex) => {
    // 配札中は無効化（v1.8.5.0: refを使用）
    if (dealingPhaseRef.current !== 'ready') return;
    if (hasDrawn || phase !== PHASES.BABANUKI || currentPlayerIndex !== 0 || isProcessing || gameEnded) return;
    const target = players[targetIdx];
    if (!target || target.hand.length === 0) return;
    setIsProcessing(true);
    
    // クリックされたカードを使用（インデックスが指定されていればそれを、なければランダム）
    const idx = cardIndex !== undefined ? cardIndex : Math.floor(Math.random() * target.hand.length);
    const card = target.hand[idx];
    console.log(`[handleDrawFromPlayer] Player 0 drew ${card.name} from Player ${targetIdx} at index ${idx}`);
    
    // NotationLogger - プレイヤードロー記録
    NotationLogger.recordPlayerDraw(0, targetIdx, card, idx, playersRef.current[0].hand.length + 1);
    NotationLogger.recordDrawDetail(0, targetIdx, target.hand.length, idx, 'click');
    
    const t = getT();
    const skipAnim = !animSettings.dealingAnim || (autoPlayModeRef.current && !animSettings.autoPlayAnim);
    
    // 引く前の手札を保存（ペア演出用）
    const handBeforeDraw = [...players[0].hand];
    
    // 相手の手札から削除（先に削除してアニメーション中に表示されないように）
    const newTargetHand = target.hand.filter((_, i) => i !== idx);
    setHand(targetIdx, newTargetHand);
    
    // 飛行カードアニメーション
    // 動的pitch計算対応
    if (!skipAnim) {
      const handCount = players[0].hand.length;
      // 相手の手札位置を計算（動的pitch使用）
      const sourcePos = getPlayerCardPosition(targetIdx, idx, target.hand.length);
      const cardX = sourcePos.x;
      const cardY = sourcePos.y;
      
      // 出発点: 相手の手札位置（裏向き）
      setFlyingCard({ card, target: 'hand', playerIdx: 0, phase: 'atSource', handCount, sourceX: cardX, sourceY: cardY, flipped: false });
      await delay(20);
      
      // 引札ゾーンへ飛行（裏向きのまま）

    }
    
    // ターゲットが上がりチェック
    if (checkWin(newTargetHand)) {

      endGame(targetIdx, 'agari');

    addLog(`${playerName}が${target.name}から${card.name}を引いた`);

    // ペア演出付きペア処理
    const result = await processPairWithAnimation(card, handBeforeDraw, 0, skipAnim);
    if (result.hadPurification) { if (await handlePurificationEffect(0)) return; }
    if (checkWin(result.hand)) { endGame(0, 'agari'); return; }
    setIsProcessing(false);
  }, [dealingPhase, hasDrawn, phase, currentPlayerIndex, players, playerName, addLog, isProcessing, gameEnded, endGame, animSettings.dealingAnim, animSettings.pairEffect]);

  // v2.0.7: async化（屋台アニメーション対応）

            // 屋台を場に配置
            setHousesForPlayer(0, prev => [...prev, {

            }]);
          } else {
            // アニメーションなし
            let newHand = players[0].hand.filter(c => c.uid !== hc.uid && c.uid !== card.uid);
            setHand(0, newHand);
            
            // 屋台を場に配置
            setHousesForPlayer(0, prev => [...prev, {

        // v2.0.7: 家配置アニメーション
        const skipAnim = !animSettings.dealingAnim;
        if (!skipAnim) {

          // 手札から削除（先に削除してアニメーション中に表示されないように）
          let newHand = players[0].hand.filter(c => c.uid !== hc.uid && c.uid !== card.uid);
          setHand(0, newHand);
          
          // 新しい家の位置を取得
          const newHouseIdx = players[0].houses.length;
          const housePos = getHousePosition(0, newHouseIdx);
          
          // 手札内のカード位置を取得（人物カード）
          const cardIdx = players[0].hand.findIndex(c => c.uid === card.uid);
          const pitch = calcCardPitch(players[0].hand.length, LAYOUT.handArea.self, LAYOUT.cardLarge.w, LAYOUT.minGap);

          await delay(150);  // v2.0.7: 浮かぶタメ（屋台と統一）

          setFlyingCard(null);
          
          // 家を配置
          setHousesForPlayer(0, prev => [...prev, { houseCard: hc, storedCard: card }]);
          addLog(`${playerName}が${hc.name}に格納した`);
          // NotationLogger - 家配置

          setSelectedCard(null); setActionMode(null); setHasActioned(true);
          if (checkWin(newHand)) { endGame(0, 'agari'); }
          return;
        }
        
        // アニメーションなし：即時処理
        let newHand = players[0].hand.filter(c => c.uid !== hc.uid && c.uid !== card.uid);
        setHand(0, newHand);
        setHousesForPlayer(0, prev => [...prev, { houseCard: hc, storedCard: card }]);
        addLog(`${playerName}が${hc.name}に格納した`);
        // NotationLogger - 家配置
        NotationLogger.recordHousePlace(hc, card, false, null);
        setSelectedCard(null); setActionMode(null); setHasActioned(true);
        if (checkWin(newHand)) { endGame(0, 'agari'); }
        return;
      } else { setSelectedCard(null); setActionMode(null); return; }

    // 風カード選択時

    if (card.type === 'wind') {

  }, [dealingPhase, currentPlayerIndex, hasDrawn, selectedCard, actionMode, players, playerName, addLog, isProcessing, gameEnded, endGame, setHand, setHousesForPlayer, windTargetMode, hasActioned]);

  // v2.0.0: 風カード使用ハンドラ（Ghibli のみ、2段階効果）
  // async化（FlyingCard演出対応）
  const handleWindCardUse = useCallback(async (targetPlayerIdx, targetHouseIdx) => {
    if (!selectedWindCard || !windTargetMode) return;
    
    const windCard = selectedWindCard;
    const targetPlayer = playersRef.current[targetPlayerIdx];
    const targetHouse = targetPlayer.houses[targetHouseIdx];
    const storedCard = targetHouse.storedCard;
    const houseCard = targetHouse.houseCard;
    const houseProp = HOUSE_PROPERTIES[houseCard.id];
    
    let myHand = [...players[0].hand];
    const windCardIdx = myHand.findIndex(c => c.uid === windCard.uid);
    myHand = myHand.filter(c => c.uid !== windCard.uid);
    
    console.log(`[handleWindCardUse] Using ${windCard.name} on Player ${targetPlayerIdx}'s house ${targetHouseIdx}`);
    GameLogger.full(`[T${turn}] P0 decision: 風カード ${windCard.name} → P${targetPlayerIdx}の${houseCard.name}(${storedCard.name})`);
    
    // v2.0.7: 風カード飛行アニメーション（ダイブ＆消滅）
    const skipAnim = autoPlayModeRef.current && !animSettings.autoPlayAnim;
    
    // 風カード浮上演出を解除
    setWindCardFloating(null);
    
    if (!skipAnim && animSettings.dealingAnim) {
      const t = getT();
      const housePos = getHousePosition(targetPlayerIdx, targetHouseIdx);
      
      // 手札から風カードを削除（先に削除）
      setHand(0, myHand);
      
      // 手札内の風カード位置を取得
      const pitch = calcCardPitch(players[0].hand.length, LAYOUT.handArea.self, LAYOUT.cardLarge.w, LAYOUT.minGap);
      const windCardX = UNIT.toPixelX(1) + windCardIdx * pitch;
      const windCardY = UNIT.toPixelY(LAYOUT.zoneCTop + 1);
      
      // 風カードを浮上位置から開始
      setFlyingCard({
        card: windCard,
        target: 'windAttack',
        playerIdx: 0,
        phase: 'atSource',
        sourceX: windCardX,
        sourceY: windCardY,
        houseX: housePos.x,
        houseY: housePos.houseY,
        forceFront: true
      });
      await delay(50);  // 開始タメ
      
      // 急降下（加速しながらターゲットへ）
      setFlyingCard(prev => prev ? { ...prev, phase: 'diving' } : null);
      await delay(450);  // ダイブ時間
      
      // 消滅（風だから）
      setFlyingCard(prev => prev ? { ...prev, phase: 'vanish' } : null);
      await delay(400);  // v2.0.7: ディゾルブ消滅時間
      
      setFlyingCard(null);
    } else {
      // アニメなしでも手札から削除
      setHand(0, myHand);
    }
    
    // v2.0.0: 2段階効果判定
    if (houseProp?.canBeDestroyed) {
      // 荒屋(RUI)/屋台(STL): 破壊して強奪
      if (!skipAnim && animSettings.dealingAnim) {
        const t = getT();
        const housePos = getHousePosition(targetPlayerIdx, targetHouseIdx);
        
        // Step 1: 家カードを左へ退場
        setHouseExitAnimation({
          houseCard: houseCard,
          playerIdx: targetPlayerIdx,
          houseIdx: targetHouseIdx,
          phase: 'start',
          startX: housePos.x,
          startY: housePos.houseY
        });
        await delay(20);
        setHouseExitAnimation(prev => prev ? { ...prev, phase: 'exit' } : null);
        await delay(t.houseExit);

          target: 'hand',
          playerIdx: 0,
          phase: 'atHouse',
          handCount: myHandCount,
          houseX: housePos.x,
          houseY: housePos.y,
          forceFront: true, // 荒屋/屋台は常に表向き

        setFlyingCard(prev => prev ? { ...prev, phase: 'inDrawZone', forceFront: true } : null);
        await delay(t.drawZoneWait);
        setFlyingCard(prev => prev ? { ...prev, phase: 'toHand', forceFront: true } : null);

        // NotationLogger - 風カード使用（破壊）
        NotationLogger.recordWind(windCard, targetPlayerIdx, { houseCard, storedCard }, 'destroy', storedCard);
        
        // 自分のペア処理
        let updatedMyHand = [...myHand, storedCard];
        const stealResult = await processPairWithAnimation(storedCard, myHand, 0, false);

        updatedMyHand = stealResult.hand;

        setHand(0, updatedMyHand);

        addLog(`${playerName}が${targetPlayer.name}の${houseCard.name}を破壊し${storedCard.name}を強奪`, 'wind');
        // NotationLogger - 風カード使用（破壊）
        NotationLogger.recordWind(windCard, targetPlayerIdx, { houseCard, storedCard }, 'destroy', storedCard);
        const stealResult = processPairsSync(myHand, 0);
        if (stealResult.hadPurification) { if (await handlePurificationEffect(0)) return; }
        myHand = stealResult.hand;
        if (checkWin(myHand)) { endGame(0, 'agari'); return; }
        setHand(0, myHand);
        setHasActioned(true);
      }

        addLog(`${playerName}が${targetPlayer.name}の${houseCard.name}を荒屋に劣化（${storedCard.name}が公開）`, 'wind');

        const stealResult = processPairsSync(myHand, 0);

        myHand = stealResult.hand;
        if (checkWin(myHand)) { endGame(0, 'agari'); return; }
        addLog(`${playerName}が${targetPlayer.name}の${houseCard.name}を破壊＆強奪（荒屋枯渇）`, 'wind');

      setHand(0, myHand);
      setHasActioned(true);

  }, [selectedWindCard, windTargetMode, players, playerName, addLog, endGame, processPairsSync, processPairWithAnimation, setHand, setHousesForPlayer, getHousePosition, animSettings.autoPlayAnim, ruinPileRef]);

  // 風カードキャンセルハンドラ
  // dispatchTurnActionを使用
  const handleCancelWind = useCallback(() => {
    setWindCardFloating(null);  // v2.0.7: 浮上演出解除

  }, []);

  // 家から取り出しハンドラ（自分の家を破壊して中身を手札へ）
  const handleBreakOwnHouse = useCallback(async (houseIdx) => {
    console.log(`[handleBreakOwnHouse] Called with houseIdx=${houseIdx}, isMyTurn=${isMyTurn}, hasDrawn=${hasDrawn}, hasActioned=${hasActioned}, isProcessing=${isProcessing}, gameEnded=${gameEnded}`);
    
    // hasDrawnチェックを追加

      return;
    }
    
    const player = playersRef.current[0];
    const house = player.houses[houseIdx];

      console.log(`[handleBreakOwnHouse] Blocked: no house or storedCard`);
      return;
    }
    
    const houseCard = house.houseCard;
    const storedCard = house.storedCard;
    
    // v2.0.0: PRN（牢屋）は廃止されたためチェック不要
    // 全ての家から取り出し可能
    
    console.log(`[handleBreakOwnHouse] Breaking house ${houseIdx}: ${houseCard.name} containing ${storedCard.name}`);
    // フル詳細ログ - P0の家破壊決定
    GameLogger.full(`[T${turn}] P0 decision: 家破壊 → ${storedCard.name}を取り出し`);
    setIsProcessing(true);
    
    
    if (!autoPlayModeRef.current || animSettings.autoPlayAnim) {
      const t = getT();
      const housePos = getHousePosition(0, houseIdx);
      const isHOU = houseCard.id === 'HOU';
      
      // Step 1: 家カードを左へ退場
      setHouseExitAnimation({
        houseCard: houseCard,
        playerIdx: 0,
        houseIdx: houseIdx,
        phase: 'start',
        startX: housePos.x,
        startY: housePos.houseY
      });
      await delay(20);
      setHouseExitAnimation(prev => prev ? { ...prev, phase: 'exit' } : null);
      await delay(t.houseExit);
      setHouseExitAnimation(null);
      
      // Step 2: 人物カードが自分の引札ゾーンへ飛行
      const myHandCount = player.hand.length;
      setFlyingCard({
        card: storedCard,
        target: 'hand',
        playerIdx: 0,
        phase: 'atHouse',
        handCount: myHandCount,
        houseX: housePos.x,
        houseY: housePos.y,
        forceFront: !isHOU, // 荒屋は表向き、家は裏向き
        sourcePlayerIdx: 0,     // v2.0.7: 元の家の位置
        sourceHouseIdx: houseIdx // v2.0.7: 元の家のインデックス
      });
      await delay(20);
      
      // Step 3: 引札ゾーンへ移動
      setFlyingCard(prev => prev ? { ...prev, phase: 'toDrawZone', forceFront: !isHOU } : null);
      await delay(t.personFly);
      
      // Step 4: 引札ゾーンで表向きに
      setFlyingCard(prev => prev ? { ...prev, phase: 'inDrawZone', forceFront: true } : null);
      await delay(t.drawZoneWait);
      
      // Step 5: 自分の手札へ
      setFlyingCard(prev => prev ? { ...prev, phase: 'toHand', forceFront: true } : null);
      await delay(t.slideToHand);
      setFlyingCard(null);
      
      // 実際の処理
      setHousesForPlayer(0, prev => prev.filter((_, i) => i !== houseIdx));
      addLog(`${playerName}が自分の${houseCard.name}を破壊（${storedCard.name}を取り出し）`, 'action');

  }, [isMyTurn, hasDrawn, hasActioned, isProcessing, gameEnded, playerName, addLog, endGame, processPairsSync, processPairWithAnimation, setHand, setHousesForPlayer, getHousePosition, animSettings.autoPlayAnim, checkWin]);

  const handleEndTurn = useCallback(() => {

  // AutoPlay (v1.8.0.5: 高速化)
  useEffect(() => {

      if (bestTarget === -1) {

              }

            }
            setHasActioned(true);

            return;
            
          } else if (bestAction.type === 'break') {
            const { houseIdx, storedCard, houseCard } = bestAction;
            
            GameLogger.full(`[T${turn}] P0 decision: 家破壊 → ${storedCard.name}を取り出し`);
            
            setHousesForPlayer(0, prev => prev.filter((_, i) => i !== houseIdx));

            const result = processPairsSync(newHand, 0);

        const maxWins = Math.max(...topPlayers.map(p => p.wins));
        winner = topPlayers.find(p => p.wins === maxWins)?.idx ?? topPlayers[0].idx;

                        <button onClick={() => { setShowNameInput(true); setPlayerEmoji('👤'); setPlayerName(''); }} className="menu-button" style={{ width: 'auto', padding: '4px 8px', fontSize: 10, borderColor: 'var(--color-gold)', color: 'var(--color-gold)' }} title="新規作成">➕</button>

                        <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap', justifyContent: 'center' }}>
                          {profiles.filter(p => p.id !== currentProfileId).map(p => (
                            <button key={p.id} onClick={() => selectProfile(p)} className="menu-button" style={{ width: 'auto', padding: '2px 8px', fontSize: 9 }}>
                              {p.emoji || '👤'} {p.name}
                            </button>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                ) : (
                  <div>
                    {profiles.length > 0 ? (
                      <div>
                        <div style={{ fontSize: 10, color: 'var(--color-warm-gray)', marginBottom: 8 }}>プロファイルを選択:</div>
                        <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap', justifyContent: 'center', marginBottom: 8 }}>

                            <button key={p.id} onClick={() => selectProfile(p)} className="menu-button" style={{ width: 'auto', padding: '4px 12px', fontSize: 11 }}>
                              {p.emoji || '👤'} {p.name}
                            </button>

                        </div>
                        <button onClick={() => { setShowNameInput(true); setPlayerEmoji('👤'); setPlayerName(''); }} className="menu-button" style={{ width: 'auto', padding: '4px 12px', fontSize: 10 }}>➕ 新規作成</button>
                      </div>
                    ) : (
                      <div>
                        <div style={{ fontSize: 10, color: 'var(--color-warm-gray)', marginBottom: 8 }}>プロファイルがありません</div>
                        <button onClick={() => { setShowNameInput(true); setPlayerEmoji('👤'); setPlayerName(''); }} className="menu-button primary" style={{ width: 'auto', padding: '7px 16px' }}>➕ 新規作成</button>
                      </div>
                    )}
                  </div>
                )}
              </div>
              
              <div style={{ display: 'flex', gap: 'calc(1 * var(--unit-x))', justifyContent: 'center' }}>
                <button className="menu-button" onClick={() => setMenuStep('title')} style={{ width: 'calc(20 * var(--unit-x))' }}>← 戻る</button>
                {tournamentMode ? (
                  <button 
                    className="menu-button primary" 
                    onClick={() => startTournament()}
                    disabled={!currentProfileId}
                    style={{ width: 'calc(20 * var(--unit-x))', opacity: currentProfileId ? 1 : 0.5 }}
                  >🏆 開始</button>
                ) : (
                  <button 
                    className="menu-button primary" 
                    onClick={() => setMenuStep('opponent')}
                    disabled={!currentProfileId}
                    style={{ width: 'calc(20 * var(--unit-x))', opacity: currentProfileId ? 1 : 0.5 }}
                  >次へ →</button>
                )}
              </div>
              
              {/* トーナメントモード時の説明 */}
              {tournamentMode && (
                <div style={{ marginTop: 'calc(1 * var(--unit-y))', padding: 'calc(0.5 * var(--unit-y)) calc(1 * var(--unit-x))', background: 'var(--color-gold)', color: '#fff', fontSize: 9, textAlign: 'center' }}>

                </div>
