<!DOCTYPE html>
<html lang="ja" style="border:none!important;outline:none!important;margin:0;padding:0;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>House & Wind v2.0.9</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    /* v2.0.0: プレビュー環境の枠線防止 */
    html, body, #root { border: none !important; outline: none !important; }
    body { font-family: 'Hiragino Sans', 'Yu Gothic', monospace; background: #f5f5f5; padding: 20px; }
    #root { width: 100%; min-height: 100vh; }
    :root { 
      /* Unit System */
      --unit-x: 8px;
      --unit-y: 14px;
      /* 盤面: 114U × 49U = 912px × 686px */
      --board-w: calc(114 * var(--unit-x));  /* 912px */
      --board-h: calc(49 * var(--unit-y));   /* 686px */
      /* カードサイズ */
      --card-large-w: calc(13 * var(--unit-x));  /* 104px */
      --card-large-h: calc(10 * var(--unit-y));  /* 140px */
      --card-small-w: calc(9 * var(--unit-x));   /* 72px */
      --card-small-h: calc(7 * var(--unit-y));   /* 98px */
      --card-burn-w: calc(6 * var(--unit-x));    /* 48px */
      --card-burn-h: calc(5 * var(--unit-y));    /* 70px */
      /* ゾーン高さ */
      --header-h: calc(2 * var(--unit-y));       /* 28px */
      --zone-a-h: calc(20 * var(--unit-y));      /* 280px */
      --zone-middle-h: calc(16 * var(--unit-y)); /* 224px */
      --zone-c-h: calc(11 * var(--unit-y));      /* 154px */
      /* ゾーン位置 (top) */
      --zone-a-top: var(--header-h);             /* 28px (2U) */
      --zone-middle-top: calc(var(--header-h) + var(--zone-a-h));  /* 308px (22U) */
      --zone-c-top: calc(var(--header-h) + var(--zone-a-h) + var(--zone-middle-h));  /* 532px (38U) */
      /* プレイヤーブロック: 38U = 304px */
      --player-block-w: calc(38 * var(--unit-x)); /* 304px */
      
      /* アールデコ配色 */
      --color-cream: #FAF8F5;           /* 盤面背景 */
      --color-burgundy: #2d1518;        /* プライマリ（カード裏背景） */
      --color-dusty-pink: #e8b4b8;      /* アクセント（カード裏装飾） */
      --color-charcoal: #2D2D2D;        /* テキスト */
      --color-warm-gray: #6B6359;       /* サブテキスト */
      --color-gold: #C9A227;            /* 強調、選択 */
      
      /* カテゴリ色 */
      --color-citizen: #8B7355;   /* ウォームブラウン */
      --color-noble: #C9A227;     /* ゴールド */
      --color-special: #6B3A5B;   /* ダスティパープル */
      --color-house: #4A6B4A;     /* オリーブグリーン */
      --color-wind: #5B7B9A;      /* スレートブルー */
      --card-back-accent: var(--color-dusty-pink); 
      --card-back-bg: var(--color-burgundy);
      
      /* 統一影 */
      --shadow-light: 1px 1px 0px rgba(45, 21, 24, 0.15);
      --shadow-z1: 2px 2px 2px rgba(45, 21, 24, 0.12);
      --shadow-z2: 4px 4px 4px rgba(45, 21, 24, 0.10);
      --shadow-z3: 6px 6px 6px rgba(45, 21, 24, 0.08);
      --shadow-hover: 6px 6px 0px rgba(232, 180, 184, 0.5);
    }
    .game-board { 
      width: var(--board-w); 
      height: var(--board-h); 
      overflow: hidden; /* v2.0.0: アニメーション要素のはみ出し防止 */
      border: none; /* v2.0.0: プレビュー環境の枠線防止 */
      outline: none;
      background: 
        /* 縦線: 8px間隔、4pxオフセット（0.5U） - ダスティピンク */
        repeating-linear-gradient(
          90deg,
          transparent 0px,
          transparent 3px,
          rgba(232, 180, 184, 0.2) 3px,
          rgba(232, 180, 184, 0.2) 4px,
          transparent 4px,
          transparent 8px
        ),
        /* 横線: 14px間隔、7pxオフセット（0.5U） - ダスティピンク */
        repeating-linear-gradient(
          0deg,
          transparent 0px,
          transparent 6px,
          rgba(232, 180, 184, 0.2) 6px,
          rgba(232, 180, 184, 0.2) 7px,
          transparent 7px,
          transparent 14px
        ),
        var(--color-cream);
      position: relative; 
      margin: 0 auto; 
    }
    .game-header { width: var(--board-w); height: var(--header-h); position: absolute; top: 0; left: 0; display: flex; justify-content: space-between; }
    .header-left { height: var(--header-h); border: 1px solid var(--color-burgundy); display: flex; align-items: center; font-size: 12px; font-weight: bold; background: #fff; color: var(--color-charcoal); padding: 0 15px; cursor: pointer; user-select: none; box-shadow: var(--shadow-light); }
    .header-end-btn { height: var(--header-h); border: 1px solid var(--color-burgundy); display: flex; align-items: center; font-size: 11px; font-weight: bold; background: var(--color-burgundy); color: white; padding: 0 12px; cursor: pointer; margin-left: -1px; }
    .header-end-btn:hover { background: #1a0d0f; }
    .header-stop-btn { height: var(--header-h); border: 1px solid var(--color-burgundy); display: flex; align-items: center; font-size: 11px; font-weight: bold; background: var(--color-burgundy); color: white; padding: 0 12px; cursor: pointer; margin-left: -1px; }
    .header-stop-btn:hover { background: #1a0d0f; }
    .header-right { padding: 0 10px; height: var(--header-h); border: 1px solid var(--color-burgundy); display: flex; align-items: center; font-size: 12px; font-weight: bold; background: #fff; color: var(--color-charcoal); box-shadow: var(--shadow-light); }
    .zone-a { position: absolute; top: var(--zone-a-top); left: 0; width: var(--board-w); height: var(--zone-a-h); display: flex; }
    .player-block { width: var(--player-block-w); height: var(--zone-a-h); background: transparent; position: relative; }
    .nameplate { position: absolute; top: 0; left: calc(1 * var(--unit-x)); display: inline-block; padding: 7px 8px; background: #fff; border: 1px solid var(--color-burgundy); font-size: 11px; font-weight: bold; color: var(--color-charcoal); box-shadow: var(--shadow-light); z-index: 20; }
    .nameplate.active { border: 2px solid var(--color-gold); background: var(--color-cream); }
    .opp-hand-area { position: absolute; top: var(--header-h); left: calc(1 * var(--unit-x)); width: calc(36 * var(--unit-x)); height: calc(8 * var(--unit-y)); }
    .opp-field-area { position: absolute; bottom: calc(1 * var(--unit-y)); left: calc(1 * var(--unit-x)); width: calc(36 * var(--unit-x)); height: calc(9 * var(--unit-y)); }
    .zone-middle { position: absolute; top: var(--zone-middle-top); left: 0; width: var(--board-w); height: var(--zone-middle-h); display: flex; background: transparent; }
    .self-field-area { width: var(--player-block-w); height: var(--zone-middle-h); position: relative; }
    .self-nameplate { position: absolute; top: 0; left: calc(1 * var(--unit-x)); display: inline-block; padding: 7px 8px; background: var(--color-cream); border: 2px solid var(--color-gold); font-size: 11px; font-weight: bold; color: var(--color-charcoal); box-shadow: var(--shadow-light); z-index: 20; }
    .self-building-area { position: absolute; top: calc(3 * var(--unit-y)); left: calc(1 * var(--unit-x)); width: calc(36 * var(--unit-x)); height: calc(12 * var(--unit-y)); display: block; overflow: visible; }
    .deck-area { width: calc(24 * var(--unit-x)); height: var(--zone-middle-h); position: relative; }
    .deck-label { position: absolute; top: 0; left: calc(1 * var(--unit-x)); display: inline-block; padding: 7px 8px; background: #fff; border: 1px solid var(--color-burgundy); font-size: 11px; font-weight: bold; color: var(--color-charcoal); box-shadow: var(--shadow-light); z-index: 20; }
    .deck-cards { position: absolute; top: var(--header-h); left: calc(5 * var(--unit-x)); }  /* LAYOUT.deckArea.cardsLeft=5, cardsTop=2 */
    .deck-count { position: absolute; top: calc(12 * var(--unit-y)); left: calc(16 * var(--unit-x)); font-size: 11px; font-weight: bold; background: #fff; border: 1px solid var(--color-burgundy); color: var(--color-charcoal); padding: 7px 8px; text-align: center; z-index: 20; box-shadow: var(--shadow-light); }  /* LAYOUT.deckArea.countTop=12, countLeft=16 */
    .zone-b-right { width: calc(52 * var(--unit-x)); height: var(--zone-middle-h); display: flex; flex-direction: column; border: 1px solid var(--color-burgundy); background: #fff; box-shadow: var(--shadow-light); }
    .zone-b-right-top { display: flex; height: calc(8 * var(--unit-y)); }
    .game-info-area { width: calc(30 * var(--unit-x)); height: 100%; padding: calc(1 * var(--unit-x)); }
    .game-info-header { font-size: 12px; font-weight: bold; margin-bottom: 10px; }
    .score-section { font-size: 11px; }
    .score-label { font-weight: bold; margin-bottom: 5px; }
    .score-names, .score-values { display: flex; gap: 15px; margin-left: 10px; }
    .score-values { font-weight: bold; }
    /* v2.0.0: 市場エリア（旧burn-area） */
    .market-area { width: calc(22 * var(--unit-x)); height: 100%; padding: calc(1 * var(--unit-x)); }
    .market-label { display: inline-block; padding: 7px 8px; background: linear-gradient(135deg, #fff8e1 0%, #ffecb3 100%); border: 1px solid var(--color-gold); font-size: 11px; font-weight: bold; color: var(--color-charcoal); margin-bottom: 4px; box-shadow: var(--shadow-light); z-index: 20; position: relative; transition: all 0.3s ease; }
    .market-label.market-special { background: linear-gradient(135deg, #5B7B9A 0%, #4A6A89 100%); border: 2px solid var(--color-wind); color: white; animation: specialPulse 1s ease-in-out infinite; }
    @keyframes specialPulse { 0%, 100% { box-shadow: 0 0 5px rgba(91, 123, 154, 0.5); } 50% { box-shadow: 0 0 15px rgba(91, 123, 154, 0.8); } }
    
    /* v2.0.7: カード反転アニメーション */
    .card-flip-container { perspective: 1000px; }
    .card-flip-inner { position: relative; width: 100%; height: 100%; transition: transform 0.5s; transform-style: preserve-3d; }
    .card-flip-inner.flipped { transform: rotateY(180deg); }
    .card-flip-front, .card-flip-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; -webkit-backface-visibility: hidden; }
    .card-flip-back { transform: rotateY(180deg); }
    .market-cards { display: flex; gap: 4px; }
    .market-card-slot { position: relative; transition: transform 0.15s, box-shadow 0.15s; }
    .market-card-slot.market-selectable { cursor: pointer; }
    .market-card-slot.market-selectable:hover { transform: translateY(-3px); box-shadow: 0 4px 12px rgba(201, 162, 39, 0.4); }
    .market-card-slot.market-selectable::after { content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px; border: 2px solid var(--color-gold); border-radius: 5px; animation: market-pulse 1s ease-in-out infinite; pointer-events: none; }
    @keyframes market-pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    /* 旧burn-areaは削除 */
    .log-area { flex: 1; position: relative; font-size: 10px; }
    .log-box { position: absolute; left: calc(1 * var(--unit-x)); top: calc(1 * var(--unit-x)); bottom: calc(1 * var(--unit-x)); right: calc(1 * var(--unit-x)); border: 1px solid var(--color-burgundy); padding: 6px; overflow-y: auto; }
    .log-entry { margin-bottom: 4px; color: var(--color-charcoal); }
    .log-entry.system { color: var(--color-warm-gray); }
    .log-entry.action { color: var(--color-house); }
    .log-entry.pair { color: var(--color-gold); }
    .zone-c { position: absolute; top: var(--zone-c-top); left: 0; width: var(--board-w); height: var(--zone-c-h); background: transparent; }
    .self-hand-area { width: var(--board-w); height: var(--zone-c-h); display: flex; position: relative; }
    .self-hand-cards { width: calc(97 * var(--unit-x)); height: var(--zone-c-h); position: relative; padding: var(--unit-y) var(--unit-x); }
    .self-hand-gap { width: calc(4 * var(--unit-x)); }
    .draw-card-area { width: var(--card-large-w); height: var(--zone-c-h); position: relative; }
    .draw-zone { position: absolute; top: var(--unit-y); right: 0; width: var(--card-large-w); height: var(--card-large-h); }
    .draw-zone-clickable { cursor: pointer; border: 2px dashed var(--color-dusty-pink); border-radius: 5px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .draw-zone-clickable:hover { border-color: var(--color-gold); background: rgba(201, 162, 39, 0.05); }
    .end-turn-button { position: absolute; top: var(--unit-y); right: 0; width: var(--card-large-w); height: var(--card-large-h); background: #fff; border: 2px solid var(--color-burgundy); border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; cursor: pointer; color: var(--color-burgundy); }
    .end-turn-button:hover { background: var(--color-cream); }
    .card-large-front { width: var(--card-large-w); height: var(--card-large-h); background: #fff; border: 1px solid var(--color-burgundy); border-radius: 5px; display: flex; flex-direction: column; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; flex-shrink: 0; box-shadow: var(--shadow-light); }
    .card-large-front:hover { transform: translateY(-8px); box-shadow: var(--shadow-hover); }
    .card-large-front.citizen { border-top: 5px solid var(--color-citizen); }
    .card-large-front.noble { border-top: 5px solid var(--color-noble); }
    .card-large-front.special { border-top: 5px solid var(--color-special); }
    .card-large-front.house { border-top: 5px solid var(--color-house); }
    .card-large-front.wind { border-top: 5px solid var(--color-wind); }
    .card-large-front.selected { box-shadow: 0 0 15px rgba(201, 162, 39, 0.8); transform: translateY(-10px); }
    .card-large-front.selectable-target { box-shadow: 0 0 15px rgba(201, 162, 39, 0.5); }
    .card-large-front.hesitation-hover { transform: translateY(-10px); transition: transform 0.15s ease-out; }
    .card-large-header { height: 20%; display: flex; justify-content: space-between; align-items: center; padding: 0 6px; font-size: 11px; }
    .card-large-header .icon { font-size: 12px; }
    .card-large-header .code { font-weight: 700; color: var(--color-charcoal); }
    .card-large-header .score { font-weight: 700; color: var(--color-burgundy); }
    .card-large-body { height: 55%; display: flex; align-items: center; justify-content: center; }
    .card-large-body .symbol { font-size: 48px; }
    .card-large-footer { height: 25%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--color-warm-gray); }
    .card-large-back { width: var(--card-large-w); height: var(--card-large-h); border-radius: 5px; position: relative; overflow: hidden; background: repeating-linear-gradient(90deg, transparent 0px, transparent 7px, rgba(232, 180, 184, 0.1) 7px, rgba(232, 180, 184, 0.1) 8px), var(--card-back-bg); border: 3px solid var(--card-back-accent); cursor: pointer; flex-shrink: 0; box-shadow: var(--shadow-light); }
    .card-large-back:hover { box-shadow: 0 0 15px rgba(232, 180, 184, 0.5); }
    .card-large-back.highlight { box-shadow: 0 0 20px rgba(201, 162, 39, 0.8); }
    .card-large-back.highlight:hover { transform: translateY(-5px); box-shadow: 0 0 25px rgba(201, 162, 39, 1); }
    .card-large-back .corner { position: absolute; width: 24px; height: 42px; border: 2px solid var(--card-back-accent); }
    .card-large-back .corner.tl { top: 8px; left: 8px; border-right: none; border-bottom: none; }
    .card-large-back .corner.tr { top: 8px; right: 8px; border-left: none; border-bottom: none; }
    .card-large-back .corner.bl { bottom: 8px; left: 8px; border-right: none; border-top: none; }
    .card-large-back .corner.br { bottom: 8px; right: 8px; border-left: none; border-top: none; }
    .card-large-back .center-line { position: absolute; top: 50%; left: 16px; right: 16px; height: 2px; background: var(--card-back-accent); transform: translateY(-50%); }
    .card-large-back .vertical-lines { position: absolute; top: 56px; bottom: 56px; left: 50%; transform: translateX(-50%); width: 48px; background: repeating-linear-gradient(90deg, transparent 0px, transparent 3px, var(--card-back-accent) 3px, var(--card-back-accent) 5px, transparent 5px, transparent 8px); }
    .card-small-front { width: var(--card-small-w); height: var(--card-small-h); background: #fff; border: 1px solid var(--color-burgundy); border-radius: 4px; display: flex; flex-direction: column; flex-shrink: 0; box-shadow: var(--shadow-light); }
    .card-small-front.citizen { border-top: 4px solid var(--color-citizen); }
    .card-small-front.noble { border-top: 4px solid var(--color-noble); }
    .card-small-front.special { border-top: 4px solid var(--color-special); }
    .card-small-front.house { border-top: 4px solid var(--color-house); }
    .card-small-front.wind { border-top: 4px solid var(--color-wind); }
    .card-small-header { height: 20%; display: flex; justify-content: space-between; align-items: center; padding: 0 4px; font-size: 8px; }
    .card-small-body { height: 55%; display: flex; align-items: center; justify-content: center; }
    .card-small-body .symbol { font-size: 32px; }
    .card-small-footer { height: 25%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: var(--color-warm-gray); }
    .card-small-back { width: var(--card-small-w); height: var(--card-small-h); border-radius: 4px; position: relative; overflow: hidden; background: repeating-linear-gradient(90deg, transparent 0px, transparent 4.5px, rgba(232, 180, 184, 0.1) 4.5px, rgba(232, 180, 184, 0.1) 5.5px), var(--card-back-bg); border: 2px solid var(--card-back-accent); cursor: pointer; flex-shrink: 0; box-shadow: var(--shadow-light); }
    .card-small-back:hover { box-shadow: 0 0 10px rgba(232, 180, 184, 0.5); }
    .card-small-back.highlight { box-shadow: 0 0 15px rgba(201, 162, 39, 0.8); }
    .card-small-back.highlight:hover { transform: translateY(-5px); }
    .card-small-back.hesitation-hover { transform: translateY(-7px); transition: transform 0.15s ease-out; }
    .card-small-back .corner { position: absolute; width: 16.5px; height: 29.4px; border: 1.3px solid var(--card-back-accent); }
    .card-small-back .corner.tl { top: 5.5px; left: 5.5px; border-right: none; border-bottom: none; }
    .card-small-back .corner.tr { top: 5.5px; right: 5.5px; border-left: none; border-bottom: none; }
    .card-small-back .corner.bl { bottom: 5.5px; left: 5.5px; border-right: none; border-top: none; }
    .card-small-back .corner.br { bottom: 5.5px; right: 5.5px; border-left: none; border-top: none; }
    .card-small-back .center-line { position: absolute; top: 50%; left: 11px; right: 11px; height: 1.3px; background: var(--card-back-accent); transform: translateY(-50%); }
    .card-burn-back { width: var(--card-burn-w); height: var(--card-burn-h); border-radius: 3px; position: relative; overflow: hidden; background: repeating-linear-gradient(90deg, transparent 0px, transparent 2.7px, rgba(232, 180, 184, 0.1) 2.7px, rgba(232, 180, 184, 0.1) 3.7px), var(--card-back-bg); border: 1.5px solid var(--card-back-accent); flex-shrink: 0; box-shadow: var(--shadow-light); }
    .card-burn-back .corner { position: absolute; width: 11px; height: 21px; border: 1px solid var(--card-back-accent); }
    .card-burn-back .corner.tl { top: 3.7px; left: 3.7px; border-right: none; border-bottom: none; }
    .card-burn-back .corner.tr { top: 3.7px; right: 3.7px; border-left: none; border-bottom: none; }
    .card-burn-back .corner.bl { bottom: 3.7px; left: 3.7px; border-right: none; border-top: none; }
    .card-burn-back .corner.br { bottom: 3.7px; right: 3.7px; border-left: none; border-top: none; }
    .card-burn-back .center-line { position: absolute; top: 50%; left: 7.4px; right: 7.4px; height: 1px; background: var(--card-back-accent); transform: translateY(-50%); }
    /* v2.0.0: burn サイズの表面（市場用） */
    .card-burn-front { width: var(--card-burn-w); height: var(--card-burn-h); background: #fff; border: 1px solid var(--color-burgundy); border-radius: 3px; display: flex; flex-direction: column; flex-shrink: 0; box-shadow: var(--shadow-light); overflow: hidden; }
    .card-burn-front.citizen { border-top: 2px solid var(--color-citizen); }
    .card-burn-front.noble { border-top: 2px solid var(--color-noble); }
    .card-burn-front.special { border-top: 2px solid var(--color-special); }
    .card-burn-front.house { border-top: 2px solid var(--color-house); }
    .card-burn-front.wind { border-top: 2px solid var(--color-wind); }
    .card-burn-header { display: flex; justify-content: space-between; align-items: center; padding: 1px 2px; font-size: 7px; }
    .card-burn-header .icon { font-size: 8px; }
    .card-burn-header .code { flex: 1; text-align: center; font-weight: bold; color: var(--color-charcoal); font-size: 6px; }
    .card-burn-header .score { font-weight: bold; color: var(--color-burgundy); font-size: 7px; }
    .card-burn-body { flex: 1; display: flex; align-items: center; justify-content: center; }
    .card-burn-body .symbol { font-size: 20px; }
    .card-burn-footer { text-align: center; font-size: 6px; font-weight: bold; color: var(--color-warm-gray); padding: 1px 0; }
    .building-slot-large { width: var(--card-large-w); height: calc(var(--card-large-h) + 3 * var(--unit-y)); position: absolute; top: 0 !important; }
    .building-slot-small { width: var(--card-small-w); height: calc(var(--card-small-h) + 2 * var(--unit-y)); position: absolute; top: 0 !important; }

  <script type="text/babel">
const { useState, useEffect, useRef, useCallback, useReducer } = React;

// ========================================
// バージョン情報（一元管理）
// ========================================
const VERSION = {
  major: 2,
  minor: 0,
  patch: 9,
  get string() { return `v${this.major}.${this.minor}.${this.patch}`; },
  get full() { return `${this.major}.${this.minor}.${this.patch}`; }
};

const GameLogger = {
  logs: [], maxLogs: 300000,
  debugMode: false,
  fullDetailMode: false,
  autoPlayMode: false,
  autoPlayAnim: false,
  
  // 通常ログ（常に出力）
  log(...args) {
    console.log(...args);
  },
  
  // ログモード判定
  // フルスペック: 手動プレイ（時間あり、全データ）
  // 統計用: オートプレイ（時間省略）
  // 統計用+アニメ: オートプレイ+アニメON（時間省略、アニメログあり）
  isFullSpec() { return this.debugMode && !this.autoPlayMode; },
  isStatsMode() { return this.debugMode && this.autoPlayMode && !this.autoPlayAnim; },
  isStatsWithAnim() { return this.debugMode && this.autoPlayMode && this.autoPlayAnim; },
  
  init() {
    const self = this;
    const originalLog = console.log;
    console.log = (...args) => {
      const message = args.map(arg => typeof arg === 'object' ? JSON.stringify(arg) : String(arg)).join(' ');
      // オートプレイ時はタイムスタンプ省略
      const prefix = self.autoPlayMode ? '' : `[${new Date().toISOString().substr(11, 12)}] `;
      self.logs.push(`${prefix}${message}`);
      if (self.logs.length > self.maxLogs) self.logs.shift();
      originalLog.apply(console, args);
    };
  },
  // 詳細ログ（debugModeがtrueの時のみ出力）
  debug(...args) {
    if (!this.debugMode) return;
    console.log('[DEBUG]', ...args);
  },
  // フル詳細ログ（fullDetailModeがtrueの時のみ出力）
  full(...args) {
    if (!this.fullDetailMode) return;
    console.log('[FULL]', ...args);
  },
  // アニメーション関連ログ（フルスペック or 統計+アニメ時のみ）
  anim(...args) {
    if (!this.debugMode) return;
    if (this.autoPlayMode && !this.autoPlayAnim) return; // 統計用モードでは省略
    console.log('[ANIM]', ...args);
  },
  // 手札の内訳を取得
  getHandBreakdown(hand) {
    const chars = hand.filter(c => c.type === 'character');
    const houses = hand.filter(c => c.type === 'house');
    const winds = hand.filter(c => c.type === 'wind');
    return {
      total: hand.length,
      chars: chars.length,
      houses: houses.length,
      winds: winds.length,
      charNames: chars.map(c => c.name).join(',') || '(なし)',
      houseNames: houses.map(c => c.name).join(',') || '(なし)',
      windNames: winds.map(c => c.name).join(',') || '(なし)',
    };
  },
  // ターンサマリーを生成（フル詳細用）
  getTurnSummary(turn, players, deck, phase) {
    const hands = players.map((p, i) => {
      const hb = this.getHandBreakdown(p.hand);
      return `P${i}=${hb.total}(${hb.charNames})`;
    }).join(', ');
    const houses = players.map((p, i) => {
      if (p.houses.length === 0) return `P${i}=[]`;
      const hList = p.houses.map(h => `${h.houseCard.name}:${h.storedCard.name}`).join(',');
      return `P${i}=[${hList}]`;
    }).join(', ');
    return { hands, houses, deckCount: deck.length, phase };
  },
  // 魔女/聖母の所在を取得
  getDangerLocation(players) {
    let witchLoc = '除外', holyLoc = '除外';
    players.forEach((p, i) => {
      // 手札をチェック
      p.hand.forEach(c => {
        if (c.id === 'WIT') witchLoc = `P${i}手札`;
        if (c.id === 'HOL') holyLoc = `P${i}手札`;
      });
      // 家をチェック
      p.houses.forEach(h => {
        if (h.storedCard.id === 'WIT') witchLoc = `P${i}の${h.houseCard.name}`;
        if (h.storedCard.id === 'HOL') holyLoc = `P${i}の${h.houseCard.name}`;
      });
    });
    return { witch: witchLoc, holy: holyLoc };
  },
  // 選択肢を生成
  getOptions(player, phase, canUseWind, targets) {
    const options = ['ターン終了'];
    const hand = player.hand;
    const houseCards = hand.filter(c => c.type === 'house');
    const charCards = hand.filter(c => c.type === 'character');
    const windCards = hand.filter(c => c.type === 'wind');
    
    // 家格納オプション
    if (houseCards.length > 0 && charCards.length > 0) {
      houseCards.forEach(h => {
        charCards.forEach(c => {
          options.push(`家格納:${c.name}→${h.name}`);
        });
      });
    }
    
    // 風カードオプション（ババ抜きフェーズのみ）
    if (canUseWind && windCards.length > 0 && targets && targets.length > 0) {
      windCards.forEach(w => {
        targets.forEach(t => {
          options.push(`風:${w.name}→${t}`);
        });
      });
    }
    
    return options;
  },
  setDebugMode(enabled) {
    this.debugMode = enabled;
    console.log(`[GameLogger] Debug mode: ${enabled ? 'ON' : 'OFF'}`);
  },
  setFullDetailMode(enabled) {
    this.fullDetailMode = enabled;
    console.log(`[GameLogger] Full detail mode: ${enabled ? 'ON' : 'OFF'}`);
  },
  // オートプレイ状態を更新
  setAutoPlayState(autoPlay, autoAnim) {
    this.autoPlayMode = autoPlay;
    this.autoPlayAnim = autoAnim;
  },
  downloadLogs() {
    const blob = new Blob([this.logs.join('\n')], { type: 'text/plain' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `hw_log_${new Date().toISOString().replace(/[:.]/g, '-').substr(0, 19)}.txt`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  }
};

// ========================================
// NotationLogger - 記法システム対応ログ（セット制改善版）
// トーナメントモード・統計追跡対応
// ========================================
const NotationLogger = {
  get version() { return VERSION.full; },
  logs: [],
  gameStartTime: null,
  currentTurn: 0,
  currentPhase: 'EX',
  playerNames: [],
  playerStrategies: [],
  
  // カードID → 記法変換マップ
  CARD_NOTATION: {
    // 人物カード
    FAR: '[F]', MER: '[Me]', CAR: '[Ca]', TRV: '[T]', BUT: '[Bu]', MAI: '[M]',
    NOB: '[N]', KNI: '[K]', PRI: '[P]', SCH: '[S]',
    WIT: '[Wi]', HOL: '[Ho]',
    // 家カード
    HOU: '{Ho}', STL: '{St}', RUI: '{Ru}',
    // 風カード
    GHI: '<Gh>',
  },
  
  // カードID → 記法変換
  toNotation(cardOrId) {
    if (!cardOrId) return '?';
    const id = typeof cardOrId === 'string' ? cardOrId : cardOrId.id;
    return this.CARD_NOTATION[id] || `[${id}]`;
  },
  
  // 複数カードを記法に変換
  cardsToNotation(cards) {
    if (!cards || cards.length === 0) return '(none)';
    return cards.map(c => this.toNotation(c)).join('');
  },
  
  // 手札の記法表現（詳細スコア用）
  handToScoreDetail(hand) {
    const groups = { citizen: [], noble: [], special: [], house: [], wind: [] };
    hand.forEach(c => {
      if (c.category === 'citizen') groups.citizen.push(c);
      else if (c.category === 'noble') groups.noble.push(c);
      else if (c.category === 'special') groups.special.push(c);
      else if (c.category === 'house') groups.house.push(c);
      else if (c.category === 'wind') groups.wind.push(c);
    });
    
    const lines = [];
    const formatGroup = (name, cards) => {
      if (cards.length === 0) return `${name}: (none)`;
      const counts = {};
      cards.forEach(c => { counts[c.id] = (counts[c.id] || 0) + 1; });
      const parts = Object.entries(counts).map(([id, cnt]) => {
        const pts = cards.find(c => c.id === id)?.points || 0;
        return `${this.toNotation(id)}x${cnt}=${pts * cnt}`;
      });
      return `${name}: ${parts.join(', ')}`;
    };
    
    lines.push(formatGroup('CITIZEN', groups.citizen));
    lines.push(formatGroup('NOBLE', groups.noble));
    lines.push(formatGroup('SPECIAL', groups.special));
    lines.push(formatGroup('HOUSE', groups.house));
    lines.push(formatGroup('WIND', groups.wind));
    
    const total = hand.reduce((sum, c) => sum + (c.points || 0), 0);
    lines.push(`TOTAL: -${total}`);
    
    return lines;
  },
  
  // 手札の簡易記法（1行）
  handToSimple(hand) {
    if (!hand || hand.length === 0) return '(empty)';
    const counts = {};
    hand.forEach(c => { counts[c.id] = (counts[c.id] || 0) + 1; });
    const parts = Object.entries(counts).map(([id, cnt]) => {
      const pts = hand.find(c => c.id === id)?.points || 0;
      return `${this.toNotation(id)}x${cnt}=${pts * cnt}`;
    });
    return parts.join(', ');
  },
  
  // ログ追加（内部用）
  _add(line) {
    this.logs.push(line);
  },
  
  // コメント追加
  comment(text) {
    this._add(`; ${text}`);
  },
  
  // ゲーム開始を記録
  recordGameStart(players, market, ruinPile, firstPlayerIdx) {
    // ログはリセットせず蓄積（複数ゲーム対応）
    // ゲーム間の区切り
    if (this.logs.length > 0) {
      this._add('');
      this._add('');
    }
    
    this.gameStartTime = new Date();
    this.currentTurn = 1;  // T1から開始
    this.currentPhase = 'EX';
    this._currentLine = null; // 前のゲームの未確定ラインをクリア
    this.playerNames = players.map(p => p.name);
    this.playerStrategies = players.map(p => p.strategy || {});
    
    this._add('========================================');
    this._add(`=== GAME START (${VERSION.string}) ===`);
    this._add('========================================');
    this._add(`Date: ${this.gameStartTime.toISOString().slice(0, 19).replace('T', ' ')}`);
    
    // プレイヤー情報
    const playerInfo = players.map((p, i) => `P${i}(${p.name})`).join(' vs ');
    this._add(`Players: ${playerInfo}`);
    this._add(`First: P${firstPlayerIdx}`);
    
    // プレイヤー詳細（コメント）
    players.forEach((p, i) => {
      if (p.type === 'ai' && p.strategy) {
        const s = p.strategy;
        this.comment(`CRITICS: P${i}=${p.name} {speculativeHouse:${s.speculativeHouse || 50},speculativeWind:${s.speculativeWind || 50},storeThreshold:${s.storeThreshold || 3},attackTarget:${s.attackTarget || 'highValue'}}`);
      }
    });
    
    this._add('');
    
    // 市場
    const mktNotation = market.map(c => this.toNotation(c)).join('');
    this._add(`[MKT: ${mktNotation}]`);
    this._add(`{Ru}x${ruinPile?.length || 2}`);
    this._add('');
  },
  
  // 初期手札を記録
  recordInitialHands(players, initialPairs) {
    this._add('[INIT]');
    players.forEach((p, i) => {
      const pairInfo = initialPairs[i];
      if (pairInfo && pairInfo.length > 0) {
        const pairNotation = pairInfo.map(pair => `X ${this.toNotation(pair.cards[0])}${this.toNotation(pair.cards[0])}`).join(' ');
        this._add(`P${i}: 7 -> ${pairNotation} -> H:${p.hand.length}`);
      } else {
        this._add(`P${i}: 7 -> NO_PAIR -> H:${p.hand.length}`);
      }
    });
    this._add('');
  },
  
  // デッキ枚数を記録
  recordDeckCount(deckCount) {
    this._add(`DECK: ${deckCount}`);
    this._add('');
  },
  
  // フェーズヘッダーを記録
  recordPhaseHeader(phase) {
    const phaseName = phase === 'exploration' ? 'EXPLORATION' : 'BABANUKI';
    this._add('========================================');
    this._add(`=== ${phaseName} ===`);
    this._add('========================================');
    this._add('');
    this.currentPhase = phase === 'exploration' ? 'EX' : 'BB';
  },
  
  // ターン開始
  setTurn(turn, phase) {
    this.currentTurn = turn;
    this.currentPhase = phase === 'exploration' ? 'EX' : 'BB';
  },
  
  // 山札ドローを記録
  recordDeckDraw(playerIdx, card, handCount, isLast = false) {
    // 前のラインが未確定なら確定
    if (this._currentLine) {
      this.finishLine(this._currentLine.handCount, false, false);
    }
    
    const notation = this.toNotation(card);
    let line = `T${this.currentTurn} [${this.currentPhase}] P${playerIdx}: >> ${notation}`;
    if (isLast) line += ' LAST';
    // 結果は後で追加されるので、ここでは基本部分のみ
    this._currentLine = { base: line, playerIdx, handCount, actions: [] };
  },
  
  // プレイヤードローを記録
  recordPlayerDraw(playerIdx, targetIdx, card, cardIndex, handCount) {
    // 前のラインが未確定なら確定
    if (this._currentLine) {
      this.finishLine(this._currentLine.handCount, false, false);
    }
    
    const notation = this.toNotation(card);
    let line = `T${this.currentTurn} [${this.currentPhase}] P${playerIdx}: << P${targetIdx} ${notation}`;
    if (cardIndex !== undefined) line += ` @idx:${cardIndex}`;
    this._currentLine = { base: line, playerIdx, handCount, actions: [] };
  },
  
  // ペア捨てを記録（現在のラインに追加）
  recordPair(card, isPurification = false) {
    if (!this._currentLine) return;
    const notation = this.toNotation(card);
    if (isPurification) {
      this._currentLine.actions.push(`*[Wi]+[Ho] -> PURIFY`);
    } else {
      this._currentLine.actions.push(`X ${notation}${notation}`);
    }
  },
  
  // 家配置を記録（現在のラインに追加）
  recordHousePlace(houseCard, storedCard, isStall = false, marketExchange = null) {
    if (!this._currentLine) return;
    const houseNotation = this.toNotation(houseCard);
    const storedNotation = this.toNotation(storedCard);
    const visibility = isStall ? '!' : '?';
    
    if (isStall && marketExchange) {
      const sentNotation = this.toNotation(marketExchange.sent);
      const gotNotation = this.toNotation(marketExchange.got);
      this._currentLine.actions.push(`-> ${houseNotation} <-> [MKT] (${sentNotation}!->${gotNotation})`);
    } else {
      this._currentLine.actions.push(`-> ${houseNotation}(${storedNotation}${visibility})`);
    }
  },
  
  // 家取り出しを記録（現在のラインに追加）
  recordHouseRetrieve(houseCard, storedCard) {
    if (!this._currentLine) return;
    const houseNotation = this.toNotation(houseCard);
    const storedNotation = this.toNotation(storedCard);
    this._currentLine.actions.push(`<- ${houseNotation}(${storedNotation})`);
  },
  
  // 風カード使用を記録（現在のラインに追加）
  recordWind(windCard, targetPlayerIdx, targetHouse, result, stolenCard = null) {
    if (!this._currentLine) return;
    const windNotation = this.toNotation(windCard);
    const houseNotation = this.toNotation(targetHouse.houseCard);
    const storedNotation = this.toNotation(targetHouse.storedCard);
    const visibility = targetHouse.houseCard.id === 'HOU' ? '?' : '!';
    
    let action = `${windNotation} @P${targetPlayerIdx}${houseNotation}(${storedNotation}${visibility})`;
    
    if (result === 'degrade') {
      action += ' DEGRADE';
    } else if (result === 'destroy') {
      action += ` DESTROY+STEAL +${this.toNotation(stolenCard)}`;
    } else if (result === 'destroy_no_ruin') {
      action += ` DESTROY+STEAL +${this.toNotation(stolenCard)} (NO_RUIN)`;
    }
    
    this._currentLine.actions.push(action);
  },
  
  // 浄化の全送還を記録
  recordPurificationRelease(releaseDetails) {
    this._add('    RELEASE_ALL');
    releaseDetails.forEach(detail => {
      if (detail.card) {
        this._add(`    P${detail.playerIdx}: ${this.toNotation(detail.houseCard)}(${this.toNotation(detail.card)}${detail.visible ? '!' : '?'}) -> +${this.toNotation(detail.card)} H:${detail.newHandCount}`);
      } else {
        this._add(`    P${detail.playerIdx}: (none)`);
      }
    });
  },
  
  // 現在のラインを確定して出力
  finishLine(handCount, isWin = false, isPhaseTransition = false) {
    if (!this._currentLine) return;
    
    let line = this._currentLine.base;
    
    // アクションを追加
    if (this._currentLine.actions.length > 0) {
      line += ' ' + this._currentLine.actions.join(' ');
    }
    
    // 手札数
    line += ` -> H:${handCount}`;
    
    // フェーズ移行
    if (isPhaseTransition) {
      // 現在のラインのフェーズ表記を更新
      line = line.replace('[EX]', '[EX->BB]');
    }
    
    // 勝利
    if (isWin) {
      line += ' WIN #';
    }
    
    this._add(line);
    this._currentLine = null;
  },
  
  // AI意思決定をコメントで記録
  recordAiDecision(playerIdx, options, chosen, reason) {
    if (options && options.length > 0) {
      const optStr = options.slice(0, 3).map(o => `${o.type}(${o.score})`).join(', ');
      this.comment(`AI: P${playerIdx} options: ${optStr}`);
    }
    if (chosen && reason) {
      this.comment(`AI: P${playerIdx} chose ${chosen}, reason=${reason}`);
    }
  },
  
  // ドロー詳細をコメントで記録
  recordDrawDetail(playerIdx, targetIdx, handSize, cardIndex, rule) {
    this.comment(`DRAW: P${playerIdx} from P${targetIdx}, hand=[${handSize}], idx=${cardIndex}, rule=${rule}`);
  },
  
  // 状態をコメントで記録
  recordState(turn, deckCount, phase, playerHands, playerHouses) {
    this.comment(`STATE: turn=${turn}, deck=${deckCount}, phase=${phase}`);
    const handsStr = playerHands.map((h, i) => `P${i}.hand=${h}`).join(', ');
    this.comment(`STATE: ${handsStr}`);
  },
  
  // 警告をコメントで記録
  recordWarning(message) {
    this.comment(`WARN: ${message}`);
  },
  
  // エラーをコメントで記録
  recordError(message) {
    this.comment(`ERROR: ${message}`);
  },
  
  // ゲーム終了を記録
  recordGameEnd(winnerIdx, condition, players, market, ruinPileUsed, stats) {
    // 未確定のラインがあれば確定（勝者のライン、引き分け時は最後のプレイヤー）
    if (this._currentLine) {
      const targetIdx = winnerIdx >= 0 ? winnerIdx : 0;
      const targetHand = players[targetIdx]?.hand?.length || 0;
      this.finishLine(targetHand, winnerIdx >= 0, false);
    }
    
    this._add('');
    this._add('========================================');
    this._add('=== GAME END ===');
    this._add('========================================');
    this._add('');
    
    const conditionStr = condition === 'draw' ? 'DRAW' : (condition === 'stalemate' ? 'STALEMATE' : 'AGARI');
    if (condition === 'draw') {
      this._add(`RESULT: DRAW (no winner)`);
    } else {
      this._add(`WINNER: P${winnerIdx} (${conditionStr})`);
    }
    this._add('');
    
    // 最終状態
    this._add('[FINAL]');
    const mktNotation = market.map(c => this.toNotation(c)).join('');
    this._add(`MKT: ${mktNotation}`);
    this._add(`{Ru}: ${2 - ruinPileUsed} (USED: ${ruinPileUsed})`);
    this._add('');
    
    // 詳細スコア
    this._add('[SCORE_DETAIL]');
    if (condition === 'draw') {
      // 引き分け時は全員のスコアを表示（得点移動なし）
      players.forEach((p, i) => {
        const score = p.hand.reduce((sum, c) => sum + (c.points || 0), 0);
        this._add(`P${i}: ${score} (DRAW - no change)`);
        const details = this.handToScoreDetail(p.hand);
        details.forEach(line => this._add(`  ${line}`));
        this._add('');
      });
    } else {
      let totalLoss = 0;
      players.forEach((p, i) => {
        if (i === winnerIdx) {
          this._add(`P${i}: (WIN)`);
        } else {
          const loss = p.hand.reduce((sum, c) => sum + (c.points || 0), 0);
          totalLoss += loss;
          this._add(`P${i}: -${loss}`);
          const details = this.handToScoreDetail(p.hand);
          details.forEach(line => this._add(`  ${line}`));
        }
        this._add('');
      });
      
      // 勝者の獲得点
      this._add(`P${winnerIdx}: +${totalLoss} (WIN)`);
      this._add(`  GAINED: ${totalLoss}`);
      this._add('');
    }
    
    // 統計
    if (stats) {
      this._add('[STATS]');
      this._add(`TURNS: ${stats.totalTurns} (EX:${stats.explorationTurns} BB:${stats.babanukiTurns})`);
      if (stats.purificationTurn) {
        this._add(`PURIFY: T${stats.purificationTurn} P${stats.purificationPlayer} (RELEASE_ALL)`);
      }
      this._add(`DEGRADE: ${stats.degradeCount || 0}`);
      this._add(`DESTROY: ${stats.destroyCount || 0}`);
      this._add(`{Ru}_USED: ${ruinPileUsed}`);
      this._add(`WIND_USED: ${stats.windUsed || 0}`);
      this._add(`HOUSE_PLACED: ${stats.housePlaced || 0}`);
      this._add(`STALL_PLACED: ${stats.stallPlaced || 0}`);
      this._add(`MKT_EXCHANGES: ${stats.marketExchanges || 0}`);
    }
    
    this._add('');
    this._add('========================================');
  },
  
  // ログをエクスポート
  export() {
    return this.logs.join('\n');
  },
  
  // ログをダウンロード
  download() {
    const content = this.export();
    const blob = new Blob([content], { type: 'text/plain; charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
    a.download = `hw_notation_${timestamp}.txt`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  },
  
  // ログをクリア
  clear() {
    this.logs = [];
    this._currentLine = null;
  },
  
  // トーナメント開始を記録
  recordTournamentStart(participants, rounds, totalGames) {
    this.logs = []; // トーナメント開始時はログをクリア
    this._currentLine = null;
    
    const versionStr = VERSION.string.padEnd(6);  // "v2.0.7" を6文字に
    this._add('╔══════════════════════════════════════════════════════════════╗');
    this._add(`║              TOURNAMENT MODE (${versionStr})                       ║`);
    this._add('╚══════════════════════════════════════════════════════════════╝');
    this._add(`Date: ${new Date().toISOString().slice(0, 19).replace('T', ' ')}`);
    this._add(`Rounds: ${rounds}`);
    this._add(`Games: ${totalGames}`);
    this._add(`Players: ${participants.length}`);
    this._add('');
    
    // プレイヤー定義
    this._add('[PLAYERS]');
    participants.forEach((p, i) => {
      const stratStr = p.strategy ? 
        `{sH:${p.strategy.speculativeHouse||50},sW:${p.strategy.speculativeWind||50},th:${p.strategy.storeThreshold||3},atk:${p.strategy.attackTarget||'highValue'}}` : 
        '{human}';
      this._add(`P${i}=${p.name} ${stratStr}`);
    });
    this._add('');
    this._add('========================================');
    this._add('=== GAMES ===');
    this._add('========================================');
    this._add('');
  },
  
  // トーナメント終了サマリーを記録
  recordTournamentEnd(data) {
    // 未確定ラインがあれば確定
    if (this._currentLine) {
      this.finishLine(0, false, false);
    }
    
    this._add('');
    this._add('');
    this._add('╔══════════════════════════════════════════════════════════════╗');
    this._add('║              TOURNAMENT SUMMARY                              ║');
    this._add('╚══════════════════════════════════════════════════════════════╝');
    this._add('');
    
    // ランキング
    this._add('[RANK]');
    const ranking = Object.values(data.playerStats)
      .map(p => ({
        ...p,
        winRate: p.games > 0 ? (p.wins / p.games * 100).toFixed(1) : '0.0',
        avgPos: p.games > 0 ? ((p.positions[0]*1 + p.positions[1]*2 + p.positions[2]*3 + p.positions[3]*4) / p.games).toFixed(2) : '0.00'
      }))
      .sort((a, b) => b.totalScore - a.totalScore);
    
    ranking.forEach((p, i) => {
      const score = p.totalScore >= 0 ? `+${p.totalScore}` : `${p.totalScore}`;
      // P番号を特定
      const pIdx = data.participants.findIndex(pt => pt.name === p.name);
      this._add(`${i+1}. P${pIdx}: ${score} W:${p.wins} WR:${p.winRate}% AVG:${p.avgPos}`);
    });
    this._add('');
    
    // 戦略統計
    this._add('[STRAT]');
    const formatStrat = (stat) => {
      return Object.entries(stat)
        .map(([k, v]) => `${k}=${v.games > 0 ? (v.wins/v.games*100).toFixed(0) : 0}%`)
        .join(' ');
    };
    this._add(`house: ${formatStrat(data.strategyStats.housePreference)}`);
    this._add(`thresh: ${formatStrat(data.strategyStats.storeThreshold)}`);
    this._add(`attack: ${formatStrat(data.strategyStats.attackTarget)}`);
    this._add(`specH: ${formatStrat(data.strategyStats.speculativeHouse)}`);
    this._add(`specW: ${formatStrat(data.strategyStats.speculativeWind)}`);
    this._add('');
    
    // ゲーム性統計
    this._add('[GAME]');
    const gs = data.gameplayStats;
    const avgTurns = gs.turnCounts.length > 0 ? 
      (gs.turnCounts.reduce((a,b)=>a+b,0) / gs.turnCounts.length).toFixed(1) : '0';
    this._add(`turns: ${avgTurns}avg`);
    
    const totalCond = gs.winConditions.agari + gs.winConditions.purification + gs.winConditions.stalemate;
    if (totalCond > 0) {
      this._add(`cond: agari=${(gs.winConditions.agari/totalCond*100).toFixed(0)}% purify=${(gs.winConditions.purification/totalCond*100).toFixed(0)}% stale=${(gs.winConditions.stalemate/totalCond*100).toFixed(0)}%`);
    }
    
    const totalPos = gs.positionWins.reduce((a,b)=>a+b,0);
    if (totalPos > 0) {
      const posStr = gs.positionWins.map((w, i) => `P${i+1}=${(w/totalPos*100).toFixed(0)}%`).join(' ');
      this._add(`pos: ${posStr}`);
    }
    
    this._add(`reversals: ${gs.reversals} (${(gs.reversals/gs.totalGames*100).toFixed(1)}%)`);
    this._add(`close: ${gs.closeFinishes} (${(gs.closeFinishes/gs.totalGames*100).toFixed(1)}%)`);
    this._add('');
    
    this._add('══════════════════════════════════════════════════════════════');
  },
  
  // セットゲーム開始を記録（新セット制対応）
  recordSetStart(players, setConfig) {
    // セット開始時はログをクリア
    this.logs = [];
    this._currentLine = null;
    
    const { gamesPerSet, totalSets, currentSet } = setConfig;
    
    this._add('========================================');
    this._add(`=== SET ${currentSet} START (${VERSION.string}) ===`);
    this._add('========================================');
    this._add(`Date: ${new Date().toISOString().slice(0, 19).replace('T', ' ')}`);
    this._add(`Format: ${gamesPerSet} games/set, ${totalSets === 0 ? 'unlimited sets' : `${totalSets} set(s)`}`);
    this._add('');
    
    // プレイヤー定義
    this._add('[PLAYERS]');
    players.forEach((p, i) => {
      const stratStr = p.strategy ? 
        `{sH:${p.strategy.speculativeHouse||50},sW:${p.strategy.speculativeWind||50},th:${p.strategy.storeThreshold||3},atk:${p.strategy.attackTarget||'highValue'}}` : 
        (p.type === 'human' ? '{human}' : '{}');
      this._add(`P${i}=${p.name} ${stratStr}`);
    });
    this._add('');
    this._add('========================================');
    this._add('=== GAMES ===');
    this._add('========================================');
    this._add('');
  },
  
  // セットゲーム終了サマリーを記録（累積スコアで勝者判定）
  recordSetEnd(winnerIdx, players, winCount, cumulativeScores, setConfig) {
    // 未確定ラインがあれば確定
    if (this._currentLine) {
      this.finishLine(0, false, false);
    }
    
    const { gamesPerSet, currentSet } = setConfig;
    
    this._add('');
    this._add('');
    this._add('========================================');
    this._add(`=== SET ${currentSet} END ===`);
    this._add('========================================');
    this._add(`Games: ${gamesPerSet}`);
    this._add('');
    
    // 累積スコア（勝敗判定の主要指標）
    this._add('[FINAL_SCORES]');
    const sortedPlayers = players.map((p, i) => ({ 
      idx: i, 
      name: p.name, 
      score: cumulativeScores[i] || 0,
      wins: winCount[i] || 0
    })).sort((a, b) => b.score - a.score);
    
    const winnerName = players[winnerIdx]?.name || `P${winnerIdx}`;
    this._add(`WINNER: P${winnerIdx} (${winnerName})`);
    this._add('');
    
    sortedPlayers.forEach((p, rank) => {
      const scoreStr = p.score >= 0 ? `+${p.score}` : `${p.score}`;
      const winnerMark = p.idx === winnerIdx ? ' ★' : '';
      this._add(`${rank + 1}. P${p.idx} (${p.name}): ${scoreStr} (${p.wins}W)${winnerMark}`);
    });
    this._add('');
    this._add('========================================');
  }
};

// 動的pitch計算（ユニット単位）
// 手札カードの配置間隔を計算
// - 余裕がある場合: カード幅 + 1U間隔
// - 重なり始める場合: 等幅配置
// - 重なり限界: 最小間隔1U確保、はみ出し許可
const calcCardPitch = (cardCount, areaWidthU, cardWidthU, minGapU = 1) => {
  if (cardCount <= 1) return 0;
  
  // カード幅 + 1U間隔で並べた場合の必要幅
  const widthWithGap = cardWidthU + (cardWidthU + minGapU) * (cardCount - 1);
  
  if (widthWithGap <= areaWidthU) {
    // 余裕あり: カード幅 + 1U間隔
    return UNIT.toPixelX(cardWidthU + minGapU);
  }
  
  // 等幅配置（ピクセル計算）
  const areaWidthPx = UNIT.toPixelX(areaWidthU);
  const cardWidthPx = UNIT.toPixelX(cardWidthU);
  const pitch = (areaWidthPx - cardWidthPx) / (cardCount - 1);
  
  // 最小間隔1U確保（それ以下ならはみ出し許可）
  const minGapPx = UNIT.toPixelX(minGapU);
  if (pitch < minGapPx) {
    return minGapPx;
  }
  
  return pitch;
};

// ドロールール設定 ★ ドロー方式変更時はここを編集
const DRAW_RULES = {
  FREE: 'free',           // 自由ドロー（現行）
  CLOCKWISE: 'clockwise', // 右回り順引き
};
const CURRENT_DRAW_RULE = DRAW_RULES.FREE; // ← ルール変更時はここ

// ============================================
// ドロールールエンジン
// ============================================
const DrawRuleEngine = {
  // 現在のルールを取得
  getRule: () => CURRENT_DRAW_RULE,
  
  // ドロー可能なプレイヤーを取得（ババ抜きフェーズ用）
  getValidTargets: (currentIdx, players, excludeSingleCard = true) => {
    const rule = CURRENT_DRAW_RULE;
    const numPlayers = players.length;
    
    // 手札条件でフィルタ（手札1枚は除外、全員1枚以下なら手札ありを許可）
    let candidates = players.filter((p, i) => i !== currentIdx && p.hand.length > (excludeSingleCard ? 1 : 0));
    if (candidates.length === 0 && excludeSingleCard) {
      candidates = players.filter((p, i) => i !== currentIdx && p.hand.length > 0);
    }
    if (candidates.length === 0) return [];
    
    if (rule === DRAW_RULES.FREE) {
      // 自由ドロー: 全ての有効プレイヤーを返す
      return candidates;
    } else if (rule === DRAW_RULES.CLOCKWISE) {
      // 順引き: 右隣（次のインデックス）から時計回りに探す
      for (let offset = 1; offset < numPlayers; offset++) {
        const nextIdx = (currentIdx + offset) % numPlayers;
        const nextPlayer = players[nextIdx];
        if (candidates.some(c => c.id === nextPlayer.id)) {
          return [nextPlayer];
        }
      }
      return [];
    }
    return candidates;
  },
  
  // AI用: ドロー対象を選択
  selectTarget: (currentIdx, players) => {
    const targets = DrawRuleEngine.getValidTargets(currentIdx, players);
    if (targets.length === 0) return null;
    
    if (CURRENT_DRAW_RULE === DRAW_RULES.FREE) {
      // 自由ドロー: 手札最多を選択
      return targets.reduce((best, cur) => cur.hand.length > best.hand.length ? cur : best);
    } else {
      // 順引き: 唯一の候補を返す
      return targets[0];
    }
  },
  
  // AI用: カードインデックス選択
  selectCardIndex: (targetHand) => {
    if (CURRENT_DRAW_RULE === DRAW_RULES.FREE) {
      // 自由ドロー: ランダム
      return Math.floor(Math.random() * targetHand.length);
    } else {
      // 順引き: 右端（配列の最後）
      return targetHand.length - 1;
    }
  },
  
  // UI用: クリック可能判定
  isClickable: (currentIdx, targetIdx, players) => {
    const targets = DrawRuleEngine.getValidTargets(currentIdx, players);
    return targets.some(t => players.indexOf(t) === targetIdx);
  },
  
  // UI用: 順引きモードで引くカードのインデックスを返す（-1なら自由）
  getRequiredCardIndex: (targetHand) => {
    if (CURRENT_DRAW_RULE === DRAW_RULES.CLOCKWISE) {
      return targetHand.length - 1; // 右端
    }
    return -1; // 自由
  },
};

// v2.0.0: 風カード効果エンジン（v7.0ルール対応）
// ============================================
const WindEffectEngine = {
  // 風カード効果を取得
  getEffect: (effectId) => WIND_EFFECTS[effectId] || null,
  
  // 家カード特性を取得
  getHouseProperty: (houseId) => HOUSE_PROPERTIES[houseId] || null,
  
  // 風カードが対象の家を攻撃できるか判定
  // v2.0.0: steal のみ、全ての家タイプを対象にできる
  canTarget: (effectId, houseCardId) => {
    const effect = WIND_EFFECTS[effectId];
    const houseProp = HOUSE_PROPERTIES[houseCardId];
    
    if (!effect || !houseProp) return false;
    
    // v2.0.0: stealは全ての家を対象にできる
    // HOU → 劣化、STL/RUI → 破壊
    if (effectId === 'steal') {
      return houseProp.canBeDegraded || houseProp.canBeDestroyed;
    }
    
    return false;
  },
  
  // 効果がアクションを消費するか
  // v2.0.0: stealのみなので常にtrue
  consumesAction: (effectId) => {
    return true;
  },
  
  // 効果が家を「破壊」するか（劣化ではなく完全破壊）
  // v2.0.0: 対象の家タイプによって異なる
  destroysHouse: (effectId, houseCardId) => {
    if (effectId !== 'steal') return false;
    const houseProp = HOUSE_PROPERTIES[houseCardId];
    // HOU は劣化（破壊ではない）、STL/RUI は破壊
    return houseProp?.canBeDestroyed || false;
  },
  
  // v2.0.0: 効果が家を「劣化」させるか
  degradesHouse: (effectId, houseCardId) => {
    if (effectId !== 'steal') return false;
    const houseProp = HOUSE_PROPERTIES[houseCardId];
    return houseProp?.canBeDegraded || false;
  },
  
  // AI用: 風カードの効果評価
  // v2.0.0: 2段階効果を考慮した評価
  evaluateForAI: (effectId, context) => {
    // context: { targetHouseId, storedCard, myHand, targetHand, strategy }
    const { storedCard, targetHouseId } = context;
    const storedPoints = storedCard?.points || 0;
    const houseProp = HOUSE_PROPERTIES[targetHouseId];
    
    if (effectId !== 'steal') return 0;
    
    if (houseProp?.canBeDestroyed) {
      // 荒屋/屋台: 即破壊＆強奪（高価値）
      return storedPoints * 2;
    } else if (houseProp?.canBeDegraded) {
      // 家: 劣化のみ（情報公開の価値 + 次回破壊可能になる価値）
      return storedPoints * 0.8;
    }
    
    return 0;
  },
};

// v2.0.0: Z高さに応じた影を計算（アニメーション要素共通）
// flyZ: 0=接地, 1=低空, 2=中空, 3=高空
// CSS変数 --shadow-z1/z2/z3 と連動した設計
const calcFlyShadow = (flyZ) => {
  if (flyZ === 0) return '1px 1px 0px rgba(45, 21, 24, 0.15)';  // --shadow-light相当
  if (flyZ === 1) return '2px 2px 2px rgba(45, 21, 24, 0.12)';  // --shadow-z1相当
  if (flyZ === 2) return '4px 4px 4px rgba(45, 21, 24, 0.10)';  // --shadow-z2相当
  if (flyZ >= 3) return '6px 6px 6px rgba(45, 21, 24, 0.08)';   // --shadow-z3相当
  return '1px 1px 0px rgba(45, 21, 24, 0.15)';
};

const CriticAI = {
  // v2.0.0: アクションの期待値を評価（v7.0ルール対応）
  evaluateAction: (action, hand, myHouses, allPlayers, myIdx, strategy = {}) => {
    const characters = hand.filter(c => c.type === 'character');
    const charIds = characters.map(c => c.id);
    const { housePreference = 'house', storeThreshold = 3, attackTarget = 'highValue' } = strategy;
    
    switch (action.type) {
      case 'steal': {
        // v2.0.0: 強奪の評価（2段階効果）
        const stored = action.storedCard;
        const houseType = action.houseCard.id;
        const canSee = action.canSee;  // 中身が見えるか（荒屋/屋台 or 覗見済み）
        
        // 破壊可能（荒屋/屋台）の場合
        if (HOUSE_PROPERTIES[houseType]?.canBeDestroyed) {
          if (charIds.includes(stored.id)) {
            // ペア確定 = 最高評価
            return { score: 100, reason: 'ペア確定（強奪）' };
          }
          let baseScore = 20 + stored.points * 2;
          // attackTarget ボーナス
          if (attackTarget === 'degraded' && houseType === 'RUI') baseScore += 15;
          else if (attackTarget === 'stall' && houseType === 'STL') baseScore += 15;
          else if (attackTarget === 'highValue' && stored.points >= 5) baseScore += 10;
          return { score: baseScore, reason: `強奪（${houseType}から${stored.points}点）` };
        }
        
        // 家(HOU)の場合は劣化のみ
        if (HOUSE_PROPERTIES[houseType]?.canBeDegraded) {
          // 劣化させる価値 = 情報公開 + 次回破壊可能になる
          let baseScore = 10;
          if (canSee) {
            // 中身が見えている場合、高得点ほど価値が高い
            baseScore += stored.points * 0.8;
          } else {
            // 中身不明の場合は一律の期待値
            baseScore += 5;
          }
          return { score: baseScore, reason: `劣化（${houseType}→荒屋）` };
        }
        
        return { score: 0, reason: '対象外' };
      }
      
      case 'stealFromMarket': {
        // v2.0.4: 強奪特例 - 市場から取得の評価
        // 市場の中身はここでは分からないので、高めの評価を付けて実行時に判断
        // ペアが確定できる可能性があるので優先度高
        return { score: 70, reason: '市場から強奪（特例）' };
      }
      
      case 'break': {
        // 家破壊（自分の家から取り出し）の評価
        const stored = action.storedCard;
        if (charIds.includes(stored.id)) {
          // ペア確定 = 最高評価
          return { score: 100, reason: 'ペア確定（取り出し）' };
        }
        // ペアにならない破壊は基本しない
        return { score: -10, reason: 'ペア不成立' };
      }
      
      case 'house': {
        // 家格納の評価
        const char = action.character;
        const houseCard = action.houseCard;
        const houseType = houseCard.id;
        
        // storeThreshold: この点数未満は格納しない
        if (char.points < storeThreshold) {
          return { score: -5, reason: `${char.points}点は閾値${storeThreshold}未満` };
        }
        
        let score = char.points * 3; // 基本点 = カード点数 × 3
        
        // v2.0.0: housePreferenceによるボーナス
        if (housePreference === 'house') {
          if (houseType === 'HOU') score += 10;
          else if (houseType === 'STL') score += 5;
        } else if (housePreference === 'stall') {
          if (houseType === 'STL') score += 10;
          else if (houseType === 'HOU') score += 5;
        } else if (housePreference === 'random') {
          score += Math.random() * 10;
        }
        
        // 魔女/聖母は特別扱い
        if (char.id === 'WIT' || char.id === 'HOL') {
          score += 15; // 危険カードを隠す価値
        }
        
        return { score, reason: `${char.name}(${char.points}点)を${houseCard.name}へ` };
      }
      
      case 'pass': {
        return { score: 0, reason: 'パス' };
      }
      
      default:
        return { score: 0, reason: '不明' };
    }
  },
  
  // v2.0.0: 全選択肢を列挙（v7.0ルール対応）
  enumerateActions: (hand, myHouses, allPlayers, myIdx, phase) => {
    const actions = [];
    const characters = hand.filter(c => c.type === 'character');
    const houseCards = hand.filter(c => c.type === 'house');
    const windCards = hand.filter(c => c.type === 'wind');
    
    // 風カード選択肢（ババ抜きフェーズのみ）
    // v2.0.0: Ghibli（steal）のみ、全ての家タイプを対象にできる
    if (phase === 'babanuki' && windCards.length > 0) {
      const stealCard = windCards.find(w => w.effect === 'steal');
      
      if (stealCard) {
        allPlayers.forEach((p, pIdx) => {
          if (pIdx === myIdx || !p.houses) return;
          p.houses.forEach((house, hIdx) => {
            const stored = house.storedCard;
            if (!stored) return;
            const houseType = house.houseCard.id;
            const houseProp = HOUSE_PROPERTIES[houseType];
            
            // v2.0.0: 劣化可能または破壊可能な家を対象にできる
            if (houseProp && (houseProp.canBeDegraded || houseProp.canBeDestroyed)) {
              const canSee = houseProp.isVisible;  // 荒屋/屋台は中身が見える
              actions.push({
                type: 'steal',
                windCard: stealCard,
                targetPlayer: pIdx,
                targetHouse: hIdx,
                houseCard: house.houseCard,
                storedCard: stored,
                canSee,
                willDegrade: houseProp.canBeDegraded,    // 劣化するか
                willDestroy: houseProp.canBeDestroyed    // 破壊されるか
              });
            }
          });
        });
        
        // v2.0.4: 強奪特例 - 場に家が0枚の場合、市場から取得可能
        // v2.0.7: 条件拡張 - 自分以外のプレイヤーが家を持っていない場合も適用
        const otherPlayersHouses = allPlayers.reduce((sum, p, idx) => {
          if (idx === myIdx) return sum;  // 自分を除外
          return sum + (p.houses?.length || 0);
        }, 0);
        if (otherPlayersHouses === 0) {
          // 市場からの取得アクションを追加（市場は引数として渡せないのでフラグのみ）
          actions.push({
            type: 'stealFromMarket',
            windCard: stealCard
          });
        }
      }
    }
    
    // 家破壊選択肢（自分の家から取り出し）
    // v2.0.0: 荒屋(RUI)も取り出し可能（屋台は公開なので取り出しの意味が薄いが可能）
    if (myHouses && myHouses.length > 0) {
      myHouses.forEach((house, hIdx) => {
        if (!house.storedCard) return;
        actions.push({
          type: 'break',
          houseIdx: hIdx,
          houseCard: house.houseCard,
          storedCard: house.storedCard
        });
      });
    }
    
    // 家格納選択肢
    if (houseCards.length > 0 && characters.length > 0) {
      houseCards.forEach(houseCard => {
        characters.forEach(char => {
          actions.push({
            type: 'house',
            houseCard,
            character: char
          });
        });
      });
    }
    
    // パス（常に選択可能）
    actions.push({ type: 'pass' });
    
    return actions;
  },
  
  // v2.0.0: 最善手を決定（v7.0ルール対応）
  decideBestAction: (hand, myHouses, allPlayers, myIdx, phase, strategy = {}) => {
    const actions = CriticAI.enumerateActions(hand, myHouses, allPlayers, myIdx, phase);
    
    // 各アクションを評価（strategyを渡す）
    const evaluated = actions.map(action => {
      const evaluation = CriticAI.evaluateAction(action, hand, myHouses, allPlayers, myIdx, strategy);
      return { action, ...evaluation };
    });
    
    // スコア順にソート
    evaluated.sort((a, b) => b.score - a.score);
    
    // デバッグログ
    if (evaluated.length > 1) {
      const top3 = evaluated.slice(0, 3).map(e => `${e.action.type}(${e.score}:${e.reason})`).join(', ');
      console.log(`[CriticAI.decideBestAction] P${myIdx} options: ${top3}`);
    }
    
    // v2.0.0: 投機的行動の確率制御（家格納と風カードを別々に）
    const best = evaluated[0];
    if (best.score < 50 && best.action.type !== 'pass') {
      // 確定行動でない場合、確率で実行を見送る
      let speculativeChance = 0.5;
      
      if (best.action.type === 'house') {
        // 家格納の投機的確率
        speculativeChance = (strategy.speculativeHouse !== undefined ? strategy.speculativeHouse : 50) / 100;
      } else if (best.action.type === 'steal') {
        // v2.0.0: 風カード（steal のみ）の投機的確率
        speculativeChance = (strategy.speculativeWind !== undefined ? strategy.speculativeWind : 50) / 100;
      }
      
      if (Math.random() > speculativeChance) {
        // 次善の選択肢（パス）を探す
        const safer = evaluated.find(e => e.action.type === 'pass');
        if (safer) {
          console.log(`[CriticAI.decideBestAction] P${myIdx} skipped speculative ${best.action.type} (chance=${speculativeChance}), chose pass`);
          return safer.action;
        }
      }
    }
    
    return best.action;
  },
  
  // v2.0.0: decidePlaceHouse, decideBreakOwnHouse, decideUseWindは
  // enumerateActions + evaluateAction + decideBestActionに統合されたため削除
};

const createDeck = () => {
  const deck = [];
  Object.entries(CARD_DATA).forEach(([id, card]) => {
    for (let i = 0; i < card.count; i++) {
      deck.push({ id, uid: `${id}_${i}_${Date.now()}_${Math.random()}`, type: card.category === 'house' ? 'house' : card.category === 'wind' ? 'wind' : 'character', category: card.category, name: card.name, points: card.points, emoji: card.emoji, removable: card.removable, effect: card.effect });
    }
  });
  return deck;
};

const shuffleDeck = (deck) => { const s = [...deck]; for (let i = s.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [s[i], s[j]] = [s[j], s[i]]; } return s; };

const findPairs = (hand) => {
  const chars = hand.filter(c => c.type === 'character');
  const witch = chars.find(c => c.id === 'WIT');
  const holy = chars.find(c => c.id === 'HOL');
  if (witch && holy) return [{ cards: [witch, holy], isPurification: true }];
  const counts = {};
  chars.forEach(c => { counts[c.id] = (counts[c.id] || []); counts[c.id].push(c); });
  const pairs = [];
  Object.values(counts).forEach(cards => { if (cards.length >= 2) pairs.push({ cards: [cards[0], cards[1]], isPurification: false }); });
  return pairs;
};

const checkWin = (hand) => hand.filter(c => c.type === 'character').length === 0;
const calculateScore = (hand) => hand.reduce((sum, c) => sum + (c.points || 0), 0);

const UnifiedCard = ({ card, size = 'large', showFront = true, onClick, highlight, hesitationHover, selected, selectableTarget, style = {} }) => {

  const bodyClass = isLarge ? 'card-large-body' : 'card-small-body';

  const canBreak = breakable && personCard;  // v2.0.0: 全ての家から取り出し可能

    <div 
      className={`building-slot building-slot-large ${canBreak ? 'house-breakable' : ''}`} 
      style={{ left, top: 0, zIndex, cursor: canBreak ? 'pointer' : 'default' }}
      onClick={canBreak ? onBreak : null}
    >
      <div className="house-card"><CardFrontLarge card={houseCard} /></div>
      {personCard && <div className="person-card">{isVisible ? <CardFrontLarge card={personCard} /> : <CardBackLarge />}</div>}
      {canBreak && <div className="break-indicator">🔓</div>}
    </div>
  );
};

// 紙吹雪コンポーネント
const ConfettiEffect = ({ show, duration = 3500 }) => {
  const [visible, setVisible] = useState(show);
  const colors = ['#ff0000', '#ff8800', '#ffff00', '#00ff00', '#00ffff', '#0088ff', '#8800ff', '#ff00ff', '#ff69b4', '#ffd700'];
  
  useEffect(() => {
    if (show) {
      setVisible(true);
      const timer = setTimeout(() => setVisible(false), duration);
      return () => clearTimeout(timer);
    }
  }, [show, duration]);
  
  if (!visible) return null;
  
  const pieces = [];
  for (let i = 0; i < 50; i++) {
    const left = Math.random() * 100;
    const delay = Math.random() * 1;
    const size = 6 + Math.random() * 8;
    const color = colors[Math.floor(Math.random() * colors.length)];
    const rotate = Math.random() * 360;
    const shape = Math.random() > 0.5 ? 'circle' : 'square';
    pieces.push(
      <div
        key={i}
        className="confetti-piece"
        style={{
          left: `${left}%`,
          backgroundColor: color,
          width: size,
          height: size,
          borderRadius: shape === 'circle' ? '50%' : '2px',
          animationDelay: `${delay}s`,
          transform: `rotate(${rotate}deg)`
        }}
      />
    );
  }
  
  return <div className="confetti-container">{pieces}</div>;
};
