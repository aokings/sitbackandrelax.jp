            </div>
          </div>
        </div>
      );
    }
    
    // Step 3: 対戦相手選択
    if (menuStep === 'opponent') {
      return (
        <div className="menu-container">
          <div className="menu-overlay">
            <div className="menu-box anim-fade-in">
              <div className="menu-title">🎭 対戦相手を選択</div>
              <div className="menu-subtitle">1〜3人を選んでください（名前を3連打で戦略設定）</div>
          
              <div className="critic-grid">
                {Object.entries(CRITICS).map(([id, c]) => {
                  const isSelected = selectedOpponents.includes(id);
                  const strategy = getAiStrategy(id);
                  const isCustomized = aiIndividualStrategies[id] !== undefined;
                  return (
                    <div 
                      key={id}
                      className={`critic-card ${isSelected ? 'selected' : ''}`}
                      onClick={() => handleAiCardClick(id, isSelected)}
                      style={{ position: 'relative' }}
                    >
                      <div className="critic-emoji">{c.emoji}</div>
                      <div className="critic-name">{c.name}</div>
                      <div className="critic-title">{c.title}</div>
                      {isCustomized && (
                        <div style={{ 
                          position: 'absolute', 
                          top: 2, 
                          right: 2, 
                          fontSize: 8, 
                          background: 'var(--color-gold)', 
                          color: '#fff', 
                          padding: '1px 3px', 
                          borderRadius: 2 
                        }}>⚙️</div>
                      )}
                    </div>
                  );
                })}
              </div>
          
              <div style={{ display: 'flex', gap: 'calc(1 * var(--unit-x))', justifyContent: 'center' }}>
                <button className="menu-button" onClick={() => setMenuStep('player')} style={{ width: 'calc(20 * var(--unit-x))' }}>← 戻る</button>
                <button 
                  className="menu-button primary" 
                  onClick={() => setMenuStep('settings')}
                  disabled={selectedOpponents.length === 0}
                  style={{ width: 'calc(20 * var(--unit-x))', opacity: selectedOpponents.length > 0 ? 1 : 0.5 }}
                >次へ →</button>
              </div>
            </div>
          </div>
          
          {}
          {editingAiId && CRITICS[editingAiId] && (
            <div style={{
              position: 'fixed',
              top: 0,
              left: 0,
              right: 0,
              bottom: 0,
              background: 'rgba(0,0,0,0.7)',
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'center',
              zIndex: 1000
            }} onClick={() => setEditingAiId(null)}>
              <div style={{
                background: 'var(--color-cream)',
                border: '3px solid var(--color-burgundy)',
                padding: 'calc(1.5 * var(--unit-y)) calc(2 * var(--unit-x))',
                minWidth: 300,
                maxWidth: 340,
                maxHeight: '90vh',
                overflowY: 'auto'
              }} onClick={e => e.stopPropagation()}>
                <div style={{ fontSize: 13, fontWeight: 'bold', color: 'var(--color-burgundy)', marginBottom: 4, textAlign: 'center' }}>
                  ⚙️ {CRITICS[editingAiId].emoji} {CRITICS[editingAiId].name}
                </div>
                <div style={{ fontSize: 9, color: 'var(--color-warm-gray)', marginBottom: 12, textAlign: 'center' }}>
                  {CRITICS[editingAiId].title}の戦略設定
                </div>
                
                {/* 1. 家カード選好 - v2.0.0: prison/ruin削除、stall追加 */}
                <div style={{ marginBottom: 10 }}>
                  <div style={{ fontSize: 9, color: 'var(--color-burgundy)', marginBottom: 4, fontWeight: 'bold' }}>🏠 家カード選好</div>
                  <div style={{ display: 'flex', gap: 3, flexWrap: 'wrap' }}>
                    {[
                      { value: 'house', label: '家優先', desc: '非公開' },
                      { value: 'stall', label: '屋台優先', desc: '市場交換' },
                      { value: 'random', label: 'ランダム', desc: '予測不能' }
                    ].map(opt => (
                      <button 
                        key={opt.value}
                        onClick={() => setAiIndividualStrategies(prev => ({
                          ...prev,
                          [editingAiId]: { ...getAiStrategy(editingAiId), housePreference: opt.value }
                        }))}
                        style={{ 
                          padding: '3px 6px', fontSize: 8, border: '1px solid var(--color-burgundy)',
                          background: getAiStrategy(editingAiId).housePreference === opt.value ? 'var(--color-gold)' : '#fff',
                          color: getAiStrategy(editingAiId).housePreference === opt.value ? '#fff' : 'var(--color-burgundy)',
                          cursor: 'pointer', borderRadius: 2
                        }}
                      >{opt.label}</button>
                    ))}
                  </div>
                </div>
                
                {/* 2. 格納点数閾値 */}
                <div style={{ marginBottom: 10 }}>
                  <div style={{ fontSize: 9, color: 'var(--color-burgundy)', marginBottom: 4, fontWeight: 'bold' }}>📊 格納点数閾値（何点以上を格納）</div>
                  <div style={{ display: 'flex', gap: 3 }}>
                    {[1, 2, 3, 4, 5].map(v => (
                      <button 
                        key={v}
                        onClick={() => setAiIndividualStrategies(prev => ({
                          ...prev,
                          [editingAiId]: { ...getAiStrategy(editingAiId), storeThreshold: v }
                        }))}
                        style={{ 
                          padding: '3px 8px', fontSize: 9, border: '1px solid var(--color-burgundy)',
                          background: getAiStrategy(editingAiId).storeThreshold === v ? 'var(--color-gold)' : '#fff',
                          color: getAiStrategy(editingAiId).storeThreshold === v ? '#fff' : 'var(--color-burgundy)',
                          cursor: 'pointer', borderRadius: 2
                        }}
                      >{v}点+</button>
                    ))}
                  </div>
                </div>
                
                {/* 3. v2.0.0: 攻撃対象選好（windPreference → attackTarget） */}
                <div style={{ marginBottom: 10 }}>
                  <div style={{ fontSize: 9, color: 'var(--color-burgundy)', marginBottom: 4, fontWeight: 'bold' }}>🌀 攻撃対象選好</div>
                  <div style={{ display: 'flex', gap: 3, flexWrap: 'wrap' }}>
                    {[
                      { value: 'highValue', label: '高得点', desc: '効率重視' },
                      { value: 'degraded', label: '荒屋', desc: '即強奪' },
                      { value: 'stall', label: '屋台', desc: '即強奪' },
                      { value: 'random', label: 'ランダム', desc: '予測不能' }
                    ].map(opt => (
                      <button 
                        key={opt.value}
                        onClick={() => setAiIndividualStrategies(prev => ({
                          ...prev,
                          [editingAiId]: { ...getAiStrategy(editingAiId), attackTarget: opt.value }
                        }))}
                        style={{ 
                          padding: '3px 6px', fontSize: 8, border: '1px solid var(--color-burgundy)',
                          background: getAiStrategy(editingAiId).attackTarget === opt.value ? 'var(--color-gold)' : '#fff',
                          color: getAiStrategy(editingAiId).attackTarget === opt.value ? '#fff' : 'var(--color-burgundy)',
                          cursor: 'pointer', borderRadius: 2
                        }}
                      >{opt.label}</button>
                    ))}
                  </div>
                </div>
                
                {/* 4. 投機的家格納 */}
                <div style={{ marginBottom: 10 }}>
                  <div style={{ fontSize: 9, color: 'var(--color-burgundy)', marginBottom: 4, fontWeight: 'bold' }}>🎲 投機的家格納</div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                    <input 
                      type="range" min="0" max="100" 
                      value={getAiStrategy(editingAiId).speculativeHouse} 
                      onChange={(e) => setAiIndividualStrategies(prev => ({
                        ...prev,
                        [editingAiId]: { ...getAiStrategy(editingAiId), speculativeHouse: parseInt(e.target.value) }
                      }))} 
                      style={{ flex: 1, accentColor: 'var(--color-gold)' }} 
                    />
                    <span style={{ fontSize: 10, color: 'var(--color-burgundy)', minWidth: 35 }}>{getAiStrategy(editingAiId).speculativeHouse}%</span>
                  </div>
                  <div style={{ display: 'flex', gap: 2, marginTop: 3 }}>
                    {[0, 25, 50, 75, 100].map(v => (
                      <button key={v} onClick={() => setAiIndividualStrategies(prev => ({
                        ...prev, [editingAiId]: { ...getAiStrategy(editingAiId), speculativeHouse: v }
                      }))} style={{ 
                        padding: '1px 4px', fontSize: 7, border: '1px solid var(--color-burgundy)',
                        background: getAiStrategy(editingAiId).speculativeHouse === v ? 'var(--color-gold)' : '#fff',
                        color: getAiStrategy(editingAiId).speculativeHouse === v ? '#fff' : 'var(--color-burgundy)',
                        cursor: 'pointer', borderRadius: 2
                      }}>{v}%</button>
                    ))}
                  </div>
                </div>
                
                {/* 5. 投機的風カード */}
                <div style={{ marginBottom: 12 }}>
                  <div style={{ fontSize: 9, color: 'var(--color-burgundy)', marginBottom: 4, fontWeight: 'bold' }}>🌀 投機的風カード</div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                    <input 
                      type="range" min="0" max="100" 
                      value={getAiStrategy(editingAiId).speculativeWind} 
                      onChange={(e) => setAiIndividualStrategies(prev => ({
                        ...prev,
                        [editingAiId]: { ...getAiStrategy(editingAiId), speculativeWind: parseInt(e.target.value) }
                      }))} 
                      style={{ flex: 1, accentColor: 'var(--color-gold)' }} 
                    />
                    <span style={{ fontSize: 10, color: 'var(--color-burgundy)', minWidth: 35 }}>{getAiStrategy(editingAiId).speculativeWind}%</span>
                  </div>
                  <div style={{ display: 'flex', gap: 2, marginTop: 3 }}>
                    {[0, 25, 50, 75, 100].map(v => (
                      <button key={v} onClick={() => setAiIndividualStrategies(prev => ({
                        ...prev, [editingAiId]: { ...getAiStrategy(editingAiId), speculativeWind: v }
                      }))} style={{ 
                        padding: '1px 4px', fontSize: 7, border: '1px solid var(--color-burgundy)',
                        background: getAiStrategy(editingAiId).speculativeWind === v ? 'var(--color-gold)' : '#fff',
                        color: getAiStrategy(editingAiId).speculativeWind === v ? '#fff' : 'var(--color-burgundy)',
                        cursor: 'pointer', borderRadius: 2
                      }}>{v}%</button>
                    ))}
                  </div>
                </div>
                
                {/* ボタン */}
                <div style={{ display: 'flex', gap: 8, justifyContent: 'center' }}>
                  <button 
                    className="menu-button"
                    onClick={() => {
                      setAiIndividualStrategies(prev => {
                        const newStrategies = { ...prev };
                        delete newStrategies[editingAiId];
                        return newStrategies;
                      });
                    }}
                    style={{ padding: '4px 12px', fontSize: 10 }}
                  >リセット</button>
                  <button 
                    className="menu-button primary"
                    onClick={() => setEditingAiId(null)}
                    style={{ padding: '4px 12px', fontSize: 10 }}
                  >閉じる</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }
    
    // Step 4: セット設定
    // N人×1ゲーム=1セット方式
    const numPlayersForSet = selectedOpponents.length + 1; // 人間+AI
    return (
      <div className="menu-container">
        <div className="menu-overlay">
          <div className="menu-box anim-fade-in">
            <div className="menu-title">🏆 セット設定</div>
            <div className="menu-subtitle">何セット勝負しますか？（1セット={numPlayersForSet}ゲーム）</div>
          
            <div style={{ marginBottom: 'calc(2 * var(--unit-y))' }}>
              <div style={{ display: 'flex', gap: 'calc(1 * var(--unit-x))', justifyContent: 'center', flexWrap: 'wrap' }}>
                {[1, 3, 5, 0].map(sets => (
                  <button 
                    key={sets}
                    className="menu-button"
                    onClick={() => setSetConfig(prev => ({ 
                      ...prev, 
                      totalSets: sets, 
                      gamesPerSet: numPlayersForSet,
                      currentSet: 1,
                      currentGame: 0,
                      setFirstPlayer: -1
                    }))}
                    style={{
                      width: 'calc(12 * var(--unit-x))',
                      padding: '7px 8px',
                      background: setConfig.totalSets === sets ? 'var(--color-gold)' : '#fff',
                      color: setConfig.totalSets === sets ? '#fff' : 'var(--color-burgundy)',
                      borderColor: setConfig.totalSets === sets ? 'var(--color-gold)' : 'var(--color-burgundy)'
                    }}
                  >
                    {sets === 0 ? '無制限' : `${sets}セット`}
                  </button>
                ))}
              </div>
            </div>
            
            {/* 対戦プレビュー */}
            <div style={{ marginBottom: 'calc(2 * var(--unit-y))', padding: 'calc(1 * var(--unit-y)) calc(2 * var(--unit-x))', background: 'var(--color-cream)', border: '1px solid var(--color-dusty-pink)' }}>
              <div style={{ fontSize: 10, color: 'var(--color-warm-gray)', marginBottom: 8 }}>対戦メンバー</div>
              <div style={{ display: 'flex', gap: 'calc(1 * var(--unit-x))', justifyContent: 'center', flexWrap: 'wrap' }}>
                <span style={{ fontSize: 11, fontWeight: 'bold', color: 'var(--color-gold)' }}>👤 {playerName}</span>
                <span style={{ fontSize: 11, color: 'var(--color-warm-gray)' }}>vs</span>
                {selectedOpponents.map(id => (
                  <span key={id} style={{ fontSize: 11 }}>{CRITICS[id]?.emoji} {CRITICS[id]?.name}</span>
                ))}
              </div>
            </div>
          
            <div style={{ display: 'flex', gap: 'calc(1 * var(--unit-x))', justifyContent: 'center' }}>
              <button className="menu-button" onClick={() => setMenuStep('opponent')} style={{ width: 'calc(20 * var(--unit-x))' }}>← 戻る</button>
              <button 
                className="menu-button primary" 
                onClick={startGame}
                style={{ width: 'calc(20 * var(--unit-x))' }}
              >🎮 ゲーム開始</button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // セット終了判定（N人×1ゲーム=1セット、累積スコアで勝敗判定）
  const isSetComplete = setConfig.totalSets > 0 && setConfig.currentGame >= setConfig.gamesPerSet;
  const setWinner = (() => {
    if (!isSetComplete) return -1;
    // 累積スコアで勝者判定
    const maxScore = Math.max(...cumulativeScores);
    const topPlayers = cumulativeScores.map((s, i) => ({ idx: i, score: s, wins: winCount[i] || 0 }))
      .filter(p => p.score === maxScore);
    if (topPlayers.length === 1) return topPlayers[0].idx;
    // 同点時は勝利数で判定
    const maxWins = Math.max(...topPlayers.map(p => p.wins));
    return topPlayers.find(p => p.wins === maxWins)?.idx ?? topPlayers[0].idx;
  })();
  const isSetOver = setWinner >= 0;

  if (gameState === 'gameOver') {
    const winnerIdx = winCount.indexOf(Math.max(...winCount));
    const winRate = statistics.gamesPlayed > 0 ? Math.round((statistics.gamesWon / statistics.gamesPlayed) * 100) : 0;
    
    // セット終了時はmatchOver画面へ
    if (isSetOver && !autoPlayMode) {
      return (
        <div className="menu-container">
          <div className="menu-overlay">
            <div className="menu-box anim-fade-in" style={{ padding: 'calc(2 * var(--unit-y)) calc(3 * var(--unit-x))' }}>
              <div style={{ fontSize: 36, marginBottom: 'calc(0.5 * var(--unit-y))' }} className="anim-win">🏆</div>
              <div className="menu-title" style={{ fontSize: 20, marginBottom: 'calc(0.5 * var(--unit-y))' }} onClick={handleTitleClick}>セット終了！</div>
              <div style={{ fontSize: 13, fontWeight: 'bold', color: setWinner === 0 ? 'var(--color-gold)' : 'var(--color-charcoal)' }}>
                {players[setWinner]?.emoji || '👤'} {players[setWinner]?.name || 'プレイヤー'}の勝利！
              </div>
              <div style={{ fontSize: 10, color: 'var(--color-warm-gray)', marginBottom: 'calc(1 * var(--unit-y))' }}>
                セット{setConfig.currentSet}（{setConfig.gamesPerSet}ゲーム）完了
              </div>
            
              {/* 勝敗・スコア表（コンパクト） */}
              <div style={{ background: 'var(--color-cream)', padding: 'calc(0.5 * var(--unit-y)) calc(1 * var(--unit-x))', marginBottom: 'calc(0.5 * var(--unit-y))', border: '1px solid var(--color-dusty-pink)' }}>
                <div style={{ fontSize: 9, color: 'var(--color-warm-gray)', marginBottom: '4px', textAlign: 'center' }}>セット結果（{setConfig.gamesPerSet}ゲーム）- 累積スコア順</div>
                {players.map((p, i) => (
                  <div key={i} style={{ 
                    display: 'flex', 
                    justifyContent: 'space-between', 
                    padding: '2px 0', 
                    fontSize: 10,
                    fontWeight: i === setWinner ? 'bold' : 'normal',
                    color: i === setWinner ? 'var(--color-gold)' : 'var(--color-charcoal)',
                    borderBottom: i < players.length - 1 ? '1px solid var(--color-dusty-pink)' : 'none'
                  }}>
                    <span>{p.emoji || '👤'} {p.name}</span>
                    <span style={{ display: 'flex', gap: 'calc(1 * var(--unit-x))' }}>
                      <span>{winCount[i]}勝</span>
                      <span style={{ color: cumulativeScores[i] >= 0 ? 'var(--color-gold)' : 'var(--color-burgundy)' }}>
                        {cumulativeScores[i] >= 0 ? '+' : ''}{cumulativeScores[i]}点
                      </span>
                    </span>
                  </div>
                ))}
              </div>
            
              {/* 統計（1行に集約） */}
              <div style={{ fontSize: 9, color: 'var(--color-warm-gray)', marginBottom: 'calc(1 * var(--unit-y))', textAlign: 'center' }}>
                📊 累計: {statistics.setsPlayed}セット({statistics.setsWon}勝) / {statistics.gamesPlayed}ゲーム({statistics.gamesWon}勝, {winRate}%)
              </div>
            
              <button className="menu-button primary" onClick={() => { 
                setCumulativeScores([0,0,0,0]); 
                setWinCount([0,0,0,0]); 
                setGameNumber(1);
                // setConfigをリセット（次のセット、先手ランダム）
                setSetConfig(prev => ({
                  ...prev,
                  currentSet: prev.currentSet + 1,
                  currentGame: 0,
                  setFirstPlayer: -1  // 次のセット開始時にランダム決定
                }));
                setFirstPlayerIndex(0);
                startGame(); 
              }}>🔄 新しいセット</button>
              <button className="menu-button" onClick={() => { 
                setEffect(null); 
                setCumulativeScores([0,0,0,0]); 
                setWinCount([0,0,0,0]); 
                setGameNumber(1);
                // setConfigを完全リセット
                setSetConfig(prev => ({
                  ...prev,
                  currentSet: 1,
                  currentGame: 0,
                  setFirstPlayer: -1
                }));
                setFirstPlayerIndex(0); 
                setMenuStep('title');
                setGameState('menu'); 
              }}>メニューへ</button>
              {showDebugOptions && <button className="menu-button" onClick={() => GameLogger.downloadLogs()} style={{ marginTop: '4px' }}>📥 ログ</button>}
              {showDebugOptions && <button className="menu-button" onClick={() => NotationLogger.download()} style={{ marginTop: '4px' }}>📜 記法</button>}
            </div>
          </div>
        </div>
      );
    }
    
    // 通常のゲーム終了画面
    // lastWinnerIdxを使用（今回のゲームの勝者）
    const getWinConditionText = () => {
      if (lastWinCondition === 'draw') return '⚖️ 膠着状態（引き分け）';
      if (lastWinCondition === 'purification') return '✨ 世界の浄化 ✨';
      if (lastWinCondition === 'stalemate') return '⚖️ 膠着状態（判定勝ち）';
      return '🎊 手札0枚であがり';
    };
    const getWinConditionEmoji = () => {
      if (lastWinCondition === 'draw') return '🤝';
      if (lastWinCondition === 'purification') return '✨';
      if (lastWinCondition === 'stalemate') return '⚖️';
      return '🎊';
    };
    
    return (
      <div className="menu-container">
        <div className="menu-overlay">
          <div className="menu-box anim-slide-up" style={{ padding: 'calc(2 * var(--unit-y)) calc(3 * var(--unit-x))' }}>
            <div style={{ fontSize: 36, marginBottom: 'calc(0.5 * var(--unit-y))' }}>{getWinConditionEmoji()}</div>
            <div className="menu-title" style={{ fontSize: 20, marginBottom: 'calc(0.5 * var(--unit-y))' }} onClick={handleTitleClick}>ゲーム{gameNumber}終了</div>
            <div style={{ fontSize: 13, marginBottom: 'calc(0.25 * var(--unit-y))', fontWeight: 'bold', color: lastWinnerIdx === 0 ? 'var(--color-gold)' : 'var(--color-charcoal)' }}>{players[lastWinnerIdx]?.name || 'プレイヤー'}の勝利！</div>
            {}
            <div style={{ fontSize: 11, marginBottom: 'calc(0.5 * var(--unit-y))', color: lastWinCondition === 'purification' ? 'var(--color-special)' : 'var(--color-warm-gray)' }}>{getWinConditionText()}</div>
          
            {/* v2.0.3: セット進捗（N人×1ゲーム=1セット方式） */}
            {setConfig.totalSets > 0 && (
              <div style={{ fontSize: 10, color: 'var(--color-warm-gray)', marginBottom: 'calc(0.5 * var(--unit-y))' }}>
                🏆 セット{setConfig.currentSet}（{setConfig.currentGame}/{setConfig.gamesPerSet}ゲーム）
              </div>
            )}
          
            {/* スコア表（コンパクト） */}
            <div style={{ background: 'var(--color-cream)', padding: 'calc(0.5 * var(--unit-y)) calc(1 * var(--unit-x))', marginBottom: 'calc(0.5 * var(--unit-y))', border: '1px solid var(--color-dusty-pink)' }}>
              {players.map((p, i) => (
                <div key={i} style={{ display: 'flex', justifyContent: 'space-between', padding: '2px 0', fontSize: 10, fontWeight: i === lastWinnerIdx ? 'bold' : 'normal', color: i === lastWinnerIdx ? 'var(--color-gold)' : 'var(--color-charcoal)' }}>
                  <span>{p.emoji || '👤'} {p.name}</span>
                  <span style={{ color: cumulativeScores[i] >= 0 ? 'var(--color-gold)' : 'var(--color-burgundy)' }}>{cumulativeScores[i] >= 0 ? '+' : ''}{cumulativeScores[i]}点</span>
                </div>
              ))}
            </div>
            
            {/* 統計（1行に集約） */}
            <div style={{ fontSize: 9, color: 'var(--color-warm-gray)', marginBottom: 'calc(1 * var(--unit-y))', textAlign: 'center' }}>
              📊 {statistics.gamesPlayed}戦 {statistics.gamesWon}勝({winRate}%) / 浄化{statistics.gamesWonByPurification}回
            </div>
            
            {showDebugOptions && <div style={{ marginBottom: '4px', fontSize: 9, color: 'var(--color-warm-gray)' }}>オート: {autoPlayCount}/{maxAutoPlayGames}</div>}
            <button className="menu-button primary" onClick={() => { setGameNumber(prev => prev + 1); startGame(); }}>次のゲーム</button>
            <button className="menu-button" onClick={() => { 
              setEffect(null); 
              setCumulativeScores([0,0,0,0]); 
              setWinCount([0,0,0,0]); 
              setGameNumber(1);
              // setConfigを完全リセット
              setSetConfig(prev => ({
                ...prev,
                currentSet: 1,
                currentGame: 0,
                setFirstPlayer: -1
              }));
              setFirstPlayerIndex(0); 
              setMenuStep('title'); 
              setGameState('menu'); 
            }}>メニューへ</button>
            {showDebugOptions && <button className="menu-button" onClick={() => GameLogger.downloadLogs()} style={{ marginTop: '4px' }}>📥 ログ</button>}
            {showDebugOptions && <button className="menu-button" onClick={() => NotationLogger.download()} style={{ marginTop: '4px' }}>📜 記法</button>}
          </div>
        </div>
      </div>
    );
  }

  const player = players[0];
  const opponents = players.slice(1);
  const isMyTurn = currentPlayerIndex === 0;
  // v2.0.7: 配札中はcanDraw=false
  const canDraw = isMyTurn && !hasDrawn && !isProcessing && !gameEnded && !autoPlayMode && dealingPhase === 'ready';
  // v2.0.7: 市場選択モード中はターン終了不可
  const canEndTurn = isMyTurn && hasDrawn && !isProcessing && !gameEnded && !autoPlayMode && !windTargetMode && !marketSelectMode;
  const isSelectableTarget = (card) => actionMode === 'house' && selectedCard?.type === 'house' && card.type === 'character';
  
  // 風カードターゲット判定（WindEffectEngine使用）
  const isWindTargetable = (houseCardId) => {
    if (!selectedWindCard || !windTargetMode) return false;
    return WindEffectEngine.canTarget(selectedWindCard.effect, houseCardId);
  };

  return (
    <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: '#f5f5f5', padding: 20, border: 'none', outline: 'none' }}>
      <div className="game-board" ref={gameBoardRef}>
        {}
        {showConfetti && <ConfettiEffect show={showConfetti} />}
        {showScreenFlash && <div className="screen-flash" />}
        <PurificationOverlay show={showPurificationOverlay} />
        <PhaseOverlay 
          show={showPhaseOverlay} 
          title={phaseOverlayText.title} 
          subtitle={phaseOverlayText.subtitle} 
          onClose={() => setShowPhaseOverlay(false)} 
        />
        
        {}
        {showGameStartOverlay && (
          <div className="game-start-overlay">
            <div className="game-start-box">
              <div className="game-start-title">🎮 ゲーム{gameNumber}開始</div>
              <div style={{ fontSize: 11, color: 'var(--color-warm-gray)', marginTop: 'calc(0.5 * var(--unit-y))' }}>配札中...</div>
            </div>
          </div>
        )}
        
        {}
        <FlyingCardDisplay flyingCard={flyingCard} deckPos={getDeckPosition()} />
        
        {}
        <HouseExitDisplay houseExitAnimation={houseExitAnimation} />
        
        {}
        <PairAnimationDisplay pairAnimation={pairAnimation} getCardPosition={getPlayerCardPosition} />
        
        {}
        <DangerCardInHandDisplay dangerCardInHand={dangerCardInHand} getCardPosition={getPlayerCardPosition} />
        
        {}
        <PurificationPairOverlay show={showPurificationPair} onClose={() => setShowPurificationPair(false)} />
        <VictoryOverlay victoryAnimation={victoryAnimation} />
        
        <EffectOverlay effect={effect} onClose={() => setEffect(null)} autoPlayMode={autoPlayMode} />
        {actionMode === 'house' && selectedCard && !autoPlayMode && <div className="action-hint">🏠 {selectedCard.name}を選択中 → 入れたい人物カードをクリック</div>}
        {/* v2.0.0: 市場選択モード中のヒント */}
        {marketSelectMode && !autoPlayMode && <div className="action-hint" style={{ background: 'linear-gradient(135deg, #fff8e1 0%, #ffecb3 100%)', borderColor: 'var(--color-gold)' }}>🛖 屋台配置中 → 市場から欲しいカードをクリック</div>}
        {windTargetMode && selectedWindCard && !autoPlayMode && (
          <>
            <div className="action-hint">💨 {selectedWindCard.name}を選択中 → 対象の家をクリック</div>
            <div className="wind-cancel-btn" onClick={handleCancelWind}>❌ キャンセル</div>
          </>
        )}
        {/* v2.0.4: 強奪特例（市場ターゲット）のヒント */}
        {windMarketTargetMode && selectedWindCard && !autoPlayMode && (
          <>
            <div className="action-hint" style={{ background: 'linear-gradient(135deg, #ffe0e0 0%, #ffcccc 100%)' }}>🌀 強奪特例 → 市場から欲しいカードをクリック</div>
            <div className="wind-cancel-btn" onClick={handleCancelWind}>❌ キャンセル</div>
          </>
        )}
        <div className="game-header">
          <div style={{ display: 'flex' }}>
            <div className="header-left" onClick={handleTitleClick}>House & Wind {VERSION.string}</div>
            {/* v2.0.3: ゲーム番号・セット進捗表示（新セット制対応） */}
            {setConfig.totalSets > 0 && !autoPlayMode && (
              <div style={{ height: UNIT.toPixelY(LAYOUT.header.h), border: '1px solid #ff9800', borderLeft: 'none', display: 'flex', alignItems: 'center', fontSize: 10, background: '#fff8e1', padding: '0 8px' }}>
                🏆S{setConfig.currentSet} G{setConfig.currentGame}/{setConfig.gamesPerSet} [{winCount.map((w,i) => `${players[i]?.emoji||'?'}${w}`).join('/')}]
              </div>
            )}
            {setConfig.totalSets === 0 && !autoPlayMode && (
              <div style={{ height: UNIT.toPixelY(LAYOUT.header.h), border: '1px solid #ccc', borderLeft: 'none', display: 'flex', alignItems: 'center', fontSize: 10, background: '#f5f5f5', padding: '0 8px' }}>
                G{gameNumber}
              </div>
            )}
            {showQuickMenu && (
              <>
                <div className="header-end-btn" onClick={handleForceEnd}>🚪 終了</div>
                <div className="header-end-btn" style={{ background: '#2196F3' }} onClick={() => { 
                  GameLogger.downloadLogs();
                }}>📥 ログ</div>
                <div className="header-end-btn" style={{ background: '#9C27B0' }} onClick={() => { 
                  NotationLogger.download();
                }}>📜 記法</div>
              </>
            )}
            {autoPlayMode && !tournamentMode && <div className="header-stop-btn" onClick={handleStopAutoPlay}>🛑 停止 ({autoPlayCount}/{maxAutoPlayGames})</div>}
            {autoPlayMode && tournamentMode && <div className="header-stop-btn" onClick={() => { setAutoPlayMode(false); addLog(`トーナメント中断: ${tournamentProgress.current}/${tournamentProgress.total}ゲーム`, 'system'); }}>🛑 中断 ({tournamentProgress.current}/{tournamentProgress.total})</div>}
            {!autoPlayMode && !tournamentMode && autoPlayCount > 0 && autoPlayCount < maxAutoPlayGames && <div className="header-stop-btn" onClick={handleResumeAutoPlay} style={{ background: 'var(--color-house)' }}>▶️ 再開 ({autoPlayCount}/{maxAutoPlayGames})</div>}
            {!autoPlayMode && tournamentMode && tournamentProgress.current < tournamentProgress.total && <div className="header-stop-btn" onClick={handleResumeTournament} style={{ background: 'var(--color-house)' }}>▶️ 再開 ({tournamentProgress.current}/{tournamentProgress.total})</div>}
          </div>
          <div className="header-right">{autoPlayMode ? 'オート中...' : (isMyTurn ? 'あなたのターン' : `${players[currentPlayerIndex]?.name || 'AI'}...`)}</div>
        </div>
        <div className="zone-a">
          {opponents.map((opp) => (
            <div key={opp.id} className="player-block">
              <div className={`nameplate ${currentPlayerIndex === opp.id ? 'active' : ''}`}>{opp.emoji} {opp.name} | <span style={{color: cumulativeScores[opp.id] >= 0 ? 'var(--color-house)' : 'var(--color-burgundy)'}}>{cumulativeScores[opp.id] >= 0 ? '+' : ''}{cumulativeScores[opp.id]}</span> | 🃏{opp.hand.length}</div>
              <div className="opp-hand-area" ref={el => playerHandRefs.current[opp.id] = el}>{opp.hand.map((c, i) => {
                const pitch = calcCardPitch(opp.hand.length, LAYOUT.handArea.opp, LAYOUT.cardSmall.w, LAYOUT.minGap);
                // ペア演出中は対象カードを非表示
                const isInPairAnimation = pairAnimation && 
                  pairAnimation.playerIdx === opp.id &&
                  (c.uid === pairAnimation.pairCard?.uid || c.uid === pairAnimation.drawnCard?.uid);
                if (isInPairAnimation) return null;
                // DrawRuleEngineでクリック可能判定
                const isValidTarget = DrawRuleEngine.isClickable(0, opp.id, players);
                const requiredIdx = DrawRuleEngine.getRequiredCardIndex(opp.hand);
                const isClickableCard = requiredIdx === -1 || requiredIdx === i;
                const canDrawFromThis = phase === PHASES.BABANUKI && canDraw && isValidTarget && isClickableCard;
                // v2.0.9: 迷い箸演出でホバー中かどうか
                const isHesitating = hesitationState?.highlightedCards?.some(h => h.playerIdx === opp.id && h.cardIdx === i);
                return <CardBackSmall key={c.uid} highlight={canDrawFromThis} hesitationHover={isHesitating} onClick={canDrawFromThis ? () => handleDrawFromPlayer(opp.id, i) : null} style={{ position: 'absolute', left: i * pitch, top: UNIT.Y, zIndex: i }} />;
              })}</div>
              <div className="opp-field-area" ref={el => playerHouseRefs.current[opp.id] = el}>
                {opp.houses.map((h, hIdx) => {
                  const targetable = windTargetMode && isWindTargetable(h.houseCard.id);
                  const disabled = windTargetMode && !targetable;
                  // v2.0.0: peekInfo 削除（覗見カード廃止）
                  // アニメーション中の家は非表示
                  const isExiting = houseExitAnimation && houseExitAnimation.playerIdx === opp.id && houseExitAnimation.houseIdx === hIdx;
                  // v2.0.7: flyingCardがこの家から出発している場合も非表示
                  const isSourceOfFlying = flyingCard && flyingCard.sourcePlayerIdx === opp.id && flyingCard.sourceHouseIdx === hIdx;
                  if (isExiting || isSourceOfFlying) return <div key={hIdx} className="building-slot building-slot-small" style={{ left: hIdx * UNIT.toPixelX(LAYOUT.houseBlockGap.small), opacity: 0 }} />;
                  // v2.0.7: 劣化反転アニメーション
                  const isDegrading = degradeFlipAnimation && degradeFlipAnimation.playerIdx === opp.id && degradeFlipAnimation.houseIdx === hIdx;
                  return (
                    <HouseBlockSmall 
                      key={hIdx} 
                      houseCard={h.houseCard} 
                      personCard={h.storedCard} 
                      left={hIdx * UNIT.toPixelX(LAYOUT.houseBlockGap.small)} 
                      zIndex={hIdx}
                      targetable={targetable}
                      disabled={disabled}
                      onTarget={() => handleWindCardUse(opp.id, hIdx)}
                      degradeFlip={isDegrading ? degradeFlipAnimation.flipped : undefined}
                    />
                  );
                })}
              </div>
            </div>
          ))}
          {[...Array(3 - opponents.length)].map((_, i) => <div key={`e-${i}`} className="player-block" style={{ opacity: 0.3 }}><div className="nameplate">空席</div></div>)}
        </div>
        <div className="zone-middle">
          <div className="self-field-area">
            <div className="self-nameplate">❤️ {playerName} | <span style={{color: cumulativeScores[0] >= 0 ? 'var(--color-house)' : 'var(--color-burgundy)'}}>{cumulativeScores[0] >= 0 ? '+' : ''}{cumulativeScores[0]}</span> | 🃏{player?.hand.length || 0}</div>
            <div className="self-building-area" ref={el => playerHouseRefs.current[0] = el}>{player?.houses.map((h, i) => {
              // アニメーション中の家は非表示（元のカードが消えて動くように見せる）
              const isExiting = houseExitAnimation && houseExitAnimation.playerIdx === 0 && houseExitAnimation.houseIdx === i;
              // v2.0.7: flyingCardがこの家から出発している場合も非表示
              const isSourceOfFlying = flyingCard && flyingCard.sourcePlayerIdx === 0 && flyingCard.sourceHouseIdx === i;
              if (isExiting || isSourceOfFlying) return <div key={i} className="building-slot building-slot-large" style={{ left: i * UNIT.toPixelX(LAYOUT.houseBlockGap.large), top: 0, opacity: 0 }} />;
              return <HouseBlockLarge key={i} houseCard={h.houseCard} personCard={h.storedCard} left={i * UNIT.toPixelX(LAYOUT.houseBlockGap.large)} zIndex={i} breakable={isMyTurn && hasDrawn && !hasActioned && !isProcessing && !windTargetMode} onBreak={() => handleBreakOwnHouse(i)} />;
            })}</div>
          </div>
          <div className="deck-area">
            <div className="deck-label">{phase === PHASES.EXPLORATION ? '探索フェーズ' : 'ババ抜きフェーズ'}</div>
            <div className="deck-cards" ref={deckCardsRef}>
              {deck.length > 2 && <CardBackLarge style={{ position: 'absolute', left: UNIT.X * 2, top: UNIT.Y * 2 }} />}
              {deck.length > 1 && <CardBackLarge style={{ position: 'absolute', left: UNIT.X, top: UNIT.Y }} />}
              {deck.length > 0 && <CardBackLarge style={{ position: 'absolute', left: 0, top: 0 }} />}
              {deck.length === 0 && <div style={{ width: UNIT.toPixelX(LAYOUT.cardLarge.w), height: UNIT.toPixelY(LAYOUT.cardLarge.h), border: '2px dashed var(--color-dusty-pink)', borderRadius: 5, display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--color-warm-gray)', fontSize: 12 }}>空</div>}
            </div>
            <div className="deck-count">残り{deck.length}枚</div>
          </div>
          <div className="zone-b-right">
            <div className="zone-b-right-top">
              <div className="game-info-area">
                <div className="game-info-header">ゲーム #{gameNumber} 　 ターン: {turn}</div>
                <div style={{ fontSize: 9, color: 'var(--color-warm-gray)', marginTop: 2 }}>🏚️ 荒屋ストック: {ruinPile.length}</div>
              </div>
              {/* v2.0.0: 市場表示（表向き公開・burnサイズ） */}
              <div className="market-area">
                <div className={`market-label ${windMarketTargetMode ? 'market-special' : ''}`}>
                  {windMarketTargetMode ? '🌀 強奪特例発動中！' : '🏪 市場'}
                  {marketSelectMode && <span style={{ color: 'var(--color-gold)', fontSize: 10 }}> ← クリックで選択</span>}
                </div>
                <div className="market-cards" ref={marketCardsRef}>
                  {market.map((card, i) => (
                    <div 
                      key={card.uid || i} 
                      className={`market-card-slot ${marketSelectMode ? 'market-selectable' : ''} ${windMarketTargetMode ? 'market-selectable wind-target' : ''}`}
                      onClick={marketSelectMode ? () => handleMarketExchange(card) : (windMarketTargetMode ? () => handleWindMarketUse(card) : undefined)}
                      style={{ cursor: (marketSelectMode || windMarketTargetMode) ? 'pointer' : 'default' }}
                    >
                      <CardFrontBurn card={card} />
                    </div>
                  ))}
                </div>
              </div>
            </div>
            <div className="log-area"><div className="log-box" ref={logBoxRef}>{log.map((e, i) => <div key={i} className={`log-entry ${e.type}`}>{e.message}</div>)}</div></div>
          </div>
        </div>
        <div className="zone-c">
          <div className="self-hand-area">
            <div className="self-hand-cards" ref={el => playerHandRefs.current[0] = el}>{player?.hand.map((c, i) => {
              const pitch = calcCardPitch(player.hand.length, LAYOUT.handArea.self, LAYOUT.cardLarge.w, LAYOUT.minGap);
              // ペア演出中は対象カードを非表示
              const isInPairAnimation = pairAnimation && 
                pairAnimation.playerIdx === 0 &&
                (c.uid === pairAnimation.pairCard?.uid || c.uid === pairAnimation.drawnCard?.uid);
              if (isInPairAnimation) return null;
              // 魔女/聖母演出中は対象カードを非表示
              const isInDangerAnimation = dangerCardInHand && 
                dangerCardInHand.cardIndex === i;
              if (isInDangerAnimation) return null;
              // v2.0.7: 風カード浮上演出中は特別スタイル
              const isWindFloating = windCardFloating && windCardFloating.cardIdx === i;
              if (isWindFloating) {
                const windFloatingClass = `wind-card-floating ${windCardFloating.phase === 'hovering' ? 'hovering' : ''}`;
                return (
                  <div key={c.uid} className={windFloatingClass} style={{ position: 'absolute', left: i * pitch, top: UNIT.Y, zIndex: 100 }}>
                    <CardFrontLarge card={c} selected={true} onClick={() => handleCardClick(c)} />
                  </div>
                );
              }
              // v2.0.9: 迷い箸演出でホバー中かどうか
              const isHesitating = hesitationState?.highlightedCards?.some(h => h.playerIdx === 0 && h.cardIdx === i);
              return <CardFrontLarge key={c.uid} card={c} selected={selectedCard?.uid === c.uid} selectableTarget={isSelectableTarget(c)} hesitationHover={isHesitating} onClick={() => handleCardClick(c)} style={{ position: 'absolute', left: i * pitch, top: UNIT.Y, zIndex: i }} />;
            })}</div>
            <div className="self-hand-gap" />
            <div className="draw-card-area">
              {/* v2.0.9: 迷い箸演出中は「急かす」ボタン */}
              {hesitationState ? <div className="draw-zone draw-zone-clickable" onClick={handleHesitationSkip} style={{ background: 'rgba(201, 162, 39, 0.1)' }}><div style={{ fontSize: 24, marginBottom: 8 }}>👋</div><div style={{ fontSize: 11, color: 'var(--color-warm-gray)', textAlign: 'center' }}>クリックで急かす</div></div>
               : canEndTurn ? <div className="end-turn-button" onClick={handleEndTurn}>ターン終了</div>
               : canDraw ? <div className="draw-zone draw-zone-clickable" onClick={phase === PHASES.EXPLORATION ? handleDraw : null}><div style={{ fontSize: 24, marginBottom: 8 }}>{phase === PHASES.EXPLORATION ? '🃏' : '👆'}</div><div style={{ fontSize: 11, color: 'var(--color-warm-gray)', textAlign: 'center' }}>{phase === PHASES.EXPLORATION ? 'クリックで山札から引く' : '相手の手札をクリック'}</div></div>
               : <div className="draw-zone" style={{ border: '2px dashed var(--color-dusty-pink)', borderRadius: 5, display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--color-warm-gray)', fontSize: 11 }}>{autoPlayMode ? 'オート' : '待機中'}</div>}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<HouseAndWindGame />, document.getElementById('root'));
  </script>
</body>
</html>
