// ============================================================================
// GAME LOGIC
// ============================================================================

const createDeck = () => {
  const deck = [];
  
  // Add characters
  Object.entries(CARD_TYPES.CHARACTERS).forEach(([id, card]) => {
    for (let i = 0; i < card.count; i++) {
      deck.push({ type: 'character', id, ...card });
    }
  });
  
  // Add houses
  Object.entries(CARD_TYPES.HOUSES).forEach(([id, card]) => {
    for (let i = 0; i < card.count; i++) {
      deck.push({ type: 'house', id, ...card });
    }
  });
  
  // Add winds
  Object.entries(CARD_TYPES.WINDS).forEach(([id, card]) => {
    for (let i = 0; i < card.count; i++) {
      deck.push({ type: 'wind', id, ...card });
    }
  });
  
  return deck;
};

const shuffleDeck = (deck) => {
  const shuffled = [...deck];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  return shuffled;
};

const findPairs = (hand) => {
  const pairs = [];
  const characterCards = hand.filter(c => c.type === 'character');
  
  // Check for Witch + Holy Mother (World's Purification)
  const witch = characterCards.find(c => c.id === 'WIT');
  const holy = characterCards.find(c => c.id === 'HOL');
  if (witch && holy) {
    pairs.push({ cards: [witch, holy], isPurification: true });
    return pairs;
  }
  
  // Check for regular pairs
  const counts = {};
  characterCards.forEach(card => {
    counts[card.id] = (counts[card.id] || 0) + 1;
  });
  
  Object.entries(counts).forEach(([id, count]) => {
    if (count >= 2) {
      const matchingCards = characterCards.filter(c => c.id === id);
      pairs.push({ cards: [matchingCards[0], matchingCards[1]], isPurification: false });
    }
  });
  
  return pairs;
};

const checkWin = (hand, houses) => {
  // 手札の人物カード(魔女・聖母を含む)がすべて0枚ならあがり
  // 家の中のカードは手札ではないので、あがり判定に含めない
  const charactersInHand = hand.filter(c => c.type === 'character');
  
  return charactersInHand.length === 0;
};

// Calculate score based on cards in hand (NOT in houses)
const calculateScore = (hand) => {
  let score = 0;
  hand.forEach(card => {
    if (card.points) {
      score += card.points;
    }
  });
  return score;
};

  const [showNameInput, setShowNameInput] = useState(false);
  
  // Multi-player profiles
  const [profiles, setProfiles] = useState([]);
  const [currentProfileId, setCurrentProfileId] = useState(null);
  const [showProfileSelect, setShowProfileSelect] = useState(false);
  
  // Set system
  const [setConfig, setSetConfig] = useState({ enabled: false, target: 3 }); // 3 or 5 games
  const [winCount, setWinCount] = useState({ player: 0, ai: 0 });
  const [matchWinner, setMatchWinner] = useState(null);
  
  // AI difficulty
  const [aiDifficulty, setAiDifficulty] = useState('normal'); // easy, normal, hard
  
  // Statistics
  const [statistics, setStatistics] = useState({
    totalGames: 0,
    wins: 0,
    losses: 0,
    totalScore: 0,
    purifications: 0,
    windCardsUsed: { STE: 0, RET: 0, PEE: 0 }
  });
  const [showStats, setShowStats] = useState(false);
  
  // Game history (for multiple games)
  const [gameHistory, setGameHistory] = useState([]);
  const [cumulativeScores, setCumulativeScores] = useState({
    player: 0,
    ai: 0
  });
  
  const [deck, setDeck] = useState([]);
  const [discardPile, setDiscardPile] = useState([]);
  const [removedCards, setRemovedCards] = useState([]);
  
  // v1.5.1: Refactored to array structure
  const [players, setPlayers] = useState([
    { id: 0, name: '', type: 'human', hand: [], houses: [] },
    { id: 1, name: '', type: 'ai', hand: [], houses: [] }
  ]);
  const [currentPlayerIndex, setCurrentPlayerIndex] = useState(0);
  
  const [selectedCard, setSelectedCard] = useState(null);
  const [selectedHouseCard, setSelectedHouseCard] = useState(null);
  const [selectedCharacterForHouse, setSelectedCharacterForHouse] = useState(null);
  const [selectedWindCardForUse, setSelectedWindCardForUse] = useState(null);
  const [showPlaceHouseUI, setShowPlaceHouseUI] = useState(false);
  const [showTakeFromHouseUI, setShowTakeFromHouseUI] = useState(false);
  const [showWindCardUI, setShowWindCardUI] = useState(false);
  const [selectedWindCard, setSelectedWindCard] = useState(null);
  const [peekResult, setPeekResult] = useState(null);
  const [message, setMessage] = useState('');
  const [aiThinking, setAiThinking] = useState(false);
  
  // Turn management
  const [hasDrawn, setHasDrawn] = useState(false);
  const [hasActioned, setHasActioned] = useState(false);
  
  // Draw animation
  const [drawnCard, setDrawnCard] = useState(null);
  const [pairCards, setPairCards] = useState([]);
  const [showPairAnimation, setShowPairAnimation] = useState(false);
  const [pairAnimationCards, setPairAnimationCards] = useState([]);
  const [dealingAnimation, setDealingAnimation] = useState(false);
  const [dealingCards, setDealingCards] = useState({ player: [], ai: [] });
  const [aiDrawnCard, setAiDrawnCard] = useState(null);
  const [initialDealComplete, setInitialDealComplete] = useState(false);
  
  // Auto-draw when player's turn starts in exploration phase
  useEffect(() => {
    if (currentPlayerIndex === 0 && !hasDrawn && gameState === 'playing' && 
        phase === PHASES.EXPLORATION && deck.length > 0 && initialDealComplete) {
      // Small delay before auto-drawing
      const timer = setTimeout(() => {
        handleDrawCard();
      }, 300);
      return () => clearTimeout(timer);
    }
  }, [currentPlayerIndex, hasDrawn, gameState, phase, deck.length, initialDealComplete]);
  
  // Sync player names with players array
  useEffect(() => {
    setPlayers(prev => [
      { ...prev[0], name: playerName || 'あなた' },
      { ...prev[1], name: AI_NAMES[aiDifficulty] || 'AI' }
    ]);
  }, [playerName, aiDifficulty]);
  
  // Load profiles from localStorage on mount
  useEffect(() => {
    const savedProfiles = localStorage.getItem('houseAndWindProfiles');
    if (savedProfiles) {
      try {
        const loadedProfiles = JSON.parse(savedProfiles);
        setProfiles(loadedProfiles);
        
        // Load last used profile
        const lastProfileId = localStorage.getItem('houseAndWindLastProfile');
        if (lastProfileId) {
          const profile = loadedProfiles.find(p => p.id === lastProfileId);
          if (profile) {
            loadProfile(profile, loadedProfiles);
            return;
          }
        }
        
        // Show profile select if profiles exist
        if (loadedProfiles.length > 0) {
          setShowProfileSelect(true);
        } else {
          setShowNameInput(true);
        }
      } catch (e) {
        console.error('Failed to load profiles', e);
        setShowNameInput(true);
      }
    } else {
      setShowNameInput(true);
    }
  }, []);
  
  // Save profiles to localStorage whenever they change
  useEffect(() => {
    if (profiles.length > 0) {
      localStorage.setItem('houseAndWindProfiles', JSON.stringify(profiles));
    }
  }, [profiles]);
  
  // Save current profile ID
  useEffect(() => {
    if (currentProfileId) {
      localStorage.setItem('houseAndWindLastProfile', currentProfileId);
    }
  }, [currentProfileId]);
  
  // Load profile data
  const loadProfile = (profile, allProfiles = profiles) => {
    setPlayerName(profile.name);
    setStatistics(profile.statistics);
    setCurrentProfileId(profile.id);
    setShowProfileSelect(false);
    setShowNameInput(false);
  };
  
  // Create new profile
  const createProfile = (name) => {
    const newProfile = {
      id: Date.now().toString(),
      name: name,
      statistics: {
        totalGames: 0,
        wins: 0,
        losses: 0,
        totalScore: 0,
        purifications: 0,
        windCardsUsed: { STE: 0, RET: 0, PEE: 0 }
      },
      createdAt: new Date().toISOString()
    };
    
    const updatedProfiles = [...profiles, newProfile];
    setProfiles(updatedProfiles);
    loadProfile(newProfile, updatedProfiles);
  };
  
  // Update current profile statistics
  useEffect(() => {
    if (currentProfileId && statistics.totalGames > 0) {
      setProfiles(prev => prev.map(p => 
        p.id === currentProfileId 
          ? { ...p, statistics: statistics }
          : p
      ));
    }
  }, [statistics, currentProfileId]);
  
  // Helper functions for backward compatibility
  const setPlayerHand = (updater) => {
    setPlayers(prev => [
      { ...prev[0], hand: typeof updater === 'function' ? updater(prev[0].hand) : updater },
      prev[1]
    ]);
  };
  
  const setAiHand = (updater) => {
    setPlayers(prev => [
      prev[0],
      { ...prev[1], hand: typeof updater === 'function' ? updater(prev[1].hand) : updater }
    ]);
  };
  
  const setPlayerHouses = (updater) => {
    setPlayers(prev => [
      { ...prev[0], houses: typeof updater === 'function' ? updater(prev[0].houses) : updater },
      prev[1]
    ]);
  };
  
  const setAiHouses = (updater) => {
    setPlayers(prev => [
      prev[0],
      { ...prev[1], houses: typeof updater === 'function' ? updater(prev[1].houses) : updater }
    ]);
  };
  
  // Computed values for backward compatibility
  const playerHand = players[0].hand;
  const aiHand = players[1].hand;
  const playerHouses = players[0].houses;
  const aiHouses = players[1].houses;
  
  // Delete profile
  const deleteProfile = (profileId) => {
    const updatedProfiles = profiles.filter(p => p.id !== profileId);
    setProfiles(updatedProfiles);
    
    if (profileId === currentProfileId) {
      if (updatedProfiles.length > 0) {
        setShowProfileSelect(true);
      } else {
        setShowNameInput(true);
        setPlayerName('');
        setCurrentProfileId(null);
      }
    }
  };
  
  // ============================================================================
  // GAME END WITH SCORE CALCULATION
  // ============================================================================
  
  const handleGameEnd = (winnerName, isPurification = false) => {
    const playerLoss = calculateScore(playerHand);
    const aiLoss = calculateScore(aiHand);
    
    let playerGameScore, aiGameScore;
    
    if (winnerName === 'player') {
      playerGameScore = aiLoss;  // Winner gets opponent's loss
      aiGameScore = -aiLoss;     // Loser gets negative
    } else {
      playerGameScore = -playerLoss;
      aiGameScore = playerLoss;
    }
    
    setPlayerScore(playerGameScore);
    setAiScore(aiGameScore);
    
    // Add to game history
    const gameRecord = {
      gameNumber: gameHistory.length + 1,
      winner: winnerName,
      scores: {
        player: playerGameScore,
        ai: aiGameScore
      },
      isPurification,
      timestamp: new Date().toISOString()
    };
    
    const newHistory = [...gameHistory, gameRecord];
    setGameHistory(newHistory);
    
    // Update cumulative scores
    const newCumulativeScores = {
      player: cumulativeScores.player + playerGameScore,
      ai: cumulativeScores.ai + aiGameScore
    };
    setCumulativeScores(newCumulativeScores);
    
    // Update win count for set system
    const newWinCount = {
      player: winCount.player + (winnerName === 'player' ? 1 : 0),
      ai: winCount.ai + (winnerName === 'ai' ? 1 : 0)
    };
    setWinCount(newWinCount);
    
    // Update statistics
    setStatistics(prev => ({
      totalGames: prev.totalGames + 1,
      wins: prev.wins + (winnerName === 'player' ? 1 : 0),
      losses: prev.losses + (winnerName === 'ai' ? 1 : 0),
      totalScore: prev.totalScore + playerGameScore,
      purifications: prev.purifications + (isPurification && winnerName === 'player' ? 1 : 0),
      windCardsUsed: prev.windCardsUsed
    }));
    
    // Check if set is complete
    if (setConfig.enabled && (newWinCount.player >= setConfig.target || newWinCount.ai >= setConfig.target)) {
      setMatchWinner(newWinCount.player >= setConfig.target ? 'player' : 'ai');
    }
    
    setWinner(winnerName);
    setGameState('finished');
  };
  
  // ============================================================================
  // CARD DISPLAY COMPONENT
  // ============================================================================
  
  const CardDisplay = ({ card, onClick, selected, size = 'normal', showBack = false }) => {
    const sizes = {
      small: { width: '60px', height: '84px', fontSize: '8px', imgSize: '40px' },
      normal: { width: '80px', height: '110px', fontSize: '10px', imgSize: '50px' },
      large: { width: '100px', height: '140px', fontSize: '12px', imgSize: '60px' }
    };
    
    const s = sizes[size];
    
    // Card back - シンプルな縞模様のみ(絵文字なし)
    if (showBack) {
      return (
        <div
          onClick={onClick}
          className={`cursor-pointer ${onClick ? 'hover:scale-105' : ''} transition-transform`}
          style={{
            width: s.width,
            height: s.height,
            background: 'repeating-linear-gradient(45deg, #2d5016 0px, #2d5016 5px, #3d6b1e 5px, #3d6b1e 10px)',
            border: '3px solid #1a3009',
            boxShadow: '3px 3px 0px rgba(0,0,0,0.5)',
            borderRadius: '4px'
          }}
        >
        </div>
      );
    }
    
    // Get card image from Base64
    const getImageSrc = () => {
      if (card.id && CARD_IMAGES[card.id]) {
        return CARD_IMAGES[card.id];
      }
      // Use generic house icon if no specific image
      if (card.type === 'house' && !CARD_IMAGES[card.id] && CARD_IMAGES.house) {
        return CARD_IMAGES.house;
      }
      return null;
    };
    
    // Get background color based on card category
    const getBgColor = () => {
      if (selected) return 'linear-gradient(180deg, #fff8e1 0%, #ffecb3 100%)'; // Gold tint for selected
      if (card.category === 'citizen') return 'linear-gradient(180deg, #e8f5e9 0%, #c8e6c9 100%)';
      if (card.category === 'noble') return 'linear-gradient(180deg, #fff3e0 0%, #ffe0b2 100%)';
      if (card.category === 'special') return 'linear-gradient(180deg, #f3e5f5 0%, #e1bee7 100%)';
      if (card.type === 'house') return 'linear-gradient(180deg, #e3f2fd 0%, #bbdefb 100%)';
      if (card.type === 'wind') return 'linear-gradient(180deg, #eceff1 0%, #cfd8dc 100%)';
      return '#fff';
    };
    
    // Get border color based on card category
    const getBorderColor = () => {
      if (selected) return '#FF4500';
      if (card.category === 'citizen') return '#4caf50';
      if (card.category === 'noble') return '#ff9800';
      if (card.category === 'special') return '#9c27b0';
      if (card.type === 'house') return '#2196f3';
      if (card.type === 'wind') return '#607d8b';
      return '#333';
    };
    
    // Get category icon
    const getCategoryIcon = () => {
      if (card.category === 'citizen') return '👤';
      if (card.category === 'noble') return '👑';
      if (card.category === 'special') return '✨';
      if (card.type === 'house') return '🏠';
      if (card.type === 'wind') return '💨';
      return '';
    };
    
    const imageSrc = getImageSrc();
    
    return (
      <div
        onClick={onClick}
        className={`cursor-pointer ${onClick ? 'hover:scale-110' : ''} transition-transform`}
        style={{
          width: s.width,
          height: s.height,
          background: getBgColor(),
          border: selected ? '4px solid #FF4500' : `2px solid ${getBorderColor()}`,
          boxShadow: selected ? '0 0 20px rgba(255,215,0,0.8), 4px 4px 0px rgba(0,0,0,0.5)' : '3px 3px 0px rgba(0,0,0,0.5)',
          borderRadius: '4px',
          display: 'flex',
          flexDirection: 'column',
          alignItems: 'center',
          padding: '3px',
          transform: selected ? 'scale(1.05)' : 'scale(1)',
          position: 'relative'
        }}
      >
        {/* 上部: 左にジャンルアイコン、右に失点 */}
        <div style={{
          width: '100%',
          display: 'flex',
          justifyContent: 'space-between',
          alignItems: 'flex-start',
          height: size === 'small' ? '14px' : '18px'
        }}>
          {/* 左上: ジャンルアイコン */}
          <span style={{

          }}>
            {getCategoryIcon()}
          </span>
          
          {/* 右上: 失点 */}
          {card.points !== undefined && (
            <span style={{
              fontSize: size === 'small' ? '8px' : '10px',
              fontWeight: 'bold',
              color: '#c00',
              background: '#ffe0e0',
              padding: '1px 3px',
              borderRadius: '3px'
            }}>
              -{card.points}
            </span>
          )}
        </div>
        
        {/* 中央: カード画像 */}
        <div style={{
          flex: 1,
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center'
        }}>
          {imageSrc && (
            <img 
              src={imageSrc} 
              alt={card.name}
              style={{
                width: s.imgSize,
                height: s.imgSize,
                objectFit: 'contain',
                imageRendering: 'pixelated'
              }}
              onError={(e) => {
                e.target.style.display = 'none';
                e.target.nextSibling.style.display = 'flex';
              }}
            />
          )}
          
          {/* Fallback emoji (hidden by default) */}
          <div style={{ 
            fontSize: size === 'small' ? '24px' : '32px',
            display: imageSrc ? 'none' : 'flex',
            alignItems: 'center',
            justifyContent: 'center'
          }}>
            {card.type === 'character' && (card.id === 'WIT' ? '🧙‍♀️' : card.id === 'HOL' ? '👼' : card.category === 'noble' ? '👑' : '👤')}
            {card.type === 'house' && (card.id === 'PRN' ? '🔒' : '🏠')}
            {card.type === 'wind' && '💨'}
          </div>
        </div>
        
        {/* 下部: 3文字略称 */}
        <div style={{ 
          fontSize: size === 'small' ? '9px' : '11px',
          fontWeight: 'bold',
          textAlign: 'center',
          color: '#333',
          letterSpacing: '1px'
        }}>
          {card.id || '???'}
        </div>
      </div>
    );
  };
  
  // ============================================================================
  // GAME INITIALIZATION
  // ============================================================================
  
  const startGame = () => {
    const fullDeck = createDeck();
    const shuffled = shuffleDeck(fullDeck);
    
    // Remove 3 cards
    const removed = shuffled.splice(0, 3);
    setRemovedCards(removed);
    
    // Deal 7 cards each
    const pHand = shuffled.splice(0, 7);
    const aHand = shuffled.splice(0, 7);
    
    setDeck(shuffled);
    setDiscardPile([]);
    setPlayers(prev => [
      { ...prev[0], houses: [], hand: [] },
      { ...prev[1], houses: [], hand: [] }
    ]);
    setPhase(PHASES.EXPLORATION);
    setTurn(1);
    setCurrentPlayerIndex(0);
    setGameState('playing');
    setMessage('カードを配っています...');
    setSelectedCard(null);
    setHasDrawn(false);
    setHasActioned(false);
    setDrawnCard(null);
    setPairCards([]);
    setAiDrawnCard(null);
    setInitialDealComplete(false);
    
    // Start dealing animation
    setDealingAnimation(true);
    setDealingCards({ player: [], ai: [] });
    
    // Deal cards one by one with animation
    const dealCardsSequentially = async () => {
      for (let i = 0; i < 7; i++) {
        await new Promise(resolve => setTimeout(resolve, 300));
        
        setDealingCards(prev => ({
          player: [...prev.player, pHand[i]],
          ai: [...prev.ai, aHand[i]]
        }));
        
        // After animation, add to actual hand
        setTimeout(() => {
          setPlayers(prev => [
            { ...prev[0], hand: [...prev[0].hand, pHand[i]] },
            { ...prev[1], hand: [...prev[1].hand, aHand[i]] }
          ]);
        }, 250);
      }
      
      // Wait a bit, then finish dealing animation
      setTimeout(() => {
        setDealingAnimation(false);
        setDealingCards({ player: [], ai: [] });
        
        // Auto-discard pairs in initial hands
        setTimeout(() => {
          autoDiscardPairs(pHand, aHand);
        }, 500);
      }, 500);
    };
    
    dealCardsSequentially();
  };
  
  const autoDiscardPairs = async (pHand, aHand) => {
    let newPHand = [...pHand];
    let newAHand = [...aHand];
    let newDiscard = [...discardPile];
    
    // Player pairs
    const playerPairs = findPairs(newPHand);
    
    // Show animation for each player pair
    for (const pair of playerPairs) {
      setPairAnimationCards(pair.cards);
      setShowPairAnimation(true);
      
      if (pair.isPurification) {
        setMessage(`🌟初期手札で世界の浄化!魔女と聖母のペア → ${playerName || 'あなた'}の勝利!`);
      } else {
        setMessage(`初期手札でペア発見: ${pair.cards[0].name} → 捨て札へ`);
      }
      
      await new Promise(resolve => setTimeout(resolve, 2000));
      
      setShowPairAnimation(false);
      newDiscard.push(...pair.cards);
      newPHand = newPHand.filter(c => !pair.cards.includes(c));
    }
    
    // AI pairs (no animation, just discard)
    const aiPairs = findPairs(newAHand);
    if (aiPairs.length > 0) {
      setMessage(`AIの手札からペアを${aiPairs.length}組捨てました`);
      await new Promise(resolve => setTimeout(resolve, 1000));
    }
    
    aiPairs.forEach(pair => {
      newDiscard.push(...pair.cards);
      newAHand = newAHand.filter(c => !pair.cards.includes(c));
    });
    
    setPlayerHand(newPHand);
    setAiHand(newAHand);
    setDiscardPile(newDiscard);
    
    // Check for purification win
    const hasPurification = playerPairs.some(p => p.isPurification);
    if (hasPurification) {
      setTimeout(() => {
        handleGameEnd('player');
        setMessage(`🌟世界の浄化達成!${playerName || 'あなた'}の勝利です!`);
      }, 500);
      return;
    }
    
    // Start the game normally
    setMessage('【あなたのターン】カードを自動で引きます...');
    setInitialDealComplete(true);
  };
  
  // ============================================================================
  // PLAYER ACTIONS
  // ============================================================================
  
  const handlePlaceHouse = () => {
    if (currentPlayerIndex !== 0) return;
    
    // Check if player has house cards
    const houseCards = players[0].hand.filter(c => c.type === 'house');
    if (houseCards.length === 0) {
      setMessage('家カードを持っていません');
      return;
    }
    
    setShowPlaceHouseUI(true);
    setMessage('家カードを選択してください');
  };
  
  const confirmPlaceHouse = (houseCard, characterCard) => {
    if (!houseCard || !characterCard) return;
    
    // Remove cards from hand
    const newHand = players[0].hand.filter(c => c !== houseCard && c !== characterCard);
    
    // Create house structure
    const newHouse = {
      houseCard: houseCard,
      cards: [characterCard],
      id: `house_${Date.now()}`
    };
    
    setPlayerHand(newHand);
    setPlayerHouses([...playerHouses, newHouse]);
    setShowPlaceHouseUI(false);
    setSelectedCard(null);
    setSelectedHouseCard(null);
    setSelectedCharacterForHouse(null);
    setHasActioned(true); // Mark action as used
    
    const houseName = houseCard.name;
    const charName = characterCard.name;
    const points = characterCard.points;
    setMessage(`✅ ${houseName}に${charName}を配置(${points}点を保護)→ [ターン終了]へ`);
    
    // Check win
    setTimeout(() => {
      if (checkWin(newHand, [...playerHouses, newHouse])) {
        handleGameEnd('player');
      }
    }, 500);
  };
  
  const handleTakeFromHouse = () => {
    if (currentPlayerIndex !== 0) return;
    
    // Check if player has removable houses with cards
    const removableHouses = players[0].houses.filter(h => 
      h.houseCard.removable && h.cards.length > 0
    );
    
    if (removableHouses.length === 0) {
      setMessage('取り出せる家がありません');
      return;
    }
    
    setShowTakeFromHouseUI(true);
    setMessage('取り出す家を選択してください');
  };
  
  const confirmTakeFromHouse = (house) => {
    if (!house) return;
    
    // Remove house and return character card to hand
    const cardToReturn = house.cards[0];
    const newHouses = players[0].houses.filter(h => h.id !== house.id);
    
    // 家カードは捨て札に
    setDiscardPile([...discardPile, house.houseCard]);
    
    setPlayerHouses(newHouses);
    setShowTakeFromHouseUI(false);
    setHasActioned(true); // Mark action as used
    
    const houseName = house.houseCard.name;
    const charName = cardToReturn.name;
    const points = cardToReturn.points;
    
    // Add to hand and check for pairs immediately
    const tempHand = [...playerHand, cardToReturn];
    
    // Show animation if pair is formed
    const pairs = findPairs(tempHand);
    if (pairs.length > 0) {
      const pair = pairs[0];
      setPairCards(pair.cards);
      
      // Show pair animation
      setPairAnimationCards(pair.cards);
      setShowPairAnimation(true);
      
      if (pair.isPurification) {
        setMessage(`✅ ${houseName}から${charName}を取出 → 🌟世界の浄化!`);
      } else {
        setMessage(`✅ ${houseName}から${charName}を取出 → ペア成立!`);
      }
      
      setTimeout(() => {
        setShowPairAnimation(false);
        
        // Discard pair and update hand
        const result = checkAndDiscardPairs(tempHand, 'player');
        setPlayerHand(result.hand);
        setPairCards([]);
        
        if (result.shouldEndGame) return;
        
        // After pair discard, show next action message
        const canPlaceHouse = result.hand.some(c => c.type === 'house') && result.hand.some(c => c.type === 'character');
        const canTakeFromHouse = newHouses.some(h => h.houseCard.removable);
        const canUseWind = phase === PHASES.BABANUKI && result.hand.some(c => c.type === 'wind') && players[1].houses.length > 0;
        
        let actions = [];

      const regularHouse = houseCards.find(c => c.id === 'HOU');

      setAiDrawnCard({});  // Show back of card
      
      setTimeout(() => {
        const newHand = [...aiHand, drawnCard];
        setAiHand(newHand);
        setAiDrawnCard(null);
        
        // Check for pairs immediately
        const result = checkAndDiscardPairs(newHand, 'ai');
        
        if (result.shouldEndGame) return; // Game ended, don't continue
        
        const finalHand = result.hand;
        
        setTimeout(() => {
          // AI considers wind card usage (if in Babanuki phase)
          if (phase === PHASES.BABANUKI) {
            const windAction = aiUseWindCard(finalHand, playerHouses);
            if (windAction) {
              executeAiWindAction(windAction, finalHand);
              return; // Wind action will handle turn end
            }
          }
          
          // AI tries to place house card
          const placement = aiPlaceHouse(finalHand);
          if (placement) {
            const handAfterPlacement = finalHand.filter(c => c !== placement.house && c !== placement.character);
            const newHouse = {
              houseCard: placement.house,
              cards: [placement.character],
              id: `ai_house_${Date.now()}`
            };
            
            setAiHand(handAfterPlacement);
            setAiHouses([...aiHouses, newHouse]);
            setMessage(`AIが${placement.house.name}を配置しました`);
            
            setTimeout(() => {
              setAiThinking(false);
              setCurrentPlayerIndex(0);
              setMessage('あなたのターン');
              setTurn(t => t + 1);
              
              if (newDeck.length === 0) {
                setPhase(PHASES.BABANUKI);
              }
            }, 1000);
          } else {
            setAiThinking(false);
            setCurrentPlayerIndex(0);
            setMessage('あなたのターン');
            setTurn(t => t + 1);
            
            if (newDeck.length === 0) {
              setPhase(PHASES.BABANUKI);
            }
          }
        }, 1000);
      }, 1500);
    } else {
      // Babanuki phase - AI draws from player
      if (players[0].hand.length > 0) {
        // AI tries to use wind card first
        const windAction = aiUseWindCard(aiHand, playerHouses);
        if (windAction) {
          executeAiWindAction(windAction, aiHand);
          return;
        }
        
        // Draw from player
        const randomIndex = Math.floor(Math.random() * players[0].hand.length);
        const drawnCard = playerHand[randomIndex];
        const newPlayerHand = players[0].hand.filter((_, i) => i !== randomIndex);
        
        setPlayerHand(newPlayerHand);
        setMessage('AIがあなたからカードを引きました');
        
        // Show AI drawn card for 1.5 seconds
        setAiDrawnCard({});  // Show back of card
        
        setTimeout(() => {
          const newAiHand = [...aiHand, drawnCard];
          setAiHand(newAiHand);
          setAiDrawnCard(null);
          
          // Check for pairs immediately
          const result = checkAndDiscardPairs(newAiHand, 'ai');
          
          if (result.shouldEndGame) return; // Game ended, don't continue
          
          const finalAiHand = result.hand;
          
          setTimeout(() => {
            // Try to place house after drawing
            const placement = aiPlaceHouse(finalAiHand);
            if (placement) {
              const handAfterPlacement = finalAiHand.filter(c => c !== placement.house && c !== placement.character);
              const newHouse = {
                houseCard: placement.house,
                cards: [placement.character],
                id: `ai_house_${Date.now()}`
              };
              
              setAiHand(handAfterPlacement);
              setAiHouses([...aiHouses, newHouse]);
              setMessage(`AIが${placement.house.name}を配置`);
              
              setTimeout(() => {
                setAiThinking(false);
                setCurrentPlayerIndex(0);
                setMessage('あなたのターン - AIからカードを引いてください');
                setTurn(t => t + 1);
              }, 1000);
            } else {
              setAiThinking(false);
              setCurrentPlayerIndex(0);
              setMessage('あなたのターン - AIからカードを引いてください');
              setTurn(t => t + 1);
            }
          }, 1000);
        }, 1500);
      } else {
        setAiThinking(false);
        setCurrentPlayerIndex(0);
        setMessage('あなたのターン');
        setTurn(t => t + 1);
      }
    }
  };
  
  // ============================================================================
  // BABANUKI PHASE - DRAW FROM AI
  // ============================================================================
  
  const handleDrawFromAI = () => {
    if (phase !== PHASES.BABANUKI || currentPlayerIndex !== 0) return;
    if (hasDrawn) return; // Already drawn this turn
    if (players[1].hand.length === 0) return;
    
    const randomIndex = Math.floor(Math.random() * players[1].hand.length);
    handleDrawFromAIByIndex(randomIndex);
  };
  
  const handleDrawFromAIByIndex = (index) => {
    if (phase !== PHASES.BABANUKI || currentPlayerIndex !== 0) return;
    if (hasDrawn) return; // Already drawn this turn
    if (players[1].hand.length === 0) return;
    if (index < 0 || index >= players[1].hand.length) return;
    
    const drawnCard = aiHand[index];
    const newAiHand = players[1].hand.filter((_, i) => i !== index);
    
    setAiHand(newAiHand);
    setMessage(`${drawnCard.name}を引きました`);
    setHasDrawn(true);
    
    // Show drawn card on the right for 1.5 seconds
    setDrawnCard(drawnCard);
    
    setTimeout(() => {
      // Add to hand and check for pairs
      const newPlayerHand = [...playerHand, drawnCard];
      setPlayerHand(newPlayerHand);
      setDrawnCard(null);
      
      // Check for pairs with animation
      const pairs = findPairs(newPlayerHand);
      if (pairs.length > 0) {
        const pair = pairs[0];
        setPairCards(pair.cards);
        
        // Show pair animation
        setPairAnimationCards(pair.cards);
        setShowPairAnimation(true);
        
        if (pair.isPurification) {
          setMessage(`🌟世界の浄化!魔女と聖母のペア成立 → ${playerName || 'あなた'}の勝利!`);
        } else {
          setMessage(`ペア発見: ${pair.cards[0].name} → 捨て札へ`);
        }
        
        setTimeout(() => {
          setShowPairAnimation(false);
          // Remove pair and update hand
          const result = checkAndDiscardPairs(newPlayerHand, 'player');
          setPlayerHand(result.hand);
          setPairCards([]);
          
          if (result.shouldEndGame) return;
          
          // After pair discard, show next action message
          const canPlaceHouse = result.hand.some(c => c.type === 'house') && result.hand.some(c => c.type === 'character');
          const canTakeFromHouse = players[0].houses.some(h => h.houseCard.removable);
          const canUseWind = result.hand.some(c => c.type === 'wind') && players[1].houses.length > 0;
          
          let actions = [];
          if (canPlaceHouse) actions.push('🏠家配置');
          if (canTakeFromHouse) actions.push('🏠家取出');
          if (canUseWind) actions.push('🌪️風カード');
          
          if (actions.length > 0) {
            setMessage(`【アクション可能】${actions.join(' / ')} または[ターン終了]`);
          } else {
            setMessage(`【ドロー完了】[ターン終了]で次のターンへ`);
          }
        }, 1000);
      } else {
        // No pair
        const canPlaceHouse = newPlayerHand.some(c => c.type === 'house') && newPlayerHand.some(c => c.type === 'character');
        const canTakeFromHouse = players[0].houses.some(h => h.houseCard.removable);
        const canUseWind = newPlayerHand.some(c => c.type === 'wind') && players[1].houses.length > 0;
        
        let actions = [];
        if (canPlaceHouse) actions.push('🏠家配置');
        if (canTakeFromHouse) actions.push('🏠家取出');
        if (canUseWind) actions.push('🌪️風カード');
        
        if (actions.length > 0) {
          setMessage(`【ペアなし】アクション: ${actions.join(' / ')} または[ターン終了]`);
        } else {
          setMessage(`【ペアなし】[ターン終了]で次のターンへ`);
        }
      }
    }, 1500);
  };

                    left: '20%'
                  }}>⭐</div>
                  <div style={{
                    position: 'absolute',
                    fontSize: '24px',
                    animation: 'float 2s ease-in-out infinite 0.3s',
                    top: '-30px',
                    right: '20%'
                  }}>✨</div>
                  <div style={{
                    position: 'absolute',
                    fontSize: '24px',
                    animation: 'float 2s ease-in-out infinite 0.6s',
                    bottom: '-20px',
                    left: '30%'
                  }}>🌟</div>
                </>
              ) : (
                <>
                  {/* Normal Pair Animation */}
                  <div style={{
                    animation: 'slideInLeft 0.5s ease-out forwards',
                    width: '80px',
                    height: '110px'
                  }}>
                    <CardDisplay card={pairAnimationCards[0]} size="normal" />
                  </div>
                  
                  {/* Collision Effect */}
                  <div style={{
                    fontSize: '48px',
                    animation: 'pulse 0.5s ease-in-out infinite',
                    position: 'absolute',
                    left: '50%',
                    transform: 'translateX(-50%)'
                  }}>
                    💥
                  </div>
                  
                  <div style={{
                    animation: 'slideInRight 0.5s ease-out forwards',
                    width: '80px',
                    height: '110px'
                  }}>
                    <CardDisplay card={pairAnimationCards[1]} size="normal" />
                  </div>
                </>
              )}
            </div>
          )}
        </div>
        
        <style>{`
          @keyframes slideInLeft {
            0% {
              transform: translateX(-300px);
              opacity: 0;
            }
            50% {
              transform: translateX(-10px);
              opacity: 1;
            }
            100% {
              transform: translateX(0);
              opacity: 1;
            }
          }
          
          @keyframes slideInRight {
            0% {
              transform: translateX(300px);
              opacity: 0;
            }
            50% {
              transform: translateX(10px);
              opacity: 1;
            }
            100% {
              transform: translateX(0);
              opacity: 1;
            }
          }
          
          @keyframes pulse {
            0%, 100% {
              transform: translateX(-50%) scale(1);
            }
            50% {
              transform: translateX(-50%) scale(1.5);
            }
          }
          
          @keyframes divineLight {
            0%, 100% {
              transform: translateX(-50%) scale(1) rotate(0deg);
              opacity: 1;
            }
            50% {
              transform: translateX(-50%) scale(2) rotate(180deg);
              opacity: 0.6;
            }
          }
          
          @keyframes float {
            0%, 100% {
              transform: translateY(0) scale(1);
              opacity: 1;
            }
            50% {
              transform: translateY(-20px) scale(1.2);
              opacity: 0.7;
            }
          }
          
          @keyframes dealCard {
            0% {
              transform: translateX(200px) scale(0.5);
              opacity: 0;
            }
            50% {
              opacity: 1;
            }
            100% {
              transform: translateX(0) scale(1);
              opacity: 1;
            }
          }
        `}</style>
        
        {/* Player Hand */}
        <div className="p-4" style={{
          background: '#1a3a0f',
          border: currentPlayerIndex === 0 ? '5px solid #00D800' : '4px solid #ffd700',
          borderRadius: '8px',
          boxShadow: currentPlayerIndex === 0 ? '0 0 30px rgba(0,216,0,0.8)' : '0 0 20px rgba(255,215,0,0.3)'
        }}>
          <div className="text-white font-bold mb-2" style={{
            color: currentPlayerIndex === 0 ? '#00D800' : '#ffd700',
            fontSize: currentPlayerIndex === 0 ? '20px' : '16px'
          }}>
            ▼ {playerName || 'あなた'}の手札 [{players[0].hand.length}枚] {currentPlayerIndex === 0 && '← 現在のターン'}
          </div>
          <div className="flex gap-3 items-start" style={{ position: 'relative', minHeight: '140px' }}>
            {/* Regular hand cards - with max width to prevent overflow into draw zone */}
            <div className="flex gap-3 flex-wrap" style={{ 
              maxWidth: 'calc(100% - 200px)', // Reserve 200px for draw zone
              flex: 1
            }}>
              {/* Dealing animation cards */}
              {dealingAnimation && dealingCards.player.map((card, i) => (
                <div key={`dealing-${i}`} style={{
                  animation: 'dealCard 0.3s ease-out forwards'
                }}>
                  <CardDisplay card={card} size="normal" />
                </div>
              ))}
              
              {/* Regular cards (shown after dealing animation) */}
              {!dealingAnimation && players[0].hand.map((card, i) => {
                const isPairCard = pairCards.some(pc => pc === card);
                const isHouseSelected = selectedHouseCard !== null;
                const isWindSelected = selectedWindCardForUse !== null;
                const canSelectForHouse = isHouseSelected && card.type === 'character';
                
                return (
                  <div key={i} style={{
                    animation: isPairCard ? 'pulse 0.5s infinite' : 'none',
                    transform: isPairCard ? 'scale(1.1)' : 'scale(1)',
                    opacity: (isHouseSelected && card.type !== 'character') || isWindSelected ? 0.5 : 1,
                    cursor: canSelectForHouse ? 'pointer' : 'default'
                  }}>
                    <CardDisplay
                      card={card}
                      onClick={() => {
                        // Priority 1: If house is selected and this is a character, place them together
                        if (selectedHouseCard && card.type === 'character') {
                          confirmPlaceHouse(selectedHouseCard, card);
                          return;
                        }
                        
                        // Priority 2: If it's a wind card
                        if (card.type === 'wind') {
                          // Check if in exploration phase
                          if (phase === PHASES.EXPLORATION) {
                            setMessage('⚠️ 風カードは探検フェーズでは使用できません。ババ抜きフェーズまでお待ちください。');
                            return;
                          }
                          
                          // Check if conditions are met for using wind card
                          if (hasDrawn && !hasActioned && currentPlayerIndex === 0 && !aiThinking && phase === PHASES.BABANUKI && players[1].houses.length > 0) {
                            setSelectedWindCardForUse(card);
                            setSelectedHouseCard(null);
                            setMessage(`${card.name}の対象となる相手の家を選んでください`);
                            return;
                          } else {
                            // Not the right timing
                            setMessage('風カードは引き札後、アクション前、ババ抜きフェーズでのみ使用できます');
                            return;
                          }
                        }
                        
                        // Priority 3: If it's a house card and player can use it, select it
                        if (card.type === 'house' && hasDrawn && !hasActioned && currentPlayerIndex === 0 && !aiThinking) {
                          const hasCharacter = players[0].hand.some(c => c.type === 'character');
                          if (hasCharacter) {
                            setSelectedHouseCard(card);
                            setSelectedWindCardForUse(null);
                            setMessage('配置する人物カードを選んでください');
                          }
                        } else {
                          setSelectedCard(card);
                        }
                      }}
                      selected={selectedCard === card || selectedHouseCard === card || selectedWindCardForUse === card}
                    />
                  </div>
                );
              })}
            </div>
            
            {/* Draw Zone - Fixed position on the right */}
            <div style={{
              position: 'absolute',
              right: '20px',
              top: '0',
              bottom: '0',
              paddingLeft: '20px',
              borderLeft: '3px dashed #ffd700',
              minWidth: '160px',
              display: 'flex',
              flexDirection: 'column',
              gap: '10px',
              alignItems: 'center'
            }}>
              {/* Top area for drawn card */}
              <div style={{
                display: 'flex',
                flexDirection: 'column',
                gap: '10px',
                alignItems: 'center',
                flex: 1
              }}>
                {/* Drawn card */}
                {drawnCard && (
                  <div style={{
                    animation: 'slideIn 0.3s ease-out'
                  }}>
                    <CardDisplay
                      card={drawnCard}
                    />
                  </div>
                )}
              </div>
              
              {/* Fixed button area at bottom */}
              <div style={{
                marginBottom: '10px'
              }}>
                {/* Babanuki phase instruction */}
                {!hasDrawn && currentPlayerIndex === 0 && !aiThinking && phase === PHASES.BABANUKI && players[1].hand.length > 0 && (
                  <div className="text-white font-bold text-center" style={{
                    padding: '15px',
                    background: '#1078F2',
                    border: '3px solid white',
                    boxShadow: '3px 3px 0px rgba(0,0,0,0.5)',
                    borderRadius: '4px',
                    width: '140px',
                    fontSize: '14px'
                  }}>
                    ↑ AIの手札を<br/>クリック
                  </div>
                )}
                
                {/* End turn button - same position as draw button */}
                {hasDrawn && currentPlayerIndex === 0 && !aiThinking && !showPlaceHouseUI && !showTakeFromHouseUI && !showWindCardUI && !drawnCard && (
                  <button
                    onClick={handleEndTurn}
                    className="px-4 py-3 text-white font-bold text-sm"
                    style={{
                      background: '#FC7460',
                      border: '3px solid white',
                      boxShadow: '3px 3px 0px rgba(0,0,0,0.5)',
                      width: '140px'
                    }}
                  >
                    ターン終了
                  </button>
                )}
              </div>
            </div>
          </div>
        </div>
        
        <style>{`
          @keyframes slideIn {
            from {
              opacity: 0;
              transform: translateX(50px);
            }
            to {
              opacity: 1;
              transform: translateX(0);
            }
          }
          @keyframes pulse {
            0%, 100% {
              box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.7);
            }
            50% {
              box-shadow: 0 0 20px 10px rgba(255, 215, 0, 0);
            }
          }
        `}</style>
        
        {/* Deck info */}
        <div className="mt-4 text-center text-white text-sm">
          山札: {deck.length}枚 | 捨札: {discardPile.length}枚
        </div>
        
        {/* Place House UI Modal */}
        {showPlaceHouseUI && (
          <div className="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center p-4" style={{ zIndex: 1000 }}>
            <div className="p-6 max-w-2xl" style={{
              background: '#1a3a0f',
              border: '4px solid #ffd700',
              borderRadius: '8px'
            }}>
              <h3 className="text-white text-xl font-bold mb-4">家カード配置</h3>
              
              <div className="mb-4">
                <div className="text-white mb-2">1. 家カードを選択:</div>
                <div className="flex gap-3 flex-wrap">
                  {players[0].hand.filter(c => c.type === 'house').map((card, i) => (
                    <CardDisplay
                      key={i}
                      card={card}
                      onClick={() => setSelectedHouseCard(card)}
                      selected={selectedHouseCard === card}
                    />
                  ))}
                </div>
              </div>
              
              <div className="mb-4">
                <div className="text-white mb-2">2. 人物カードを選択:</div>
                <div className="flex gap-3 flex-wrap">
                  {players[0].hand.filter(c => c.type === 'character').map((card, i) => (
                    <CardDisplay
                      key={i}
                      card={card}
                      onClick={() => setSelectedCharacterForHouse(card)}
                      selected={selectedCharacterForHouse === card}
                    />
                  ))}
                </div>
              </div>
              
              <div className="flex gap-4 justify-center">
                <button
                  onClick={() => confirmPlaceHouse(selectedHouseCard, selectedCharacterForHouse)}
                  disabled={!selectedHouseCard || !selectedCharacterForHouse}
                  className="px-6 py-3 text-white font-bold"
                  style={{
                    background: selectedHouseCard && selectedCharacterForHouse ? '#00D800' : '#666',
                    border: '3px solid white',
                    boxShadow: '3px 3px 0px rgba(0,0,0,0.5)',
                    cursor: selectedHouseCard && selectedCharacterForHouse ? 'pointer' : 'not-allowed'
                  }}
                >
                  配置
                </button>
                <button
                  onClick={() => {
                    setShowPlaceHouseUI(false);
                    setSelectedCard(null);
                    setSelectedHouseCard(null);
                    setSelectedCharacterForHouse(null);
                    setMessage('キャンセルしました');
                  }}
                  className="px-6 py-3 text-white font-bold"
                  style={{
                    background: '#FC7460',
                    border: '3px solid white',
                    boxShadow: '3px 3px 0px rgba(0,0,0,0.5)'
                  }}
                >
                  キャンセル
                </button>
              </div>
            </div>
          </div>
        )}
        
        {/* Take From House UI Modal */}
        {showTakeFromHouseUI && (
          <div className="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center p-4" style={{ zIndex: 1000 }}>
            <div className="p-6 max-w-2xl" style={{
              background: '#1a3a0f',
              border: '4px solid #ffd700',
              borderRadius: '8px'
            }}>
              <h3 className="text-white text-xl font-bold mb-4">家から取り出し</h3>
              
              <div className="mb-4">
                <div className="text-white mb-2">取り出す家を選択:</div>
                <div className="flex gap-3 flex-wrap">
                  {players[0].houses.filter(h => h.houseCard.removable).map((house) => (
                    <div
                      key={house.id}
                      onClick={() => confirmTakeFromHouse(house)}
                      className="p-3 bg-white cursor-pointer hover:scale-105"
                      style={{
                        width: '100px',
                        border: '3px solid #000',
                        boxShadow: '3px 3px 0px rgba(0,0,0,0.5)'
                      }}
                    >
                      <div className="text-2xl text-center">🏠</div>
                      <div className="text-xs font-bold text-center">{house.houseCard.name}</div>
                      <div className="text-xs text-center text-blue-600">{house.cards[0].name}</div>
                    </div>
                  ))}
                </div>
              </div>
              
              <div className="flex gap-4 justify-center">
                <button
                  onClick={() => {
                    setShowTakeFromHouseUI(false);
                    setMessage('キャンセルしました');
                  }}
                  className="px-6 py-3 text-white font-bold"
                  style={{
                    background: '#FC7460',
                    border: '3px solid white',
                    boxShadow: '3px 3px 0px rgba(0,0,0,0.5)'
                  }}
                >
                  キャンセル
                </button>
              </div>
            </div>
          </div>
        )}
        
        {/* Wind Card UI Modal */}
        {showWindCardUI && (
          <div className="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center p-4" style={{ zIndex: 1000 }}>
            <div className="p-6 max-w-3xl" style={{
              background: '#1a3a0f',
              border: '4px solid #FF9800',
              borderRadius: '8px'
            }}>
              <h3 className="text-white text-xl font-bold mb-4">🌪️ 風カード使用</h3>
              
              {/* Wind Card Selection */}
              <div className="mb-4">
                <div className="text-white mb-2">1. 風カードを選択:</div>
                <div className="flex gap-3 flex-wrap">
                  {players[0].hand.filter(c => c.type === 'wind').map((card, i) => (
                    <div key={i} className="text-center">
                      <CardDisplay
                        card={card}
                        onClick={() => setSelectedWindCard(card)}
                        selected={selectedWindCard === card}
                      />
                      <div className="text-white text-xs mt-1">{card.effect}</div>
                    </div>
                  ))}
                </div>
              </div>
              
              {/* Target Selection for Ghibli and Mistral */}
              {selectedWindCard && (selectedWindCard.id === 'STE' || selectedWindCard.id === 'PEE') && (
                <div className="mb-4">
                  <div className="text-white mb-2">
                    2. ターゲットを選択:
                    {selectedWindCard.id === 'STE' && ' (荒屋・家のみ)'}
                  </div>
                  <div className="flex gap-3 flex-wrap">
                    {aiHouses
                      .filter(h => {
                        if (selectedWindCard.id === 'STE') return h.houseCard.id !== 'PRN';
                        if (selectedWindCard.id === 'PEE') return h.houseCard.id === 'HOU';
                        return true;
                      })
                      .map((house) => (
                        <div
                          key={house.id}
                          onClick={() => {
                            if (selectedWindCard.id === 'STE') useGhibli(house);
                            if (selectedWindCard.id === 'PEE') useMistral(house);
                          }}
                          className="p-3 bg-gray-700 cursor-pointer hover:scale-105"
                          style={{
                            width: '100px',
                            border: '3px solid #FF9800',
                            boxShadow: '3px 3px 0px rgba(0,0,0,0.5)'
                          }}
                        >
                          <div className="text-2xl text-center">🏠</div>
                          <div className="text-xs font-bold text-center text-white">{house.houseCard.name}</div>
                          {house.houseCard.public ? (
                            <div className="text-xs text-center text-yellow-300">{house.cards[0].name}</div>
                          ) : (
                            <div className="text-xs text-center text-gray-400">???</div>
                          )}
                        </div>
                      ))}
                  </div>
                </div>
              )}
              
              {/* Föhn Target Selection */}
              {selectedWindCard && selectedWindCard.id === 'RET' && (
                <div className="mb-4">
                  <div className="text-white mb-2">
                    2. 破壊する家を選択: (牢屋も可能)
                  </div>
                  <div className="flex gap-3 flex-wrap">
                    {players[1].houses.map((house) => (
                      <div
                        key={house.id}
                        onClick={() => useFohnOnHouse(house)}
                        className="p-3 bg-gray-700 cursor-pointer hover:scale-105"
                        style={{
                          width: '100px',
                          border: '3px solid #FF9800',
                          boxShadow: '3px 3px 0px rgba(0,0,0,0.5)'
                        }}
                      >
                        <div className="text-2xl text-center">🏠</div>
                        <div className="text-xs font-bold text-center text-white">{house.houseCard.name}</div>
                        {house.houseCard.public ? (
                          <div className="text-xs text-center text-yellow-300">{house.cards[0].name}</div>
                        ) : (
                          <div className="text-xs text-center text-gray-400">???</div>
                        )}
                      </div>
                    ))}
                  </div>
                </div>
              )}
              
              <div className="flex gap-4 justify-center mt-4">
                <button
                  onClick={() => {
                    setShowWindCardUI(false);
                    setSelectedWindCard(null);
                    setMessage('キャンセルしました');
                  }}
                  className="px-6 py-3 text-white font-bold"
                  style={{
                    background: '#666',
                    border: '3px solid white',
                    boxShadow: '3px 3px 0px rgba(0,0,0,0.5)'
                  }}
                >
                  キャンセル
                </button>
              </div>
            </div>
          </div>
        )}
        
        {/* Peek Result Display */}
        {peekResult && (
          <div className="fixed top-1/4 left-1/2 transform -translate-x-1/2 p-6 animate-pulse" style={{
            background: '#1a3a0f',
            border: '4px solid #ffd700',
            borderRadius: '8px',
            boxShadow: '0 0 30px rgba(255,215,0,0.5)',
            zIndex: 2000
          }}>
            <div className="text-white text-center">
              <div className="text-2xl font-bold mb-2">👁️ 覗見結果</div>
              <div className="text-lg">{peekResult.houseCard.name}</div>
              <div className="text-xl text-yellow-300 font-bold">{peekResult.cards[0].name}</div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}
    
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<HouseAndWindGame />);
  </script>
</body>
</html>
