            const { houseIdx, storedCard, houseCard } = bestAction;

            GameLogger.full(`[T${turn}] P0 decision: 鳥居回収 → ${storedCard.name}を取り出し`);

            // v6.6.1: 鳥居を削除せず、空鳥居として残す
            setHousesForPlayer(0, prev => prev.map((h, i) =>
              i === houseIdx ? { ...h, storedCard: null, retrievedTurn: turn } : h
            ));
            addLog(T.log.destroyedOwnHouse(playerName, houseCard.name, storedCard.name), 'action');

            let newHand = [...pH, storedCard];
            const result = processPairsSync(newHand, 0, { fireBanner: true });

            newHand = result.hand;
            if (GameLogic.checkWin(newHand)) { endGame(0, 'agari'); return; }
            setHand(0, newHand);
            setHasActioned(true);
            handleEndTurn();
            return;

          } else if (bestAction.type === 'house') {
            const { houseCard, character } = bestAction;

            GameLogger.full(`[T${turn}] P0 decision: 家格納 ${character.name} → ${houseCard.name}`);
            let newHand = players[0].hand.filter(c => c.uid !== houseCard.uid && c.uid !== character.uid);
            setHand(0, newHand);

            // v6.4: 家配置時は市場交換
            // 重要: marketRef.currentを使用（State更新の非同期問題回避）
            const currentMarket = marketRef.current;
            if (HOUSE_PROPERTIES[houseCard.id]?.marketExchange && currentMarket.length > 0) {
              const selectedMarketCard = selectBestMarketCard(currentMarket, { hand: players[0].hand });
              if (selectedMarketCard) {
                const newMarket = [...currentMarket, character].filter(c => c.uid !== selectedMarketCard.uid);
                marketRef.current = newMarket;  // 即座にref更新
                setMarket(newMarket);
                setHousesForPlayer(0, prev => [...prev, { houseCard, storedCard: selectedMarketCard, retrievedTurn: null }]);
                addLog(T.log.sentToMarket(playerName, character.name, selectedMarketCard.name), 'action');
                GameLogger.full(`[T${turn}] P0 stall exchange: ${character.name} → market, ${selectedMarketCard.name} → stall`);
              } else {
                setHousesForPlayer(0, prev => [...prev, { houseCard, storedCard: character, retrievedTurn: null }]);
                addLog(T.log.storedInHouse(playerName, houseCard.name));
              }
            } else {
              setHousesForPlayer(0, prev => [...prev, { houseCard, storedCard: character, retrievedTurn: null }]);
              addLog(T.log.storedInHouse(playerName, houseCard.name));
            }

            setHasActioned(true);
            if (GameLogic.checkWin(newHand)) { endGame(0, 'agari'); return; }
          }
          // else: bestAction.type === 'pass' → 何もしない

          handleEndTurn();
        } else { handleEndTurn(); }
      }
    }, 0);  // ディレイ0
    return () => clearTimeout(timer);
  }, [autoPlayMode, gameState, currentPlayerIndex, hasDrawn, hasActioned, phase, players, deck, effect, isProcessing, gameEnded, market, selectBestMarketCard]);

  // Auto continue - v1.8.0.5fix: useRefで重複防止
  useEffect(() => {
    if (!autoPlayMode) { autoPlayingRef.current = false; return; }

    // トーナメントモード
    if (tournamentMode) {
      // refを使って終了判定（非同期問題対策）
      if (tournamentCurrentRef.current >= tournamentProgress.total && tournamentProgress.total > 0) {
        // トーナメント終了
        setAutoPlayMode(false);
        setTournamentMode(false);
        tournamentModeRef.current = false; // fix: refも更新
        if (tournamentDataRef.current) {
          outputTournamentResults(tournamentDataRef.current);
          // NotationLogger - トーナメント終了サマリーを記録
          NotationLogger.recordTournamentEnd(tournamentDataRef.current);
          // トーナメントログ出力（summary.txt + 異常があれば anomalies.txt）
          NotationLogger.downloadTournamentLogs();
          setTournamentResults(tournamentDataRef.current);
        }
        // AnomalyDetector - トーナメント終了
        AnomalyDetector.endTournament();
        addLog(T.log.tournamentComplete(tournamentProgress.total), 'system');
        return;
      }
      if (gameState === 'gameOver' && !autoPlayingRef.current) {
        autoPlayingRef.current = true;
        // refを使って次のマッチを取得
        const matchIdx = tournamentCurrentRef.current;
        const matches = tournamentMatchesRef.current;
        if (matchIdx < matches.length) {
          const nextMatch = matches[matchIdx];
          // プレイヤーを設定してゲーム開始
          startTournamentGame(nextMatch);
        }
      }
      return;
    }

    // 通常オートプレイ
    if (autoPlayCount >= maxAutoPlayGames) { setAutoPlayMode(false); addLog(T.log.autoPlayComplete(autoPlayCount), 'system'); return; }
    if (gameState === 'gameOver' && !autoPlayingRef.current) {
      autoPlayingRef.current = true;
      setAutoPlayCount(prev => prev + 1);
      setGameNumber(prev => prev + 1);
      startGame();
    }
  }, [autoPlayMode, gameState, startGame, autoPlayCount, maxAutoPlayGames, addLog, tournamentMode, tournamentProgress, tournamentMatches, startTournamentGame]);

  // v2.0.3fix: 開始時にリセット（停止時は維持して再開可能に）
  useEffect(() => { if (autoPlayMode && !tournamentMode) setAutoPlayCount(0); }, [autoPlayMode, tournamentMode]);

  // トーナメントゲーム開始（v2.0ルール対応）
  const startTournamentGame = useCallback((matchParticipants) => {
    // matchParticipants: [{id, name, strategy, odIndex}] (odIndex = 元のID)
    const newPlayers = matchParticipants.map((p, idx) => ({
      id: idx,
      name: p.name,
      type: p.id === 'player' ? 'human' : 'ai',
      emoji: p.emoji || '👤',
      hand: [],
      houses: [],
      score: 0,
      strategy: p.strategy,
      individualStrategy: p.strategy,
      odIndex: p.odIndex // 元のIDを保持（統計用）
    }));

    // デッキ生成とシャッフル - v6.6: gameParamsで枚数動的設定
    const newDeck = GameLogic.createDeck(gameParams);
    for (let i = newDeck.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [newDeck[i], newDeck[j]] = [newDeck[j], newDeck[i]];
    }

    // 市場カード - v6.6: marketCountで枚数設定
    const marketCards = newDeck.splice(0, gameParams.marketCount);
    marketRef.current = marketCards;  // 即座にref更新
    setMarket(marketCards);

    // 初期手札配布（7枚ずつ）
    const numPlayers = newPlayers.length;
    for (let round = 0; round < 7; round++) {
      for (let p = 0; p < numPlayers; p++) {
        if (newDeck.length > 0) {
          newPlayers[p].hand.push(newDeck.shift());
        }
      }
    }

    // 初期ペア処理
    newPlayers.forEach((p, i) => {
      const result = processPairsSync(p.hand, i);
      newPlayers[i].hand = result.hand;
    });

    setPlayers([...newPlayers]);
    playersRef.current = newPlayers;
    setDeck(newDeck);
    deckRef.current = newDeck;

    setPhase(PHASES.EXPLORATION); phaseRef.current = PHASES.EXPLORATION;
    setTurn(1); turnRef.current = 1;
    setCurrentPlayerIndex(0); currentPlayerIndexRef.current = 0;
    resetTurnAction();
    setGameEnded(false); gameEndedRef.current = false; setRevealAllHands(false);
    setWinCount([0, 0, 0, 0]);
    setCumulativeScores([0, 0, 0, 0]);
    setFlyingCard(null);
    setDealingPhase('ready'); dealingPhaseRef.current = 'ready';
    setVictoryAnimation(null);

    // ゲーム内統計をリセット
    gameStatsRef.current = {
      destroyCount: 0,
      windUsed: 0,
      housePlaced: 0,
      marketExchanges: 0,
      explorationTurns: 0,
      babanukiTurns: 0,
      phaseTransitionTurn: 0,
      // v6.6.1新機能統計
      counterAttempts: 0,
      counterSuccess: 0,
      emptyStallCreated: 0,
      emptyStallRefilled: 0,
      emptyStallAttacked: 0,
      emptyStallRemaining: 0,
      windExhaustedTurn: null,
      stallExhaustedTurn: null
    };
    autoPlayingRef.current = false;

    // トーナメント時はセット制を無効化（新形式）
    setSetConfig({
      enabled: false,
      gamesPerSet: 4,
      totalSets: 0,
      currentSet: 1,
      currentGame: 0,
      setFirstPlayer: -1
    });

    setGameState('playing');
    setGameNumber(prev => prev + 1);

    // NotationLogger - ゲーム開始を記録
    NotationLogger.recordGameStart(newPlayers, marketCards, 0);
    NotationLogger.setTurn(1, PHASES.EXPLORATION);

    // AnomalyDetector - ゲーム開始
    AnomalyDetector.startGame(tournamentCurrentRef.current + 1, newPlayers);

    GameLogger.full(`[TOURNAMENT] Game ${tournamentCurrentRef.current + 1}/${tournamentProgress.total}: ${matchParticipants.map(p => p.name).join(' vs ')}`);
  }, [processPairsSync, tournamentProgress]);

  // トーナメント開始
  // 参加者数から総試合数を計算（nC4 = n*(n-1)*(n-2)*(n-3)/24）
  const calcTournamentGames = useCallback((participantCount, rounds) => {
    if (participantCount < 4) return 0;
    const c4 = participantCount * (participantCount - 1) * (participantCount - 2) * (participantCount - 3) / 24;
    return c4 * rounds;
  }, []);

  // 選択中の参加者数を計算
  const selectedParticipantCount = Object.values(tournamentParticipants).filter(v => v).length;
  const estimatedGames = calcTournamentGames(selectedParticipantCount, tournamentRounds);

  const startTournament = useCallback(() => {
    // 選択された参加者のみでリスト作成
    const participants = [];
    if (tournamentParticipants.player) {
      participants.push({ id: 'player', name: playerName, strategy: P0_DEFAULT_STRATEGY, emoji: '👤', odIndex: 'player' });
    }
    Object.entries(CRITICS).forEach(([id, c]) => {
      if (tournamentParticipants[id]) {
        const strat = getAiStrategy(id);
        participants.push({ id, name: c.name, strategy: strat, emoji: c.emoji, odIndex: id });
      }
    });

    // 4人未満の場合は開始しない
    if (participants.length < 4) {
      GameLogger.log('⚠️ トーナメントには最低4人の参加者が必要です');
      return;
    }

    // 組み合わせ生成
    const combinations = generateCombinations(participants, 4);

    // 総当たり回数分複製してシャッフル
    let allMatches = [];
    for (let r = 0; r < tournamentRounds; r++) {
      allMatches = allMatches.concat(combinations.map(c => [...c]));
    }
    // シャッフル
    for (let i = allMatches.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [allMatches[i], allMatches[j]] = [allMatches[j], allMatches[i]];
    }

    // データ初期化
    const data = initTournamentData(participants);
    tournamentDataRef.current = data;
    tournamentCurrentRef.current = 0; // fix: refも初期化
    tournamentMatchesRef.current = allMatches; // fix: マッチリストもrefに保存

    setTournamentMatches(allMatches);
    setTournamentProgress({ current: 0, total: allMatches.length });
    setTournamentResults(null);
    setAutoPlayMode(true);
    setTournamentMode(true);
    tournamentModeRef.current = true; // fix: refも設定

    GameLogger.log('');
    GameLogger.log(T.tournament.start.line1);
    GameLogger.log(T.tournament.start.line2);
    GameLogger.log(T.tournament.start.line3);
    GameLogger.log(`参加者: ${participants.length}人, 総当たり: ${tournamentRounds}回, 総ゲーム数: ${allMatches.length}`);
    GameLogger.log('');

    // NotationLogger - トーナメント開始を記録
    // logMode='detailed'ならユーザー指定で詳細ログ、それ以外は50試合以下で自動詳細
    const useDetailedLog = logMode === 'detailed' || (logMode === 'standard' && allMatches.length <= 50);
    NotationLogger.recordTournamentStart(participants, tournamentRounds, allMatches.length, useDetailedLog);

    // AnomalyDetector - トーナメント開始
    AnomalyDetector.startTournament();

    // 最初のゲーム開始
    if (allMatches.length > 0) {
      startTournamentGame(allMatches[0]);
    }
  }, [playerName, getAiStrategy, tournamentRounds, tournamentParticipants, generateCombinations, initTournamentData, startTournamentGame, logMode]);

  // セット終了時の統計更新（N人×1ゲーム=1セット、累積スコアで勝敗判定）
  const setWinnerRef = useRef(-1);
  const setCompletedRef = useRef(false); // セット完了フラグ

  useEffect(() => {
    // 無制限モードまたはセット無効の場合はスキップ
    if (setConfig.totalSets === 0 || !setConfig.enabled) return;
    if (gameState !== 'gameOver') return;

    // セット内のゲーム数をチェック（currentGameは0始まりなので+1と比較）
    const gamesPlayed = setConfig.currentGame;  // endGame後に更新される
    const isSetComplete = gamesPlayed >= setConfig.gamesPerSet;

    if (isSetComplete && !setCompletedRef.current) {
      setCompletedRef.current = true;

      // 累積スコアで勝者判定
      const maxScore = Math.max(...cumulativeScores);
      const topPlayers = cumulativeScores.map((s, i) => ({ idx: i, score: s, wins: winCount[i] || 0 }))
        .filter(p => p.score === maxScore);

      let winner;
      if (topPlayers.length === 1) {
        // 単独トップ
        winner = topPlayers[0].idx;
      } else {
        // 同点の場合は勝利数で判定
        const maxWins = Math.max(...topPlayers.map(p => p.wins));
        winner = topPlayers.find(p => p.wins === maxWins)?.idx ?? topPlayers[0].idx;
      }

      const playerWonSet = winner === 0;
      setStatistics(prev => ({
        ...prev,
        setsPlayed: (prev.setsPlayed || 0) + 1,
        setsWon: playerWonSet ? (prev.setsWon || 0) + 1 : (prev.setsWon || 0)
      }));

      // NotationLogger - セット終了を記録
      NotationLogger.recordSetEnd(winner, playersRef.current, winCount, cumulativeScores, setConfig);

      setWinnerRef.current = winner;
    }
  }, [setConfig, gameState, cumulativeScores, winCount]);

  // セットリセット時にrefもリセット
  useEffect(() => {
    if (gameState === 'menu' || (setConfig.currentGame === 0 && winCount.every(w => w === 0))) {
      setWinnerRef.current = -1;
      setCompletedRef.current = false;
    }
  }, [gameState, setConfig.currentGame, winCount]);

  const handleStopAutoPlay = () => { setAutoPlayMode(false); addLog(T.log.autoPlayStop(autoPlayCount), 'system'); };

  // オートプレイ再開ハンドラ（スリープ復帰後などに使用）
  const handleResumeAutoPlay = () => {
    if (autoPlayMode) return; // 既にオート中なら何もしない
    setAutoPlayMode(true);
    addLog(T.log.autoPlayResume(autoPlayCount), 'system');
    // 現在のゲーム状態に応じて適切な処理を再開
    if (gameState === 'gameOver') {
      // ゲーム終了画面なら次のゲームを開始
      setAutoPlayCount(prev => prev + 1);
      setGameNumber(prev => prev + 1);
      startGame();
    }
    // playing中なら useEffect が自動的に再開する
  };

  // トーナメント再開ハンドラ
  const handleResumeTournament = () => {
    if (autoPlayMode) return; // 既にオート中なら何もしない
    setAutoPlayMode(true);
    addLog(T.log.tournamentResume(tournamentProgress.current, tournamentProgress.total), 'system');
    // playing中なら useEffect が自動的に次のゲームを開始する
  };

  // Render

  // 統計詳細画面
  if (gameState === 'stats') {
    const winRate = statistics.gamesPlayed > 0 ? Math.round((statistics.gamesWon / statistics.gamesPlayed) * 100) : 0;
    const setWinRate = statistics.setsPlayed > 0 ? Math.round((statistics.setsWon / statistics.setsPlayed) * 100) : 0;
    const explorationRate = statistics.gamesPlayed > 0 ? Math.round((statistics.gamesEndedInExploration / statistics.gamesPlayed) * 100) : 0;
    return (
      <div className="menu-container">
        <div className="overlay-base menu-overlay">
          <div className="menu-box" style={{ width: 'calc(65 * var(--unit-x))' }}>
            <div className="menu-title">📊 統計詳細</div>
            <div className="menu-subtitle">{playerName}のプレイ記録</div>

            {/* セット統計 */}
            <div style={{ background: 'var(--color-cream)', padding: 'calc(1 * var(--unit-y)) calc(1.5 * var(--unit-x))', marginBottom: 'calc(1 * var(--unit-y))', border: '1px solid var(--color-dusty-pink)', textAlign: 'left' }}>
              <div style={{ fontWeight: 'bold', marginBottom: 'calc(0.5 * var(--unit-y))', fontSize: 'var(--overlay-text-size)', color: 'var(--color-burgundy)' }}>🏆 セット統計</div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '4px calc(1.5 * var(--unit-x))', fontSize: 'var(--menu-label-size)', color: 'var(--color-charcoal)' }}>
                <div>{T.ui.statsScreen.setsPlayed}: <b>{statistics.setsPlayed || 0}</b></div>
                <div>{T.ui.statsScreen.setsWon}: <b>{statistics.setsWon || 0}</b> ({setWinRate}%)</div>
              </div>
            </div>

            {/* ゲーム統計 */}
            <div style={{ background: 'var(--color-cream)', padding: 'calc(1 * var(--unit-y)) calc(1.5 * var(--unit-x))', marginBottom: 'calc(1 * var(--unit-y))', border: '1px solid var(--color-dusty-pink)', textAlign: 'left' }}>
              <div style={{ fontWeight: 'bold', marginBottom: 'calc(0.5 * var(--unit-y))', fontSize: 'var(--overlay-text-size)', color: 'var(--color-burgundy)' }}>🎮 ゲーム統計</div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '4px calc(1.5 * var(--unit-x))', fontSize: 'var(--menu-label-size)', color: 'var(--color-charcoal)' }}>
                <div>{T.ui.statsScreen.gamesPlayed}: <b>{statistics.gamesPlayed}</b></div>
                <div>{T.ui.statsScreen.gamesWon}: <b>{statistics.gamesWon}</b> ({winRate}%)</div>
                <div>{T.ui.statsScreen.scoreEarned}: <b style={{ color: 'var(--color-gold)' }}>+{statistics.totalScoreEarned || 0}</b></div>
                <div>{T.ui.statsScreen.scoreLost}: <b style={{ color: 'var(--color-burgundy)' }}>-{statistics.totalScoreLost || 0}</b></div>
                <div>{T.ui.statsScreen.netProfit}: <b style={{ color: (statistics.totalScoreEarned || 0) - (statistics.totalScoreLost || 0) >= 0 ? 'var(--color-gold)' : 'var(--color-burgundy)' }}>{(statistics.totalScoreEarned || 0) - (statistics.totalScoreLost || 0) >= 0 ? '+' : ''}{(statistics.totalScoreEarned || 0) - (statistics.totalScoreLost || 0)}</b></div>
              </div>
            </div>

            {/* フェーズ別 */}
            <div style={{ background: 'var(--color-cream)', padding: 'calc(1 * var(--unit-y)) calc(1.5 * var(--unit-x))', marginBottom: 'calc(1 * var(--unit-y))', border: '1px solid var(--color-dusty-pink)', textAlign: 'left' }}>
              <div style={{ fontWeight: 'bold', marginBottom: 'calc(0.5 * var(--unit-y))', fontSize: 'var(--overlay-text-size)', color: 'var(--color-burgundy)' }}>📍 フェーズ別終了</div>
              <div style={{ display: 'flex', gap: 'calc(2 * var(--unit-x))', fontSize: 'var(--menu-label-size)', color: 'var(--color-charcoal)' }}>
                <div>{T.ui.statsScreen.explorationPhase}: <b>{statistics.gamesEndedInExploration || 0}</b> ({explorationRate}%)</div>
                <div>{T.ui.statsScreen.babanukiPhase}: <b>{statistics.gamesEndedInBabanuki || 0}</b> ({100 - explorationRate}%)</div>
              </div>
            </div>

            {/* 順位分布 */}
            <div style={{ background: 'var(--color-cream)', padding: 'calc(1 * var(--unit-y)) calc(1.5 * var(--unit-x))', marginBottom: 'calc(1.5 * var(--unit-y))', border: '1px solid var(--color-dusty-pink)', textAlign: 'left' }}>
              <div style={{ fontWeight: 'bold', marginBottom: 'calc(0.5 * var(--unit-y))', fontSize: 'var(--overlay-text-size)', color: 'var(--color-burgundy)' }}>🥇 順位分布</div>
              <div style={{ display: 'flex', gap: 'calc(1.5 * var(--unit-x))', fontSize: 'var(--menu-label-size)', color: 'var(--color-charcoal)' }}>
                <div>1位: <b>{statistics.finishPositions?.[1] || 0}</b></div>
                <div>2位: <b>{statistics.finishPositions?.[2] || 0}</b></div>
                <div>3位: <b>{statistics.finishPositions?.[3] || 0}</b></div>
                <div>4位: <b>{statistics.finishPositions?.[4] || 0}</b></div>
              </div>
            </div>

            <button className="menu-button" onClick={() => { setMenuStep('title'); setGameState('menu'); }}>{T.ui.backToMenu}</button>
          </div>
        </div>
      </div>
    );
  }

  if (gameState === 'menu') {
    // Phase 5: 2画面メニュー（タイトル + ロビー）+ プロフィールモーダル
    const numPlayersForSet = selectedOpponents.length + 1;
    const remaining = 3 - selectedOpponents.length;
    const canStart = remaining === 0;

    // ===== タイトル画面 =====
    if (menuStep === 'title') {
      return (
        <div className="menu-container">
          {/* Phase 5/Step 6: 風パーティクル背景（menu-overlayの後ろ, z-index:1） */}
          <WindParticleLayer onBlastStart={blastRef} />
          <div className="overlay-base menu-overlay">
            {/* プロフィールアイコン（右上） */}
            <button type="button" className="profile-icon" style={{ top: 16, right: 8 }}
              aria-label={T.ui.profileChange || 'プロフィール変更'}
              onClick={() => setShowProfileModal(true)}>
              <span className="emoji">{playerEmoji}</span>
              <span>{playerName}</span>
            </button>

            <div className="menu-box anim-fade-in" style={{ width: 280, maxWidth: '90%', padding: '20px 24px' }}>
              <div className="menu-title logo" onClick={handleTitleClick}>pfff!</div>
              <div className="menu-subtitle">{VERSION.string}～Stay Stall～</div>
              <button className="menu-button primary" onClick={(e) => {
                if (blastRef.current) {
                  blastRef.current(e.currentTarget);
                  setTimeout(() => setMenuStep('lobby'), 1200);
                } else {
                  setMenuStep('lobby');
                }
              }}>🎮 {T.ui.startGame || 'ゲーム開始'}</button>
              <div className="bottom-links">
                <button type="button" className="bottom-link" onClick={() => { /* ルール表示 — 将来実装 */ }}>📖 {T.ui.rules || 'ルール'}</button>
                <button type="button" className="bottom-link" onClick={() => { switchLanguage(T === LANG.ja ? 'en' : 'ja'); }}>🌐 {T === LANG.ja ? 'English' : '日本語'}</button>
              </div>
            </div>

            {/* デバッグパネル（トリプルクリックで表示） */}
            {showDebugOptions && (
              <div className="modal-overlay" onClick={() => setShowDebugOptions(false)}>
                <div className="modal-box" style={{ width: 520, maxWidth: '95%', padding: '10px 14px', textAlign: 'left' }} onClick={e => e.stopPropagation()}>
                  <div style={{ fontSize: 12, color: 'var(--color-burgundy)', fontWeight: 'bold', textAlign: 'center', marginBottom: 4 }}>🛠️ {T.ui.debugMode}</div>
                  <div style={{ background: 'var(--color-dusty-pink)', padding: 8, border: '1px solid var(--color-burgundy)', borderRadius: 5 }}>

                  {/* トーナメント/オートプレイ */}
                  <div style={{ background: 'rgba(255,255,255,0.6)', padding: '4px 6px', borderRadius: 4, marginBottom: 3 }}>
                    <label style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 5, cursor: 'pointer', color: 'var(--color-burgundy)', fontSize: 9, fontWeight: 'bold', minHeight: 32 }}>
                      <input type="checkbox" checked={tournamentMode} onChange={(e) => setTournamentMode(e.target.checked)} />
                      {T.ui.runTournament}
                    </label>

                    {tournamentMode && (
                      <>
                        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 4, marginTop: 2 }}>
                          <span style={{ fontSize: 7, color: 'var(--color-burgundy)' }}>{T.ui.tournamentSettings.roundRobinCount}:</span>
                          <div style={{ display: 'flex', gap: 3 }}>
                            {[1, 2, 3].map(r => (
                              <button key={r} onClick={() => setTournamentRounds(r)}
                                className={`set-btn${tournamentRounds === r ? ' active' : ''}`}
                                style={{ minHeight: 44, minWidth: 44, padding: '6px 12px', fontSize: 9 }}>{r}{T.ui.roundsLabel}</button>
                            ))}
                          </div>
                        </div>

                        {/* 参加者選択 */}
                        <div style={{ marginTop: 8, padding: '6px 8px', background: 'rgba(255,255,255,0.5)', borderRadius: 4 }}>
                          <div style={{ fontSize: 'var(--menu-hint-size)', color: 'var(--color-burgundy)', marginBottom: 4, textAlign: 'center' }}>
                            参加者選択（{selectedParticipantCount}人 → {estimatedGames}試合{estimatedGames <= 50 ? ' 📝詳細ログ' : ''}）
                          </div>
                          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4, justifyContent: 'center' }}>
                            {/* プレイヤー */}
                            <label style={{ display: 'flex', alignItems: 'center', gap: 2, cursor: 'pointer', fontSize: 'var(--menu-hint-size)', color: 'var(--color-burgundy)', padding: '2px 6px', background: tournamentParticipants.player ? 'rgba(212,175,55,0.3)' : 'rgba(128,128,128,0.1)', borderRadius: 3 }}>
                              <input type="checkbox" checked={tournamentParticipants.player} onChange={(e) => setTournamentParticipants(prev => ({ ...prev, player: e.target.checked }))} style={{ margin: 0 }} />
                              👤{playerName.slice(0,4)}
                            </label>
                            {/* AI */}
                            {Object.entries(CRITICS).map(([id, c]) => (
                              <label key={id} style={{ display: 'flex', alignItems: 'center', gap: 2, cursor: 'pointer', fontSize: 'var(--menu-hint-size)', color: 'var(--color-burgundy)', padding: '2px 6px', background: tournamentParticipants[id] ? 'rgba(212,175,55,0.3)' : 'rgba(128,128,128,0.1)', borderRadius: 3 }}>
                                <input type="checkbox" checked={tournamentParticipants[id]} onChange={(e) => setTournamentParticipants(prev => ({ ...prev, [id]: e.target.checked }))} style={{ margin: 0 }} />
                                {c.emoji}{c.name.slice(0,3)}
                              </label>
                            ))}
                          </div>
                          {/* 全選択/全解除 */}
                          <div style={{ display: 'flex', justifyContent: 'center', gap: 8, marginTop: 4 }}>
                            <button onClick={() => { const all = { player: true }; Object.keys(CRITICS).forEach(id => { all[id] = true; }); setTournamentParticipants(all); }}
                              style={{ fontSize: '10px', padding: '1px 6px', cursor: 'pointer', border: '1px solid var(--color-burgundy)', background: '#fff', borderRadius: 2, color: 'var(--color-burgundy)' }}>全員</button>
                            <button onClick={() => { const none = { player: false }; Object.keys(CRITICS).forEach(id => { none[id] = false; }); setTournamentParticipants(none); }}
                              style={{ fontSize: '10px', padding: '1px 6px', cursor: 'pointer', border: '1px solid var(--color-burgundy)', background: '#fff', borderRadius: 2, color: 'var(--color-burgundy)' }}>解除</button>
                          </div>
                          {selectedParticipantCount < 4 && (
                            <div style={{ fontSize: '10px', color: '#c00', textAlign: 'center', marginTop: 4 }}>⚠️ 4人以上を選択してください</div>
                          )}
                        </div>
                      </>
                    )}

                    {!tournamentMode && (() => {
                      const linesPerGame = logMode === 'detailed' ? 400 : (logMode === 'standard' ? 103 : 50);
                      const maxGamesForLogs = Math.floor(UnifiedLogger.maxLogs / linesPerGame);
                      return (
                        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, marginTop: 6 }}>
                          <span style={{ fontSize: 'var(--menu-hint-size)', color: 'var(--color-burgundy)' }}>{T.ui.tournamentSettings.autoPlayCount}:</span>
                          <input type="number" min="1" max={maxGamesForLogs} value={maxAutoPlayGames}
                            onChange={(e) => setMaxAutoPlayGames(Math.max(1, Math.min(maxGamesForLogs, parseInt(e.target.value) || 1)))}
                            style={{ width: 55, padding: '3px 6px', fontSize: 'var(--menu-hint-size)', border: '1px solid var(--color-burgundy)', textAlign: 'center', background: '#fff', borderRadius: 3 }} />
                          <span style={{ fontSize: 'var(--menu-hint-size)', color: 'var(--color-warm-gray)' }}>/ {maxGamesForLogs}</span>
                        </div>
                      );
                    })()}
                  </div>

                  {/* v6.6: カード枚数設定 */}
                  <div style={{ background: 'rgba(255,255,255,0.6)', padding: 'calc(0.5 * var(--unit-y)) calc(1 * var(--unit-x))', borderRadius: 6, marginBottom: 'calc(0.5 * var(--unit-y))' }}>
                    <div style={{ fontSize: 'var(--menu-text-size)', color: 'var(--color-burgundy)', marginBottom: 8, fontWeight: 'bold', textAlign: 'center' }}>{T.ui.gameParamsSection}</div>

                    {/* プリセットボタン */}
                    <div style={{ display: 'flex', justifyContent: 'center', gap: 6, marginBottom: 10, flexWrap: 'wrap' }}>
                      {[
                        { key: 'standard', label: T.ui.presetStandard },
                        { key: 'strategic', label: T.ui.presetStrategic },
                        { key: 'fair', label: T.ui.presetFair },
                        { key: 'intense', label: T.ui.presetIntense },
                      ].map(preset => {
                        const isActive = gameParams.marketCount === GAME_PRESETS[preset.key].marketCount &&
                                        gameParams.windCount === GAME_PRESETS[preset.key].windCount &&
                                        gameParams.stallCount === GAME_PRESETS[preset.key].stallCount;
                        return (
                          <button key={preset.key} onClick={() => setGameParams(GAME_PRESETS[preset.key])}
                            style={{ padding: '4px 10px', fontSize: 'var(--menu-hint-size)', border: '1px solid var(--color-burgundy)',
                              background: isActive ? 'var(--color-gold)' : '#fff',
                              color: isActive ? '#fff' : 'var(--color-burgundy)',
                              cursor: 'pointer', borderRadius: 4, fontWeight: isActive ? 'bold' : 'normal' }}>{preset.label}</button>
                        );
                      })}
                    </div>

                    {/* 市場/風/鳥居スライダー */}
                    {[
                      { key: 'marketCount', label: T.ui.marketCount },
                      { key: 'windCount', label: T.ui.windCount },
                      { key: 'stallCount', label: T.ui.stallCount },
                    ].map(item => (
                      <div key={item.key} style={{ marginBottom: 6 }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                          <span style={{ fontSize: 'var(--menu-hint-size)', color: 'var(--color-burgundy)', minWidth: 45, textAlign: 'right' }}>{item.label}:</span>
                          <input type="range" min="2" max="8" value={gameParams[item.key]}
                            onChange={(e) => setGameParams(prev => ({ ...prev, [item.key]: parseInt(e.target.value) }))}
                            style={{ flex: 1, accentColor: 'var(--color-gold)', minWidth: 100 }} />
                          <span style={{ fontSize: 'var(--menu-text-size)', fontWeight: 'bold', color: 'var(--color-gold)', minWidth: 24, textAlign: 'center' }}>{gameParams[item.key]}</span>
                        </div>
                      </div>
                    ))}
                  </div>

                  {/* ログ/アニメーション設定 */}
                  <div style={{ background: 'rgba(255,255,255,0.6)', padding: 'calc(0.5 * var(--unit-y)) calc(1 * var(--unit-x))', borderRadius: 6, marginBottom: 'calc(0.5 * var(--unit-y))' }}>
                    <div style={{ fontSize: 'var(--menu-text-size)', color: 'var(--color-burgundy)', marginBottom: 6, fontWeight: 'bold', textAlign: 'center' }}>{T.ui.logSettings}</div>
                    <div style={{ display: 'flex', justifyContent: 'center', gap: 12, marginBottom: 8 }}>
                      {[
                        { mode: 'simple', ...T.settingsLabels.logModes.simple },
                        { mode: 'standard', ...T.settingsLabels.logModes.standard },
                        { mode: 'detailed', ...T.settingsLabels.logModes.detailed },
                      ].map(opt => (
                        <label key={opt.mode} style={{ display: 'flex', alignItems: 'center', gap: 4, cursor: 'pointer', color: 'var(--color-burgundy)', fontSize: 'var(--menu-hint-size)' }}>
                          <input type="radio" name="logMode" checked={logMode === opt.mode} onChange={() => handleLogModeChange(opt.mode)} />
                          {opt.label}
                        </label>
                      ))}
                    </div>
                    <div style={{ display: 'flex', justifyContent: 'center', gap: 16 }}>
                      <label style={{ display: 'flex', alignItems: 'center', gap: 4, cursor: 'pointer', color: 'var(--color-burgundy)', fontSize: 'var(--menu-hint-size)' }}>
                        <input type="checkbox" checked={animSettings.autoPlayAnim} onChange={(e) => setAnimSettings(prev => ({ ...prev, autoPlayAnim: e.target.checked }))} />
                        {T.ui.showAnimHighSpeed}
                      </label>
                      <label style={{ display: 'flex', alignItems: 'center', gap: 4, cursor: 'pointer', color: 'var(--color-burgundy)', fontSize: 'var(--menu-hint-size)' }}>
                        <input type="checkbox" checked={AISpeechSystem.enabled} onChange={(e) => {
                          AISpeechSystem.enabled = e.target.checked;
                          setAnimSettings(prev => ({ ...prev }));
                        }} />
                        {T.ui.showAiThoughts}
                      </label>
                    </div>
                  </div>

                  {/* 下部: ボタン類 */}
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 'calc(0.5 * var(--unit-y))' }}>
                    <button onClick={() => switchLanguage(currentLang === 'ja' ? 'en' : 'ja')}
                      style={{ padding: '4px 12px', fontSize: 'var(--menu-hint-size)', border: '1px solid var(--color-burgundy)',
                        background: '#fff', color: 'var(--color-burgundy)', cursor: 'pointer', borderRadius: 4 }}>
                      {currentLang === 'ja' ? '🇬🇧 English' : '🇯🇵 日本語'}
                    </button>
                    <div style={{ display: 'flex', gap: 8 }}>
                      <button className="menu-button" onClick={() => { setAutoPlayMode(false); setTournamentMode(false); setShowDebugOptions(false); }}
                        style={{ padding: '6px 20px', fontSize: 'var(--menu-text-size)' }}>{T.ui.cancel}</button>
                      <button className="menu-button primary"
                        onClick={() => {
                          if (tournamentMode) {
                            startTournament();
                          } else {
                            setAutoPlayMode(true); setAutoPlayCount(0); setMenuStep('lobby');
                          }
                          setShowDebugOptions(false);
                        }}
                        style={{ padding: '6px 20px', fontSize: 'var(--menu-text-size)' }}>{tournamentMode ? T.ui.startBtn : T.ui.settings}</button>
                    </div>
                  </div>
                  </div>
                </div>
              </div>
            )}
          </div>

          {/* プロフィールモーダル（タイトル画面用） */}
          {showProfileModal && (
            <div className="modal-overlay" onClick={() => setShowProfileModal(false)}>
              <div className="modal-box" style={{ width: 320, maxWidth: '90%', padding: '14px 18px' }} onClick={e => e.stopPropagation()}>
                <div className="menu-title" style={{ fontSize: 14 }}>{T.ui.profileChange || 'プロフィール変更'}</div>
                <ProfileModalContent
                  playerName={playerName}
                  playerEmoji={playerEmoji}
                  onSave={saveProfile}
                  onCancel={() => setShowProfileModal(false)}
                />
              </div>
            </div>
          )}
        </div>
      );
    }

    // ===== ロビー画面 =====
    if (menuStep === 'lobby') {
      return (
        <div className="menu-container">
          <WindParticleLayer onBlastStart={blastRef} />
          <div className="overlay-base menu-overlay">
            <div className="menu-box anim-fade-in" style={{ width: 480, maxWidth: '95%' }}>
              <div className="menu-title">{T.ui.opponentSelect || '対戦相手を選んでください'}</div>
              <div className="menu-subtitle">{remaining > 0 ? (T.ui.opponentHintRemaining ? T.ui.opponentHintRemaining(remaining) : `3人を選択（残り${remaining}人）`) : (T.ui.opponentHintComplete || '3人を選択（残り0人）')}</div>

              {/* AIクリティック選択グリッド — 5列 */}
              <div className="critic-grid cols-5">
                {Object.entries(CRITICS).map(([id, c]) => {
                  const isSelected = selectedOpponents.includes(id);
                  const isCustomized = aiIndividualStrategies[id] !== undefined;
                  return (
                    <button
                      key={id}
                      type="button"
                      className={`critic-card${isSelected ? ' selected' : ''}`}
                      aria-label={`${c.name} ${c.title}${isSelected ? ' 選択済み' : ''}`}
                      aria-pressed={isSelected}
                      onClick={() => handleAiCardClick(id, isSelected)}
                    >
                      <div className="check-mark">✓</div>
                      <div className="critic-emoji">{c.emoji}</div>
                      <div className="critic-name">{c.name}</div>
                      <div className="critic-title">{c.title}</div>
                      {isCustomized && (
                        <div style={{
                          position: 'absolute', top: 2, right: 2,
                          fontSize: 'var(--menu-hint-size)', background: 'var(--color-gold)',
                          color: '#fff', padding: '1px 3px', borderRadius: 2
                        }}>⚙️</div>
                      )}
                    </button>
                  );
                })}
              </div>

              {/* セット数選択 */}
              <div style={{ fontSize: 10, color: 'var(--color-warm-gray)', margin: '8px 0 4px' }}>{T.ui.setConfig || 'セット数'}</div>
              <div className="set-buttons">
                {[1, 3, 5, 0].map(sets => (
                  <button
                    key={sets}
                    type="button"
                    className={`set-btn${setConfig.totalSets === sets ? ' active' : ''}`}
                    onClick={() => setSetConfig(prev => ({
                      ...prev,
                      totalSets: sets,
                      gamesPerSet: numPlayersForSet,
                      currentSet: 1,
                      currentGame: 0,
                      setFirstPlayer: -1
                    }))}
                  >
                    {T.settingsLabels.setCount(sets)}
                  </button>
                ))}
              </div>

              {/* ボタン行 */}
              <div className="btn-row" style={{ marginTop: 10 }}>
                <button className="menu-button" onClick={() => setMenuStep('title')}
                  style={{ padding: '10px 20px' }}>{T.ui.back}</button>
                <button
                  className={`menu-button primary${!canStart ? ' disabled' : ''}`}
                  onClick={(e) => { if (!canStart) return; if (blastRef.current) { blastRef.current(e.currentTarget); setTimeout(() => startGame(), 1200); } else { startGame(); } }}
                  disabled={!canStart}
                  aria-disabled={!canStart}
                  style={{ padding: '10px 20px' }}
                >🎮 {T.ui.startGame}</button>
              </div>

              {/* 理由テキスト（3人未選択時） */}
              {!canStart && (
                <div className="reason-text" style={{ textAlign: 'center' }}>
                  {T.ui.moreNeeded ? T.ui.moreNeeded(remaining) : `あと${remaining}人選んでください`}
                </div>
              )}
            </div>
          </div>

          {/* AI戦略モーダル（トリプルクリック） */}
          {editingAiId && CRITICS[editingAiId] && (
            <div style={{
              position: 'fixed', top: 0, left: 0, right: 0, bottom: 0,
              background: 'rgba(0,0,0,0.7)', display: 'flex',
              alignItems: 'center', justifyContent: 'center', zIndex: 1000
            }} onClick={() => setEditingAiId(null)}>
              <div style={{
                background: 'var(--color-cream)', border: '3px solid var(--color-burgundy)',
                padding: 'calc(1.5 * var(--unit-y)) calc(2 * var(--unit-x))',
                minWidth: 300, maxWidth: 340, maxHeight: '90vh', overflowY: 'auto'
              }} onClick={e => e.stopPropagation()}>
                <div style={{ fontSize: 'var(--menu-title-size)', fontWeight: 'bold', color: 'var(--color-burgundy)', marginBottom: 4, textAlign: 'center' }}>
                  ⚙️ {CRITICS[editingAiId].emoji} {CRITICS[editingAiId].name}
                </div>
                <div style={{ fontSize: 'var(--menu-text-size)', color: 'var(--color-warm-gray)', marginBottom: 12, textAlign: 'center' }}>
                  {CRITICS[editingAiId].title}の戦略設定
                </div>

                {/* 1. 家カード選好 */}
                <div style={{ marginBottom: 10 }}>
                  <div style={{ fontSize: 'var(--menu-text-size)', color: 'var(--color-burgundy)', marginBottom: 4, fontWeight: 'bold' }}>{T.ui.houseCardPref}</div>
                  <div style={{ display: 'flex', gap: 3, flexWrap: 'wrap' }}>
                    {[T.settingsLabels.houseTypes?.house].filter(Boolean).map(opt => (
                      <button key={opt.value}
                        onClick={() => setAiIndividualStrategies(prev => ({ ...prev, [editingAiId]: { ...getAiStrategy(editingAiId), housePreference: opt.value } }))}
                        style={{ padding: '3px 6px', fontSize: 'var(--menu-hint-size)', border: '1px solid var(--color-burgundy)',
                          background: getAiStrategy(editingAiId).housePreference === opt.value ? 'var(--color-gold)' : '#fff',
                          color: getAiStrategy(editingAiId).housePreference === opt.value ? '#fff' : 'var(--color-burgundy)',
                          cursor: 'pointer', borderRadius: 2 }}
                      >{opt.label}</button>
                    ))}
                  </div>
                </div>

                {/* 2. 格納点数閾値 */}
                <div style={{ marginBottom: 10 }}>
                  <div style={{ fontSize: 'var(--menu-text-size)', color: 'var(--color-burgundy)', marginBottom: 4, fontWeight: 'bold' }}>📊 格納点数閾値（何点以上を格納）</div>
                  <div style={{ display: 'flex', gap: 3 }}>
                    {[1, 2, 3, 4, 5].map(v => (
                      <button key={v}
                        onClick={() => setAiIndividualStrategies(prev => ({ ...prev, [editingAiId]: { ...getAiStrategy(editingAiId), storeThreshold: v } }))}
                        style={{ padding: '3px 8px', fontSize: 'var(--menu-text-size)', border: '1px solid var(--color-burgundy)',
                          background: getAiStrategy(editingAiId).storeThreshold === v ? 'var(--color-gold)' : '#fff',
                          color: getAiStrategy(editingAiId).storeThreshold === v ? '#fff' : 'var(--color-burgundy)',
                          cursor: 'pointer', borderRadius: 2 }}
                      >{v}点+</button>
                    ))}
                  </div>
                </div>

                {/* 3. 攻撃対象選好 */}
                <div style={{ marginBottom: 10 }}>
                  <div style={{ fontSize: 'var(--menu-text-size)', color: 'var(--color-burgundy)', marginBottom: 4, fontWeight: 'bold' }}>{T.ui.attackTargetPref}</div>
                  <div style={{ display: 'flex', gap: 3, flexWrap: 'wrap' }}>
                    {[T.settingsLabels.attackTargets.highValue, T.settingsLabels.attackTargets.random].filter(Boolean).map(opt => (
                      <button key={opt.value}
                        onClick={() => setAiIndividualStrategies(prev => ({ ...prev, [editingAiId]: { ...getAiStrategy(editingAiId), attackTarget: opt.value } }))}
                        style={{ padding: '3px 6px', fontSize: 'var(--menu-hint-size)', border: '1px solid var(--color-burgundy)',
                          background: getAiStrategy(editingAiId).attackTarget === opt.value ? 'var(--color-gold)' : '#fff',
                          color: getAiStrategy(editingAiId).attackTarget === opt.value ? '#fff' : 'var(--color-burgundy)',
                          cursor: 'pointer', borderRadius: 2 }}
                      >{opt.label}</button>
                    ))}
                  </div>
                </div>

                {/* 4. 投機的家格納 */}
                <div style={{ marginBottom: 10 }}>
                  <div style={{ fontSize: 'var(--menu-text-size)', color: 'var(--color-burgundy)', marginBottom: 4, fontWeight: 'bold' }}>🎲 投機的家格納</div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                    <input type="range" min="0" max="100" value={getAiStrategy(editingAiId).speculativeHouse}
                      onChange={(e) => setAiIndividualStrategies(prev => ({ ...prev, [editingAiId]: { ...getAiStrategy(editingAiId), speculativeHouse: parseInt(e.target.value) } }))}
                      style={{ flex: 1, accentColor: 'var(--color-gold)' }} />
                    <span style={{ fontSize: 'var(--menu-label-size)', color: 'var(--color-burgundy)', minWidth: 35 }}>{getAiStrategy(editingAiId).speculativeHouse}%</span>
                  </div>
                  <div style={{ display: 'flex', gap: 2, marginTop: 3 }}>
                    {[0, 25, 50, 75, 100].map(v => (
                      <button key={v} onClick={() => setAiIndividualStrategies(prev => ({ ...prev, [editingAiId]: { ...getAiStrategy(editingAiId), speculativeHouse: v } }))}
                        style={{ padding: '1px 4px', fontSize: 'var(--menu-hint-size)', border: '1px solid var(--color-burgundy)',
                          background: getAiStrategy(editingAiId).speculativeHouse === v ? 'var(--color-gold)' : '#fff',
                          color: getAiStrategy(editingAiId).speculativeHouse === v ? '#fff' : 'var(--color-burgundy)',
                          cursor: 'pointer', borderRadius: 2 }}>{v}%</button>
                    ))}
                  </div>
                </div>

                {/* 5. 投機的風カード */}
                <div style={{ marginBottom: 12 }}>
                  <div style={{ fontSize: 'var(--menu-text-size)', color: 'var(--color-burgundy)', marginBottom: 4, fontWeight: 'bold' }}>🌀 投機的風カード</div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                    <input type="range" min="0" max="100" value={getAiStrategy(editingAiId).speculativeWind}
                      onChange={(e) => setAiIndividualStrategies(prev => ({ ...prev, [editingAiId]: { ...getAiStrategy(editingAiId), speculativeWind: parseInt(e.target.value) } }))}
                      style={{ flex: 1, accentColor: 'var(--color-gold)' }} />
                    <span style={{ fontSize: 'var(--menu-label-size)', color: 'var(--color-burgundy)', minWidth: 35 }}>{getAiStrategy(editingAiId).speculativeWind}%</span>
                  </div>
                  <div style={{ display: 'flex', gap: 2, marginTop: 3 }}>
                    {[0, 25, 50, 75, 100].map(v => (
                      <button key={v} onClick={() => setAiIndividualStrategies(prev => ({ ...prev, [editingAiId]: { ...getAiStrategy(editingAiId), speculativeWind: v } }))}
                        style={{ padding: '1px 4px', fontSize: 'var(--menu-hint-size)', border: '1px solid var(--color-burgundy)',
                          background: getAiStrategy(editingAiId).speculativeWind === v ? 'var(--color-gold)' : '#fff',
                          color: getAiStrategy(editingAiId).speculativeWind === v ? '#fff' : 'var(--color-burgundy)',
                          cursor: 'pointer', borderRadius: 2 }}>{v}%</button>
                    ))}
                  </div>
                </div>

                {/* ボタン */}
                <div style={{ display: 'flex', gap: 8, justifyContent: 'center' }}>
                  <button className="menu-button"
                    onClick={() => { setAiIndividualStrategies(prev => { const n = { ...prev }; delete n[editingAiId]; return n; }); }}
                    style={{ padding: '4px 12px', fontSize: 'var(--menu-label-size)' }}>{T.ui.reset}</button>
                  <button className="menu-button primary" onClick={() => setEditingAiId(null)}
                    style={{ padding: '4px 12px', fontSize: 'var(--menu-label-size)' }}>{T.ui.close}</button>
                </div>
              </div>
            </div>
          )}

          {/* プロフィールモーダル（ロビー画面用） */}
          {showProfileModal && (
            <div className="modal-overlay" onClick={() => setShowProfileModal(false)}>
              <div className="modal-box" style={{ width: 320, maxWidth: '90%', padding: '14px 18px' }} onClick={e => e.stopPropagation()}>
                <div className="menu-title" style={{ fontSize: 14 }}>{T.ui.profileChange || 'プロフィール変更'}</div>
                <ProfileModalContent
                  playerName={playerName}
                  playerEmoji={playerEmoji}
                  onSave={saveProfile}
                  onCancel={() => setShowProfileModal(false)}
                />
              </div>
            </div>
          )}
        </div>
      );
    }
  }

  // セット終了判定（N人×1ゲーム=1セット、累積スコアで勝敗判定）
  const isSetComplete = setConfig.totalSets > 0 && setConfig.currentGame >= setConfig.gamesPerSet;
  const setWinner = (() => {
    if (!isSetComplete) return -1;
    // 累積スコアで勝者判定
    const maxScore = Math.max(...cumulativeScores);
    const topPlayers = cumulativeScores.map((s, i) => ({ idx: i, score: s, wins: winCount[i] || 0 }))
      .filter(p => p.score === maxScore);
    if (topPlayers.length === 1) return topPlayers[0].idx;
    // 同点時は勝利数で判定
    const maxWins = Math.max(...topPlayers.map(p => p.wins));
    return topPlayers.find(p => p.wins === maxWins)?.idx ?? topPlayers[0].idx;
  })();
  const isSetOver = setWinner >= 0;

  if (gameState === 'gameOver') {
    const winnerIdx = winCount.indexOf(Math.max(...winCount));
    const winRate = statistics.gamesPlayed > 0 ? Math.round((statistics.gamesWon / statistics.gamesPlayed) * 100) : 0;

    // セット終了時はmatchOver画面へ
    if (isSetOver && !autoPlayMode) {
      return (
        <div className="menu-container">
          <div className="overlay-base menu-overlay">
            <div className="menu-box anim-fade-in" style={{ padding: 'calc(2 * var(--unit-y)) calc(3 * var(--unit-x))' }}>
              <div style={{ fontSize: 36, marginBottom: 'calc(0.5 * var(--unit-y))' }} className="anim-win">🏆</div>
              <div className="menu-title" style={{ fontSize: 'var(--overlay-title-size)', marginBottom: 'calc(0.5 * var(--unit-y))' }} onClick={handleTitleClick}>{T.overlay.setEnd.title}</div>
              <div style={{ fontSize: 'var(--menu-title-size)', fontWeight: 'bold', color: setWinner === 0 ? 'var(--color-gold)' : 'var(--color-charcoal)' }}>
                {T.overlay.setVictory(players[setWinner]?.emoji || '👤', players[setWinner]?.name || T.misc.player)}
              </div>
              <div style={{ fontSize: 'var(--menu-label-size)', color: 'var(--color-warm-gray)', marginBottom: 'calc(1 * var(--unit-y))' }}>
                {T.overlay.setEnd.setComplete(setConfig.currentSet, setConfig.gamesPerSet)}
              </div>

              {/* 勝敗・スコア表（コンパクト） */}
              <div style={{ background: 'var(--color-cream)', padding: 'calc(0.5 * var(--unit-y)) calc(1 * var(--unit-x))', marginBottom: 'calc(0.5 * var(--unit-y))', border: '1px solid var(--color-dusty-pink)' }}>
                <div style={{ fontSize: 'var(--menu-text-size)', color: 'var(--color-warm-gray)', marginBottom: '4px', textAlign: 'center' }}>{T.overlay.setEnd.result(setConfig.gamesPerSet)}</div>
                {players.map((p, i) => (
                  <div key={i} style={{
                    display: 'flex',
                    justifyContent: 'space-between',
                    padding: '2px 0',
                    fontSize: 'var(--menu-label-size)',
                    fontWeight: i === setWinner ? 'bold' : 'normal',
                    color: i === setWinner ? 'var(--color-gold)' : 'var(--color-charcoal)',
                    borderBottom: i < players.length - 1 ? '1px solid var(--color-dusty-pink)' : 'none'
                  }}>
                    <span>{p.emoji || '👤'} {p.name}</span>
                    <span style={{ display: 'flex', gap: 'calc(1 * var(--unit-x))' }}>
                      <span>{winCount[i]}{T.ui.winsLabel}</span>
                      <span style={{ color: cumulativeScores[i] >= 0 ? 'var(--color-gold)' : 'var(--color-burgundy)' }}>
                        {cumulativeScores[i] >= 0 ? '+' : ''}{cumulativeScores[i]}{T.ui.ptsLabel}
                      </span>
                    </span>
                  </div>
                ))}
              </div>

              {/* 統計（1行に集約） */}
              <div style={{ fontSize: 'var(--menu-text-size)', color: 'var(--color-warm-gray)', marginBottom: 'calc(1 * var(--unit-y))', textAlign: 'center' }}>
                {T.ui.statsTotal(statistics.setsPlayed, statistics.setsWon, statistics.gamesPlayed, statistics.gamesWon, winRate)}
              </div>

              <button className="menu-button primary" onClick={(e) => {
                const doStart = () => {
                  setCumulativeScores([0,0,0,0]);
                  setWinCount([0,0,0,0]);
                  setGameNumber(1);
                  setSetConfig(prev => ({ ...prev, currentSet: prev.currentSet + 1, currentGame: 0, setFirstPlayer: -1 }));
                  setFirstPlayerIndex(0);
                  startGame();
                };
                if (blastRef.current) { blastRef.current(e.currentTarget); setTimeout(doStart, 1200); } else { doStart(); }
              }}>{T.ui.newSet}</button>
              <button className="menu-button" onClick={() => {
                setEffect(null);
                setCumulativeScores([0,0,0,0]);
                setWinCount([0,0,0,0]);
                setGameNumber(1);
                // setConfigを完全リセット
                setSetConfig(prev => ({
                  ...prev,
                  currentSet: 1,
                  currentGame: 0,
                  setFirstPlayer: -1
                }));
                setFirstPlayerIndex(0);
                setMenuStep('title');
                setGameState('menu');
              }}>{T.ui.toMenu}</button>
              {showDebugOptions && <button className="menu-button" onClick={() => UnifiedLogger.download()} style={{ marginTop: '4px' }}>{T.ui.saveLog}</button>}
            </div>
          </div>
        </div>
      );
    }

    // 通常のゲーム終了画面
    // lastWinnerIdxを使用（今回のゲームの勝者）
    const getWinConditionText = () => {
      if (lastWinCondition === 'forceEnd') return T.overlay.gameResult.gameInterrupted;
      if (lastWinCondition === 'draw') return T.overlay.gameResult.stalemateDraw;
      if (lastWinCondition === 'stalemate') return T.overlay.gameResult.stalemateJudge;
      return T.overlay.gameResult.agariEmoji;
    };
    const getWinConditionEmoji = () => {
      if (lastWinCondition === 'forceEnd') return '🚪';
      if (lastWinCondition === 'draw') return '🤝';
      if (lastWinCondition === 'stalemate') return T.overlay.gameResult.stalemateIcon;
      return '🎊';
    };
    const getWinnerText = () => {
      if (lastWinnerIdx < 0 || !players[lastWinnerIdx]) return T.overlay.gameResult.gameCancelled;
      return T.overlay.gameResult.victory(players[lastWinnerIdx]?.name || T.misc.player);
    };

    return (
      <div className="menu-container">
        <div className="overlay-base menu-overlay">
          <div className="menu-box anim-slide-up" style={{ padding: 'calc(2 * var(--unit-y)) calc(3 * var(--unit-x))' }}>
            <div style={{ fontSize: 36, marginBottom: 'calc(0.5 * var(--unit-y))' }}>{getWinConditionEmoji()}</div>
            <div className="menu-title" style={{ fontSize: 'var(--overlay-title-size)', marginBottom: 'calc(0.5 * var(--unit-y))' }} onClick={handleTitleClick}>{T.overlay.gameResult.gameEnd(gameNumber)}</div>
            <div style={{ fontSize: 'var(--menu-title-size)', marginBottom: 'calc(0.25 * var(--unit-y))', fontWeight: 'bold', color: lastWinnerIdx === 0 ? 'var(--color-gold)' : 'var(--color-charcoal)' }}>{getWinnerText()}</div>
            {}
            <div style={{ fontSize: 'var(--overlay-text-size)', marginBottom: 'calc(0.5 * var(--unit-y))', color: 'var(--color-warm-gray)' }}>{getWinConditionText()}</div>

            {/* v2.0.3: セット進捗（N人×1ゲーム=1セット方式） */}
            {setConfig.totalSets > 0 && (
              <div style={{ fontSize: 'var(--menu-label-size)', color: 'var(--color-warm-gray)', marginBottom: 'calc(0.5 * var(--unit-y))' }}>
                {T.ui.setInfo(setConfig.currentSet, setConfig.currentGame, setConfig.gamesPerSet)}
              </div>
            )}

            {/* スコア表（コンパクト） */}
            <div style={{ background: 'var(--color-cream)', padding: 'calc(0.5 * var(--unit-y)) calc(1 * var(--unit-x))', marginBottom: 'calc(0.5 * var(--unit-y))', border: '1px solid var(--color-dusty-pink)' }}>
              {players.map((p, i) => (
                <div key={i} style={{ display: 'flex', justifyContent: 'space-between', padding: '2px 0', fontSize: 'var(--menu-label-size)', fontWeight: i === lastWinnerIdx ? 'bold' : 'normal', color: i === lastWinnerIdx ? 'var(--color-gold)' : 'var(--color-charcoal)' }}>
                  <span>{p.emoji || '👤'} {p.name}</span>
                  <span style={{ color: cumulativeScores[i] >= 0 ? 'var(--color-gold)' : 'var(--color-burgundy)' }}>{cumulativeScores[i] >= 0 ? '+' : ''}{cumulativeScores[i]}{T.ui.ptsLabel}</span>
                </div>
              ))}
            </div>

            {/* 統計（1行に集約） */}
            <div style={{ fontSize: 'var(--menu-text-size)', color: 'var(--color-warm-gray)', marginBottom: 'calc(1 * var(--unit-y))', textAlign: 'center' }}>
              {T.ui.statsGame(statistics.gamesPlayed, statistics.gamesWon, winRate)}
            </div>

            {showDebugOptions && <div style={{ marginBottom: '4px', fontSize: 'var(--menu-text-size)', color: 'var(--color-warm-gray)' }}>{T.ui.autoPlayProgress(autoPlayCount, maxAutoPlayGames)}</div>}
            <button className="menu-button primary" onClick={(e) => {
              if (blastRef.current) { blastRef.current(e.currentTarget); setTimeout(() => { setGameNumber(prev => prev + 1); startGame(); }, 1200); }
              else { setGameNumber(prev => prev + 1); startGame(); }
            }}>{T.ui.nextGame}</button>
            <button className="menu-button" onClick={() => {
              setEffect(null);
              setCumulativeScores([0,0,0,0]);
              setWinCount([0,0,0,0]);
              setGameNumber(1);
              // setConfigを完全リセット
              setSetConfig(prev => ({
                ...prev,
                currentSet: 1,
                currentGame: 0,
                setFirstPlayer: -1
              }));
              setFirstPlayerIndex(0);
              setMenuStep('title');
              setGameState('menu');
            }}>{T.ui.toMenu}</button>
            {showDebugOptions && <button className="menu-button" onClick={() => UnifiedLogger.download()} style={{ marginTop: '4px' }}>{T.ui.saveLog}</button>}
          </div>
        </div>
      </div>
    );
  }

  const player = players[0];
  const opponents = players.slice(1);
  const isMyTurn = currentPlayerIndex === 0;
  // 配札中はcanDraw=false
  const canDraw = isMyTurn && !hasDrawn && !isProcessing && !gameEnded && !autoPlayMode && dealingPhase === 'ready';
  // 市場選択モード中はターン終了不可
  const canEndTurn = isMyTurn && hasDrawn && !isProcessing && !gameEnded && !autoPlayMode && !windTargetMode && !marketSelectMode && !effectMarketSelect;
  const isSelectableTarget = (card) => actionMode === 'house' && selectedCard?.type === 'house' && card.type === 'character';

  // 風カードターゲット判定（WindEffectEngine使用）
  const isWindTargetable = (houseCardId) => {
    if (!selectedWindCard || !windTargetMode) return false;
    return WindEffectEngine.canTarget(selectedWindCard.effect, houseCardId);
  };

  // ============================================
  // 新レイアウト用ヘルパー
  // ============================================

  // プレイヤー人数を取得
  const playerCount = players.length;

  // Phase 1b: 旧v2ヘルパー関数(calcStandardPitch, getHandAreaWidth等)を削除
  // Desktop 5-Row レイアウトで代替

  // ============================================
  // Phase 2: チャット内アクションバー共通関数
  // Desktop / Landscape 両方から呼ばれる
  // ============================================
  const renderChatActionBars = () => (
    <>
      {/* 風攻撃キャンセル */}
      {!autoPlayMode && (windTargetMode && selectedWindCard) && (
        <div style={{
          display: 'flex', gap: 6, padding: '4px 8px',
          border: '1px solid var(--color-burgundy)', borderTop: 'none',
          background: '#fff8f0', flexShrink: 0,
        }}>
          <button onClick={handleCancelWind} style={{
            flex: 1, padding: '4px 8px', fontSize: 'var(--ui-font-size-small, 9px)',
            background: 'var(--color-burgundy)', color: '#fff', border: 'none',
            borderRadius: 3, cursor: 'pointer',
          }}>{T.ui.chatActions?.cancelWind || '❌ やめる'}</button>
        </div>
      )}
      {/* 雲上交換ガイド */}
      {!autoPlayMode && marketSelectMode && (
        <div style={{
          padding: '4px 8px',
          border: '1px solid var(--color-burgundy)', borderTop: 'none',
          background: '#f0f8ff', flexShrink: 0,
          fontSize: 'var(--ui-font-size-small, 9px)', color: '#5D4E37',
        }}>
          ⛩️ 雲上からカードを選んでね
        </div>
      )}
      {/* 空鳥居格納ガイド */}
      {!autoPlayMode && refillMode && (
        <div style={{
          display: 'flex', gap: 6, padding: '4px 8px',
          border: '1px solid var(--color-burgundy)', borderTop: 'none',
          background: '#f0fff0', flexShrink: 0,
        }}>
          <div style={{flex: 1, fontSize: 'var(--ui-font-size-small, 9px)', color: '#5D4E37', display: 'flex', alignItems: 'center'}}>
            ⛩️ 格納する人物カードをクリック
          </div>
          <button onClick={() => dispatchTurnAction({ type: 'CANCEL_REFILL' })} style={{
            padding: '4px 8px', fontSize: 'var(--ui-font-size-small, 9px)',
            background: 'var(--color-burgundy)', color: '#fff', border: 'none',
            borderRadius: 3, cursor: 'pointer',
          }}>{T.ui.chatActions?.cancelWind || '❌ やめる'}</button>
        </div>
      )}
      {/* カウンターモーダル */}
      {counterMode && counterMode.defenderIdx === 0 && counterMode.phase === 'waiting' && (
        <div style={{
          display: 'flex', gap: 6, padding: '4px 8px',
          border: '2px solid #d4a017', borderTop: 'none',
          background: '#fffbe6', flexShrink: 0,
        }}>
          <button onClick={handleCounterConfirm} style={{
            flex: 1, padding: '5px 8px', fontSize: 'var(--ui-font-size-small, 9px)',
            background: '#2d6b22', color: '#fff', border: 'none',
            borderRadius: 3, cursor: 'pointer', fontWeight: 'bold',
          }}>{T.ui.counterYes}</button>
          <button onClick={handleCounterDecline} style={{
            flex: 1, padding: '5px 8px', fontSize: 'var(--ui-font-size-small, 9px)',
            background: 'var(--color-burgundy)', color: '#fff', border: 'none',
            borderRadius: 3, cursor: 'pointer',
          }}>{T.ui.counterNo}</button>
        </div>
      )}
    </>
  );

  // ============================================
  // Phase 1a-6: Desktop 5-Row レイアウト
  // ============================================
  const renderDesktopBoard = () => {
    if (!desktopLayout) return null;
    const dl = desktopLayout;
    const { tier, pad, chatExtra, r3H, r4ToriiGap, r4CloudGap, dtToriiOff } = dl;
    const SZ = CARD_SIZES;
    const handSz = SZ[tier.hand];
    const midSz = SZ[tier.mid];
    const deckSz = SZ[tier.deck];
    const oppSz = SZ[tier.opp];
    const player = players[0];
    const oppIndices = players.length === 2 ? [1] : players.length === 3 ? [1, 2] : [1, 2, 3];
    const turnPlayerIdx = currentPlayerIndex;

    // FlyingCard等のアニメーションコンポーネントがcurrentCardSizeを参照するため、
    // Desktop 5-Row使用時は手札サイズキーに更新する
    currentCardSize = tier.hand;
    currentDesktopTier = tier;

    // --- Card font size helpers (CARD_SIZES.symbolSize等をCSS変数でinline渡し) ---
    const cardFontStyle = (sizeKey) => {
      const sz = SZ[sizeKey];
      return {
        '--card-symbol-size': `${sz.symbolSize}px`,
        '--card-header-size': `${sz.headerSize}px`,
        '--card-footer-size': `${sz.footerSize}px`,
        '--card-icon-size': `${sz.iconSize}px`,
      };
    };
    const handFontStyle = cardFontStyle(tier.hand);
    const midFontStyle = cardFontStyle(tier.mid);
    const oppFontStyle = cardFontStyle(tier.opp);

    // --- Overlap pitch helpers ---
    const dtHandPitch = (n, containerPx, cardW) => calcOverlapPitch(n, containerPx, cardW, 1/3);

    // --- Sub-renderers ---

    // Row1: 相手手札（裏面overlap）
    const renderDtOppHand = (pIdx) => {
      const p = players[pIdx];
      if (!p) return null;
      const n = p.hand.length;
      const cp = getCornerProps(tier.opp);
      // overlap pitch計算: ボード幅を対戦相手数で均等割り、padding差し引き
      const oppAreaW = dl.boardW / oppIndices.length - pad.side * 2;
      const oppPitch = dtHandPitch(n, oppAreaW, oppSz.w);
      const isValidTarget = DrawRuleEngine.isClickable(0, pIdx, players);
      const canDrawFromOpponent = phase === PHASES.BABANUKI && !hasDrawn && !isProcessing &&
        turnPlayerIdx === 0 && pIdx !== 0 && !autoPlayMode && isValidTarget;
      return (
        <div className="dt-opp-hand-area"
          style={{flex: 1, position: 'relative', padding: `0 ${pad.side}px`}}>
          <div
            className="dt-opp-hand-row"
            ref={el => { playerHandRefs.current[pIdx] = el; }}
            style={{position: 'relative', height: oppSz.h}}
          >
            {/* AI引札ゾーン: FlyingCard到着点（非表示、手札エリア右端に配置） */}
            <div ref={el => { playerDrawAreaRefs.current[pIdx] = el; }}
              data-draw-zone="true"
              style={{position: 'absolute', right: 0, top: 0, width: oppSz.w, height: oppSz.h, pointerEvents: 'none'}} />
            {p.hand.map((c, i) => {
              if (pairAnimation && pairAnimation.playerIdx === pIdx &&
                  (i === pairAnimation.pairCardIndex || (pairAnimation.drawnCard?.uid === c.uid))) return null;
              const isHesitating = hesitationState && hesitationState.targetPlayerIdx === pIdx && hesitationState.phase !== 'done';
              const hIdx = isHesitating ? hesitationState.hoverIdx : -1;
              const cardLeft = Math.round(i * oppPitch);
              if (revealAllHands) {
                return <CardFrontStandard key={c.uid} card={c} style={{
                  position: 'absolute', left: cardLeft, top: 0, zIndex: i,
                  width: oppSz.w, height: oppSz.h
                }} />;
              }
              return (
                <div key={c.uid} className={`card-standard-back back-${getBackColorKey(c)} ${canDrawFromOpponent ? 'highlight' : ''} ${hIdx === i ? 'hesitation-hover' : ''}`}
                  onClick={canDrawFromOpponent ? () => handleDrawFromPlayer(pIdx, i) : null}
                  style={{
                    position: 'absolute', left: cardLeft, top: 0, zIndex: i,
                    width: oppSz.w, height: oppSz.h, borderRadius: cp.radius,
                    pointerEvents: canDrawFromOpponent ? 'auto' : 'none',
                    cursor: canDrawFromOpponent ? 'pointer' : 'default',
                  }}
                >
                  <div className="corner tl" style={{width: cp.cornerW, height: cp.cornerH, borderWidth: cp.cornerBorder, top: cp.cornerOffset, left: cp.cornerOffset}} />
                  <div className="corner tr" style={{width: cp.cornerW, height: cp.cornerH, borderWidth: cp.cornerBorder, top: cp.cornerOffset, right: cp.cornerOffset}} />
                  <div className="corner bl" style={{width: cp.cornerW, height: cp.cornerH, borderWidth: cp.cornerBorder, bottom: cp.cornerOffset, left: cp.cornerOffset}} />
                  <div className="corner br" style={{width: cp.cornerW, height: cp.cornerH, borderWidth: cp.cornerBorder, bottom: cp.cornerOffset, right: cp.cornerOffset}} />
                  <div className="center-line" style={{left: oppSz.lineOffset, right: oppSz.lineOffset, height: oppSz.lineH}} />
                </div>
              );
            })}
          </div>
        </div>
      );
    };

    // Row2: 相手情報（名前 + 鳥居セット）— v45.2プロトタイプ準拠
    // 鳥居: flex配置 + justify-content:flex-end で右寄せ（座標配置ではなく理論値配置）
    const renderDtOppInfo = (pIdx) => {
      const p = players[pIdx];
      if (!p) return null;
      const bubbles = aiSpeechBubbles[pIdx] || [];
      const latestBubble = bubbles.length > 0 ? bubbles[bubbles.length - 1] : null;
      // 吹き出しテキストからプレイヤー絵文字を除去
      let bubbleText = latestBubble || '';
      if (latestBubble && p.emoji && bubbleText.startsWith(p.emoji)) {
        bubbleText = bubbleText.slice(p.emoji.length).trimStart();
      }
      return (
        <div className="dt-opp-info-area" style={{
          flex: 1, position: 'relative', overflow: 'hidden',
          display: 'flex', alignItems: 'flex-start',
          padding: `${pad.r2t}px ${pad.side}px ${pad.r2b}px`,
        }}>
          {/* 名前テキストボックス（position:relativeで吹き出しのアンカー） */}
          <div className="player-name" style={{position: 'relative', flexShrink: 0}}>
            <div className={`textbox-v2 ${currentPlayerIndex === pIdx ? 'active' : ''}`} style={{fontSize: 'var(--ui-font-size-small, 11px)', whiteSpace: 'nowrap', overflow: 'hidden'}}>
              {p.emoji} {p.name} | {GameLogic.calculateScore(p.hand)} | 🃏{p.hand.length}
            </div>
            {/* 吹き出し: v45.2と同じ left:0, 三角は left:12px */}
            {latestBubble && (
              <div style={{
                position: 'absolute', top: '100%', left: 0,
                zIndex: 500, marginTop: 2, maxWidth: 300, width: 'max-content',
                pointerEvents: 'none',
              }}>
                <div style={{
                  position: 'absolute', top: -6, left: 12,
                  width: 0, height: 0,
                  borderLeft: '5px solid transparent',
                  borderRight: '5px solid transparent',
                  borderBottom: '6px solid var(--color-burgundy)',
                }} />
                <div style={{
                  position: 'absolute', top: -4.5, left: 13,
                  width: 0, height: 0,
                  borderLeft: '4px solid transparent',
                  borderRight: '4px solid transparent',
                  borderBottom: '5px solid #fff', zIndex: 1,
                }} />
                <div style={{
                  background: '#fff', border: '1px solid var(--color-burgundy)',
                  borderRadius: 6, padding: '3px 8px',
                  fontSize: 'var(--ui-font-size-small, 10px)', color: 'var(--color-charcoal)',
                  boxShadow: '0 2px 6px rgba(0,0,0,0.15)', lineHeight: 1.4,
                  whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
                  fontWeight: 'bold',
                }}>{bubbleText}</div>
              </div>
            )}
          </div>
          {/* 鳥居セット: flex配置で右寄せ、幅不足時は自動重なり */}
          <div
            ref={el => { playerHouseRefs.current[pIdx] = el; }}
            style={{
              display: 'flex', justifyContent: 'flex-end', gap: r4ToriiGap,
              flex: 1, minWidth: 0, marginLeft: 8,
              height: midSz.h + dtToriiOff, overflow: 'visible',
            }}
          >
            {p.houses.map((h, hIdx) => {
              const isEmpty = h.storedCard === null;
              const isTargetable = windTargetMode && pIdx !== 0 && h.houseCard;
              const isExiting = houseExitAnimation && houseExitAnimation.playerIdx === pIdx && houseExitAnimation.houseIdx === hIdx;
              if (isExiting) return <div key={hIdx} style={{width: midSz.w, height: midSz.h + dtToriiOff, opacity: 0, flexShrink: 1}} />;
              return (

    // Row3: タイトル（左） + 実況チャット（右）

                <button className="btn-tooltip" data-tooltip={T.ui.downloadLog} onClick={() => {
                  const lines = log.map(e => `[${e.type}] ${e.message}`).join('\n');
                  const header = `pfff! ${VERSION.string} - Game Log\nDate: ${new Date().toLocaleString()}\nGame: ${setConfig.totalSets > 0 ? `Set${setConfig.currentSet} Game${setConfig.currentGame}` : `Game${gameNumber}`} Turn:${turn}\n${'='.repeat(50)}\n`;
                  const blob = new Blob([header + lines], { type: 'text/plain' });
                  const url = URL.createObjectURL(blob);
                  const a = document.createElement('a');
                  a.href = url; a.download = `pfff_log_G${gameNumber}_T${turn}.txt`;
                  a.click(); URL.revokeObjectURL(url);
                }} style={{
                  width: 'calc(3 * var(--unit-x))', height: 'var(--textbox-h)',
                  border: '1px solid var(--color-burgundy)', borderLeft: 'none',
                  background: '#fff', color: 'var(--color-burgundy)',
                  fontSize: 'var(--ui-font-size)', cursor: 'pointer',

                <div className="textbox-v2" style={{borderLeft: 'none'}}>
                  {phase === PHASES.EXPLORATION ? T.ui.phaseExploration : T.ui.phaseBabanuki}
                </div>
                {showQuickMenu && (
                  <button onClick={() => UnifiedLogger.download()} title={T.ui.saveLogHint} style={{
                    width: 'calc(3 * var(--unit-x))', height: 'var(--textbox-h)',
                    border: '1px solid var(--color-gold)', borderLeft: 'none',
                    background: '#fff', color: 'var(--color-gold)',
                    fontSize: 'var(--ui-font-size)', cursor: 'pointer',
                    display: 'flex', alignItems: 'center', justifyContent: 'center',

              <div className="textbox-v2 game-info" style={{marginTop: -1}}>
                {setConfig.totalSets > 0 ? `🏆S${setConfig.currentSet} G${setConfig.currentGame}/${setConfig.gamesPerSet}` : `G${gameNumber}`} T:{turn}
              </div>
              {/* 演出テストパネル（タイトルトリプルクリックで表示） */}
              {showQuickMenu && (
                <div style={{
                  position: 'absolute', top: '100%', left: 0, zIndex: 10000,

                      padding: '2px 4px', fontSize: 8, border: '1px solid #ccc',

                  <button onClick={() => showBabanukiStart()} style={{
                    padding: '2px 4px', fontSize: 8, border: '1px solid #ccc',

                  <button onClick={() => {

                      attackerIdx: 1, defenderIdx: 0, storedCard: card,

                  {[
                    { key: 'windSummon', label: '🐉+🔥 竜の息吹', ids: ['KIN','QUE'],
                      setup: () => {
                        // プールに風カード2枚追加
                        const w1 = { id: 'GHI', name: T.cards.GHI, type: 'wind', category: 'wind', emoji: '🌀', uid: 'test-w1-' + Date.now() };
                        const w2 = { id: 'GHI', name: T.cards.GHI, type: 'wind', category: 'wind', emoji: '🌀', uid: 'test-w2-' + Date.now() };
                        discardPoolRef.current.wind.push(w1, w2);
                        setDiscardPool({ wind: [...discardPoolRef.current.wind], house: [...discardPoolRef.current.house] });
                      }},
                    { key: 'houseRebirth', label: '🧛+🧄 不死の契約', ids: ['WIT','HOL'],
                      setup: () => {
                        // プールに鳥居カード2枚追加
                        const h1 = { id: 'HOU', name: T.cards.HOU, type: 'house', category: 'house', emoji: '⛩️', uid: 'test-h1-' + Date.now(), points: 3 };
                        const h2 = { id: 'HOU', name: T.cards.HOU, type: 'house', category: 'house', emoji: '⛩️', uid: 'test-h2-' + Date.now(), points: 3 };
                        discardPoolRef.current.house.push(h1, h2);
                        setDiscardPool({ wind: [...discardPoolRef.current.wind], house: [...discardPoolRef.current.house] });
                      }},
                    { key: 'ridingBlessing', label: '🥷+🐸 蝦蟇の術', ids: ['KNI','HOR'],
                      setup: () => {
                        // プールに風1枚+鳥居1枚追加
                        const w = { id: 'GHI', name: T.cards.GHI, type: 'wind', category: 'wind', emoji: '🌀', uid: 'test-w-' + Date.now() };
                        const h = { id: 'HOU', name: T.cards.HOU, type: 'house', category: 'house', emoji: '⛩️', uid: 'test-h-' + Date.now(), points: 3 };
                        discardPoolRef.current.wind.push(w);
                        discardPoolRef.current.house.push(h);
                        setDiscardPool({ wind: [...discardPoolRef.current.wind], house: [...discardPoolRef.current.house] });
                      }},
                    { key: 'merchantGift', label: '🦊+💎 狐の取引', ids: ['MER','BAL'],
                      setup: () => {} /* 市場から取得なのでプール操作不要 */ },
                  ].map(ep => (
                    <button key={ep.key} onClick={() => {
                      // 1. プール準備
                      ep.setup();
                      // 2. ダミーペアカード作成
                      const ts = Date.now();
                      const c0 = { ...CARD_DATA[ep.ids[0]], id: ep.ids[0], type: 'character', uid: `test-${ep.ids[0]}-${ts}` };
                      const c1 = { ...CARD_DATA[ep.ids[1]], id: ep.ids[1], type: 'character', uid: `test-${ep.ids[1]}-${ts}` };
                      // 3. バナー表示
                      showBanner(ep.key, { settingKey: 'pairEffect' });
                      // 4. 浮遊カード（merchantGiftの場合）
                      if (ep.key === 'merchantGift') {
                        setFloatingPairCards({ cards: [c0, c1], phase: 'floating' });
                        // 市場選択UI発動
                        const pairUids = new Set([c0.uid, c1.uid]);
                        const selectableMarket = marketRef.current.filter(c => !pairUids.has(c.uid));
                        if (selectableMarket.length > 0) {
                          const count = Math.min(2, selectableMarket.length);
                          setEffectMarketSelect({ count, selected: [], effectType: 'merchantGift', playerIndex: 0, excludeUids: pairUids });
                          showCompanionHint(`⚖️ 狐の取引発動！雲上から${count}枚もらえるよ → 欲しいカードをクリック`);
                        } else {
                          showCompanionHint('⚖️ 狐の取引発動！（雲上に選択可能なカードなし）');
                          setFloatingPairCards(null);
                        }
                      } else {
                        // 5. 効果解決（プールからカード取得 → 手札に追加）
                        const gained = resolveEffectPair(ep.key, 0);
                        if (gained.length > 0) {
                          const currentHand = [...playersRef.current[0].hand, ...gained];
                          setHand(0, currentHand);
                          const gainedNames = gained.map(c => c.name).join(', ');
                          showCompanionHint(`⚗️ ${T.effectPairs?.[ep.key] || ep.key} → ${gainedNames}を獲得！`);
                          addLog(T.log.effectPairActivated(getPlayerName(0), T.effectPairs?.[ep.key] || ep.key, gainedNames), 'pair');

                          showCompanionHint(`⚗️ ${T.effectPairs?.[ep.key] || ep.key} → プールが空で獲得なし`);
                        }
                      }
                    }} style={{
                      padding: '2px 4px', fontSize: 8, border: '1px solid #c9a227',
                      borderRadius: 2, background: '#fffef5', cursor: 'pointer',

                </div>
