  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    /* v2.0.0: プレビュー環境の枠線防止 */
    html, body, #root { border: none !important; outline: none !important; box-sizing: border-box; }
    html { overflow: hidden; } /* v2.4.7: スクロール無効化 */
    body { font-family: 'Hiragino Sans', 'Yu Gothic', monospace; background: #f5f5f5; padding: 0; margin: 0; overflow: hidden; }
    /* v2.5.10.0: 100vh問題対応（svhフォールバック） */
    #root { width: 100%; height: 100vh; height: 100svh; }
    :root {
      /* ============================================
         Unit System — Phase 1a: 8×8統一
         --unit (8px) が唯一の基準。
         --unit-x/--unit-y は旧コード互換のため残存（Phase 1bで削除）
         ============================================ */
      --unit: 8px;
      --unit-x: var(--unit);                   /* =8px 互換エイリアス */
      --unit-y: calc(1.75 * var(--unit));      /* =14px 互換エイリアス */
      --border-width: 1px;

      /* ============================================
         盤面サイズ: v2.1.1 デフォルト 129U × 53U
         (動的サイジングで113U〜180U対応)
         ============================================ */
      --board-w: calc(129 * var(--unit-x) + 2 * var(--border-width));  /* 1034px */
      --board-h: calc(53 * var(--unit-y) + 2 * var(--border-width));   /* 744px */

      /* ============================================
         カードサイズ
         v2.1.1: Standard 10U×8U を追加（将来の統一サイズ）
         v2.0.9互換: Large/Small/Burn も維持
         ============================================ */
      /* v2.1.1 Standard（統一サイズ） */
      --card-w: calc(10 * var(--unit-x));     /* 80px */
      --card-h: calc(8 * var(--unit-y));      /* 112px */
      /* v2.0.9 互換 */
      --card-large-w: calc(13 * var(--unit-x));  /* 104px */
      --card-large-h: calc(10 * var(--unit-y));  /* 140px */
      --card-small-w: calc(9 * var(--unit-x));   /* 72px */
      --card-small-h: calc(7 * var(--unit-y));   /* 98px */
      --card-burn-w: calc(6 * var(--unit-x));    /* 48px */
      --card-burn-h: calc(5 * var(--unit-y));    /* 70px */

      /* ============================================
         v2.1.1 行の高さ（5行構成用）
         ============================================ */
      --house-row-h: calc(10 * var(--unit-y));   /* 140px（家8U + 重なり2U） */
      --hand-row-h: calc(8 * var(--unit-y));     /* 112px */
      --center-row-h: calc(12 * var(--unit-y));  /* 168px */
      --house-stack-offset: calc(2 * var(--unit-y)); /* 家+人物の重なり */

      /* ============================================
         v2.1.1 基本サイズ
         ============================================ */
      --header-h: calc(2 * var(--unit-y));       /* 28px */

      /* ============================================
         v2.4.7 UIスケーリング用変数
         ============================================ */
      --ui-font-size: 11px;
      --ui-font-size-small: 10px;
      --chat-font-size: 12px;
      --nameplate-padding: 7px 8px;
      --chat-min-h: calc(4 * var(--unit-y));

      /* ============================================
         v2.5.0 オーバーレイ用変数
         ============================================ */
      --overlay-icon-size: 60px;
      --overlay-icon-medium: 48px;
      --overlay-title-size: 20px;
      --overlay-subtitle-size: 14px;
      --overlay-text-size: 11px;

      /* ============================================
         v2.5.0 メニュー用変数（v2.5.7: スケール対応）
         ============================================ */
      --menu-title-size: 14px;
      --menu-label-size: 10px;
      --menu-text-size: 9px;
      --menu-hint-size: 8px;
      --effect-emoji-size: 48px;
      --effect-title-size: 20px;
      --effect-message-size: 11px;
      --critic-emoji-size: 24px;
      --critic-grid-cols: 5; /* v2.5.9.7: 2行5列に変更 */
      --critic-grid-margin: calc(1 * var(--unit-y)) 0; /* v2.5.9.7: マージン縮小 */
      --menu-button-padding: 7px 8px; /* v2.5.7.7: スマホ時は拡大 */
      --menu-box-width: calc(90 * var(--unit-x)); /* v2.5.9.9: スマホ時は70vw */
      --menu-box-width-wide: calc(90 * var(--unit-x)); /* v2.5.9.13: スマホ時は90vw */
      --center-area-top-offset: 0; /* v2.5.7.12: スマホ時は上にずらす */
      --bazaar-cards-margin-top: 0; /* v2.5.9.2: 上辺揃え */

      /* ============================================
         v2.1.1 プレイヤーブロック（動的計算用デフォルト値）
         129U時: (129/2) - 1.5 = 63U
         ============================================ */
      --player-block-w: calc(63 * var(--unit-x)); /* 504px (v2.1.1) */
      --house-area-w: calc(31 * var(--unit-x));
      --chat-box-w: calc(31 * var(--unit-x));
      --chat-box-h: calc(8 * var(--unit-y));
      --hand-area-w: calc(52 * var(--unit-x));
      --chat-left-p0p1: calc(32 * var(--unit-x));
      --house-left-p2p3: calc(32 * var(--unit-x));
      --textbox-h: calc(2 * var(--unit-y));

      /* ============================================
         v2.1.1 横幅いっぱい用（2人/3人モード）
         ============================================ */
      --full-block-w: calc(127 * var(--unit-x));   /* widthU - 2 */
      --full-house-area-w: calc(62.5 * var(--unit-x));
      --full-chat-box-w: calc(35 * var(--unit-x)); /* 最大35U */
      --full-chat-box-right: calc(1 * var(--unit-x));
      --full-hand-area-w: calc(116 * var(--unit-x));

      /* ============================================
         v2.1.1 中央行レイアウト（129U基準）
         タイトル右端35U、市場左端65.5U → 中間50U
         山札中央 = 50U、山札幅10U → 左端45U
         ============================================ */
      --deck-area-left: calc(45 * var(--unit-x));
      --deck-area-w: calc(14 * var(--unit-x));
      --bazaar-area-left: calc(60 * var(--unit-x));
      --bazaar-area-w: calc(66 * var(--unit-x));
      /* v2.6.0: ログエリア廃止（市場拡張のため） */

      /* ============================================
         v2.4.5 行位置（動的サイジング対応）
         デフォルト値: 53U高さ基準
         ============================================ */
      --row-1-top: calc(0.5 * var(--unit-y));
      --row-2-top: calc(9.5 * var(--unit-y));
      --row-3-top: calc(20.5 * var(--unit-y));
      --row-4-top: calc(33.5 * var(--unit-y));
      --row-5-top: calc(44.5 * var(--unit-y));

      /* ============================================
         アールデコ配色
         ============================================ */
      --color-cream: #FAF8F5;           /* 盤面背景 */
      --color-burgundy: #2d1518;        /* プライマリ（カード裏背景） */
      --color-dusty-pink: #e8b4b8;      /* アクセント（カード裏装飾） */
      --color-charcoal: #2D2D2D;        /* テキスト */
      --color-warm-gray: #6B6359;       /* サブテキスト */
      --color-gold: #C9A227;            /* 強調、選択 */

      /* カテゴリ色 */
      --color-mob: #8B7355;       /* ウォームブラウン */
      --color-elite: #C9A227;     /* ゴールド */
      --color-legend: #6B3A5B;    /* ダスティパープル */
      --color-house: #4A6B4A;     /* オリーブグリーン */
      --color-wind: #5B7B9A;      /* スレートブルー */
      --card-back-bg: var(--color-burgundy);
      /* 裏面カテゴリ別色 */
      --card-back-mob: #2d1518;     /* バーガンディ（従来色） */
      --card-back-elite: #0a3070;   /* ネイビー */
      --card-back-legend: #501a60;  /* パープル */
      /* v3.0: アクセント色（表面上帯 + 裏面コーナー/ライン装飾） */
      --card-accent-mob: #e8b4b8;      /* ピンク系（従来色） */
      --card-accent-elite: #7eaadc;    /* ライトブルー */
      --card-accent-legend: #c48ed0;   /* ライトパープル */

      /* 統一影 */
      --shadow-light: 1px 1px 0px rgba(45, 21, 24, 0.15);
      --shadow-z1: 2px 2px 2px rgba(45, 21, 24, 0.12);
      --shadow-z2: 4px 4px 4px rgba(45, 21, 24, 0.10);
      --shadow-z3: 6px 6px 6px rgba(45, 21, 24, 0.08);
      --shadow-hover: 6px 6px 0px rgba(232, 180, 184, 0.5);
      --glow-gold: 0 0 15px rgba(201, 162, 39, 0.8);
      --glow-gold-soft: 0 0 15px rgba(201, 162, 39, 0.5);
      --glow-pink: 0 0 15px rgba(232, 180, 184, 0.5);
    }
    .game-board {
      width: var(--board-w);
      height: var(--board-h);
      overflow: hidden; /* v2.0.0: アニメーション要素のはみ出し防止 */
      border: none; /* v2.0.0: プレビュー環境の枠線防止 */
      outline: none;
      background:
        /* 縦線: 8px間隔、4pxオフセット（0.5U） - ダスティピンク */
        repeating-linear-gradient(
          90deg,
          transparent 0px,
          transparent 3px,
          rgba(232, 180, 184, 0.2) 3px,
          rgba(232, 180, 184, 0.2) 4px,
          transparent 4px,
          transparent 8px
        ),
        /* 横線: 14px間隔、7pxオフセット（0.5U） - ダスティピンク */
        repeating-linear-gradient(
          0deg,
          transparent 0px,
          transparent 6px,
          rgba(232, 180, 184, 0.2) 6px,
          rgba(232, 180, 184, 0.2) 7px,
          transparent 7px,
          transparent 14px
        ),
        var(--color-cream);
      position: relative;
      margin: 0 auto;
    }
    .game-header { width: var(--board-w); height: var(--header-h); position: absolute; top: 0; left: 0; display: flex; justify-content: space-between; }
    .header-left { height: var(--header-h); border: 1px solid var(--color-burgundy); display: flex; align-items: center; font-size: 12px; font-weight: bold; background: #fff; color: var(--color-charcoal); padding: 0 15px; cursor: pointer; user-select: none; box-shadow: var(--shadow-light); }
    .header-end-btn { height: var(--header-h); border: 1px solid var(--color-burgundy); display: flex; align-items: center; font-size: 11px; font-weight: bold; background: var(--color-burgundy); color: white; padding: 0 12px; cursor: pointer; margin-left: -1px; }
    .header-end-btn:hover { background: #1a0d0f; }
    .header-stop-btn { height: var(--header-h); border: 1px solid var(--color-burgundy); display: flex; align-items: center; font-size: 11px; font-weight: bold; background: var(--color-burgundy); color: white; padding: 0 12px; cursor: pointer; margin-left: -1px; }
    .header-stop-btn:hover { background: #1a0d0f; }
    .header-right { padding: 0 10px; height: var(--header-h); border: 1px solid var(--color-burgundy); display: flex; align-items: center; font-size: 12px; font-weight: bold; background: #fff; color: var(--color-charcoal); box-shadow: var(--shadow-light); }
    .nameplate { position: absolute; top: 0; left: calc(1 * var(--unit-x)); display: inline-block; padding: var(--nameplate-padding, 7px 8px); background: #fff; border: 1px solid var(--color-burgundy); font-size: var(--ui-font-size, 11px); font-weight: bold; color: var(--color-charcoal); box-shadow: var(--shadow-light); z-index: 20; }
    .nameplate.active { border: 2px solid var(--color-gold); background: var(--color-cream); }
    .self-nameplate { position: absolute; top: 0; left: calc(1 * var(--unit-x)); display: inline-block; padding: var(--nameplate-padding, 7px 8px); background: var(--color-cream); border: 2px solid var(--color-gold); font-size: var(--ui-font-size, 11px); font-weight: bold; color: var(--color-charcoal); box-shadow: var(--shadow-light); z-index: 20; }
    .deck-label { position: absolute; top: 0; left: calc(1 * var(--unit-x)); display: inline-block; padding: var(--nameplate-padding, 7px 8px); background: #fff; border: 1px solid var(--color-burgundy); font-size: var(--ui-font-size, 11px); font-weight: bold; color: var(--color-charcoal); box-shadow: var(--shadow-light); z-index: 20; }
    .deck-count { position: absolute; top: var(--deck-count-top, calc(12 * var(--unit-y))); left: calc(16 * var(--unit-x)); font-size: var(--ui-font-size, 11px); font-weight: bold; background: #fff; border: 1px solid var(--color-burgundy); color: var(--color-charcoal); padding: var(--nameplate-padding, 7px 8px); text-align: center; z-index: 20; box-shadow: var(--shadow-light); }
    .game-info-area { width: calc(30 * var(--unit-x)); height: 100%; padding: calc(1 * var(--unit-x)); }
    .game-info-header { font-size: var(--ui-font-size, 12px); font-weight: bold; margin-bottom: calc(1 * var(--unit-y)); }
    .score-section { font-size: var(--ui-font-size-small, 11px); }
    .score-label { font-weight: bold; margin-bottom: calc(0.5 * var(--unit-y)); }
    .score-names, .score-values { display: flex; gap: calc(2 * var(--unit-x)); margin-left: calc(1 * var(--unit-x)); }
    .score-values { font-weight: bold; }
    .market-area { width: calc(22 * var(--unit-x)); height: 100%; padding: calc(1 * var(--unit-x)); }
    .market-label { display: inline-block; padding: var(--nameplate-padding, 7px 8px); background: linear-gradient(135deg, #fff8e1 0%, #ffecb3 100%); border: 1px solid var(--color-gold); font-size: var(--ui-font-size, 11px); font-weight: bold; color: var(--color-charcoal); margin-bottom: 4px; box-shadow: var(--shadow-light); z-index: 20; position: relative; transition: all 0.3s ease; }
    .market-label.market-special { background: linear-gradient(135deg, #5B7B9A 0%, #4A6A89 100%); border: 2px solid var(--color-wind); color: white; animation: specialPulse 1s ease-in-out infinite; }
    @keyframes specialPulse { 0%, 100% { box-shadow: 0 0 5px rgba(91, 123, 154, 0.5); } 50% { box-shadow: 0 0 15px rgba(91, 123, 154, 0.8); } }
    .card-flip-container { perspective: 1000px; }
    .card-flip-inner { position: relative; width: 100%; height: 100%; transition: transform 0.5s; transform-style: preserve-3d; }
    .card-flip-inner.flipped { transform: rotateY(180deg); }
    .card-flip-front, .card-flip-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; -webkit-backface-visibility: hidden; }
    .card-flip-back { transform: rotateY(180deg); }
    .market-cards { display: flex; gap: 4px; }
    .market-card-slot { position: relative; transition: transform 0.15s, box-shadow 0.15s; }
    .market-card-slot.market-selectable { cursor: pointer; }
    .market-card-slot.market-selectable:hover { transform: translateY(-3px); outline: 2px solid var(--color-gold); outline-offset: 1px; box-shadow: 0 4px 12px rgba(201, 162, 39, 0.4); }
    /* v6.5: 商いの才覚 — 選択済みカードのハイライト */
    .market-card-slot.effect-selected { transform: translateY(-5px); outline: 3px solid #4CAF50; outline-offset: 1px; }
    .market-card-slot.effect-selected::after { content: '✓'; position: absolute; top: -8px; right: -8px; width: 20px; height: 20px; background: #4CAF50; color: #fff; border-radius: 50%; font-size: 12px; font-weight: bold; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 10; }
    .log-area { flex: 1; position: relative; font-size: var(--ui-font-size-small, 10px); }
    .log-box { position: absolute; left: calc(1 * var(--unit-x)); top: calc(1 * var(--unit-x)); bottom: calc(1 * var(--unit-x)); right: calc(1 * var(--unit-x)); border: 1px solid var(--color-burgundy); padding: calc(0.5 * var(--unit-y)); overflow-y: auto; }
    .log-entry { margin-bottom: calc(0.5 * var(--unit-y)); color: var(--color-charcoal); }
    .log-entry.system { color: var(--color-warm-gray); }
    .log-entry.action { color: var(--color-house); }
    .log-entry.pair { color: var(--color-gold); }
    .draw-zone-clickable { cursor: pointer; border: 2px dashed var(--color-dusty-pink); border-radius: 5px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .draw-zone-clickable:hover { border-color: var(--color-gold); background: rgba(201, 162, 39, 0.05); }

    /* v2.1.1: 引札ゾーン（位置はdraw-area-v2内でflex制御） */
    .draw-zone-v2 {
      width: var(--card-w);
      height: var(--card-h);
      border: 2px dashed var(--color-dusty-pink);
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--color-warm-gray);
      font-size: var(--ui-font-size-small, 9px);
    }
    .draw-zone-v2:hover { border-color: var(--color-gold); background: rgba(201, 162, 39, 0.05); }
    .end-turn-button { position: absolute; top: var(--unit-y); right: 0; width: var(--card-w); height: var(--card-h); background: #fff; border: 2px solid var(--color-burgundy); border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: var(--ui-font-size, 14px); font-weight: bold; cursor: pointer; color: var(--color-burgundy); }
    .end-turn-button:hover { background: var(--color-cream); }
    /* v2.1.1: 重なり対応レイアウト - 左上:名前、左下:アイコン */
    .card-large-front { width: var(--card-large-w); height: var(--card-large-h); background: #fff; border: 1px solid var(--color-burgundy); border-radius: 5px; display: flex; flex-direction: column; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; flex-shrink: 0; box-shadow: var(--shadow-light); padding: 4px 6px; }

    .card-large-front.mob, .card-large-front.elite, .card-large-front.legend, .card-large-front.house, .card-large-front.wind { border-top-width: 5px; }
    .card-large-front.selected { box-shadow: var(--glow-gold); transform: translateY(calc(-0.2 * var(--card-large-h))); z-index: 100; }
    .card-large-front.selectable-target { box-shadow: var(--glow-gold-soft); }
    .card-large-front.hesitation-hover { transform: translateY(calc(-0.2 * var(--card-large-h))); transition: transform 0.15s ease-out; z-index: 100; }
    .card-large-front .card-top-row { display: flex; justify-content: space-between; align-items: flex-start; font-size: var(--card-header-size, 11px); line-height: 1.1; }
    .card-large-front .card-top-row .card-name { font-weight: 700; color: var(--color-charcoal); }
    .card-large-front .card-top-row .card-score { font-weight: 700; color: var(--color-burgundy); }

    .card-large-body .symbol { font-size: var(--card-symbol-size, 48px); }
    .card-large-front .card-bottom-row { display: flex; justify-content: space-between; align-items: flex-end; font-size: var(--card-footer-size, 10px); line-height: 1.1; }
    .card-large-front .card-bottom-row .card-icon { font-size: var(--card-icon-size, 14px); }
    .card-large-front .card-bottom-row .card-code { font-weight: 700; color: var(--color-warm-gray); }
    /* v3.0: 裏面外枠はダーク色(=背景色)、装飾(コーナー/ライン)はアクセント色 */
    .card-large-back { width: var(--card-large-w); height: var(--card-large-h); border-radius: 5px; position: relative; overflow: hidden; background: repeating-linear-gradient(90deg, transparent 0px, transparent 7px, rgba(232, 180, 184, 0.1) 7px, rgba(232, 180, 184, 0.1) 8px), var(--card-back-bg); border: 3px solid var(--card-back-mob); cursor: pointer; flex-shrink: 0; box-shadow: var(--shadow-light); }

    .menu-container {

    /* 全画面オーバーレイ共通 */

    .btn-row { display: flex; gap: 6px; justify-content: center; margin-top: 8px; }

    .critic-grid { display: grid; grid-template-columns: repeat(var(--critic-grid-cols, 3), 1fr); gap: 4px; margin: 6px 0; }
    .critic-grid.cols-5 { grid-template-columns: repeat(5, 1fr); }
    .critic-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
    .critic-card { background: #fff; border: 1px solid var(--color-dusty-pink); padding: 4px 2px; cursor: pointer; text-align: center; min-height: 44px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
    .critic-card:hover { border-color: var(--color-burgundy); }

    .critic-card .check-mark { display: none; position: absolute; top: 2px; right: 2px; width: 16px; height: 16px; background: var(--color-gold); border-radius: 50%; color: #fff; font-size: 10px; font-weight: bold; line-height: 16px; text-align: center; }
    .critic-card.selected .check-mark { display: block; }

    /* Phase 5: 44pxボタン統一 */

    /* Phase 5: プロフィールアイコン */
    .profile-icon { position: absolute; display: flex; align-items: center; gap: 4px; min-height: 44px; padding: 6px 10px; background: rgba(255,255,255,0.95); border: 1px solid var(--color-dusty-pink); border-radius: 6px; cursor: pointer; font-size: 10px; color: var(--color-burgundy); z-index: 10; }
    .profile-icon:hover { border-color: var(--color-burgundy); }
    .profile-icon:focus { outline: 2px solid var(--color-gold); outline-offset: 1px; }
    .profile-icon .emoji { font-size: 18px; }
    /* Phase 5: モーダル */
    .modal-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 600; }
    .modal-box { background: #fff; border: 1px solid var(--color-burgundy); padding: 14px 18px; text-align: center; box-shadow: var(--shadow-hover); max-width: 90%; max-height: 90%; overflow-y: auto; }
    /* Phase 5: 絵文字ピッカーボタン */

    .emoji-btn:hover { border-color: var(--color-burgundy); }
    .emoji-btn:focus { outline: 2px solid var(--color-gold); outline-offset: 1px; }
    .emoji-btn.selected { border: 2px solid var(--color-gold); background: var(--color-cream); }
    /* Phase 5: セット数ボタン */
    .set-buttons { display: flex; gap: 4px; justify-content: center; margin: 6px 0; }
    .set-btn { min-height: 44px; min-width: 44px; padding: 8px 14px; font-size: 11px; font-weight: bold; border: 1px solid var(--color-burgundy); background: #fff; color: var(--color-burgundy); cursor: pointer; border-radius: 4px; display: flex; align-items: center; justify-content: center; }
    .set-btn:hover { border-color: var(--color-gold); }
    .set-btn:focus { outline: 2px solid var(--color-gold); outline-offset: 1px; }
    .set-btn.active { background: var(--color-gold); color: var(--color-burgundy); border-color: var(--color-gold); font-weight: bold; }
    /* Phase 5: 理由テキスト */
    .reason-text { font-size: 10px; color: #c00; margin-top: 4px; font-weight: bold; text-align: center; }
    /* Phase 5: ロゴ */
    .menu-title.logo { font-size: 36px; letter-spacing: 3px; margin-bottom: 2px; animation: logoBreath 4s ease-in-out infinite; }
    @keyframes logoBreath { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
    /* Phase 5: 下部リンク */
    .bottom-links { display: flex; gap: 12px; justify-content: center; margin-top: 8px; }
    .bottom-link { font-size: 10px; color: var(--color-warm-gray); cursor: pointer; text-decoration: underline; min-height: 44px; display: flex; align-items: center; background: none; border: none; padding: 0; }
    .bottom-link:hover { color: var(--color-burgundy); }
    .bottom-link:focus { outline: 2px solid var(--color-gold); outline-offset: 1px; }
    /* Phase 5/Step 6: 風パーティクルレイヤー */
    .wind-layer { position: absolute; top: 0; left: 0; right: 0; bottom: 0; overflow: hidden; pointer-events: none; z-index: 0; }
    .wind-emoji { position: absolute; pointer-events: none; user-select: none; line-height: 1;
      filter: grayscale(0.1);
      animation: windBlow var(--duration, 8s) var(--delay, 0s) ease-in-out infinite; }
    .wind-emoji.sucking { animation: none !important;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0.8 !important; }
    .wind-emoji.blasting { transition: none !important; }
    @keyframes windBlow {
      0% { transform: translate(0, 0) rotate(0deg) scale(var(--scale, 1)); opacity: 0; }
      8% { opacity: var(--max-opacity, 0.35); }
      70% { opacity: var(--max-opacity, 0.35); }
      100% { transform: translate(var(--drift-x, 300px), var(--drift-y, -100px)) rotate(var(--rotation, 360deg)) scale(var(--scale, 1)); opacity: 0; }
    }
    @keyframes blastAway {
      0% { opacity: 0.95; transform: translate(0,0) rotate(0deg) scale(1.2); }
      10% { opacity: 1; transform: translate(calc(var(--blast-x) * 0.05), calc(var(--blast-y) * 0.05)) rotate(calc(var(--blast-rot) * 0.05)) scale(1.4); }
      100% { opacity: 0; transform: translate(var(--blast-x), var(--blast-y)) rotate(var(--blast-rot)) scale(0.2); }
    }
    @keyframes ringExpand {
      0% { width: 10px; height: 10px; opacity: 0.6; transform: translate(-50%,-50%) scale(0.3); border: 3px solid var(--color-dusty-pink); }
      50% { opacity: 0.4; border: 2px solid var(--color-gold); }
      100% { width: 800px; height: 800px; opacity: 0; transform: translate(-50%,-50%) scale(1); border: 1px solid var(--color-dusty-pink); }
    }
    .blast-ring { position: absolute; border-radius: 50%; pointer-events: none; z-index: 2;
      animation: ringExpand var(--ring-duration, 0.7s) var(--ring-delay, 0s) ease-out forwards; }
    .screen-flash { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 3;
      background: radial-gradient(circle at var(--flash-x, 50%) var(--flash-y, 50%), rgba(212,175,55,0.4) 0%, transparent 70%);
      animation: flashPulse 0.5s ease-out forwards; }
    @keyframes flashPulse { 0% { opacity: 0; } 20% { opacity: 1; } 100% { opacity: 0; } }
    .menu-button.primary.charging { animation: btnCharge 0.4s ease-in forwards; box-shadow: 0 0 8px rgba(212,175,55,0.4); }
    @keyframes btnCharge { 0% { transform: scale(1); } 100% { transform: scale(0.88); } }
    .menu-button.primary.blasting { animation: btnBlast 0.5s ease-out forwards; }
    @keyframes btnBlast { 0% { transform: scale(0.88); } 30% { transform: scale(1.12); } 70% { transform: scale(0.97); } 100% { transform: scale(1); } }
    /* Phase 5: 選択済みリスト */
    .selected-list-item { display: flex; align-items: center; gap: 4px; padding: 4px 8px; background: var(--color-cream); border: 1px solid var(--color-dusty-pink); border-radius: 4px; min-height: 32px; }

    .selected-list-item .s-name { font-size: 9px; font-weight: bold; color: var(--color-charcoal); }
    .debug-panel { background: var(--color-burgundy); color: white; padding: calc(1 * var(--unit-y)) calc(2 * var(--unit-x)); margin-bottom: calc(2 * var(--unit-y)); font-size: 11px; }

    .effect-overlay { background: rgba(250, 248, 245, 0.9); z-index: 1000; }
    .effect-box { background: #fff; border: 1px solid var(--color-burgundy); padding: calc(3 * var(--unit-y)) calc(4 * var(--unit-x)); text-align: center; box-shadow: var(--shadow-hover); min-width: calc(40 * var(--unit-x)); max-width: 90vw; }

    /* v6.6: カウンターモーダル */
    .counter-modal-overlay { background: rgba(0, 0, 0, 0.6); z-index: 1050; }
    .counter-modal { background: var(--color-cream); border: 3px solid var(--color-burgundy); border-radius: 8px; padding: calc(3 * var(--unit-y)) calc(4 * var(--unit-x)); text-align: center; max-width: 300px; box-shadow: var(--shadow-hover); }
    .counter-title { font-size: var(--menu-title-size); color: var(--color-burgundy); font-weight: bold; margin-bottom: calc(1 * var(--unit-y)); }
    .counter-description { font-size: var(--menu-text-size); color: var(--color-warm-gray); margin-bottom: calc(2 * var(--unit-y)); white-space: pre-line; }
    .counter-buttons { display: flex; gap: calc(2 * var(--unit-x)); justify-content: center; }
    .counter-btn { padding: calc(1 * var(--unit-y)) calc(3 * var(--unit-x)); font-size: var(--menu-label-size); font-weight: bold; border: 2px solid var(--color-burgundy); border-radius: 4px; cursor: pointer; transition: all 0.2s; }
    .counter-yes { background: var(--color-burgundy); color: #fff; }
    .counter-yes:hover { background: var(--color-gold); border-color: var(--color-gold); }
    .counter-no { background: #fff; color: var(--color-burgundy); }
    .counter-no:hover { background: var(--color-dusty-pink); }
    .effect-box.purification { background: var(--color-burgundy); color: white; border: 2px solid var(--color-dusty-pink); }
    .effect-box.win { border: 2px solid var(--color-gold); }
    .effect-box.pair { border: 2px solid var(--color-gold); background: var(--color-cream); }
    .effect-box .effect-emoji { font-size: var(--effect-emoji-size, 48px); margin-bottom: calc(1 * var(--unit-y)); }
    .effect-box .effect-title { font-size: var(--effect-title-size, 20px); font-weight: bold; color: var(--color-burgundy); margin-bottom: calc(0.5 * var(--unit-y)); }
    .effect-box .effect-message { font-size: var(--effect-message-size, 11px); color: var(--color-warm-gray); }
    .effect-box.purification .effect-title { color: white; }
    .effect-box.purification .effect-message { color: var(--color-dusty-pink); }

    .action-hint { position: absolute; bottom: calc(12 * var(--unit-y)); left: 50%; transform: translateX(-50%); background: var(--color-burgundy); color: #fff; padding: 7px calc(2 * var(--unit-x)); font-size: 11px; z-index: 100; box-shadow: var(--shadow-light); }

    /* ボタンツールチップ（ホバー時にボタン下に吹き出し表示） */
    .btn-tooltip { position: relative; }
    .btn-tooltip::after {
      content: attr(data-tooltip);
      position: absolute;
      top: calc(100% + 4px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(45, 21, 24, 0.92);
      color: #fff;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 11px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 200;
    }
    .btn-tooltip::before {
      content: '';
      position: absolute;
      top: calc(100% - 1px);
      left: 50%;
      transform: translateX(-50%);
      border: 4px solid transparent;
      border-bottom-color: rgba(45, 21, 24, 0.92);
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 200;
    }
    .btn-tooltip:hover::after, .btn-tooltip:hover::before { opacity: 1; }

    .log-entry.wind { color: #4169E1; }
    .log-entry.ai-thought { color: #9c27b0; font-style: italic; padding-left: 8px; border-left: 2px solid #ce93d8; margin-left: 4px; }
    .house-targetable { cursor: pointer; }
    .house-targetable::after { content: ''; position: absolute; top: -3px; left: -3px; right: -3px; bottom: -3px; border: 3px solid #4169E1; border-radius: 6px; animation: pulse 1s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .house-disabled { opacity: 0.4; cursor: not-allowed; }
    .wind-cancel-btn { position: absolute; bottom: calc(12 * var(--unit-y)); right: calc(2 * var(--unit-x)); background: var(--color-burgundy); color: white; padding: 7px calc(2 * var(--unit-x)); font-size: 11px; cursor: pointer; z-index: 101; box-shadow: var(--shadow-light); }
    .wind-cancel-btn:hover { background: #1a0d0f; }

    /* 家から取り出し用スタイル */
    .house-breakable { position: relative; }
    .house-breakable::after { content: ''; position: absolute; top: -3px; left: -3px; right: -3px; bottom: -3px; border: 2px solid var(--color-gold); border-radius: 6px; animation: breakablePulse 1.5s ease-in-out infinite; pointer-events: none; }
    @keyframes breakablePulse { 0%, 100% { border-color: var(--color-gold); opacity: 0.6; } 50% { border-color: var(--color-dusty-pink); opacity: 1; } }
    .break-indicator { position: absolute; top: -10px; right: -10px; background: var(--color-gold); color: white; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; z-index: 10; box-shadow: var(--shadow-light); }

    /* v6.6.1: 空鳥居スタイル */
    .house-empty { opacity: 0.7; }
    .house-empty .house-card { filter: grayscale(30%); }
    .house-refillable { position: relative; }
    .house-refillable::after { content: ''; position: absolute; top: -3px; left: -3px; right: -3px; bottom: -3px; border: 2px solid var(--color-primary); border-radius: 6px; animation: refillPulse 1.5s ease-in-out infinite; pointer-events: none; }
    @keyframes refillPulse { 0%, 100% { border-color: var(--color-primary); opacity: 0.6; } 50% { border-color: var(--color-secondary); opacity: 1; } }
    .refill-indicator { position: absolute; top: -10px; right: -10px; background: var(--color-primary); color: white; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; z-index: 10; box-shadow: var(--shadow-light); }
    .empty-indicator { position: absolute; top: -10px; right: -10px; background: #888; color: white; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; z-index: 10; box-shadow: var(--shadow-light); }

    /* アニメーション */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes cardDraw { 0% { opacity: 0; transform: scale(0.8) translateY(-30px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }

    @keyframes pairFlash { 0% { transform: scale(1); box-shadow: 0 0 0 rgba(201, 162, 39, 0); } 50% { transform: scale(1.1); box-shadow: 0 0 30px rgba(201, 162, 39, 0.8); } 100% { transform: scale(1); box-shadow: 0 0 0 rgba(201, 162, 39, 0); } }
    @keyframes winCelebrate { 0% { transform: scale(1); } 25% { transform: scale(1.2) rotate(-5deg); } 50% { transform: scale(1.2) rotate(5deg); } 75% { transform: scale(1.2) rotate(-5deg); } 100% { transform: scale(1); } }
    @keyframes turnIndicator { 0%, 100% { box-shadow: 0 0 5px rgba(201, 162, 39, 0.5); } 50% { box-shadow: var(--glow-gold); } }
    .anim-fade-in { animation: fadeIn 0.3s ease-out; }
    .anim-slide-up { animation: slideInUp 0.3s ease-out; }
    .anim-slide-down { animation: slideInDown 0.3s ease-out; }
    .anim-card-draw { animation: cardDraw 0.4s ease-out; }
    .anim-pair-flash { animation: pairFlash 0.6s ease-out; }
    .anim-win { animation: winCelebrate 0.8s ease-in-out; }
    .anim-turn { animation: turnIndicator 1.5s ease-in-out infinite; }

    .effect-box.anim-win { animation: winCelebrate 0.8s ease-in-out; }

    .nameplate.active { border: 3px double var(--color-gold); animation: turnIndicator 1.5s ease-in-out infinite; }

    .drawn-card::before { content: 'NEW'; position: absolute; top: -8px; right: -8px; background: var(--color-gold); color: white; font-size: 8px; font-weight: bold; padding: 2px 5px; z-index: 10; animation: pulse 1s infinite; }

    @keyframes confettiFall {
      0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(700px) rotate(720deg); opacity: 0; }
    }
    @keyframes screenFlash {
      0% { opacity: 0; }
      50% { opacity: 0.5; }
      100% { opacity: 0; }
    }
    @keyframes phaseSlide {
      0% { opacity: 0; transform: translateY(-50px) scale(0.8); }
      50% { opacity: 1; transform: translateY(0) scale(1.1); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes cardGlow {
      0%, 100% { box-shadow: 0 0 10px rgba(201, 162, 39, 0.5); }
      50% { box-shadow: 0 0 25px rgba(201, 162, 39, 0.9); }
    }
    @keyframes turnBorderPulse {
      0%, 100% { border-color: var(--color-gold); box-shadow: 0 0 10px rgba(201, 162, 39, 0.3); }
      50% { border-color: var(--color-dusty-pink); box-shadow: 0 0 20px rgba(232, 180, 184, 0.6); }
    }
    @keyframes rainbowBorder {
      0% { border-color: #ff0000; }
      17% { border-color: #ff8800; }
      33% { border-color: #ffff00; }
      50% { border-color: #00ff00; }
      67% { border-color: #0088ff; }

    .anim-turn-border { animation: turnBorderPulse 1.5s ease-in-out infinite; }
    .anim-rainbow { animation: rainbowBorder 2s linear infinite; }

    /* v2.0.7: 風カード浮上演出（選択時にZ軸的に上昇） */
    @keyframes windCardRising {
      0% { transform: translateY(0) scale(1); box-shadow: var(--shadow-z1); }
      100% { transform: translateY(-20px) scale(1.05); box-shadow: 0 20px 40px rgba(45, 21, 24, 0.3); }

      10%, 30%, 50%, 70%, 90% { transform: translateX(calc(-0.5 * var(--unit-x))) rotate(-1.5deg); }
      20%, 40%, 60%, 80% { transform: translateX(calc(0.5 * var(--unit-x))) rotate(1.5deg); }
    }

    /* 世界の浄化（魔女+聖母ペア）演出（gold + dusty-pink交互） */
    @keyframes purificationGlow {
      0%, 100% { box-shadow: 0 0 calc(2 * var(--unit-x)) rgba(201, 162, 39, 0.5); }
      25% { box-shadow: 0 0 calc(4 * var(--unit-x)) rgba(232, 180, 184, 0.8); }
      50% { box-shadow: 0 0 calc(6 * var(--unit-x)) rgba(201, 162, 39, 1), 0 0 calc(10 * var(--unit-x)) rgba(201, 162, 39, 0.3); }
      75% { box-shadow: 0 0 calc(4 * var(--unit-x)) rgba(232, 180, 184, 0.8); }
    }
    @keyframes purificationRotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .anim-purification-glow { animation: purificationGlow 1.5s ease-in-out infinite; }

    /* 商いの才覚 — ペアカード浮遊アニメーション */
    @keyframes floatingPairBob {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
    }
    @keyframes floatingPairLand {
      0% { transform: translateY(-6px); box-shadow: 6px 6px 6px rgba(45, 21, 24, 0.08); }
      100% { transform: translateY(0px); box-shadow: 1px 1px 0px rgba(45, 21, 24, 0.15); }
    }
    .floating-pair-card {
      border-radius: var(--card-radius, 4px);
      pointer-events: none;
    }

    /* 風カード演出オーバーレイ（wind blue → アールデコに調整） */
    .wind-effect-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(250, 248, 245, 0.92);
      z-index: 1000;
    }
    .wind-effect-box {
      background: #fff;
      border: 2px solid var(--color-gold);
      padding: calc(2 * var(--unit-y)) calc(3 * var(--unit-x));
      text-align: center;
      box-shadow: var(--shadow-hover);
    }

    /* 紙吹雪 */
    .confetti-container { position: absolute; top: 0; left: 0; right: 0; bottom: 0; overflow: hidden; pointer-events: none; z-index: 999; }
    .confetti-piece { position: absolute; width: 10px; height: 10px; animation: confettiFall 3s ease-out forwards; }

    /* v2.7.1: バナーアニメーション */
    .banner-overlay-bg {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.3);
      z-index: 1003;
      animation: bannerBgFade 1.65s ease-in-out forwards;
    }
    @keyframes bannerBgFade {
      0% { opacity: 0; }
      15% { opacity: 1; }
      85% { opacity: 1; }
      100% { opacity: 0; }
    }
    .banner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) translateX(500px);
      padding: calc(1 * var(--unit-y)) calc(8 * var(--unit-x));
      font-size: calc(2.5 * var(--unit-y));
      font-weight: bold;
      white-space: nowrap;
      z-index: 1005;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
      opacity: 0;
      pointer-events: none;
    }
    @keyframes bannerSlideIn {
      0% { transform: translate(-50%, -50%) translateX(500px); opacity: 0; }
      20% { opacity: 1; }
      100% { transform: translate(-50%, -50%) translateX(0); opacity: 1; }
    }
    @keyframes bannerSlideOut {
      0% { transform: translate(-50%, -50%) translateX(0); opacity: 1; }
      80% { opacity: 1; }
      100% { transform: translate(-50%, -50%) translateX(-500px); opacity: 0; }
    }
    .banner.slide-in { animation: bannerSlideIn 0.4s ease-out forwards; }
    .banner.freeze { transform: translate(-50%, -50%) translateX(0); opacity: 1; }
    .banner.slide-out { animation: bannerSlideOut 0.25s ease-in forwards; }
    .banner-royal {
      background: linear-gradient(90deg, transparent 0%, rgba(201,162,39,0.95) 10%, rgba(255,215,0,1) 30%, rgba(255,235,150,1) 50%, rgba(255,215,0,1) 70%, rgba(201,162,39,0.95) 90%, transparent 100%);
      color: #2d1518;
      border-top: 3px solid rgba(255,255,255,0.8);
      border-bottom: 3px solid rgba(255,255,255,0.8);
      box-shadow: 0 0 20px rgba(255,215,0,0.8), 0 0 40px rgba(255,215,0,0.4), inset 0 0 20px rgba(255,255,255,0.3);
    }
    .banner-witch {
      background: linear-gradient(90deg, transparent 0%, rgba(75,0,75,0.95) 10%, rgba(138,43,226,1) 30%, rgba(180,100,255,1) 50%, rgba(138,43,226,1) 70%, rgba(75,0,75,0.95) 90%, transparent 100%);
      color: #fff;
      border-top: 3px solid rgba(255,200,255,0.8);
      border-bottom: 3px solid rgba(255,200,255,0.8);
      box-shadow: 0 0 20px rgba(180,100,255,0.8), 0 0 40px rgba(138,43,226,0.4), inset 0 0 20px rgba(255,255,255,0.2);
    }
    .banner-knight {
      background: linear-gradient(90deg, transparent 0%, rgba(80,80,90,0.95) 10%, rgba(150,150,160,1) 30%, rgba(200,200,210,1) 50%, rgba(150,150,160,1) 70%, rgba(80,80,90,0.95) 90%, transparent 100%);
      color: #2d1518;
      border-top: 3px solid rgba(255,255,255,0.9);
      border-bottom: 3px solid rgba(255,255,255,0.9);
      box-shadow: 0 0 20px rgba(200,200,220,0.8), 0 0 40px rgba(150,150,170,0.4), inset 0 0 20px rgba(255,255,255,0.4);
    }
    .banner-merchant {
      background: linear-gradient(90deg, transparent 0%, rgba(20,80,40,0.95) 10%, rgba(46,139,87,1) 30%, rgba(80,180,120,1) 50%, rgba(46,139,87,1) 70%, rgba(20,80,40,0.95) 90%, transparent 100%);
      color: #fff;
      border-top: 3px solid rgba(150,255,150,0.8);
      border-bottom: 3px solid rgba(150,255,150,0.8);
      box-shadow: 0 0 20px rgba(46,139,87,0.8), 0 0 40px rgba(46,139,87,0.4), inset 0 0 20px rgba(255,255,255,0.2);
    }
    .banner-babanuki {
      background: linear-gradient(90deg, transparent 0%, rgba(100,0,0,0.95) 10%, rgba(180,0,0,1) 30%, rgba(220,50,50,1) 50%, rgba(180,0,0,1) 70%, rgba(100,0,0,0.95) 90%, transparent 100%);
      color: #fff;
      border-top: 3px solid rgba(255,150,150,0.8);
      border-bottom: 3px solid rgba(255,150,150,0.8);
      box-shadow: 0 0 20px rgba(255,0,0,0.6), 0 0 40px rgba(180,0,0,0.3), inset 0 0 20px rgba(255,255,255,0.2);
    }
    .banner-agari {
      background: linear-gradient(90deg, transparent 0%, rgba(255,100,100,1) 10%, rgba(255,200,0,1) 25%, rgba(100,255,100,1) 40%, rgba(100,200,255,1) 55%, rgba(200,100,255,1) 70%, rgba(255,100,150,1) 85%, transparent 100%);
      color: #fff;
      border-top: 3px solid rgba(255,255,255,0.9);
      border-bottom: 3px solid rgba(255,255,255,0.9);
      box-shadow: 0 0 30px rgba(255,255,255,0.8), 0 0 60px rgba(255,200,100,0.5), inset 0 0 20px rgba(255,255,255,0.4);
      animation: bannerShimmer 0.5s ease-in-out infinite alternate;
    }
    .banner-agari.slide-in { animation: bannerSlideIn 0.4s ease-out forwards, bannerShimmer 0.5s ease-in-out infinite alternate 0.4s; }
    .banner-agari.freeze { animation: bannerShimmer 0.5s ease-in-out infinite alternate; }
    @keyframes bannerShimmer { 0% { filter: brightness(1); } 100% { filter: brightness(1.2); } }

    .victory-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1100;
      animation: victoryFadeIn 0.3s ease-out;
    }
    .victory-overlay::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(45, 21, 24, 0.85);
      z-index: -1;
    }
    @keyframes victoryFadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    /* 幾何学パターン背景 */
    .victory-pattern {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      overflow: hidden;
      z-index: 0;
    }
    .victory-shape {
      position: absolute;
      border-radius: 50%;
      animation: shapeFloat 2s ease-in-out infinite;
    }
    @keyframes shapeFloat {
      0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.7; }
      50% { transform: scale(1.1) rotate(5deg); opacity: 1; }
    }

    /* 勝利ボックス */
    .victory-box {
      position: relative;
      z-index: 1;
      background: var(--color-cream);
      border: 4px solid var(--color-gold);
      padding: calc(3 * var(--unit-y)) calc(5 * var(--unit-x));
      text-align: center;
      box-shadow:
        0 0 40px rgba(201, 162, 39, 0.6),
        0 0 80px rgba(201, 162, 39, 0.3);
      animation: victoryBoxPulse 1.5s ease-in-out infinite;
    }
    @keyframes victoryBoxPulse {
      0%, 100% { box-shadow: 0 0 40px rgba(201, 162, 39, 0.6), 0 0 80px rgba(201, 162, 39, 0.3); }
      50% { box-shadow: 0 0 60px rgba(201, 162, 39, 0.8), 0 0 100px rgba(201, 162, 39, 0.5); }
    }
    .victory-emoji {
      font-size: var(--effect-emoji-size, 48px);
      margin-bottom: calc(1 * var(--unit-y));
      animation: victoryBounce 0.6s ease-out;
    }
    @keyframes victoryBounce {
      0% { transform: scale(0); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    .victory-winner {
      font-size: var(--effect-title-size, 24px);
      font-weight: bold;
      color: var(--color-burgundy);
      margin-bottom: calc(1 * var(--unit-y));
    }
    .victory-condition {
      font-size: var(--menu-title-size, 18px);
      color: var(--color-gold);
      font-weight: bold;
    }
    .victory-condition.purification {
      color: #6B3A5B;
      text-shadow: 0 0 10px rgba(201, 162, 39, 0.8);
    }

    /* 勝利時カラーパレット */
    :root {
      --victory-red: #C94C4C;
      --victory-orange: #E67E22;
      --victory-yellow: #F1C40F;
      --victory-green: #8DC149;
      --victory-teal: #5DADE2;
      --victory-brown: #6B4423;
    }

    /* PhaseOverlay CSS → BannerOverlayに置換済み（v2.7.1） */

    /* 画面フラッシュ（ゴールド系） */
    .screen-flash { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(201, 162, 39, 0.3); z-index: 997; pointer-events: none; animation: screenFlash 0.4s ease-out forwards; }

    /* v2.0.5: 浄化オーバーレイ */
    .purification-overlay { flex-direction: column; background: rgba(255, 255, 255, 0.92); z-index: 998; animation: purificationFadeIn 0.4s ease-out; }
    .purification-box { text-align: center; animation: purificationPulse 1s ease-in-out infinite; }
    .purification-box .purification-title { font-size: var(--effect-title-size, 32px); font-weight: bold; color: var(--color-burgundy); text-shadow: 0 0 20px rgba(201, 162, 39, 0.8); margin-bottom: 8px; }
    .purification-box .purification-subtitle { font-size: var(--menu-title-size, 14px); color: var(--color-warm-gray); }
    .purification-icons { font-size: var(--effect-emoji-size, 48px); margin-bottom: calc(1 * var(--unit-y)); }
    @keyframes purificationFadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes purificationPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

    @keyframes flyToBurn {
      0% { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(var(--fly-x), var(--fly-y)) scale(0.7); opacity: 1; }
    }
    @keyframes flyToHand {
      0% { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(var(--fly-x), var(--fly-y)) scale(0.7); opacity: 1; }
    }
    @keyframes flyToDrawZone {
      0% { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(var(--fly-x), var(--fly-y)) scale(1); opacity: 1; }
    }
    @keyframes mergeToHand {
      0% { transform: translateX(0); opacity: 1; }
      100% { transform: translateX(-120px); opacity: 0; }
    }
    .flying-card { position: absolute; z-index: 1000; pointer-events: none; }
    .dealing-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 995; pointer-events: none; }

    /* ゲーム開始オーバーレイ（アールデコ） */
    .game-start-overlay { background: rgba(250, 248, 245, 0.95); z-index: 996; }
    .game-start-box { background: #fff; color: var(--color-burgundy); padding: calc(3 * var(--unit-y)) calc(5 * var(--unit-x)); text-align: center; animation: phaseSlide 0.5s ease-out; border: 1px solid var(--color-burgundy); box-shadow: var(--shadow-hover); }
    .game-start-title { font-size: var(--effect-title-size, 20px); font-weight: bold; }

    /* Phase 3: .portrait-overlay CSS削除済み（renderPortraitBoardに移行） */

    /* v2.5.8: セーフエリア対応 */
    #root {
      padding-top: env(safe-area-inset-top, 0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      padding-left: env(safe-area-inset-left, 0px);
      padding-right: env(safe-area-inset-right, 0px);
    }

    /* v2.5.8: タッチ操作の最適化 */
    .game-board {
      touch-action: manipulation;
    }
    .chat-log, .log-panel {
      touch-action: pan-y;
    }

    /* v2.5.9.3: iOS Safari自動ズーム防止（タッチデバイスのみ） */
    @media (pointer: coarse) {
      input, textarea, select {
        font-size: 16px !important;
      }
    }

    /* ============================================ */
    /* Phase 1a-8: Desktop 5-Row CSS               */
    /* ============================================ */
    .desktop-board {
      background: var(--bg-board, #FAF8F5);
      touch-action: manipulation;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
    }
    .dt-mode-ratio {
      margin: 0 auto;
    }
    .dt-mode-fill {
      width: 100%;
      height: 100vh;
    }

    /* Row hover: P0手札のカードホバー浮上 */
    .desktop-board .dt-hand-cards > div:hover {
      transform: translateY(-8px);
      transition: transform 0.12s ease-out;
      z-index: 50 !important;
    }
    .desktop-board .dt-hand-cards > div {
      transition: transform 0.12s ease-out;
    }
    /* 選択されたカード */
    .desktop-board .dt-hand-cards > div .card-standard-front.selected,
    .desktop-board .dt-hand-cards > div .unified-card.selected {
      box-shadow: var(--glow-gold);
    }

    /* 対戦相手手札のババ抜き時ホバー */
    .desktop-board .dt-opp-hand-row .card-standard-back.highlight {
      box-shadow: var(--glow-gold);
      cursor: pointer;
    }
    .desktop-board .dt-opp-hand-row .card-standard-back.highlight:hover {
      transform: translateY(-6px);
      z-index: 50 !important;
      transition: transform 0.12s ease-out;
    }
    .desktop-board .dt-opp-hand-row .card-standard-back.hesitation-hover {
      transform: translateY(-6px);
      z-index: 50 !important;
      transition: transform 0.15s ease-out;
    }

    /* 鳥居セット内のカードホバー */
    .desktop-board [style*="cursor: pointer"]:hover {
      filter: brightness(1.05);
    }

    /* 風カード攻撃対象のゴールドグロウ */
    .desktop-board .dt-opp-info-area .unified-card[style*="glow-gold"] {
      cursor: pointer;
    }

    /* 引札ゾーンのホバー */
    .desktop-board .draw-zone-v2:hover {
      filter: brightness(1.05);
      transition: filter 0.1s;
    }

    /* Row3 チャットログのスクロールバー最小化 */
    .desktop-board .dt-row3 ::-webkit-scrollbar {
      width: 4px;
    }
    .desktop-board .dt-row3 ::-webkit-scrollbar-thumb {
      background: var(--color-warm-gray, #c0b0a0);
      border-radius: 2px;
    }
    .desktop-board .dt-row3 ::-webkit-scrollbar-track {
      background: transparent;
    }

    /* アクションヒント（鳥居配置/風攻撃） */
    .desktop-board .action-hint {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 500;
      background: rgba(45, 21, 24, 0.85);
      color: #FAF8F5;
      padding: 8px 16px;
      border-radius: 4px;
      font-size: 13px;
      white-space: nowrap;
      pointer-events: none;
    }
    .desktop-board .wind-cancel-btn {
      position: absolute;
      top: 50%;
      right: 16px;
      transform: translateY(-50%);
      z-index: 501;
      background: var(--color-burgundy);
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 12px;
    }

    /* ============================================ */
    /* Phase 2: Landscape (横持ちスマホ) CSS         */
    /* ============================================ */
    .landscape-board {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      background: var(--bg-board, #FAF8F5);
      touch-action: manipulation;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
    }

    /* 対戦相手エリア: flex横並び */
    .landscape-board .ls-opponent-area {
      display: flex;
      flex-shrink: 0;
    }
    .landscape-board .ls-player-block {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      padding: 2px 4px;
    }

    /* 裏面カードoverlap */
    .landscape-board .ls-opp-cards-expanded {
      position: relative;
    }
    .landscape-board .ls-opp-cards-expanded .card-standard-back.highlight {
      box-shadow: var(--glow-gold);
      cursor: pointer;
    }
    .landscape-board .ls-opp-cards-expanded .card-standard-back.highlight:hover {
      transform: translateY(-4px);
      z-index: 50 !important;
      transition: transform 0.12s ease-out;
    }
    .landscape-board .ls-opp-cards-expanded .card-standard-back.hesitation-hover {
      transform: translateY(-4px);
      z-index: 50 !important;
      transition: transform 0.15s ease-out;
    }

    /* 対戦相手情報行: 名前 + 鳥居 */
    .landscape-board .ls-opp-info-row {
      display: flex;
      align-items: flex-start;
      overflow: hidden;
    }

    /* P0手札ホバー浮上 */
    .landscape-board .ls-hand-cards > div:hover {
      transform: translateY(-6px);
      transition: transform 0.12s ease-out;
      z-index: 50 !important;
    }
    .landscape-board .ls-hand-cards > div {
      transition: transform 0.12s ease-out;
    }
    .landscape-board .ls-hand-cards > div .card-standard-front.selected,
    .landscape-board .ls-hand-cards > div .unified-card.selected {
      box-shadow: var(--glow-gold);
    }

    /* 手札エリア: 下揃え（marginTop:autoはJSで設定） */
    .landscape-board .ls-hand-area {
      flex-shrink: 0;
      display: flex;
      align-items: flex-start;
      padding: 2px 4px;
    }

    /* 鳥居セット内のカードホバー */
    .landscape-board [style*="cursor: pointer"]:hover {
      filter: brightness(1.05);
    }

    /* 引札ゾーンのホバー */
    .landscape-board .draw-zone-v2:hover {
      filter: brightness(1.05);
      transition: filter 0.1s;
    }

    /* チャットログのスクロールバー最小化 */
    .landscape-board .ls-chat-log::-webkit-scrollbar {
      width: 3px;
    }
    .landscape-board .ls-chat-log::-webkit-scrollbar-thumb {
      background: var(--color-warm-gray, #c0b0a0);
      border-radius: 2px;
    }
    .landscape-board .ls-chat-log::-webkit-scrollbar-track {
      background: transparent;
    }

    /* --- SE サブモード (≤700px) --- */
    /* SE: title-rowはlandscape-board直下、flex:1で残り高さを吸収
       構造: landscape-board > opponent-area / title-row(flex:1) / center-area(auto) / hand-area
       プロトタイプv45.2 L1092-1101 準拠 */
    .landscape-board.ls-se > .ls-title-row {
      flex: 1 1 0;
      min-height: 14px;
      display: flex;
      flex-direction: row;
      align-items: stretch;
      position: relative;
      z-index: 501;  /* 吹き出し(z:500)の上に表示 */
      background: var(--bg-board, #FAF8F5);  /* 背景で吹き出しを隠す */
    }
    /* SE: title-cluster(左固定) */
    .landscape-board.ls-se .ls-title-cluster {
      flex-shrink: 0;
      align-self: flex-start;
    }
    /* SE: section-chat — スタイルはインラインで指定（renderLsTitleRowSE内） */
    /* SE: center-areaはflex:0 0 auto — P0鳥居+deck+cloudのみ
       プロトタイプL1146-1148準拠 */
    .landscape-board.ls-se .ls-center-area {
      flex: 0 0 auto;
      position: relative;
      padding: 0 1px;
    }
    /* SE: マージン詰め — プロトタイプL1152-1168準拠 */
    .landscape-board.ls-se {
      padding-top: 0;
    }
    .landscape-board.ls-se .ls-opponent-area {
      margin-bottom: 0;
    }
    .landscape-board.ls-se .ls-player-block {
      padding-bottom: 0;
    }
    .landscape-board.ls-se .ls-hand-area {
      padding: 0 1px;
    }
    .landscape-board.ls-se .ls-opp-cards-expanded {
      margin-bottom: 0;
    }

    /* --- Wide サブモード (701-1024px) --- */
    .landscape-board.ls-wide .ls-center-area {
      flex: 1 1 0;  /* プロトタイプL1215準拠: 対戦相手+手札の残り高さを吸収 */
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: 0;
    }
    .landscape-board.ls-wide .ls-title-row {

<body>
  <div id="root"></div>

  <!-- Phase 0: External JS (loaded in dependency order) -->
  <!-- card_parts_data_v7.js: CARD_SIZES, COLORS, LAYOUT_PATTERNS等を提供。競合3変数はCPD_プレフィックスに変更済み -->
  <script src="card_parts_data_v7.js"></script>
  <script src="pfff_i18n.js"></script>
  <script src="pfff_logger.js"></script>
  <script src="pfff_ai.js"></script>
  <script src="pfff_companion.js"></script>

  <!-- CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

  <script type="text/babel">
const { useState, useEffect, useRef, useCallback, useReducer } = React;

const PHASES = { EXPLORATION: 'exploration', BABANUKI: 'babanuki' };

// Unit System (UI_SPEC_v2準拠)
// v2.5.7: スケーリング対応 - 画面サイズに応じてユニットサイズを動的に変更
const UNIT_BASE = {
  X: 8,    // 基準ユニット横 = 8px
  Y: 14,   // 基準ユニット縦 = 14px
};

// 現在のスケール（1.0 = 基準サイズ）
let currentUnitScale = 1.0;

const UNIT = {
  get X() { return UNIT_BASE.X * currentUnitScale; },
  get Y() { return UNIT_BASE.Y * currentUnitScale; },
  // Phase 1a: 8×8統一 — 新API（UNITは8px基準のみ）
  get px() { return UNIT_BASE.X * currentUnitScale; },
  toPx: (u) => u * UNIT_BASE.X * currentUnitScale,
  toUnit: (px) => px / (UNIT_BASE.X * currentUnitScale),
  // 旧API（互換用、Phase 1bで削除）
  toPixelX: (u) => u * UNIT_BASE.X * currentUnitScale,
  toPixelY: (u) => u * UNIT_BASE.Y * currentUnitScale,
  toUnitX: (px) => px / (UNIT_BASE.X * currentUnitScale),
  toUnitY: (px) => px / (UNIT_BASE.Y * currentUnitScale),
  toUnitXBase: (px) => px / UNIT_BASE.X,
  toUnitYBase: (px) => px / UNIT_BASE.Y,
};

// ============================================
// v2.4.5 動的サイジングシステム
// ============================================

// 盤面サイズ制限
// v2.5.7: minW/minHは元の値を維持（スケーリングで画面に収める）
// v2.5.7.16: maxW=200U（横長画面で手札を広げつつデザイン破綻を防ぐ）
const BOARD_LIMITS = {
  minW: 115,    // 最小幅 (U) - スケーリング後もこの幅を確保
  maxW: 200,    // 最大幅 (U) - 手札8-9枚が重なりなしで表示可能
  minH: 39,     // 最小高さ (U) - v2.4.7: Burn対応
  maxH: 73,     // 最大高さ (U) - v2.4.7: XL 65U + 行間8U
  defaultW: 129, // デフォルト幅 (U)
  defaultH: 53,  // デフォルト高さ (U)
};

// v2.4.7: カードサイズ閾値（ベース高さ）全8サイズ
// v2.5.7.10: カードサイズ閾値（スマホ対応で下方修正）
const CARD_SIZE_THRESHOLDS = {
  xl: 60,       // XLのベース高さ (14×11U)
  large: 56,    // Largeのベース高さ (13×10U)
  medium: 52,   // Mediumのベース高さ (12×9U)
  standard: 48, // Standardのベース高さ (10×8U) ← 53→48
  small: 44,    // Smallのベース高さ (9×7U)
  mini: 40,     // Miniのベース高さ (8×6U)
  tiny: 36,     // Tinyのベース高さ (7×5U)
  burn: 33,     // Burnのベース高さ (6×5U)
};

// v2.4.7: カードサイズ別寸法（全8サイズ、旧Ux/Uy単位）
// Phase 1a-2: 旧キーのままapplyBoardSize内部で使用（Phase 1bで削除）
const CARD_DIMENSIONS = {
  xl:       { w: 14, h: 11 },
  large:    { w: 13, h: 10 },
  medium:   { w: 12, h: 9 },
  standard: { w: 10, h: 8 },
  small:    { w: 9,  h: 7 },
  mini:     { w: 8,  h: 6 },
  tiny:     { w: 7,  h: 5 },
  burn:     { w: 6,  h: 5 },
};

// Phase 1a-2: 旧↔新キーマッピング（Phase 1bでCARD_DIMENSIONSごと削除）
const CARD_SIZE_OLD_TO_NEW = {
  xl: 'xl', large: 'xl2', medium: 'l', standard: 'm',
  small: 'ms', mini: 's', tiny: 'xs', burn: 'xxs'
};
const CARD_SIZE_NEW_TO_OLD = Object.fromEntries(
  Object.entries(CARD_SIZE_OLD_TO_NEW).map(([k, v]) => [v, k])
);

// ============================================
// Phase 1a: RESPONSIVE LAYOUT SYSTEM
// card_parts_data_v7.js の CARD_SIZES を正として使用
// プロトタイプ v45.2 から移植・8×8統一方針に変換
// ============================================

// --- モード判定 ---
// 画面サイズ閾値（px直値: 画面判定のみpx。U単位ではない）
const LANDSCAPE_WIDE_THRESHOLD = 700;
const DESKTOP_THRESHOLD = 1024;
const STACK_HEIGHT_THRESHOLD = 750;

// detectLayoutMode: 画面サイズからレイアウトモード+サブモードを判定
// Desktop は landscapeのサブモードとして扱う（仕様書・プロトタイプ統一）
const detectLayoutMode = (w, h) => {
  if (w > h) {
    // 横持ち系 — w > h を必ず先に判定（縦長大画面の誤判定防止）
    if (w > DESKTOP_THRESHOLD) return { mode: 'landscape', sub: 'desktop' };
    return { mode: 'landscape', sub: w <= LANDSCAPE_WIDE_THRESHOLD ? 'se' : 'wide' };
  }
  // 縦持ち系
  return { mode: h >= STACK_HEIGHT_THRESHOLD ? 'stack' : 'side', sub: null };
};

// --- サイズ順序定数 ---
// CARD_SIZESの14レベルを大→小の順にリスト
const SIZE_ORDER = ['4xl','3xl','2xl','xl','xl2','l','m','ms','s','xs','xxs','xxxs','burn','micro'];

// --- 共通ヘルパー関数 ---

// calcOffset: 鳥居スタックオフセットの最大値を返す（Tier選択の高さ予算計算用）
// burn(6U)以下: 14px、それ以上: 28px
// 鳥居オフセット: 下のカード（格納カード）の名前テキストが見える量
// = borderTop（上部アクセント帯）+ headerSize（カード名フォント）+ padding（内部余白）
// カードサイズから自動導出されるため、Desktop/Landscape共通。固定値なし。
const TORII_OFFSET_PAD = 3;  // カード内パディング（card-top-row上端からborderTop下端まで）
const calcOffset = (sizeKey) => {
  const sz = CARD_SIZES[sizeKey];
  if (!sz) return 16;  // fallback
  return sz.borderTop + sz.headerSize + TORII_OFFSET_PAD;
};

// calcOffsetFlex: slackパラメータはAPI互換。calcOffsetと同値を返す
const calcOffsetFlex = (sizeKey, slack) => calcOffset(sizeKey);

// getCornerProps: CARD_SIZESからcorner装飾プロパティを取得（裏面展開表示用）
const getCornerProps = (sizeKey) => {
  const s = CARD_SIZES[sizeKey];
  if (!s) return { radius: 3, cornerW: 12, cornerH: 21, cornerBorder: 1, cornerOffset: 4 };
  return { radius: s.radius, cornerW: s.cornerW, cornerH: s.cornerH,
           cornerBorder: s.cornerBorder, cornerOffset: s.cornerOffset };
};

// categorizeHand: 手札を裏面色別にカウント（Portrait compact表示用）
// getBackColorKey(card)はpfff_ai.jsで定義済み（BAL/HORのbackColorオーバーライド対応）
const categorizeHand = (hand) => {
  const counts = { mob: 0, elite: 0, legend: 0 };
  if (!hand) return counts;
  hand.forEach(card => {
    const key = getBackColorKey(card);
    if (key === 'elite') counts.elite++;
    else if (key === 'legend') counts.legend++;
    else counts.mob++;
  });
  return counts;
};

// sizeKeyFromWidth: px幅からCARD_SIZESのキーを逆引き（互換用）
const sizeKeyFromWidth = (w) => {
  for (const [k, v] of Object.entries(CARD_SIZES)) { if (v.w === w) return k; }
  return 'xxs';
};

// v7ToTierProps: CARD_SIZESキーからapplyResponsive互換のプロパティ構造に変換
const v7ToTierProps = (sizeKey, extraProps) => {
  const s = CARD_SIZES[sizeKey];
  if (!s) return { w: 48, h: 64, borderTop: 2, radius: 3, header: 6, symbol: 20, footer: 5, icon: 8, ...extraProps };
  return { w: s.w, h: s.h, borderTop: s.borderTop, radius: s.radius,
           header: s.headerSize, symbol: s.symbolSize,
           footer: s.footerSize, icon: s.iconSize, ...extraProps };
};

// calcOverlapPitch: コンテナ内でN枚のカードを重ねて配置する際のpitch計算
// containerPx, cardWPx はpx値。minRatio はカード幅に対する最小表示比率
const calcOverlapPitch = (n, containerPx, cardWPx, minRatio) => {
  if (n <= 1) return cardWPx;
  const maxPitch = cardWPx;
  const minPitch = cardWPx * (minRatio || 1 / 3);
  const ideal = (containerPx - cardWPx) / (n - 1);
  return Math.max(minPitch, Math.min(maxPitch, ideal));
};

// --- 縦持ちTier定義（Phase 3で使用、ここで定義だけ先行） ---
const LABEL_H = 18;  // cloud/chatラベル高さ（px）

const TIERS = {
  S: {
    min: 375,
    deckMode: 'mini',
    handKey: 'm', p0Key: 'm', oppKey: 's', cloudKey: 's',
    deckKey: 's', stKey: 'xxxs', emptyKey: 's',
    p0Extra: {}, oppExtra: {},
    stExtra: { countSize: 18, gap: 0 },
    emptyExtra: {},
  },
  M: {
    min: 400,
    deckMode: 'mini',
    handKey: 'm', p0Key: 'm', oppKey: 'm', cloudKey: 'm',
    deckKey: 's', stKey: 'burn', emptyKey: 'm',
    p0Extra: {}, oppExtra: {},
    stExtra: { countSize: 14, gap: UX / 2 },
    emptyExtra: {},
  },
  L: {
    min: 664,
    deckMode: 'full',
    handKey: 'xl', p0Key: 'xl', oppKey: 'l', cloudKey: 'l',
    deckKey: 'm', stKey: 'xxxs', emptyKey: 'l',
    p0Extra: {}, oppExtra: {},
    stExtra: { countSize: 16, gap: UX / 2 },
    emptyExtra: {},
  },
};

// getTier: 画面幅からTierキーを返す（縦持ち用）
const getTier = (width) => {
  if (width >= TIERS.L.min) return 'L';
  if (width >= TIERS.M.min) return 'M';
  return 'S';
};

// tierToSizes: TIERSのキー定義をapplyResponsive互換のオブジェクトに展開
const tierToSizes = (tierDef) => {
  const deckSz = CARD_SIZES[tierDef.deckKey];
  const stSz = CARD_SIZES[tierDef.stKey];
  const p0Off = { offset: calcOffset(tierDef.p0Key), ...(tierDef.p0Extra || {}) };
  const oppOff = { offset: calcOffset(tierDef.oppKey), ...(tierDef.oppExtra || {}) };
  return {
    deckMode: tierDef.deckMode,
    hand: v7ToTierProps(tierDef.handKey, {}), handKey: tierDef.handKey,
    p0: v7ToTierProps(tierDef.p0Key, p0Off), p0Key: tierDef.p0Key,
    opp: v7ToTierProps(tierDef.oppKey, oppOff), oppKey: tierDef.oppKey,
    cloud: v7ToTierProps(tierDef.cloudKey, {}), cloudKey: tierDef.cloudKey,
    deck: { w: deckSz.w, h: deckSz.h, radius: deckSz.radius }, deckKey: tierDef.deckKey,
    st: { w: stSz.w, h: stSz.h, radius: stSz.radius,
          cornerW: stSz.cornerW, cornerH: stSz.cornerH,
          cornerBorder: stSz.cornerBorder, cornerOffset: stSz.cornerOffset,
          ...(tierDef.stExtra || {}) },
    stKey: tierDef.stKey,
    empty: { w: CARD_SIZES[tierDef.emptyKey].w, h: CARD_SIZES[tierDef.emptyKey].h,
             ...(tierDef.emptyExtra || {}) },
    emptyKey: tierDef.emptyKey,
  };
};

// --- 横持ちTier計算（Phase 2で使用、ここで定義だけ先行） ---
const calcLandscapeTier = (w, h) => {
  const sub = (w <= LANDSCAPE_WIDE_THRESHOLD) ? 'se' : (w <= DESKTOP_THRESHOLD) ? 'wide' : 'desktop';
  const sizeOf = (name) => CARD_SIZES[name];
  const sizeIdx = (name) => SIZE_ORDER.indexOf(name);
  const sizeName = (idx) => SIZE_ORDER[Math.min(idx, SIZE_ORDER.length - 1)];

  const TITLE_ROW_H = 24;
  const SAFETY = 2;

  if (sub === 'wide' || sub === 'desktop') {
    const OPP_OVERHEAD = sub === 'desktop' ? 64 : 0;
    const LABEL_H_USED = sub === 'desktop' ? 24 : LABEL_H;
    const P0_LABEL_OVERHEAD = sub === 'desktop' ? 24 : 0;
    const HAND_PAD = sub === 'desktop' ? 8 : 0;
    const minOppStepFromCloud = sub === 'desktop' ? 2 : 0;
    const maxOppStepFromCloud = sub === 'desktop' ? 4 : 2;
    const minExpStepFromOppTorii = sub === 'desktop' ? 1 : 0;
    const maxExpStepFromOppTorii = sub === 'desktop' ? 3 : 2;

    let bestHand = 'xxs', bestCloud = 'xxs', bestOppTorii = 'xxs', bestOpp = 'xxs';

    for (let hi = 0; hi < SIZE_ORDER.length - 1; hi++) {
      const handName = SIZE_ORDER[hi];
      const handH = sizeOf(handName).h;
      for (let ci = hi; ci <= hi + 1 && ci < SIZE_ORDER.length - 1; ci++) {
        const cloudName = SIZE_ORDER[ci];
        const cloudH = sizeOf(cloudName).h;
        for (let oi = ci + minOppStepFromCloud; oi <= ci + maxOppStepFromCloud && oi < SIZE_ORDER.length - 1; oi++) {
          const oppToriiName = SIZE_ORDER[oi];
          const oppToriiH = sizeOf(oppToriiName).h;
          for (let ei = oi + minExpStepFromOppTorii; ei <= oi + maxExpStepFromOppTorii && ei < SIZE_ORDER.length - 1; ei++) {
            const oppName = SIZE_ORDER[ei];
            const oppH = sizeOf(oppName).h;
            const oppOff = calcOffset(oppToriiName);
            const total = OPP_OVERHEAD + oppH + (oppToriiH + oppOff) + P0_LABEL_OVERHEAD + (cloudH + LABEL_H_USED) + handH + HAND_PAD;
            if (total + SAFETY <= h) {
              if (sizeIdx(handName) < sizeIdx(bestHand) ||
                  (sizeIdx(handName) === sizeIdx(bestHand) && sizeIdx(cloudName) < sizeIdx(bestCloud))) {
                bestHand = handName; bestCloud = cloudName;
                bestOppTorii = oppToriiName; bestOpp = oppName;
              }
            }
          }
        }
      }
    }

    const oppSz = sizeOf(bestOpp);
    const oppToriiSz = sizeOf(bestOppTorii);
    const handSz = sizeOf(bestHand);
    const deckKey = sub === 'desktop' ? 'xxs' : 'micro';
    const p0Key = bestCloud;
    const smaller = (name) => { const i = sizeIdx(name); return sizeName(Math.min(i + 1, SIZE_ORDER.length - 1)); };
    const cloudDisplayKey = smaller(bestCloud);  // 雲上カード表示は1段階小さく

    const maxOff = calcOffset(bestOppTorii);
    const totalAtMax = OPP_OVERHEAD + oppSz.h + (oppToriiSz.h + maxOff)
                     + P0_LABEL_OVERHEAD + (sizeOf(bestCloud).h + LABEL_H_USED) + handSz.h + HAND_PAD;
    const toriiSlack = h - SAFETY - totalAtMax;
    const flexOff = calcOffsetFlex(bestOppTorii, toriiSlack);
    const p0FlexOff = calcOffsetFlex(p0Key, toriiSlack);

    return {
      sub, deckMode: 'full',
      hand: v7ToTierProps(bestHand, {}), handKey: bestHand,
      p0: v7ToTierProps(p0Key, { offset: p0FlexOff }), p0Key: p0Key,
      opp: v7ToTierProps(bestOppTorii, { offset: flexOff }), oppKey: bestOppTorii,
      cloud: v7ToTierProps(cloudDisplayKey, {}), cloudKey: cloudDisplayKey,
      deck: { w: sizeOf(deckKey).w, h: sizeOf(deckKey).h, radius: sizeOf(deckKey).radius }, deckKey,
      st: v7ToTierProps('xxxs', { countSize: CARD_SIZES['xxxs'].deck.countSize, gap: UX / 2 }), stKey: 'xxxs',
      empty: { w: oppToriiSz.w, h: oppToriiSz.h }, emptyKey: bestOppTorii,
      exp: { w: oppSz.w, h: oppSz.h }, expKey: bestOpp,
    };

  } else {
    // SE版
    const P0_LABEL_H = 14;
    let bestHand = 'xxs', bestCloud = 'xxs', bestOppTorii = 'xxs', bestOpp = 'xxs';

    for (let hi = 0; hi < SIZE_ORDER.length - 1; hi++) {
      const handName = SIZE_ORDER[hi];
      const handH = sizeOf(handName).h;
      for (let ci = hi; ci <= hi + 2 && ci < SIZE_ORDER.length - 1; ci++) {
        const cloudName = SIZE_ORDER[ci];
        const cloudH = sizeOf(cloudName).h;
        for (let oi = ci; oi <= ci + 2 && oi < SIZE_ORDER.length - 1; oi++) {
          const oppToriiName = SIZE_ORDER[oi];
          const oppToriiH = sizeOf(oppToriiName).h;
          const p0H = oppToriiH;
          for (let ei = oi; ei <= oi + 1 && ei < SIZE_ORDER.length - 1; ei++) {
            const oppName = SIZE_ORDER[ei];
            const oppH = sizeOf(oppName).h;
            const p0Off = calcOffset(oppToriiName);
            const oppOff = calcOffset(oppToriiName);
            const row3H = Math.max(P0_LABEL_H + p0H + p0Off, cloudH);
            const total = oppH + (oppToriiH + oppOff) + TITLE_ROW_H + row3H + handH;
            if (total + SAFETY <= h) {
              if (sizeIdx(handName) < sizeIdx(bestHand) ||
                  (sizeIdx(handName) === sizeIdx(bestHand) && sizeIdx(cloudName) < sizeIdx(bestCloud))) {
                bestHand = handName; bestCloud = cloudName;
                bestOppTorii = oppToriiName; bestOpp = oppName;
              }
            }
          }
        }
      }
    }

    const oppSz = sizeOf(bestOpp);
    const oppToriiSz = sizeOf(bestOppTorii);
    const deckKey = bestOppTorii;
    const p0Key = bestOppTorii;

    const seMaxOff = calcOffset(bestOppTorii);
    const seP0H = oppToriiSz.h;
    const seRow3H = Math.max(P0_LABEL_H + seP0H + seMaxOff, sizeOf(bestCloud).h);
    const seTotalAtMax = oppSz.h + (oppToriiSz.h + seMaxOff) + TITLE_ROW_H + seRow3H + sizeOf(bestHand).h;
    const seSlack = h - SAFETY - seTotalAtMax;
    const seFlexOff = calcOffsetFlex(bestOppTorii, seSlack);

    return {
      sub, deckMode: 'full',
      hand: v7ToTierProps(bestHand, {}), handKey: bestHand,
      p0: v7ToTierProps(p0Key, { offset: seFlexOff }), p0Key: p0Key,
      opp: v7ToTierProps(bestOppTorii, { offset: seFlexOff }), oppKey: bestOppTorii,
      cloud: v7ToTierProps(bestCloud, {}), cloudKey: bestCloud,
      deck: { w: sizeOf(deckKey).w, h: sizeOf(deckKey).h, radius: sizeOf(deckKey).radius }, deckKey,
      st: v7ToTierProps('xxxs', { countSize: CARD_SIZES['xxxs'].deck.countSize, gap: UX / 2 }), stKey: 'xxxs',
      empty: { w: oppToriiSz.w, h: oppToriiSz.h }, emptyKey: bestOppTorii,
      exp: { w: oppSz.w, h: oppSz.h }, expKey: bestOpp,
    };
  }
};

// --- Desktop 5-Row 定数・計算関数 ---

const DESKTOP_5ROW = {
  BOARD_MAX_W: 1600,  // px（画面サイズ上限）
  // Row間パディング（px値。計画書のU換算: r1t=0.5U等は別途検討。Phase 1aではpxで動かす）
  // Row1↔Row2間: r1b+r2t = 4+4 = 8px、Row4↔Row5間: r4b+r5t = 4+4 = 8px
  BASE_PAD: { r1t: 4, r1b: 4, r2t: 4, r2b: 4, r3t: 6, r3b: 6, r4t: 4, r4b: 4, r5t: 4, r5b: 4, side: 6 },
  R3_H: 80,           // Row3（チャットエリア）基本高さ（px）
  TORII_COUNT: 3,      // 鳥居の最大数
  CLOUD_COUNT: 6,      // 雲上カード数
  MIN_SPACER: 8,       // Row4内の最小スペーサー（px）
};

// calcDesktopBoardSize: 画面サイズからDesktopボードサイズを計算
const calcDesktopBoardSize = (w, h) => {
  const isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
  // fill: 全画面（タッチデバイスまたは幅1600px以下）、ratio: 幅1600px上限・高さは画面高さ
  const mode = (isTouch || w <= DESKTOP_5ROW.BOARD_MAX_W) ? 'fill' : 'ratio';
  if (mode === 'fill') return { w, h, mode };
  return { w: DESKTOP_5ROW.BOARD_MAX_W, h, mode };
};

// calcDesktopLayout: ボードサイズからDesktop 5-Rowレイアウトを計算
// 返り値: { tier, pad, chatExtra, slack, r3H, r4ToriiGap, r4CloudGap, dtToriiOff }
const calcDesktopLayout = (boardW, boardH) => {
  const D = DESKTOP_5ROW;
  const SZ = CARD_SIZES;

  // Row4の幅計算: P0鳥居3セット + deck + cloud6枚 + gap + spacer
  const row4Width = (midW, deckTotalW, toriiGap, cloudGap) => {
    const p0Torii = midW * D.TORII_COUNT + toriiGap * (D.TORII_COUNT - 1);
    const cloud = midW * D.CLOUD_COUNT + cloudGap * (D.CLOUD_COUNT - 1);
    return D.BASE_PAD.side * 2 + p0Torii + D.MIN_SPACER + deckTotalW + D.MIN_SPACER + cloud;
  };
  const row4IdealWidth = (midW, deckTotalW) => row4Width(midW, deckTotalW, 6, 4);
  const row4FitsWidth = (midW, deckTotalW) => row4Width(midW, deckTotalW, 0, 0) <= boardW;

  // midサイズ以下でRow4幅に収まる最初のdeckサイズを返す
  const findDeckSize = (mi) => {
    for (let di = mi; di < SIZE_ORDER.length; di++) {
      const dtw = SZ[SIZE_ORDER[di]].deck.totalW;
      if (row4FitsWidth(SZ[SIZE_ORDER[mi]].w, dtw)) return di;
    }
    return SIZE_ORDER.length - 1;
  };

  // 5行の合計高さ計算
  const calcHeight = (hand, mid, deck, small, midKey) => {
    const toriiOff = calcOffset(midKey);
    const row1 = small.h + D.BASE_PAD.r1t + D.BASE_PAD.r1b;
    const row2 = mid.h + toriiOff + D.BASE_PAD.r2t + D.BASE_PAD.r2b;
    const row3 = D.R3_H + D.BASE_PAD.r3t + D.BASE_PAD.r3b;
    const row4H = Math.max(mid.h + toriiOff + deck.deck.countSize, deck.deck.totalH);
    const row4 = row4H + D.BASE_PAD.r4t + D.BASE_PAD.r4b;
    const row5 = hand.h + D.BASE_PAD.r5t + D.BASE_PAD.r5b;
    return row1 + row2 + row3 + row4 + row5;
  };

  // Tier探索: hand > mid > deck, mid > opp の段階差を変えて最適を見つける
  let bestTier = null;
  let bestSlack = Infinity;

  for (let hi = 0; hi < SIZE_ORDER.length; hi++) {
    const hand = SZ[SIZE_ORDER[hi]];
    for (let step1 = 1; step1 <= 3 && hi + step1 < SIZE_ORDER.length; step1++) {
      const mi = hi + step1;
      const mid = SZ[SIZE_ORDER[mi]];
      const di = findDeckSize(mi);
      if (di >= SIZE_ORDER.length) continue;
      const deck = SZ[SIZE_ORDER[di]];
      if (!row4FitsWidth(mid.w, deck.deck.totalW)) continue;
      for (let step2 = 1; step2 <= 3 && mi + step2 < SIZE_ORDER.length; step2++) {
        const si = mi + step2;
        const small = SZ[SIZE_ORDER[si]];
        const total = calcHeight(hand, mid, deck, small, SIZE_ORDER[mi]);
        if (total <= boardH) {
          const slack = boardH - total;
          if (!bestTier || hi < bestTier.hi ||
              (hi === bestTier.hi && mi < bestTier.mi) ||
              (hi === bestTier.hi && mi === bestTier.mi && slack < bestSlack)) {
            bestTier = { hi, mi, di, si, total, slack };
            bestSlack = slack;
          }
          break;
        }
      }
      if (bestTier && bestTier.hi === hi) break;
    }
  }

  // フォールバック: 最小サイズ
  if (!bestTier) {
    const last = SIZE_ORDER.length - 1;
    bestTier = { hi: last, mi: last, di: last, si: last, total: 0, slack: 0 };
  }

  const tier = {
    hand: SIZE_ORDER[bestTier.hi],
    mid: SIZE_ORDER[bestTier.mi],
    deck: SIZE_ORDER[bestTier.di],
    opp: SIZE_ORDER[bestTier.si],
  };

  // Row4のgap計算: idealWidthに収まらない場合はgapを縮小
  const midW = SZ[tier.mid].w;
  const idealW = row4IdealWidth(midW, SZ[tier.deck].deck.totalW);
  let r4ToriiGap = 6, r4CloudGap = 4;

  if (idealW > boardW) {
    const excess = idealW - boardW;
    const toriiGapTotal = r4ToriiGap * (D.TORII_COUNT - 1);
    const cloudGapTotal = r4CloudGap * (D.CLOUD_COUNT - 1);
    const shrinkable = toriiGapTotal + cloudGapTotal;
    if (excess <= shrinkable) {
      const ratio = 1 - excess / shrinkable;
      r4ToriiGap = Math.max(0, Math.round(r4ToriiGap * ratio));
      r4CloudGap = Math.max(0, Math.round(r4CloudGap * ratio));
    } else {
      r4ToriiGap = 0;
      r4CloudGap = 0;
    }
  }

  // 余剰スペースの分配:
  // 鳥居オフセット: borderTop+headerSize+pad から自動導出（Desktop/Landscape共通）
  // 1. 実況チャットエリアにslackの半分を吸収（上限220px）
  // 2. 残りは上下均等パディングに分配
  const slack = bestTier.slack;
  const dtToriiOff = calcOffsetFlex(tier.mid, slack);
  const toriiSaved = 0;  // calcOffsetFlex=calcOffset（常に同値）のため圧縮なし
  const effectiveSlack = slack + toriiSaved;
  const CHAT_EXTRA_MAX = 220;
  const chatExtra = Math.min(Math.floor(effectiveSlack / 2), CHAT_EXTRA_MAX);
  const remaining = effectiveSlack - chatExtra;

  const pad = { ...D.BASE_PAD };
  if (remaining > 0) {
    const half = Math.floor(remaining / 2);
    pad.r1t += half;
    pad.r5b += remaining - half;
  }

  return { tier, pad, chatExtra, slack: effectiveSlack, total: bestTier.total, r3H: D.R3_H,
           r4ToriiGap, r4CloudGap, dtToriiOff };
};

// v2.5.7.10: 高さからカードサイズを取得（閾値下方修正）
const getCardSizeForHeight = (heightU) => {
  if (heightU >= 60) return 'xl';

  if (heightU >= 52) return 'medium';
  if (heightU >= 48) return 'standard';
  if (heightU >= 44) return 'small';
  if (heightU >= 40) return 'mini';
  if (heightU >= 36) return 'tiny';
  return 'burn';
};

// v2.5.7.11: カードサイズから行高さを取得
const getRowHeightsForSize = (cardSize) => {
  const cardH = CARD_DIMENSIONS[cardSize].h;
  const houseStack = cardSize === 'burn' ? 1 : 2;
  // スマホ時（scale小）は中央行を縮小して下部に余白を確保
  const centerH = currentUnitScale < 0.9 ? 11 : 12;
  return {
    hand: cardH,
    house: cardH + houseStack,
    center: centerH,
  };
};

// 旧レイアウト: 全員同じ currentCardSize

// v2.4.7: 現在のカード寸法を取得
// Phase 1a-2 bridge: 旧Ux/Uy寸法を返す（既存アニメーション・レイアウト互換用）
// 新CARD_SIZESは CARD_SIZES[currentCardSize] で直接参照
// v3.0.0.2: 旧マッピングにないキー（2xl,3xl,4xl等）はCARD_SIZESのux/uyで代用
// 呼び出し側は w→UNIT.toPixelX, h→UNIT.toPixelY で変換するが、
// CARD_SIZESのuy はUx(8px)単位のため、h には uy ではなく Uy換算値を返す
const getCurrentCardDimensions = () => {
  const oldKey = CARD_SIZE_NEW_TO_OLD[currentCardSize];
  if (oldKey && CARD_DIMENSIONS[oldKey]) return CARD_DIMENSIONS[oldKey];
  // 旧マッピングにない新サイズ: CARD_SIZESからUx/Uy互換値を生成
  const sz = CARD_SIZES[currentCardSize];
  if (!sz) return CARD_DIMENSIONS.standard; // ultimate fallback
  // h をUy(14px)単位に変換: px高さ / 14
  return { w: sz.ux, h: Math.round(sz.h / UNIT_BASE.Y) };
};

// v2.5.8.3: localStorage キー
const SCREEN_SIZE_STORAGE_KEY = 'pfff_max_screen_size';

// v2.5.10.0: レイアウトキャッシュシステム（ブレークポイント制）
const LAYOUT_CACHE_VERSION = 1;

// ブレークポイント定義
const pickBreakpoint = (width) => {
  if (width < 480) return 'xs';   // スマホ縦
  if (width < 768) return 'sm';   // スマホ横/小タブレット
  if (width < 1024) return 'md';  // タブレット

};

// orientation取得
const getOrientation = () => {
