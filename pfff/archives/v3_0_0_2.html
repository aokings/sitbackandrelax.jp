};

// レイアウトキャッシュキー生成
const getLayoutCacheKey = (breakpoint, orientation) => {
  return `layout:v${LAYOUT_CACHE_VERSION}:${orientation}:${breakpoint}`;
};

// レイアウトキャッシュ読み込み
const loadLayoutCache = (key) => {
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    // 軽いスキーマチェック
    if (typeof parsed.scale !== 'number' || typeof parsed.timestamp !== 'number') {
      throw new Error('invalid layout cache');
    }
    return parsed;
  } catch (e) {
    try { localStorage.removeItem(key); } catch {}
    return null;
  }
};

// レイアウトキャッシュ保存
const saveLayoutCache = (key, data) => {
  try {
    localStorage.setItem(key, JSON.stringify({ ...data, timestamp: Date.now() }));
  } catch (e) {
    console.warn('[LayoutCache] Failed to save:', e);
  }
};

// 旧形式のキャッシュをクリア（移行用）
const clearLegacyCache = () => {
  try {
    localStorage.removeItem(SCREEN_SIZE_STORAGE_KEY);
  } catch {}
};

// 現在のブレークポイント（グローバル）
let currentBreakpoint = null;
let currentOrientation = null;

// v2.5.8.3: 保存された最大スクリーンサイズを取得（後方互換性のため残す）
const getSavedMaxScreenSize = () => {
  try {
    const saved = localStorage.getItem(SCREEN_SIZE_STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      if (parsed.w > 0 && parsed.h > 0) {
        return parsed;
      }
    }
  } catch (e) {
  }
  return null;
};

// v2.5.8.3: 最大スクリーンサイズを保存（後方互換性のため残す）
const saveMaxScreenSize = (w, h) => {
  try {
    localStorage.setItem(SCREEN_SIZE_STORAGE_KEY, JSON.stringify({ w, h }));
  } catch (e) {
  }
};

// v2.5.8.3: 記録された最大スクリーンサイズ（メモリ内キャッシュ）
let maxScreenSizeCache = getSavedMaxScreenSize() || { w: 0, h: 0 };

// v2.5.8.3: 画面サイズ取得（キーボード表示の影響を受けない安定版）
const getEffectiveScreenSize = () => {
  const touch = isTouchDevice();
  
  // 現在のサイズを取得
  let currentW = window.innerWidth;
  let currentH = window.innerHeight;
  
  // 横向きに正規化（大きい方を幅、小さい方を高さ）
  if (currentH > currentW) {
    [currentW, currentH] = [currentH, currentW];
  }
  
  if (touch) {
    // タッチデバイスの場合
    
    // screenサイズも取得（参考値）
    const screenW = Math.max(screen.width, screen.height);
    const screenH = Math.min(screen.width, screen.height);
    
    // キャッシュより大きいサイズが検出されたら更新
    if (currentW > maxScreenSizeCache.w || currentH > maxScreenSizeCache.h) {
      maxScreenSizeCache.w = Math.max(maxScreenSizeCache.w, currentW);
      maxScreenSizeCache.h = Math.max(maxScreenSizeCache.h, currentH);
      saveMaxScreenSize(maxScreenSizeCache.w, maxScreenSizeCache.h);
    }
    
    // screenサイズでも更新を試みる（初回起動時に役立つ）
    if (screenW > maxScreenSizeCache.w || screenH > maxScreenSizeCache.h) {
      maxScreenSizeCache.w = Math.max(maxScreenSizeCache.w, screenW);
      maxScreenSizeCache.h = Math.max(maxScreenSizeCache.h, screenH);
      saveMaxScreenSize(maxScreenSizeCache.w, maxScreenSizeCache.h);
    }
    
    // キャッシュがあり、現在のサイズが小さい場合（キーボード表示中など）はキャッシュを使用
    if (maxScreenSizeCache.w > 0 && maxScreenSizeCache.h > 0) {
      if (currentH < maxScreenSizeCache.h * 0.8) {
        // 高さが80%以下 → キーボード表示中と推定
        return { width: maxScreenSizeCache.w, height: maxScreenSizeCache.h };
      }
    }
    
    return { width: currentW, height: currentH };
  }
  
  // PC: そのまま返す
  return { width: currentW, height: currentH };
};

// v2.5.7.8: スケーリング設定（画面いっぱいに使う方式）
const SCALING_CONFIG = {
  minScale: 0.55,     // 最小スケール - はみ出し防止のため控えめに
  maxScale: 1.0,      // 最大スケール（これ以上にはしない）
  targetBoardW: 100,  // 目標盤面幅（U）- 100U×8px=800px基準
  targetBoardH: 53,   // 目標盤面高さ（U）- 53U×14px=742px基準（standardサイズ用）
};

// v2.5.7.1: ユニットスケールを計算して適用（画面いっぱいに使う）
const calcAndApplyUnitScale = (windowWidth, windowHeight) => {
  const borderPx = 2;
  
  // 画面に収まる最大スケールを計算
  // スケール = 画面サイズ / (目標ユニット数 × 基準ユニットpx)
  const scaleW = (windowWidth - borderPx) / (SCALING_CONFIG.targetBoardW * UNIT_BASE.X);
  const scaleH = (windowHeight - borderPx) / (SCALING_CONFIG.targetBoardH * UNIT_BASE.Y);
  
  // 縦横両方が収まるスケールを採用（小さい方）
  let scale = Math.min(scaleW, scaleH);
  
  // スケール制限
  scale = Math.min(SCALING_CONFIG.maxScale, Math.max(SCALING_CONFIG.minScale, scale));
  
  // スケールを適用
  currentUnitScale = scale;
  
  // CSS変数を更新
  const root = document.documentElement;
  root.style.setProperty('--unit', `${UNIT_BASE.X * scale}px`);
  root.style.setProperty('--unit-x', `${UNIT_BASE.X * scale}px`);
  root.style.setProperty('--unit-y', `${UNIT_BASE.Y * scale}px`);
  
  
  return scale;
};

// ウィンドウサイズから最適な盤面サイズを計算
const calcOptimalBoardSize = (windowWidth, windowHeight) => {
  // v2.5.7: まずスケーリングを適用
  const scale = calcAndApplyUnitScale(windowWidth, windowHeight);
  
  // v2.4.7: padding 0、borderのみ考慮
  const borderPx = 2; // ボーダー幅 (1px × 2)
  
  // スケール適用後のユニットサイズで計算
  const availableW = Math.floor((windowWidth - borderPx) / UNIT.X);
  const availableH = Math.floor((windowHeight - borderPx) / UNIT.Y);
  
  // v2.5.7.18: アスペクト比制限（2.5〜4.5）
  const MIN_ASPECT = 2.5;  // 最大膨隆（縦長限界）
  const MAX_ASPECT = 4.5;  // 最大扁平（横長限界）- Xperia 21:9対応
  
  let boardW = Math.min(BOARD_LIMITS.maxW, Math.max(BOARD_LIMITS.minW, availableW));
  let boardH = Math.min(BOARD_LIMITS.maxH, Math.max(BOARD_LIMITS.minH, availableH));
  
  const aspect = boardW / boardH;
  
  if (aspect > MAX_ASPECT) {
    // 横長すぎ → 横を縮小（縦に合わせる）
    boardW = Math.floor(boardH * MAX_ASPECT);
    boardW = Math.max(BOARD_LIMITS.minW, boardW);
  } else if (aspect < MIN_ASPECT) {
    // 縦長すぎ → 縦を縮小（横に合わせる）
    boardH = Math.floor(boardW / MIN_ASPECT);
    boardH = Math.max(BOARD_LIMITS.minH, boardH);
  }
  
  
  return { boardW, boardH };
};

// useBoardSize フック（Reactコンポーネント用）
const useBoardSize = () => {
  const [boardSize, setBoardSize] = useState({
    boardW: BOARD_LIMITS.defaultW,
    boardH: BOARD_LIMITS.defaultH
  });
  
  useEffect(() => {
    const isTouch = isTouchDevice();
    
    // v2.5.10.0: 初期ブレークポイントを設定
    const { width: initialW, height: initialH } = getEffectiveScreenSize();
    currentBreakpoint = pickBreakpoint(Math.max(initialW, initialH));
    currentOrientation = getOrientation();
    
    // 旧形式のキャッシュをクリア（移行用、一度だけ）
    clearLegacyCache();
    
    
    // v2.5.10.0: debounce関数
    const debounce = (fn, wait) => {
      let timer = null;
      return (...args) => {
        if (timer) clearTimeout(timer);
        timer = setTimeout(() => fn(...args), wait);
      };
    };
    
    // v2.5.10.0: ブレークポイント変更時の処理
    const handleBreakpointChange = () => {
      const { width, height } = getEffectiveScreenSize();
      const newBreakpoint = pickBreakpoint(Math.max(width, height));
      const newOrientation = getOrientation();
      
      // ブレークポイントまたはorientationが変わった場合のみ再計算
      if (newBreakpoint !== currentBreakpoint || newOrientation !== currentOrientation) {
        
        currentBreakpoint = newBreakpoint;
        currentOrientation = newOrientation;
        
        // ロックを解除して再計算
        boardSizeLocked = false;
        const { boardW, boardH } = calcOptimalBoardSize(width, height);
        applyBoardSize(boardW, boardH);
        setBoardSize({ boardW, boardH });
        
        // 新しいブレークポイント用のキャッシュを保存
        const cacheKey = getLayoutCacheKey(newBreakpoint, newOrientation);
        saveLayoutCache(cacheKey, { scale: currentUnitScale, boardW, boardH });
      }
    };
    
    // v2.5.10.0: resizeハンドラ（150msデバウンス）
    const debouncedResize = debounce(handleBreakpointChange, 150);
    
    // 初回サイズ設定
    const checkAndSetSize = () => {
      if (boardSizeLocked) {
        setBoardSize({ boardW: currentBoardSize.w, boardH: currentBoardSize.h });
      } else {
        requestAnimationFrame(checkAndSetSize);
      }
    };
    checkAndSetSize();
    
    // v2.5.10.0: タッチデバイスでもresizeリスナーを追加（ブレークポイント変更検知用）
    window.addEventListener('resize', debouncedResize);
    
    // orientationchangeイベントも監視（iOS Safari用）
    window.addEventListener('orientationchange', () => {
      // orientationchange後に少し待ってからサイズを再取得
      setTimeout(debouncedResize, 300);
    });
    
    return () => {
      window.removeEventListener('resize', debouncedResize);
    };
  }, []);
  
  return boardSize;
};

// 動的pitch計算（ユニット単位）
// 手札カードの配置間隔を計算
// - 余裕がある場合: カード幅 + 1U間隔
// - 重なり始める場合: 等幅配置
// - 重なり限界: 最小間隔1U確保、はみ出し許可
const calcCardPitch = (cardCount, areaWidthU, cardWidthU, minGapU = 1) => {
  if (cardCount <= 1) return 0;

  // カード幅 + 1U間隔で並べた場合の必要幅
  const widthWithGap = cardWidthU + (cardWidthU + minGapU) * (cardCount - 1);

  if (widthWithGap <= areaWidthU) {
    // 余裕あり: カード幅 + 1U間隔
    return UNIT.toPixelX(cardWidthU + minGapU);
  }

  // 等幅配置（ピクセル計算）
  const areaWidthPx = UNIT.toPixelX(areaWidthU);
  const cardWidthPx = UNIT.toPixelX(cardWidthU);
  const pitch = (areaWidthPx - cardWidthPx) / (cardCount - 1);

  // 最小間隔1U確保（それ以下ならはみ出し許可）
  const minGapPx = UNIT.toPixelX(minGapU);
  if (pitch < minGapPx) {
    return minGapPx;
  }

  return pitch;
};

// ============================================
// GameLogic: 純粋なゲームロジック関数群
// ============================================
const GameLogic = {
  // デッキ生成 - v6.6: gameParamsで枚数を動的に設定可能
  createDeck: (gameParams = {}) => {
    const deck = [];
    Object.entries(CARD_DATA).forEach(([id, card]) => {
      // v6.6: gameParamsで上書き可能（鳥居・風カード）
      let count = card.count;
      if (id === 'HOU' && gameParams.stallCount !== undefined) count = gameParams.stallCount;
      if (id === 'GHI' && gameParams.windCount !== undefined) count = gameParams.windCount;

      for (let i = 0; i < count; i++) {
        deck.push({ id, uid: `${id}_${i}_${Date.now()}_${Math.random()}`, type: card.category === 'house' ? 'house' : card.category === 'wind' ? 'wind' : 'character', category: card.category, backColor: card.backColor, name: card.name, points: card.points, emoji: card.emoji, removable: card.removable, effect: card.effect });
      }
    });
    return deck;
  },
  // シャッフル
  shuffleDeck: (deck) => { const s = [...deck]; for (let i = s.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [s[i], s[j]] = [s[j], s[i]]; } return s; },
  // ペア検索 - v6.5: 効果ペア優先 → 同名ペア
  findPairs: (hand) => {
    const chars = hand.filter(c => c.type === 'character');
    const pairs = [];
    const used = new Set();
    // 1. 効果ペアを優先チェック
    for (let i = 0; i < chars.length; i++) {
      if (used.has(i)) continue;
      for (let j = i + 1; j < chars.length; j++) {
        if (used.has(j)) continue;
        const key = chars[i].id + '+' + chars[j].id;
        if (EFFECT_PAIRS[key]) {
          pairs.push({ cards: [chars[i], chars[j]], isPurification: false, effectType: EFFECT_PAIRS[key].effectType });
          used.add(i); used.add(j);
          break;
        }
      }
    }
    // 2. 同名ペア（SINGLE_ONLY_CARDSは除外）
    for (let i = 0; i < chars.length; i++) {
      if (used.has(i)) continue;
      for (let j = i + 1; j < chars.length; j++) {
        if (used.has(j)) continue;
        if (chars[i].id === chars[j].id && !SINGLE_ONLY_CARDS.includes(chars[i].id)) {
          pairs.push({ cards: [chars[i], chars[j]], isPurification: false, effectType: null });
          used.add(i); used.add(j);
          break;
        }
      }
    }
    return pairs;
  },
  // 勝利判定
  checkWin: (hand) => hand.filter(c => c.type === 'character').length === 0,
  // スコア計算
  calculateScore: (hand) => hand.reduce((sum, c) => sum + (c.points || 0), 0),
  // 場の全家数
  getTotalHousesOnField: (players) => players.reduce((sum, p) => sum + (p.houses?.length || 0), 0),
  // 自分以外の家数
  getOtherPlayersHouses: (players, myIdx) => players.reduce((sum, p, idx) => idx === myIdx ? sum : sum + (p.houses?.length || 0), 0),
  // 次のアクティブプレイヤー
  getNextActivePlayer: (fromIdx, players) => {
    const numPlayers = players.length;
    for (let i = 1; i <= numPlayers; i++) {
      const nextIdx = (fromIdx + i) % numPlayers;
      if (players[nextIdx].hand.length > 0) return nextIdx;
    }
    return -1;
  },
  // カードピッチ計算（手札）
  calcStandardPitch: (cardCount, areaWidthU, cardW = 10, minGap = 1) => {
    if (cardCount <= 1) return 0;
    const widthWithGap = cardW + (cardW + minGap) * (cardCount - 1);
    if (widthWithGap <= areaWidthU) return cardW + minGap;
    return Math.max(minGap, (areaWidthU - cardW) / (cardCount - 1));
  },
  // カードピッチ計算（家）
  calcHouseSetPitch: (houseCount, areaWidthU, cardW = 10, minGap = 1, minVisible = 3) => {
    if (houseCount <= 1) return 0;
    const widthWithGap = cardW + (cardW + minGap) * (houseCount - 1);
    if (widthWithGap <= areaWidthU) return cardW + minGap;
    return Math.max(minVisible, (areaWidthU - cardW) / (houseCount - 1));
  },
  // プレイヤーブロック幅
  getPlayerBlockWidth: (pIdx, playerCount, boardW) => {
    if (playerCount === 2) return boardW - 2;
    if (playerCount === 3 && pIdx === 0) return boardW - 2;
    return (boardW / 2) - 1.5;
  },
  // プレイヤー配置
  getPlayerPosition: (pIdx, playerCount) => {
    if (playerCount === 4) {
      if (pIdx === 0) return { row: 'bottom', side: 'right' };  // v2.4.8: P0を右下に移動
      if (pIdx === 1) return { row: 'top', side: 'left' };
      if (pIdx === 2) return { row: 'top', side: 'right' };
      if (pIdx === 3) return { row: 'bottom', side: 'left' };   // v2.4.8: P3を左下に移動
    }
    if (playerCount === 3) {
      if (pIdx === 0) return { row: 'bottom', side: 'full' };
      if (pIdx === 1) return { row: 'top', side: 'left' };
      if (pIdx === 2) return { row: 'top', side: 'right' };
    }
    if (playerCount === 2) {
      if (pIdx === 0) return { row: 'bottom', side: 'full' };
      if (pIdx === 1) return { row: 'top', side: 'full' };
    }
    return { row: 'bottom', side: 'left' };
  },
  isFullWidth: (pIdx, playerCount) => GameLogic.getPlayerPosition(pIdx, playerCount).side === 'full',
};

      {isEmptyStall && !canRefill && <div className="empty-indicator">🔒</div>}
      {canRefill && <div className="refill-indicator">📥</div>}
      {canBreak && <div className="break-indicator">🔓</div>}
    </div>
  );
};

// 紙吹雪コンポーネント
const ConfettiEffect = ({ show, duration = 3500 }) => {
  const [visible, setVisible] = useState(show);
  const colors = ['#ff0000', '#ff8800', '#ffff00', '#00ff00', '#00ffff', '#0088ff', '#8800ff', '#ff00ff', '#ff69b4', '#ffd700'];

  useEffect(() => {
    if (show) {
      setVisible(true);
      const timer = setTimeout(() => setVisible(false), duration);
      return () => clearTimeout(timer);
    }
  }, [show, duration]);

  if (!visible) return null;

  const pieces = [];
  for (let i = 0; i < 50; i++) {
    const left = Math.random() * 100;
    const delay = Math.random() * 1;
    const size = 6 + Math.random() * 8;
    const color = colors[Math.floor(Math.random() * colors.length)];
    const rotate = Math.random() * 360;
    const shape = Math.random() > 0.5 ? 'circle' : 'square';
    pieces.push(
      <div
        key={i}
        className="confetti-piece"
        style={{
          left: `${left}%`,
          backgroundColor: color,
          width: size,
          height: size,
          borderRadius: shape === 'circle' ? '50%' : '2px',
          animationDelay: `${delay}s`,
          transform: `rotate(${rotate}deg)`
        }}
      />
    );
  }

  return <div className="confetti-container">{pieces}</div>;
};

// 浄化オーバーレイコンポーネント
// PurificationOverlayは削除済み

// 飛行カードコンポーネント（山札から出発）
// ユニットベース座標に移行
// FlyingCardDisplay（v2.3.2: v2レイアウト固定化, v2.4.7: 動的サイジング対応）
const FlyingCardDisplay = ({ flyingCard, deckPos, getDrawAreaPosition, getPlayerCardPosition, getMarketCardPosition }) => {
  if (!flyingCard) return null;

  const { card, phase, playerIdx, target, handCount = 0 } = flyingCard;
  const isPlayer0 = playerIdx === 0;

  // v3.0.0.2: プレイヤーに応じたカードサイズ（Desktop 5-Row対応）
  // FlyingCardは到着先プレイヤーのサイズで表示する
  const sizeKey = getCardSizeForPlayer(playerIdx);
  const sz = CARD_SIZES[sizeKey] || CARD_SIZES.m;
  const cardSize = {
    width: sz.w,
    height: sz.h,
    borderWidth: 2
  };
  // CSS変数: Desktop 5-Rowではカードサイズに応じたフォントサイズを設定
  const flyFontStyle = {
    '--card-symbol-size': `${sz.symbolSize}px`,
    '--card-header-size': `${sz.headerSize}px`,
    '--card-footer-size': `${sz.footerSize}px`,
    '--card-icon-size': `${sz.iconSize}px`,
  };

  let cardWidth = cardSize.width;
  let cardHeight = cardSize.height;
  let borderWidth = cardSize.borderWidth;

  // 引札ゾーン座標
  const getDrawZonePosition = (pIdx) => {
    if (getDrawAreaPosition) {
      return getDrawAreaPosition(pIdx);
    }
    // フォールバック
    return {
      x: UNIT.toPixelX(LAYOUT.drawZone[pIdx]?.x || 0),
      y: UNIT.toPixelY(LAYOUT.drawZone[pIdx]?.y || 0)
    };
  };

  // 手札の位置
  const getHandPosition = (pIdx, count) => {
    if (getPlayerCardPosition) {
      return getPlayerCardPosition(pIdx, count, count + 1);
    }
    // フォールバック
    if (pIdx === 0) {
      const pitch = calcCardPitch(count + 1, LAYOUT.handArea.self, LAYOUT.cardLarge.w, LAYOUT.minGap);
      return {
        x: UNIT.toPixelX(1) + count * pitch,
        y: UNIT.toPixelY(LAYOUT.zoneCTop + 1)
      };
    } else {
      const baseX = (pIdx - 1) * UNIT.toPixelX(LAYOUT.playerBlock.w) + UNIT.toPixelX(1);
      const pitch = calcCardPitch(count + 1, LAYOUT.handArea.opp, LAYOUT.cardSmall.w, LAYOUT.minGap);
      return {
        x: baseX + count * pitch,
        y: UNIT.toPixelY(LAYOUT.zoneATop + 3)
      };
    }
  };

  // 市場の位置
  const getMarketPosition = () => {
    if (getMarketCardPosition) {
      return getMarketCardPosition(0);
    }
    return { x: UNIT.toPixelX(93), y: UNIT.toPixelY(25) };
  };

  const drawZonePos = {
    0: getDrawZonePosition(0),
    1: getDrawZonePosition(1),
    2: getDrawZonePosition(2),
    3: getDrawZonePosition(3),
  };

  const handPos = {
    0: getHandPosition(0, handCount),
    1: getHandPosition(1, handCount),
    2: getHandPosition(2, handCount),
    3: getHandPosition(3, handCount),
  };

  const marketPos = getMarketPosition();

  // フェーズに応じた位置とトランジション
  let left, top, transition, transform = 'none', opacity = 1;
  // P0の引札ゾーン・手札スライド時は表向き
  // showFrontにforceFront対応を追加
  const { forceFront } = flyingCard;
  const showFront = forceFront || (isPlayer0 && (phase === 'inDrawZone' || phase === 'toHand'));

  // 共通のcalcFlyShadow関数を使用
  // フェーズに応じたZ高さ
  let flyZ = 0;
  if (phase === 'toDrawZone') flyZ = 3;      // 高空飛行
  else if (phase === 'inDrawZone') flyZ = 1; // 低空（引札ゾーン）
  else if (phase === 'toHand') flyZ = 2;     // 中空（手札へ）
  else if (phase === 'flying') flyZ = 3;     // burn用高空
  else if (phase === 'atHouse') flyZ = 2;
  else if (phase === 'exitLeft') flyZ = 3;

  const boxShadow = calcFlyShadow(flyZ);

  // sourceX, sourceYがある場合は出発点として使用（ババ抜き用）
  // houseX, houseYも追加（家からの飛行用）
  const { sourceX, sourceY, houseX, houseY } = flyingCard;

  if (phase === 'atDeck') {
    left = deckPos.x;
    top = deckPos.y;
    transition = 'none';
  } else if (phase === 'atSource' && sourceX !== undefined) {
    // ババ抜き: 相手の手札位置から出発
    left = sourceX;
    top = sourceY;
    transition = 'none';
  } else if (phase === 'atHouse' && houseX !== undefined) {
    // 家の位置から出発
    left = houseX;
    top = houseY;
    transition = 'none';
  } else if (phase === 'exitLeft') {
    // 左へ退場
    left = UNIT.toPixelX(LAYOUT.exitLeft);
    top = houseY || sourceY || deckPos.y;
    transition = 'all 300ms ease-in';
    opacity = 0;
  } else if (target === 'market' && phase === 'flying') {
    // 市場への飛行（表向き）
    left = marketPos.x;
    top = marketPos.y;
    transition = 'all 90ms ease-out';
    transform = 'scale(1)';  // 市場は小サイズなのでスケール不要
  } else if (target === 'stall') {
    // 市場→鳥居への飛行
    const { stallX, stallY } = flyingCard;
    if (phase === 'atMarket') {
      left = sourceX;
      top = sourceY;
      transition = 'none';
    } else if (phase === 'toStall') {
      left = stallX;
      top = stallY;
      transition = 'all 200ms ease-in-out';
    }
  } else if (target === 'stallExchange') {
    // 交換アニメーション（市場カード→鳥居、鳥居カード→市場を同時に）
    const { stallX, stallY } = flyingCard;
    if (phase === 'exchange') {
      left = sourceX;
      top = sourceY;
      transition = 'none';
    } else if (phase === 'exchangeFlying') {
      left = stallX;
      top = stallY;
      transition = 'all 300ms ease-in-out';  // 飛行アニメーション（300ms）
    }
  } else if (target === 'housePlace') {
    // 家配置アニメーション（手札→家の位置）
    const { houseX, houseY } = flyingCard;
    if (phase === 'atSource') {
      left = sourceX;
      top = sourceY;
      transition = 'none';
    } else if (phase === 'toHouse') {
      left = houseX;
      top = houseY;
      transition = 'all 300ms ease-in-out';  // 飛行時間300ms（鳥居と統一）
    }
  } else if (target === 'stallPlace') {
    // 鳥居配置アニメーション（鳥居カード：手札→家位置、人物カード：手札→家位置下段）
    const { houseX, houseY } = flyingCard;
    if (phase === 'atSource') {
      left = sourceX;
      top = sourceY;
      transition = 'none';
    } else if (phase === 'toHouse') {
      left = houseX;
      top = houseY;
      transition = 'all 300ms ease-in-out';  // 飛行時間300ms
    }
  } else if (target === 'windAttack') {
    // 風カード攻撃アニメーション（高い位置から急降下→ディゾルブ消滅）
    const { houseX, houseY } = flyingCard;
    if (phase === 'atSource') {
      // 浮上した位置から開始
      left = sourceX;
      top = sourceY - 20;  // 浮上分
      transition = 'none';
      transform = 'scale(1.05)';
    } else if (phase === 'diving') {
      // 急降下（加速：ease-in）
      left = houseX;
      top = houseY;
      transition = 'all 400ms cubic-bezier(0.55, 0.055, 0.675, 0.19)';  // ease-in-cubic（加速）
      transform = 'scale(1)';
    } else if (phase === 'vanish') {
      // ディゾルブ消滅（その場で透明化、風が散るように）
      left = houseX;
      top = houseY;
      transition = 'opacity 350ms ease-out, filter 350ms ease-out';
      transform = 'scale(1)';  // サイズは維持
      opacity = 0;
    }
  } else {
    const dzPos = drawZonePos[playerIdx] || drawZonePos[0];
    const hPos = handPos[playerIdx] || handPos[0];

    if (phase === 'toDrawZone') {
      left = dzPos.x;
      top = dzPos.y;
      transition = 'all 90ms ease-out';
    } else if (phase === 'inDrawZone') {
      left = dzPos.x;
      top = dzPos.y;
      transition = 'none';
    } else if (phase === 'toHand') {
      left = hPos.x;
      top = hPos.y;
      transition = 'all 180ms ease-in-out';
    }
  }

  // カード内容を描画（v2.3.2: standardサイズ統一）
  const renderCardContent = () => {
    const { flipped } = flyingCard;
    if (flipped !== undefined && isPlayer0) {
      return <FlippingCardStandard card={card} flipped={flipped} style={{ width: '100%', height: '100%' }} />;
    }
    return <UnifiedCard card={card} size="standard" showFront={showFront || target === 'market' || target === 'stall' || target === 'stallExchange' || target === 'housePlace' || target === 'stallPlace' || target === 'windAttack'} style={{ width: '100%', height: '100%' }} />;
  };

  // 交換アニメーション用の2枚目カード位置
  let exchangeLeft, exchangeTop, exchangeTransition;
  if (target === 'stallExchange' && flyingCard.exchangeCard) {
    const { exchangeFromX, exchangeFromY, exchangeToX, exchangeToY } = flyingCard;
    if (phase === 'exchange') {
      exchangeLeft = exchangeFromX;
      exchangeTop = exchangeFromY;
      exchangeTransition = 'none';
    } else if (phase === 'exchangeFlying') {
      exchangeLeft = exchangeToX;
      exchangeTop = exchangeToY;
      exchangeTransition = 'all 300ms ease-in-out';  // 飛行アニメーション（300ms）
    }
  }

  // 鳥居配置アニメーション用の2枚目カード（人物カード）位置
  let personLeft, personTop, personTransition;
  let personCardWidth, personCardHeight;
  if (target === 'stallPlace' && flyingCard.personCard) {
    // v3.0.0.2: CARD_SIZESから直接px値
    personCardWidth = cardSize.width;
    personCardHeight = cardSize.height;
    const { personFromX, personFromY, personToX, personToY } = flyingCard;
    if (phase === 'atSource') {
      personLeft = personFromX;
      personTop = personFromY;
      personTransition = 'none';
    } else if (phase === 'toHouse') {
      personLeft = personToX;
      personTop = personToY;
      personTransition = 'all 300ms ease-in-out';
    }
  }

  return (
    <>
      <div style={{
        position: 'absolute',
        left: left,
        top: top,
        width: cardWidth,
        height: cardHeight,
        zIndex: 1000,
        pointerEvents: 'none',
        transition: transition ? `${transition}, box-shadow 90ms ease-out, opacity 300ms ease-in` : 'box-shadow 90ms ease-out',
        transform: transform,
        transformOrigin: 'top left',
        boxShadow: boxShadow,
        borderRadius: 4,
        opacity: opacity,
        ...flyFontStyle,
      }}>
        {renderCardContent()}
      </div>
      {/* 鳥居配置時の2枚目カード（人物カード） */}
      {target === 'stallPlace' && flyingCard.personCard && (
        <div style={{
          position: 'absolute',
          left: personLeft,
          top: personTop,
          width: personCardWidth,
          height: personCardHeight,
          zIndex: 1001,
          pointerEvents: 'none',
          transition: personTransition ? `${personTransition}, box-shadow 90ms ease-out` : 'box-shadow 90ms ease-out',
          boxShadow: boxShadow,
          borderRadius: 4,
          ...flyFontStyle,
        }}>
          <UnifiedCard card={flyingCard.personCard} size="standard" showFront={true} style={{ width: '100%', height: '100%' }} />
        </div>
      )}
      {/* 交換時の2枚目カード（鳥居→市場） */}
      {target === 'stallExchange' && flyingCard.exchangeCard && (
        <div style={{
          position: 'absolute',
          left: exchangeLeft,
          top: exchangeTop,
          width: cardWidth,
          height: cardHeight,
          zIndex: 1001,
          pointerEvents: 'none',
          transition: exchangeTransition ? `${exchangeTransition}, box-shadow 90ms ease-out` : 'box-shadow 90ms ease-out',
          boxShadow: boxShadow,
          borderRadius: 4,
          ...flyFontStyle,
        }}>
          <UnifiedCard card={flyingCard.exchangeCard} size="standard" showFront={true} style={{ width: '100%', height: '100%' }} />
        </div>
      )}
    </>
  );
};

// 家カード退場演出コンポーネント（v2.3.2: v2固定化, v2.4.7: 動的サイジング対応）
const HouseExitDisplay = ({ houseExitAnimation }) => {

};

// ペア成立演出コンポーネント（v2.3.2: v2固定化, v2.4.7: 動的サイジング対応）
const PairAnimationDisplay = ({ pairAnimation, getCardPosition }) => {
  if (!pairAnimation) return null;

  const { drawnCard, pairCard, pairCardIndex, playerIdx, phase, handCount } = pairAnimation;
  const isPlayer0 = playerIdx === 0;

  // v3.0.0.2: プレイヤーに応じたカードサイズ（Desktop 5-Row対応）
  const _sizeKey = getCardSizeForPlayer(playerIdx);
  const _sz = CARD_SIZES[_sizeKey] || CARD_SIZES.m;
  const cardWidth = _sz.w;
  const cardHeight = _sz.h;
  // CSS変数: カードサイズに応じたフォントサイズ
  const pairFontStyle = {
    '--card-symbol-size': `${_sz.symbolSize}px`,
    '--card-header-size': `${_sz.headerSize}px`,
    '--card-footer-size': `${_sz.footerSize}px`,
    '--card-icon-size': `${_sz.iconSize}px`,
  };

  // 浮上量（2ユニット）
  const floatAmount = UNIT.toPixelY(2);

  // 上側プレイヤーは下方向に浮く、下側プレイヤー(P0)は上方向
  // Desktop 5-Row: P1/P2/P3は全員Row1（上段）→下方向
  // 旧レイアウト: P1/P2が上段、P3は下段
  const isTopPlayer = currentDesktopTier
    ? (playerIdx !== 0)          // Desktop: P0以外は全員上段
    : (playerIdx === 1 || playerIdx === 2);  // 旧: P1/P2が上段
  const floatDirection = isTopPlayer ? 1 : -1;

  // ペア対象カードの位置
  const pairCardPos = getCardPosition(playerIdx, pairCardIndex, handCount);
  const drawnCardPos = getCardPosition(playerIdx, handCount, handCount + 1);
  const exitX = -cardWidth - 20;

  let pairCardStyle, drawnCardStyle;

  if (phase === 'float') {
    pairCardStyle = {
      left: pairCardPos.x,
      top: pairCardPos.y + floatAmount * floatDirection,
      transition: 'all 200ms ease-out',
      boxShadow: calcFlyShadow(3),
    };
    drawnCardStyle = {
      left: drawnCardPos.x,
      top: drawnCardPos.y,
      transition: 'none',
      boxShadow: calcFlyShadow(1),
    };
  } else if (phase === 'merge') {
    const mergeX = pairCardPos.x + cardWidth + 4;
    pairCardStyle = {
      left: pairCardPos.x,
      top: pairCardPos.y + floatAmount * floatDirection,
      transition: 'none',
      boxShadow: calcFlyShadow(3),
    };
    drawnCardStyle = {
      left: mergeX,
      top: pairCardPos.y + floatAmount * floatDirection,
      transition: 'all 250ms ease-in-out',
      boxShadow: calcFlyShadow(3),
    };
  } else if (phase === 'exit') {
    pairCardStyle = {
      left: exitX,
      top: pairCardPos.y + floatAmount * floatDirection,
      transition: 'all 300ms ease-in',
      boxShadow: calcFlyShadow(3),
      opacity: 0,
    };
    drawnCardStyle = {
      left: exitX + cardWidth + 4,
      top: pairCardPos.y + floatAmount * floatDirection,
      transition: 'all 300ms ease-in',
      boxShadow: calcFlyShadow(3),
      opacity: 0,
    };
  }

  const showFront = isPlayer0;
  const useFlipAnim = !isPlayer0;
  const flipState = phase === 'merge' || phase === 'exit';

  const renderCard = (card, showFrontArg, useFlip, flipped) => {
    if (useFlip) {
      return <FlippingCardStandard card={card} flipped={flipped} style={{ width: '100%', height: '100%' }} />;
    }
    return <UnifiedCard card={card} size="standard" showFront={showFrontArg} style={{ width: '100%', height: '100%' }} />;
  };

  return (
    <>
      <div style={{
        position: 'absolute',
        width: cardWidth,
        height: cardHeight,
        zIndex: 1001,
        pointerEvents: 'none',
        borderRadius: 4,
        ...pairFontStyle,
        ...pairCardStyle,
      }}>
        {renderCard(pairCard, showFront, useFlipAnim, flipState)}
      </div>
      <div style={{
        position: 'absolute',
        width: cardWidth,
        height: cardHeight,
        zIndex: 1002,
        pointerEvents: 'none',
        borderRadius: 4,
        ...pairFontStyle,
        ...drawnCardStyle,
      }}>
        {renderCard(drawnCard, showFront, useFlipAnim, flipState)}
      </div>
    </>
  );
};

// ババ抜きドロー — カード選択オーバーレイ（対戦相手クリック → カード裏面展開 → タップで選択）
const BBDrawOverlay = ({ bbDrawTarget, onCardSelect, onClose, players }) => {
  const [drawnIdx, setDrawnIdx] = React.useState(null);

  // Escapeキーで閉じる
  React.useEffect(() => {
    if (!bbDrawTarget) return;
    const handleKey = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', handleKey);
    return () => window.removeEventListener('keydown', handleKey);
  }, [bbDrawTarget, onClose]);

  // 開閉時にdrawnIdxをリセット
  React.useEffect(() => { setDrawnIdx(null); }, [bbDrawTarget]);

  if (!bbDrawTarget) return null;
  const { playerIdx, cards } = bbDrawTarget;
  const target = players[playerIdx];
  if (!target) return null;

  // カードサイズ: M(80×112) — オーバーレイは常に十分な幅があるため固定
  const sz = CARD_SIZES.m;
  const cardW = sz.w;
  const cardH = sz.h;
  const n = cards.length;

  // pitch計算（既存calcOverlapPitchを再利用）
  const containerW = Math.min(window.innerWidth - 16, 600); // 8px padding × 2, max 600px
  const pitch = n > 0 ? calcOverlapPitch(n, containerW, cardW, 1 / 3) : cardW;
  const totalW = n <= 1 ? cardW : cardW + pitch * (n - 1);

  // カードクリック
  const handleCardClick = (idx) => {
    if (drawnIdx !== null) return;
    setDrawnIdx(idx);
    setTimeout(() => {
      onCardSelect(playerIdx, idx);
    }, 600);
  };

  return (
    <>
      {/* Backdrop */}
      <div className={`bb-overlay-backdrop visible`} onClick={onClose} />
      {/* Panel */}
      <div className={`bb-overlay-panel visible`}>
        <div className="bb-overlay-header">
          <div>
            <span className="bb-opp-name">{target.emoji} {target.name}</span>
            <span className="bb-hint">{T.ui.bbTapHint}</span>
          </div>
          <button className="bb-overlay-close" onClick={onClose}>✕</button>
        </div>
        <div className="bb-overlay-cards" style={{height: cardH, width: totalW, margin: '0 auto'}}>
          {n === 0 ? (
            <div style={{padding: 16, textAlign: 'center', color: '#999'}}>手札なし</div>
          ) : (
            cards.map((c, i) => {

              return (
                <div key={c.uid}
                  className={`card-standard-back ${bgClass} ${drawnIdx === i ? 'bb-drawn' : ''}`}
                  onClick={() => handleCardClick(i)}
                  style={{
                    left: Math.round(i * pitch),
                    zIndex: i,
                    width: cardW, height: cardH, borderRadius: sz.radius,
                  }}
                >
                  <div className="corner tl" style={{width: sz.cornerW, height: sz.cornerH, borderWidth: sz.cornerBorder, top: sz.cornerOffset, left: sz.cornerOffset}} />
                  <div className="corner tr" style={{width: sz.cornerW, height: sz.cornerH, borderWidth: sz.cornerBorder, top: sz.cornerOffset, right: sz.cornerOffset}} />
                  <div className="corner bl" style={{width: sz.cornerW, height: sz.cornerH, borderWidth: sz.cornerBorder, bottom: sz.cornerOffset, left: sz.cornerOffset}} />
                  <div className="corner br" style={{width: sz.cornerW, height: sz.cornerH, borderWidth: sz.cornerBorder, bottom: sz.cornerOffset, right: sz.cornerOffset}} />
                  <div className="center-line" style={{left: sz.lineOffset, right: sz.lineOffset, height: sz.lineH}} />

};

// 商いの才覚 — ペアカード浮遊表示（雲上の右隣で浮遊、選択完了後に着地）
const FloatingPairDisplay = ({ floatingPairCards, marketCardsRef, midSz, midFontStyle, r4CloudGap }) => {
  if (!floatingPairCards || !floatingPairCards.cards || floatingPairCards.cards.length === 0) return null;

  const { cards, phase } = floatingPairCards;

  // 着地フェーズ: 非表示（市場に追加済み）
  if (phase === 'landing') return null;

  // 浮遊位置: 雲上エリアの右側（Desktop/Wide）または左側（SE）に寄せて表示
  // marketCardsRefがあればその位置を基準にする
  let floatLeft = 0;
  let floatTop = 0;
  const cardW = midSz.w;
  const cardH = midSz.h;
  const gap = r4CloudGap || 4;
  if (marketCardsRef?.current) {
    const marketRect = marketCardsRef.current.getBoundingClientRect();
    const boardEl = marketCardsRef.current.closest('.desktop-board')
                 || marketCardsRef.current.closest('.landscape-board')
                 || marketCardsRef.current.closest('.portrait-board');
    if (boardEl) {
      const boardRect = boardEl.getBoundingClientRect();
      const isPortraitSide = boardEl.classList.contains('pt-side');
      const isLandscapeSE = boardEl.classList.contains('ls-se');
      if (isPortraitSide) {
        // Portrait side: 雲上は右列 → 左側に配置（SEと同様）
        floatLeft = marketRect.left - boardRect.left - (cardW * 2 + gap * 2);
        if (floatLeft < 4) {
          floatLeft = marketRect.left - boardRect.left;
          floatTop = marketRect.top - boardRect.top - cardH - gap;
        } else {
          floatTop = marketRect.top - boardRect.top + (marketRect.height - midSz.h) / 2;
        }
      } else if (isLandscapeSE) {
        // SE: 雲上の左側に配置（右にスペースがないため）
        floatLeft = marketRect.left - boardRect.left - (cardW * 2 + gap * 2);
        if (floatLeft < 0) {
          // 左にもスペースが足りない場合は雲上の上に配置
          floatLeft = marketRect.left - boardRect.left;
          floatTop = marketRect.top - boardRect.top - cardH - gap;
        } else {
          floatTop = marketRect.top - boardRect.top + (marketRect.height - midSz.h) / 2;
        }
      } else {
        // Desktop / Wide: 雲上の右側に配置（従来通り）
        floatLeft = marketRect.right - boardRect.left + gap;
        floatTop = marketRect.top - boardRect.top + (marketRect.height - midSz.h) / 2;
      }
    }
  }
  // Z=3の影（calcFlyShadowと同等）
  const floatShadow = '6px 6px 6px rgba(45, 21, 24, 0.08)';

  return (
    <>
      {cards.map((card, i) => (
        <div key={card.uid} className="floating-pair-card"
          style={{
            position: 'absolute',
            left: floatLeft + i * (cardW + gap),
            top: floatTop,
            width: cardW, height: cardH,
            zIndex: 998,
            boxShadow: floatShadow,
            transition: 'transform 0.3s ease, box-shadow 0.3s ease',
            animation: 'floatingPairBob 2s ease-in-out infinite',
            animationDelay: `${i * 0.3}s`,
            ...midFontStyle,
          }}
        >
          <UnifiedCard card={card} size="standard" showFront={true} style={{width: '100%', height: '100%'}} />
        </div>
      ))}
    </>
  );
};

// 魔女/聖母を引いた時の手札内演出（v2.3.2: v2固定化, v2.4.7: 動的サイジング対応）
const DangerCardInHandDisplay = ({ dangerCardInHand, getCardPosition }) => {
  if (!dangerCardInHand) return null;

  const { card, cardIndex, handCount, phase } = dangerCardInHand;
  const d = CARD_DATA[card?.id] || {};
  const isWitch = card?.id === 'WIT';

  // v3.0.0.2: P0手札サイズで表示（DangerCardはP0専用）
  const _sizeKey = getCardSizeForPlayer(0);
  const _sz = CARD_SIZES[_sizeKey] || CARD_SIZES.m;
  const cardWidth = _sz.w;
  const cardHeight = _sz.h;
  const floatAmount = UNIT.toPixelY(LAYOUT.floatAmount);
  // CSS変数: カードサイズに応じたフォントサイズ
  const dangerFontStyle = {
    '--card-symbol-size': `${_sz.symbolSize}px`,
    '--card-header-size': `${_sz.headerSize}px`,
    '--card-footer-size': `${_sz.footerSize}px`,
    '--card-icon-size': `${_sz.iconSize}px`,
  };

  // v2.4.7: グロー影もスケーリング（Phase 1a-2: 新キー名）
  const scaleFactors = {
    '4xl': 1.8, '3xl': 1.6, '2xl': 1.4, xl: 1.4, xl2: 1.3, l: 1.2, m: 1.0,
    ms: 0.9, s: 0.8, xs: 0.7, xxs: 0.6
  };
  const scale = scaleFactors[_sizeKey] || 1.0;
  const s = (base) => Math.round(base * scale);

  const pos = getCardPosition(0, cardIndex, handCount);

  let left, top, transform, boxShadow, transition;

  if (phase === 'float') {
    left = pos.x;
    top = pos.y - floatAmount;
    transform = 'none';
    boxShadow = isWitch
      ? `0 0 ${s(20)}px rgba(107, 58, 91, 0.8), 0 0 ${s(40)}px rgba(107, 58, 91, 0.4)`
      : `0 0 ${s(20)}px rgba(201, 162, 39, 0.8), 0 0 ${s(40)}px rgba(201, 162, 39, 0.4)`;
    transition = 'all 200ms ease-out';
  } else if (phase === 'shake') {
    left = pos.x;
    top = pos.y - floatAmount;
    transform = 'none';
    boxShadow = isWitch
      ? `0 0 ${s(30)}px rgba(107, 58, 91, 1), 0 0 ${s(60)}px rgba(107, 58, 91, 0.6)`
      : `0 0 ${s(30)}px rgba(201, 162, 39, 1), 0 0 ${s(60)}px rgba(201, 162, 39, 0.6)`;
    transition = 'none';
  } else if (phase === 'settle') {
    left = pos.x;
    top = pos.y;
    transform = 'none';
    boxShadow = `${s(1)}px ${s(1)}px 0px rgba(0, 0, 0, 0.15)`;
    transition = 'all 200ms ease-in';
  }

  return (
    <div style={{
      position: 'absolute',
      left: left,
      top: top,
      width: cardWidth,
      height: cardHeight,
      zIndex: 1001,
      pointerEvents: 'none',
      transition: transition,
      transform: transform,
      boxShadow: boxShadow,
      borderRadius: 4,
      animation: phase === 'shake' ? 'dangerShakeInHand 0.5s ease-in-out' : 'none',
      ...dangerFontStyle,
    }}>
      <div className={`card-standard-front ${d.category || 'legend'}`} style={{ width: '100%', height: '100%' }}>
        <div className="card-standard-header">
          <span className="code">{d.name || '?'}</span>
          <span className="score">-{d.points || 0}</span>
        </div>
        <div className="card-standard-body">
          <span className="symbol">{d.emoji || '❓'}</span>
        </div>
        <div className="card-standard-footer">{card?.id || '???'}</div>
      </div>
    </div>
  );
};

// Phase 5/Step 6: 風パーティクルレイヤー（全画面共通背景）
// useRefでDOM直接操作 — パフォーマンス重視（state不使用）
// onBlastStart: useRef — blast演出メソッドを外部に公開する
const WIND_EMOJIS = ['🐧','🦊','👷','🐢','🧟','🐭','🦁','🥷','🧙','🦉','🧛','🧄','🐉','🔥','🐸','💎','⛩️','🌀','🍃','🌸'];

const WindParticleLayer = ({ onBlastStart, dim }) => {
  const layerRef = React.useRef(null);
  const isBlastingRef = React.useRef(false);

  const createEmoji = React.useCallback((container) => {
    const el = document.createElement('div');
    el.className = 'wind-emoji';
    el.textContent = WIND_EMOJIS[Math.floor(Math.random() * WIND_EMOJIS.length)];
    const vw = container.offsetWidth;
    const vh = container.offsetHeight;
    const startX = Math.random() * vw * 0.7;
    const startY = Math.random() * vh;
    const driftX = 200 + Math.random() * 400;
    const driftY = -100 + Math.random() * 200 - 100;
    const rotation = (Math.random() > 0.5 ? 1 : -1) * (180 + Math.random() * 540);
    const duration = 6 + Math.random() * 8;
    const delay = Math.random() * 10;
    const scale = 0.6 + Math.random() * 0.8;
    const maxOpacity = dim ? 0.06 + Math.random() * 0.1 : 0.15 + Math.random() * 0.25;
    el.style.left = startX + 'px';
    el.style.top = startY + 'px';
    el.style.fontSize = (18 + Math.random() * 16) + 'px';
    el.style.setProperty('--drift-x', driftX + 'px');
    el.style.setProperty('--drift-y', driftY + 'px');
    el.style.setProperty('--rotation', rotation + 'deg');
    el.style.setProperty('--duration', duration + 's');
    el.style.setProperty('--delay', delay + 's');
    el.style.setProperty('--scale', scale);
    el.style.setProperty('--max-opacity', maxOpacity);
    container.appendChild(el);
  }, [dim]);

  React.useEffect(() => {
    const layer = layerRef.current;
    if (!layer) return;
    const total = 15 + Math.floor(Math.random() * 10);
    for (let i = 0; i < total; i++) createEmoji(layer);
    return () => { layer.innerHTML = ''; };
  }, [createEmoji]);

  // blast演出を外部から呼ぶためのメソッドをonBlastStart経由で公開
  React.useEffect(() => {
    if (!onBlastStart) return;
    onBlastStart.current = (btnEl) => {
      const layer = layerRef.current;
      if (!layer || isBlastingRef.current) return;
      isBlastingRef.current = true;
      const btn = btnEl.getBoundingClientRect();
      const layerRect = layer.getBoundingClientRect();
      const btnCX = btn.left + btn.width / 2 - layerRect.left;
      const btnCY = btn.top + btn.height / 2 - layerRect.top;
      const emojis = [...layer.querySelectorAll('.wind-emoji')];

      // Phase 1: 吸引 (0.4s)
      btnEl.classList.add('charging');
      emojis.forEach(el => {
        const rect = el.getBoundingClientRect();
        const posX = rect.left + rect.width / 2 - layerRect.left;
        const posY = rect.top + rect.height / 2 - layerRect.top;
        el.classList.add('sucking');
        el.style.left = posX + 'px';
        el.style.top = posY + 'px';
        el.style.transform = 'translate(-50%, -50%)';
        const dx = btnCX - posX;
        const dy = btnCY - posY;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        const pull = Math.min(0.6, 200 / dist);
        const suckX = posX + dx * pull;
        const suckY = posY + dy * pull;
        requestAnimationFrame(() => {
          el.style.left = suckX + 'px';
          el.style.top = suckY + 'px';
          el.style.transform = 'translate(-50%, -50%) scale(0.7)';
        });
        el._suckPos = { x: suckX, y: suckY };
      });

      // Phase 2: 爆発 (at 0.4s)
      setTimeout(() => {
        btnEl.classList.remove('charging');
        btnEl.classList.add('blasting');
        // スクリーンフラッシュ
        const flash = document.createElement('div');
        flash.className = 'screen-flash';
        flash.style.setProperty('--flash-x', (btnCX / layer.offsetWidth * 100) + '%');
        flash.style.setProperty('--flash-y', (btnCY / layer.offsetHeight * 100) + '%');
        layer.appendChild(flash);
        flash.addEventListener('animationend', () => flash.remove());
        // 3重圧力波リング
        for (let r = 0; r < 3; r++) {
          const ring = document.createElement('div');
          ring.className = 'blast-ring';
          ring.style.left = btnCX + 'px';
          ring.style.top = btnCY + 'px';
          ring.style.setProperty('--ring-delay', (r * 0.08) + 's');
          ring.style.setProperty('--ring-duration', (0.6 + r * 0.15) + 's');
          layer.appendChild(ring);
          ring.addEventListener('animationend', () => ring.remove());
        }
        // 放射状飛散
        emojis.forEach(el => {
          const sp = el._suckPos;
          const dx = sp.x - btnCX;
          const dy = sp.y - btnCY;
          const dist = Math.sqrt(dx * dx + dy * dy) || 1;
          const angle = Math.atan2(dy, dx);
          const force = Math.max(300, Math.min(1200, 60000 / dist));
          const spread = (Math.random() - 0.5) * 0.5;
          const blastX = Math.cos(angle + spread) * force;
          const blastY = Math.sin(angle + spread) * force;
          const blastRot = (Math.random() > 0.5 ? 1 : -1) * (360 + Math.random() * 1080);
          el.classList.remove('sucking');
          el.classList.add('blasting');
          el.style.transition = 'none';
          el.style.left = sp.x + 'px';
          el.style.top = sp.y + 'px';
          el.style.transform = 'translate(-50%, -50%)';
          el.style.opacity = '1';
          el.style.setProperty('--blast-x', blastX + 'px');
          el.style.setProperty('--blast-y', blastY + 'px');
          el.style.setProperty('--blast-rot', blastRot + 'deg');
          const dur = 0.5 + (dist / 800) * 0.6;
          el.style.animation = `blastAway ${dur}s cubic-bezier(0.2, 0, 0.3, 1) forwards`;
        });
        setTimeout(() => { btnEl.classList.remove('blasting'); }, 500);
      }, 400);

      // Phase 3: 再生 (at 1.6s)
      setTimeout(() => {
        layer.innerHTML = '';
        let count = 0;
        const total = 15 + Math.floor(Math.random() * 10);
        const interval = setInterval(() => {
          if (count >= total) { clearInterval(interval); isBlastingRef.current = false; return; }
          createEmoji(layer);
          count++;
        }, 150);
      }, 1200);
    };
  }, [onBlastStart, createEmoji]);

  return <div ref={layerRef} className="wind-layer" />;
};

function PfffGame() {
  // v2.4.0: 動的サイジングフック
  const boardSize = useBoardSize();
  
  // Phase 3: isPortraitMode state削除済み（renderPortraitBoardに移行）

  // Phase 1a-4: レスポンシブレイアウト State/Ref
  const [layoutMode, setLayoutMode] = useState('landscape');       // 'landscape' | 'stack' | 'side'
  const [landscapeSub, setLandscapeSub] = useState('desktop');     // 'desktop' | 'wide' | 'se' | null
  const [desktopLayout, setDesktopLayout] = useState(null);        // calcDesktopLayout結果
  const [landscapeTier, setLandscapeTier] = useState(null);        // Phase 2: calcLandscapeTier結果（SE/Wide用）
  const [portraitTier, setPortraitTier] = useState(null);          // Phase 3: tierToSizes結果（Portrait用）
  const layoutModeRef = useRef('landscape');
  const landscapeSubRef = useRef('desktop');

  // Phase 1a-5: ResizeObserver — レイアウトモード検出 + Desktop計算
  useEffect(() => {
    const updateLayout = () => {
      const w = window.innerWidth;
      const h = window.innerHeight;
      const { mode, sub } = detectLayoutMode(w, h);

      layoutModeRef.current = mode;
      landscapeSubRef.current = sub;
      setLayoutMode(mode);
      setLandscapeSub(sub);

      // Phase 2: landscapeモードをsub別に分岐
      // desktop → Desktop 5-Row、se/wide → Landscape Tier
      if (mode === 'landscape') {
        if (sub === 'desktop') {
          const board = calcDesktopBoardSize(w, h);
          const layout = calcDesktopLayout(board.w, board.h);
          setDesktopLayout({ ...layout, boardW: board.w, boardH: board.h, boardMode: board.mode });
          setLandscapeTier(null);
          setPortraitTier(null);
        } else {
          // SE / Wide — ノッチ分を差し引いた利用可能幅で計算
          const NOTCH_INSET = (sub === 'wide') ? 47 : 0;
          const usableW = w - NOTCH_INSET;
          const lt = calcLandscapeTier(usableW, h);
          lt.notchInset = NOTCH_INSET;  // renderLandscapeBoardで使用
          setLandscapeTier(lt);
          setDesktopLayout(null);
          setPortraitTier(null);
        }
      } else {
        // Phase 3: Portrait (stack / side)
        const tierKey = getTier(w);
        const pt = tierToSizes(TIERS[tierKey]);
        pt.tierKey = tierKey;
        pt.mode = mode;           // 'stack' or 'side'
        pt.cloudCols = mode === 'stack' ? 3 : 2;
        setPortraitTier(pt);
        setDesktopLayout(null);
        setLandscapeTier(null);
      }
    };

    // 初回実行
    updateLayout();

    // ResizeObserverでroot要素を監視
    const root = document.getElementById('root');
    let ro = null;
    if (root && typeof ResizeObserver !== 'undefined') {
      ro = new ResizeObserver(() => updateLayout());
      ro.observe(root);
    }
    // フォールバック: resizeイベント

    return () => {

      window.removeEventListener('resize', updateLayout);

          actionMode: null,

      case 'SET_DRAWN':
        return { ...state, hasDrawn: true };
      case 'SET_ACTIONED':
        return { ...state, hasActioned: true };
      case 'SELECT_CARD':
        return { ...state, selectedCard: action.card, actionMode: action.mode };
      case 'CLEAR_SELECTION':
        return { ...state, selectedCard: null, actionMode: null, refillMode: false, refillTargetHouseIdx: null };
      case 'START_WIND_TARGET':
        return { ...state, windTargetMode: true, selectedWindCard: action.card, selectedCard: action.card, actionMode: 'wind' };

        return { ...state, windTargetMode: false, selectedWindCard: null, selectedCard: null, actionMode: null };
      case 'COMPLETE_WIND':
        return { ...state, windTargetMode: false, selectedWindCard: null, selectedCard: null, actionMode: null };

      case 'START_REFILL':
        return { ...state, refillMode: true, refillTargetHouseIdx: action.houseIdx, actionMode: 'refill' };
      case 'CANCEL_REFILL':
        return { ...state, refillMode: false, refillTargetHouseIdx: null, actionMode: null };
      case 'COMPLETE_REFILL':
        return { ...state, refillMode: false, refillTargetHouseIdx: null, actionMode: null };
      default:
        return state;
    }
  };

    }

    // Desktop 5-Row用: コンテナのDOM位置 + CARD_SIZESのpx値でpitch計算
    // レンダリングと同じcalcOverlapPitch(1/3)を使い、座標の一致を保証する
    const calcDtCardPosition = (pIdx, cIdx, total) => {
      const containerRect = handContainer.getBoundingClientRect();
      const sizeKey = getCardSizeForPlayer(pIdx);
      const cardWpx = CARD_SIZES[sizeKey] ? CARD_SIZES[sizeKey].w : 80;
      const pitch = calcOverlapPitch(total, containerRect.width, cardWpx, 1/3);
      return {
        x: containerRect.left - boardRect.left + Math.round(cIdx * pitch),
        y: containerRect.top - boardRect.top
      };
    };

    // v3.0.0.2: Desktop 5-Rowモードではpitch計算ベースの座標を常に使う
    // 理由: ペア成立アニメーション中に一部カードがDOMから除去されるため、
    //        DOM children走査ではインデックスがずれる
    if (currentDesktopTier) {
      // Phase 3: Portrait対戦相手はcompact ST表示のため、コンテナ中央を返す
      const isPortraitOpp = (layoutModeRef.current === 'stack' || layoutModeRef.current === 'side') && playerIdx !== 0;
      if (isPortraitOpp) {
        const containerRect = handContainer.getBoundingClientRect();
        return {
          x: containerRect.left - boardRect.left + containerRect.width / 2 - 20,
          y: containerRect.top - boardRect.top
        };
      }
      return calcDtCardPosition(playerIdx, cardIndex, totalCards);
    }

    if (cardIndex >= handContainer.children.length) {
      // 手札にまだ存在しないカード位置（ドロー到着先）
      return calcV2Position(playerIdx, cardIndex, totalCards);
    }

    let actualIndex = 0;
    let targetElement = null;
    for (let i = 0; i < handContainer.children.length; i++) {
      const child = handContainer.children[i];
      if (child && child.offsetParent !== null) {
        if (actualIndex === cardIndex) {
          targetElement = child;
          break;
        }
        actualIndex++;
      }
    }

    if (!targetElement) {
      const containerRect = handContainer.getBoundingClientRect();
      // v2.4.8: 動的カードサイズに対応
      const cardDim = getCurrentCardDimensions();
      const cardW = cardDim.w;
      const minGap = LAYOUT.minGap;
      let blockW = playerCount === 2 || (playerCount === 3 && playerIdx === 0)
        ? (LAYOUT.board.w - 2) : ((LAYOUT.board.w / 2) - 1.5);
      // 手札エリア幅 = ブロック幅 - 引札ゾーン(カード幅) - 間隔1U
      const handAreaW = blockW - cardW - 1;
      let pitch = 0;
      if (totalCards > 1) {
        const widthWithGap = cardW + (cardW + minGap) * (totalCards - 1);
        if (widthWithGap <= handAreaW) {
          pitch = UNIT.toPixelX(cardW + minGap);
        } else {
          pitch = UNIT.toPixelX(Math.max(minGap, (handAreaW - cardW) / (totalCards - 1)));
        }
      }
      return {
        x: containerRect.left - boardRect.left + cardIndex * pitch,
        y: containerRect.top - boardRect.top
      };
    }

    const cardRect = targetElement.getBoundingClientRect();
    return {
      x: cardRect.left - boardRect.left,
      y: cardRect.top - boardRect.top
    };
  };

  useEffect(() => { deckRef.current = deck; }, [deck]);
  useEffect(() => { phaseRef.current = phase; }, [phase]);

            });
            if (suggestion) {

            } else {
              showCompanionHint(houseOpp.message);
            }
            return;
          }
        }, 1500);
      }, 300);
      return () => clearTimeout(timer);
    }
  }, [currentPlayerIndex, gameState, dealingPhase, gameEnded, autoPlayMode, phase, deck.length, players, showCompanionHint, showCompanionSuggestion]);

  // v2.6.0: ログ自動スクロール廃止（ログエリア削除のため）

  // 市場交換完了処理（鳥居配置時・再格納時）

  // v6.6.1: type=refill の再格納にも対応
  const handleMarketExchange = useCallback(async (selectedMarketCard) => {
    if (!marketSelectMode) return;

    if (marketSelectMode.type === 'refill') {

    const { stallCard, characterCard, playerIdx, stallHouseIdx } = marketSelectMode;

        }
        return h;
      }));

      // 両方のカードを同時に飛行させる（exchangeモード）
      // 市場カード→鳥居へ
      setFlyingCard({
        card: selectedMarketCard,
        target: 'stallExchange',
        playerIdx: playerIdx,
        phase: 'exchange',
        sourceX: marketCardPos.x,
        sourceY: marketCardPos.y,
        stallX: stallPos.x,
        stallY: stallPos.y,  // getHousePositionで既に人物カード位置を返している
        forceFront: true,
        // 交換用：もう一枚のカード情報
        exchangeCard: characterCard,
        exchangeFromX: stallPos.x,
        exchangeFromY: stallPos.y,  // 同上
        exchangeToX: marketCardPos.x,
        exchangeToY: marketCardPos.y
      });
      await delay(150);  // 浮かぶタメ（150ms）

      // 市場から選択されたカードを除外
      const updatedMarket = marketRef.current.filter(c => c.uid !== selectedMarketCard.uid);
      marketRef.current = updatedMarket;
      setMarket(updatedMarket);

      // 飛行開始
      setFlyingCard(prev => prev ? { ...prev, phase: 'exchangeFlying' } : null);
      await delay(350);  // 飛行時間（350ms）

      setFlyingCard(null);

      // 市場に人物カードを追加
      const finalMarket = [...updatedMarket, characterCard];
      marketRef.current = finalMarket;
      setMarket(finalMarket);
    } else {
      // アニメなしの場合
      const updatedMarket = [...marketRef.current.filter(c => c.uid !== selectedMarketCard.uid), characterCard];
      marketRef.current = updatedMarket;
      setMarket(updatedMarket);
    }

    // v6.4: 家に選択したカードを入れる
    setHousesForPlayer(playerIdx, prev => prev.map((h, i) => {
      if (i === (stallHouseIdx !== undefined ? stallHouseIdx : prev.length - 1) && HOUSE_PROPERTIES[h.houseCard.id]?.marketExchange) {
        return { ...h, storedCard: selectedMarketCard };
      }
      return h;
    }));

    // ログ出力
    addLog(T.log.sentToMarket(playerName, characterCard.name, selectedMarketCard.name), 'action');
    // v2.6.0: 相棒ナレーション - 市場交換
    if (playerIdx === 0) {
      CompanionNarrator.processEvent('marketExchange', {
        playerIdx: 0, gaveName: characterCard.name, gotName: selectedMarketCard.name,
      }, showCompanionHint);
    }
    GameLogger.full(`[T${turn}] P${playerIdx} stall exchange: ${characterCard.name} → market, ${selectedMarketCard.name} → stall`);
    // NotationLogger - 鳥居配置＆市場交換
    NotationLogger.recordHousePlace(stallCard, selectedMarketCard, true, { sent: characterCard, got: selectedMarketCard });

    // あがり判定（P0の場合）
    if (playerIdx === 0) {
      // 手札は既に更新済み
      const currentHand = playersRef.current[0].hand;
      if (GameLogic.checkWin(currentHand)) {
        endGame(0, 'agari');
        return;
      }
      setHasActioned(true);
      // handleEndTurnのクロージャにはmarketSelectModeの古い値が残っているため、
      // state更新が反映された次のレンダリング後にstartNextTurnを直接呼ぶ
      NotationLogger.finishLine(currentHand.length, false, false);
      setTimeout(() => startNextTurn(0), 0);
    }
  }, [marketSelectMode, players, turn, addLog, setHousesForPlayer, endGame, setHasActioned, startNextTurn, animSettings.dealingAnim, getMarketCardPosition, getHousePosition]);

  // v6.5: 商いの才覚 — 市場カード選択/解除（ノビーがステップバイステップで案内）
  const handleEffectMarketToggle = useCallback((card) => {
    if (!effectMarketSelect) return;
    setEffectMarketSelect(prev => {
      if (!prev) return null;
      const isSelected = prev.selected.some(c => c.uid === card.uid);
      if (isSelected) {
        // 選択解除
        const newSelected = prev.selected.filter(c => c.uid !== card.uid);
        const remaining = prev.count - newSelected.length;
        setTimeout(() => showCompanionHint(`⚖️ あと${remaining}枚選択してね`), 0);
        return { ...prev, selected: newSelected };
      } else if (prev.selected.length < prev.count) {
        // 選択追加
        const newSelected = [...prev.selected, card];
        const remaining = prev.count - newSelected.length;
        if (remaining > 0) {
          setTimeout(() => showCompanionHint(`⚖️ ${card.name}を選択 → あと${remaining}枚`), 0);

          // 必要枚数に達した → 自動確定

            handleEffectMarketConfirm_auto(newSelected);
          }, 300);

        return { ...prev, selected: newSelected };

      return prev; // 上限に達している場合は何もしない
    });

    const newMarket = marketRef.current.filter(c => !selectedUids.has(c.uid));

    // 手札に追加
    const currentHand = [...playersRef.current[0].hand, ...selected];
    setHand(0, currentHand);

    // ログ
    const gainedNames = selected.map(c => c.name).join(', ');

    if (floatingPairCards && floatingPairCards.cards) {

  // AI用市場カード選択（v6.5: ペア相方優先 → 効果ペア相方 → 最高点）
  const selectBestMarketCard = useCallback((market, strategy = {}) => {
    if (!market || market.length === 0) return null;
    const { hand } = strategy;
    if (hand) {
      const charIds = hand.filter(c => c.type === 'character').map(c => c.id);
      // 1. 同名ペア相方を優先
      const pairMatch = market.find(c => charIds.includes(c.id));
      if (pairMatch) return pairMatch;
      // 2. v6.5: 効果ペア相方を優先
      for (const mc of market) {
        for (const cid of charIds) {
          if (EFFECT_PAIRS[cid + '+' + mc.id]) return mc;
        }
      }
    }
    // 3. 最高点のカードを選択
    return market.reduce((best, card) => {
      const bestPoints = best?.points || 0;
      const cardPoints = card?.points || 0;
      return cardPoints > bestPoints ? card : best;
    }, market[0]);
  }, []);

  const getHand = (idx) => playersRef.current[idx]?.hand || [];

  const isHumanPlayer = (idx) => idx === 0;

  const setHand = (idx, h) => {

  const setHousesForPlayer = (idx, h) => {

      playersRef.current = newPlayers;  // 即座にrefも更新

  const getNextActivePlayer = (fromIdx) => {

    return -1;
  };

  // v6.5: 使用済みカードプールにカードを追加
  const addToDiscardPool = (cardType, card) => {
    // cardType: 'wind' or 'house'
    setDiscardPool(prev => ({
      ...prev,
      [cardType]: [...prev[cardType], card]
    }));
    discardPoolRef.current = {
      ...discardPoolRef.current,
      [cardType]: [...discardPoolRef.current[cardType], card]
    };
  };

  // v6.5: バナー表示ヘルパー（効果ペア・ババ抜き・あがり）
  const showBanner = async (configKey, options = {}) => {
    const { showBackground = false, settingKey = 'pairEffect' } = options;
    // 設定チェック: 対応するanimSettingsがOFFならスキップ
    if (!animSettings[settingKey]) return;
    // オートプレイ中はautoPlayAnimがOFFならスキップ
    if (autoPlayModeRef.current && !animSettings.autoPlayAnim) return;

    const config = BANNER_CONFIG[configKey];
    if (!config) return;
    const text = T.banner[configKey];
    const t = getT();

    // slide-in
    setBannerState({ text, colorClass: config.colorClass, phase: 'in', showBackground });
    await delay(t.bannerIn);
    // freeze
    setBannerState(prev => prev ? { ...prev, phase: 'freeze' } : null);
    await delay(t.bannerFreeze);
    // slide-out
    setBannerState(prev => prev ? { ...prev, phase: 'out' } : null);
    await delay(t.bannerOut);
    // cleanup
    setBannerState(null);
  };

  // ババ抜きフェーズ開始オーバーレイ（ゲーム開始と同じシンプルなボックス表示）
  const showBabanukiStart = async () => {
    if (!animSettings.phaseOverlay) return;
    if (autoPlayModeRef.current && !animSettings.autoPlayAnim) return;
    setShowBabanukiOverlay(true);
    const t = getT();
    await delay(t.bannerIn + t.bannerFreeze + t.bannerOut);
    setShowBabanukiOverlay(false);
  };

  // v6.6: カウンター可能かチェック（手札に風カードがあるか）
  const canCounter = (defenderHand) => {
    return defenderHand.some(c => c.type === 'wind');
  };

  // v6.6: AIカウンター判定（鳥居の中身価値 vs 風カードの防御価値）
  const shouldAiCounter = (defenderIdx, storedCard, defenderHand) => {
    const windCard = defenderHand.find(c => c.type === 'wind');
    if (!windCard) return { shouldCounter: false, windCard: null };

    const storedValue = storedCard.points || 0;

    // 特殊カード（WIT/HOL/KIN/QUE）は必ず守る
    if (['WIT', 'HOL', 'KIN', 'QUE'].includes(storedCard.id)) {
      return { shouldCounter: true, windCard };
    }

    // 5点以上のカードは80%でカウンター
    if (storedValue >= 5) {
      return { shouldCounter: Math.random() < 0.8, windCard };
    }

    // 3点のカードは50%でカウンター
    if (storedValue >= 3) {
      return { shouldCounter: Math.random() < 0.5, windCard };
    }

    // 1点のカードは20%でカウンター
    return { shouldCounter: Math.random() < 0.2, windCard };
  };

  // v6.6.1: AIカウンター判定（空鳥居用）
  const shouldAiCounterEmptyStall = (defenderIdx, defenderHand) => {
    const windCard = defenderHand.find(c => c.type === 'wind');
    if (!windCard) return { countered: false, counterWindCard: null };

    const currentMarket = marketRef.current;
    const charCards = defenderHand.filter(c => c.type === 'character');

    // === 100%カウンター条件: 市場にペア相手がいる ===
    // 手札のキャラカードと市場カードでペアが成立するか確認
    const hasPairInMarket = charCards.some(handCard => {
      // 同名ペア
      if (currentMarket.some(mc => mc.id === handCard.id)) return true;
      // 効果ペア
      const effectPairKey = Object.keys(EFFECT_PAIRS).find(k => k.includes(handCard.id));
      if (effectPairKey) {
        const pairIds = effectPairKey.split('_');
        const partnerId = pairIds.find(id => id !== handCard.id);
        if (currentMarket.some(mc => mc.id === partnerId)) return true;
      }
      return false;
    });

    if (hasPairInMarket && charCards.length > 0) {
      // 市場にペア相手がいる → 空鳥居を守って再格納すればペア獲得確定
      return { countered: true, counterWindCard: windCard };
    }

    // === 高確率カウンター条件: 高得点キャラを格納予定 ===
    const hasHighValueChar = charCards.some(c => c.points >= 5);
    if (hasHighValueChar) {
      // 5点以上のキャラを持っている → 80%でカウンター
      const shouldCounter = Math.random() < 0.80;
      return { countered: shouldCounter, counterWindCard: windCard };
    }

    // === 通常判定 ===
    // 基本カウンター確率 = 50%（鳥居カード3点の価値）
    let counterChance = 0.50;

    // 風カードが2枚以上 → +20%
    const windCount = defenderHand.filter(c => c.type === 'wind').length;
    if (windCount >= 2) {
      counterChance += 0.20;
    }

    // 風が1枚しかない → -15%（貴重な風カードを消費するのは痛い）
    if (windCount === 1) {
      counterChance -= 0.15;
    }

    // 格納できるキャラカードがない → -20%（守っても意味が薄い）
    if (charCards.length === 0) {
      counterChance -= 0.20;
    }

    // 0-100%にクランプ
    counterChance = Math.max(0, Math.min(1, counterChance));

    return {
      countered: Math.random() < counterChance,
      counterWindCard: windCard
    };
  };

  // v6.6: P0用カウンター待ち（Promise化）
  const waitForP0CounterDecision = (attackerIdx, storedCard) => {
    return new Promise((resolve) => {
      // counterModeを設定してモーダル表示
      const attackerName = playersRef.current[attackerIdx]?.name || `P${attackerIdx}`;
      const storedCardName = storedCard?.name || '?';
      setCounterMode({
        attackerIdx,
        defenderIdx: 0,
        storedCard,
        attackerName,
        storedCardName,
        phase: 'waiting',
        resolveCounter: resolve
      });
      counterModeRef.current = { resolveCounter: resolve };
      // Nobyが警告を実況
      const counterMsg = T.ui.chatActions?.counterAlert?.(attackerName, storedCardName) || `⚡ ${attackerName}が鳥居の${storedCardName}を攻撃！カウンターする？`;
      showCompanionHint(counterMsg);
    });
  };

  // v6.6: カウンター確認ボタン（P0用）
  const handleCounterConfirm = useCallback(() => {
    if (!counterMode || counterMode.phase !== 'waiting') return;
    const p0Hand = playersRef.current[0].hand;
    const windCard = p0Hand.find(c => c.type === 'wind');
    if (!windCard) {
      // 風カードが見つからない場合は辞退として処理（Promiseを解決して処理を続行させる）
      setCounterMode(prev => prev ? { ...prev, phase: 'declined' } : null);
      if (counterModeRef.current?.resolveCounter) {
        counterModeRef.current.resolveCounter({ countered: false, counterWindCard: null });
      }
      return;
    }

    // カウンターを実行
    setCounterMode(prev => prev ? { ...prev, phase: 'confirmed' } : null);
    if (counterModeRef.current?.resolveCounter) {
      counterModeRef.current.resolveCounter({ countered: true, counterWindCard: windCard });
    }
  }, [counterMode]);

  // v6.6: カウンター辞退ボタン（P0用）
  const handleCounterDecline = useCallback(() => {
    if (!counterMode || counterMode.phase !== 'waiting') return;

    // カウンターしない
    setCounterMode(prev => prev ? { ...prev, phase: 'declined' } : null);
    if (counterModeRef.current?.resolveCounter) {
      counterModeRef.current.resolveCounter({ countered: false, counterWindCard: null });
    }
  }, [counterMode]);

  // v6.5: 効果ペアの効果を解決（使用済みプール/市場からカードを取得）
  // excludeUids: 商いの才覚で市場に追加したペアカードのUIDセット（選択対象から除外）
  const resolveEffectPair = (effectType, playerIndex, excludeUids = new Set()) => {
    const pool = discardPoolRef.current;
    const currentMarket = marketRef.current;
    const effectEntry = Object.values(EFFECT_PAIRS).find(e => e.effectType === effectType);
    if (!effectEntry) return [];

    const gained = [];

    // 風カード取得
    for (let i = 0; i < effectEntry.wind && pool.wind.length > 0; i++) {
      gained.push(pool.wind.pop());
    }
    // 家カード取得
    for (let i = 0; i < effectEntry.house && pool.house.length > 0; i++) {
      gained.push(pool.house.pop());
    }
    // 市場から取得（商いの才覚）
    if (effectEntry.market > 0) {
      // 選択可能な市場カード（ペアカード自身は除外）
      const selectableMarket = currentMarket.filter(c => !excludeUids.has(c.uid));
      if (selectableMarket.length > 0) {
        if (playerIndex === 0 && !autoPlayModeRef.current) {
          // P0（手動操作）: 市場選択UIを表示（非同期処理）
          // 選択可能なカードのみをUIに渡す
          const count = Math.min(effectEntry.market, selectableMarket.length);
          setEffectMarketSelect({ count, selected: [], effectType, playerIndex: 0, excludeUids });
          showCompanionHint(`⚖️ 狐の取引発動！雲上から${count}枚もらえるよ → 欲しいカードをクリック`);
          // 市場カードの取得は handleEffectMarketConfirm で実行される
        } else {
          // AI / オートプレイ: ペア相方 > 高得点の順に自動選択
          const aiHand = playersRef.current[playerIndex]?.hand || [];
          const sorted = [...selectableMarket].sort((a, b) => {
            // ペア相方があれば最優先
            const aHasPair = aiHand.some(h => h.id === a.id) || Object.keys(EFFECT_PAIRS).some(k => k.includes(a.id) && aiHand.some(h => k.includes(h.id) && h.id !== a.id));
            const bHasPair = aiHand.some(h => h.id === b.id) || Object.keys(EFFECT_PAIRS).some(k => k.includes(b.id) && aiHand.some(h => k.includes(h.id) && h.id !== b.id));
            if (aHasPair && !bHasPair) return -1;
            if (!aHasPair && bHasPair) return 1;
            return (b.points || 0) - (a.points || 0); // 高得点順
          });
          const count = Math.min(effectEntry.market, selectableMarket.length);
          const taken = sorted.slice(0, count);
          const takenUids = new Set(taken.map(c => c.uid));
          gained.push(...taken);
          // 市場から取得したカードを除去（ペアカードは残る）
          const remaining = currentMarket.filter(c => !takenUids.has(c.uid));
          setMarket(remaining);
          marketRef.current = remaining;
        }
      }
    }

    // プールのstate同期
    setDiscardPool({ wind: [...pool.wind], house: [...pool.house] });
    discardPoolRef.current = { wind: [...pool.wind], house: [...pool.house] };

    return gained;
  };

  // 同期的ペア処理（高速化の核心）— v6.5: 効果ペア対応
  const processPairsSync = (hand, playerIndex, options = {}) => {
    const { fireBanner = false } = options;
    let currentHand = [...hand];
    let safetyCounter = 0; // v6.5: 無限ループ防止
    let bannerFired = false; // バナーは最初の効果ペアのみ

    while (safetyCounter++ < 20) {
      const pairs = GameLogic.findPairs(currentHand);
      if (pairs.length === 0) break;
      const pair = pairs[0];
      const card0 = pair.cards[0];
      const card1 = pair.cards[1];
      if (!card0 || !card1) break; // 防御: カードがundefinedの場合は終了
      currentHand = currentHand.filter(c => c && c.uid !== card0.uid && c.uid !== card1.uid);
      // v6.5: 商いの才覚のペアカードは市場へ（resolveEffectPairの前に追加）
      // ペアカードのUIDを記録（resolveEffectPairで除外するため）
      const pairUids = new Set([card0.uid, card1.uid]);
      if (pair.effectType === 'merchantGift') {
        // P0（手動操作）の場合: 浮遊表示にして市場選択完了後に着地
        if (playerIndex === 0 && !autoPlayModeRef.current) {
          setFloatingPairCards({ cards: [card0, card1], phase: 'floating' });
        } else {
          // AI: 即座に市場に追加
          const newMarket = [...marketRef.current, card0, card1];
          setMarket(newMarket);
          marketRef.current = newMarket;
        }
      }
      addLog(T.log.madeAPair(getPlayerName(playerIndex), card0.name), 'pair');
      // v2.6.0: 相棒ナレーション - ペア成立
      CompanionNarrator.processEvent('pair', {
        playerIdx: playerIndex, playerName: getPlayerName(playerIndex), cardName: card0.name,
      }, showCompanionHint);
      // v6.5: 効果ペア処理
      if (pair.effectType) {
        // バナー表示（fire-and-forget、最初の効果ペアのみ）
        if (fireBanner && !bannerFired) {
          showBanner(pair.effectType, { settingKey: 'pairEffect' });
          bannerFired = true;
        }
        // 商いの才覚の場合、ペアカード自身は選択対象から除外
        const excludeUids = pair.effectType === 'merchantGift' ? pairUids : new Set();
        const gained = resolveEffectPair(pair.effectType, playerIndex, excludeUids);
        const gainedNames = gained.length > 0 ? gained.map(c => c.name).join(', ') : '';
        const effectName = T.effectPairs?.[pair.effectType] || pair.effectType;
        // NotationLogger - 効果ペア記録
        NotationLogger.recordEffectPair(card0, card1, pair.effectType, gained);
        // 異常検知: 効果ペア発動回数
        AnomalyDetector.recordEffectPair(pair.effectType, NotationLogger.currentTurn);
        if (gained.length > 0) {
          addLog(T.log.effectPairActivated(getPlayerName(playerIndex), effectName, gainedNames), 'pair');
          currentHand = [...currentHand, ...gained];
          // 獲得カードで新ペアが成立する可能性 → whileループ継続
        }
        // 相棒ナレーション - 効果ペア発動
        // P0のmerchantGiftは市場選択完了後にノビーが報告するのでスキップ
        if (!(pair.effectType === 'merchantGift' && playerIndex === 0 && !autoPlayModeRef.current)) {
          CompanionNarrator.processEvent('effectPair', {
            playerIdx: playerIndex, playerName: getPlayerName(playerIndex),
            effectType: pair.effectType, gainedNames: gainedNames || 'なし',
          }, showCompanionHint);
        }
      } else {
        // NotationLogger - 通常ペア記録
        NotationLogger.recordPair(card0, false);
      }
    }

    // 異常検知: ペアループが多すぎる
    AnomalyDetector.checkPairLoop(safetyCounter, playerIndex);

    // 手札を更新
    setHand(playerIndex, currentHand);

    return { hand: currentHand };
  };

  // ペア演出付きペア処理（ドロー時専用）
  // drawnCard: 引いたカード、hand: 引く前の手札（追加前）
  const processPairWithAnimation = async (drawnCard, hand, playerIndex, skipAnim) => {
    const t = getT();

    // 一時的に引いたカードを追加した手札でペア判定
    const tempHand = [...hand, drawnCard];
    const pairs = GameLogic.findPairs(tempHand);

    // 詳細ログ
    const hb = GameLogger.getHandBreakdown(tempHand);
    GameLogger.debug(`[processPairWithAnimation] Player ${playerIndex} drew ${drawnCard.name}, hand now: 人物=${hb.chars}, 家=${hb.houses}, 風=${hb.winds}, pairs found=${pairs.length}`);

    // ペアなし → 通常処理
    if (pairs.length === 0) {
      setHand(playerIndex, tempHand);

      // 魔女/聖母を引いた場合の手札内演出（P0のみ、ペアにならなかった場合）
      if (playerIndex === 0 && (drawnCard.id === 'WIT' || drawnCard.id === 'HOL')) {
        if (!skipAnim && animSettings.pairEffect) {
          const cardIndex = tempHand.length - 1; // 最後に追加されたカード
          const handCount = tempHand.length;

          // 浮上
          setDangerCardInHand({ card: drawnCard, cardIndex, handCount, phase: 'float' });
          await delay(t.dangerFloat);

          // 揺れ
          setDangerCardInHand({ card: drawnCard, cardIndex, handCount, phase: 'shake' });
          await delay(t.dangerShake);

          // 戻り
          setDangerCardInHand({ card: drawnCard, cardIndex, handCount, phase: 'settle' });
          await delay(t.dangerSettle);

          setDangerCardInHand(null);
        }
      }

      return { hand: tempHand, hadPair: false };
    }

    const pair = pairs[0];

    // 通常ペア → 演出実行
    // 引いたカードがペアの一部かどうか確認
    const drawnIsInPair = pair.cards.some(c => c && c.uid === drawnCard.uid);

    if (!drawnIsInPair) {
      // 引いたカードがペアに関与していない（手札内の別ペア）
      // → 同期処理にフォールバック（効果ペアの場合はバナー発火）
      if (pair.effectType && !skipAnim) {
        showBanner(pair.effectType, { settingKey: 'pairEffect' });
        await delay(t.bannerIn); // v2.7.2: バナーが画面に現れるのを待つ
      }
      const result = processPairsSync(tempHand, playerIndex);
      return { ...result, hadPair: true };
    }

    // 引いたカードとペアになる相手を特定
    const pairCard = pair.cards.find(c => c && c.uid !== drawnCard.uid);
    if (!pairCard) {
      // pairCardが見つからない場合は同期処理にフォールバック
      const result = processPairsSync(tempHand, playerIndex);
      return { ...result, hadPair: true };
    }
    const pairCardIndex = hand.findIndex(c => c && c.uid === pairCard.uid);


    // アニメーション実行
    if (!skipAnim && animSettings.pairEffect) {
      const handCount = hand.length;

      // v2.7.2: 効果ペアの場合、バナー表示してスライドイン完了を待つ
      if (pair.effectType) {
        showBanner(pair.effectType, { settingKey: 'pairEffect' });
        await delay(t.bannerIn); // バナーが画面に現れるのを待つ
      }

      // まず手札に追加（表示上）
      setHand(playerIndex, tempHand);
      await delay(50);

      // Phase 1: ペア対象カードが浮上
      setPairAnimation({ drawnCard, pairCard, pairCardIndex, playerIdx: playerIndex, phase: 'float', handCount });
      await delay(t.pairFloat);

      // Phase 2: 引いたカードがペア対象の隣へ移動
      setPairAnimation({ drawnCard, pairCard, pairCardIndex, playerIdx: playerIndex, phase: 'merge', handCount });
      await delay(t.pairMerge);

      // 待機
      await delay(t.pairWait);

      // Phase 3: 左へ退場
      setPairAnimation({ drawnCard, pairCard, pairCardIndex, playerIdx: playerIndex, phase: 'exit', handCount });
      await delay(t.pairExit);

      setPairAnimation(null);
    }

    // ペア成立後の手札
    let newHand = tempHand.filter(c => c.uid !== drawnCard.uid && c.uid !== pairCard.uid);
    // ペアカードのUIDを記録（resolveEffectPairで除外するため）
    const pairUids = new Set([drawnCard.uid, pairCard.uid]);
    // v6.5: 商いの才覚のペアカードは市場へ（resolveEffectPairの前に追加）
    if (pair.effectType === 'merchantGift') {
      // P0（手動操作）の場合: 浮遊表示にして市場選択完了後に着地
      if (playerIndex === 0 && !autoPlayModeRef.current) {
        setFloatingPairCards({ cards: [drawnCard, pairCard], phase: 'floating' });
      } else {
        // AI: 即座に市場に追加
        const newMarket = [...marketRef.current, drawnCard, pairCard];
        setMarket(newMarket);
        marketRef.current = newMarket;
      }
    }
    addLog(T.log.madeAPair(getPlayerName(playerIndex), drawnCard.name), 'pair');
    // v2.6.0: 相棒ナレーション - ペア成立
    CompanionNarrator.processEvent('pair', {
      playerIdx: playerIndex, playerName: getPlayerName(playerIndex), cardName: drawnCard.name,
    }, showCompanionHint);

    // v6.5: 効果ペア処理（最初のペア分）
    if (pair.effectType) {
      // 商いの才覚の場合、ペアカード自身は選択対象から除外
      const excludeUids = pair.effectType === 'merchantGift' ? pairUids : new Set();
      const gained = resolveEffectPair(pair.effectType, playerIndex, excludeUids);
      const gainedNames = gained.length > 0 ? gained.map(c => c.name).join(', ') : '';
      const effectName = T.effectPairs?.[pair.effectType] || pair.effectType;
      // NotationLogger - 効果ペア記録
      NotationLogger.recordEffectPair(drawnCard, pairCard, pair.effectType, gained);
      if (gained.length > 0) {
        addLog(T.log.effectPairActivated(getPlayerName(playerIndex), effectName, gainedNames), 'pair');
        newHand = [...newHand, ...gained];
      }
      // 相棒ナレーション - 効果ペア発動
      // P0のmerchantGiftは市場選択完了後にノビーが報告するのでスキップ
      if (!(pair.effectType === 'merchantGift' && playerIndex === 0 && !autoPlayModeRef.current)) {
        CompanionNarrator.processEvent('effectPair', {
          playerIdx: playerIndex, playerName: getPlayerName(playerIndex),
          effectType: pair.effectType, gainedNames: gainedNames || 'なし',
        }, showCompanionHint);
      }
    } else {
      // NotationLogger - 通常ペア記録
      NotationLogger.recordPair(drawnCard, false);
    }

    setHand(playerIndex, newHand);

    // 追加ペアがあるかチェック（同期処理 — 効果ペアで得たカードが新ペアを作る可能性）
    const additionalResult = processPairsSync(newHand, playerIndex);

    return {
      hand: additionalResult.hand,
      hadPair: true
    };
  };

  // 配札アニメーション付きゲーム開始（飛行カード対応）
  const startGameWithDealing = useCallback(async () => {
    const t = getT();
    const skipAnim = !animSettings.dealingAnim || (autoPlayModeRef.current && !animSettings.autoPlayAnim);

    // 配札開始フラグを最初に設定
    setDealingPhase('burning');
    setFlyingCard(null);

    // 吹き出しをクリア
    clearSpeechBubbles();

    autoPlayingRef.current = false;
    setEffect(null); setGameEnded(false); gameEndedRef.current = false; setIsProcessing(false); setRevealAllHands(false);
    // ターンアクションStateをまとめてリセット
    resetTurnAction();

    // v6.5: 使用済みカードプールをリセット
    setDiscardPool({ wind: [], house: [] });
    discardPoolRef.current = { wind: [], house: [] };
    setEffectMarketSelect(null);
    setFloatingPairCards(null);

    // ゲーム内統計をリセット
    gameStatsRef.current = {
      destroyCount: 0,
      windUsed: 0,
      housePlaced: 0,
      marketExchanges: 0,
      explorationTurns: 0,
      babanukiTurns: 0,
      phaseTransitionTurn: 0,
      // v6.6.1新機能統計
      counterAttempts: 0,
      counterSuccess: 0,
      emptyStallCreated: 0,
      emptyStallRefilled: 0,
      emptyStallAttacked: 0,
      emptyStallRemaining: 0,
      windExhaustedTurn: null,
      stallExhaustedTurn: null
    };

    // デッキ作成・シャッフル（ローカル変数で管理）- v6.6: gameParamsで枚数動的設定

    const newPlayers = createPlayers(selectedOpponents);

    let currentFirstPlayer = firstPlayerIndex;

        setSetConfig(prev => ({ ...prev, setFirstPlayer: currentFirstPlayer }));
      } else {

    if (!skipAnim) {

      let deckDisplayCount = remainingDeck.length;

          const isP0 = p === 0;

          setFlyingCard({ card, target: 'hand', playerIdx: p, phase: 'atDeck', handCount, flipped: isP0 ? false : undefined });
          await delay(20);

          // Phase 1: 山札 → 引札ゾーンへ飛行（裏向きのまま）
          setFlyingCard({ card, target: 'hand', playerIdx: p, phase: 'toDrawZone', handCount, flipped: isP0 ? false : undefined });
          await delay(t.flyToDrawZone);

          // Phase 2: 引札ゾーンでウェイト（P0は反転）
          if (isP0) {

            await delay(t.flipPre);

          } else {

            await delay(t.drawZoneWait);
          }

          // Phase 3: 引札ゾーン → 手札へスライド（P0は表向き）
          setFlyingCard({ card, target: 'hand', playerIdx: p, phase: 'toHand', handCount, flipped: isP0 ? true : undefined });
          await delay(t.slideToHand);

          // 到着 → 手札に追加

          const pairs = GameLogic.findPairs(tempHand);

            if (criticId) {

              if (reactionData) {

                showSpeechBubbleWithTyping(p, reactionData.message, false, 500 + Math.random() * 300);
                
                // 相棒の耳打ち（配札中は確率を下げる - 煩雑さ防止）
                if (Math.random() < 0.3) {

                  if (companionReaction) {
