    const currentPhase = phaseRef.current;

    // ゲーム終了サマリー（統計用）
    const handSummary = ps.map((p, i) => `P${i}:${p.hand.length}`).join(',');
    const housesSummary = ps.map((p, i) => `P${i}:${p.houses.length}`).join(',');
    GameLogger.debug(`[GameSummary] winner=${isDraw ? 'DRAW' : `P${winnerIdx}`}, condition=${condition}, phase=${currentPhase}, hands=[${handSummary}], houses=[${housesSummary}]`);

    // 詳細ログ - 全プレイヤーの手札状態
    ps.forEach((p, i) => {
      const hb = GameLogger.getHandBreakdown(p.hand);
      GameLogger.debug(`[endGame] Player ${i} (${p.name}): total=${hb.total}, 人物=${hb.chars}(${hb.charNames}), 家=${hb.houses}(${hb.houseNames}), 風=${hb.winds}(${hb.windNames}), houses stored=${p.houses.length}`);
    });

    // 全手札公開演出（オートプレイ以外）
    // 勝者の手札に家・風カードが残っている場合に特に有効
    if (!autoPlayModeRef.current && animSettings.dealingAnim) {
      setRevealAllHands(true);  // 全手札を表向きに
      await delay(1500);  // 1.5秒待機して確認できるように
    }

    // あがりバナー（VictoryOverlay表示前）
    if (condition === 'agari') {
      await showBanner('agari', { settingKey: 'winEffect' });
    }

    // ゲーム終了フラグをセット（オーバーレイ表示）
    setGameEnded(true);

    // 勝利条件と勝者を保存（ゲーム終了画面表示用）
    setLastWinCondition(condition);
    setLastWinnerIdx(winnerIdx);

    // 盤面上に勝利演出を表示（オートプレイ時は省略、引き分け時は別演出）
    if (!autoPlayModeRef.current && animSettings.winEffect) {
      setVictoryAnimation({
        winnerName: isDraw ? T.misc.draw : (winner?.name || T.misc.player),
        winnerIdx: winnerIdx,
        condition: condition
      });
    }

    // 旧エフェクトは削除（VictoryOverlayに統合）
    // if (condition === 'agari' && !autoPlayModeRef.current) setEffect({ type: 'win', message: `${winner?.name}が上がった！`, duration: 2000 });
    // if (condition === 'stalemate' && !autoPlayModeRef.current) setEffect({ type: 'win', message: `膠着状態！${winner?.name}の判定勝ち`, duration: 2000 });
    if (isDraw) {
      addLog(T.log.draw, 'system');
    } else {
      addLog(T.log.winner(winner?.name || T.misc.player, condition === 'stalemate'), 'system');
    }
    // v2.6.0: 相棒ナレーション - ゲーム終了
    CompanionNarrator.processEvent('gameEnd', {
      winnerIdx: isDraw ? null : winnerIdx,
      winnerName: winner?.name || '',
    }, showCompanionHint);

    // プレイヤー勝利時に紙吹雪（引き分け時は無し）
    if (winnerIdx === 0 && animSettings.confetti && !autoPlayModeRef.current) {
      setShowConfetti(true);
      setTimeout(() => setShowConfetti(false), 3500);
    }

    // 勝者総取りルール（関数形式で最新のstateを使用）
    setCumulativeScores(prev => {
      const newScores = [...prev];
      // 引き分け時は誰も得点を得られない
      if (isDraw) {
        return newScores;
      }

      let totalLoss = 0;
      ps.forEach((p, i) => {
        if (i !== winnerIdx) {
          const loss = GameLogic.calculateScore(p.hand);
          newScores[i] -= loss;  // 敗者はマイナス
          totalLoss += loss;
        }
      });
      newScores[winnerIdx] += totalLoss;  // 勝者は敗者の合計をプラスで獲得
      return newScores;
    });

    // 引き分け時は勝利カウントを増やさない
    if (!isDraw) {
      setWinCount(prev => { const nw = [...prev]; nw[winnerIdx]++; return nw; });
    }

    // 統計更新
    const playerWon = winnerIdx === 0;
    const endedInExploration = phaseRef.current === PHASES.EXPLORATION;
    const playerLoss = (playerWon || isDraw) ? 0 : GameLogic.calculateScore(ps[0]?.hand || []);
    let totalEarned = 0;
    if (!isDraw) {
      ps.forEach((p, i) => { if (i !== winnerIdx) totalEarned += GameLogic.calculateScore(p.hand); });
    }

    setStatistics(prev => {
      const newStats = { ...prev };
      newStats.gamesPlayed++;
      if (isDraw) {
        // 引き分け: 勝敗なし
        newStats.finishPositions['draw'] = (newStats.finishPositions['draw'] || 0) + 1;
      } else if (playerWon) {
        newStats.gamesWon++;
        newStats.totalScoreEarned += totalEarned;
        // 順位記録
        newStats.finishPositions[1] = (newStats.finishPositions[1] || 0) + 1;
      } else {
        newStats.totalScoreLost += playerLoss;
        // 順位記録
        const position = ps.length;
        newStats.finishPositions[position] = (newStats.finishPositions[position] || 0) + 1;
      }
      // フェーズ別
      if (endedInExploration) newStats.gamesEndedInExploration++;
      else newStats.gamesEndedInBabanuki++;
      return newStats;
    });

    // 先手ローテーション - セット制の場合はstartGameWithDealingで行うのでスキップ
    // 無制限モードまたはセット無効の場合のみここでローテーション
    if (setConfig.totalSets === 0 || !setConfig.enabled) {
      setFirstPlayerIndex(prev => (prev + 1) % ps.length);
    }

    // トーナメントモード時のデータ記録（refを使用してクロージャ問題回避）
    if (tournamentModeRef.current && tournamentDataRef.current) {
      const data = tournamentDataRef.current;
      const currentTurn = turnRef.current; // fix: refから取得

      // ゲーム統計
      data.gameplayStats.totalGames++;
      data.gameplayStats.turnCounts.push(currentTurn);

      // v6.6.1統計: カウンター・空屋台
      const gs = gameStatsRef.current;
      data.gameplayStats.counterAttempts += gs.counterAttempts;
      data.gameplayStats.counterSuccess += gs.counterSuccess;
      data.gameplayStats.emptyStallCreated += gs.emptyStallCreated;
      data.gameplayStats.emptyStallRefilled += gs.emptyStallRefilled;
      data.gameplayStats.emptyStallAttacked += gs.emptyStallAttacked;

      // v6.6.1統計: ゲーム終了時の空屋台残数をカウント
      const emptyStallCount = ps.reduce((sum, p) => {
        return sum + p.houses.filter(h => h.storedCard === null).length;
      }, 0);
      gs.emptyStallRemaining = emptyStallCount;
      data.gameplayStats.emptyStallRemaining += emptyStallCount;

      // v6.6.1統計: 風/屋台枯渇ターン
      if (gs.windExhaustedTurn !== null) {
        data.gameplayStats.windExhaustedTurns.push(gs.windExhaustedTurn);
        data.gameplayStats.turnsAfterWindExhaust.push(currentTurn - gs.windExhaustedTurn);
      }
      if (gs.stallExhaustedTurn !== null) {
        data.gameplayStats.stallExhaustedTurns.push(gs.stallExhaustedTurn);
        data.gameplayStats.turnsAfterStallExhaust.push(currentTurn - gs.stallExhaustedTurn);
      }

      // 勝利条件
      if (condition === 'agari') data.gameplayStats.winConditions.agari++;
      else if (condition === 'draw') {
        // 引き分け用カウンタがなければ作成
        data.gameplayStats.winConditions.draw = (data.gameplayStats.winConditions.draw || 0) + 1;
      }
      else data.gameplayStats.winConditions.stalemate++;

      // 各プレイヤーのスコア計算（引き分け時は全員0）
      const scores = ps.map((p, i) => {
        if (isDraw) {
          return { idx: i, score: 0, isWinner: false, isDraw: true };
        } else if (i === winnerIdx) {
          let gained = 0;
          ps.forEach((op, oi) => { if (oi !== winnerIdx) gained += GameLogic.calculateScore(op.hand); });
          return { idx: i, score: gained, isWinner: true };
        } else {
          return { idx: i, score: -GameLogic.calculateScore(p.hand), isWinner: false };
        }
      });

      // 順位決定（同スコアは勝者優先）
      const sorted = [...scores].sort((a, b) => b.score - a.score);

      // 僅差フィニッシュ判定（1位と2位が5点差以内）
      if (sorted.length >= 2 && Math.abs(sorted[0].score - sorted[1].score) <= 5) {
        data.gameplayStats.closeFinishes++;
      }

      // プレイヤー統計更新
      ps.forEach((p, i) => {
        const playerId = p.odIndex !== undefined ? p.odIndex : i;
        if (data.playerStats[playerId]) {
          const stat = data.playerStats[playerId];
          stat.games++;
          stat.totalScore += scores[i].score;

          // 順位
          const position = sorted.findIndex(s => s.idx === i);
          if (position >= 0 && position < 4) stat.positions[position]++;

          // 勝利
          if (i === winnerIdx) {
            stat.wins++;
            if (condition === 'agari') stat.winsByCondition.agari++;

            // 先手勝率（このゲームでの順番）
            data.gameplayStats.positionWins[i]++;
          }

          // 戦略別統計
          const strat = p.individualStrategy || p.strategy || {};
          if (strat.housePreference && data.strategyStats.housePreference[strat.housePreference]) {
            data.strategyStats.housePreference[strat.housePreference].games++;
            if (i === winnerIdx) data.strategyStats.housePreference[strat.housePreference].wins++;
          }
          if (strat.storeThreshold && data.strategyStats.storeThreshold[strat.storeThreshold]) {
            data.strategyStats.storeThreshold[strat.storeThreshold].games++;
            if (i === winnerIdx) data.strategyStats.storeThreshold[strat.storeThreshold].wins++;
          }
          // windPreference → attackTarget
          if (strat.attackTarget && data.strategyStats.attackTarget[strat.attackTarget]) {
            data.strategyStats.attackTarget[strat.attackTarget].games++;
            if (i === winnerIdx) data.strategyStats.attackTarget[strat.attackTarget].wins++;
          }
          // 投機度
          const specHouse = strat.speculativeHouse || 50;
          const specHouseKey = specHouse <= 30 ? 'low' : specHouse <= 70 ? 'mid' : 'high';
          data.strategyStats.speculativeHouse[specHouseKey].games++;
          if (i === winnerIdx) data.strategyStats.speculativeHouse[specHouseKey].wins++;

          const specWind = strat.speculativeWind || 50;
          const specWindKey = specWind <= 30 ? 'low' : specWind <= 70 ? 'mid' : 'high';
          data.strategyStats.speculativeWind[specWindKey].games++;
          if (i === winnerIdx) data.strategyStats.speculativeWind[specWindKey].wins++;
        }
      });

      // 対戦成績更新
      ps.forEach((p1, i) => {
        const p1Id = p1.odIndex !== undefined ? p1.odIndex : i;
        ps.forEach((p2, j) => {
          if (i !== j) {
            const p2Id = p2.odIndex !== undefined ? p2.odIndex : j;
            if (data.headToHead[p1Id] && data.headToHead[p1Id][p2Id]) {
              if (i === winnerIdx) data.headToHead[p1Id][p2Id].wins++;
              if (j === winnerIdx) data.headToHead[p1Id][p2Id].losses++;
            }
          }
        });
      });

      // 進捗更新（refを先に更新、Stateは表示用）
      tournamentCurrentRef.current++;
      setTournamentProgress(prev => ({ ...prev, current: tournamentCurrentRef.current }));
    }

    // 勝利演出3秒後にゲーム終了画面へ
    const victoryDuration = (!autoPlayModeRef.current && animSettings.winEffect) ? 3000 : 0;

    // NotationLogger - ゲーム終了記録（統計をgameStatsRefから取得）
    const stats = gameStatsRef.current;
    const notationStats = {
      totalTurns: turnRef.current,
      explorationTurns: stats.phaseTransitionTurn > 0 ? stats.phaseTransitionTurn : turnRef.current,
      babanukiTurns: stats.phaseTransitionTurn > 0 ? turnRef.current - stats.phaseTransitionTurn : 0,
      destroyCount: stats.destroyCount,
      windUsed: stats.windUsed,
      housePlaced: stats.housePlaced,
      marketExchanges: stats.marketExchanges
    };
    // 重要: marketRef.currentを使用（Stateは非同期のため正確な値を取得）
    NotationLogger.recordGameEnd(winnerIdx, condition, ps, marketRef.current, notationStats);

    // AnomalyDetector - ゲームサマリー追加（トーナメント時のみ）
    if (tournamentModeRef.current) {
      AnomalyDetector.addGameSummary({
        gameId: tournamentCurrentRef.current,
        players: ps.map(p => p.name),
        winner: winnerIdx,
        winReason: condition.toUpperCase(),
        turns: turnRef.current,
        destroyCount: stats.destroyCount,
        windUsed: stats.windUsed
      });
    }

    // AI学習処理
    ps.forEach((p, pIdx) => {
      if (p.type === 'ai') {
        const criticId = p.criticId || p.id;
        if (criticId && CRITICS[criticId]) {
          let outcome = 'lose';
          let score = 0;

          if (isDraw) {
            outcome = 'draw';
            score = 0;
          } else if (pIdx === winnerIdx) {
            outcome = 'win';
            // 勝者の獲得点
            let gained = 0;
            ps.forEach((op, oi) => { if (oi !== winnerIdx) gained += GameLogic.calculateScore(op.hand); });
            score = gained;
          } else {
            outcome = 'lose';
            score = -GameLogic.calculateScore(p.hand);
          }

          const learnResult = AILearningSystem.learn(criticId, null, {
            outcome,
            score,
            opponents: ps.filter((_, i) => i !== pIdx).map(o => o.name),
            decisions: [] // 将来的に詳細な判断記録を追加
          });

          // AI発話（振り返り）- オートプレイ以外で表示
          if (AISpeechSystem.enabled && !autoPlayModeRef.current) {
            const changes = learnResult?.changes || [];
            const reflection = AISpeechSystem.getReflection(criticId, outcome, score, changes);
            if (reflection) addLog(reflection, 'ai-thought');

            // パラメータ変更があれば追加発話
            if (changes.length > 0 && outcome === 'lose') {
              const mainChange = changes[0];
              const paramSpeech = AISpeechSystem.speak(criticId, 'paramChange', mainChange);
              if (paramSpeech) addLog(paramSpeech, 'ai-thought');
            }
          }
        }
      }
    });

    setTimeout(() => {
      setVictoryAnimation(null);
      setGameState('gameOver');
    }, autoPlayModeRef.current ? 0 : victoryDuration);
  }, [addLog, animSettings.winEffect]);

  const startNextTurn = useCallback((fromIdx) => {
    if (gameEndedRef.current) return;
    const nextIdx = getNextActivePlayer(fromIdx);
    if (nextIdx === -1) {
      return;
    }

    // フル詳細ログ - ターンサマリー
    const currentTurn = turn;
    if (GameLogger.fullDetailMode) {
      const ps = playersRef.current;
      const dk = deckRef.current;
      const ph = phaseRef.current;
      const summary = GameLogger.getTurnSummary(currentTurn, ps, dk, ph);
      const danger = GameLogger.getDangerLocation(ps);
      GameLogger.full(`[T${currentTurn}] === Turn Summary ===`);
      GameLogger.full(`[T${currentTurn}]   hands: ${summary.hands}`);
      GameLogger.full(`[T${currentTurn}]   houses: ${summary.houses}`);
      GameLogger.full(`[T${currentTurn}]   deck: ${summary.deckCount} | phase: ${summary.phase}`);
      GameLogger.full(`[T${currentTurn}]   danger: 魔女=${danger.witch}, 聖母=${danger.holy}`);
    }

    // ターン数上限（100ターン）で膠着状態を検出して強制終了
    setTurn(prev => {
      const newTurn = prev + 1;
      // 異常検知: ターン数チェック
      AnomalyDetector.checkTurnCount(newTurn);
      // 異常検知: ターンログ記録
      AnomalyDetector.logTurn(`T${newTurn} [${phaseRef.current}] P${nextIdx}`);
      if (newTurn > 100) {
        // NotationLogger - 膠着警告
        NotationLogger.recordWarning(`turn_limit_exceeded (${newTurn})`);
        // 膠着状態：最低点プレイヤーを勝者とする（同点は引き分け）
        const ps = playersRef.current;
        const scores = ps.map((p, i) => {
          const score = p.hand.reduce((sum, c) => sum + (c.points || 0), 0);
          return { idx: i, score };
        });
        const minScore = Math.min(...scores.map(s => s.score));
        const minScorePlayers = scores.filter(s => s.score === minScore);

        if (minScorePlayers.length === 1) {
          // 単独最低点 → 勝者
          setTimeout(() => endGame(minScorePlayers[0].idx, 'stalemate'), 0);
        } else {
          // 同点 → 引き分け（勝者なし）
          setTimeout(() => endGame(-1, 'draw'), 0);
        }
        return prev;  // ターン数は増やさない
      }
      turnRef.current = newTurn; // fix: refも更新
      // NotationLogger - ターン設定
      NotationLogger.setTurn(newTurn, phaseRef.current);

      // v6.6.1統計: 風カード・屋台カードの枯渇チェック
      const ps = playersRef.current;
      const allHands = ps.flatMap(p => p.hand);
      // 全プレイヤーの手札に風カードがあるか
      const anyWindInHand = allHands.some(c => c.type === 'wind');
      // 全プレイヤーの手札に屋台カードがあるか
      const anyStallInHand = allHands.some(c => c.type === 'house');
      // 枯渇ターンを記録（まだ記録されていなければ）
      if (!anyWindInHand && gameStatsRef.current.windExhaustedTurn === null) {
        gameStatsRef.current.windExhaustedTurn = newTurn;
      }
      if (!anyStallInHand && gameStatsRef.current.stallExhaustedTurn === null) {
        gameStatsRef.current.stallExhaustedTurn = newTurn;
      }

      return newTurn;
    });

    setCurrentPlayerIndex(nextIdx);
    // ターンアクションStateをまとめてリセット
    resetTurnAction();
    // setTurnは上で既に実行済み
    if (isHumanPlayer(nextIdx)) {
      addLog(T.log.yourTurn, 'system');
      // ターン開始フラッシュ
      if (animSettings.screenFlash && !autoPlayModeRef.current) {
        setShowScreenFlash(true);
        setTimeout(() => setShowScreenFlash(false), 400);
      }
    }
    else {
      addLog(T.log.playerTurn(getPlayerName(nextIdx)), 'system');
      setTimeout(() => executeAiTurn(nextIdx), D * 100);
    }
  }, [addLog, D]);

  // 迷い箸演出（AIがババ抜きで引く時）
  const performHesitation = useCallback(async (aiIdx, finalTargetIdx, finalCardIdx, players) => {
    const t = getT();
    if (t.hesitationStep === 0) return; // オートプレイ時はスキップ

    hesitationSkipRef.current = false;

    // 有効なターゲット（自分以外で手札あり）
    const validTargets = players
      .map((p, i) => ({ idx: i, handLength: p.hand.length }))
      .filter(p => p.idx !== aiIdx && p.handLength > 0);

    if (validTargets.length === 0) return;

    // 迷い度の計算
    const totalCards = players.reduce((sum, p) => sum + p.hand.length, 0);
    const handLengths = validTargets.map(t => t.handLength);
    const maxHand = Math.max(...handLengths);
    const minHand = Math.min(...handLengths);
    const handVariance = maxHand - minHand;

    // 迷い度: 0.3〜1.0（手札差が小さい・終盤ほど高い）
    const endgameFactor = Math.max(0.3, 1 - totalCards / 30);
    const varianceFactor = Math.max(0.3, 1 - handVariance / 5);
    const hesitationLevel = Math.min(1.0, (endgameFactor + varianceFactor) / 2 + 0.2);

    // 全カード位置をフラット化（プレイヤー横断）
    const allCards = [];
    validTargets.forEach(target => {
      for (let i = 0; i < target.handLength; i++) {
        allCards.push({ playerIdx: target.idx, cardIdx: i });
      }
    });

    if (allCards.length === 0) return;

    // ヘルパー: ランダムな速度（0.5〜1.5倍の揺らぎ + たまに「止まる」）
    const getRandomDelay = (base) => {
      const pauseChance = Math.random();
      if (pauseChance < 0.1) {
        // 10%の確率で少し長く止まる（迷ってる感）
        return base * (1.5 + Math.random() * 1.0);
      } else if (pauseChance < 0.25) {
        // 15%の確率で速く通過
        return base * (0.4 + Math.random() * 0.3);
      }
      // 通常の揺らぎ
      return base * (0.6 + Math.random() * 0.8);
    };

    // ヘルパー: 部分範囲を生成（端まで行かないこともある）
    const getPartialRange = (cards, minCoverage = 0.5) => {
      if (cards.length <= 2) return { start: 0, end: cards.length - 1 };

      // 最低でもminCoverage分はカバーする
      const minCards = Math.max(2, Math.ceil(cards.length * minCoverage));
      const rangeSize = minCards + Math.floor(Math.random() * (cards.length - minCards + 1));

      // 開始位置をランダムに（ただし最終カードは含まれるように調整される可能性あり）
      const maxStart = cards.length - rangeSize;
      const start = Math.floor(Math.random() * (maxStart + 1));
      const end = start + rangeSize - 1;

      return { start, end };
    };

    // フェーズ1: 全体スキャン（揺らぎあり）
    const scanPasses = hesitationLevel > 0.6 ? (2 + Math.floor(Math.random() * 2)) : (1 + Math.floor(Math.random() * 2));

    for (let pass = 0; pass < scanPasses && !hesitationSkipRef.current; pass++) {
      // 毎回違う範囲をスキャン（端まで行かないことも）
      const { start, end } = getPartialRange(allCards, 0.4 + Math.random() * 0.3);
      const goingRight = pass % 2 === 0;

      if (goingRight) {
        for (let i = start; i <= end && !hesitationSkipRef.current; i++) {
          setHesitationState({ highlightedCards: [allCards[i]] });
          await delay(getRandomDelay(t.hesitationStep));
        }
      } else {
        for (let i = end; i >= start && !hesitationSkipRef.current; i--) {
          setHesitationState({ highlightedCards: [allCards[i]] });
          await delay(getRandomDelay(t.hesitationStep));
        }
      }

      // パス間で少し間を置くことも
      if (Math.random() < 0.3 && !hesitationSkipRef.current) {
        await delay(t.hesitationStep * (0.5 + Math.random() * 0.5));
      }
    }

    // フェーズ2: ターゲットプレイヤーに絞り込み
    if (!hesitationSkipRef.current && validTargets.length > 1) {
      const targetCards = allCards.filter(c => c.playerIdx === finalTargetIdx);
      const narrowPasses = hesitationLevel > 0.7 ? (2 + Math.floor(Math.random() * 2)) : (1 + Math.floor(Math.random() * 2));

      for (let pass = 0; pass < narrowPasses && !hesitationSkipRef.current; pass++) {
        const { start, end } = getPartialRange(targetCards, 0.5 + Math.random() * 0.3);
        const goingRight = pass % 2 === 0;

        if (goingRight) {
          for (let i = start; i <= end && !hesitationSkipRef.current; i++) {
            setHesitationState({ highlightedCards: [targetCards[i]] });
            await delay(getRandomDelay(t.hesitationStep * 1.1)); // 絞り込み時は少しゆっくり
          }
        } else {
          for (let i = end; i >= start && !hesitationSkipRef.current; i--) {
            setHesitationState({ highlightedCards: [targetCards[i]] });
            await delay(getRandomDelay(t.hesitationStep * 1.1));
          }
        }
      }
    }

    // フェーズ3: 最終カード付近でうろうろ（たまに）
    if (!hesitationSkipRef.current && Math.random() < 0.4) {
      const targetCards = allCards.filter(c => c.playerIdx === finalTargetIdx);
      const finalIdx = targetCards.findIndex(c => c.cardIdx === finalCardIdx);
      if (finalIdx >= 0 && targetCards.length > 1) {
        // 最終カードの前後を1〜2回行き来
        const wobbles = 1 + Math.floor(Math.random() * 2);
        for (let w = 0; w < wobbles && !hesitationSkipRef.current; w++) {
          const neighborIdx = finalIdx + (Math.random() < 0.5 ? -1 : 1);
          if (neighborIdx >= 0 && neighborIdx < targetCards.length) {
            setHesitationState({ highlightedCards: [targetCards[neighborIdx]] });
            await delay(getRandomDelay(t.hesitationStep * 0.8));
          }
          if (!hesitationSkipRef.current) {
            setHesitationState({ highlightedCards: [targetCards[finalIdx]] });
            await delay(getRandomDelay(t.hesitationStep * 0.8));
          }
        }
      }
    }

    // フェーズ4: 最終カードで停止
    if (!hesitationSkipRef.current) {
      setHesitationState({ highlightedCards: [{ playerIdx: finalTargetIdx, cardIdx: finalCardIdx }] });
      await delay(t.hesitationPause * (0.8 + Math.random() * 0.4));
    }

    // クリア
    setHesitationState(null);
    hesitationSkipRef.current = false;

  }, []);

  // AIターンを非同期に変更（ドローアニメーション対応）
  const executeAiTurn = useCallback(async (idx) => {
    if (gameEndedRef.current) return;
    const ps = playersRef.current;
    const dk = deckRef.current;
    const ph = phaseRef.current;
    const ai = ps[idx];
    if (!ai) return;
    let aiHand = [...ai.hand];
    const baseStrategy = ai.strategy || CRITICS.gelin.strategy;
    // AI個別戦略設定を取得（設定がなければデフォルト50%）
    const individualStrategy = ai.individualStrategy || { speculativeHouse: 50, speculativeWind: 50 };
    const strategyWithSpeculative = {
      ...baseStrategy,
      speculativeHouse: individualStrategy.speculativeHouse,
      speculativeWind: individualStrategy.speculativeWind
    };

    // 詳細ログ
    const hb = GameLogger.getHandBreakdown(aiHand);
    GameLogger.debug(`[executeAiTurn] Hand breakdown: 人物=${hb.chars}(${hb.charNames}), 家=${hb.houses}(${hb.houseNames}), 風=${hb.winds}(${hb.windNames})`);

    // フル詳細ログ - 選択肢の生成
    if (GameLogger.fullDetailMode) {
      const canUseWindNow = true;  // v6.4: 両フェーズで風カード使用可
      // 風カードのターゲットを簡易生成
      const windTargets = [];
      if (canUseWindNow) {
        ps.forEach((p, pIdx) => {
          if (pIdx !== idx) {
            p.houses.forEach((h, hIdx) => {
              windTargets.push(`P${pIdx}の${h.houseCard.name}`);
            });
          }
        });
      }
      const options = GameLogger.getOptions(ai, ph, canUseWindNow, windTargets);
      GameLogger.full(`[T${turnRef.current}] P${idx} options: [${options.slice(0, 5).join('] [')}]${options.length > 5 ? `... (${options.length}個)` : ''}`);
    }

    const t = getT();
    const skipAnim = !animSettings.dealingAnim || (autoPlayModeRef.current && !animSettings.autoPlayAnim);

    // --- Internal helper: AI draw phase (deck draw or babanuki draw + pair processing) ---
    // Returns updated aiHand, or null if game ended
    const executeAiDraw = async (idx, ai, aiHand, skipAnim) => {
      let handBeforeDraw = [...aiHand]; // ペア演出用
      let drawnCard = null; // 引いたカードを保存

      if (ph === PHASES.EXPLORATION && dk.length > 0) {
        const newDeck = [...dk];
        const card = newDeck.pop();
        drawnCard = card;

        // v2.0.5fix: アニメーション開始前にデッキを更新（2枚見える問題を修正）
        setDeck(newDeck); deckRef.current = newDeck;

        // 飛行カードアニメーション
        if (!skipAnim) {
          const handCount = aiHand.length;
          setFlyingCard({ card, target: 'hand', playerIdx: idx, phase: 'atDeck', handCount });
          await delay(20);
          setFlyingCard({ card, target: 'hand', playerIdx: idx, phase: 'toDrawZone', handCount });
          await delay(t.flyToDrawZone);
          setFlyingCard({ card, target: 'hand', playerIdx: idx, phase: 'inDrawZone', handCount });
          await delay(t.drawZoneWait);
          setFlyingCard({ card, target: 'hand', playerIdx: idx, phase: 'toHand', handCount });
          await delay(t.slideToHand);
          setFlyingCard(null);
        }

        // NotationLogger - 山札ドロー記録
        const isLast = newDeck.length === 0;
        NotationLogger.recordDeckDraw(idx, card, aiHand.length + 1, isLast);
        addLog(T.log.aiDrewFromDeck(ai.name));
        if (isLast) {
          setPhase(PHASES.BABANUKI);
          phaseRef.current = PHASES.BABANUKI;
          addLog(T.log.phaseToBabanuki, 'system');
          // v2.6.0: 相棒ナレーション - フェーズ移行
          CompanionNarrator.processEvent('phaseChange', {}, showCompanionHint);
          // フェーズ移行ターンを記録
          gameStatsRef.current.phaseTransitionTurn = turnRef.current;
          // フェーズ移行時に全プレイヤー状態を記録
          NotationLogger.recordTurnEndState(turnRef.current, ps, dk.length);
          // NotationLogger - フェーズ移行
          NotationLogger.recordPhaseHeader('babanuki');
          // フェーズ移行の詳細ログ
          GameLogger.debug(`[Phase] exploration → babanuki (deck exhausted)`);
          // フェーズ移行演出（バナー表示）
          await showBanner('babanuki', { showBackground: true, settingKey: 'phaseOverlay' });
        }
      } else if (ph === PHASES.BABANUKI) {
        // DrawRuleEngineを使用したドロー対象選択（戦略パラメータ対応）
        const handCounts = ps.map((p, i) => `P${i}:${p.hand.length}`).join(', ');

        // 学習システムから戦略を取得（キャラクターIDがある場合）
        const criticId = ai.criticId || ai.id;
        const learnedStrategy = criticId ? AILearningSystem.getStrategy(criticId) : baseStrategy;
        const drawStrategy = { ...baseStrategy, ...learnedStrategy };

        const target = DrawRuleEngine.selectTarget(idx, ps, drawStrategy);

        if (target) {
          const targetIdx = ps.findIndex(p => p.id === target.id);
          const cardIdx = DrawRuleEngine.selectCardIndex(target.hand, drawStrategy);
          const card = target.hand[cardIdx];

          // AI発話（ドロー先選択理由）+ 吹き出し表示
          if (AISpeechSystem.enabled && criticId) {
            const targets = DrawRuleEngine.getValidTargets(idx, ps);
            const reasonData = AISpeechSystem.getDrawTargetReason(drawStrategy, target, targets, ps);
            const speech = AISpeechSystem.speak(criticId, 'draw', reasonData);
            if (speech) {
              addLog(speech, 'ai-thought');
              showSpeechBubbleWithTyping(idx, speech, true, 500 + Math.random() * 300);  // 打ち込み演出付き
            }
          }

          // 迷い箸演出（ドロー実行前）
          if (!skipAnim) {
            await performHesitation(idx, targetIdx, cardIdx, ps);
          }


          // NotationLogger - プレイヤードロー記録
          NotationLogger.recordPlayerDraw(idx, targetIdx, card, cardIdx, aiHand.length + 1);
          NotationLogger.recordDrawDetail(idx, targetIdx, target.hand.length, cardIdx, CURRENT_DRAW_RULE);

          // 相手の手札から削除（先に削除）
          const newTargetHand = target.hand.filter((_, i) => i !== cardIdx);
          setHand(targetIdx, newTargetHand);

          // 飛行カードアニメーション（ババ抜き）
          if (!skipAnim) {
            const sourcePos = getPlayerCardPosition(targetIdx, cardIdx, target.hand.length);
            const handCount = aiHand.length;

            // 出発点: 引かれる側の手札位置
            setFlyingCard({ card, target: 'hand', playerIdx: idx, phase: 'atSource', handCount, sourceX: sourcePos.x, sourceY: sourcePos.y });
            await delay(20);

            // 引札ゾーンへ飛行
            setFlyingCard({ card, target: 'hand', playerIdx: idx, phase: 'toDrawZone', handCount, sourceX: sourcePos.x, sourceY: sourcePos.y });
            await delay(t.flyToDrawZone);

            // 引札ゾーンでウェイト（AIなので短め）
            setFlyingCard({ card, target: 'hand', playerIdx: idx, phase: 'inDrawZone', handCount });
            await delay(t.drawZoneWait);

            // 手札へスライド
            setFlyingCard({ card, target: 'hand', playerIdx: idx, phase: 'toHand', handCount });
            await delay(t.slideToHand);

            setFlyingCard(null);
          }

          // ターゲットが上がりチェック
          if (GameLogic.checkWin(newTargetHand)) {
            endGame(targetIdx, 'agari');
            return null;
          }
          drawnCard = card; // ペア演出用
          addLog(T.log.aiDrewFromPlayer(ai.name, getPlayerName(targetIdx)));

          // ドロー後のAIリアクション（配札より高確率）
          if (AISpeechSystem.enabled && !skipAnim) {
            const criticId = ai.criticId || ai.id;
            if (criticId) {
              // ペア判定（プレビュー）
              const tempHand = [...aiHand, card];
              const pairs = GameLogic.findPairs(tempHand);
              const hasPair = pairs.length > 0;

              const reactionData = AISpeechSystem.getDrawReaction(criticId, card, tempHand, hasPair);
              if (reactionData) {
                showSpeechBubbleWithTyping(idx, reactionData.message, false, 600 + Math.random() * 400);

                // 相棒の耳打ち（AIの発言を読み解くヒント）
                const companionReaction = COMPANION.getReactionToSpeech(reactionData.category, ai.name);
                if (companionReaction) {
                  // 少し遅れて表示
                  setTimeout(() => {
                    showCompanionHint(companionReaction);
                  }, 800 + Math.random() * 400);
                }
              }
            }
          }
        }
      }

      // ペア処理（v1.8.6.1: 演出付き）
      if (drawnCard) {
        const result = await processPairWithAnimation(drawnCard, handBeforeDraw, idx, skipAnim);
        aiHand = result.hand;
      } else {
        // ドローしなかった場合（通常は発生しない）
        aiHand = handBeforeDraw;
      }
      // 詳細ログ - 勝利判定前の手札状態
      const hbAfter = GameLogger.getHandBreakdown(aiHand);
      GameLogger.debug(`[executeAiTurn] After pair: 人物=${hbAfter.chars}(${hbAfter.charNames}), 家=${hbAfter.houses}(${hbAfter.houseNames}), 風=${hbAfter.winds}(${hbAfter.windNames})`);
      if (GameLogic.checkWin(aiHand)) {
        GameLogger.debug(`[executeAiTurn] WIN! Player ${idx} has 0 character cards (total hand=${aiHand.length}, winds=${hbAfter.winds}, houses=${hbAfter.houses})`);
        endGame(idx, 'agari');
        return null;
      }

      return aiHand;
    };

    // --- Internal helper: AI action phase (decision + execution) ---
    // Returns updated aiHand, or null if game ended
    const executeAiAction = async (idx, ai, aiHand, skipAnim) => {
      const currentPhase = phaseRef.current;
      const myHouses = playersRef.current[idx].houses;

      // v6.6.1: コンテキスト情報を渡す
      const aiContext = {
        deckRemaining: deckRef.current.length,
        usedWindCount: discardPoolRef.current.wind.length,
        market: marketRef.current
      };

      // 最善手を決定（v2.0.0: peekedHouses引数削除、v6.6.1: turn追加）
      // fix: turnRef.currentを使用（useCallbackの依存配列にturnがないため）
      const bestAction = CriticAI.decideBestAction(aiHand, myHouses, ps, idx, currentPhase, strategyWithSpeculative, turnRef.current, aiContext);

      // AI発話（アクション選択理由）+ 吹き出し表示
      if (AISpeechSystem.enabled && bestAction.type !== 'pass') {
        const criticId = ai.criticId || ai.id;
        if (criticId) {
          const evaluation = CriticAI.evaluateAction(bestAction, aiHand, myHouses, ps, idx, strategyWithSpeculative);
          const reasonData = AISpeechSystem.getActionReason(bestAction, evaluation, strategyWithSpeculative);
          const speech = AISpeechSystem.speak(criticId, 'action', reasonData);
          if (speech) {
            addLog(speech, 'ai-thought');
            showSpeechBubbleWithTyping(idx, speech, true, 400 + Math.random() * 300);  // 打ち込み演出付き
          }
        }
      }

      // アクション実行
      if (bestAction.type === 'steal') {
        // 強奪（2段階効果対応）- v6.6: カウンターシステム追加
        const { windCard, targetPlayer, targetHouse, storedCard, houseCard, willDegrade, willDestroy } = bestAction;
        const targetP = ps[targetPlayer];

        // v6.6: カウンター判定（防御者が風カードを持っているか）
        const defenderHand = playersRef.current[targetPlayer].hand;
        const defenderCanCounter = canCounter(defenderHand);

        let counterResult = { countered: false, counterWindCard: null };

        if (defenderCanCounter) {
          if (targetPlayer === 0 && !autoPlayModeRef.current) {
            // P0が防御者 → カウンターモーダル表示
            counterResult = await waitForP0CounterDecision(idx, storedCard);
            // モーダルが閉じるのを待つ
            setCounterMode(null);
            counterModeRef.current = null;
          } else {
            // AIが防御者 → AI判定
            const aiCounterResult = shouldAiCounter(targetPlayer, storedCard, defenderHand);
            counterResult = { countered: aiCounterResult.shouldCounter, counterWindCard: aiCounterResult.windCard };
          }
        }

        // カウンター機会をカウント（防御者が風カードを持っていた場合）
        if (defenderCanCounter) {
          gameStatsRef.current.counterAttempts++;
        }

        // カウンター発動時
        if (counterResult.countered && counterResult.counterWindCard) {
          // カウンター成功をカウント
          gameStatsRef.current.counterSuccess++;

          // 両方の風カードをプールへ
          addToDiscardPool('wind', windCard);
          addToDiscardPool('wind', counterResult.counterWindCard);

          // 攻撃者の手札から風カードを削除
          aiHand = aiHand.filter(c => c.uid !== windCard.uid);
          setHand(idx, aiHand);

          // 防御者の手札からカウンター風カードを削除
          const defenderNewHand = defenderHand.filter(c => c.uid !== counterResult.counterWindCard.uid);
          setHand(targetPlayer, defenderNewHand);
          playersRef.current[targetPlayer].hand = defenderNewHand;

          // ログ出力
          addLog(T.log.counterWind(targetP.name, ai.name), 'wind');
          GameLogger.full(`[T${turnRef.current}] P${targetPlayer} countered P${idx}'s wind attack!`);
          NotationLogger.recordCounter(idx, targetPlayer, windCard, counterResult.counterWindCard);

          // 統計更新（両方の風カード使用としてカウント）
          gameStatsRef.current.windUsed += 2;

          // カウンター成功 → 屋台は無傷、攻撃終了
          // アクションは使用済みとしてターン継続
          return aiHand;
        }

        // カウンターなし → 通常の強奪処理
        // 統計更新
        gameStatsRef.current.windUsed++;
        addToDiscardPool('wind', windCard);  // v6.5: 風カードをプールへ

        const windCardIdx = aiHand.findIndex(c => c.uid === windCard.uid);
        aiHand = aiHand.filter(c => c.uid !== windCard.uid);
        GameLogger.full(`[T${turnRef.current}] P${idx} decision: 風カード ${windCard.name} → P${targetPlayer}の${houseCard.name}(${storedCard.name})`);

        // 風カード飛行アニメーション（AI用 - ダイブ＆消滅）
        if (!skipAnim) {
          const t = getT();
          const housePos = getHousePosition(targetPlayer, targetHouse);

          // 手札から風カードを削除
          setHand(idx, aiHand);

          // AIの手札内の風カード位置を取得
          const oppHandPos = getPlayerCardPosition(idx, windCardIdx, ps[idx].hand.length);

          // 風カードを浮上位置から開始
          setFlyingCard({
            card: windCard,
            target: 'windAttack',
            playerIdx: idx,
            phase: 'atSource',
            sourceX: oppHandPos.x,
            sourceY: oppHandPos.y,
            houseX: housePos.x,
            houseY: housePos.houseY,
            forceFront: true
          });
          await delay(150);  // 浮かぶタメ（P0と統一）

          // 急降下（加速しながらターゲットへ）
          setFlyingCard(prev => prev ? { ...prev, phase: 'diving' } : null);
          await delay(450);  // ダイブ時間

          // 消滅（風だから）
          setFlyingCard(prev => prev ? { ...prev, phase: 'vanish' } : null);
          await delay(400);  // ディゾルブ消滅時間

          setFlyingCard(null);
        } else {
          setHand(idx, aiHand);
        }

        // v6.4: 1発破壊＆強奪
        gameStatsRef.current.destroyCount++;
        addToDiscardPool('house', houseCard);  // v6.5: 破壊された家をプールへ
        aiHand.push(storedCard);
        setHousesForPlayer(targetPlayer, prev => prev.filter((_, i) => i !== targetHouse));
        addLog(T.log.destroyedAndStole(ai.name, targetP.name, houseCard.name, storedCard.name), 'wind');
        // v2.6.0: 相棒ナレーション - 強奪
        CompanionNarrator.processEvent('attacked', {
          attackerName: ai.name, targetIdx: targetPlayer, targetName: targetP.name, cardName: storedCard.name,
        }, showCompanionHint);
        NotationLogger.recordWind(windCard, targetPlayer, { houseCard, storedCard }, 'destroy', storedCard);

        const stealResult = processPairsSync(aiHand, idx, { fireBanner: true });
        aiHand = stealResult.hand;
        if (GameLogic.checkWin(aiHand)) { endGame(idx, 'agari'); return null; }
        setHand(idx, aiHand);

      } else if (bestAction.type === 'stealEmptyStall') {
        // v6.6.1: 空屋台への風攻撃（屋台カード自体を奪う）
        const { windCard, targetPlayer, targetHouse, houseCard } = bestAction;
        const targetP = playersRef.current[targetPlayer];

        GameLogger.full(`[T${turnRef.current}] P${idx} decision: 風カード ${windCard.name} → P${targetPlayer}の空の${houseCard.name}`);

        // v6.6.1: カウンター判定（防御者が風カードを持っているか）
        const defenderHand = playersRef.current[targetPlayer].hand;
        const defenderCanCounter = canCounter(defenderHand);

        let counterResult = { countered: false, counterWindCard: null };

        if (defenderCanCounter) {
          // v6.6.1統計: 空屋台攻撃へのカウンター機会
          gameStatsRef.current.counterAttempts++;

          if (targetPlayer === 0 && !autoPlayModeRef.current) {
            // P0が防御者 → モーダル表示（空屋台攻撃であることを明示）
            counterResult = await waitForP0CounterDecision(idx, houseCard);
            // モーダルが閉じるのを待つ
            setCounterMode(null);
            counterModeRef.current = null;
          } else {
            // AIが防御者 → AI判定（空屋台用）
            counterResult = shouldAiCounterEmptyStall(targetPlayer, defenderHand);
          }
        }

        // 手札から風カードを削除
        const windIdx = aiHand.findIndex(c => c.uid === windCard.uid);
        if (windIdx >= 0) aiHand.splice(windIdx, 1);
        addToDiscardPool('wind', windCard);

        // カウンター発動時
        if (counterResult.countered && counterResult.counterWindCard) {
          // v6.6.1統計: カウンター成功
          gameStatsRef.current.counterSuccess++;
          addToDiscardPool('wind', counterResult.counterWindCard);

          // 防御側の風カードを手札から削除
          const defenderNewHand = defenderHand.filter(c => c.uid !== counterResult.counterWindCard.uid);
          setHand(targetPlayer, defenderNewHand);

          addLog(T.log.counterSuccess ? T.log.counterSuccess(targetP.name) : `${targetP.name}がカウンターした！`, 'wind');
          GameLogger.full(`[T${turnRef.current}] Counter: P${targetPlayer} countered with ${counterResult.counterWindCard.name}`);
          NotationLogger.recordCounter(idx, targetPlayer, windCard, counterResult.counterWindCard);

          // v2.6.0: 相棒ナレーション - カウンター成功
          CompanionNarrator.processEvent('counter', {
            attackerName: ai.name, defenderName: targetP.name,
          }, showCompanionHint);

          setHand(idx, aiHand);
        } else {
          // v6.6.1統計: 空屋台被攻撃
          gameStatsRef.current.emptyStallAttacked++;
          gameStatsRef.current.windUsed++;

          // 空屋台を削除して屋台カードを手札に追加
          setHousesForPlayer(targetPlayer, prev => prev.filter((_, i) => i !== targetHouse));
          aiHand.push(houseCard);

          addLog(`${ai.name}が${targetP.name}の空の${houseCard.name}を奪った！`, 'wind');
          NotationLogger.recordWind(windCard, targetPlayer, { houseCard, storedCard: null }, 'stealEmptyStall', houseCard);

          const stealResult = processPairsSync(aiHand, idx, { fireBanner: true });
          aiHand = stealResult.hand;
          if (GameLogic.checkWin(aiHand)) { endGame(idx, 'agari'); return null; }
          setHand(idx, aiHand);
        }

      } else if (bestAction.type === 'break') {
        // 屋台回収（v6.6.1: 屋台は場に残る）
        const { houseIdx, storedCard, houseCard } = bestAction;

        GameLogger.full(`[T${turnRef.current}] P${idx} decision: 屋台回収 → ${storedCard.name}を取り出し`);

        // v6.6.1統計: 空屋台作成
        gameStatsRef.current.emptyStallCreated++;

        // v6.6.1: 屋台を削除せず、空屋台として残す
        // fix: turnRef.currentを使用（useCallbackの依存配列にturnがないため）
        setHousesForPlayer(idx, prev => prev.map((h, i) =>
          i === houseIdx ? { ...h, storedCard: null, retrievedTurn: turnRef.current } : h
        ));
        addLog(T.log.destroyedOwnHouse(ai.name, houseCard.name, storedCard.name), 'action');
        // NotationLogger - 屋台回収
        NotationLogger.recordHouseRetrieve(houseCard, storedCard);

        aiHand.push(storedCard);
        const breakResult = processPairsSync(aiHand, idx, { fireBanner: true });
        aiHand = breakResult.hand;
        if (GameLogic.checkWin(aiHand)) { endGame(idx, 'agari'); return null; }
        setHand(idx, aiHand);

      } else if (bestAction.type === 'refillStall') {
        // v6.6.1: 空屋台への再格納
        const { houseIdx, houseCard, character } = bestAction;

        GameLogger.full(`[T${turnRef.current}] P${idx} decision: 空屋台再格納 ${character.name} → ${houseCard.name}`);

        // v6.6.1統計: 空屋台再格納
        gameStatsRef.current.emptyStallRefilled++;

        // 手札からキャラカードを削除
        const charIdx = aiHand.findIndex(c => c.uid === character.uid);
        if (charIdx >= 0) aiHand.splice(charIdx, 1);

        // 市場交換処理
        const currentMarket = marketRef.current;
        if (HOUSE_PROPERTIES[houseCard.id]?.marketExchange && currentMarket.length > 0) {
          const selectedMarketCard = selectBestMarketCard(currentMarket, { hand: aiHand });
          if (selectedMarketCard) {
            // 市場交換実行
            const newMarket = [...currentMarket, character].filter(c => c.uid !== selectedMarketCard.uid);
            marketRef.current = newMarket;
            setMarket(newMarket);

            // 屋台に格納
            setHousesForPlayer(idx, prev => prev.map((h, i) =>
              i === houseIdx ? { ...h, storedCard: selectedMarketCard, retrievedTurn: null } : h
            ));

            addLog(T.log.sentToMarket(ai.name, character.name, selectedMarketCard.name), 'action');
            GameLogger.full(`[T${turnRef.current}] P${idx} refill stall exchange: ${character.name} → market, ${selectedMarketCard.name} → stall`);
            NotationLogger.recordRefillStall(houseCard, selectedMarketCard, true, { sent: character, got: selectedMarketCard });
          } else {
            // 市場選択できない場合は直接格納
            setHousesForPlayer(idx, prev => prev.map((h, i) =>
              i === houseIdx ? { ...h, storedCard: character, retrievedTurn: null } : h
            ));
            addLog(T.log.storedInHouse(ai.name, houseCard.name), 'action');
            NotationLogger.recordRefillStall(houseCard, character, false);
          }
        } else {
          // 市場なし: 直接格納
          setHousesForPlayer(idx, prev => prev.map((h, i) =>
            i === houseIdx ? { ...h, storedCard: character, retrievedTurn: null } : h
          ));
          addLog(T.log.storedInHouse(ai.name, houseCard.name), 'action');
          NotationLogger.recordRefillStall(houseCard, character, false);
        }

        setHand(idx, aiHand);
        if (GameLogic.checkWin(aiHand)) { endGame(idx, 'agari'); return null; }

      } else if (bestAction.type === 'house') {
        // 家格納
        const { houseCard, character } = bestAction;

        GameLogger.full(`[T${turnRef.current}] P${idx} decision: 家格納 ${character.name} → ${houseCard.name}`);

        let newHand = [...aiHand];
        const hIdx = newHand.findIndex(c => c && c.uid === houseCard.uid);
        const cIdx = newHand.findIndex(c => c && c.uid === character.uid);
        if (hIdx >= 0 && cIdx >= 0) {
          [hIdx, cIdx].sort((a, b) => b - a).forEach(i => newHand.splice(i, 1));

          // v6.4: 家配置時は市場交換
          // 重要: 連続AI処理のため、marketRef.currentを使用（State更新の非同期問題回避）
          const currentMarket = marketRef.current;
          if (HOUSE_PROPERTIES[houseCard.id]?.marketExchange && currentMarket.length > 0) {
            // 統計更新（家配置＆市場交換）
            gameStatsRef.current.housePlaced++;
            gameStatsRef.current.marketExchanges++;
            // 市場から最適カードを選択（v6.5: ペア相方優先）
            const selectedMarketCard = selectBestMarketCard(currentMarket, { hand: aiHand });
            if (selectedMarketCard) {
              // 屋台配置アニメーション（AI用）- 正しい交換演出
              if (!skipAnim) {
                const t = getT();

                // 手札から削除
                setHand(idx, newHand);

                // 屋台を場に配置（人物カードを一時的に格納）
                const newHouseIdx = playersRef.current[idx].houses.length;
                setHousesForPlayer(idx, prev => [...prev, { houseCard, storedCard: character, retrievedTurn: null }]);
                await delay(100);

                // 交換アニメーション
                const marketIdx = currentMarket.findIndex(c => c.uid === selectedMarketCard.uid);
                const marketCardPos = getMarketCardPosition(marketIdx);
                const stallPos = getHousePosition(idx, newHouseIdx);

                // 屋台の中身を一時的に非表示
                setHousesForPlayer(idx, prev => prev.map((h, i) => {
                  if (i === newHouseIdx) {
                    return { ...h, storedCard: null };
                  }
                  return h;
                }));

                // 両方のカードを同時に飛行
                setFlyingCard({
                  card: selectedMarketCard,
                  target: 'stallExchange',
                  playerIdx: idx,
                  phase: 'exchange',
                  sourceX: marketCardPos.x,
                  sourceY: marketCardPos.y,
                  stallX: stallPos.x,
                  stallY: stallPos.y,  // getHousePositionで既に人物カード位置を返している
                  forceFront: true,
                  exchangeCard: character,
                  exchangeFromX: stallPos.x,
                  exchangeFromY: stallPos.y,  // 同上
                  exchangeToX: marketCardPos.x,
                  exchangeToY: marketCardPos.y
                });
                await delay(150);  // 浮かぶタメ（P0と統一）

                // 市場から除外
                const tempMarket = currentMarket.filter(c => c.uid !== selectedMarketCard.uid);
                marketRef.current = tempMarket;
                setMarket(tempMarket);

                // 飛行開始
                setFlyingCard(prev => prev ? { ...prev, phase: 'exchangeFlying' } : null);
                await delay(350);  // 飛行時間（P0と統一）

                setFlyingCard(null);

                // 市場に人物カードを追加
                const finalMarket = [...tempMarket, character];
                marketRef.current = finalMarket;
                setMarket(finalMarket);

                // v6.4: 家に格納
                setHousesForPlayer(idx, prev => prev.map((h, i) => {
                  if (i === newHouseIdx && HOUSE_PROPERTIES[h.houseCard.id]?.marketExchange) {
                    return { ...h, storedCard: selectedMarketCard };
                  }
                  return h;
                }));
              } else {
                // アニメーションなし
                const newMarket = [...currentMarket, character].filter(c => c.uid !== selectedMarketCard.uid);
                marketRef.current = newMarket;
                setMarket(newMarket);
                setHousesForPlayer(idx, prev => [...prev, { houseCard, storedCard: selectedMarketCard, retrievedTurn: null }]);
                setHand(idx, newHand);
              }

              addLog(T.log.sentToMarket(ai.name, character.name, selectedMarketCard.name), 'action');
              GameLogger.full(`[T${turnRef.current}] P${idx} stall exchange: ${character.name} → market, ${selectedMarketCard.name} → stall`);
              // NotationLogger - 屋台配置＆市場交換
              NotationLogger.recordHousePlace(houseCard, selectedMarketCard, true, { sent: character, got: selectedMarketCard });
            } else {
              // 市場が空の場合は通常の家として配置
              setHousesForPlayer(idx, prev => [...prev, { houseCard, storedCard: character, retrievedTurn: null }]);
              setHand(idx, newHand);
              addLog(T.log.storedInHouse(ai.name, houseCard.name));
              // NotationLogger - 屋台配置（市場空）
              NotationLogger.recordHousePlace(houseCard, character, true, null);
            }
          } else {
            // 統計更新（家配置）
            gameStatsRef.current.housePlaced++;

            // 通常の家配置（アニメーション分岐統合済み）
            setHand(idx, newHand);

            if (!skipAnim) {
              const t = getT();

              // 新しい家の位置を取得
              const newHouseIdx = playersRef.current[idx].houses.length;
              const housePos = getHousePosition(idx, newHouseIdx);

              // 手札内のカード位置を取得（人物カード）
              const oppHandPos = getPlayerCardPosition(idx, cIdx, aiHand.length);

              // 人物カードを家の位置へ飛行
              setFlyingCard({
                card: character,
                target: 'housePlace',
                playerIdx: idx,
                phase: 'atSource',
                sourceX: oppHandPos.x,
                sourceY: oppHandPos.y,
                houseX: housePos.x,
                houseY: housePos.y + UNIT.toPixelY(2),
                forceFront: true
              });
              await delay(150);  // 浮かぶタメ（屋台と統一）

              setFlyingCard(prev => prev ? { ...prev, phase: 'toHouse' } : null);
              await delay(350);  // 飛行時間（屋台と統一）

              setFlyingCard(null);
            }

            // 共通ゲームロジック
            setHousesForPlayer(idx, prev => [...prev, { houseCard, storedCard: character, retrievedTurn: null }]);
            addLog(T.log.storedInHouse(ai.name, houseCard.name));
            // v2.6.0: 相棒ナレーション - AI家格納（高得点のみ発言）
            CompanionNarrator.processEvent('stored', {
              playerIdx: idx, playerName: ai.name, cardName: character.name, cardScore: character.score || 0,
            }, showCompanionHint);
            // NotationLogger - 家配置
            NotationLogger.recordHousePlace(houseCard, character, false, null);
          }

          aiHand = newHand; // house action updates hand via newHand
          if (GameLogic.checkWin(aiHand)) { endGame(idx, 'agari'); return null; }
        }
      }
      // else: bestAction.type === 'pass' → 何もしない

      return aiHand;
    };

    // Draw phase
    aiHand = await executeAiDraw(idx, ai, aiHand, skipAnim);
    if (aiHand === null) return; // Game ended during draw

    // Action phase
    aiHand = await executeAiAction(idx, ai, aiHand, skipAnim);
    if (aiHand === null) return; // Game ended during action

    // Turn end - NotationLogger記録を確定
    const finalHand = playersRef.current[idx]?.hand ?? [];
    const isWin = GameLogic.checkWin(finalHand);
    NotationLogger.finishLine(finalHand.length, isWin, false);

    // 次のターンへ
    setTimeout(() => startNextTurn(idx), D * 50);
  }, [addLog, endGame, D, startNextTurn, setHand, setHousesForPlayer, animSettings.dealingAnim, animSettings.phaseOverlay, market, selectBestMarketCard, showSpeechBubble, showSpeechBubbleWithTyping]);

  // 山札ドローアニメーション付き
  const handleDraw = useCallback(async () => {
    // 配札中は無効化（refを使用してstate遅延を回避）
    if (dealingPhaseRef.current !== 'ready') return;
    if (hasDrawn || currentPlayerIndexRef.current !== 0 || isProcessing || gameEndedRef.current) return;
    if (phaseRef.current !== PHASES.EXPLORATION || deckRef.current.length === 0) return;
    setIsProcessing(true);

    const t = getT();
    const skipAnim = !animSettings.dealingAnim || (autoPlayModeRef.current && !animSettings.autoPlayAnim);
    const newDeck = [...deckRef.current]; const card = newDeck.pop();  // deckRef使用

    // NotationLogger - 山札ドロー記録
    const isLast = newDeck.length === 0;
    NotationLogger.recordDeckDraw(0, card, playersRef.current[0].hand.length + 1, isLast);

    // デッキ更新
    setDeck(newDeck); deckRef.current = newDeck;

    // 引く前の手札を保存（ペア演出用）
    const handBeforeDraw = [...playersRef.current[0].hand];

    if (!skipAnim) {
      // 飛行カードアニメーション（配札と同じ）
      const handCount = playersRef.current[0].hand.length;  // playersRef使用

      // Phase 0: 山札位置に出現（裏向き）
      setFlyingCard({ card, target: 'hand', playerIdx: 0, phase: 'atDeck', handCount, flipped: false });
      await delay(20);

      // Phase 1: 山札 → 引札ゾーンへ飛行（裏向きのまま）
      setFlyingCard({ card, target: 'hand', playerIdx: 0, phase: 'toDrawZone', handCount, flipped: false });
      await delay(t.flyToDrawZone);

      // 引札ゾーンで反転アニメーション
      setFlyingCard({ card, target: 'hand', playerIdx: 0, phase: 'inDrawZone', handCount, flipped: false });
      await delay(t.flipPre);
      setFlyingCard(prev => prev ? { ...prev, flipped: true } : null);
      await delay(t.flipAnim);
      await delay(t.flipPost);

      // Phase 3: 引札ゾーン → 手札へスライド（表向き）
      setFlyingCard({ card, target: 'hand', playerIdx: 0, phase: 'toHand', handCount, flipped: true });
      await delay(t.slideToHand);

      setFlyingCard(null);
    }

    addLog(T.log.drewFromDeck(playerName, card.name));
    setHasDrawn(true);

    if (newDeck.length === 0) {
      setPhase(PHASES.BABANUKI);
      phaseRef.current = PHASES.BABANUKI;
      addLog(T.log.phaseToBabanuki, 'system');
      // v2.6.0: 相棒ナレーション - フェーズ移行
      CompanionNarrator.processEvent('phaseChange', {}, showCompanionHint);
      // フェーズ移行ターンを記録
      gameStatsRef.current.phaseTransitionTurn = turnRef.current;
      // フェーズ移行の詳細ログ
      GameLogger.debug(`[Phase] exploration → babanuki (deck exhausted)`);
      // フェーズ移行時に全プレイヤー状態を記録
      NotationLogger.recordTurnEndState(turnRef.current, playersRef.current, 0);
      // NotationLogger - フェーズヘッダー
      NotationLogger.recordPhaseHeader('babanuki');
      // フェーズ移行演出（バナー表示 — P0ドローはawaitしない、ペア演出と並行）
      showBanner('babanuki', { showBackground: true, settingKey: 'phaseOverlay' });
    }

    // ペア演出付きペア処理
    const result = await processPairWithAnimation(card, handBeforeDraw, 0, skipAnim);
    
    // 相棒の引札評価（P0用・探索フェーズ）
    if (!autoPlayModeRef.current) {
      const evaluation = COMPANION.evaluateDraw(card, result.hadPair);
      if (evaluation) {
        setTimeout(() => showCompanionHint(evaluation), 300);
      }
    }
    

    if (GameLogic.checkWin(result.hand)) { endGame(0, 'agari'); return; }
    setIsProcessing(false);
  }, [dealingPhase, hasDrawn, phase, deck, currentPlayerIndex, players, playerName, addLog, isProcessing, gameEnded, endGame, animSettings.dealingAnim, animSettings.phaseOverlay, animSettings.pairEffect, showCompanionHint]);

  // ババ抜きフェーズでのカードドロー（アニメーション対応）
  const handleDrawFromPlayer = useCallback(async (targetIdx, cardIndex) => {
    // 配札中は無効化（v1.8.5.0: refを使用）
    if (dealingPhaseRef.current !== 'ready') return;
    if (hasDrawn || phase !== PHASES.BABANUKI || currentPlayerIndex !== 0 || isProcessing || gameEnded) return;
    const target = players[targetIdx];
    if (!target || target.hand.length === 0) return;
    setIsProcessing(true);

    // クリックされたカードを使用（インデックスが指定されていればそれを、なければランダム）
    const idx = cardIndex !== undefined ? cardIndex : Math.floor(Math.random() * target.hand.length);
    const card = target.hand[idx];

    // NotationLogger - プレイヤードロー記録
    NotationLogger.recordPlayerDraw(0, targetIdx, card, idx, playersRef.current[0].hand.length + 1);
    NotationLogger.recordDrawDetail(0, targetIdx, target.hand.length, idx, 'click');

    const t = getT();
    const skipAnim = !animSettings.dealingAnim || (autoPlayModeRef.current && !animSettings.autoPlayAnim);

    // 引く前の手札を保存（ペア演出用）
    const handBeforeDraw = [...players[0].hand];

    // 相手の手札から削除（先に削除してアニメーション中に表示されないように）
    const newTargetHand = target.hand.filter((_, i) => i !== idx);
    setHand(targetIdx, newTargetHand);

    // 飛行カードアニメーション
    // 動的pitch計算対応
    if (!skipAnim) {
      const handCount = players[0].hand.length;
      // 相手の手札位置を計算（動的pitch使用）
      const sourcePos = getPlayerCardPosition(targetIdx, idx, target.hand.length);
      const cardX = sourcePos.x;
      const cardY = sourcePos.y;

      // 出発点: 相手の手札位置（裏向き）
      setFlyingCard({ card, target: 'hand', playerIdx: 0, phase: 'atSource', handCount, sourceX: cardX, sourceY: cardY, flipped: false });
      await delay(20);

      // 引札ゾーンへ飛行（裏向きのまま）
      setFlyingCard({ card, target: 'hand', playerIdx: 0, phase: 'toDrawZone', handCount, sourceX: cardX, sourceY: cardY, flipped: false });
      await delay(t.flyToDrawZone);

      // 引札ゾーンで反転アニメーション
      setFlyingCard({ card, target: 'hand', playerIdx: 0, phase: 'inDrawZone', handCount, sourceX: cardX, flipped: false });
      await delay(t.flipPre);
      setFlyingCard(prev => prev ? { ...prev, flipped: true } : null);
      await delay(t.flipAnim);
      await delay(t.flipPost);

      // 手札へスライド（表向き）
      setFlyingCard({ card, target: 'hand', playerIdx: 0, phase: 'toHand', handCount, flipped: true });
      await delay(t.slideToHand);

      setFlyingCard(null);
    }

    // ターゲットが上がりチェック
    if (GameLogic.checkWin(newTargetHand)) {
      endGame(targetIdx, 'agari');
      return;
    }

    addLog(T.log.drewFromPlayer(playerName, target.name, card.name));
    setHasDrawn(true);

    // ペア演出付きペア処理
    const result = await processPairWithAnimation(card, handBeforeDraw, 0, skipAnim);
    
    // 相棒の引札評価（P0用）
    if (!autoPlayModeRef.current) {
      const evaluation = COMPANION.evaluateDraw(card, result.hadPair);
      if (evaluation) {
        setTimeout(() => showCompanionHint(evaluation), 300);
      }
    }
    

    if (GameLogic.checkWin(result.hand)) { endGame(0, 'agari'); return; }
    setIsProcessing(false);
  }, [dealingPhase, hasDrawn, phase, currentPlayerIndex, players, playerName, addLog, isProcessing, gameEnded, endGame, animSettings.dealingAnim, animSettings.pairEffect, showCompanionHint]);

  // async化（屋台アニメーション対応）
  const handleCardClick = useCallback(async (card) => {
    // 配札中は無効化（v1.8.5.0: refを使用）
    if (dealingPhaseRef.current !== 'ready') return;
    if (currentPlayerIndex !== 0 || !hasDrawn || isProcessing || gameEnded) return;

    // 風カードターゲットモード中は手札クリックを無視
    if (windTargetMode) return;

    // v6.6.1: 再格納モード中の処理
    if (refillMode) {
      if (card.type === 'character') {
        await handleRefillWithCard(card);
      }
      return;
    }

    if (actionMode === 'house' && selectedCard?.type === 'house') {
      if (card.type === 'character') {
        const hc = selectedCard;

        // v6.6.1: 屋台は最大3軒まで
        const MAX_STALLS = 3;
        if (players[0].houses.length >= MAX_STALLS) {
          showCompanionHint(T.companion?.stallLimitReached || '屋台は3軒までしか置けないよ！');
          setSelectedCard(null);
          setActionMode(null);
          return;
        }

        // v6.4: 家配置時は市場交換モードへ
        if (HOUSE_PROPERTIES[hc.id]?.marketExchange && market.length > 0) {
          const skipAnim = !animSettings.dealingAnim;
          const newHouseIdx = players[0].houses.length;

          if (!skipAnim) {
            // 屋台配置アニメーション（2枚同時飛行）

            // 手札内のカード位置を取得 - getPlayerCardPositionを使用
            const hcIdx = players[0].hand.findIndex(c => c.uid === hc.uid);
            const cardIdx = players[0].hand.findIndex(c => c.uid === card.uid);
            const hcPos = getPlayerCardPosition(0, hcIdx, players[0].hand.length);
            const cardPos = getPlayerCardPosition(0, cardIdx, players[0].hand.length);

            // 新しい家の位置を取得
            const housePos = getHousePosition(0, newHouseIdx);

            // 手札から屋台と人物カードを除外（アニメーション前に非表示）
            let newHand = players[0].hand.filter(c => c.uid !== hc.uid && c.uid !== card.uid);
            setHand(0, newHand);

            // 2枚同時飛行アニメーション開始
            setFlyingCard({
              card: hc,  // 屋台カード（1枚目）
              target: 'stallPlace',
              playerIdx: 0,
              phase: 'atSource',
              sourceX: hcPos.x,
              sourceY: hcPos.y,
              houseX: housePos.x,
              houseY: housePos.houseY,  // 家カード位置（上段）
              forceFront: true,
              // 2枚目：人物カード
              personCard: card,
              personFromX: cardPos.x,
              personFromY: cardPos.y,
              personToX: housePos.x,
              personToY: housePos.houseY + UNIT.toPixelY(2)  // 人物カード位置（下段）
            });
            await delay(150);  // 浮かぶタメ

            // 飛行開始
            setFlyingCard(prev => prev ? { ...prev, phase: 'toHouse' } : null);
            await delay(350);  // 飛行時間

            setFlyingCard(null);

            // 屋台を場に配置
            setHousesForPlayer(0, prev => [...prev, {
              houseCard: hc,
              storedCard: card  // 一時的に人物カードを格納
            }]);
          } else {
            // アニメーションなし
            let newHand = players[0].hand.filter(c => c.uid !== hc.uid && c.uid !== card.uid);
            setHand(0, newHand);

            // 屋台を場に配置
            setHousesForPlayer(0, prev => [...prev, {
              houseCard: hc,
              storedCard: card
            }]);
          }

          // 市場選択モードを開始
          setMarketSelectMode({ stallCard: hc, characterCard: card, playerIdx: 0, stallHouseIdx: newHouseIdx });
          setSelectedCard(null);
          setActionMode(null);
          addLog(T.log.selectFromMarket(playerName), 'system');
          return;
        }

        // 家配置（アニメーション分岐統合済み）
        const skipAnim = !animSettings.dealingAnim;
        let newHand = players[0].hand.filter(c => c.uid !== hc.uid && c.uid !== card.uid);
        setHand(0, newHand);

        if (!skipAnim) {
          const t = getT();
          // 新しい家の位置を取得
          const newHouseIdx = players[0].houses.length;
          const housePos = getHousePosition(0, newHouseIdx);

          // 手札内のカード位置を取得（人物カード）- getPlayerCardPositionを使用
          const cardIdx = players[0].hand.findIndex(c => c.uid === card.uid);
          const cardPos = getPlayerCardPosition(0, cardIdx, players[0].hand.length);

          // 人物カードを家の位置へ飛行
          setFlyingCard({
            card: card,
            target: 'housePlace',
            playerIdx: 0,
            phase: 'atSource',
            sourceX: cardPos.x,
            sourceY: cardPos.y,
            houseX: housePos.x,
            houseY: housePos.y + UNIT.toPixelY(2),  // 人物カード位置
            forceFront: true
          });
          await delay(150);  // 浮かぶタメ（屋台と統一）

          setFlyingCard(prev => prev ? { ...prev, phase: 'toHouse' } : null);
          await delay(350);  // 飛行時間（屋台と統一）

          setFlyingCard(null);
        }

        // 共通ゲームロジック
        setHousesForPlayer(0, prev => [...prev, { houseCard: hc, storedCard: card, retrievedTurn: null }]);
        addLog(T.log.storedInHouse(playerName, hc.name));
        // v2.6.0: 相棒ナレーション - 家に格納
        CompanionNarrator.processEvent('stored', {
          playerIdx: 0, playerName, cardName: card.name, cardScore: card.score || 0,
        }, showCompanionHint);
        // NotationLogger - 家配置
        NotationLogger.recordHousePlace(hc, card, false, null);
        setSelectedCard(null); setActionMode(null); setHasActioned(true);
        if (GameLogic.checkWin(newHand)) { endGame(0, 'agari'); }
        return;
      } else { setSelectedCard(null); setActionMode(null); return; }
    }

    // 風カード選択時
    // v6.4: フェーズ制限廃止（探索・ババ抜き両方で使用可）
    // 風カード処理（Ghibli のみ、アクション消費あり）
    if (card.type === 'wind') {
      // アクション消費チェック（peek廃止なので常にチェック）
      if (hasActioned) {
        // 相棒が教える
        const alerts = T.ui.companion.strategicAdvice?.alerts;
        showCompanionHint(alerts?.alreadyActioned || T.log.alreadyActioned);
        return;
      }
      if (selectedCard?.uid === card.uid) {
        // 同じカードを再クリックで選択解除
        // dispatchTurnActionを使用
        dispatchTurnAction({ type: 'CANCEL_WIND' });
        setWindCardFloating(null);  // 浮上演出解除
      } else {
        // 風カード浮上演出開始
        const cardIdx = players[0].hand.findIndex(c => c.uid === card.uid);
        setWindCardFloating({ cardIdx, handCount: players[0].hand.length, phase: 'rising' });
        // 浮上完了後にhovering状態へ
        setTimeout(() => {

  }, [dealingPhase, currentPlayerIndex, hasDrawn, selectedCard, actionMode, players, playerName, addLog, isProcessing, gameEnded, endGame, setHand, setHousesForPlayer, windTargetMode, hasActioned, showCompanionHint, refillMode, handleRefillWithCard]);

      setHand(0, myHand);

      const windCardPos = getPlayerCardPosition(0, windCardIdx, players[0].hand.length);

      setHousesForPlayer(targetPlayerIdx, prev => prev.filter((_, i) => i !== targetHouseIdx));

  }, [selectedWindCard, windTargetMode, players, playerName, addLog, endGame, processPairsSync, processPairWithAnimation, setHand, setHousesForPlayer, getHousePosition, animSettings.autoPlayAnim]);

    gameStatsRef.current.emptyStallCreated++;

    const findTarget = () => {

      if (bestTarget === -1) {

          const p0Context = {

            usedWindCount: discardPoolRef.current.wind.length,

          };

          // P0はCRITICSと同じ形式のデフォルト戦略を使用（v6.6.1: turn追加）
          const bestAction = CriticAI.decideBestAction(pH, myHouses, ps, 0, phase, P0_DEFAULT_STRATEGY, turn, p0Context);

          // フル詳細ログ - 選択肢と決定
          if (GameLogger.fullDetailMode) {
            const canUseWindNow = true;  // v6.4: 両フェーズで風カード使用可
            const windTargets = [];
            if (canUseWindNow) {
              ps.forEach((p, pIdx) => {
                if (pIdx !== 0) {

            const options = GameLogger.getOptions(ps[0], phase, canUseWindNow, windTargets);
            GameLogger.full(`[T${turn}] P0 options: [${options.slice(0, 5).join('] [')}]${options.length > 5 ? `... (${options.length}個)` : ''}`);
          }

          // v6.4: steal のみ、1発破壊
          if (bestAction.type === 'steal') {
            const { windCard, targetPlayer, targetHouse, storedCard, houseCard } = bestAction;
            const targetP = ps[targetPlayer];

            GameLogger.full(`[T${turn}] P0 decision: 風カード ${windCard.name} → P${targetPlayer}の${houseCard.name}(${storedCard.name})`);

            let newHand = pH.filter(c => c.uid !== windCard.uid);

            setHousesForPlayer(targetPlayer, prev => prev.filter((_, i) => i !== targetHouse));
            addLog(T.log.destroyedAndStole(playerName, targetP.name, houseCard.name, storedCard.name), 'wind');
            const stealResult = processPairsSync(newHand, 0, { fireBanner: true });

            newHand = stealResult.hand;
            if (GameLogic.checkWin(newHand)) { endGame(0, 'agari'); return; }
            setHand(0, newHand);
            setHasActioned(true);
            handleEndTurn();
            return;

          } else if (bestAction.type === 'break') {
            const { houseIdx, storedCard, houseCard } = bestAction;

            GameLogger.full(`[T${turn}] P0 decision: 屋台回収 → ${storedCard.name}を取り出し`);

            // v6.6.1: 屋台を削除せず、空屋台として残す
            setHousesForPlayer(0, prev => prev.map((h, i) =>
              i === houseIdx ? { ...h, storedCard: null, retrievedTurn: turn } : h
            ));
            addLog(T.log.destroyedOwnHouse(playerName, houseCard.name, storedCard.name), 'action');

            let newHand = [...pH, storedCard];
            const result = processPairsSync(newHand, 0, { fireBanner: true });

            newHand = result.hand;
            if (GameLogic.checkWin(newHand)) { endGame(0, 'agari'); return; }
            setHand(0, newHand);
            setHasActioned(true);
            handleEndTurn();
            return;

          } else if (bestAction.type === 'house') {
            const { houseCard, character } = bestAction;

            GameLogger.full(`[T${turn}] P0 decision: 家格納 ${character.name} → ${houseCard.name}`);
            let newHand = players[0].hand.filter(c => c.uid !== houseCard.uid && c.uid !== character.uid);
            setHand(0, newHand);

            // v6.4: 家配置時は市場交換
            // 重要: marketRef.currentを使用（State更新の非同期問題回避）
            const currentMarket = marketRef.current;
            if (HOUSE_PROPERTIES[houseCard.id]?.marketExchange && currentMarket.length > 0) {
              const selectedMarketCard = selectBestMarketCard(currentMarket, { hand: players[0].hand });
              if (selectedMarketCard) {
                const newMarket = [...currentMarket, character].filter(c => c.uid !== selectedMarketCard.uid);
                marketRef.current = newMarket;  // 即座にref更新
                setMarket(newMarket);
                setHousesForPlayer(0, prev => [...prev, { houseCard, storedCard: selectedMarketCard, retrievedTurn: null }]);
                addLog(T.log.sentToMarket(playerName, character.name, selectedMarketCard.name), 'action');
                GameLogger.full(`[T${turn}] P0 stall exchange: ${character.name} → market, ${selectedMarketCard.name} → stall`);
              } else {
                setHousesForPlayer(0, prev => [...prev, { houseCard, storedCard: character, retrievedTurn: null }]);
                addLog(T.log.storedInHouse(playerName, houseCard.name));
              }
            } else {
              setHousesForPlayer(0, prev => [...prev, { houseCard, storedCard: character, retrievedTurn: null }]);
              addLog(T.log.storedInHouse(playerName, houseCard.name));
            }

            setHasActioned(true);
            if (GameLogic.checkWin(newHand)) { endGame(0, 'agari'); return; }
          }
          // else: bestAction.type === 'pass' → 何もしない

          handleEndTurn();
        } else { handleEndTurn(); }
      }
    }, 0);  // ディレイ0
    return () => clearTimeout(timer);
  }, [autoPlayMode, gameState, currentPlayerIndex, hasDrawn, hasActioned, phase, players, deck, effect, isProcessing, gameEnded, market, selectBestMarketCard]);

  // Auto continue - v1.8.0.5fix: useRefで重複防止
  useEffect(() => {
    if (!autoPlayMode) { autoPlayingRef.current = false; return; }

    // トーナメントモード
    if (tournamentMode) {
      // refを使って終了判定（非同期問題対策）
      if (tournamentCurrentRef.current >= tournamentProgress.total && tournamentProgress.total > 0) {
        // トーナメント終了
        setAutoPlayMode(false);
        setTournamentMode(false);
        tournamentModeRef.current = false; // fix: refも更新
        if (tournamentDataRef.current) {
          outputTournamentResults(tournamentDataRef.current);
          // NotationLogger - トーナメント終了サマリーを記録
          NotationLogger.recordTournamentEnd(tournamentDataRef.current);
          // トーナメントログ出力（summary.txt + 異常があれば anomalies.txt）
          NotationLogger.downloadTournamentLogs();
          setTournamentResults(tournamentDataRef.current);
        }
        // AnomalyDetector - トーナメント終了
        AnomalyDetector.endTournament();
        addLog(T.log.tournamentComplete(tournamentProgress.total), 'system');
        return;
      }
      if (gameState === 'gameOver' && !autoPlayingRef.current) {
        autoPlayingRef.current = true;
        // refを使って次のマッチを取得
        const matchIdx = tournamentCurrentRef.current;
        const matches = tournamentMatchesRef.current;
        if (matchIdx < matches.length) {
          const nextMatch = matches[matchIdx];
          // プレイヤーを設定してゲーム開始
          startTournamentGame(nextMatch);
        }
      }
      return;
    }

    // 通常オートプレイ
    if (autoPlayCount >= maxAutoPlayGames) { setAutoPlayMode(false); addLog(T.log.autoPlayComplete(autoPlayCount), 'system'); return; }
    if (gameState === 'gameOver' && !autoPlayingRef.current) {
      autoPlayingRef.current = true;
      setAutoPlayCount(prev => prev + 1);
      setGameNumber(prev => prev + 1);
      startGame();
    }
  }, [autoPlayMode, gameState, startGame, autoPlayCount, maxAutoPlayGames, addLog, tournamentMode, tournamentProgress, tournamentMatches, startTournamentGame]);

  // v2.0.3fix: 開始時にリセット（停止時は維持して再開可能に）
  useEffect(() => { if (autoPlayMode && !tournamentMode) setAutoPlayCount(0); }, [autoPlayMode, tournamentMode]);

  // トーナメントゲーム開始（v2.0ルール対応）
  const startTournamentGame = useCallback((matchParticipants) => {
    // matchParticipants: [{id, name, strategy, odIndex}] (odIndex = 元のID)
    const newPlayers = matchParticipants.map((p, idx) => ({
      id: idx,
      name: p.name,
      type: p.id === 'player' ? 'human' : 'ai',
      emoji: p.emoji || '👤',
      hand: [],
      houses: [],
      score: 0,
      strategy: p.strategy,
      individualStrategy: p.strategy,
      odIndex: p.odIndex // 元のIDを保持（統計用）
    }));

    // デッキ生成とシャッフル - v6.6: gameParamsで枚数動的設定
    const newDeck = GameLogic.createDeck(gameParams);
    for (let i = newDeck.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [newDeck[i], newDeck[j]] = [newDeck[j], newDeck[i]];
    }

    // 市場カード - v6.6: marketCountで枚数設定
    const marketCards = newDeck.splice(0, gameParams.marketCount);
    marketRef.current = marketCards;  // 即座にref更新
    setMarket(marketCards);

    // 初期手札配布（7枚ずつ）
    const numPlayers = newPlayers.length;
    for (let round = 0; round < 7; round++) {
      for (let p = 0; p < numPlayers; p++) {
        if (newDeck.length > 0) {
          newPlayers[p].hand.push(newDeck.shift());
        }
      }
    }

    // 初期ペア処理
    newPlayers.forEach((p, i) => {
      const result = processPairsSync(p.hand, i);
      newPlayers[i].hand = result.hand;
    });

    setPlayers([...newPlayers]);
    playersRef.current = newPlayers;
    setDeck(newDeck);
    deckRef.current = newDeck;

    setPhase(PHASES.EXPLORATION); phaseRef.current = PHASES.EXPLORATION;
    setTurn(1); turnRef.current = 1;
    setCurrentPlayerIndex(0); currentPlayerIndexRef.current = 0;
    resetTurnAction();
    setGameEnded(false); gameEndedRef.current = false; setRevealAllHands(false);
    setWinCount([0, 0, 0, 0]);
    setCumulativeScores([0, 0, 0, 0]);
    setFlyingCard(null);
    setDealingPhase('ready'); dealingPhaseRef.current = 'ready';
    setVictoryAnimation(null);

    // ゲーム内統計をリセット
    gameStatsRef.current = {
      destroyCount: 0,
      windUsed: 0,
      housePlaced: 0,
      marketExchanges: 0,
      explorationTurns: 0,
      babanukiTurns: 0,
      phaseTransitionTurn: 0,
      // v6.6.1新機能統計
      counterAttempts: 0,
      counterSuccess: 0,
      emptyStallCreated: 0,
      emptyStallRefilled: 0,
      emptyStallAttacked: 0,
      emptyStallRemaining: 0,
      windExhaustedTurn: null,
      stallExhaustedTurn: null
    };
    autoPlayingRef.current = false;

    // トーナメント時はセット制を無効化（新形式）
    setSetConfig({
      enabled: false,
      gamesPerSet: 4,
      totalSets: 0,
      currentSet: 1,
      currentGame: 0,
      setFirstPlayer: -1
    });

    setGameState('playing');
    setGameNumber(prev => prev + 1);

    // NotationLogger - ゲーム開始を記録
    NotationLogger.recordGameStart(newPlayers, marketCards, 0);
    NotationLogger.setTurn(1, PHASES.EXPLORATION);

    // AnomalyDetector - ゲーム開始
    AnomalyDetector.startGame(tournamentCurrentRef.current + 1, newPlayers);

    GameLogger.full(`[TOURNAMENT] Game ${tournamentCurrentRef.current + 1}/${tournamentProgress.total}: ${matchParticipants.map(p => p.name).join(' vs ')}`);
  }, [processPairsSync, tournamentProgress]);

  // トーナメント開始
  // 参加者数から総試合数を計算（nC4 = n*(n-1)*(n-2)*(n-3)/24）
  const calcTournamentGames = useCallback((participantCount, rounds) => {
    if (participantCount < 4) return 0;
    const c4 = participantCount * (participantCount - 1) * (participantCount - 2) * (participantCount - 3) / 24;
    return c4 * rounds;
  }, []);

  // 選択中の参加者数を計算
  const selectedParticipantCount = Object.values(tournamentParticipants).filter(v => v).length;
  const estimatedGames = calcTournamentGames(selectedParticipantCount, tournamentRounds);

  const startTournament = useCallback(() => {
    // 選択された参加者のみでリスト作成
    const participants = [];
    if (tournamentParticipants.player) {

      return;
    }

    // 組み合わせ生成
    const combinations = generateCombinations(participants, 4);

    // 総当たり回数分複製してシャッフル
    let allMatches = [];
    for (let r = 0; r < tournamentRounds; r++) {
      allMatches = allMatches.concat(combinations.map(c => [...c]));

    for (let i = allMatches.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [allMatches[i], allMatches[j]] = [allMatches[j], allMatches[i]];
