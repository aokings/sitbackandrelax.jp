  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    /* v2.0.0: プレビュー環境の枠線防止 */
    html, body, #root { border: none !important; outline: none !important; box-sizing: border-box; }
    html { overflow: hidden; } /* v2.4.7: スクロール無効化 */
    body { font-family: 'Hiragino Sans', 'Yu Gothic', monospace; background: #f5f5f5; padding: 0; margin: 0; overflow: hidden; }
    /* v2.5.10.0: 100vh問題対応（svhフォールバック） */
    #root { width: 100%; height: 100vh; height: 100svh; }
    :root {
      /* ============================================
         Unit System
         ============================================ */
      --unit-x: 8px;
      --unit-y: 14px;
      --border-width: 1px;

      /* ============================================
         盤面サイズ: v2.1.1 デフォルト 129U × 53U
         (動的サイジングで113U〜180U対応)
         ============================================ */
      --board-w: calc(129 * var(--unit-x) + 2 * var(--border-width));  /* 1034px */
      --board-h: calc(53 * var(--unit-y) + 2 * var(--border-width));   /* 744px */

      /* ============================================
         カードサイズ
         v2.1.1: Standard 10U×8U を追加（将来の統一サイズ）
         v2.0.9互換: Large/Small/Burn も維持
         ============================================ */
      /* v2.1.1 Standard（統一サイズ） */
      --card-w: calc(10 * var(--unit-x));     /* 80px */
      --card-h: calc(8 * var(--unit-y));      /* 112px */
      /* v2.0.9 互換 */
      --card-large-w: calc(13 * var(--unit-x));  /* 104px */
      --card-large-h: calc(10 * var(--unit-y));  /* 140px */
      --card-small-w: calc(9 * var(--unit-x));   /* 72px */
      --card-small-h: calc(7 * var(--unit-y));   /* 98px */
      --card-burn-w: calc(6 * var(--unit-x));    /* 48px */
      --card-burn-h: calc(5 * var(--unit-y));    /* 70px */

      /* ============================================
         v2.1.1 行の高さ（5行構成用）
         ============================================ */
      --house-row-h: calc(10 * var(--unit-y));   /* 140px（家8U + 重なり2U） */
      --hand-row-h: calc(8 * var(--unit-y));     /* 112px */
      --center-row-h: calc(12 * var(--unit-y));  /* 168px */
      --house-stack-offset: calc(2 * var(--unit-y)); /* 家+人物の重なり */

      /* ============================================
         v2.1.1 基本サイズ
         ============================================ */
      --header-h: calc(2 * var(--unit-y));       /* 28px */

      /* ============================================
         v2.4.7 UIスケーリング用変数
         ============================================ */
      --ui-font-size: 11px;
      --ui-font-size-small: 10px;
      --chat-font-size: 12px;
      --nameplate-padding: 7px 8px;
      --chat-min-h: calc(4 * var(--unit-y));

      /* ============================================
         v2.5.0 オーバーレイ用変数
         ============================================ */
      --overlay-icon-size: 60px;
      --overlay-icon-medium: 48px;
      --overlay-title-size: 20px;
      --overlay-subtitle-size: 14px;
      --overlay-text-size: 11px;

      /* ============================================
         v2.5.0 メニュー用変数（v2.5.7: スケール対応）
         ============================================ */
      --menu-title-size: 14px;
      --menu-label-size: 10px;
      --menu-text-size: 9px;
      --menu-hint-size: 8px;
      --effect-emoji-size: 48px;
      --effect-title-size: 20px;
      --effect-message-size: 11px;
      --critic-emoji-size: 24px;
      --critic-grid-cols: 5; /* v2.5.9.7: 2行5列に変更 */
      --critic-grid-margin: calc(1 * var(--unit-y)) 0; /* v2.5.9.7: マージン縮小 */
      --menu-button-padding: 7px 8px; /* v2.5.7.7: スマホ時は拡大 */
      --menu-box-width: calc(90 * var(--unit-x)); /* v2.5.9.9: スマホ時は70vw */
      --menu-box-width-wide: calc(90 * var(--unit-x)); /* v2.5.9.13: スマホ時は90vw */
      --center-area-top-offset: 0; /* v2.5.7.12: スマホ時は上にずらす */
      --bazaar-cards-margin-top: 0; /* v2.5.9.2: 上辺揃え */

      /* ============================================
         v2.1.1 プレイヤーブロック（動的計算用デフォルト値）
         129U時: (129/2) - 1.5 = 63U
         ============================================ */
      --player-block-w: calc(63 * var(--unit-x)); /* 504px (v2.1.1) */
      --house-area-w: calc(31 * var(--unit-x));
      --chat-box-w: calc(31 * var(--unit-x));
      --chat-box-h: calc(8 * var(--unit-y));
      --hand-area-w: calc(52 * var(--unit-x));
      --chat-left-p0p1: calc(32 * var(--unit-x));
      --house-left-p2p3: calc(32 * var(--unit-x));
      --textbox-h: calc(2 * var(--unit-y));

      /* ============================================
         v2.1.1 横幅いっぱい用（2人/3人モード）
         ============================================ */
      --full-block-w: calc(127 * var(--unit-x));   /* widthU - 2 */
      --full-house-area-w: calc(62.5 * var(--unit-x));
      --full-chat-box-w: calc(35 * var(--unit-x)); /* 最大35U */
      --full-chat-box-right: calc(1 * var(--unit-x));
      --full-hand-area-w: calc(116 * var(--unit-x));

      /* ============================================
         v2.1.1 中央行レイアウト（129U基準）
         タイトル右端35U、市場左端65.5U → 中間50U
         山札中央 = 50U、山札幅10U → 左端45U
         ============================================ */
      --deck-area-left: calc(45 * var(--unit-x));
      --deck-area-w: calc(14 * var(--unit-x));
      --bazaar-area-left: calc(60 * var(--unit-x));
      --bazaar-area-w: calc(66 * var(--unit-x));
      /* v2.6.0: ログエリア廃止（市場拡張のため） */

      /* ============================================
         v2.4.5 行位置（動的サイジング対応）
         デフォルト値: 53U高さ基準
         ============================================ */
      --row-1-top: calc(0.5 * var(--unit-y));
      --row-2-top: calc(9.5 * var(--unit-y));
      --row-3-top: calc(20.5 * var(--unit-y));
      --row-4-top: calc(33.5 * var(--unit-y));
      --row-5-top: calc(44.5 * var(--unit-y));

      /* ============================================
         アールデコ配色
         ============================================ */
      --color-cream: #FAF8F5;           /* 盤面背景 */
      --color-burgundy: #2d1518;        /* プライマリ（カード裏背景） */
      --color-dusty-pink: #e8b4b8;      /* アクセント（カード裏装飾） */
      --color-charcoal: #2D2D2D;        /* テキスト */
      --color-warm-gray: #6B6359;       /* サブテキスト */
      --color-gold: #C9A227;            /* 強調、選択 */

      /* カテゴリ色 */
      --color-citizen: #8B7355;   /* ウォームブラウン */
      --color-noble: #C9A227;     /* ゴールド */
      --color-special: #6B3A5B;   /* ダスティパープル */
      --color-house: #4A6B4A;     /* オリーブグリーン */
      --color-wind: #5B7B9A;      /* スレートブルー */
      --card-back-accent: var(--color-dusty-pink);
      --card-back-bg: var(--color-burgundy);

      /* 統一影 */
      --shadow-light: 1px 1px 0px rgba(45, 21, 24, 0.15);
      --shadow-z1: 2px 2px 2px rgba(45, 21, 24, 0.12);
      --shadow-z2: 4px 4px 4px rgba(45, 21, 24, 0.10);
      --shadow-z3: 6px 6px 6px rgba(45, 21, 24, 0.08);
      --shadow-hover: 6px 6px 0px rgba(232, 180, 184, 0.5);
      --glow-gold: 0 0 15px rgba(201, 162, 39, 0.8);
      --glow-gold-soft: 0 0 15px rgba(201, 162, 39, 0.5);
      --glow-pink: 0 0 15px rgba(232, 180, 184, 0.5);
    }
    .game-board {
      width: var(--board-w);
      height: var(--board-h);
      overflow: hidden; /* v2.0.0: アニメーション要素のはみ出し防止 */
      border: none; /* v2.0.0: プレビュー環境の枠線防止 */
      outline: none;
      background:
        /* 縦線: 8px間隔、4pxオフセット（0.5U） - ダスティピンク */
        repeating-linear-gradient(
          90deg,
          transparent 0px,
          transparent 3px,
          rgba(232, 180, 184, 0.2) 3px,
          rgba(232, 180, 184, 0.2) 4px,
          transparent 4px,
          transparent 8px
        ),
        /* 横線: 14px間隔、7pxオフセット（0.5U） - ダスティピンク */
        repeating-linear-gradient(
          0deg,
          transparent 0px,
          transparent 6px,
          rgba(232, 180, 184, 0.2) 6px,
          rgba(232, 180, 184, 0.2) 7px,
          transparent 7px,
          transparent 14px
        ),
        var(--color-cream);
      position: relative;
      margin: 0 auto;
    }
    .game-header { width: var(--board-w); height: var(--header-h); position: absolute; top: 0; left: 0; display: flex; justify-content: space-between; }
    .header-left { height: var(--header-h); border: 1px solid var(--color-burgundy); display: flex; align-items: center; font-size: 12px; font-weight: bold; background: #fff; color: var(--color-charcoal); padding: 0 15px; cursor: pointer; user-select: none; box-shadow: var(--shadow-light); }
    .header-end-btn { height: var(--header-h); border: 1px solid var(--color-burgundy); display: flex; align-items: center; font-size: 11px; font-weight: bold; background: var(--color-burgundy); color: white; padding: 0 12px; cursor: pointer; margin-left: -1px; }
    .header-end-btn:hover { background: #1a0d0f; }
    .header-stop-btn { height: var(--header-h); border: 1px solid var(--color-burgundy); display: flex; align-items: center; font-size: 11px; font-weight: bold; background: var(--color-burgundy); color: white; padding: 0 12px; cursor: pointer; margin-left: -1px; }
    .header-stop-btn:hover { background: #1a0d0f; }
    .header-right { padding: 0 10px; height: var(--header-h); border: 1px solid var(--color-burgundy); display: flex; align-items: center; font-size: 12px; font-weight: bold; background: #fff; color: var(--color-charcoal); box-shadow: var(--shadow-light); }
    .nameplate { position: absolute; top: 0; left: calc(1 * var(--unit-x)); display: inline-block; padding: var(--nameplate-padding, 7px 8px); background: #fff; border: 1px solid var(--color-burgundy); font-size: var(--ui-font-size, 11px); font-weight: bold; color: var(--color-charcoal); box-shadow: var(--shadow-light); z-index: 20; }
    .nameplate.active { border: 2px solid var(--color-gold); background: var(--color-cream); }
    .self-nameplate { position: absolute; top: 0; left: calc(1 * var(--unit-x)); display: inline-block; padding: var(--nameplate-padding, 7px 8px); background: var(--color-cream); border: 2px solid var(--color-gold); font-size: var(--ui-font-size, 11px); font-weight: bold; color: var(--color-charcoal); box-shadow: var(--shadow-light); z-index: 20; }
    .deck-label { position: absolute; top: 0; left: calc(1 * var(--unit-x)); display: inline-block; padding: var(--nameplate-padding, 7px 8px); background: #fff; border: 1px solid var(--color-burgundy); font-size: var(--ui-font-size, 11px); font-weight: bold; color: var(--color-charcoal); box-shadow: var(--shadow-light); z-index: 20; }
    .deck-count { position: absolute; top: var(--deck-count-top, calc(12 * var(--unit-y))); left: calc(16 * var(--unit-x)); font-size: var(--ui-font-size, 11px); font-weight: bold; background: #fff; border: 1px solid var(--color-burgundy); color: var(--color-charcoal); padding: var(--nameplate-padding, 7px 8px); text-align: center; z-index: 20; box-shadow: var(--shadow-light); }
    .game-info-area { width: calc(30 * var(--unit-x)); height: 100%; padding: calc(1 * var(--unit-x)); }
    .game-info-header { font-size: var(--ui-font-size, 12px); font-weight: bold; margin-bottom: calc(1 * var(--unit-y)); }
    .score-section { font-size: var(--ui-font-size-small, 11px); }
    .score-label { font-weight: bold; margin-bottom: calc(0.5 * var(--unit-y)); }
    .score-names, .score-values { display: flex; gap: calc(2 * var(--unit-x)); margin-left: calc(1 * var(--unit-x)); }
    .score-values { font-weight: bold; }
    .market-area { width: calc(22 * var(--unit-x)); height: 100%; padding: calc(1 * var(--unit-x)); }
    .market-label { display: inline-block; padding: var(--nameplate-padding, 7px 8px); background: linear-gradient(135deg, #fff8e1 0%, #ffecb3 100%); border: 1px solid var(--color-gold); font-size: var(--ui-font-size, 11px); font-weight: bold; color: var(--color-charcoal); margin-bottom: 4px; box-shadow: var(--shadow-light); z-index: 20; position: relative; transition: all 0.3s ease; }
    .market-label.market-special { background: linear-gradient(135deg, #5B7B9A 0%, #4A6A89 100%); border: 2px solid var(--color-wind); color: white; animation: specialPulse 1s ease-in-out infinite; }
    @keyframes specialPulse { 0%, 100% { box-shadow: 0 0 5px rgba(91, 123, 154, 0.5); } 50% { box-shadow: 0 0 15px rgba(91, 123, 154, 0.8); } }
    .card-flip-container { perspective: 1000px; }
    .card-flip-inner { position: relative; width: 100%; height: 100%; transition: transform 0.5s; transform-style: preserve-3d; }
    .card-flip-inner.flipped { transform: rotateY(180deg); }
    .card-flip-front, .card-flip-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; -webkit-backface-visibility: hidden; }
    .card-flip-back { transform: rotateY(180deg); }
    .market-cards { display: flex; gap: 4px; }

    .market-card-slot.market-selectable::after { content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px; border: 2px solid var(--color-gold); border-radius: 5px; animation: market-pulse 1s ease-in-out infinite; pointer-events: none; }
    @keyframes market-pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    /* v6.5: 商いの才覚 — 選択済みカードのハイライト */
    .market-card-slot.effect-selected { transform: translateY(-5px); }
    .market-card-slot.effect-selected::after { content: '✓'; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px; border: 3px solid #4CAF50; border-radius: 5px; pointer-events: none; display: flex; align-items: flex-start; justify-content: flex-end; padding: 2px 4px; font-size: 14px; font-weight: bold; color: #4CAF50; background: rgba(76, 175, 80, 0.1); }
    .log-area { flex: 1; position: relative; font-size: var(--ui-font-size-small, 10px); }
    .log-box { position: absolute; left: calc(1 * var(--unit-x)); top: calc(1 * var(--unit-x)); bottom: calc(1 * var(--unit-x)); right: calc(1 * var(--unit-x)); border: 1px solid var(--color-burgundy); padding: calc(0.5 * var(--unit-y)); overflow-y: auto; }
    .log-entry { margin-bottom: calc(0.5 * var(--unit-y)); color: var(--color-charcoal); }

    .draw-zone-clickable { cursor: pointer; border: 2px dashed var(--color-dusty-pink); border-radius: 5px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .draw-zone-clickable:hover { border-color: var(--color-gold); background: rgba(201, 162, 39, 0.05); }

      width: var(--card-w);
      height: var(--card-h);
      border: 2px dashed var(--color-dusty-pink);

      flex-direction: column;
      align-items: center;

      cursor: pointer;
      color: var(--color-warm-gray);

    /* v6.6: カウンターモーダル */
    .counter-modal-overlay { background: rgba(0, 0, 0, 0.6); z-index: 1050; }
    .counter-modal { background: var(--color-cream); border: 3px solid var(--color-burgundy); border-radius: 8px; padding: calc(3 * var(--unit-y)) calc(4 * var(--unit-x)); text-align: center; max-width: 300px; box-shadow: var(--shadow-hover); }
    .counter-title { font-size: var(--menu-title-size); color: var(--color-burgundy); font-weight: bold; margin-bottom: calc(1 * var(--unit-y)); }
    .counter-description { font-size: var(--menu-text-size); color: var(--color-warm-gray); margin-bottom: calc(2 * var(--unit-y)); white-space: pre-line; }
    .counter-buttons { display: flex; gap: calc(2 * var(--unit-x)); justify-content: center; }
    .counter-btn { padding: calc(1 * var(--unit-y)) calc(3 * var(--unit-x)); font-size: var(--menu-label-size); font-weight: bold; border: 2px solid var(--color-burgundy); border-radius: 4px; cursor: pointer; transition: all 0.2s; }
    .counter-yes { background: var(--color-burgundy); color: #fff; }
    .counter-yes:hover { background: var(--color-gold); border-color: var(--color-gold); }
    .counter-no { background: #fff; color: var(--color-burgundy); }
    .counter-no:hover { background: var(--color-dusty-pink); }
    .effect-box.purification { background: var(--color-burgundy); color: white; border: 2px solid var(--color-dusty-pink); }
    .effect-box.win { border: 2px solid var(--color-gold); }
    .effect-box.pair { border: 2px solid var(--color-gold); background: var(--color-cream); }
    .effect-box .effect-emoji { font-size: var(--effect-emoji-size, 48px); margin-bottom: calc(1 * var(--unit-y)); }
    .effect-box .effect-title { font-size: var(--effect-title-size, 20px); font-weight: bold; color: var(--color-burgundy); margin-bottom: calc(0.5 * var(--unit-y)); }
    .effect-box .effect-message { font-size: var(--effect-message-size, 11px); color: var(--color-warm-gray); }
    .effect-box.purification .effect-title { color: white; }
    .effect-box.purification .effect-message { color: var(--color-dusty-pink); }

    .action-hint { position: absolute; bottom: calc(12 * var(--unit-y)); left: 50%; transform: translateX(-50%); background: var(--color-burgundy); color: #fff; padding: 7px calc(2 * var(--unit-x)); font-size: 11px; z-index: 100; box-shadow: var(--shadow-light); }

    .log-entry.wind { color: #4169E1; }
    .log-entry.ai-thought { color: #9c27b0; font-style: italic; padding-left: 8px; border-left: 2px solid #ce93d8; margin-left: 4px; }
    .house-targetable { cursor: pointer; }
    .house-targetable::after { content: ''; position: absolute; top: -3px; left: -3px; right: -3px; bottom: -3px; border: 3px solid #4169E1; border-radius: 6px; animation: pulse 1s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .house-disabled { opacity: 0.4; cursor: not-allowed; }
    .wind-cancel-btn { position: absolute; bottom: calc(12 * var(--unit-y)); right: calc(2 * var(--unit-x)); background: var(--color-burgundy); color: white; padding: 7px calc(2 * var(--unit-x)); font-size: 11px; cursor: pointer; z-index: 101; box-shadow: var(--shadow-light); }
    .wind-cancel-btn:hover { background: #1a0d0f; }

    /* 家から取り出し用スタイル */
    .house-breakable { position: relative; }
    .house-breakable::after { content: ''; position: absolute; top: -3px; left: -3px; right: -3px; bottom: -3px; border: 2px solid var(--color-gold); border-radius: 6px; animation: breakablePulse 1.5s ease-in-out infinite; pointer-events: none; }
    @keyframes breakablePulse { 0%, 100% { border-color: var(--color-gold); opacity: 0.6; } 50% { border-color: var(--color-dusty-pink); opacity: 1; } }
    .break-indicator { position: absolute; top: -10px; right: -10px; background: var(--color-gold); color: white; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; z-index: 10; box-shadow: var(--shadow-light); }

    /* v6.6.1: 空屋台スタイル */
    .house-empty { opacity: 0.7; }
    .house-empty .house-card { filter: grayscale(30%); }
    .house-refillable { position: relative; }
    .house-refillable::after { content: ''; position: absolute; top: -3px; left: -3px; right: -3px; bottom: -3px; border: 2px solid var(--color-primary); border-radius: 6px; animation: refillPulse 1.5s ease-in-out infinite; pointer-events: none; }
    @keyframes refillPulse { 0%, 100% { border-color: var(--color-primary); opacity: 0.6; } 50% { border-color: var(--color-secondary); opacity: 1; } }
    .refill-indicator { position: absolute; top: -10px; right: -10px; background: var(--color-primary); color: white; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; z-index: 10; box-shadow: var(--shadow-light); }
    .empty-indicator { position: absolute; top: -10px; right: -10px; background: #888; color: white; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; z-index: 10; box-shadow: var(--shadow-light); }

    /* アニメーション */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes cardDraw { 0% { opacity: 0; transform: scale(0.8) translateY(-30px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }

    @keyframes pairFlash { 0% { transform: scale(1); box-shadow: 0 0 0 rgba(201, 162, 39, 0); } 50% { transform: scale(1.1); box-shadow: 0 0 30px rgba(201, 162, 39, 0.8); } 100% { transform: scale(1); box-shadow: 0 0 0 rgba(201, 162, 39, 0); } }
    @keyframes winCelebrate { 0% { transform: scale(1); } 25% { transform: scale(1.2) rotate(-5deg); } 50% { transform: scale(1.2) rotate(5deg); } 75% { transform: scale(1.2) rotate(-5deg); } 100% { transform: scale(1); } }
    @keyframes turnIndicator { 0%, 100% { box-shadow: 0 0 5px rgba(201, 162, 39, 0.5); } 50% { box-shadow: var(--glow-gold); } }
    .anim-fade-in { animation: fadeIn 0.3s ease-out; }
    .anim-slide-up { animation: slideInUp 0.3s ease-out; }
    .anim-slide-down { animation: slideInDown 0.3s ease-out; }
    .anim-card-draw { animation: cardDraw 0.4s ease-out; }
    .anim-pair-flash { animation: pairFlash 0.6s ease-out; }
    .anim-win { animation: winCelebrate 0.8s ease-in-out; }
    .anim-turn { animation: turnIndicator 1.5s ease-in-out infinite; }

    .effect-box.anim-win { animation: winCelebrate 0.8s ease-in-out; }

    .nameplate.active { border: 3px double var(--color-gold); animation: turnIndicator 1.5s ease-in-out infinite; }

    /* ドローカード強調（アールデコ） */
    .drawn-card { position: relative; }
    .drawn-card::before { content: 'NEW'; position: absolute; top: -8px; right: -8px; background: var(--color-gold); color: white; font-size: 8px; font-weight: bold; padding: 2px 5px; z-index: 10; animation: pulse 1s infinite; }

    @keyframes confettiFall {
      0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(700px) rotate(720deg); opacity: 0; }
    }
    @keyframes screenFlash {
      0% { opacity: 0; }
      50% { opacity: 0.5; }
      100% { opacity: 0; }
    }
    @keyframes phaseSlide {
      0% { opacity: 0; transform: translateY(-50px) scale(0.8); }
      50% { opacity: 1; transform: translateY(0) scale(1.1); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes cardGlow {
      0%, 100% { box-shadow: 0 0 10px rgba(201, 162, 39, 0.5); }
      50% { box-shadow: 0 0 25px rgba(201, 162, 39, 0.9); }
    }
    @keyframes turnBorderPulse {
      0%, 100% { border-color: var(--color-gold); box-shadow: 0 0 10px rgba(201, 162, 39, 0.3); }
      50% { border-color: var(--color-dusty-pink); box-shadow: 0 0 20px rgba(232, 180, 184, 0.6); }
    }
    @keyframes rainbowBorder {
      0% { border-color: #ff0000; }
      17% { border-color: #ff8800; }
      33% { border-color: #ffff00; }
      50% { border-color: #00ff00; }
      67% { border-color: #0088ff; }
      83% { border-color: #8800ff; }
      100% { border-color: #ff0000; }
    }

    .anim-glow { animation: cardGlow 1s ease-in-out infinite; }
    .anim-turn-border { animation: turnBorderPulse 1.5s ease-in-out infinite; }
    .anim-rainbow { animation: rainbowBorder 2s linear infinite; }

    /* v2.0.7: 風カード浮上演出（選択時にZ軸的に上昇） */
    @keyframes windCardRising {
      0% { transform: translateY(0) scale(1); box-shadow: var(--shadow-z1); }
      100% { transform: translateY(-20px) scale(1.05); box-shadow: 0 20px 40px rgba(45, 21, 24, 0.3); }
    }
    @keyframes windCardHover {
      0%, 100% { transform: translateY(-20px) scale(1.05); }
      50% { transform: translateY(-25px) scale(1.05); }
    }
    .wind-card-floating {
      animation: windCardRising 400ms ease-out forwards;
    }
    .wind-card-floating.hovering {
      animation: windCardHover 1.5s ease-in-out infinite;
    }

    /* 魔女/聖母を引いた時の危険警告（burgundy光彩） */

    @keyframes dangerShakeInHand {
      0%, 100% { transform: translateX(0) rotate(0deg); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(calc(-0.5 * var(--unit-x))) rotate(-1.5deg); }
      20%, 40%, 60%, 80% { transform: translateX(calc(0.5 * var(--unit-x))) rotate(1.5deg); }
    }

    /* 世界の浄化（魔女+聖母ペア）演出（gold + dusty-pink交互） */
    @keyframes purificationGlow {
      0%, 100% { box-shadow: 0 0 calc(2 * var(--unit-x)) rgba(201, 162, 39, 0.5); }
      25% { box-shadow: 0 0 calc(4 * var(--unit-x)) rgba(232, 180, 184, 0.8); }
      50% { box-shadow: 0 0 calc(6 * var(--unit-x)) rgba(201, 162, 39, 1), 0 0 calc(10 * var(--unit-x)) rgba(201, 162, 39, 0.3); }
      75% { box-shadow: 0 0 calc(4 * var(--unit-x)) rgba(232, 180, 184, 0.8); }
    }
    @keyframes purificationRotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .anim-purification-glow { animation: purificationGlow 1.5s ease-in-out infinite; }


    /* 風カード演出オーバーレイ（wind blue → アールデコに調整） */
    .wind-effect-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(250, 248, 245, 0.92);
      z-index: 1000;
    }
    .wind-effect-box {
      background: #fff;
      border: 2px solid var(--color-gold);
      padding: calc(2 * var(--unit-y)) calc(3 * var(--unit-x));
      text-align: center;
      box-shadow: var(--shadow-hover);
    }

    /* 紙吹雪 */
    .confetti-container { position: absolute; top: 0; left: 0; right: 0; bottom: 0; overflow: hidden; pointer-events: none; z-index: 999; }
    .confetti-piece { position: absolute; width: 10px; height: 10px; animation: confettiFall 3s ease-out forwards; }

    /* v2.7.1: バナーアニメーション */
    .banner-overlay-bg {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.3);
      z-index: 1003;
      animation: bannerBgFade 1.65s ease-in-out forwards;
    }
    @keyframes bannerBgFade {
      0% { opacity: 0; }
      15% { opacity: 1; }
      85% { opacity: 1; }
      100% { opacity: 0; }
    }
    .banner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) translateX(500px);
      padding: calc(1 * var(--unit-y)) calc(8 * var(--unit-x));
      font-size: calc(2.5 * var(--unit-y));
      font-weight: bold;
      white-space: nowrap;
      z-index: 1005;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
      opacity: 0;
      pointer-events: none;
    }
    @keyframes bannerSlideIn {

      100% { transform: translate(-50%, -50%) translateX(0); opacity: 1; }
    }
    @keyframes bannerSlideOut {
      0% { transform: translate(-50%, -50%) translateX(0); opacity: 1; }
      80% { opacity: 1; }
      100% { transform: translate(-50%, -50%) translateX(-500px); opacity: 0; }
    }
    .banner.slide-in { animation: bannerSlideIn 0.4s ease-out forwards; }
    .banner.slide-out { animation: bannerSlideOut 0.25s ease-in forwards; }
    .banner-royal {
      background: linear-gradient(90deg, transparent 0%, rgba(201,162,39,0.95) 10%, rgba(255,215,0,1) 30%, rgba(255,235,150,1) 50%, rgba(255,215,0,1) 70%, rgba(201,162,39,0.95) 90%, transparent 100%);
      color: #2d1518;
      border-top: 3px solid rgba(255,255,255,0.8);
      border-bottom: 3px solid rgba(255,255,255,0.8);
      box-shadow: 0 0 20px rgba(255,215,0,0.8), 0 0 40px rgba(255,215,0,0.4), inset 0 0 20px rgba(255,255,255,0.3);
    }
    .banner-witch {
      background: linear-gradient(90deg, transparent 0%, rgba(75,0,75,0.95) 10%, rgba(138,43,226,1) 30%, rgba(180,100,255,1) 50%, rgba(138,43,226,1) 70%, rgba(75,0,75,0.95) 90%, transparent 100%);
      color: #fff;
      border-top: 3px solid rgba(255,200,255,0.8);
      border-bottom: 3px solid rgba(255,200,255,0.8);
      box-shadow: 0 0 20px rgba(180,100,255,0.8), 0 0 40px rgba(138,43,226,0.4), inset 0 0 20px rgba(255,255,255,0.2);
    }
    .banner-knight {
      background: linear-gradient(90deg, transparent 0%, rgba(80,80,90,0.95) 10%, rgba(150,150,160,1) 30%, rgba(200,200,210,1) 50%, rgba(150,150,160,1) 70%, rgba(80,80,90,0.95) 90%, transparent 100%);
      color: #2d1518;

      box-shadow: 0 0 20px rgba(200,200,220,0.8), 0 0 40px rgba(150,150,170,0.4), inset 0 0 20px rgba(255,255,255,0.4);
    }
    .banner-merchant {
      background: linear-gradient(90deg, transparent 0%, rgba(20,80,40,0.95) 10%, rgba(46,139,87,1) 30%, rgba(80,180,120,1) 50%, rgba(46,139,87,1) 70%, rgba(20,80,40,0.95) 90%, transparent 100%);
      color: #fff;
      border-top: 3px solid rgba(150,255,150,0.8);
      border-bottom: 3px solid rgba(150,255,150,0.8);
      box-shadow: 0 0 20px rgba(46,139,87,0.8), 0 0 40px rgba(46,139,87,0.4), inset 0 0 20px rgba(255,255,255,0.2);
    }
    .banner-babanuki {
      background: linear-gradient(90deg, transparent 0%, rgba(100,0,0,0.95) 10%, rgba(180,0,0,1) 30%, rgba(220,50,50,1) 50%, rgba(180,0,0,1) 70%, rgba(100,0,0,0.95) 90%, transparent 100%);
      color: #fff;
      border-top: 3px solid rgba(255,150,150,0.8);
      border-bottom: 3px solid rgba(255,150,150,0.8);
      box-shadow: 0 0 20px rgba(255,0,0,0.6), 0 0 40px rgba(180,0,0,0.3), inset 0 0 20px rgba(255,255,255,0.2);
    }
    .banner-agari {
      background: linear-gradient(90deg, transparent 0%, rgba(255,100,100,1) 10%, rgba(255,200,0,1) 25%, rgba(100,255,100,1) 40%, rgba(100,200,255,1) 55%, rgba(200,100,255,1) 70%, rgba(255,100,150,1) 85%, transparent 100%);

    .banner-agari.slide-in { animation: bannerSlideIn 0.4s ease-out forwards, bannerShimmer 0.5s ease-in-out infinite alternate 0.4s; }
    @keyframes bannerShimmer { 0% { filter: brightness(1); } 100% { filter: brightness(1.2); } }

    .victory-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1100;
      animation: victoryFadeIn 0.3s ease-out;
    }
    .victory-overlay::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(45, 21, 24, 0.85);
      z-index: -1;
    }
    @keyframes victoryFadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    /* 幾何学パターン背景 */
    .victory-pattern {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      overflow: hidden;
      z-index: 0;
    }
    .victory-shape {
      position: absolute;
      border-radius: 50%;
      animation: shapeFloat 2s ease-in-out infinite;
    }
    @keyframes shapeFloat {
      0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.7; }
      50% { transform: scale(1.1) rotate(5deg); opacity: 1; }
    }

    /* 勝利ボックス */
    .victory-box {
      position: relative;
      z-index: 1;
      background: var(--color-cream);
      border: 4px solid var(--color-gold);
      padding: calc(3 * var(--unit-y)) calc(5 * var(--unit-x));
      text-align: center;
      box-shadow:
        0 0 40px rgba(201, 162, 39, 0.6),
        0 0 80px rgba(201, 162, 39, 0.3);
      animation: victoryBoxPulse 1.5s ease-in-out infinite;
    }
    @keyframes victoryBoxPulse {
      0%, 100% { box-shadow: 0 0 40px rgba(201, 162, 39, 0.6), 0 0 80px rgba(201, 162, 39, 0.3); }
      50% { box-shadow: 0 0 60px rgba(201, 162, 39, 0.8), 0 0 100px rgba(201, 162, 39, 0.5); }

    .victory-emoji {
      font-size: var(--effect-emoji-size, 48px);
      margin-bottom: calc(1 * var(--unit-y));
      animation: victoryBounce 0.6s ease-out;
    }
    @keyframes victoryBounce {
      0% { transform: scale(0); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    .victory-winner {
      font-size: var(--effect-title-size, 24px);
      font-weight: bold;
      color: var(--color-burgundy);
      margin-bottom: calc(1 * var(--unit-y));
    }
    .victory-condition {
      font-size: var(--menu-title-size, 18px);
      color: var(--color-gold);
      font-weight: bold;
    }
    .victory-condition.purification {
      color: #6B3A5B;
      text-shadow: 0 0 10px rgba(201, 162, 39, 0.8);
    }

    /* 勝利時カラーパレット */
    :root {
      --victory-red: #C94C4C;
      --victory-orange: #E67E22;
      --victory-yellow: #F1C40F;
      --victory-green: #8DC149;
      --victory-teal: #5DADE2;
      --victory-brown: #6B4423;
    }

    /* PhaseOverlay CSS → BannerOverlayに置換済み（v2.7.1） */

    /* 画面フラッシュ（ゴールド系） */
    .screen-flash { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(201, 162, 39, 0.3); z-index: 997; pointer-events: none; animation: screenFlash 0.4s ease-out forwards; }

    /* v2.0.5: 浄化オーバーレイ */
    .purification-overlay { flex-direction: column; background: rgba(255, 255, 255, 0.92); z-index: 998; animation: purificationFadeIn 0.4s ease-out; }
    .purification-box { text-align: center; animation: purificationPulse 1s ease-in-out infinite; }
    .purification-box .purification-title { font-size: var(--effect-title-size, 32px); font-weight: bold; color: var(--color-burgundy); text-shadow: 0 0 20px rgba(201, 162, 39, 0.8); margin-bottom: 8px; }
    .purification-box .purification-subtitle { font-size: var(--menu-title-size, 14px); color: var(--color-warm-gray); }
    .purification-icons { font-size: var(--effect-emoji-size, 48px); margin-bottom: calc(1 * var(--unit-y)); }
    @keyframes purificationFadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes purificationPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

    @keyframes flyToBurn {
      0% { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(var(--fly-x), var(--fly-y)) scale(0.7); opacity: 1; }
    }
    @keyframes flyToHand {
      0% { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(var(--fly-x), var(--fly-y)) scale(0.7); opacity: 1; }
    }
    @keyframes flyToDrawZone {
      0% { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(var(--fly-x), var(--fly-y)) scale(1); opacity: 1; }
    }
    @keyframes mergeToHand {
      0% { transform: translateX(0); opacity: 1; }
      100% { transform: translateX(-120px); opacity: 0; }
    }
    .flying-card { position: absolute; z-index: 1000; pointer-events: none; }
    .dealing-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 995; pointer-events: none; }

    /* ゲーム開始オーバーレイ（アールデコ） */
    .game-start-overlay { background: rgba(250, 248, 245, 0.95); z-index: 996; }
    .game-start-box { background: #fff; color: var(--color-burgundy); padding: calc(3 * var(--unit-y)) calc(5 * var(--unit-x)); text-align: center; animation: phaseSlide 0.5s ease-out; border: 1px solid var(--color-burgundy); box-shadow: var(--shadow-hover); }
    .game-start-title { font-size: var(--effect-title-size, 20px); font-weight: bold; }

    /* v2.5.8: 縦持ちオーバーレイ（CSS回転方式を廃止、ユーザー誘導方式に変更） */
    .portrait-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;

  // localStorageから保存された設定を取得
  const saved = localStorage.getItem('pfff_lang');
  if (saved === 'ja' || saved === 'en') return saved;
  
  // デフォルト言語が固定の場合はそれを使用
  if (DEFAULT_LANG === 'ja' || DEFAULT_LANG === 'en') return DEFAULT_LANG;
  
  // 'auto'の場合はブラウザの言語設定から判定
  const browserLang = navigator.language || navigator.userLanguage || '';
  if (browserLang.startsWith('ja')) return 'ja';
  return 'en';
})();

  if (lang !== 'ja' && lang !== 'en') return;

// 現在の言語を取得
const T = LANG[currentLang];
// ========================================
// SECTION 3: LOGGING SYSTEM
// ========================================
const UnifiedLogger = {
  // ログデータ
  logs: [],
  debugLogs: [],
  chatLogs: [],
  maxLogs: 300000,
  
  // 設定
  mode: 'standard',  // 'simple' | 'standard' | 'detailed'
  
  // 状態
  gameStartTime: null,
  currentTurn: 0,
  currentPhase: 'EX',
  playerNames: [],
  autoPlayMode: false,
  autoPlayAnim: false,
  
  // モード説明
  getModeDescription() {
    switch (this.mode) {
      case 'simple': return T.ui.logSimple;
      case 'standard': return T.ui.logStandard;
      case 'detailed': return T.ui.logDetailed;
      default: return this.mode;
    }
  },
  
  // ログ追加（内部用）
  _add(line) {
    this.logs.push(line);
  },
  
  // デバッグログ追加（detailed モードのみ）
  _addDebug(line) {
    if (this.mode !== 'detailed') return;
    const prefix = this.autoPlayMode ? '' : `[${new Date().toISOString().substr(11, 12)}] `;
    this.debugLogs.push(`${prefix}${line}`);
  },
  
  // コメント追加
  comment(text) {
    this._add(`; ${text}`);
  },
  
  // コンソール出力（開発用）
  log(...args) {
    console.log(...args);
  },
  
  // デバッグログ（detailed時のみ）
  debug(...args) {
    if (this.mode !== 'detailed') return;
    const message = args.map(arg => typeof arg === 'object' ? JSON.stringify(arg) : String(arg)).join(' ');
    this._addDebug(`[DEBUG] ${message}`);
    console.log('[DEBUG]', ...args);
  },
  
  // 詳細ログ（standard以上）
  info(...args) {
    if (this.mode === 'simple') return;
    const message = args.map(arg => typeof arg === 'object' ? JSON.stringify(arg) : String(arg)).join(' ');
    this._addDebug(`[INFO] ${message}`);
    console.log(...args);
  },
  
  // オートプレイ状態を更新
  setAutoPlayState(autoPlay, autoAnim) {
    this.autoPlayMode = autoPlay;
    this.autoPlayAnim = autoAnim;
  },
  
  // モード設定
  setMode(mode) {
    if (['simple', 'standard', 'detailed'].includes(mode)) {
      this.mode = mode;
      console.log(`[UnifiedLogger] Mode: ${this.getModeDescription()}`);
    }
  },
};

// ============================================
// GameLogger - UnifiedLoggerへの薄いファサード
// ============================================
const GameLogger = {
  logs: UnifiedLogger.debugLogs,
  get fullDetailMode() { return UnifiedLogger.mode === 'detailed'; },
  log(...args) { UnifiedLogger.log(...args); },
  debug(...args) { UnifiedLogger.debug(...args); },
  full(...args) { UnifiedLogger.debug(...args); },
  getHandBreakdown(hand) {
    const chars = hand.filter(c => c.type === 'character');
    const houses = hand.filter(c => c.type === 'house');
    const winds = hand.filter(c => c.type === 'wind');
    return {
      total: hand.length,
      chars: chars.length,
      houses: houses.length,
      winds: winds.length,
      charNames: chars.map(c => c.name).join(',') || '(なし)',
      houseNames: houses.map(c => c.name).join(',') || '(なし)',
      windNames: winds.map(c => c.name).join(',') || '(なし)',
    };
  },
  getTurnSummary(turn, players, deck, phase) {
    const hands = players.map((p, i) => {
      const hb = this.getHandBreakdown(p.hand);
      return `P${i}=${hb.total}(${hb.charNames})`;
    }).join(', ');
    const houses = players.map((p, i) => {
      if (p.houses.length === 0) return `P${i}=[]`;
      const hList = p.houses.map(h => {
        const stored = h.storedCard ? h.storedCard.name : '空';
        return `${h.houseCard.name}:${stored}`;
      }).join(',');
      return `P${i}=[${hList}]`;
    }).join(', ');
    return { hands, houses, deckCount: deck.length, phase };
  },
  getDangerLocation(players) {
    let witchLoc = T.misc.excluded, holyLoc = T.misc.excluded;
    players.forEach((p, i) => {
      p.hand.forEach(c => {
        if (c.id === 'WIT') witchLoc = `P${i}手札`;
        if (c.id === 'HOL') holyLoc = `P${i}手札`;
      });
      p.houses.forEach(h => {
        if (!h.storedCard) return; // 空屋台はスキップ
        if (h.storedCard.id === 'WIT') witchLoc = `P${i}の${h.houseCard.name}`;
        if (h.storedCard.id === 'HOL') holyLoc = `P${i}の${h.houseCard.name}`;
      });
    });
    return { witch: witchLoc, holy: holyLoc };
  },
  getOptions(player, phase, canUseWind, targets) {
    const options = [T.ui.endTurn];
    const hand = player.hand;
    const houseCards = hand.filter(c => c.type === 'house');
    const charCards = hand.filter(c => c.type === 'character');
    const windCards = hand.filter(c => c.type === 'wind');
    if (houseCards.length > 0 && charCards.length > 0) {
      houseCards.forEach(h => { charCards.forEach(c => { options.push(`家格納:${c.name}→${h.name}`); }); });
    }
    if (canUseWind && windCards.length > 0 && targets && targets.length > 0) {
      windCards.forEach(w => { targets.forEach(t => { options.push(`風:${w.name}→${t}`); }); });
    }
    return options;
  },
  setAutoPlayState(autoPlay, autoAnim) {
    UnifiedLogger.setAutoPlayState(autoPlay, autoAnim);
  },
};

// ========================================
// AnomalyDetector - 異常検知システム
// トーナメント時のバグ検出・詳細ログ保存
// ========================================
const AnomalyDetector = {
  enabled: false,           // トーナメントモード時のみ有効
  anomalies: [],            // 検出した異常リスト
  currentGameLog: [],       // 現在のゲームの詳細ログ
  currentGameId: 0,         // 現在のゲームID
  currentGameMeta: null,    // ゲームメタ情報（プレイヤー等）
  summaryLines: [],         // サマリー用の1行記録
  effectPairCounts: {},     // 効果ペア発動回数（ターンごと）

  // 異常検出の閾値
  thresholds: {
    maxTurns: 80,           // ターン数上限
    maxHandSize: 15,        // 手札枚数上限
    maxPairLoops: 15,       // ペアループ回数上限
    maxEffectPairPerTurn: 3 // 1ターンあたりの効果ペア上限
  },

  // トーナメント開始
  startTournament() {
    this.enabled = true;
    this.anomalies = [];
    this.summaryLines = [];
    console.log('[AnomalyDetector] Tournament started');
  },

  // トーナメント終了
  endTournament() {
    this.enabled = false;
    console.log(`[AnomalyDetector] Tournament ended. Anomalies: ${this.anomalies.length}`);
  },

  // ゲーム開始
  startGame(gameId, players) {
    if (!this.enabled) return;
    this.currentGameId = gameId;
    this.currentGameLog = [];
    this.currentGameMeta = {
      gameId,
      players: players.map(p => p.name),
      startTime: new Date().toISOString()
    };
    this.effectPairCounts = {};
  },

  // ターンログ追加（メモリ節約のため最新100ターンのみ保持）
  logTurn(turnData) {
    if (!this.enabled) return;
    this.currentGameLog.push(turnData);
    if (this.currentGameLog.length > 100) {
      this.currentGameLog.shift();
    }
    // 効果ペアカウントをリセット（ターン開始時）
    this.effectPairCounts = {};
  },

  // 効果ペア発動を記録
  recordEffectPair(effectType, turnNum) {
    if (!this.enabled) return;
    const key = `T${turnNum}`;
    if (!this.effectPairCounts[key]) this.effectPairCounts[key] = {};
    this.effectPairCounts[key][effectType] = (this.effectPairCounts[key][effectType] || 0) + 1;

    // 閾値チェック
    if (this.effectPairCounts[key][effectType] >= this.thresholds.maxEffectPairPerTurn) {
      this.report('excessiveEffectPair', {
        turn: turnNum,
        effectType,
        count: this.effectPairCounts[key][effectType]
      });
    }
  },

  // ペアループ異常チェック
  checkPairLoop(loopCount, playerIndex) {
    if (!this.enabled) return;
    if (loopCount >= this.thresholds.maxPairLoops) {
      this.report('excessivePairLoop', {
        loopCount,
        player: playerIndex
      });
    }
  },

  // ターン数異常チェック
  checkTurnCount(turnCount) {
    if (!this.enabled) return;
    if (turnCount >= this.thresholds.maxTurns) {
      this.report('excessiveTurns', { turns: turnCount });
    }
  },

  // 手札枚数異常チェック
  checkHandSize(handSize, playerIndex) {
    if (!this.enabled) return;
    if (handSize >= this.thresholds.maxHandSize) {
      this.report('excessiveHandSize', {
        size: handSize,
        player: playerIndex
      });
    }
  },

  // 異常報告（詳細ログを保存）
  report(type, data) {
    if (!this.enabled) return;
    // 同じゲームで同じ種類の異常は1回だけ記録
    const existingAnomaly = this.anomalies.find(a =>
      a.gameId === this.currentGameId && a.type === type
    );
    if (existingAnomaly) return;

    const anomaly = {
      gameId: this.currentGameId,
      type,
      data,
      meta: { ...this.currentGameMeta },
      gameLog: [...this.currentGameLog],  // 詳細ログをコピー
      // NotationLoggerの現在のログもスナップショット（異常検知時点）
      notationSnapshot: typeof NotationLogger !== 'undefined' ? [...NotationLogger.logs] : []
    };
    this.anomalies.push(anomaly);
    console.warn(`[AnomalyDetector] Anomaly detected: ${type}`, data);
  },

  // ゲーム終了時のサマリー追加
  addGameSummary(result) {
    if (!this.enabled) return;
    const { gameId, players, winner, winReason, turns, destroyCount, windUsed } = result;
    const hasAnomaly = this.anomalies.some(a => a.gameId === gameId);
    const playerStr = players.map((p, i) => `P${i}`).join(',');
    const line = `G${String(gameId).padStart(3, '0')}: ${playerStr} → WINNER:P${winner}(${winReason}) T:${turns} D:${destroyCount} W:${windUsed}${hasAnomaly ? ' ⚠️ANOMALY' : ''}`;
    this.summaryLines.push(line);
  },

  // サマリー取得
  getSummary() {
    return this.summaryLines.join('\n');
  },

  // 異常ログ取得
  getAnomaliesLog() {
    if (this.anomalies.length === 0) return '';

    let output = '=== ANOMALIES DETECTED ===\n\n';
    this.anomalies.forEach((anomaly, idx) => {
      output += `--- Anomaly #${idx + 1} ---\n`;
      output += `Game: G${String(anomaly.gameId).padStart(3, '0')}\n`;
      output += `Type: ${anomaly.type}\n`;
      output += `Data: ${JSON.stringify(anomaly.data)}\n`;
      output += `Players: ${anomaly.meta.players.join(' vs ')}\n`;
      output += `\n[TURN LOG]\n`;
      output += anomaly.gameLog.join('\n');
      // NotationLoggerのスナップショットがあれば追加
      if (anomaly.notationSnapshot && anomaly.notationSnapshot.length > 0) {
        output += `\n\n[NOTATION LOG SNAPSHOT]\n`;
        output += anomaly.notationSnapshot.join('\n');
      }
      output += '\n\n';
    });
    return output;
  },

  // 異常があるかどうか
  hasAnomalies() {
    return this.anomalies.length > 0;
  }
};

// ========================================
// NotationLogger - 記法システム対応ログ（セット制改善版）
// トーナメントモード・統計追跡対応
// ========================================
const NotationLogger = {
  get version() { return VERSION.full; },
  logs: [],
  chatLogs: [],  // チャット履歴
  gameStartTime: null,
  currentTurn: 0,
  currentPhase: 'EX',
  playerNames: [],
  playerStrategies: [],
  summaryMode: false, // true: トーナメントサマリーのみ出力（ターン詳細を省略）

  // チャット発言を記録
  recordChat(playerIdx, playerName, message, turn) {
    const timestamp = new Date().toISOString();
    const elapsed = this.gameStartTime ? Math.floor((Date.now() - this.gameStartTime) / 1000) : 0;
    this.chatLogs.push({
      timestamp,
      elapsed,
      turn: turn || this.currentTurn,
      phase: this.currentPhase,
      playerIdx,
      playerName,
      message
    });
  },

  // チャット履歴を記法形式で出力
  formatChatLogs() {
    if (this.chatLogs.length === 0) return '';

    let output = '\n=== CHAT LOG ===\n';
    this.chatLogs.forEach(c => {
      const timeStr = `${Math.floor(c.elapsed / 60)}:${String(c.elapsed % 60).padStart(2, '0')}`;
      output += `[${timeStr}] T${c.turn} P${c.playerIdx}(${c.playerName}): ${c.message}\n`;
    });
    return output;
  },

  // カードID → 記法変換マップ
  CARD_NOTATION: {
    // 人物カード
    FAR: '[F]', MER: '[Me]', CAR: '[Ca]', TRV: '[T]', BUT: '[Bu]', MAI: '[M]',
    NOB: '[N]', KNI: '[K]', PRI: '[P]', SCH: '[S]',
    WIT: '[Wi]', HOL: '[Ho]',
    KIN: '[Ki]', QUE: '[Q]', HOR: '[Hr]', BAL: '[Bl]',
    // 家カード
    HOU: '{Ho}',
    // 風カード
    GHI: '<Gh>',
  },

  // カードID → 記法変換
  toNotation(cardOrId) {
    if (!cardOrId) return '?';
    const id = typeof cardOrId === 'string' ? cardOrId : cardOrId.id;
    return this.CARD_NOTATION[id] || `[${id}]`;
  },

  // 複数カードを記法に変換
  cardsToNotation(cards) {
    if (!cards || cards.length === 0) return '(none)';
    return cards.map(c => this.toNotation(c)).join('');
  },

  // 手札の記法表現（詳細スコア用）
  handToScoreDetail(hand) {
    const groups = { citizen: [], noble: [], special: [], house: [], wind: [] };
    hand.forEach(c => {
      if (c.category === 'citizen') groups.citizen.push(c);
      else if (c.category === 'noble') groups.noble.push(c);
      else if (c.category === 'special') groups.special.push(c);
      else if (c.category === 'house') groups.house.push(c);
      else if (c.category === 'wind') groups.wind.push(c);
    });

    const lines = [];
    const formatGroup = (name, cards) => {
      if (cards.length === 0) return `${name}: (none)`;
      const counts = {};
      cards.forEach(c => { counts[c.id] = (counts[c.id] || 0) + 1; });
      const parts = Object.entries(counts).map(([id, cnt]) => {
        const pts = cards.find(c => c.id === id)?.points || 0;
        return `${this.toNotation(id)}x${cnt}=${pts * cnt}`;
      });
      return `${name}: ${parts.join(', ')}`;
    };

    lines.push(formatGroup('CITIZEN', groups.citizen));
    lines.push(formatGroup('NOBLE', groups.noble));
    lines.push(formatGroup('SPECIAL', groups.special));
    lines.push(formatGroup('HOUSE', groups.house));
    lines.push(formatGroup('WIND', groups.wind));

    const total = hand.reduce((sum, c) => sum + (c.points || 0), 0);
    lines.push(`TOTAL: -${total}`);

    return lines;
  },

  // 手札の簡易記法（1行）
  handToSimple(hand) {
    if (!hand || hand.length === 0) return '(empty)';
    const counts = {};
    hand.forEach(c => { counts[c.id] = (counts[c.id] || 0) + 1; });
    const parts = Object.entries(counts).map(([id, cnt]) => {
      const pts = hand.find(c => c.id === id)?.points || 0;
      return `${this.toNotation(id)}x${cnt}=${pts * cnt}`;
    });
    return parts.join(', ');
  },

  // ログ追加（内部用）
  _add(line) {
    this.logs.push(line);
  },

  // コメント追加
  comment(text) {
    if (this.summaryMode) return; // サマリーモードではスキップ
    this._add(`; ${text}`);
  },

  // ゲーム開始を記録
  recordGameStart(players, market, firstPlayerIdx) {
    // ゲーム間の区切り
    if (this.logs.length > 0 && !this.summaryMode) {
      this._add('');
    }

    this.gameStartTime = new Date();
    this.currentTurn = 1;  // T1から開始
    this.currentPhase = 'EX';
    this._currentLine = null; // 前のゲームの未確定ラインをクリア
    this.playerNames = players.map(p => p.name);
    this.playerStrategies = players.map(p => p.strategy || {});

    // サマリーモードではスキップ（recordGameEndで1行出力）
    if (this.summaryMode) return;

    this._add('========================================');
    this._add(`=== GAME START (${VERSION.string}) ===`);
    this._add('========================================');
    this._add(`Date: ${this.gameStartTime.toISOString().slice(0, 19).replace('T', ' ')}`);

    // プレイヤー情報
    const playerInfo = players.map((p, i) => `P${i}(${p.name})`).join(' vs ');
    this._add(`Players: ${playerInfo}`);
    this._add(`First: P${firstPlayerIdx}`);

    // プレイヤー詳細（コメント）
    players.forEach((p, i) => {
      if (p.type === 'ai' && p.strategy) {
        const s = p.strategy;
        this.comment(`CRITICS: P${i}=${p.name} {speculativeHouse:${s.speculativeHouse || 50},speculativeWind:${s.speculativeWind || 50},storeThreshold:${s.storeThreshold || 3},attackTarget:${s.attackTarget || 'highValue'}}`);
      }
    });

    this._add('');

    // 市場
    const mktNotation = market.map(c => this.toNotation(c)).join('');
    this._add(`[MKT: ${mktNotation}]`);
    // v6.4: 荒屋廃止
    this._add('');
  },

  // 初期手札を記録
  recordInitialHands(players, initialPairs) {
    if (this.summaryMode) return; // サマリーモードではスキップ
    this._add('[INIT]');
    players.forEach((p, i) => {
      const pairInfo = initialPairs[i];
      if (pairInfo && pairInfo.length > 0) {
        const pairNotation = pairInfo.map(pair => `X ${this.toNotation(pair.cards[0])}${this.toNotation(pair.cards[0])}`).join(' ');
        this._add(`P${i}: 7 -> ${pairNotation} -> H:${p.hand.length}`);
      } else {
        this._add(`P${i}: 7 -> NO_PAIR -> H:${p.hand.length}`);
      }
    });
    this._add('');
  },

  // デッキ枚数を記録
  recordDeckCount(deckCount) {
    if (this.summaryMode) return; // サマリーモードではスキップ
    this._add(`DECK: ${deckCount}`);
    this._add('');
  },

  // フェーズヘッダーを記録
  recordPhaseHeader(phase) {
    this.currentPhase = phase === 'exploration' ? 'EX' : 'BB';
    if (this.summaryMode) return; // サマリーモードではスキップ
    const phaseName = phase === 'exploration' ? 'EXPLORATION' : 'BABANUKI';
    this._add('========================================');
    this._add(`=== ${phaseName} ===`);
    this._add('========================================');
    this._add('');
  },

  // ターン開始
  setTurn(turn, phase) {
    this.currentTurn = turn;
    this.currentPhase = phase === 'exploration' ? 'EX' : 'BB';
  },

  // 山札ドローを記録
  recordDeckDraw(playerIdx, card, handCount, isLast = false) {
    if (this.summaryMode) return; // サマリーモードではスキップ
    // 前のラインが未確定なら確定
    if (this._currentLine) {
      this.finishLine(this._currentLine.handCount, false, false);
    }

    const notation = this.toNotation(card);
    let line = `T${this.currentTurn} [${this.currentPhase}] P${playerIdx}: >> ${notation}`;
    if (isLast) line += ' LAST';
    // 結果は後で追加されるので、ここでは基本部分のみ
    this._currentLine = { base: line, playerIdx, handCount, actions: [] };
  },

  // プレイヤードローを記録
  recordPlayerDraw(playerIdx, targetIdx, card, cardIndex, handCount) {
    if (this.summaryMode) return; // サマリーモードではスキップ
    // 前のラインが未確定なら確定
    if (this._currentLine) {
      this.finishLine(this._currentLine.handCount, false, false);
    }

    const notation = this.toNotation(card);
    let line = `T${this.currentTurn} [${this.currentPhase}] P${playerIdx}: << P${targetIdx} ${notation}`;
    if (cardIndex !== undefined) line += ` @idx:${cardIndex}`;
    this._currentLine = { base: line, playerIdx, handCount, actions: [] };
  },

  // ペア捨てを記録（現在のラインに追加）
  recordPair(card) {
    if (!this._currentLine) return;
    const notation = this.toNotation(card);
    this._currentLine.actions.push(`X ${notation}${notation}`);
  },

  // v6.5: 効果ペア発動を記録
  recordEffectPair(card1, card2, effectType, gained) {
    if (!this._currentLine) return;
    const n1 = this.toNotation(card1);
    const n2 = this.toNotation(card2);
    const gainedStr = gained.map(c => this.toNotation(c)).join('');
    // v2.7.2: 商いの才覚はペアが市場へ
    const toMarket = effectType === 'merchantGift' ? ' -> MKT' : '';
    this._currentLine.actions.push(`X* ${n1}${n2} -> ${effectType}(${gainedStr})${toMarket}`);
  },

  // 家配置を記録（現在のラインに追加）
  recordHousePlace(houseCard, storedCard, isStall = false, marketExchange = null) {
    if (!this._currentLine) return;
    const houseNotation = this.toNotation(houseCard);
    const storedNotation = this.toNotation(storedCard);
    const visibility = isStall ? '!' : '?';

    if (isStall && marketExchange) {
      const sentNotation = this.toNotation(marketExchange.sent);
      const gotNotation = this.toNotation(marketExchange.got);
      this._currentLine.actions.push(`-> ${houseNotation} <-> [MKT] (${sentNotation}!->${gotNotation})`);
    } else {
      this._currentLine.actions.push(`-> ${houseNotation}(${storedNotation}${visibility})`);
    }
  },

  // 家取り出しを記録（現在のラインに追加）- v6.6.1: EMPTYマーク追加
  recordHouseRetrieve(houseCard, storedCard) {
    if (!this._currentLine) return;
    const houseNotation = this.toNotation(houseCard);
    const storedNotation = this.toNotation(storedCard);
    // v6.6.1: 屋台が空になることを明示
    this._currentLine.actions.push(`<- ${houseNotation}(${storedNotation}) EMPTY`);
  },

  // 風カード使用を記録（現在のラインに追加）
  recordWind(windCard, targetPlayerIdx, targetHouse, result, stolenCard = null) {
    if (!this._currentLine) return;
    const windNotation = this.toNotation(windCard);
    const houseNotation = this.toNotation(targetHouse.houseCard);
    const storedNotation = this.toNotation(targetHouse.storedCard);
    const visibility = targetHouse.houseCard.id === 'HOU' ? '?' : '!';

    let action = `${windNotation} @P${targetPlayerIdx}${houseNotation}(${storedNotation}${visibility})`;

    // v6.4: Ghibliは常に1発破壊＆強奪
    if (result === 'destroy') {
      action += ` DESTROY+STEAL +${this.toNotation(stolenCard)}`;
    }

    this._currentLine.actions.push(action);
  },

  // v6.6: カウンター成功を記録
  recordCounter(attackerIdx, defenderIdx, attackerWindCard, defenderWindCard) {
    if (!this._currentLine) return;
    const atkWind = this.toNotation(attackerWindCard);
    const defWind = this.toNotation(defenderWindCard);
    const action = `CTR P${attackerIdx}${atkWind}→P${defenderIdx}${defWind} BLOCKED`;
    this._currentLine.actions.push(action);
  },

  // v6.6.1: 空屋台への再格納を記録
  recordRefillStall(houseCard, storedCard, hasMarketExchange, exchangeInfo = null) {
    if (!this._currentLine) return;
    const houseNotation = this.toNotation(houseCard);
    const storedNotation = this.toNotation(storedCard);
    let action = `-> ${houseNotation}(empty) REFILL(${storedNotation})`;
    if (hasMarketExchange && exchangeInfo) {
      action += ` <-> [MKT] (${this.toNotation(exchangeInfo.sent)}!->${this.toNotation(exchangeInfo.got)})`;
    }
    this._currentLine.actions.push(action);
  },

  // 現在のラインを確定して出力
  finishLine(handCount, isWin = false, isPhaseTransition = false) {
    if (!this._currentLine) return;

    let line = this._currentLine.base;

    // アクションを追加
    if (this._currentLine.actions.length > 0) {
      line += ' ' + this._currentLine.actions.join(' ');
    }

    // 手札数
    line += ` -> H:${handCount}`;

    // フェーズ移行
    if (isPhaseTransition) {
      // 現在のラインのフェーズ表記を更新
      line = line.replace('[EX]', '[EX->BB]');
    }

    // 勝利
    if (isWin) {
      line += ' WIN #';
    }

    this._add(line);
    this._currentLine = null;
  },

  // AI意思決定をコメントで記録
  recordAiDecision(playerIdx, options, chosen, reason) {
    if (this.summaryMode) return; // サマリーモードではスキップ
    if (options && options.length > 0) {
      const optStr = options.slice(0, 3).map(o => `${o.type}(${o.score})`).join(', ');
      this.comment(`AI: P${playerIdx} options: ${optStr}`);
    }
    if (chosen && reason) {
      this.comment(`AI: P${playerIdx} chose ${chosen}, reason=${reason}`);
    }
  },

  // ドロー詳細をコメントで記録
  recordDrawDetail(playerIdx, targetIdx, handSize, cardIndex, rule) {
    if (this.summaryMode) return; // サマリーモードではスキップ
    this.comment(`DRAW: P${playerIdx} from P${targetIdx}, hand=[${handSize}], idx=${cardIndex}, rule=${rule}`);
  },

  // 状態をコメントで記録
  recordState(turn, deckCount, phase, playerHands, playerHouses) {
    if (this.summaryMode) return; // サマリーモードではスキップ
    this.comment(`STATE: turn=${turn}, deck=${deckCount}, phase=${phase}`);
    const handsStr = playerHands.map((h, i) => `P${i}.hand=${h}`).join(', ');
    this.comment(`STATE: ${handsStr}`);
  },

  // ターン終了時の全プレイヤー状態を詳細記録
  recordTurnEndState(turn, players, deckCount) {
    if (this.summaryMode) return; // サマリーモードではスキップ
    this._add(``);
    this._add(`; === TURN ${turn} END STATE ===`);

    players.forEach((p, i) => {
      // 手札の詳細
      const handCards = p.hand.map(c => this.toNotation(c)).join('');
      const handCount = p.hand.length;
      const charCount = p.hand.filter(c => c.type === 'character').length;
      const houseCardCount = p.hand.filter(c => c.type === 'house').length;
      const windCount = p.hand.filter(c => c.type === 'wind').length;

      // 家の詳細
      const houseDetails = p.houses.map((h, hIdx) => {
        const houseN = this.toNotation(h.houseCard);
        const storedN = h.storedCard ? this.toNotation(h.storedCard) : 'empty';
        const visible = h.houseCard.id !== 'HOU' ? '!' : '?';
        return `${houseN}(${storedN}${visible})`;
      }).join(' ');

      const handScore = p.hand.reduce((sum, c) => sum + (c.points || 0), 0);

      this._add(`; P${i}: hand=${handCount}[C:${charCount}/H:${houseCardCount}/W:${windCount}] ${handCards} | houses=${p.houses.length} ${houseDetails || '(none)'} | score=${handScore}`);
    });

    this._add(`; DECK: ${deckCount}`);
    this._add(``);
  },

  // 警告をコメントで記録
  recordWarning(message) {
    this.comment(`WARN: ${message}`);
  },

  // エラーをコメントで記録
  recordError(message) {
    this.comment(`ERROR: ${message}`);
  },

  // ゲーム終了を記録
  recordGameEnd(winnerIdx, condition, players, market, stats) {
    // 未確定のラインがあれば確定（勝者のラインの場合のみWIN #を付ける）
    if (this._currentLine) {
      const targetIdx = winnerIdx >= 0 ? winnerIdx : 0;
      const targetHand = players[targetIdx]?.hand?.length || 0;
      // 現在のラインのプレイヤーが勝者の場合のみ WIN # を付ける
      const isWinnerLine = winnerIdx >= 0 && this._currentLine.playerIdx === winnerIdx;
      this.finishLine(targetHand, isWinnerLine, false);
    }

    // サマリーモードでは簡易出力のみ
    if (this.summaryMode) {
      const conditionStr = condition === 'draw' ? 'DRAW' : (condition === 'stalemate' ? 'STALE' : 'AGARI');
      const playerStr = players.map((p, i) => `P${i}`).join(',');
      const turnsStr = stats ? `T:${stats.totalTurns}` : '';
      const destroyStr = stats && stats.destroyCount ? `D:${stats.destroyCount}` : '';
      const windStr = stats && stats.windUsed ? `W:${stats.windUsed}` : '';
      if (winnerIdx >= 0) {
        this._add(`G: ${playerStr} → P${winnerIdx}(${conditionStr}) ${turnsStr} ${destroyStr} ${windStr}`.trim());
      } else {
        this._add(`G: ${playerStr} → DRAW ${turnsStr} ${destroyStr} ${windStr}`.trim());
      }
      return;
    }

    this._add('');
    this._add('========================================');
    this._add('=== GAME END ===');
    this._add('========================================');
    this._add('');

    const conditionStr = condition === 'draw' ? 'DRAW' : (condition === 'stalemate' ? 'STALEMATE' : 'AGARI');
    if (condition === 'draw') {
      this._add(`RESULT: DRAW (no winner)`);
    } else {
      this._add(`WINNER: P${winnerIdx} (${conditionStr})`);
    }
    this._add('');

    // 最終状態
    this._add('[FINAL]');
    const mktNotation = market.map(c => this.toNotation(c)).join('');
    this._add(`MKT: ${mktNotation}`);
    // v6.4: 荒屋廃止
    this._add('');

    // 全プレイヤーの最終手札・家札を詳細記録
    this._add('[FINAL_HANDS]');
    players.forEach((p, i) => {
      const handCards = p.hand.map(c => this.toNotation(c)).join('') || '(empty)';
      const charCount = p.hand.filter(c => c.type === 'character').length;
      const houseCardCount = p.hand.filter(c => c.type === 'house').length;
      const windCount = p.hand.filter(c => c.type === 'wind').length;
      this._add(`P${i}: ${handCards} [C:${charCount}/H:${houseCardCount}/W:${windCount}]`);
    });
    this._add('');

    this._add('[FINAL_HOUSES]');
    players.forEach((p, i) => {
      if (p.houses.length === 0) {
        this._add(`P${i}: (none)`);
      } else {
        const houseDetails = p.houses.map((h, hIdx) => {
          const houseN = this.toNotation(h.houseCard);
          const storedN = h.storedCard ? this.toNotation(h.storedCard) : 'empty';
          const visible = h.houseCard.id !== 'HOU' ? '!' : '?';
          return `${houseN}(${storedN}${visible})`;
        }).join(' ');
        this._add(`P${i}: ${houseDetails}`);
      }
    });
    this._add('');

    // 詳細スコア
    this._add('[SCORE_DETAIL]');
    if (condition === 'draw') {
      // 引き分け時は全員のスコアを表示（得点移動なし）
      players.forEach((p, i) => {
        const score = p.hand.reduce((sum, c) => sum + (c.points || 0), 0);
        this._add(`P${i}: ${score} (DRAW - no change)`);
        const details = this.handToScoreDetail(p.hand);
        details.forEach(line => this._add(`  ${line}`));
        this._add('');
      });
    } else {
      let totalLoss = 0;
      players.forEach((p, i) => {
        if (i === winnerIdx) {
          this._add(`P${i}: (WIN)`);
        } else {
          const loss = p.hand.reduce((sum, c) => sum + (c.points || 0), 0);
          totalLoss += loss;
          this._add(`P${i}: -${loss}`);
          const details = this.handToScoreDetail(p.hand);
          details.forEach(line => this._add(`  ${line}`));
        }
        this._add('');
      });

      // 勝者の獲得点
      this._add(`P${winnerIdx}: +${totalLoss} (WIN)`);
      this._add(`  GAINED: ${totalLoss}`);
      this._add('');
    }

    // 統計
    if (stats) {
      this._add('[STATS]');
      this._add(`TURNS: ${stats.totalTurns} (EX:${stats.explorationTurns} BB:${stats.babanukiTurns})`);
      this._add(`DESTROY: ${stats.destroyCount || 0}`);
      this._add(`WIND_USED: ${stats.windUsed || 0}`);
      this._add(`HOUSE_PLACED: ${stats.housePlaced || 0}`);
      this._add(`MKT_EXCHANGES: ${stats.marketExchanges || 0}`);
    }

    this._add('');
    this._add('========================================');
  },

  // ログをエクスポート
  export() {
    // チャット履歴も含める
    return this.logs.join('\n') + this.formatChatLogs();
  },

  // ログをダウンロード
  download() {
    const content = this.export();
    const blob = new Blob([content], { type: 'text/plain; charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
    a.download = `pfff_notation_${timestamp}.txt`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  },

  // トーナメント用: ログファイル出力
  // - summary.txt: 常に出力（軽量サマリー）
  // - detailed.txt: 50試合以下の場合のみ追加出力（札の動きまで記録）
  // - anomalies.txt: 異常検出時のみ追加出力
  downloadTournamentLogs() {
    const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
    const isDetailed = !this.summaryMode; // summaryMode=falseなら詳細ログあり
    let fileIndex = 0;

    const downloadFile = (content, filename) => {
      const blob = new Blob([content], { type: 'text/plain; charset=utf-8' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = filename;
      document.body.appendChild(link);
      setTimeout(() => {
        link.click();
        document.body.removeChild(link);
      }, fileIndex * 150); // 連続ダウンロード対応
      fileIndex++;
    };

    // 1. サマリーファイル（常に出力）
    // 詳細ログの場合でもサマリー用に簡易版を生成
    if (isDetailed) {
      // 詳細ログからサマリーを抽出（ヘッダー + ゲーム結果1行 + TOURNAMENT SUMMARY全体）
      const lines = this.logs;
      const summaryLines = [];
      let inSummary = false;  // TOURNAMENT SUMMARYセクション内かどうか
      for (const line of lines) {
        // TOURNAMENT SUMMARYセクション開始
        if (line.startsWith('=== TOURNAMENT SUMMARY ===')) {
          inSummary = true;
          summaryLines.push(line);
        } else if (inSummary) {
          // SUMMARYセクション内は全て含める
          summaryLines.push(line);
        } else if (line.startsWith('=== TOURNAMENT') || line.startsWith('║') || line.startsWith('Date:') ||
            line.startsWith('Rounds:') || line.startsWith('Games:') || line.startsWith('Players:') ||
            line.startsWith('LogMode:') || line.startsWith('[PLAYERS]') || line.startsWith('P') && line.includes('=') && line.includes('{') ||
            line.startsWith('=== GAMES ===') || line === '========================================' || line === '') {
          summaryLines.push(line);
        } else if (line.startsWith('G:')) {
          // ゲーム結果行
          summaryLines.push(line);
        }
      }
      downloadFile(summaryLines.join('\n'), `pfff_summary_${timestamp}.txt`);
    } else {
      // サマリーモードの場合はそのまま出力
      downloadFile(this.export(), `pfff_summary_${timestamp}.txt`);
    }

    // 2. 詳細ファイル（50試合以下の場合のみ）
    if (isDetailed) {
      downloadFile(this.export(), `pfff_detailed_${timestamp}.txt`);
    }

    // 3. 異常ファイル（異常があれば出力）
    if (AnomalyDetector.hasAnomalies()) {
      downloadFile(AnomalyDetector.getAnomaliesLog(), `pfff_anomalies_${timestamp}.txt`);
    }
  },

  // ログをクリア
  clear() {
    this.logs = [];
    this.chatLogs = [];  // チャット履歴もクリア
    this._currentLine = null;
  },

  // トーナメント開始を記録
  // useDetailedLog: true=詳細ログ出力（50試合以下）、false=サマリーのみ
  recordTournamentStart(participants, rounds, totalGames, useDetailedLog = false) {
    this.logs = []; // トーナメント開始時はログをクリア
    this.chatLogs = [];  // チャット履歴もクリア
    this._currentLine = null;
    this.summaryMode = !useDetailedLog; // 50試合以下なら詳細ログ出力

    const versionStr = VERSION.string.padEnd(7);  // "v2.8.0" を7文字に
    const logModeStr = useDetailedLog ? 'DETAILED' : 'SUMMARY';
    this._add(`=== TOURNAMENT ${logModeStr} ===`);
    this._add(`║              TOURNAMENT MODE (${versionStr})                       ║`);

    this._add(`Date: ${new Date().toISOString().slice(0, 19).replace('T', ' ')}`);
    this._add(`Rounds: ${rounds}`);
    this._add(`Games: ${totalGames}`);
    this._add(`Players: ${participants.length}`);
    this._add(`LogMode: ${logModeStr}`);
    this._add('');

    // プレイヤー定義
    this._add('[PLAYERS]');
    participants.forEach((p, i) => {
      const stratStr = p.strategy ?
        `{sH:${p.strategy.speculativeHouse||50},sW:${p.strategy.speculativeWind||50},th:${p.strategy.storeThreshold||3},atk:${p.strategy.attackTarget||'highValue'}}` :
        '{human}';
      this._add(`P${i}=${p.name} ${stratStr}`);
    });
    this._add('');
    this._add('========================================');
    this._add('=== GAMES ===');
    this._add('========================================');
    this._add('');
  },

  // トーナメント終了サマリーを記録
  recordTournamentEnd(data) {
    // 未確定ラインがあれば確定
    if (this._currentLine) {
      this.finishLine(0, false, false);
    }
    this.summaryMode = false; // サマリーモード終了

    this._add('');
    this._add('=== TOURNAMENT SUMMARY ===');

    this._add('');

    // ランキング
    this._add('[RANK]');
    const ranking = Object.values(data.playerStats)
      .map(p => ({
        ...p,
        winRate: p.games > 0 ? (p.wins / p.games * 100).toFixed(1) : '0.0',
        avgPos: p.games > 0 ? ((p.positions[0]*1 + p.positions[1]*2 + p.positions[2]*3 + p.positions[3]*4) / p.games).toFixed(2) : '0.00'
      }))
      .sort((a, b) => b.totalScore - a.totalScore);

    ranking.forEach((p, i) => {
      const score = p.totalScore >= 0 ? `+${p.totalScore}` : `${p.totalScore}`;
      // P番号を特定
      const pIdx = data.participants.findIndex(pt => pt.name === p.name);
      this._add(`${i+1}. P${pIdx}: ${score} W:${p.wins} WR:${p.winRate}% AVG:${p.avgPos}`);
    });
    this._add('');

    // 戦略統計
    this._add('[STRAT]');
    const formatStrat = (stat) => {
      return Object.entries(stat)
        .map(([k, v]) => `${k}=${v.games > 0 ? (v.wins/v.games*100).toFixed(0) : 0}%`)
        .join(' ');
    };
    this._add(`house: ${formatStrat(data.strategyStats.housePreference)}`);
    this._add(`thresh: ${formatStrat(data.strategyStats.storeThreshold)}`);
    this._add(`attack: ${formatStrat(data.strategyStats.attackTarget)}`);
    this._add(`specH: ${formatStrat(data.strategyStats.speculativeHouse)}`);
    this._add(`specW: ${formatStrat(data.strategyStats.speculativeWind)}`);
    this._add('');

    // ゲーム性統計
    this._add('[GAME]');
    const gs = data.gameplayStats;
    const avgTurns = gs.turnCounts.length > 0 ?
      (gs.turnCounts.reduce((a,b)=>a+b,0) / gs.turnCounts.length).toFixed(1) : '0';
    this._add(`turns: ${avgTurns}avg`);

    const totalCond = gs.winConditions.agari + gs.winConditions.stalemate;
    if (totalCond > 0) {
      this._add(`cond: agari=${(gs.winConditions.agari/totalCond*100).toFixed(0)}% stale=${(gs.winConditions.stalemate/totalCond*100).toFixed(0)}%`);
    }

    const totalPos = gs.positionWins.reduce((a,b)=>a+b,0);
    if (totalPos > 0) {
      const posStr = gs.positionWins.map((w, i) => `P${i+1}=${(w/totalPos*100).toFixed(0)}%`).join(' ');
      this._add(`pos: ${posStr}`);
    }

    this._add(`reversals: ${gs.reversals} (${(gs.reversals/gs.totalGames*100).toFixed(1)}%)`);
    this._add(`close: ${gs.closeFinishes} (${(gs.closeFinishes/gs.totalGames*100).toFixed(1)}%)`);
    this._add('');

    // v6.6.1統計: カウンター・空屋台
    this._add('[v6.6.1 FEATURES]');
    const counterRate = gs.counterAttempts > 0 ?
      (gs.counterSuccess / gs.counterAttempts * 100).toFixed(1) : '0.0';
    this._add(`counter: ${gs.counterSuccess}/${gs.counterAttempts} (${counterRate}%)`);
    this._add(`emptyStall: created=${gs.emptyStallCreated} refilled=${gs.emptyStallRefilled} attacked=${gs.emptyStallAttacked} remaining=${gs.emptyStallRemaining}`);

    // 風/屋台枯渇統計
    if (gs.windExhaustedTurns.length > 0) {
      const avgWindExhaust = (gs.windExhaustedTurns.reduce((a,b)=>a+b,0) / gs.windExhaustedTurns.length).toFixed(1);
      const avgAfterWind = (gs.turnsAfterWindExhaust.reduce((a,b)=>a+b,0) / gs.turnsAfterWindExhaust.length).toFixed(1);
      this._add(`windExhaust: T${avgWindExhaust}avg (${gs.windExhaustedTurns.length} games), +${avgAfterWind}turns after`);
    } else {
      this._add(`windExhaust: never (all ${gs.totalGames} games)`);
    }
    if (gs.stallExhaustedTurns.length > 0) {
      const avgStallExhaust = (gs.stallExhaustedTurns.reduce((a,b)=>a+b,0) / gs.stallExhaustedTurns.length).toFixed(1);
      const avgAfterStall = (gs.turnsAfterStallExhaust.reduce((a,b)=>a+b,0) / gs.turnsAfterStallExhaust.length).toFixed(1);
      this._add(`stallExhaust: T${avgStallExhaust}avg (${gs.stallExhaustedTurns.length} games), +${avgAfterStall}turns after`);
    } else {
      this._add(`stallExhaust: never (all ${gs.totalGames} games)`);
    }
    this._add('');

    this._add('===');
  },

  // セットゲーム開始を記録（新セット制対応）
  recordSetStart(players, setConfig) {
    // セット開始時はログをクリア
    this.logs = [];
    this._currentLine = null;

    const { gamesPerSet, totalSets, currentSet } = setConfig;

    this._add('========================================');
    this._add(`=== SET ${currentSet} START (${VERSION.string}) ===`);
    this._add('========================================');
    this._add(`Date: ${new Date().toISOString().slice(0, 19).replace('T', ' ')}`);
    this._add(`Format: ${gamesPerSet} games/set, ${totalSets === 0 ? 'unlimited sets' : `${totalSets} set(s)`}`);
    this._add('');

    // プレイヤー定義
    this._add('[PLAYERS]');
    players.forEach((p, i) => {
      const stratStr = p.strategy ?
        `{sH:${p.strategy.speculativeHouse||50},sW:${p.strategy.speculativeWind||50},th:${p.strategy.storeThreshold||3},atk:${p.strategy.attackTarget||'highValue'}}` :
        (p.type === 'human' ? '{human}' : '{}');
      this._add(`P${i}=${p.name} ${stratStr}`);
    });
    this._add('');
    this._add('========================================');
    this._add('=== GAMES ===');
    this._add('========================================');
    this._add('');
  },

  // セットゲーム終了サマリーを記録（累積スコアで勝者判定）
  recordSetEnd(winnerIdx, players, winCount, cumulativeScores, setConfig) {
    // 未確定ラインがあれば確定
    if (this._currentLine) {
      this.finishLine(0, false, false);
    }

    const { gamesPerSet, currentSet } = setConfig;

    this._add('');
    this._add('========================================');
    this._add(`=== SET ${currentSet} END ===`);
    this._add('========================================');
    this._add(`Games: ${gamesPerSet}`);
    this._add('');

    // 累積スコア（勝敗判定の主要指標）
    this._add('[FINAL_SCORES]');
    const sortedPlayers = players.map((p, i) => ({
      idx: i,
      name: p.name,
      score: cumulativeScores[i] || 0,
      wins: winCount[i] || 0
    })).sort((a, b) => b.score - a.score);

    const winnerName = players[winnerIdx]?.name || `P${winnerIdx}`;
    this._add(`WINNER: P${winnerIdx} (${winnerName})`);
    this._add('');

    sortedPlayers.forEach((p, rank) => {
      const scoreStr = p.score >= 0 ? `+${p.score}` : `${p.score}`;
      const winnerMark = p.idx === winnerIdx ? ' ★' : '';
      this._add(`${rank + 1}. P${p.idx} (${p.name}): ${scoreStr} (${p.wins}W)${winnerMark}`);
    });
    this._add('');
    this._add('========================================');
  }
};

// UnifiedLogger.download - 統合ダウンロード関数
UnifiedLogger.download = function() {
  // 記法ログ（NotationLogger）を基本として出力
  let content = NotationLogger.export();
  
  // detailedモードの場合、デバッグログも追記
  if (this.mode === 'detailed' && this.debugLogs.length > 0) {
    content += '\n\n========================================\n';
    content += '=== DEBUG LOG ===\n';
    content += '========================================\n\n';
    content += this.debugLogs.join('\n');
  }
  
  // AI学習データを追記（常に出力）
  content += '\n\n========================================\n';
  content += '=== AI LEARNING SUMMARY (CSV) ===\n';
  content += '========================================\n\n';
  content += AILearningSystem.exportCSV();
  
  content += '\n\n========================================\n';
  content += '=== AI LEARNING DETAIL (JSON) ===\n';
  content += '========================================\n\n';
  content += JSON.stringify(AILearningSystem.exportAll(), null, 2);
  
  const blob = new Blob([content], { type: 'text/plain; charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
  const modeSuffix = this.mode === 'detailed' ? '_detailed' : '';
  a.download = `pfff_log_${timestamp}${modeSuffix}.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
};

// Unit System (UI_SPEC_v2準拠)
// v2.5.7: スケーリング対応 - 画面サイズに応じてユニットサイズを動的に変更
const UNIT_BASE = {
  X: 8,    // 基準ユニット横 = 8px
  Y: 14,   // 基準ユニット縦 = 14px
};

// 現在のスケール（1.0 = 基準サイズ）
let currentUnitScale = 1.0;

const UNIT = {
  get X() { return UNIT_BASE.X * currentUnitScale; },
  get Y() { return UNIT_BASE.Y * currentUnitScale; },
  // ユニット→ピクセル変換（スケール適用）
  toPixelX: (u) => u * UNIT_BASE.X * currentUnitScale,
  toPixelY: (u) => u * UNIT_BASE.Y * currentUnitScale,
  // ピクセル→ユニット変換（スケール適用）
  toUnitX: (px) => px / (UNIT_BASE.X * currentUnitScale),
  toUnitY: (px) => px / (UNIT_BASE.Y * currentUnitScale),
  // 基準値でのピクセル→ユニット変換（スケール計算用）
  toUnitXBase: (px) => px / UNIT_BASE.X,
  toUnitYBase: (px) => px / UNIT_BASE.Y,
};

};

// v2.5.8.3: 記録された最大スクリーンサイズ（メモリ内キャッシュ）
