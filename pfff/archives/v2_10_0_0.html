// v2.5.8.3: 画面サイズ取得（キーボード表示の影響を受けない安定版）
const getEffectiveScreenSize = () => {
  const touch = isTouchDevice();
  
  // 現在のサイズを取得
  let currentW = window.innerWidth;
  let currentH = window.innerHeight;
  
  // 横向きに正規化（大きい方を幅、小さい方を高さ）
  if (currentH > currentW) {
    [currentW, currentH] = [currentH, currentW];
  }
  
  if (touch) {
    // タッチデバイスの場合
    
    // screenサイズも取得（参考値）
    const screenW = Math.max(screen.width, screen.height);
    const screenH = Math.min(screen.width, screen.height);
    
    // キャッシュより大きいサイズが検出されたら更新
    if (currentW > maxScreenSizeCache.w || currentH > maxScreenSizeCache.h) {
      maxScreenSizeCache.w = Math.max(maxScreenSizeCache.w, currentW);
      maxScreenSizeCache.h = Math.max(maxScreenSizeCache.h, currentH);
      saveMaxScreenSize(maxScreenSizeCache.w, maxScreenSizeCache.h);
    }
    
    // screenサイズでも更新を試みる（初回起動時に役立つ）
    if (screenW > maxScreenSizeCache.w || screenH > maxScreenSizeCache.h) {
      maxScreenSizeCache.w = Math.max(maxScreenSizeCache.w, screenW);
      maxScreenSizeCache.h = Math.max(maxScreenSizeCache.h, screenH);
      saveMaxScreenSize(maxScreenSizeCache.w, maxScreenSizeCache.h);
    }
    
    // キャッシュがあり、現在のサイズが小さい場合（キーボード表示中など）はキャッシュを使用
    if (maxScreenSizeCache.w > 0 && maxScreenSizeCache.h > 0) {
      if (currentH < maxScreenSizeCache.h * 0.8) {
        // 高さが80%以下 → キーボード表示中と推定
        return { width: maxScreenSizeCache.w, height: maxScreenSizeCache.h };
      }
    }
    
    return { width: currentW, height: currentH };
  }
  
  // PC: そのまま返す
  return { width: currentW, height: currentH };
};

// v2.5.7.8: スケーリング設定（画面いっぱいに使う方式）
const SCALING_CONFIG = {
  minScale: 0.55,     // 最小スケール - はみ出し防止のため控えめに
  maxScale: 1.0,      // 最大スケール（これ以上にはしない）
  targetBoardW: 100,  // 目標盤面幅（U）- 100U×8px=800px基準
  targetBoardH: 53,   // 目標盤面高さ（U）- 53U×14px=742px基準（standardサイズ用）
};

// v2.5.7.1: ユニットスケールを計算して適用（画面いっぱいに使う）
const calcAndApplyUnitScale = (windowWidth, windowHeight) => {
  const borderPx = 2;
  
  // 画面に収まる最大スケールを計算
  // スケール = 画面サイズ / (目標ユニット数 × 基準ユニットpx)
  const scaleW = (windowWidth - borderPx) / (SCALING_CONFIG.targetBoardW * UNIT_BASE.X);
  const scaleH = (windowHeight - borderPx) / (SCALING_CONFIG.targetBoardH * UNIT_BASE.Y);
  
  // 縦横両方が収まるスケールを採用（小さい方）
  let scale = Math.min(scaleW, scaleH);
  
  // スケール制限
  scale = Math.min(SCALING_CONFIG.maxScale, Math.max(SCALING_CONFIG.minScale, scale));
  
  // スケールを適用
  currentUnitScale = scale;
  
  // CSS変数を更新
  const root = document.documentElement;
  root.style.setProperty('--unit-x', `${UNIT_BASE.X * scale}px`);
  root.style.setProperty('--unit-y', `${UNIT_BASE.Y * scale}px`);
  
  
  return scale;
};

// ウィンドウサイズから最適な盤面サイズを計算
const calcOptimalBoardSize = (windowWidth, windowHeight) => {
  // v2.5.7: まずスケーリングを適用
  const scale = calcAndApplyUnitScale(windowWidth, windowHeight);
  
  // v2.4.7: padding 0、borderのみ考慮
  const borderPx = 2; // ボーダー幅 (1px × 2)
  
  // スケール適用後のユニットサイズで計算
  const availableW = Math.floor((windowWidth - borderPx) / UNIT.X);
  const availableH = Math.floor((windowHeight - borderPx) / UNIT.Y);
  
  // v2.5.7.18: アスペクト比制限（2.5〜4.5）
  const MIN_ASPECT = 2.5;  // 最大膨隆（縦長限界）
  const MAX_ASPECT = 4.5;  // 最大扁平（横長限界）- Xperia 21:9対応
  
  let boardW = Math.min(BOARD_LIMITS.maxW, Math.max(BOARD_LIMITS.minW, availableW));
  let boardH = Math.min(BOARD_LIMITS.maxH, Math.max(BOARD_LIMITS.minH, availableH));
  
  const aspect = boardW / boardH;
  
  if (aspect > MAX_ASPECT) {
    // 横長すぎ → 横を縮小（縦に合わせる）
    boardW = Math.floor(boardH * MAX_ASPECT);
    boardW = Math.max(BOARD_LIMITS.minW, boardW);
  } else if (aspect < MIN_ASPECT) {
    // 縦長すぎ → 縦を縮小（横に合わせる）
    boardH = Math.floor(boardW / MIN_ASPECT);
    boardH = Math.max(BOARD_LIMITS.minH, boardH);
  }
  
  
  return { boardW, boardH };
};

// v2.4.7: 初回適用フラグ
let boardSizeLocked = false;

// CSS変数を更新して盤面サイズを適用
const applyBoardSize = (widthU, heightU) => {
  // v2.4.7: 初回適用後はロック（リサイズや再計算を防止）
  if (boardSizeLocked) {
    return currentBoardSize;
  }
  
  const root = document.documentElement;
  
  // 現在のサイズを更新
  currentBoardSize = { w: widthU, h: heightU };
  
  // ============================================
  // 横幅レイアウト計算
  // ============================================
  
  // 1. プレイヤーブロック幅 = (総横幅 / 2) - 1.5U
  const newPlayerBlockW = (widthU / 2) - 1.5;
  
  // 2. 家行: 家エリアと吹き出しの持ち幅 = (ブロック幅 - 1U) / 2
  //    端数は家エリア優先
  const houseAndChatBase = (newPlayerBlockW - 1) / 2;
  const newHouseAreaW = Math.ceil(houseAndChatBase);   // 家エリア（切り上げ）
  const newChatBoxW = Math.floor(houseAndChatBase);    // 吹き出し（切り捨て）
  
  // 3. 手札行: 手札エリア = ブロック幅 - 1U(間隔) - カード幅(引札)
  // ※カードサイズは後で確定するので、ここでは暫定値。後で再計算
  let newHandAreaW = newPlayerBlockW - 11;  // 暫定: Standard基準
  
  // P1/P0用: 吹き出し左端 = 家エリア + 1U間隔
  const newChatLeftP0P1 = newHouseAreaW + 1;
  
  // P2/P3用: 家エリア左端 = 吹き出し + 1U間隔
  const newHouseLeftP2P3 = newChatBoxW + 1;
  
  // ============================================
  // 横幅いっぱい用（2人/3人モード）
  // ============================================
  const fullBlockW = widthU - 2;
  const fullHouseAndChatBase = (fullBlockW - 1) / 2;
  const fullHouseAreaW = Math.ceil(fullHouseAndChatBase);
  const fullChatBoxW = Math.min(35, Math.floor(fullHouseAndChatBase)); // 最大35U
  let fullHandAreaW = fullBlockW - 11;  // 暫定: Standard基準
  
  // ============================================
  // 中央行レイアウト
  // ============================================
  
  // 左ゾーン: [1U空き] [タイトル34U] [山札エリア]
  const titleW = 34;
  const leftZoneW = newPlayerBlockW;
  
  // v2.6.0: 右ゾーン: [0.5U空き] [市場] [1U空き]（ログエリア廃止）
  const rightZoneW = newPlayerBlockW;

// useBoardSize フック（Reactコンポーネント用）
const useBoardSize = () => {
  const [boardSize, setBoardSize] = useState({
    boardW: BOARD_LIMITS.defaultW,
    boardH: BOARD_LIMITS.defaultH
  });
  
  useEffect(() => {
    const isTouch = isTouchDevice();
    
    // v2.5.10.0: 初期ブレークポイントを設定
    const { width: initialW, height: initialH } = getEffectiveScreenSize();
    currentBreakpoint = pickBreakpoint(Math.max(initialW, initialH));
    currentOrientation = getOrientation();
    
    // 旧形式のキャッシュをクリア（移行用、一度だけ）
    clearLegacyCache();
    
    
    // v2.5.10.0: debounce関数
    const debounce = (fn, wait) => {
      let timer = null;
      return (...args) => {
        if (timer) clearTimeout(timer);
        timer = setTimeout(() => fn(...args), wait);
      };
    };
    
    // v2.5.10.0: ブレークポイント変更時の処理
    const handleBreakpointChange = () => {
      const { width, height } = getEffectiveScreenSize();
      const newBreakpoint = pickBreakpoint(Math.max(width, height));
      const newOrientation = getOrientation();
      
      // ブレークポイントまたはorientationが変わった場合のみ再計算
      if (newBreakpoint !== currentBreakpoint || newOrientation !== currentOrientation) {
        
        currentBreakpoint = newBreakpoint;
        currentOrientation = newOrientation;
        
        // ロックを解除して再計算
        boardSizeLocked = false;
        const { boardW, boardH } = calcOptimalBoardSize(width, height);
        applyBoardSize(boardW, boardH);
        setBoardSize({ boardW, boardH });
        
        // 新しいブレークポイント用のキャッシュを保存
        const cacheKey = getLayoutCacheKey(newBreakpoint, newOrientation);
        saveLayoutCache(cacheKey, { scale: currentUnitScale, boardW, boardH });
      }
    };
    
    // v2.5.10.0: resizeハンドラ（150msデバウンス）
    const debouncedResize = debounce(handleBreakpointChange, 150);
    
    // 初回サイズ設定
    const checkAndSetSize = () => {
      if (boardSizeLocked) {
        setBoardSize({ boardW: currentBoardSize.w, boardH: currentBoardSize.h });
      } else {
        requestAnimationFrame(checkAndSetSize);
      }
    };
    checkAndSetSize();
    
    // v2.5.10.0: タッチデバイスでもresizeリスナーを追加（ブレークポイント変更検知用）
    window.addEventListener('resize', debouncedResize);
    
    // orientationchangeイベントも監視（iOS Safari用）
    window.addEventListener('orientationchange', () => {
      // orientationchange後に少し待ってからサイズを再取得
      setTimeout(debouncedResize, 300);
    });
    
    return () => {
      window.removeEventListener('resize', debouncedResize);
    };
  }, []);
  
  return boardSize;
};

// 動的pitch計算（ユニット単位）
// 手札カードの配置間隔を計算
// - 余裕がある場合: カード幅 + 1U間隔
// - 重なり始める場合: 等幅配置
// - 重なり限界: 最小間隔1U確保、はみ出し許可
const calcCardPitch = (cardCount, areaWidthU, cardWidthU, minGapU = 1) => {
  if (cardCount <= 1) return 0;

  // カード幅 + 1U間隔で並べた場合の必要幅
  const widthWithGap = cardWidthU + (cardWidthU + minGapU) * (cardCount - 1);

  if (widthWithGap <= areaWidthU) {
    // 余裕あり: カード幅 + 1U間隔
    return UNIT.toPixelX(cardWidthU + minGapU);
  }

  // 等幅配置（ピクセル計算）
  const areaWidthPx = UNIT.toPixelX(areaWidthU);
  const cardWidthPx = UNIT.toPixelX(cardWidthU);
  const pitch = (areaWidthPx - cardWidthPx) / (cardCount - 1);

  // 最小間隔1U確保（それ以下ならはみ出し許可）
  const minGapPx = UNIT.toPixelX(minGapU);
  if (pitch < minGapPx) {
    return minGapPx;
  }

  return pitch;
};

// ドロールール設定 ★ ドロー方式変更時はここを編集
const DRAW_RULES = {
  FREE: 'free',           // 自由ドロー（現行）
  CLOCKWISE: 'clockwise', // 右回り順引き
};
const CURRENT_DRAW_RULE = DRAW_RULES.FREE; // ← ルール変更時はここ

// ============================================
// ドロールールエンジン
// ============================================
const DrawRuleEngine = {
  // 現在のルールを取得
  getRule: () => CURRENT_DRAW_RULE,

  // ドロー可能なプレイヤーを取得（ババ抜きフェーズ用）
  getValidTargets: (currentIdx, players, excludeSingleCard = true) => {
    const rule = CURRENT_DRAW_RULE;
    const numPlayers = players.length;

    // 手札条件でフィルタ（手札1枚は除外、全員1枚以下なら手札ありを許可）
    let candidates = players.filter((p, i) => i !== currentIdx && p.hand.length > (excludeSingleCard ? 1 : 0));
    if (candidates.length === 0 && excludeSingleCard) {
      candidates = players.filter((p, i) => i !== currentIdx && p.hand.length > 0);
    }
    if (candidates.length === 0) return [];

    if (rule === DRAW_RULES.FREE) {
      // 自由ドロー: 全ての有効プレイヤーを返す
      return candidates;
    } else if (rule === DRAW_RULES.CLOCKWISE) {
      // 順引き: 右隣（次のインデックス）から時計回りに探す
      for (let offset = 1; offset < numPlayers; offset++) {
        const nextIdx = (currentIdx + offset) % numPlayers;
        const nextPlayer = players[nextIdx];
        if (candidates.some(c => c.id === nextPlayer.id)) {
          return [nextPlayer];
        }
      }
      return [];
    }
    return candidates;
  },

  // AI用: ドロー対象を選択（戦略パラメータ対応）
  selectTarget: (currentIdx, players, strategy = {}) => {
    const targets = DrawRuleEngine.getValidTargets(currentIdx, players);
    if (targets.length === 0) return null;
    if (targets.length === 1) return targets[0];

    if (CURRENT_DRAW_RULE === DRAW_RULES.FREE) {
      const { drawTargetPref = 'mostCards' } = strategy;

      switch (drawTargetPref) {
        case 'mostCards':
          // 手札最多を選択
          return targets.reduce((best, cur) => cur.hand.length > best.hand.length ? cur : best);

        case 'leastCards':
          // 手札最少を選択（追い込む）
          return targets.reduce((best, cur) => cur.hand.length < best.hand.length ? cur : best);

        case 'leader':
          // リーダー（累計スコア最高）を狙う - スコアがない場合は手札最少
          // 注: playersにscoreがある前提、なければ手札最少にフォールバック
          if (targets[0].cumulativeScore !== undefined) {
            return targets.reduce((best, cur) =>
              (cur.cumulativeScore || 0) > (best.cumulativeScore || 0) ? cur : best);
          }
          return targets.reduce((best, cur) => cur.hand.length < best.hand.length ? cur : best);

        case 'random':
        default:
          // ランダム
          return targets[Math.floor(Math.random() * targets.length)];
      }
    } else {
      // 順引き: 唯一の候補を返す
      return targets[0];
    }
  },

  // AI用: カードインデックス選択（戦略パラメータ対応）
  selectCardIndex: (targetHand, strategy = {}) => {
    if (CURRENT_DRAW_RULE === DRAW_RULES.FREE) {
      const { drawPositionPref = 'random' } = strategy;
      const len = targetHand.length;

      switch (drawPositionPref) {
        case 'left':
          // 左端（配列の最初）
          return 0;

        case 'right':
          // 右端（配列の最後）
          return len - 1;

        case 'center':
          // 中央（±1のランダム）
          const center = Math.floor(len / 2);
          const offset = len > 2 ? Math.floor(Math.random() * 3) - 1 : 0;
          return Math.max(0, Math.min(len - 1, center + offset));

        case 'random':
        default:
          // ランダム
          return Math.floor(Math.random() * len);
      }
    } else {
      // 順引き: 右端（配列の最後）
      return targetHand.length - 1;
    }
  },

  // UI用: クリック可能判定
  isClickable: (currentIdx, targetIdx, players) => {
    const targets = DrawRuleEngine.getValidTargets(currentIdx, players);
    return targets.some(t => players.indexOf(t) === targetIdx);
  },

  // UI用: 順引きモードで引くカードのインデックスを返す（-1なら自由）
  getRequiredCardIndex: (targetHand) => {
    if (CURRENT_DRAW_RULE === DRAW_RULES.CLOCKWISE) {
      return targetHand.length - 1; // 右端
    }
    return -1; // 自由
  },
};

// 風カード効果エンジン（v7.0ルール対応）
// ============================================
const WindEffectEngine = {
  // 風カード効果を取得
  getEffect: (effectId) => WIND_EFFECTS[effectId] || null,

  // 家カード特性を取得
  getHouseProperty: (houseId) => HOUSE_PROPERTIES[houseId] || null,

  // 風カードが対象の家を攻撃できるか判定
  // v6.4: stealで家(HOU)を1発破壊
  canTarget: (effectId, houseCardId) => {
    const effect = WIND_EFFECTS[effectId];
    const houseProp = HOUSE_PROPERTIES[houseCardId];

    if (!effect || !houseProp) return false;

    // v6.4: stealは家を直接破壊
    if (effectId === 'steal') {
      return houseProp.canBeDestroyed;
    }

    return false;
  },

  // 効果がアクションを消費するか
  consumesAction: (effectId) => {
    return true;
  },

  // 効果が家を「破壊」するか
  // v6.4: 全ての家が1発破壊
  destroysHouse: (effectId, houseCardId) => {
    if (effectId !== 'steal') return false;
    const houseProp = HOUSE_PROPERTIES[houseCardId];
    return houseProp?.canBeDestroyed || false;
  },

  // AI用: 風カードの効果評価
  // v6.4: 1発破壊のみ
  evaluateForAI: (effectId, context) => {
    const { storedCard, targetHouseId } = context;
    const storedPoints = storedCard?.points || 0;
    const houseProp = HOUSE_PROPERTIES[targetHouseId];

    if (effectId !== 'steal') return 0;

    if (houseProp?.canBeDestroyed) {
      // v6.4: 即破壊＆強奪
      return storedPoints * 2;
    }

    return 0;
  },
};

const calcFlyShadow = (flyZ) => {
  // カードサイズに応じたスケール係数（standardを1.0として）
  const scaleFactors = {
    xl: 1.4, large: 1.3, medium: 1.2, standard: 1.0,
    small: 0.9, mini: 0.8, tiny: 0.7, burn: 0.6
  };
  const scale = scaleFactors[currentCardSize] || 1.0;
  
  // 基準サイズをスケーリング
  const s = (base) => Math.round(base * scale);
  
  if (flyZ === 0) return `${s(1)}px ${s(1)}px 0px rgba(45, 21, 24, 0.15)`;
  if (flyZ === 1) return `${s(2)}px ${s(2)}px ${s(2)}px rgba(45, 21, 24, 0.12)`;
  if (flyZ === 2) return `${s(4)}px ${s(4)}px ${s(4)}px rgba(45, 21, 24, 0.10)`;
  if (flyZ >= 3) return `${s(6)}px ${s(6)}px ${s(6)}px rgba(45, 21, 24, 0.08)`;
  return `${s(1)}px ${s(1)}px 0px rgba(45, 21, 24, 0.15)`;
};

const COMPANION = {
  id: 'nobby',
  emoji: '🎩',
  getName: () => T.ui.companion?.name || 'Nobby',
  
  // 配列からランダムに1つ選択
  pickRandom: (arr) => {
    if (!arr || arr.length === 0) return null;
    return arr[Math.floor(Math.random() * arr.length)];
  },
  
  // ターン開始時（探索フェーズ）のアドバイス
  getTurnStartExplore: () => {
    const c = T.ui.companion;
    return COMPANION.pickRandom(c.turnStartExplore);
  },
  
  // ターン開始時（ババ抜きフェーズ）のアドバイス
  getTurnStartBabanuki: (players, myIdx = 0) => {
    const c = T.ui.companion.turnStartBabanuki;
    const others = players.filter((p, i) => i !== myIdx && p.hand.length > 0);
    
    if (others.length === 0) return null;
    
    // 1人しかいない場合
    if (others.length === 1) {
      const target = others[0];
      return COMPANION.pickRandom(c.onlyOne(target.name));
    }
    
    // 手札数を分析
    const handCounts = others.map(p => ({ name: p.name, count: p.hand.length }));
    const maxCards = Math.max(...handCounts.map(h => h.count));
    const minCards = Math.min(...handCounts.map(h => h.count));
    const totalCards = handCounts.reduce((sum, h) => sum + h.count, 0);
    
    // ランダムに状況を選択（バリエーション確保）
    const situations = [];
    
    // 手札が多い人がいる
    if (maxCards >= 4) {
      const target = handCounts.find(h => h.count === maxCards);
      situations.push(() => COMPANION.pickRandom(c.manyCards(target.name, target.count)));
    }
    
    // 手札が少ない人がいる
    if (minCards <= 2 && minCards < maxCards) {
      const target = handCounts.find(h => h.count === minCards);
      situations.push(() => COMPANION.pickRandom(c.fewCards(target.name, target.count)));
    }
    
    // 終盤（総カード数が少ない）
    if (totalCards <= 6) {
      situations.push(() => COMPANION.pickRandom(c.endGame));
    }
    
    // 汎用は常に候補に
    situations.push(() => COMPANION.pickRandom(c.generic));
    situations.push(() => COMPANION.pickRandom(c.generic)); // 汎用の確率を上げる
    
    // ランダムに状況を選んで実行
    const chosen = COMPANION.pickRandom(situations);
    return chosen ? chosen() : COMPANION.pickRandom(c.generic);
  },
  
  // 家カード選択時のアドバイス
  getHouseSelectAdvice: (hand) => {
    const c = T.ui.companion.houseSelect;
    const situations = [];
    
    // 魔女を持っている
    const witch = hand.find(card => card.id === 'WIT');
    if (witch) {
      situations.push(() => COMPANION.pickRandom(c.witch));
    }
    
    // 聖母を持っている
    const holy = hand.find(card => card.id === 'HOL');
    if (holy) {
      situations.push(() => COMPANION.pickRandom(c.holy));
    }
    
    // 高得点キャラ（5点以上）を持っている
    const highScoreChar = hand.find(card => card.type === 'character' && card.score >= 5);
    if (highScoreChar) {
      situations.push(() => COMPANION.pickRandom(c.highScore(highScoreChar.name, highScoreChar.score)));
    }
    
    // 汎用
    situations.push(() => COMPANION.pickRandom(c.generic));
    
    const chosen = COMPANION.pickRandom(situations);
    return chosen ? chosen() : COMPANION.pickRandom(c.generic);
  },
  
  // 屋台カード選択時のアドバイス
  getStallSelectAdvice: (hand) => {
    const c = T.ui.companion.stallSelect;
    
    // 低得点キャラ（2点以下）を持っている
    const lowScoreChar = hand.find(card => card.type === 'character' && card.score <= 2);
    if (lowScoreChar && Math.random() < 0.5) {
      return COMPANION.pickRandom(c.hasLowScore(lowScoreChar.name));
    }
    
    return COMPANION.pickRandom(c.generic);
  },
  
  // 風カード選択時のアドバイス
  getWindSelectAdvice: (players, myIdx = 0) => {
    const c = T.ui.companion.windSelect;
    const situations = [];
    
    // v6.4: 家を持っている相手がいる
    for (const p of players) {
      if (p.houses && p.houses.length > 0) {
        situations.push(() => COMPANION.pickRandom(c.seeStall(p.name)));
        break;
      }
    }
    
    // ランダムに怪しいと言う
    const others = players.filter((p, i) => i !== myIdx && p.houses && p.houses.length > 0);
    if (others.length > 0 && Math.random() < 0.3) {
      const target = COMPANION.pickRandom(others);
      situations.push(() => COMPANION.pickRandom(c.suspicious(target.name)));
    }
    
    // 汎用
    situations.push(() => COMPANION.pickRandom(c.generic));
    
    const chosen = COMPANION.pickRandom(situations);
    return chosen ? chosen() : COMPANION.pickRandom(c.generic);
  },
  
  // 特殊カードを引いた時のアドバイス
  getDrewSpecialAdvice: (card) => {
    const c = T.ui.companion.drewSpecial;
    if (!c) return null;
    
    if (card.id === 'WIT') return COMPANION.pickRandom(c.witch);
    if (card.id === 'HOL') return COMPANION.pickRandom(c.holy);
    if (card.type === 'house') return COMPANION.pickRandom(c.house);
    if (card.type === 'wind') return COMPANION.pickRandom(c.wind);
    
    return null;
  },
  
  // ========================================
  // Phase 1: AIの発言への反応（読み解きヒント）
  // ========================================
  getReactionToSpeech: (category, speakerName) => {
    const c = T.ui.companion.speechReaction;
    if (!c) return null;
    
    // カテゴリごとの確率設定
    const probabilities = {
      good: 0.35,
      bad: 0.30,
      pair: 0.25,
      house: 0.45,  // 重要
      wind: 0.55,   // とても重要
      danger: 0.40,
      bluff: 0.35,
    };
    
    const prob = probabilities[category] || 0.25;
    if (Math.random() > prob) return null;
    
    const messages = c[category];
    if (!messages || messages.length === 0) return null;
    
    return COMPANION.pickRandom(messages);
  },
  
  // ========================================
  // Phase 2: 戦略的指南（好機検知）
  // ========================================
  
  // 風カードの好機を検知
  detectWindOpportunity: (players, myIdx, myHand) => {
    const c = T.ui.companion.strategicAdvice;
    if (!c || !c.windChance) return null;
    
    // 風カードを持っているか
    const windCard = myHand.find(card => card.type === 'wind');
    if (!windCard) return null;
    
    const opportunities = [];
    
    // 他プレイヤーの屋台をチェック
    for (let i = 0; i < players.length; i++) {
      if (i === myIdx) continue;
      const p = players[i];
      if (!p.houses) continue;
      
      for (const house of p.houses) {
        // v6.4: 全ての家が公開（中身が見える）
        if (HOUSE_PROPERTIES[house.houseCard.id]?.isVisible && house.storedCard) {
          opportunities.push({
            type: 'stall',
            playerIdx: i,
            playerName: p.name,
            houseIdx: p.houses.indexOf(house),
            houseName: house.houseCard.name,
            storedCard: house.storedCard,
            message: c.windChance.stallTarget(p.name, house.storedCard.name),
            score: house.storedCard.score || 0,
          });
        }
      }
    }
    
    // 最も高得点の機会を返す
    if (opportunities.length > 0) {
      opportunities.sort((a, b) => b.score - a.score);
      return opportunities[0];
    }
    
    return null;
  },
  
  // 家カードの好機を検知（危険カードを持っている時）
  detectHouseOpportunity: (myHand, myHouses) => {
    const c = T.ui.companion.strategicAdvice;
    if (!c || !c.houseChance) return null;
    
    // 家カードを持っているか
    const houseCard = myHand.find(card => card.type === 'house');
    if (!houseCard) return null;
    
    // 魔女を持っている場合
    const witch = myHand.find(card => card.id === 'WIT');
    if (witch) {
      return {
        type: 'witch',
        card: witch,
        houseCard: houseCard,
        message: c.houseChance.witchDanger,
      };
    }
    
    // 高得点カード（5点以上）を持っている場合
    const highScoreCard = myHand.find(card => card.type === 'character' && card.score >= 5);
    if (highScoreCard) {
      return {
        type: 'highScore',
        card: highScoreCard,
        houseCard: houseCard,
        message: c.houseChance.highScoreDanger(highScoreCard.name, highScoreCard.score),
      };
    }
    
    return null;
  },
  
  // 提案状態を管理（Phase 3用）
  pendingSuggestion: null,
  
  // 提案を作成
  createSuggestion: (type, params) => {
    const c = T.ui.companion.strategicAdvice;
    if (!c || !c.suggest) return null;
    
    let message = '';
    if (type === 'wind') {
      message = c.suggest.askWind(params.targetName, params.houseName);
    } else if (type === 'house') {
      message = c.suggest.askHouse(params.cardName, params.houseName);
    } else if (type === 'stall') {
      message = c.suggest.askStall(params.cardName);
    }
    
    return {
      type,
      params,
      message,
      doItText: c.suggest.doIt,
      yesText: c.suggest.yes,
      noText: c.suggest.no,
    };
  },
  
  // ========================================
  // 配札評価（ゲーム開始時）
  // ========================================
  evaluateDeal: (hand) => {
    const c = T.ui.companion.dealEvaluation;
    if (!c) return null;
    
    // 評価基準
    // - 魔女を持っている → terrible
    // - 聖母を持っている → excellent（浄化チャンス）
    // - 風カード or 家カードを持っている → good
    // - 高得点キャラ（4点以上）が多い → bad
    // - 低得点キャラ（2点以下）が多い → good
    
    const hasWitch = hand.some(c => c.id === 'WIT');
    const hasHoly = hand.some(c => c.id === 'HOL');
    const hasWind = hand.some(c => c.type === 'wind');
    const hasHouse = hand.some(c => c.type === 'house');
    
    const charCards = hand.filter(c => c.type === 'character');
    const highScoreCount = charCards.filter(c => c.score >= 4).length;
    const lowScoreCount = charCards.filter(c => c.score <= 2).length;
    
    let rating = 'neutral';
    
    if (hasWitch) {
      rating = 'terrible';
    } else if (hasHoly && hasWitch === false) {
      rating = 'excellent';
    } else if ((hasWind || hasHouse) && lowScoreCount >= 2) {
      rating = 'excellent';
    } else if (hasWind || hasHouse) {
      rating = 'good';
    } else if (highScoreCount >= 3) {
      rating = 'bad';
    } else if (lowScoreCount >= 3) {
      rating = 'good';
    }
    
    const messages = c[rating];
    if (!messages || messages.length === 0) return null;
    
    return COMPANION.pickRandom(messages);
  },
  
  // ========================================
  // 引札評価（P0がカードを引いた時）
  // ========================================
  evaluateDraw: (card, hasPair) => {
    const c = T.ui.companion.drawEvaluation;
    if (!c) return null;
    
    let rating = 'neutral';
    
    // ペアになった
    if (hasPair) {
      rating = 'pair';
    }
    // 魔女を引いた
    else if (card.id === 'WIT') {
      rating = 'witch';
    }
    // 聖母を引いた
    else if (card.id === 'HOL') {
      rating = 'holy';
    }
    // 風カードを引いた
    else if (card.type === 'wind') {
      rating = 'excellent';
    }
    // 家カードを引いた
    else if (card.type === 'house') {
      rating = 'good';
    }
    // 高得点キャラ（4点以上）
    else if (card.score >= 4) {
      rating = 'bad';
    }
    // 低得点キャラ（2点以下）
    else if (card.score <= 2) {
      rating = 'good';
    }
    
    const messages = c[rating];
    if (!messages || messages.length === 0) return null;
    
    return COMPANION.pickRandom(messages);
  },
};

// ============================================
// v2.6.0: 相棒ナレーションマネージャー
// ログエリア廃止の代替：相棒がゲームイベントを発言
// ============================================
const CompanionNarrator = {
  // 優先度定義
  PRIORITY: { S: 4, A: 3, B: 2, C: 1 },

  // 表示時間（ミリ秒）
  DISPLAY_TIME: { 4: 4000, 3: 2500, 2: 1500 },

  // 現在の発言状態
  state: {
    currentPriority: 0,
    currentTimeout: null,
  },

  // イベントを処理
  processEvent(eventType, data, showCompanionHint) {
    if (!showCompanionHint) return;
    const priority = this.getPriority(eventType, data);

    // C優先度はスキップ
    if (priority <= this.PRIORITY.C) return;

    // 現在より高優先度、または現在の発言が終了していれば発言
    if (priority >= this.state.currentPriority) {
      this.speak(eventType, data, priority, showCompanionHint);
    }
  },

  // 優先度判定
  getPriority(eventType, data) {
    const isP0 = data.playerIdx === 0 || data.targetIdx === 0;

    switch (eventType) {
      case 'gameEnd':
        return this.PRIORITY.S;
      case 'attacked':
        return data.targetIdx === 0 ? this.PRIORITY.A : this.PRIORITY.B;
      case 'effectPair':
        return this.PRIORITY.A;  // v6.5: 効果ペアは常にA優先度
      case 'pair':
        return isP0 ? this.PRIORITY.A : this.PRIORITY.B;
      case 'turnStart':
        return data.playerIdx === 0 ? this.PRIORITY.A : this.PRIORITY.C;
      case 'phaseChange':
        return this.PRIORITY.A;
      case 'stored':
        if (isP0) return this.PRIORITY.B;
        return data.cardScore >= 5 ? this.PRIORITY.B : this.PRIORITY.C;
      case 'marketExchange':
        return isP0 ? this.PRIORITY.B : this.PRIORITY.C;
      default:
        return this.PRIORITY.C;
    }
  },

  // セリフ生成
  generateSpeech(eventType, data) {
    const narration = T.ui.companion?.narration;
    if (!narration) return null;

    switch (eventType) {
      case 'effectPair': {
        // v6.5: 効果ペア発動時のナレーション
        const effectName = T.effectPairs?.[data.effectType] || data.effectType;
        if (data.playerIdx === 0) {
          return `✨「${effectName}」発動！${data.gainedNames}を獲得だよ！`;
        }
        return `${data.playerName}が「${effectName}」を発動！${data.gainedNames}を獲得したよ`;
      }
      case 'pair':
        if (data.playerIdx === 0) {
          return COMPANION.pickRandom(narration.pairMade.self(data.cardName));
        }
        return COMPANION.pickRandom(narration.pairMade.other(data.playerName, data.cardName));

      case 'attacked':
        if (data.targetIdx === 0) {
          return COMPANION.pickRandom(narration.stolen.self(data.attackerName, data.cardName));
        }
        return COMPANION.pickRandom(narration.stolen.other(data.attackerName, data.targetName, data.cardName));

      case 'stored':
        if (data.playerIdx === 0) {
          return COMPANION.pickRandom(narration.stored.self(data.cardName));
        }
        return COMPANION.pickRandom(narration.stored.otherHighValue(data.playerName, data.cardName));

      case 'marketExchange':
        return COMPANION.pickRandom(narration.marketExchange.self(data.gaveName, data.gotName));

      case 'gameEnd':
        if (data.winnerIdx === 0) {
          return COMPANION.pickRandom(narration.gameEnd.selfWin);
        }
        if (data.winnerIdx !== null && data.winnerIdx !== undefined) {
          return COMPANION.pickRandom(narration.gameEnd.selfLose(data.winnerName));
        }
        return null;

      case 'phaseChange':
        return COMPANION.pickRandom(narration.phaseChange.toBabanuki);

      default:
        return null;
    }
  },

  // 発言実行
  speak(eventType, data, priority, showCompanionHint) {
    // 既存の発言タイマーをキャンセル
    if (this.state.currentTimeout) {
      clearTimeout(this.state.currentTimeout);
    }

    const speech = this.generateSpeech(eventType, data);
    if (!speech) return;

    // 発言表示
    showCompanionHint(speech);
    this.state.currentPriority = priority;

    // 表示時間後にリセット
    const displayTime = this.DISPLAY_TIME[priority] || 2000;
    this.state.currentTimeout = setTimeout(() => {
      this.state.currentPriority = 0;
    }, displayTime);
  },
};

// ========================================
// SECTION 8: AI SPEECH SYSTEM
// 発話テンプレートはLANG.speechから取得
// ========================================
const AISpeechSystem = {
  enabled: true,

  // キャラクター別の口調テンプレート（LANG.speechから構築）
  speechStyles: Object.fromEntries(
    Object.keys(T.speech).map(id => [id, {
      prefix: CRITICS[id]?.emoji || '👤',
      drawReason: T.speech[id].drawReason,
      actionReason: T.speech[id].actionReason,
      winReflect: T.speech[id].winReflect,
      loseReflect: T.speech[id].loseReflect,
      paramChange: (param, old, newVal, dir) => `${param}を${dir}に調整。`,
      onDeal: {
        waiting: T.speech[id].waiting,
        good: T.speech[id].good,
        bad: T.speech[id].bad,
        pair: T.speech[id].pair,
        house: T.speech[id].house,
        wind: T.speech[id].wind,
        danger: T.speech[id].danger,
        bluff: T.speech[id].bluff
      }
    }])
  ),

  // イベント重要度を計算（0-100）
  getEventImportance: (card, isPair, context = 'deal') => {
    if (isPair) return 100;  // ペアは最重要
    if (card.id === 'WIT' || card.id === 'HOL') return 80;  // 魔女/聖母
    if (card.type === 'wind') return 60;  // 風カード
    if (card.type === 'house') return 40;  // 家カード
    if (card.points >= 5) return 50;  // 高得点
    if (card.points >= 4) return 35;
    if (card.points <= 1) return 15;  // 低得点
    return 20;  // その他
  },

  // 確率でコメントするか判定
  shouldComment: (importance, context = 'deal') => {
    // 配札時は控えめ、ドロー後は積極的
    const baseChance = context === 'deal' ? 0.15 : 0.6;
    const chance = baseChance + (importance / 100) * 0.5;
    return Math.random() < chance;
  },

  // カード配布時のリアクションを生成（確率制御付き）
  // カード取得時のリアクション生成（deal/draw共通）
  _getCardReaction: (criticId, card, hand, isPair, eventType, forceComment = false) => {
    const style = AISpeechSystem.speechStyles[criticId];
    if (!style || !style.onDeal) return null;

    const importance = AISpeechSystem.getEventImportance(card, isPair, eventType);
    if (!forceComment && !AISpeechSystem.shouldComment(importance, eventType)) return null;

    let category = 'good';
    if (isPair) {
      category = 'pair';
    } else if (card.type === 'house') {
      category = 'house';
    } else if (card.type === 'wind') {
      category = 'wind';
    } else if (card.id === 'WIT' || card.id === 'HOL') {
      category = 'danger';
    } else if (Math.random() < 0.15) {
      category = 'bluff';
    } else if (card.points >= 4) {
      category = 'good';
    } else if (card.points <= 2) {
      category = 'bad';
    } else {
      category = Math.random() > 0.5 ? 'good' : 'waiting';
    }

    const reactions = style.onDeal[category];
    if (!reactions || reactions.length === 0) return null;
    const reaction = reactions[Math.floor(Math.random() * reactions.length)];
    return { message: `${style.prefix} ${reaction}`, category };
  },

  getDealReaction: (criticId, card, hand, isPair, forceComment = false) =>
    AISpeechSystem._getCardReaction(criticId, card, hand, isPair, 'deal', forceComment),

  getDrawReaction: (criticId, card, hand, isPair) =>
    AISpeechSystem._getCardReaction(criticId, card, hand, isPair, 'draw'),

  // ドロー先選択の理由を生成
  getDrawTargetReason: (strategy, target, targets, ps) => {
    const pref = strategy.drawTargetPref || 'random';
    const targetName = target.name;

    // 匂わせ表現（手の内を明かさない）
    const hints = T.ai.hints;
    const hint = hints[Math.floor(Math.random() * hints.length)];

    switch (pref) {
      case 'mostCards':
        return { target: targetName, reason: hint };
      case 'leastCards':
        return { target: targetName, reason: hint };
      case 'leader':
        return { target: targetName, reason: hint };
      case 'random':
        return { target: targetName, reason: hint };
      default:
        return { target: targetName, reason: hint };
    }
  },

  // アクション選択の理由を生成
  getActionReason: (action, evaluation, strategy) => {
    if (!action || action.type === 'pass') {
      return { action: '', reason: '' };
    }

    // 匂わせ表現（手の内を明かさない）
    switch (action.type) {
      case 'house':
        // 格納するカード名は出さない
        const houseHints = T.ai.houseHints;
        return {
          action: T.ai.useHouse(action.houseCard.name),
          reason: houseHints[Math.floor(Math.random() * houseHints.length)]
        };

      case 'steal':
        // 攻撃対象の中身は言わない
        const stealHints = T.ai.stealHints;
        return {
          action: T.ai.stealAction,
          reason: stealHints[Math.floor(Math.random() * stealHints.length)]
        };

      case 'break':
        // ペアが作れることは言わない
        return { action: T.ai.breakAction.action, reason: T.ai.breakAction.reason };

      default:
        return { action: '', reason: '' };
    }
  },

  // 学習結果の振り返りを生成
  getReflection: (criticId, outcome, score, paramChanges) => {
    const style = AISpeechSystem.speechStyles[criticId];
    if (!style) return null;

    if (outcome === 'win') {
      return `${style.prefix} ${style.winReflect(score)}`;
    } else if (outcome === 'lose') {
      // 変更があったパラメータを説明
      let changeDesc = '';
      if (paramChanges && paramChanges.length > 0) {
        const change = paramChanges[0];
        changeDesc = T.ai.reflection.adjustParam(change.param);
      } else {
        changeDesc = T.ai.reflection.reconsidering;
      }
      return `${style.prefix} ${style.loseReflect(score, changeDesc)}`;
    } else {
      return `${style.prefix} ${T.ai.reflection.draw}`;
    }
  },

  // 発話を生成（汎用）
  speak: (criticId, type, data) => {
    if (!AISpeechSystem.enabled) return null;

    const style = AISpeechSystem.speechStyles[criticId];
    if (!style) return null;

    switch (type) {
      case 'draw':
        return `${style.prefix} ${style.drawReason(data.target, data.reason)}`;
      case 'action':
        return `${style.prefix} ${style.actionReason(data.action, data.reason)}`;
      case 'win':
        return `${style.prefix} ${style.winReflect(data.score)}`;
      case 'lose':
        return `${style.prefix} ${style.loseReflect(data.score, data.change || T.ai.reflection.adjusting)}`;
      case 'paramChange':
        const dir = data.newVal > data.oldVal ? T.ai.direction.increase : T.ai.direction.decrease;
        return `${style.prefix} ${style.paramChange(data.param, data.oldVal, data.newVal, dir)}`;
      default:
        return null;
    }
  }
};

// AI学習システム
const AILearningSystem = {
  VERSION: '1.0.0',
  STORAGE_KEY_PREFIX: 'pfff_ai_learning_',

  // 学習率（変化の大きさ）
  LEARNING_RATE: {
    win: 0.05,      // 勝利時の強化率
    lose: 0.08,     // 敗北時の変化率（探索のため少し大きめ）
    draw: 0.02      // 引き分け時
  },

  // パラメータの範囲定義
  PARAM_RANGES: {
    storeThreshold: { min: 1, max: 5, type: 'int' },
    storeUrgency: { min: 0, max: 100, type: 'int' },
    dangerPriority: { min: 0, max: 100, type: 'int' },
    attackUrgency: { min: 0, max: 100, type: 'int' },
    riskTolerance: { min: 0, max: 100, type: 'int' },
    adaptability: { min: 0, max: 100, type: 'int' }
  },

  // 列挙型パラメータの選択肢
  PARAM_ENUMS: {
    drawTargetPref: ['mostCards', 'leastCards', 'random', 'leader'],
    drawPositionPref: ['left', 'right', 'center', 'random'],
    houseTypePref: ['house', 'stall', 'any'],
    attackTargetPref: ['highValue', 'lowRisk', 'visible', 'random'],
    attackVsStore: ['attack', 'store', 'balanced']
  },

  // キャラクターの学習データを読み込み
  load: (criticId) => {
    try {
      const key = AILearningSystem.STORAGE_KEY_PREFIX + criticId;
      const data = localStorage.getItem(key);
      if (data) {
        return JSON.parse(data);
      }
    } catch (e) {
      console.error(`[AILearning] Failed to load ${criticId}:`, e);
    }
    return null;
  },

  // キャラクターの学習データを保存
  save: (criticId, data) => {
    try {
      const key = AILearningSystem.STORAGE_KEY_PREFIX + criticId;
      localStorage.setItem(key, JSON.stringify(data));
    } catch (e) {
      console.error(`[AILearning] Failed to save ${criticId}:`, e);
    }
  },

  // 初期データを生成
  createInitialData: (criticId) => {
    const critic = CRITICS[criticId];
    if (!critic) return null;

    return {
      criticId,
      version: AILearningSystem.VERSION,
      created: new Date().toISOString(),
      updated: new Date().toISOString(),
      // 現在の戦略（初期値からスタート）
      currentStrategy: { ...critic.strategy },
      // 統計
      stats: {
        gamesPlayed: 0,
        wins: 0,
        losses: 0,
        draws: 0
      },
      // パラメータ履歴（分析用）
      history: [{
        timestamp: new Date().toISOString(),
        event: 'init',
        strategy: { ...critic.strategy },
        stats: { gamesPlayed: 0, wins: 0, losses: 0, draws: 0 }
      }]
    };
  },

  // 学習データを取得（なければ初期化）
  getOrCreate: (criticId) => {
    let data = AILearningSystem.load(criticId);
    if (!data) {
      data = AILearningSystem.createInitialData(criticId);
      if (data) {
        AILearningSystem.save(criticId, data);
      }
    }
    return data;
  },

  // ゲーム結果から学習
  learn: (criticId, result, gameContext) => {
    const data = AILearningSystem.getOrCreate(criticId);
    if (!data) return { changes: [] };

    const { outcome, score, opponents, decisions } = gameContext;
    // outcome: 'win' | 'lose' | 'draw'
    // score: 獲得/損失点
    // decisions: ゲーム中の重要な判断記録

    // パラメータ変更を記録
    const changes = [];
    const oldStrategy = { ...data.currentStrategy };

    // 統計更新
    data.stats.gamesPlayed++;
    if (outcome === 'win') data.stats.wins++;
    else if (outcome === 'lose') data.stats.losses++;
    else data.stats.draws++;

    // 学習率を取得
    const lr = AILearningSystem.LEARNING_RATE[outcome] || 0.05;

    // 数値パラメータの更新
    Object.keys(AILearningSystem.PARAM_RANGES).forEach(param => {
      const range = AILearningSystem.PARAM_RANGES[param];
      const current = data.currentStrategy[param];
      if (current === undefined) return;

      let delta = 0;
      if (outcome === 'win') {
        // 勝利: 現在の値を強化（変化なし、または微調整）
        delta = 0; // 勝ってるなら変えない
      } else if (outcome === 'lose') {
        // 敗北: ランダムな方向に探索
        delta = (Math.random() - 0.5) * 2 * lr * (range.max - range.min);
      } else {
        // 引き分け: 小さく探索
        delta = (Math.random() - 0.5) * lr * (range.max - range.min);
      }

      let newValue = current + delta;
      // 範囲内にクランプ
      newValue = Math.max(range.min, Math.min(range.max, newValue));
      if (range.type === 'int') newValue = Math.round(newValue);

      // 変更があれば記録
      if (newValue !== current) {
        changes.push({ param, oldVal: current, newVal: newValue, type: 'numeric' });
      }

      data.currentStrategy[param] = newValue;
    });

    // 列挙型パラメータの更新（敗北時のみ一定確率で変更）
    if (outcome === 'lose') {
      Object.keys(AILearningSystem.PARAM_ENUMS).forEach(param => {
        if (Math.random() < lr * 2) { // 敗北時、約16%の確率で変更
          const options = AILearningSystem.PARAM_ENUMS[param];
          const current = data.currentStrategy[param];
          // 現在と異なる選択肢からランダム選択
          const others = options.filter(o => o !== current);
          if (others.length > 0) {
            const newVal = others[Math.floor(Math.random() * others.length)];
            changes.push({ param, oldVal: current, newVal, type: 'enum' });
            data.currentStrategy[param] = newVal;
          }
        }
      });
    }

    // 履歴に追加
    data.history.push({
      timestamp: new Date().toISOString(),
      event: outcome,
      score,
      strategy: { ...data.currentStrategy },
      stats: { ...data.stats },
      changes: changes  // 変更内容も記録
    });

    // 履歴が長すぎたら古いものを削除（最新1000件を保持）
    if (data.history.length > 1000) {
      data.history = data.history.slice(-1000);
    }

    data.updated = new Date().toISOString();
    AILearningSystem.save(criticId, data);

    return { data, changes };
  },

  // 現在の戦略を取得
  getStrategy: (criticId) => {
    const data = AILearningSystem.getOrCreate(criticId);
    if (data) {
      return data.currentStrategy;
    }
    // フォールバック: CRITICS の初期値
    return CRITICS[criticId]?.strategy || {};
  },

  // 学習データをリセット
  reset: (criticId) => {
    const data = AILearningSystem.createInitialData(criticId);
    if (data) {
      AILearningSystem.save(criticId, data);
    }
    return data;
  },

  // 全キャラクターの学習データをリセット
  resetAll: () => {
    Object.keys(CRITICS).forEach(id => {
      AILearningSystem.reset(id);
    });
  },

  // 分析用: 全キャラクターの現在戦略を比較
  compareStrategies: () => {
    const comparison = {};
    Object.keys(CRITICS).forEach(id => {
      const data = AILearningSystem.load(id);
      comparison[id] = {
        name: CRITICS[id].name,
        games: data?.stats?.gamesPlayed || 0,
        winRate: data?.stats?.gamesPlayed > 0
          ? (data.stats.wins / data.stats.gamesPlayed * 100).toFixed(1) + '%'
          : 'N/A',
        strategy: data?.currentStrategy || CRITICS[id].strategy
      };
    });
    return comparison;
  },

  // 分析用: パラメータの収束/分岐を確認
  analyzeConvergence: () => {
    const strategies = Object.keys(CRITICS).map(id => {
      const data = AILearningSystem.load(id);
      return data?.currentStrategy || CRITICS[id].strategy;
    });

    const analysis = {};

    // 数値パラメータの分散を計算
    Object.keys(AILearningSystem.PARAM_RANGES).forEach(param => {
      const values = strategies.map(s => s[param]).filter(v => v !== undefined);
      if (values.length === 0) return;

      const mean = values.reduce((a, b) => a + b, 0) / values.length;
      const variance = values.reduce((sum, v) => sum + Math.pow(v - mean, 2), 0) / values.length;
      const stdDev = Math.sqrt(variance);

      analysis[param] = {
        mean: mean.toFixed(1),
        stdDev: stdDev.toFixed(1),
        min: Math.min(...values),
        max: Math.max(...values),
        convergence: stdDev < 10 ? 'converged' : stdDev < 25 ? 'moderate' : 'diverged'
      };
    });

    // 列挙型パラメータの分布
    Object.keys(AILearningSystem.PARAM_ENUMS).forEach(param => {
      const values = strategies.map(s => s[param]).filter(v => v !== undefined);
      const distribution = {};
      values.forEach(v => { distribution[v] = (distribution[v] || 0) + 1; });

      const uniqueCount = Object.keys(distribution).length;
      analysis[param] = {
        distribution,
        convergence: uniqueCount === 1 ? 'converged' : uniqueCount <= 2 ? 'moderate' : 'diverged'
      };
    });

    return analysis;
  },

  // エクスポート: 全データをJSON形式で取得
  exportAll: () => {
    const allData = {};
    Object.keys(CRITICS).forEach(id => {
      allData[id] = AILearningSystem.load(id);
    });
    return {
      exportedAt: new Date().toISOString(),
      version: AILearningSystem.VERSION,
      critics: allData
    };
  },

  // エクスポート: CSVヘッダー生成
  getCSVHeader: () => {
    const numericParams = Object.keys(AILearningSystem.PARAM_RANGES);
    const enumParams = Object.keys(AILearningSystem.PARAM_ENUMS);
    return ['criticId', 'name', 'games', 'wins', 'losses', 'winRate', ...numericParams, ...enumParams].join(',');
  },

  // エクスポート: CSV行生成
  toCSVRow: (criticId) => {
    const critic = CRITICS[criticId];
    const data = AILearningSystem.load(criticId);
    const strategy = data?.currentStrategy || critic?.strategy || {};
    const stats = data?.stats || { gamesPlayed: 0, wins: 0, losses: 0 };

    const numericParams = Object.keys(AILearningSystem.PARAM_RANGES);
    const enumParams = Object.keys(AILearningSystem.PARAM_ENUMS);

    const winRate = stats.gamesPlayed > 0 ? (stats.wins / stats.gamesPlayed * 100).toFixed(1) : '0';

    const values = [
      criticId,
      critic?.name || '',
      stats.gamesPlayed,
      stats.wins,
      stats.losses,
      winRate,
      ...numericParams.map(p => strategy[p] ?? ''),
      ...enumParams.map(p => strategy[p] ?? '')
    ];

    return values.join(',');
  },

  // エクスポート: 全データをCSV形式で取得
  exportCSV: () => {
    const header = AILearningSystem.getCSVHeader();
    const rows = Object.keys(CRITICS).map(id => AILearningSystem.toCSVRow(id));
    return [header, ...rows].join('\n');
  }
};

const CriticAI = {
  // アクションの期待値を評価（新パラメータ体系対応、v6.6.1: 空屋台対応）
  evaluateAction: (action, hand, myHouses, allPlayers, myIdx, strategy = {}, context = {}) => {
    const characters = hand.filter(c => c.type === 'character');
    const charIds = characters.map(c => c.id);
    const windCards = hand.filter(c => c.type === 'wind');

    // 新パラメータ体系からデフォルト値付きで取得
    const {
      storeThreshold = 3,
      storeUrgency = 50,
      dangerPriority = 50,
      houseTypePref = 'house',
      attackUrgency = 50,
      attackTargetPref = 'highValue',
      attackVsStore = 'balanced',
      riskTolerance = 50,
      speculativeWind = 50,  // v6.6: 投機的風カード使用率
      emptyStallAttackMod = 1.0  // v6.6.1: 空屋台攻撃補正
    } = strategy;

    // v6.6.1: コンテキスト情報
    const {
      deckRemaining = 30,
      usedWindCount = 0,
      market = []
    } = context;

    switch (action.type) {
      case 'steal': {
        // 強奪の評価（v6.6: ペア成立時のみ高評価、それ以外は基本的に攻撃しない）
        const stored = action.storedCard;
        const houseType = action.houseCard.id;

        // 破壊可能な家の場合のみ評価
        if (!HOUSE_PROPERTIES[houseType]?.canBeDestroyed) {
          return { score: 0, reason: T.ai.reasons.notApplicable };
        }

        // 1. 同名ペア確定 → 最高評価
        if (charIds.includes(stored.id)) {
          return { score: 100, reason: T.ai.reasons.pairBySteal };
        }

        // 2. 効果ペア成立チェック → 高評価
        for (const cid of charIds) {
          const key = cid + '+' + stored.id;
          if (EFFECT_PAIRS[key]) {
            return { score: 95, reason: T.ai.reasons.pairBySteal };
          }
        }

        // 3. ペアにならない → 基本的に攻撃しない
        // ただし、speculativeWind > 50 の場合のみ投機的攻撃を検討
        if (speculativeWind > 50) {
          // 投機的な攻撃（妨害目的）
          const specScore = 10 * (speculativeWind / 100);
          return { score: Math.round(specScore), reason: T.ai.reasons.steal(houseType, stored.points) };
        }

        return { score: -10, reason: T.ai.reasons.noPair };
      }

      case 'break': {
        // 家破壊（自分の家から取り出し）の評価
        const stored = action.storedCard;
        if (charIds.includes(stored.id)) {
          return { score: 100, reason: T.ai.reasons.pairByBreak };
        }
        // ペアにならない破壊は基本しない
        return { score: -10, reason: T.ai.reasons.noPair };
      }

      case 'house': {
        // 家格納の評価（新パラメータ対応）
        const char = action.character;
        const houseCard = action.houseCard;
        const houseType = houseCard.id;

        // storeThreshold: この点数未満は格納しない
        if (char.points < storeThreshold) {
          return { score: -5, reason: T.ai.reasons.belowThreshold(char.points, storeThreshold) };
        }

        let score = char.points * 2.5; // 基本点

        // v6.4: 家タイプはHOUのみ
        score += 12;

        // 魔女/聖母/王/王妃は dangerPriority で評価
        if (char.id === 'WIT' || char.id === 'HOL' || char.id === 'KIN' || char.id === 'QUE') {
          score += dangerPriority * 0.25; // 0-25点のボーナス
        }

        // v6.5: 効果ペア相方が手札にある場合、格納しない方がよい（ペアを優先）
        for (const cid of charIds) {
          if (cid === char.id) continue;
          const key = char.id + '+' + cid;
          if (EFFECT_PAIRS[key]) {
            score -= 30; // ペア成立可能なカードは格納しない
            break;
          }
        }

        // storeUrgency による調整
        score = score * (0.6 + storeUrgency / 100 * 0.8);

        // attackVsStore による調整
        if (attackVsStore === 'store') score *= 1.2;
        else if (attackVsStore === 'attack') score *= 0.8;

        return { score: Math.round(score), reason: T.ai.reasons.storeTo(char.name, char.points, houseCard.name) };
      }

      case 'pass': {
        return { score: 0, reason: T.ai.reasons.pass };
      }

      // v6.6.1: 空屋台への風攻撃
      case 'stealEmptyStall': {
        let score = 30; // 基本スコア（屋台3点の価値）

        // 加算: 自分が即使用できる（手札に人物 & 屋台枠 < 3）
        if (characters.length > 0 && myHouses.length < 3) {
          score += 20;
        }
        // 加算: 終盤（山札残り < 15枚）
        if (deckRemaining < 15) {
          score += 10;
        }
        // 加算: 相手の手札が多い（5枚以上）
        const targetPlayer = allPlayers[action.targetPlayer];
        if (targetPlayer && targetPlayer.hand.length >= 5) {
          score += 10;
        }

        // 減算: 自分の風が1枚しかない & 自分の屋台に5点以上格納
        const hasHighValueStored = myHouses.some(h => h.storedCard && h.storedCard.points >= 5);
        if (windCards.length === 1 && hasHighValueStored) {
          score -= 25;
        }
        // 減算: 自分がすでに屋台3軒（奪っても置けない）
        if (myHouses.length >= 3) {
          score -= 20;
        }
        // 減算: 自分の手札が少ない（3枚以下）
        if (hand.length <= 3) {
          score -= 15;
        }

        // 性格補正
        score *= emptyStallAttackMod;

        return { score: Math.round(score), reason: '空屋台攻撃' };
      }

      // v6.6.1: 空屋台への再格納
      case 'refillStall': {
        const char = action.character;
        let score = 40; // 基本スコア（市場交換の価値）

        // 加算: 高得点カード（5点以上）
        if (char.points >= 5) {
          score += 25;
        }
        // 加算: 市場にペア相方が見えている
        const marketHasPair = market.some(m => {
          if (m.id === char.id) return true;
          const key = char.id + '+' + m.id;
          return !!EFFECT_PAIRS[key];
        });
        if (marketHasPair) {
          score += 20;
        }
        // 加算: 使用済み風が3枚以上（風の脅威低下）
        if (usedWindCount >= 3) {
          score += 15;
        }
        // 加算: 魔女(WIT)
        if (char.id === 'WIT') {
          score += 10;
        }

        // 減算: 自分が優勢（スコア差を簡易計算）
        // 減算: 残りカードが少ない（山札 < 10枚）& 上がりが近い
        if (deckRemaining < 10 && hand.length <= 4) {
          score -= 15;
        }

        // storeUrgency による調整
        score = score * (0.6 + storeUrgency / 100 * 0.8);

        return { score: Math.round(score), reason: '空屋台再格納' };
      }

      default:
        return { score: 0, reason: T.ai.reasons.unknown };
    }
  },

  // 全選択肢を列挙（v7.0ルール対応、v6.6.1: 空屋台対応）
  enumerateActions: (hand, myHouses, allPlayers, myIdx, phase, currentTurn = 0) => {
    const actions = [];
    const characters = hand.filter(c => c.type === 'character');
    const houseCards = hand.filter(c => c.type === 'house');
    const windCards = hand.filter(c => c.type === 'wind');

    // v6.4: 風カード選択肢（両フェーズで使用可）
    // Ghibli（steal）のみ、全ての家タイプを対象にできる
    if (windCards.length > 0) {
      const stealCard = windCards.find(w => w.effect === 'steal');

      if (stealCard) {
        allPlayers.forEach((p, pIdx) => {
          if (pIdx === myIdx || !p.houses) return;
          p.houses.forEach((house, hIdx) => {
            const stored = house.storedCard;
            const houseType = house.houseCard.id;
            const houseProp = HOUSE_PROPERTIES[houseType];

            // v6.4: 破壊可能な家を対象にできる
            if (houseProp && houseProp.canBeDestroyed) {
              // v6.6.1: 空屋台への攻撃も選択肢に追加
              if (stored) {
                const canSee = houseProp.isVisible;  // v6.4: 全て公開
                actions.push({
                  type: 'steal',
                  windCard: stealCard,
                  targetPlayer: pIdx,
                  targetHouse: hIdx,
                  houseCard: house.houseCard,
                  storedCard: stored,
                  canSee,
                  willDestroy: true    // v6.4: 常に破壊
                });
              } else {
                // v6.6.1: 空屋台への攻撃（屋台カード自体を奪う）
                actions.push({
                  type: 'stealEmptyStall',
                  windCard: stealCard,
                  targetPlayer: pIdx,
                  targetHouse: hIdx,
                  houseCard: house.houseCard,
                  storedCard: null,
                  willDestroy: true
                });
              }
            }
          });
        });

        // 場に家が0枚の場合、風カードは使えない（強奪対象なし）
      }
    }

    // 家破壊選択肢（自分の家から取り出し）
    if (myHouses && myHouses.length > 0) {
      myHouses.forEach((house, hIdx) => {
        if (!house.storedCard) return;
        actions.push({
          type: 'break',
          houseIdx: hIdx,
          houseCard: house.houseCard,
          storedCard: house.storedCard
        });
      });
    }

    // 家格納選択肢（v6.6.1: 屋台は最大3軒まで）
    const MAX_STALLS = 3;
    if (houseCards.length > 0 && characters.length > 0 && myHouses.length < MAX_STALLS) {
      houseCards.forEach(houseCard => {
        characters.forEach(char => {
          actions.push({
            type: 'house',
            houseCard,
            character: char
          });
        });
      });
    }

    // v6.6.1: 空屋台への再格納選択肢
    if (myHouses && myHouses.length > 0 && characters.length > 0) {
      myHouses.forEach((house, hIdx) => {
        // 空屋台で、同一ターンでない場合のみ
        if (house.storedCard === null && house.retrievedTurn !== currentTurn) {
          characters.forEach(char => {
            actions.push({
              type: 'refillStall',
              houseIdx: hIdx,
              houseCard: house.houseCard,
              character: char
            });
          });
        }
      });
    }

    // パス（常に選択可能）
    actions.push({ type: 'pass' });

    return actions;
  },

  // 最善手を決定（v7.0ルール対応、v6.6.1: currentTurn追加）
  decideBestAction: (hand, myHouses, allPlayers, myIdx, phase, strategy = {}, currentTurn = 0, context = {}) => {
    const actions = CriticAI.enumerateActions(hand, myHouses, allPlayers, myIdx, phase, currentTurn);

    // 各アクションを評価（strategyとcontextを渡す）
    const evaluated = actions.map(action => {
      const evaluation = CriticAI.evaluateAction(action, hand, myHouses, allPlayers, myIdx, strategy, context);
      return { action, ...evaluation };
    });

    // スコア順にソート
    evaluated.sort((a, b) => b.score - a.score);

    // デバッグログ
    if (evaluated.length > 1) {
      const top3 = evaluated.slice(0, 3).map(e => `${e.action.type}(${e.score}:${e.reason})`).join(', ');
    }

    // 投機的行動の確率制御（家格納と風カードを別々に）
    const best = evaluated[0];
    if (best.score < 50 && best.action.type !== 'pass') {
      // 確定行動でない場合、確率で実行を見送る
      let speculativeChance = 0.5;

      if (best.action.type === 'house') {
        // 家格納の投機的確率
        speculativeChance = (strategy.speculativeHouse !== undefined ? strategy.speculativeHouse : 50) / 100;
      } else if (best.action.type === 'steal') {
        // 風カード（steal のみ）の投機的確率
        speculativeChance = (strategy.speculativeWind !== undefined ? strategy.speculativeWind : 50) / 100;
      }

      if (Math.random() > speculativeChance) {
        // 次善の選択肢（パス）を探す
        const safer = evaluated.find(e => e.action.type === 'pass');
        if (safer) {
          return safer.action;
        }
      }
    }

    return best.action;
  },

  // decidePlaceHouse, decideBreakOwnHouse, decideUseWindは
  // enumerateActions + evaluateAction + decideBestActionに統合されたため削除
};

// ============================================
// GameLogic: 純粋なゲームロジック関数群
// ============================================
const GameLogic = {
  // デッキ生成 - v6.6: gameParamsで枚数を動的に設定可能
  createDeck: (gameParams = {}) => {
    const deck = [];
    Object.entries(CARD_DATA).forEach(([id, card]) => {
      // v6.6: gameParamsで上書き可能（屋台・風カード）
      let count = card.count;
      if (id === 'HOU' && gameParams.stallCount !== undefined) count = gameParams.stallCount;
      if (id === 'GHI' && gameParams.windCount !== undefined) count = gameParams.windCount;

      for (let i = 0; i < count; i++) {
        deck.push({ id, uid: `${id}_${i}_${Date.now()}_${Math.random()}`, type: card.category === 'house' ? 'house' : card.category === 'wind' ? 'wind' : 'character', category: card.category, name: card.name, points: card.points, emoji: card.emoji, removable: card.removable, effect: card.effect });
      }
    });
    return deck;
  },
  // シャッフル
  shuffleDeck: (deck) => { const s = [...deck]; for (let i = s.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [s[i], s[j]] = [s[j], s[i]]; } return s; },
  // ペア検索 - v6.5: 効果ペア優先 → 同名ペア
  findPairs: (hand) => {
    const chars = hand.filter(c => c.type === 'character');
    const pairs = [];
    const used = new Set();
    // 1. 効果ペアを優先チェック
    for (let i = 0; i < chars.length; i++) {
      if (used.has(i)) continue;
      for (let j = i + 1; j < chars.length; j++) {
        if (used.has(j)) continue;
        const key = chars[i].id + '+' + chars[j].id;
        if (EFFECT_PAIRS[key]) {
          pairs.push({ cards: [chars[i], chars[j]], isPurification: false, effectType: EFFECT_PAIRS[key].effectType });
          used.add(i); used.add(j);
          break;
        }
      }
    }
    // 2. 同名ペア（SINGLE_ONLY_CARDSは除外）
    for (let i = 0; i < chars.length; i++) {
      if (used.has(i)) continue;
      for (let j = i + 1; j < chars.length; j++) {
        if (used.has(j)) continue;
        if (chars[i].id === chars[j].id && !SINGLE_ONLY_CARDS.includes(chars[i].id)) {
          pairs.push({ cards: [chars[i], chars[j]], isPurification: false, effectType: null });
          used.add(i); used.add(j);
          break;
        }
      }
    }
    return pairs;
  },
  // 勝利判定
  checkWin: (hand) => hand.filter(c => c.type === 'character').length === 0,
  // スコア計算
  calculateScore: (hand) => hand.reduce((sum, c) => sum + (c.points || 0), 0),
  // 場の全家数
  getTotalHousesOnField: (players) => players.reduce((sum, p) => sum + (p.houses?.length || 0), 0),
  // 自分以外の家数
  getOtherPlayersHouses: (players, myIdx) => players.reduce((sum, p, idx) => idx === myIdx ? sum : sum + (p.houses?.length || 0), 0),
  // 次のアクティブプレイヤー
  getNextActivePlayer: (fromIdx, players) => {
    const numPlayers = players.length;
    for (let i = 1; i <= numPlayers; i++) {
      const nextIdx = (fromIdx + i) % numPlayers;
      if (players[nextIdx].hand.length > 0) return nextIdx;
    }
    return -1;
  },
  // カードピッチ計算（手札）
  calcStandardPitch: (cardCount, areaWidthU, cardW = 10, minGap = 1) => {
    if (cardCount <= 1) return 0;
    const widthWithGap = cardW + (cardW + minGap) * (cardCount - 1);
    if (widthWithGap <= areaWidthU) return cardW + minGap;
    return Math.max(minGap, (areaWidthU - cardW) / (cardCount - 1));
  },
  // カードピッチ計算（家）
  calcHouseSetPitch: (houseCount, areaWidthU, cardW = 10, minGap = 1, minVisible = 3) => {
    if (houseCount <= 1) return 0;
    const widthWithGap = cardW + (cardW + minGap) * (houseCount - 1);
    if (widthWithGap <= areaWidthU) return cardW + minGap;
    return Math.max(minVisible, (areaWidthU - cardW) / (houseCount - 1));
  },
  // プレイヤーブロック幅
  getPlayerBlockWidth: (pIdx, playerCount, boardW) => {
    if (playerCount === 2) return boardW - 2;
    if (playerCount === 3 && pIdx === 0) return boardW - 2;
    return (boardW / 2) - 1.5;
  },
  // プレイヤー配置
  getPlayerPosition: (pIdx, playerCount) => {
    if (playerCount === 4) {
      if (pIdx === 0) return { row: 'bottom', side: 'right' };  // v2.4.8: P0を右下に移動
      if (pIdx === 1) return { row: 'top', side: 'left' };
      if (pIdx === 2) return { row: 'top', side: 'right' };
      if (pIdx === 3) return { row: 'bottom', side: 'left' };   // v2.4.8: P3を左下に移動
    }
    if (playerCount === 3) {
      if (pIdx === 0) return { row: 'bottom', side: 'full' };
      if (pIdx === 1) return { row: 'top', side: 'left' };
      if (pIdx === 2) return { row: 'top', side: 'right' };
    }
    if (playerCount === 2) {
      if (pIdx === 0) return { row: 'bottom', side: 'full' };
      if (pIdx === 1) return { row: 'top', side: 'full' };
    }
    return { row: 'bottom', side: 'left' };
  },
  isFullWidth: (pIdx, playerCount) => GameLogic.getPlayerPosition(pIdx, playerCount).side === 'full',
};

  const frontClass = isLarge ? 'card-large-front' : 'card-small-front';
  const bodyClass = isLarge ? 'card-large-body' : 'card-small-body';

// 紙吹雪コンポーネント
const ConfettiEffect = ({ show, duration = 3500 }) => {
  const [visible, setVisible] = useState(show);
  const colors = ['#ff0000', '#ff8800', '#ffff00', '#00ff00', '#00ffff', '#0088ff', '#8800ff', '#ff00ff', '#ff69b4', '#ffd700'];

  useEffect(() => {
    if (show) {
      setVisible(true);
      const timer = setTimeout(() => setVisible(false), duration);
      return () => clearTimeout(timer);
    }
  }, [show, duration]);

  if (!visible) return null;

  const pieces = [];
  for (let i = 0; i < 50; i++) {
    const left = Math.random() * 100;
    const delay = Math.random() * 1;
    const size = 6 + Math.random() * 8;
    const color = colors[Math.floor(Math.random() * colors.length)];
    const rotate = Math.random() * 360;
    const shape = Math.random() > 0.5 ? 'circle' : 'square';
    pieces.push(
      <div
        key={i}
        className="confetti-piece"
        style={{
          left: `${left}%`,
          backgroundColor: color,
          width: size,
          height: size,
          borderRadius: shape === 'circle' ? '50%' : '2px',
          animationDelay: `${delay}s`,
          transform: `rotate(${rotate}deg)`
        }}
      />
    );
  }

  return <div className="confetti-container">{pieces}</div>;
};

// 浄化オーバーレイコンポーネント
// PurificationOverlayは削除済み

// 飛行カードコンポーネント（山札から出発）
// ユニットベース座標に移行
// FlyingCardDisplay（v2.3.2: v2レイアウト固定化, v2.4.7: 動的サイジング対応）
const FlyingCardDisplay = ({ flyingCard, deckPos, getDrawAreaPosition, getPlayerCardPosition, getMarketCardPosition }) => {
  if (!flyingCard) return null;

  const { card, phase, playerIdx, target, handCount = 0 } = flyingCard;
  const isPlayer0 = playerIdx === 0;

  // v2.4.7: カードサイズを動的に取得
  const cardDim = getCurrentCardDimensions();
  const cardSize = {
    width: UNIT.toPixelX(cardDim.w),
    height: UNIT.toPixelY(cardDim.h),
    borderWidth: 2
  };

  let cardWidth = cardSize.width;
  let cardHeight = cardSize.height;
  let borderWidth = cardSize.borderWidth;

  // 引札ゾーン座標
  const getDrawZonePosition = (pIdx) => {
    if (getDrawAreaPosition) {
      return getDrawAreaPosition(pIdx);
    }
    // フォールバック
    return {
      x: UNIT.toPixelX(LAYOUT.drawZone[pIdx]?.x || 0),
      y: UNIT.toPixelY(LAYOUT.drawZone[pIdx]?.y || 0)
    };
  };

  // 手札の位置
  const getHandPosition = (pIdx, count) => {
    if (getPlayerCardPosition) {
      return getPlayerCardPosition(pIdx, count, count + 1);
    }
    // フォールバック
    if (pIdx === 0) {
      const pitch = calcCardPitch(count + 1, LAYOUT.handArea.self, LAYOUT.cardLarge.w, LAYOUT.minGap);
      return {
        x: UNIT.toPixelX(1) + count * pitch,
        y: UNIT.toPixelY(LAYOUT.zoneCTop + 1)
      };
    } else {
      const baseX = (pIdx - 1) * UNIT.toPixelX(LAYOUT.playerBlock.w) + UNIT.toPixelX(1);
      const pitch = calcCardPitch(count + 1, LAYOUT.handArea.opp, LAYOUT.cardSmall.w, LAYOUT.minGap);
      return {
        x: baseX + count * pitch,
        y: UNIT.toPixelY(LAYOUT.zoneATop + 3)
      };
    }
  };

  // 市場の位置
  const getMarketPosition = () => {
    if (getMarketCardPosition) {
      return getMarketCardPosition(0);
    }
    return { x: UNIT.toPixelX(93), y: UNIT.toPixelY(25) };
  };

  const drawZonePos = {
    0: getDrawZonePosition(0),
    1: getDrawZonePosition(1),
    2: getDrawZonePosition(2),
    3: getDrawZonePosition(3),
  };

  const handPos = {
    0: getHandPosition(0, handCount),
    1: getHandPosition(1, handCount),
    2: getHandPosition(2, handCount),
    3: getHandPosition(3, handCount),
  };

  const marketPos = getMarketPosition();

  // フェーズに応じた位置とトランジション
  let left, top, transition, transform = 'none', opacity = 1;
  // P0の引札ゾーン・手札スライド時は表向き
  // showFrontにforceFront対応を追加
  const { forceFront } = flyingCard;
  const showFront = forceFront || (isPlayer0 && (phase === 'inDrawZone' || phase === 'toHand'));

  // 共通のcalcFlyShadow関数を使用
  // フェーズに応じたZ高さ
  let flyZ = 0;
  if (phase === 'toDrawZone') flyZ = 3;      // 高空飛行
  else if (phase === 'inDrawZone') flyZ = 1; // 低空（引札ゾーン）
  else if (phase === 'toHand') flyZ = 2;     // 中空（手札へ）
  else if (phase === 'flying') flyZ = 3;     // burn用高空
  else if (phase === 'atHouse') flyZ = 2;
  else if (phase === 'exitLeft') flyZ = 3;

  const boxShadow = calcFlyShadow(flyZ);

  // sourceX, sourceYがある場合は出発点として使用（ババ抜き用）
  // houseX, houseYも追加（家からの飛行用）
  const { sourceX, sourceY, houseX, houseY } = flyingCard;

  if (phase === 'atDeck') {
    left = deckPos.x;
    top = deckPos.y;
    transition = 'none';
  } else if (phase === 'atSource' && sourceX !== undefined) {
    // ババ抜き: 相手の手札位置から出発
    left = sourceX;
    top = sourceY;
    transition = 'none';
  } else if (phase === 'atHouse' && houseX !== undefined) {
    // 家の位置から出発
    left = houseX;
    top = houseY;
    transition = 'none';
  } else if (phase === 'exitLeft') {
    // 左へ退場
    left = UNIT.toPixelX(LAYOUT.exitLeft);
    top = houseY || sourceY || deckPos.y;
    transition = 'all 300ms ease-in';
    opacity = 0;
  } else if (target === 'market' && phase === 'flying') {
    // 市場への飛行（表向き）
    left = marketPos.x;
    top = marketPos.y;
    transition = 'all 90ms ease-out';
    transform = 'scale(1)';  // 市場は小サイズなのでスケール不要
  } else if (target === 'stall') {
    // 市場→屋台への飛行
    const { stallX, stallY } = flyingCard;
    if (phase === 'atMarket') {
      left = sourceX;
      top = sourceY;
      transition = 'none';
    } else if (phase === 'toStall') {
      left = stallX;
      top = stallY;
      transition = 'all 200ms ease-in-out';
    }
  } else if (target === 'stallExchange') {
    // 交換アニメーション（市場カード→屋台、屋台カード→市場を同時に）
    const { stallX, stallY } = flyingCard;
    if (phase === 'exchange') {
      left = sourceX;
      top = sourceY;
      transition = 'none';
    } else if (phase === 'exchangeFlying') {
      left = stallX;
      top = stallY;
      transition = 'all 300ms ease-in-out';  // 飛行アニメーション（300ms）
    }
  } else if (target === 'housePlace') {
    // 家配置アニメーション（手札→家の位置）
    const { houseX, houseY } = flyingCard;
    if (phase === 'atSource') {
      left = sourceX;
      top = sourceY;
      transition = 'none';
    } else if (phase === 'toHouse') {
      left = houseX;
      top = houseY;
      transition = 'all 300ms ease-in-out';  // 飛行時間300ms（屋台と統一）
    }
  } else if (target === 'stallPlace') {
    // 屋台配置アニメーション（屋台カード：手札→家位置、人物カード：手札→家位置下段）
    const { houseX, houseY } = flyingCard;
    if (phase === 'atSource') {
      left = sourceX;
      top = sourceY;
      transition = 'none';
    } else if (phase === 'toHouse') {
      left = houseX;
      top = houseY;
      transition = 'all 300ms ease-in-out';  // 飛行時間300ms
    }
  } else if (target === 'windAttack') {
    // 風カード攻撃アニメーション（高い位置から急降下→ディゾルブ消滅）
    const { houseX, houseY } = flyingCard;
    if (phase === 'atSource') {
      // 浮上した位置から開始
      left = sourceX;
      top = sourceY - 20;  // 浮上分
      transition = 'none';
      transform = 'scale(1.05)';
    } else if (phase === 'diving') {
      // 急降下（加速：ease-in）
      left = houseX;
      top = houseY;
      transition = 'all 400ms cubic-bezier(0.55, 0.055, 0.675, 0.19)';  // ease-in-cubic（加速）
      transform = 'scale(1)';
    } else if (phase === 'vanish') {
      // ディゾルブ消滅（その場で透明化、風が散るように）
      left = houseX;
      top = houseY;
      transition = 'opacity 350ms ease-out, filter 350ms ease-out';
      transform = 'scale(1)';  // サイズは維持
      opacity = 0;
    }
  } else {
    const dzPos = drawZonePos[playerIdx] || drawZonePos[0];
    const hPos = handPos[playerIdx] || handPos[0];

    if (phase === 'toDrawZone') {
      left = dzPos.x;
      top = dzPos.y;
      transition = 'all 90ms ease-out';
    } else if (phase === 'inDrawZone') {
      left = dzPos.x;
      top = dzPos.y;
      transition = 'none';
    } else if (phase === 'toHand') {
      left = hPos.x;
      top = hPos.y;
      transition = 'all 180ms ease-in-out';
    }
  }

  // カード内容を描画（v2.3.2: standardサイズ統一）
  const renderCardContent = () => {
    const { flipped } = flyingCard;
    if (flipped !== undefined && isPlayer0) {
      return <FlippingCardStandard card={card} flipped={flipped} style={{ width: '100%', height: '100%' }} />;
    }
    return <UnifiedCard card={card} size="standard" showFront={showFront || target === 'market' || target === 'stall' || target === 'stallExchange' || target === 'housePlace' || target === 'stallPlace' || target === 'windAttack'} style={{ width: '100%', height: '100%' }} />;
  };

  // 交換アニメーション用の2枚目カード位置
  let exchangeLeft, exchangeTop, exchangeTransition;
  if (target === 'stallExchange' && flyingCard.exchangeCard) {
    const { exchangeFromX, exchangeFromY, exchangeToX, exchangeToY } = flyingCard;
    if (phase === 'exchange') {
      exchangeLeft = exchangeFromX;
      exchangeTop = exchangeFromY;
      exchangeTransition = 'none';
    } else if (phase === 'exchangeFlying') {
      exchangeLeft = exchangeToX;
      exchangeTop = exchangeToY;
      exchangeTransition = 'all 300ms ease-in-out';  // 飛行アニメーション（300ms）
    }
  }

  // 屋台配置アニメーション用の2枚目カード（人物カード）位置
  let personLeft, personTop, personTransition;
  let personCardWidth, personCardHeight;
  if (target === 'stallPlace' && flyingCard.personCard) {
    // v2.4.7: 動的サイズ取得
    personCardWidth = UNIT.toPixelX(cardDim.w);
    personCardHeight = UNIT.toPixelY(cardDim.h);
    const { personFromX, personFromY, personToX, personToY } = flyingCard;
    if (phase === 'atSource') {
      personLeft = personFromX;
      personTop = personFromY;
      personTransition = 'none';
    } else if (phase === 'toHouse') {
      personLeft = personToX;
      personTop = personToY;
      personTransition = 'all 300ms ease-in-out';
    }
  }

  return (
    <>
      <div style={{
        position: 'absolute',
        left: left,
        top: top,
        width: cardWidth,
        height: cardHeight,
        zIndex: 1000,
        pointerEvents: 'none',
        transition: transition ? `${transition}, box-shadow 90ms ease-out, opacity 300ms ease-in` : 'box-shadow 90ms ease-out',
        transform: transform,
        transformOrigin: 'top left',
        boxShadow: boxShadow,
        borderRadius: 4,
        opacity: opacity,
      }}>
        {renderCardContent()}
      </div>
      {/* 屋台配置時の2枚目カード（人物カード） */}
      {target === 'stallPlace' && flyingCard.personCard && (
        <div style={{
          position: 'absolute',
          left: personLeft,
          top: personTop,
          width: personCardWidth,
          height: personCardHeight,
          zIndex: 1001,
          pointerEvents: 'none',
          transition: personTransition ? `${personTransition}, box-shadow 90ms ease-out` : 'box-shadow 90ms ease-out',
          boxShadow: boxShadow,
          borderRadius: 4,
        }}>
          <UnifiedCard card={flyingCard.personCard} size="standard" showFront={true} style={{ width: '100%', height: '100%' }} />
        </div>
      )}
      {/* 交換時の2枚目カード（屋台→市場） */}
      {target === 'stallExchange' && flyingCard.exchangeCard && (
        <div style={{
          position: 'absolute',
          left: exchangeLeft,
          top: exchangeTop,
          width: cardWidth,
          height: cardHeight,
          zIndex: 1001,
          pointerEvents: 'none',
          transition: exchangeTransition ? `${exchangeTransition}, box-shadow 90ms ease-out` : 'box-shadow 90ms ease-out',
          boxShadow: boxShadow,
          borderRadius: 4,
        }}>
          <UnifiedCard card={flyingCard.exchangeCard} size="standard" showFront={true} style={{ width: '100%', height: '100%' }} />
        </div>
      )}
    </>
  );
};

// ペア成立演出コンポーネント（v2.3.2: v2固定化, v2.4.7: 動的サイジング対応）
const PairAnimationDisplay = ({ pairAnimation, getCardPosition }) => {
  if (!pairAnimation) return null;

  const { drawnCard, pairCard, pairCardIndex, playerIdx, phase, handCount } = pairAnimation;
  const isPlayer0 = playerIdx === 0;

  // v2.4.7: 動的サイズ取得
  const cardDim = getCurrentCardDimensions();
  const cardWidth = UNIT.toPixelX(cardDim.w);
  const cardHeight = UNIT.toPixelY(cardDim.h);

  // 浮上量（2ユニット）
  const floatAmount = UNIT.toPixelY(2);

  // P1/P2（上側プレイヤー）は下方向に浮く、P0/P3は上方向
  const isTopPlayer = playerIdx === 1 || playerIdx === 2;
  const floatDirection = isTopPlayer ? 1 : -1;

  // ペア対象カードの位置
  const pairCardPos = getCardPosition(playerIdx, pairCardIndex, handCount);
  const drawnCardPos = getCardPosition(playerIdx, handCount, handCount + 1);
  const exitX = -cardWidth - 20;

  let pairCardStyle, drawnCardStyle;

  if (phase === 'float') {
    pairCardStyle = {
      left: pairCardPos.x,
      top: pairCardPos.y + floatAmount * floatDirection,
      transition: 'all 200ms ease-out',
      boxShadow: calcFlyShadow(3),
    };
    drawnCardStyle = {
      left: drawnCardPos.x,
      top: drawnCardPos.y,
      transition: 'none',
      boxShadow: calcFlyShadow(1),
    };
  } else if (phase === 'merge') {
    const mergeX = pairCardPos.x + cardWidth + 4;
    pairCardStyle = {
      left: pairCardPos.x,
      top: pairCardPos.y + floatAmount * floatDirection,
      transition: 'none',
      boxShadow: calcFlyShadow(3),
    };
    drawnCardStyle = {
      left: mergeX,
      top: pairCardPos.y + floatAmount * floatDirection,
      transition: 'all 250ms ease-in-out',
      boxShadow: calcFlyShadow(3),
    };
  } else if (phase === 'exit') {
    pairCardStyle = {
      left: exitX,
      top: pairCardPos.y + floatAmount * floatDirection,
      transition: 'all 300ms ease-in',
      boxShadow: calcFlyShadow(3),
      opacity: 0,
    };
    drawnCardStyle = {
      left: exitX + cardWidth + 4,
      top: pairCardPos.y + floatAmount * floatDirection,
      transition: 'all 300ms ease-in',
      boxShadow: calcFlyShadow(3),
      opacity: 0,
    };
  }

  const showFront = isPlayer0;
  const useFlipAnim = !isPlayer0;
  const flipState = phase === 'merge' || phase === 'exit';

  const renderCard = (card, showFrontArg, useFlip, flipped) => {
    if (useFlip) {
      return <FlippingCardStandard card={card} flipped={flipped} style={{ width: '100%', height: '100%' }} />;
    }
    return <UnifiedCard card={card} size="standard" showFront={showFrontArg} style={{ width: '100%', height: '100%' }} />;
  };

  return (
    <>
      <div style={{
        position: 'absolute',
        width: cardWidth,
        height: cardHeight,
        zIndex: 1001,
        pointerEvents: 'none',
        borderRadius: 4,
        ...pairCardStyle,
      }}>
        {renderCard(pairCard, showFront, useFlipAnim, flipState)}
      </div>
      <div style={{
        position: 'absolute',
        width: cardWidth,
        height: cardHeight,
        zIndex: 1002,
        pointerEvents: 'none',
        borderRadius: 4,
        ...drawnCardStyle,
      }}>
        {renderCard(drawnCard, showFront, useFlipAnim, flipState)}
      </div>
    </>
  );
};

// 魔女/聖母を引いた時の手札内演出（v2.3.2: v2固定化, v2.4.7: 動的サイジング対応）
const DangerCardInHandDisplay = ({ dangerCardInHand, getCardPosition }) => {
  if (!dangerCardInHand) return null;

  const { card, cardIndex, handCount, phase } = dangerCardInHand;
  const d = CARD_DATA[card?.id] || {};
  const isWitch = card?.id === 'WIT';

  // v2.4.7: 動的サイズ取得
  const cardDim = getCurrentCardDimensions();
  const cardWidth = UNIT.toPixelX(cardDim.w);
  const cardHeight = UNIT.toPixelY(cardDim.h);
  const floatAmount = UNIT.toPixelY(LAYOUT.floatAmount);

  // v2.4.7: グロー影もスケーリング
  const scaleFactors = {
    xl: 1.4, large: 1.3, medium: 1.2, standard: 1.0,
    small: 0.9, mini: 0.8, tiny: 0.7, burn: 0.6
  };
  const scale = scaleFactors[currentCardSize] || 1.0;
  const s = (base) => Math.round(base * scale);

  const pos = getCardPosition(0, cardIndex, handCount);

  let left, top, transform, boxShadow, transition;

  if (phase === 'float') {
    left = pos.x;
    top = pos.y - floatAmount;
    transform = 'none';
    boxShadow = isWitch
      ? `0 0 ${s(20)}px rgba(107, 58, 91, 0.8), 0 0 ${s(40)}px rgba(107, 58, 91, 0.4)`
      : `0 0 ${s(20)}px rgba(201, 162, 39, 0.8), 0 0 ${s(40)}px rgba(201, 162, 39, 0.4)`;
    transition = 'all 200ms ease-out';
  } else if (phase === 'shake') {
    left = pos.x;
    top = pos.y - floatAmount;
    transform = 'none';
    boxShadow = isWitch
      ? `0 0 ${s(30)}px rgba(107, 58, 91, 1), 0 0 ${s(60)}px rgba(107, 58, 91, 0.6)`
      : `0 0 ${s(30)}px rgba(201, 162, 39, 1), 0 0 ${s(60)}px rgba(201, 162, 39, 0.6)`;
    transition = 'none';
  } else if (phase === 'settle') {
    left = pos.x;
    top = pos.y;
    transform = 'none';
    boxShadow = `${s(1)}px ${s(1)}px 0px rgba(0, 0, 0, 0.15)`;
    transition = 'all 200ms ease-in';
  }

  return (
    <div style={{
      position: 'absolute',
      left: left,
      top: top,
      width: cardWidth,
      height: cardHeight,
      zIndex: 1001,
      pointerEvents: 'none',
      transition: transition,
      transform: transform,
      boxShadow: boxShadow,
      borderRadius: 4,
      animation: phase === 'shake' ? 'dangerShakeInHand 0.5s ease-in-out' : 'none',
    }}>
      <div className="card-standard-front special" style={{ width: '100%', height: '100%' }}>
        <div className="card-standard-header">
          <span className="code">{d.name || '?'}</span>
          <span className="score">-{d.points || 0}</span>
        </div>
        <div className="card-standard-body">
          <span className="symbol">{d.emoji || '❓'}</span>
        </div>
        <div className="card-standard-footer">{card?.id || '???'}</div>
      </div>
    </div>
  );
};
