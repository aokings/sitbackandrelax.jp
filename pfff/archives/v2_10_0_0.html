    // データ初期化
    const data = initTournamentData(participants);
    tournamentDataRef.current = data;
    tournamentCurrentRef.current = 0; // fix: refも初期化
    tournamentMatchesRef.current = allMatches; // fix: マッチリストもrefに保存

    setTournamentMatches(allMatches);
    setTournamentProgress({ current: 0, total: allMatches.length });
    setTournamentResults(null);
    setAutoPlayMode(true);
    setTournamentMode(true);
    tournamentModeRef.current = true; // fix: refも設定

    GameLogger.log('');
    GameLogger.log(T.tournament.start.line1);
    GameLogger.log(T.tournament.start.line2);
    GameLogger.log(T.tournament.start.line3);
    GameLogger.log(`参加者: ${participants.length}人, 総当たり: ${tournamentRounds}回, 総ゲーム数: ${allMatches.length}`);
    GameLogger.log('');

    // NotationLogger - トーナメント開始を記録
    // logMode='detailed'ならユーザー指定で詳細ログ、それ以外は50試合以下で自動詳細
    const useDetailedLog = logMode === 'detailed' || (logMode === 'standard' && allMatches.length <= 50);
    NotationLogger.recordTournamentStart(participants, tournamentRounds, allMatches.length, useDetailedLog);

    // AnomalyDetector - トーナメント開始
    AnomalyDetector.startTournament();

    // 最初のゲーム開始
    if (allMatches.length > 0) {
      startTournamentGame(allMatches[0]);
    }
  }, [playerName, getAiStrategy, tournamentRounds, tournamentParticipants, generateCombinations, initTournamentData, startTournamentGame, logMode]);

  // セット終了時の統計更新（N人×1ゲーム=1セット、累積スコアで勝敗判定）
  const setWinnerRef = useRef(-1);
  const setCompletedRef = useRef(false); // セット完了フラグ

  useEffect(() => {
    // 無制限モードまたはセット無効の場合はスキップ
    if (setConfig.totalSets === 0 || !setConfig.enabled) return;
    if (gameState !== 'gameOver') return;

    // セット内のゲーム数をチェック（currentGameは0始まりなので+1と比較）
    const gamesPlayed = setConfig.currentGame;  // endGame後に更新される
    const isSetComplete = gamesPlayed >= setConfig.gamesPerSet;

    if (isSetComplete && !setCompletedRef.current) {
      setCompletedRef.current = true;

      // 累積スコアで勝者判定
      const maxScore = Math.max(...cumulativeScores);
      const topPlayers = cumulativeScores.map((s, i) => ({ idx: i, score: s, wins: winCount[i] || 0 }))
        .filter(p => p.score === maxScore);

      let winner;
      if (topPlayers.length === 1) {
        // 単独トップ
        winner = topPlayers[0].idx;
      } else {
        // 同点の場合は勝利数で判定
        const maxWins = Math.max(...topPlayers.map(p => p.wins));
        winner = topPlayers.find(p => p.wins === maxWins)?.idx ?? topPlayers[0].idx;
      }

      const playerWonSet = winner === 0;
      setStatistics(prev => ({
        ...prev,
        setsPlayed: (prev.setsPlayed || 0) + 1,
        setsWon: playerWonSet ? (prev.setsWon || 0) + 1 : (prev.setsWon || 0)
      }));

      // NotationLogger - セット終了を記録
      NotationLogger.recordSetEnd(winner, playersRef.current, winCount, cumulativeScores, setConfig);

      setWinnerRef.current = winner;
    }
  }, [setConfig, gameState, cumulativeScores, winCount]);

  // セットリセット時にrefもリセット
  useEffect(() => {
    if (gameState === 'menu' || (setConfig.currentGame === 0 && winCount.every(w => w === 0))) {
      setWinnerRef.current = -1;
      setCompletedRef.current = false;
    }
  }, [gameState, setConfig.currentGame, winCount]);

  const handleStopAutoPlay = () => { setAutoPlayMode(false); addLog(T.log.autoPlayStop(autoPlayCount), 'system'); };

  // オートプレイ再開ハンドラ（スリープ復帰後などに使用）
  const handleResumeAutoPlay = () => {
    if (autoPlayMode) return; // 既にオート中なら何もしない
    setAutoPlayMode(true);
    addLog(T.log.autoPlayResume(autoPlayCount), 'system');
    // 現在のゲーム状態に応じて適切な処理を再開
    if (gameState === 'gameOver') {
      // ゲーム終了画面なら次のゲームを開始
      setAutoPlayCount(prev => prev + 1);
      setGameNumber(prev => prev + 1);
      startGame();
    }
    // playing中なら useEffect が自動的に再開する
  };

  // トーナメント再開ハンドラ
  const handleResumeTournament = () => {
    if (autoPlayMode) return; // 既にオート中なら何もしない
    setAutoPlayMode(true);
    addLog(T.log.tournamentResume(tournamentProgress.current, tournamentProgress.total), 'system');
    // playing中なら useEffect が自動的に次のゲームを開始する
  };

  // Render

  // 統計詳細画面
  if (gameState === 'stats') {
    const winRate = statistics.gamesPlayed > 0 ? Math.round((statistics.gamesWon / statistics.gamesPlayed) * 100) : 0;
    const setWinRate = statistics.setsPlayed > 0 ? Math.round((statistics.setsWon / statistics.setsPlayed) * 100) : 0;
    const explorationRate = statistics.gamesPlayed > 0 ? Math.round((statistics.gamesEndedInExploration / statistics.gamesPlayed) * 100) : 0;
    return (
      <div className="menu-container">
        <div className="overlay-base menu-overlay">
          <div className="menu-box" style={{ width: 'calc(65 * var(--unit-x))' }}>
            <div className="menu-title">📊 統計詳細</div>
            <div className="menu-subtitle">{playerName}のプレイ記録</div>

            {/* セット統計 */}
            <div style={{ background: 'var(--color-cream)', padding: 'calc(1 * var(--unit-y)) calc(1.5 * var(--unit-x))', marginBottom: 'calc(1 * var(--unit-y))', border: '1px solid var(--color-dusty-pink)', textAlign: 'left' }}>
              <div style={{ fontWeight: 'bold', marginBottom: 'calc(0.5 * var(--unit-y))', fontSize: 'var(--overlay-text-size)', color: 'var(--color-burgundy)' }}>🏆 セット統計</div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '4px calc(1.5 * var(--unit-x))', fontSize: 'var(--menu-label-size)', color: 'var(--color-charcoal)' }}>
                <div>{T.ui.statsScreen.setsPlayed}: <b>{statistics.setsPlayed || 0}</b></div>
                <div>{T.ui.statsScreen.setsWon}: <b>{statistics.setsWon || 0}</b> ({setWinRate}%)</div>
              </div>
            </div>

            {/* ゲーム統計 */}
            <div style={{ background: 'var(--color-cream)', padding: 'calc(1 * var(--unit-y)) calc(1.5 * var(--unit-x))', marginBottom: 'calc(1 * var(--unit-y))', border: '1px solid var(--color-dusty-pink)', textAlign: 'left' }}>
              <div style={{ fontWeight: 'bold', marginBottom: 'calc(0.5 * var(--unit-y))', fontSize: 'var(--overlay-text-size)', color: 'var(--color-burgundy)' }}>🎮 ゲーム統計</div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '4px calc(1.5 * var(--unit-x))', fontSize: 'var(--menu-label-size)', color: 'var(--color-charcoal)' }}>
                <div>{T.ui.statsScreen.gamesPlayed}: <b>{statistics.gamesPlayed}</b></div>
                <div>{T.ui.statsScreen.gamesWon}: <b>{statistics.gamesWon}</b> ({winRate}%)</div>
                <div>{T.ui.statsScreen.scoreEarned}: <b style={{ color: 'var(--color-gold)' }}>+{statistics.totalScoreEarned || 0}</b></div>
                <div>{T.ui.statsScreen.scoreLost}: <b style={{ color: 'var(--color-burgundy)' }}>-{statistics.totalScoreLost || 0}</b></div>
                <div>{T.ui.statsScreen.netProfit}: <b style={{ color: (statistics.totalScoreEarned || 0) - (statistics.totalScoreLost || 0) >= 0 ? 'var(--color-gold)' : 'var(--color-burgundy)' }}>{(statistics.totalScoreEarned || 0) - (statistics.totalScoreLost || 0) >= 0 ? '+' : ''}{(statistics.totalScoreEarned || 0) - (statistics.totalScoreLost || 0)}</b></div>

            </div>

            {/* フェーズ別 */}
            <div style={{ background: 'var(--color-cream)', padding: 'calc(1 * var(--unit-y)) calc(1.5 * var(--unit-x))', marginBottom: 'calc(1 * var(--unit-y))', border: '1px solid var(--color-dusty-pink)', textAlign: 'left' }}>
              <div style={{ fontWeight: 'bold', marginBottom: 'calc(0.5 * var(--unit-y))', fontSize: 'var(--overlay-text-size)', color: 'var(--color-burgundy)' }}>📍 フェーズ別終了</div>
              <div style={{ display: 'flex', gap: 'calc(2 * var(--unit-x))', fontSize: 'var(--menu-label-size)', color: 'var(--color-charcoal)' }}>
                <div>{T.ui.statsScreen.explorationPhase}: <b>{statistics.gamesEndedInExploration || 0}</b> ({explorationRate}%)</div>
                <div>{T.ui.statsScreen.babanukiPhase}: <b>{statistics.gamesEndedInBabanuki || 0}</b> ({100 - explorationRate}%)</div>
              </div>
            </div>

            {/* 順位分布 */}
            <div style={{ background: 'var(--color-cream)', padding: 'calc(1 * var(--unit-y)) calc(1.5 * var(--unit-x))', marginBottom: 'calc(1.5 * var(--unit-y))', border: '1px solid var(--color-dusty-pink)', textAlign: 'left' }}>
              <div style={{ fontWeight: 'bold', marginBottom: 'calc(0.5 * var(--unit-y))', fontSize: 'var(--overlay-text-size)', color: 'var(--color-burgundy)' }}>🥇 順位分布</div>
              <div style={{ display: 'flex', gap: 'calc(1.5 * var(--unit-x))', fontSize: 'var(--menu-label-size)', color: 'var(--color-charcoal)' }}>
                <div>1位: <b>{statistics.finishPositions?.[1] || 0}</b></div>
                <div>2位: <b>{statistics.finishPositions?.[2] || 0}</b></div>
                <div>3位: <b>{statistics.finishPositions?.[3] || 0}</b></div>
                <div>4位: <b>{statistics.finishPositions?.[4] || 0}</b></div>
              </div>
            </div>

            <button className="menu-button" onClick={() => { setMenuStep('player'); setGameState('menu'); }}>{T.ui.backToMenu}</button>
          </div>
        </div>
      </div>
    );
  }

  if (gameState === 'menu') {
    // Step 1: タイトル画面
    if (menuStep === 'title') {
      return (
        <div className="menu-container">
          <div className="overlay-base menu-overlay">
            <div className="menu-box anim-fade-in">
              <div className="menu-title" onClick={handleTitleClick}>pfff!</div>
              <div className="menu-subtitle">{VERSION.string}～Stay Stall～</div>

              {showDebugOptions && (
                <div style={{ background: 'var(--color-dusty-pink)', padding: 'calc(1.5 * var(--unit-y)) calc(2 * var(--unit-x))', marginBottom: 'calc(2 * var(--unit-y))', border: '1px solid var(--color-burgundy)', borderRadius: 8, minWidth: 'calc(40 * var(--unit-x))' }}>
                  <div style={{ fontSize: 'var(--menu-label-size)', color: 'var(--color-burgundy)', marginBottom: 'calc(1 * var(--unit-y))', fontWeight: 'bold', textAlign: 'center' }}>🛠️ {T.ui.debugMode}</div>

                  {/* トーナメント/オートプレイ */}
                  <div style={{ background: 'rgba(255,255,255,0.6)', padding: 'calc(0.5 * var(--unit-y)) calc(1 * var(--unit-x))', borderRadius: 6, marginBottom: 'calc(0.5 * var(--unit-y))' }}>
                    <label style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, cursor: 'pointer', color: 'var(--color-burgundy)', fontSize: 'var(--menu-text-size)', fontWeight: 'bold' }}>
                      <input type="checkbox" checked={tournamentMode} onChange={(e) => setTournamentMode(e.target.checked)} />
                      {T.ui.runTournament}
                    </label>

                    {tournamentMode && (
                      <>
                        {/* 総当たり回数 */}
                        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, marginTop: 6 }}>
                          <span style={{ fontSize: 'var(--menu-hint-size)', color: 'var(--color-burgundy)' }}>{T.ui.tournamentSettings.roundRobinCount}:</span>
                          <div style={{ display: 'flex', gap: 3 }}>
                            {[1, 2, 3].map(r => (
                              <button key={r} onClick={() => setTournamentRounds(r)}
                                style={{ padding: '2px 8px', fontSize: 'var(--menu-hint-size)', border: '1px solid var(--color-burgundy)',
                                  background: tournamentRounds === r ? 'var(--color-gold)' : '#fff',
                                  color: tournamentRounds === r ? '#fff' : 'var(--color-burgundy)',
                                  cursor: 'pointer', borderRadius: 3 }}>{r}{T.ui.roundsLabel}</button>
                            ))}
                          </div>
                        </div>

                        {/* 参加者選択 */}
                        <div style={{ marginTop: 8, padding: '6px 8px', background: 'rgba(255,255,255,0.5)', borderRadius: 4 }}>
                          <div style={{ fontSize: 'var(--menu-hint-size)', color: 'var(--color-burgundy)', marginBottom: 4, textAlign: 'center' }}>
                            参加者選択（{selectedParticipantCount}人 → {estimatedGames}試合{estimatedGames <= 50 ? ' 📝詳細ログ' : ''}）
                          </div>
                          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4, justifyContent: 'center' }}>
                            {/* プレイヤー */}
                            <label style={{ display: 'flex', alignItems: 'center', gap: 2, cursor: 'pointer', fontSize: 'var(--menu-hint-size)', color: 'var(--color-burgundy)', padding: '2px 6px', background: tournamentParticipants.player ? 'rgba(212,175,55,0.3)' : 'rgba(128,128,128,0.1)', borderRadius: 3 }}>
                              <input type="checkbox" checked={tournamentParticipants.player} onChange={(e) => setTournamentParticipants(prev => ({ ...prev, player: e.target.checked }))} style={{ margin: 0 }} />
                              👤{playerName.slice(0,4)}
                            </label>
                            {/* AI */}
                            {Object.entries(CRITICS).map(([id, c]) => (
                              <label key={id} style={{ display: 'flex', alignItems: 'center', gap: 2, cursor: 'pointer', fontSize: 'var(--menu-hint-size)', color: 'var(--color-burgundy)', padding: '2px 6px', background: tournamentParticipants[id] ? 'rgba(212,175,55,0.3)' : 'rgba(128,128,128,0.1)', borderRadius: 3 }}>
                                <input type="checkbox" checked={tournamentParticipants[id]} onChange={(e) => setTournamentParticipants(prev => ({ ...prev, [id]: e.target.checked }))} style={{ margin: 0 }} />
                                {c.emoji}{c.name.slice(0,3)}
                              </label>
                            ))}
                          </div>
                          {/* 全選択/全解除 */}
                          <div style={{ display: 'flex', justifyContent: 'center', gap: 8, marginTop: 4 }}>
                            <button onClick={() => { const all = { player: true }; Object.keys(CRITICS).forEach(id => { all[id] = true; }); setTournamentParticipants(all); }}
                              style={{ fontSize: '10px', padding: '1px 6px', cursor: 'pointer', border: '1px solid var(--color-burgundy)', background: '#fff', borderRadius: 2, color: 'var(--color-burgundy)' }}>全員</button>
                            <button onClick={() => { const none = { player: false }; Object.keys(CRITICS).forEach(id => { none[id] = false; }); setTournamentParticipants(none); }}
                              style={{ fontSize: '10px', padding: '1px 6px', cursor: 'pointer', border: '1px solid var(--color-burgundy)', background: '#fff', borderRadius: 2, color: 'var(--color-burgundy)' }}>解除</button>
                          </div>
                          {selectedParticipantCount < 4 && (
                            <div style={{ fontSize: '10px', color: '#c00', textAlign: 'center', marginTop: 4 }}>⚠️ 4人以上を選択してください</div>
                          )}
                        </div>
                      </>
                    )}

                    {!tournamentMode && (() => {
                      const linesPerGame = logMode === 'detailed' ? 400 : (logMode === 'standard' ? 103 : 50);
                      const maxGamesForLogs = Math.floor(UnifiedLogger.maxLogs / linesPerGame);
                      return (
                        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, marginTop: 6 }}>
                          <span style={{ fontSize: 'var(--menu-hint-size)', color: 'var(--color-burgundy)' }}>{T.ui.tournamentSettings.autoPlayCount}:</span>
                          <input type="number" min="1" max={maxGamesForLogs} value={maxAutoPlayGames}
                            onChange={(e) => setMaxAutoPlayGames(Math.max(1, Math.min(maxGamesForLogs, parseInt(e.target.value) || 1)))}
                            style={{ width: 55, padding: '3px 6px', fontSize: 'var(--menu-hint-size)', border: '1px solid var(--color-burgundy)', textAlign: 'center', background: '#fff', borderRadius: 3 }} />
                          <span style={{ fontSize: 'var(--menu-hint-size)', color: 'var(--color-warm-gray)' }}>/ {maxGamesForLogs}</span>
                        </div>
                      );
                    })()}
                  </div>

                  {/* v6.6: カード枚数設定 */}
                  <div style={{ background: 'rgba(255,255,255,0.6)', padding: 'calc(0.5 * var(--unit-y)) calc(1 * var(--unit-x))', borderRadius: 6, marginBottom: 'calc(0.5 * var(--unit-y))' }}>
                    <div style={{ fontSize: 'var(--menu-text-size)', color: 'var(--color-burgundy)', marginBottom: 8, fontWeight: 'bold', textAlign: 'center' }}>{T.ui.gameParamsSection}</div>

                    {/* プリセットボタン */}
                    <div style={{ display: 'flex', justifyContent: 'center', gap: 6, marginBottom: 10, flexWrap: 'wrap' }}>
                      {[
                        { key: 'standard', label: T.ui.presetStandard },
                        { key: 'strategic', label: T.ui.presetStrategic },
                        { key: 'fair', label: T.ui.presetFair },
                        { key: 'intense', label: T.ui.presetIntense },
                      ].map(preset => {
                        const isActive = gameParams.marketCount === GAME_PRESETS[preset.key].marketCount &&
                                        gameParams.windCount === GAME_PRESETS[preset.key].windCount &&
                                        gameParams.stallCount === GAME_PRESETS[preset.key].stallCount;
                        return (
                          <button key={preset.key} onClick={() => setGameParams(GAME_PRESETS[preset.key])}
                            style={{ padding: '4px 10px', fontSize: 'var(--menu-hint-size)', border: '1px solid var(--color-burgundy)',
                              background: isActive ? 'var(--color-gold)' : '#fff',
                              color: isActive ? '#fff' : 'var(--color-burgundy)',
                              cursor: 'pointer', borderRadius: 4, fontWeight: isActive ? 'bold' : 'normal' }}>{preset.label}</button>
                        );
                      })}
                    </div>

                    {/* 市場/風/屋台スライダー */}
                    {[
                      { key: 'marketCount', label: T.ui.marketCount },
                      { key: 'windCount', label: T.ui.windCount },
                      { key: 'stallCount', label: T.ui.stallCount },
                    ].map(item => (
                      <div key={item.key} style={{ marginBottom: 6 }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                          <span style={{ fontSize: 'var(--menu-hint-size)', color: 'var(--color-burgundy)', minWidth: 45, textAlign: 'right' }}>{item.label}:</span>
                          <input type="range" min="2" max="8" value={gameParams[item.key]}
                            onChange={(e) => setGameParams(prev => ({ ...prev, [item.key]: parseInt(e.target.value) }))}
                            style={{ flex: 1, accentColor: 'var(--color-gold)', minWidth: 100 }} />
                          <span style={{ fontSize: 'var(--menu-text-size)', fontWeight: 'bold', color: 'var(--color-gold)', minWidth: 24, textAlign: 'center' }}>{gameParams[item.key]}</span>
                        </div>
                      </div>
                    ))}
                  </div>

                  {/* ログ/アニメーション設定 */}
                  <div style={{ background: 'rgba(255,255,255,0.6)', padding: 'calc(0.5 * var(--unit-y)) calc(1 * var(--unit-x))', borderRadius: 6, marginBottom: 'calc(0.5 * var(--unit-y))' }}>
                    <div style={{ fontSize: 'var(--menu-text-size)', color: 'var(--color-burgundy)', marginBottom: 6, fontWeight: 'bold', textAlign: 'center' }}>{T.ui.logSettings}</div>
                    <div style={{ display: 'flex', justifyContent: 'center', gap: 12, marginBottom: 8 }}>
                      {[
                        { mode: 'simple', ...T.settingsLabels.logModes.simple },
                        { mode: 'standard', ...T.settingsLabels.logModes.standard },
                        { mode: 'detailed', ...T.settingsLabels.logModes.detailed },
                      ].map(opt => (
                        <label key={opt.mode} style={{ display: 'flex', alignItems: 'center', gap: 4, cursor: 'pointer', color: 'var(--color-burgundy)', fontSize: 'var(--menu-hint-size)' }}>
                          <input type="radio" name="logMode" checked={logMode === opt.mode} onChange={() => handleLogModeChange(opt.mode)} />
                          {opt.label}
                        </label>
                      ))}
                    </div>
                    <div style={{ display: 'flex', justifyContent: 'center', gap: 16 }}>
                      <label style={{ display: 'flex', alignItems: 'center', gap: 4, cursor: 'pointer', color: 'var(--color-burgundy)', fontSize: 'var(--menu-hint-size)' }}>
                        <input type="checkbox" checked={animSettings.autoPlayAnim} onChange={(e) => setAnimSettings(prev => ({ ...prev, autoPlayAnim: e.target.checked }))} />
                        {T.ui.showAnimHighSpeed}
                      </label>
                      <label style={{ display: 'flex', alignItems: 'center', gap: 4, cursor: 'pointer', color: 'var(--color-burgundy)', fontSize: 'var(--menu-hint-size)' }}>
                        <input type="checkbox" checked={AISpeechSystem.enabled} onChange={(e) => {
                          AISpeechSystem.enabled = e.target.checked;
                          setAnimSettings(prev => ({ ...prev }));
                        }} />
                        {T.ui.showAiThoughts}
                      </label>
                    </div>
                  </div>

                  {/* 下部: ボタン類 */}
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 'calc(0.5 * var(--unit-y))' }}>
                    <button onClick={() => switchLanguage(currentLang === 'ja' ? 'en' : 'ja')}
                      style={{ padding: '4px 12px', fontSize: 'var(--menu-hint-size)', border: '1px solid var(--color-burgundy)',
                        background: '#fff', color: 'var(--color-burgundy)', cursor: 'pointer', borderRadius: 4 }}>
                      {currentLang === 'ja' ? '🇬🇧 English' : '🇯🇵 日本語'}
                    </button>
                    <div style={{ display: 'flex', gap: 8 }}>
                      <button className="menu-button" onClick={() => { setAutoPlayMode(false); setTournamentMode(false); setMenuStep('player'); }}
                        style={{ padding: '6px 20px', fontSize: 'var(--menu-text-size)' }}>{T.ui.cancel}</button>
                      <button className="menu-button primary"
                        onClick={() => { if (!tournamentMode) { setAutoPlayMode(true); setAutoPlayCount(0); } setMenuStep('player'); }}
                        style={{ padding: '6px 20px', fontSize: 'var(--menu-text-size)' }}>{T.ui.settings}</button>
                    </div>
                  </div>
                </div>
              )}

              {!showDebugOptions && (
                <button className="menu-button primary" onClick={() => setMenuStep('player')}>
                  {T.ui.start}
                </button>
              )}
              
              {/* v2.5.10.1: iOS「ホーム画面に追加」誘導バナー */}
              {showIOSInstallBanner && (
                <div style={{
                  marginTop: 'calc(2 * var(--unit-y))',
                  padding: 'calc(1 * var(--unit-y)) calc(2 * var(--unit-x))',
                  background: 'linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%)',
                  border: '1px solid var(--color-dusty-pink)',
                  borderRadius: 8,
                  fontSize: 'var(--menu-text-size)',
                  color: 'var(--color-charcoal)',
                  position: 'relative'
                }}>
                  <button 
                    onClick={dismissIOSBanner}
                    style={{
                      position: 'absolute',
                      top: 4,
                      right: 8,
                      background: 'none',
                      border: 'none',
                      fontSize: 16,
                      cursor: 'pointer',
                      color: 'var(--color-warm-gray)'
                    }}
                  >✕</button>
                  <div style={{ fontWeight: 'bold', marginBottom: 4 }}>
                    📱 {T.lang === 'ja' ? 'アプリとして使う' : 'Install as App'}
                  </div>
                  <div style={{ fontSize: 'var(--menu-hint-size)', lineHeight: 1.4 }}>
                    {T.lang === 'ja' 
                      ? '共有ボタン → 「ホーム画面に追加」でフルスクリーン表示できます'
                      : 'Tap Share → "Add to Home Screen" for fullscreen mode'}
                  </div>
                  <div style={{ marginTop: 6, display: 'flex', justifyContent: 'center', gap: 8, fontSize: 20 }}>
                    <span>⬆️</span>
                    <span>→</span>
                    <span>➕🏠</span>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // Step 2: プレイヤー選択
    if (menuStep === 'player') {
      return (
        <div className="menu-container">
          <div className="overlay-base menu-overlay">
            {/* v2.5.9.14: プレイヤー選択画面は絵文字グリッド幅+マージン（最大90vw） */}
            <div className="menu-box anim-fade-in" style={{ width: 540, maxWidth: '90vw' }}>
              <div className="menu-title">{T.ui.playerSelect}</div>
              <div className="menu-subtitle">{T.ui.selectProfile}</div>

              <div style={{ marginBottom: 'calc(2 * var(--unit-y))', padding: 'calc(1.5 * var(--unit-y)) calc(2 * var(--unit-x))', background: 'var(--color-cream)', border: '1px solid var(--color-dusty-pink)' }}>
                {showNameInput ? (
                  <div>
                    <div style={{ display: 'flex', gap: 8, alignItems: 'center', justifyContent: 'center', marginBottom: 8 }}>
                      <span style={{ fontSize: 24 }}>{playerEmoji}</span>
                      <input
                        type="text"
                        value={playerName}
                        onChange={(e) => setPlayerName(e.target.value.slice(0, 10))}
                        placeholder="名前を入力"
                        style={{ padding: '7px 8px', fontSize: 'var(--overlay-text-size)', border: '1px solid var(--color-burgundy)', width: 100, textAlign: 'center', background: '#fff' }}
                        autoFocus
                        onKeyDown={(e) => { if (e.key === 'Enter' && playerName.trim()) { createProfile(playerName.trim(), playerEmoji); } }}
                      />
                      <button
                        onClick={() => { if (playerName.trim()) createProfile(playerName.trim(), playerEmoji); }}
                        disabled={!playerName.trim()}
                        className="menu-button primary"
                        style={{ width: 'auto', padding: '7px 12px', opacity: playerName.trim() ? 1 : 0.5 }}
                      >✓</button>
                      <button
                        onClick={() => { setShowNameInput(false); setPlayerEmoji('👤'); if (profiles.length > 0 && !currentProfileId) selectProfile(profiles[0]); }}
                        className="menu-button"
                        style={{ width: 'auto', padding: '7px 12px' }}
                      >✕</button>
                    </div>
                    {/* v2.5.9.14: 絵文字選択を2行横並び（画面幅超過時は横スクロール） */}
                    <div style={{ 
                      overflowX: 'auto',
                      overflowY: 'hidden',
                      padding: '4px 0',
                      WebkitOverflowScrolling: 'touch'
                    }}>
                      <div style={{ 
                        display: 'grid',
                        gridTemplateRows: 'repeat(2, 1fr)',
                        gridAutoFlow: 'column',
                        gap: 3,
                        width: 'fit-content',
                        margin: '0 auto'
                      }}>
                        {PLAYER_EMOJI_OPTIONS.map(e => (
                          <button
                            key={e}
                            onClick={() => setPlayerEmoji(e)}
                            style={{
                              padding: '2px',
                              fontSize: 18,
                              width: 32,
                              height: 32,
                              display: 'flex',
                              alignItems: 'center',
                              justifyContent: 'center',
                              border: playerEmoji === e ? '2px solid var(--color-gold)' : '1px solid var(--color-dusty-pink)',
                              background: playerEmoji === e ? 'var(--color-cream)' : '#fff',
                              borderRadius: 4,
                              cursor: 'pointer'
                            }}
                          >{e}</button>
                        ))}
                      </div>
                    </div>
                  </div>
                ) : currentProfileId ? (
                  <div>
                    {editingProfileId === currentProfileId ? (
                      <div>
                        <div style={{ display: 'flex', gap: 8, alignItems: 'center', justifyContent: 'center', marginBottom: 8 }}>
                          <span style={{ fontSize: 24 }}>{editingEmoji}</span>
                          <input
                            type="text"
                            value={editingName}
                            onChange={(e) => setEditingName(e.target.value.slice(0, 10))}
                            style={{ padding: '7px 8px', fontSize: 'var(--overlay-text-size)', border: '1px solid var(--color-burgundy)', width: 100, textAlign: 'center', background: '#fff' }}
                            autoFocus
                            onKeyDown={(e) => { if (e.key === 'Enter') saveEditProfile(); if (e.key === 'Escape') setEditingProfileId(null); }}
                          />
                          <button onClick={saveEditProfile} className="menu-button primary" style={{ width: 'auto', padding: '7px 12px' }}>✓</button>
                          <button onClick={() => setEditingProfileId(null)} className="menu-button" style={{ width: 'auto', padding: '7px 12px' }}>✕</button>
                        </div>
                        {/* v2.5.9.14: 絵文字選択を2行横並び（画面幅超過時は横スクロール） */}
                        <div style={{ 
                          overflowX: 'auto',
                          overflowY: 'hidden',
                          padding: '4px 0',
                          WebkitOverflowScrolling: 'touch'
                        }}>
                          <div style={{ 
                            display: 'grid',
                            gridTemplateRows: 'repeat(2, 1fr)',
                            gridAutoFlow: 'column',
                            gap: 3,
                            width: 'fit-content',
                            margin: '0 auto'
                          }}>
                            {PLAYER_EMOJI_OPTIONS.map(e => (
                              <button
                                key={e}
                                onClick={() => setEditingEmoji(e)}
                                style={{
                                  padding: '2px',
                                  fontSize: 18,
                                  width: 32,
                                  height: 32,
                                  display: 'flex',
                                  alignItems: 'center',
                                  justifyContent: 'center',
                                  border: editingEmoji === e ? '2px solid var(--color-gold)' : '1px solid var(--color-dusty-pink)',
                                  background: editingEmoji === e ? 'var(--color-cream)' : '#fff',
                                  borderRadius: 4,
                                  cursor: 'pointer'
                                }}
                              >{e}</button>
                            ))}
                          </div>
                        </div>
                      </div>
                    ) : (
                      <div style={{ display: 'flex', gap: 8, alignItems: 'center', justifyContent: 'center', marginBottom: 8 }}>
                        <span style={{ fontSize: 24 }}>{playerEmoji}</span>
                        <span style={{ fontSize: 'var(--overlay-subtitle-size)', fontWeight: 'bold', color: 'var(--color-burgundy)' }}>{playerName}</span>
                        <button onClick={() => startEditProfile(profiles.find(p => p.id === currentProfileId))} className="menu-button" style={{ width: 'auto', padding: '4px 8px', fontSize: 'var(--menu-label-size)' }} title={T.ui.edit}>✏️</button>
                        <button onClick={() => deleteProfile(currentProfileId)} className="menu-button" style={{ width: 'auto', padding: '4px 8px', fontSize: 'var(--menu-label-size)', borderColor: 'var(--color-burgundy)', color: 'var(--color-burgundy)' }} title="削除">🗑️</button>
                        <button onClick={() => { setShowNameInput(true); setPlayerEmoji('👤'); setPlayerName(''); }} className="menu-button" style={{ width: 'auto', padding: '4px 8px', fontSize: 'var(--menu-label-size)', borderColor: 'var(--color-gold)', color: 'var(--color-gold)' }} title={T.ui.newProfile}>➕</button>
                      </div>
                    )}
                    {statistics.gamesPlayed > 0 && (
                      <div style={{ fontSize: 'var(--menu-label-size)', color: 'var(--color-warm-gray)', marginBottom: 8 }}>
                        {T.ui.stats(statistics.gamesWon, statistics.gamesPlayed, Math.round((statistics.gamesWon / statistics.gamesPlayed) * 100))}
                        <button onClick={() => setGameState('stats')} className="menu-button" style={{ width: 'auto', marginLeft: 8, padding: '2px 8px', fontSize: 'var(--menu-text-size)' }}>{T.ui.details}</button>
                      </div>
                    )}
                    {profiles.length > 1 && (
                      <div style={{ borderTop: '1px solid var(--color-dusty-pink)', paddingTop: 8, marginTop: 8 }}>
                        <div style={{ fontSize: 'var(--menu-text-size)', color: 'var(--color-warm-gray)', marginBottom: 4 }}>{T.ui.switchTo}</div>
                        <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap', justifyContent: 'center' }}>
                          {profiles.filter(p => p.id !== currentProfileId).map(p => (
                            <button key={p.id} onClick={() => selectProfile(p)} className="menu-button" style={{ width: 'auto', padding: '2px 8px', fontSize: 'var(--menu-text-size)' }}>
                              {p.emoji || '👤'} {p.name}
                            </button>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                ) : (
                  <div>
                    {profiles.length > 0 ? (
                      <div>
                        <div style={{ fontSize: 'var(--menu-label-size)', color: 'var(--color-warm-gray)', marginBottom: 8 }}>{T.ui.selectProfileLabel}</div>
                        <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap', justifyContent: 'center', marginBottom: 8 }}>
                          {profiles.map(p => (
                            <button key={p.id} onClick={() => selectProfile(p)} className="menu-button" style={{ width: 'auto', padding: '4px 12px', fontSize: 'var(--overlay-text-size)' }}>
                              {p.emoji || '👤'} {p.name}
                            </button>
                          ))}
                        </div>
                        <button onClick={() => { setShowNameInput(true); setPlayerEmoji('👤'); setPlayerName(''); }} className="menu-button" style={{ width: 'auto', padding: '4px 12px', fontSize: 'var(--menu-label-size)' }}>{T.ui.newProfile}</button>
                      </div>
                    ) : (
                      <div>
                        <div style={{ fontSize: 'var(--menu-label-size)', color: 'var(--color-warm-gray)', marginBottom: 8 }}>{T.ui.noProfiles}</div>
                        <button onClick={() => { setShowNameInput(true); setPlayerEmoji('👤'); setPlayerName(''); }} className="menu-button primary" style={{ width: 'auto', padding: '7px 16px' }}>{T.ui.newProfile}</button>
                      </div>
                    )}
                  </div>
                )}
              </div>

              <div style={{ display: 'flex', gap: 'calc(1 * var(--unit-x))', justifyContent: 'center' }}>
                <button className="menu-button" onClick={() => setMenuStep('title')} style={{ width: 'calc(20 * var(--unit-x))' }}>{ T.ui.back }</button>
                {tournamentMode ? (
                  <button
                    className="menu-button primary"
                    onClick={() => startTournament()}
                    disabled={!currentProfileId || selectedParticipantCount < 4}
                    style={{ width: 'calc(20 * var(--unit-x))', opacity: (currentProfileId && selectedParticipantCount >= 4) ? 1 : 0.5 }}
                  >{T.ui.startBtn}</button>
                ) : (
                  <button
                    className="menu-button primary"
                    onClick={() => setMenuStep('opponent')}
                    disabled={!currentProfileId}
                    style={{ width: 'calc(20 * var(--unit-x))', opacity: currentProfileId ? 1 : 0.5 }}
                  >{ T.ui.next }</button>
                )}
              </div>

              {/* トーナメントモード時の説明 */}
              {tournamentMode && (
                <div style={{ marginTop: 'calc(1 * var(--unit-y))', padding: 'calc(0.5 * var(--unit-y)) calc(1 * var(--unit-x))', background: 'var(--color-gold)', color: '#fff', fontSize: 'var(--menu-text-size)', textAlign: 'center' }}>
                  🏆 トーナメント: {selectedParticipantCount}人 × {tournamentRounds}回 = {estimatedGames}試合{estimatedGames <= 50 ? ' (詳細ログ出力)' : ''}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // Step 3: 対戦相手選択
    if (menuStep === 'opponent') {
      return (
        <div className="menu-container">
          <div className="overlay-base menu-overlay">
            <div className="menu-box anim-fade-in">
              <div className="menu-title">{T.ui.opponentSelect}</div>
              <div className="menu-subtitle">{T.ui.opponentHint}</div>

              <div className="critic-grid">
                {Object.entries(CRITICS).map(([id, c]) => {
                  const isSelected = selectedOpponents.includes(id);
                  const strategy = getAiStrategy(id);
                  const isCustomized = aiIndividualStrategies[id] !== undefined;
                  return (
                    <div
                      key={id}
                      className={`critic-card ${isSelected ? 'selected' : ''}`}
                      onClick={() => handleAiCardClick(id, isSelected)}
                      style={{ position: 'relative' }}
                    >
                      <div className="critic-emoji">{c.emoji}</div>
                      <div className="critic-name">{c.name}</div>
                      <div className="critic-title">{c.title}</div>
                      {isCustomized && (
                        <div style={{
                          position: 'absolute',
                          top: 2,
                          right: 2,
                          fontSize: 'var(--menu-hint-size)',
                          background: 'var(--color-gold)',
                          color: '#fff',
                          padding: '1px 3px',
                          borderRadius: 2
                        }}>⚙️</div>
                      )}
                    </div>
                  );
                })}
              </div>

              <div style={{ display: 'flex', gap: 'calc(1 * var(--unit-x))', justifyContent: 'center' }}>
                <button className="menu-button" onClick={() => setMenuStep('player')} style={{ width: 'calc(20 * var(--unit-x))' }}>{ T.ui.back }</button>
                <button
                  className="menu-button primary"
                  onClick={() => setMenuStep('settings')}
                  disabled={selectedOpponents.length === 0}
                  style={{ width: 'calc(20 * var(--unit-x))', opacity: selectedOpponents.length > 0 ? 1 : 0.5 }}
                >{ T.ui.next }</button>
              </div>
            </div>
          </div>

          {}
          {editingAiId && CRITICS[editingAiId] && (
            <div style={{
              position: 'fixed',
              top: 0,
              left: 0,
              right: 0,
              bottom: 0,
              background: 'rgba(0,0,0,0.7)',
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'center',
              zIndex: 1000
            }} onClick={() => setEditingAiId(null)}>
              <div style={{
                background: 'var(--color-cream)',
                border: '3px solid var(--color-burgundy)',
                padding: 'calc(1.5 * var(--unit-y)) calc(2 * var(--unit-x))',
                minWidth: 300,
                maxWidth: 340,
                maxHeight: '90vh',
                overflowY: 'auto'
              }} onClick={e => e.stopPropagation()}>
                <div style={{ fontSize: 'var(--menu-title-size)', fontWeight: 'bold', color: 'var(--color-burgundy)', marginBottom: 4, textAlign: 'center' }}>
                  ⚙️ {CRITICS[editingAiId].emoji} {CRITICS[editingAiId].name}
                </div>
                <div style={{ fontSize: 'var(--menu-text-size)', color: 'var(--color-warm-gray)', marginBottom: 12, textAlign: 'center' }}>
                  {CRITICS[editingAiId].title}の戦略設定
                </div>

                {/* 1. 家カード選好 - v2.0.0: prison/ruin削除、stall追加 */}
                <div style={{ marginBottom: 10 }}>
                  <div style={{ fontSize: 'var(--menu-text-size)', color: 'var(--color-burgundy)', marginBottom: 4, fontWeight: 'bold' }}>{T.ui.houseCardPref}</div>
                  <div style={{ display: 'flex', gap: 3, flexWrap: 'wrap' }}>
                    {[
                      T.settingsLabels.houseTypes?.house,
                    ].filter(Boolean).map(opt => (
                      <button
                        key={opt.value}
                        onClick={() => setAiIndividualStrategies(prev => ({
                          ...prev,
                          [editingAiId]: { ...getAiStrategy(editingAiId), housePreference: opt.value }
                        }))}
                        style={{
                          padding: '3px 6px', fontSize: 'var(--menu-hint-size)', border: '1px solid var(--color-burgundy)',
                          background: getAiStrategy(editingAiId).housePreference === opt.value ? 'var(--color-gold)' : '#fff',
                          color: getAiStrategy(editingAiId).housePreference === opt.value ? '#fff' : 'var(--color-burgundy)',
                          cursor: 'pointer', borderRadius: 2
                        }}
                      >{opt.label}</button>
                    ))}
                  </div>
                </div>

                {/* 2. 格納点数閾値 */}
                <div style={{ marginBottom: 10 }}>
                  <div style={{ fontSize: 'var(--menu-text-size)', color: 'var(--color-burgundy)', marginBottom: 4, fontWeight: 'bold' }}>📊 格納点数閾値（何点以上を格納）</div>
                  <div style={{ display: 'flex', gap: 3 }}>
                    {[1, 2, 3, 4, 5].map(v => (
                      <button
                        key={v}
                        onClick={() => setAiIndividualStrategies(prev => ({
                          ...prev,
                          [editingAiId]: { ...getAiStrategy(editingAiId), storeThreshold: v }
                        }))}
                        style={{
                          padding: '3px 8px', fontSize: 'var(--menu-text-size)', border: '1px solid var(--color-burgundy)',
                          background: getAiStrategy(editingAiId).storeThreshold === v ? 'var(--color-gold)' : '#fff',
                          color: getAiStrategy(editingAiId).storeThreshold === v ? '#fff' : 'var(--color-burgundy)',
                          cursor: 'pointer', borderRadius: 2
                        }}
                      >{v}点+</button>
                    ))}
                  </div>
                </div>

                {/* 3. v2.0.0: 攻撃対象選好（windPreference → attackTarget） */}
                <div style={{ marginBottom: 10 }}>
                  <div style={{ fontSize: 'var(--menu-text-size)', color: 'var(--color-burgundy)', marginBottom: 4, fontWeight: 'bold' }}>{T.ui.attackTargetPref}</div>
                  <div style={{ display: 'flex', gap: 3, flexWrap: 'wrap' }}>
                    {[
                      T.settingsLabels.attackTargets.highValue,
                      T.settingsLabels.attackTargets.random,
                    ].filter(Boolean).map(opt => (
                      <button
                        key={opt.value}
                        onClick={() => setAiIndividualStrategies(prev => ({
                          ...prev,
                          [editingAiId]: { ...getAiStrategy(editingAiId), attackTarget: opt.value }
                        }))}
                        style={{
                          padding: '3px 6px', fontSize: 'var(--menu-hint-size)', border: '1px solid var(--color-burgundy)',
                          background: getAiStrategy(editingAiId).attackTarget === opt.value ? 'var(--color-gold)' : '#fff',
                          color: getAiStrategy(editingAiId).attackTarget === opt.value ? '#fff' : 'var(--color-burgundy)',
                          cursor: 'pointer', borderRadius: 2
                        }}
                      >{opt.label}</button>
                    ))}
                  </div>
                </div>

                {/* 4. 投機的家格納 */}
                <div style={{ marginBottom: 10 }}>
                  <div style={{ fontSize: 'var(--menu-text-size)', color: 'var(--color-burgundy)', marginBottom: 4, fontWeight: 'bold' }}>🎲 投機的家格納</div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                    <input
                      type="range" min="0" max="100"
                      value={getAiStrategy(editingAiId).speculativeHouse}
                      onChange={(e) => setAiIndividualStrategies(prev => ({
                        ...prev,
                        [editingAiId]: { ...getAiStrategy(editingAiId), speculativeHouse: parseInt(e.target.value) }
                      }))}
                      style={{ flex: 1, accentColor: 'var(--color-gold)' }}
                    />
                    <span style={{ fontSize: 'var(--menu-label-size)', color: 'var(--color-burgundy)', minWidth: 35 }}>{getAiStrategy(editingAiId).speculativeHouse}%</span>
                  </div>
                  <div style={{ display: 'flex', gap: 2, marginTop: 3 }}>
                    {[0, 25, 50, 75, 100].map(v => (
                      <button key={v} onClick={() => setAiIndividualStrategies(prev => ({
                        ...prev, [editingAiId]: { ...getAiStrategy(editingAiId), speculativeHouse: v }
                      }))} style={{
                        padding: '1px 4px', fontSize: 'var(--menu-hint-size)', border: '1px solid var(--color-burgundy)',
                        background: getAiStrategy(editingAiId).speculativeHouse === v ? 'var(--color-gold)' : '#fff',
                        color: getAiStrategy(editingAiId).speculativeHouse === v ? '#fff' : 'var(--color-burgundy)',
                        cursor: 'pointer', borderRadius: 2
                      }}>{v}%</button>
                    ))}
                  </div>
                </div>

                {/* 5. 投機的風カード */}
                <div style={{ marginBottom: 12 }}>
                  <div style={{ fontSize: 'var(--menu-text-size)', color: 'var(--color-burgundy)', marginBottom: 4, fontWeight: 'bold' }}>🌀 投機的風カード</div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                    <input
                      type="range" min="0" max="100"
                      value={getAiStrategy(editingAiId).speculativeWind}
                      onChange={(e) => setAiIndividualStrategies(prev => ({
                        ...prev,
                        [editingAiId]: { ...getAiStrategy(editingAiId), speculativeWind: parseInt(e.target.value) }
                      }))}
                      style={{ flex: 1, accentColor: 'var(--color-gold)' }}
                    />
                    <span style={{ fontSize: 'var(--menu-label-size)', color: 'var(--color-burgundy)', minWidth: 35 }}>{getAiStrategy(editingAiId).speculativeWind}%</span>
                  </div>
                  <div style={{ display: 'flex', gap: 2, marginTop: 3 }}>
                    {[0, 25, 50, 75, 100].map(v => (
                      <button key={v} onClick={() => setAiIndividualStrategies(prev => ({
                        ...prev, [editingAiId]: { ...getAiStrategy(editingAiId), speculativeWind: v }
                      }))} style={{
                        padding: '1px 4px', fontSize: 'var(--menu-hint-size)', border: '1px solid var(--color-burgundy)',
                        background: getAiStrategy(editingAiId).speculativeWind === v ? 'var(--color-gold)' : '#fff',
                        color: getAiStrategy(editingAiId).speculativeWind === v ? '#fff' : 'var(--color-burgundy)',
                        cursor: 'pointer', borderRadius: 2
                      }}>{v}%</button>
                    ))}
                  </div>
                </div>

                {/* ボタン */}
                <div style={{ display: 'flex', gap: 8, justifyContent: 'center' }}>
                  <button
                    className="menu-button"
                    onClick={() => {
                      setAiIndividualStrategies(prev => {
                        const newStrategies = { ...prev };
                        delete newStrategies[editingAiId];
                        return newStrategies;
                      });
                    }}
                    style={{ padding: '4px 12px', fontSize: 'var(--menu-label-size)' }}
                  >{T.ui.reset}</button>
                  <button
                    className="menu-button primary"
                    onClick={() => setEditingAiId(null)}
                    style={{ padding: '4px 12px', fontSize: 'var(--menu-label-size)' }}
                  >{T.ui.close}</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // Step 4: セット設定
    // N人×1ゲーム=1セット方式
    const numPlayersForSet = selectedOpponents.length + 1; // 人間+AI
    return (
      <div className="menu-container">
        <div className="overlay-base menu-overlay">
          <div className="menu-box anim-fade-in">
            <div className="menu-title">{T.ui.setConfig}</div>
            <div className="menu-subtitle">{T.ui.setConfigHint(numPlayersForSet)}</div>

            <div style={{ marginBottom: 'calc(2 * var(--unit-y))' }}>
              <div style={{ display: 'flex', gap: 'calc(1 * var(--unit-x))', justifyContent: 'center', flexWrap: 'wrap' }}>
                {[1, 3, 5, 0].map(sets => (
                  <button
                    key={sets}
                    className="menu-button"
                    onClick={() => setSetConfig(prev => ({
                      ...prev,
                      totalSets: sets,
                      gamesPerSet: numPlayersForSet,
                      currentSet: 1,
                      currentGame: 0,
                      setFirstPlayer: -1
                    }))}
                    style={{
                      width: 'calc(12 * var(--unit-x))',
                      padding: '7px 8px',
                      background: setConfig.totalSets === sets ? 'var(--color-gold)' : '#fff',
                      color: setConfig.totalSets === sets ? '#fff' : 'var(--color-burgundy)',
                      borderColor: setConfig.totalSets === sets ? 'var(--color-gold)' : 'var(--color-burgundy)'
                    }}
                  >
                    {T.settingsLabels.setCount(sets)}
                  </button>
                ))}
              </div>
            </div>

            {/* 対戦プレビュー */}
            <div style={{ marginBottom: 'calc(2 * var(--unit-y))', padding: 'calc(1 * var(--unit-y)) calc(2 * var(--unit-x))', background: 'var(--color-cream)', border: '1px solid var(--color-dusty-pink)' }}>
              <div style={{ fontSize: 'var(--menu-label-size)', color: 'var(--color-warm-gray)', marginBottom: 8 }}>{T.ui.matchMembers}</div>
              <div style={{ display: 'flex', gap: 'calc(1 * var(--unit-x))', justifyContent: 'center', flexWrap: 'wrap' }}>
                <span style={{ fontSize: 'var(--overlay-text-size)', fontWeight: 'bold', color: 'var(--color-gold)' }}>👤 {playerName}</span>
                <span style={{ fontSize: 'var(--overlay-text-size)', color: 'var(--color-warm-gray)' }}>vs</span>
                {selectedOpponents.map(id => (
                  <span key={id} style={{ fontSize: 'var(--overlay-text-size)' }}>{CRITICS[id]?.emoji} {CRITICS[id]?.name}</span>
                ))}
              </div>
            </div>

            <div style={{ display: 'flex', gap: 'calc(1 * var(--unit-x))', justifyContent: 'center' }}>
              <button className="menu-button" onClick={() => setMenuStep('opponent')} style={{ width: 'calc(20 * var(--unit-x))' }}>{ T.ui.back }</button>
              <button
                className="menu-button primary"
                onClick={startGame}
                style={{ width: 'calc(20 * var(--unit-x))' }}
              >🎮 {T.ui.startGame}</button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // セット終了判定（N人×1ゲーム=1セット、累積スコアで勝敗判定）
  const isSetComplete = setConfig.totalSets > 0 && setConfig.currentGame >= setConfig.gamesPerSet;
  const setWinner = (() => {
    if (!isSetComplete) return -1;
    // 累積スコアで勝者判定
    const maxScore = Math.max(...cumulativeScores);
    const topPlayers = cumulativeScores.map((s, i) => ({ idx: i, score: s, wins: winCount[i] || 0 }))
      .filter(p => p.score === maxScore);
    if (topPlayers.length === 1) return topPlayers[0].idx;
    // 同点時は勝利数で判定
    const maxWins = Math.max(...topPlayers.map(p => p.wins));
    return topPlayers.find(p => p.wins === maxWins)?.idx ?? topPlayers[0].idx;
  })();
  const isSetOver = setWinner >= 0;

  if (gameState === 'gameOver') {
    const winnerIdx = winCount.indexOf(Math.max(...winCount));
    const winRate = statistics.gamesPlayed > 0 ? Math.round((statistics.gamesWon / statistics.gamesPlayed) * 100) : 0;

    // セット終了時はmatchOver画面へ
    if (isSetOver && !autoPlayMode) {
      return (
        <div className="menu-container">
          <div className="overlay-base menu-overlay">
            <div className="menu-box anim-fade-in" style={{ padding: 'calc(2 * var(--unit-y)) calc(3 * var(--unit-x))' }}>
              <div style={{ fontSize: 36, marginBottom: 'calc(0.5 * var(--unit-y))' }} className="anim-win">🏆</div>
              <div className="menu-title" style={{ fontSize: 'var(--overlay-title-size)', marginBottom: 'calc(0.5 * var(--unit-y))' }} onClick={handleTitleClick}>{T.overlay.setEnd.title}</div>
              <div style={{ fontSize: 'var(--menu-title-size)', fontWeight: 'bold', color: setWinner === 0 ? 'var(--color-gold)' : 'var(--color-charcoal)' }}>
                {T.overlay.setVictory(players[setWinner]?.emoji || '👤', players[setWinner]?.name || T.misc.player)}
              </div>
              <div style={{ fontSize: 'var(--menu-label-size)', color: 'var(--color-warm-gray)', marginBottom: 'calc(1 * var(--unit-y))' }}>
                {T.overlay.setEnd.setComplete(setConfig.currentSet, setConfig.gamesPerSet)}
              </div>

              {/* 勝敗・スコア表（コンパクト） */}
              <div style={{ background: 'var(--color-cream)', padding: 'calc(0.5 * var(--unit-y)) calc(1 * var(--unit-x))', marginBottom: 'calc(0.5 * var(--unit-y))', border: '1px solid var(--color-dusty-pink)' }}>
                <div style={{ fontSize: 'var(--menu-text-size)', color: 'var(--color-warm-gray)', marginBottom: '4px', textAlign: 'center' }}>{T.overlay.setEnd.result(setConfig.gamesPerSet)}</div>
                {players.map((p, i) => (
                  <div key={i} style={{
                    display: 'flex',
                    justifyContent: 'space-between',
                    padding: '2px 0',
                    fontSize: 'var(--menu-label-size)',
                    fontWeight: i === setWinner ? 'bold' : 'normal',
                    color: i === setWinner ? 'var(--color-gold)' : 'var(--color-charcoal)',
                    borderBottom: i < players.length - 1 ? '1px solid var(--color-dusty-pink)' : 'none'
                  }}>
                    <span>{p.emoji || '👤'} {p.name}</span>
                    <span style={{ display: 'flex', gap: 'calc(1 * var(--unit-x))' }}>
                      <span>{winCount[i]}{T.ui.winsLabel}</span>
                      <span style={{ color: cumulativeScores[i] >= 0 ? 'var(--color-gold)' : 'var(--color-burgundy)' }}>
                        {cumulativeScores[i] >= 0 ? '+' : ''}{cumulativeScores[i]}{T.ui.ptsLabel}
                      </span>
                    </span>
                  </div>
                ))}
              </div>

              {/* 統計（1行に集約） */}
              <div style={{ fontSize: 'var(--menu-text-size)', color: 'var(--color-warm-gray)', marginBottom: 'calc(1 * var(--unit-y))', textAlign: 'center' }}>
                {T.ui.statsTotal(statistics.setsPlayed, statistics.setsWon, statistics.gamesPlayed, statistics.gamesWon, winRate)}
              </div>

              <button className="menu-button primary" onClick={() => {
                setCumulativeScores([0,0,0,0]);
                setWinCount([0,0,0,0]);
                setGameNumber(1);
                // setConfigをリセット（次のセット、先手ランダム）
                setSetConfig(prev => ({
                  ...prev,
                  currentSet: prev.currentSet + 1,
                  currentGame: 0,
                  setFirstPlayer: -1  // 次のセット開始時にランダム決定
                }));
                setFirstPlayerIndex(0);
                startGame();
              }}>{T.ui.newSet}</button>
              <button className="menu-button" onClick={() => {
                setEffect(null);
                setCumulativeScores([0,0,0,0]);
                setWinCount([0,0,0,0]);
                setGameNumber(1);
                // setConfigを完全リセット
                setSetConfig(prev => ({
                  ...prev,
                  currentSet: 1,
                  currentGame: 0,
                  setFirstPlayer: -1
                }));
                setFirstPlayerIndex(0);
                setMenuStep('title');
                setGameState('menu');
              }}>{T.ui.toMenu}</button>
              {showDebugOptions && <button className="menu-button" onClick={() => UnifiedLogger.download()} style={{ marginTop: '4px' }}>{T.ui.saveLog}</button>}
            </div>
          </div>
        </div>
      );
    }

    // 通常のゲーム終了画面
    // lastWinnerIdxを使用（今回のゲームの勝者）
    const getWinConditionText = () => {
      if (lastWinCondition === 'forceEnd') return T.overlay.gameResult.gameInterrupted;
      if (lastWinCondition === 'draw') return T.overlay.gameResult.stalemateDraw;
      if (lastWinCondition === 'stalemate') return T.overlay.gameResult.stalemateJudge;
      return T.overlay.gameResult.agariEmoji;
    };
    const getWinConditionEmoji = () => {
      if (lastWinCondition === 'forceEnd') return '🚪';
      if (lastWinCondition === 'draw') return '🤝';
      if (lastWinCondition === 'stalemate') return T.overlay.gameResult.stalemateIcon;
      return '🎊';
    };
    const getWinnerText = () => {
      if (lastWinnerIdx < 0 || !players[lastWinnerIdx]) return T.overlay.gameResult.gameCancelled;
      return T.overlay.gameResult.victory(players[lastWinnerIdx]?.name || T.misc.player);
    };

    return (
      <div className="menu-container">
        <div className="overlay-base menu-overlay">
          <div className="menu-box anim-slide-up" style={{ padding: 'calc(2 * var(--unit-y)) calc(3 * var(--unit-x))' }}>
            <div style={{ fontSize: 36, marginBottom: 'calc(0.5 * var(--unit-y))' }}>{getWinConditionEmoji()}</div>
            <div className="menu-title" style={{ fontSize: 'var(--overlay-title-size)', marginBottom: 'calc(0.5 * var(--unit-y))' }} onClick={handleTitleClick}>{T.overlay.gameResult.gameEnd(gameNumber)}</div>
            <div style={{ fontSize: 'var(--menu-title-size)', marginBottom: 'calc(0.25 * var(--unit-y))', fontWeight: 'bold', color: lastWinnerIdx === 0 ? 'var(--color-gold)' : 'var(--color-charcoal)' }}>{getWinnerText()}</div>
            {}
            <div style={{ fontSize: 'var(--overlay-text-size)', marginBottom: 'calc(0.5 * var(--unit-y))', color: 'var(--color-warm-gray)' }}>{getWinConditionText()}</div>

            {/* v2.0.3: セット進捗（N人×1ゲーム=1セット方式） */}
            {setConfig.totalSets > 0 && (
              <div style={{ fontSize: 'var(--menu-label-size)', color: 'var(--color-warm-gray)', marginBottom: 'calc(0.5 * var(--unit-y))' }}>
                {T.ui.setInfo(setConfig.currentSet, setConfig.currentGame, setConfig.gamesPerSet)}
              </div>
            )}

            {/* スコア表（コンパクト） */}
            <div style={{ background: 'var(--color-cream)', padding: 'calc(0.5 * var(--unit-y)) calc(1 * var(--unit-x))', marginBottom: 'calc(0.5 * var(--unit-y))', border: '1px solid var(--color-dusty-pink)' }}>
              {players.map((p, i) => (
                <div key={i} style={{ display: 'flex', justifyContent: 'space-between', padding: '2px 0', fontSize: 'var(--menu-label-size)', fontWeight: i === lastWinnerIdx ? 'bold' : 'normal', color: i === lastWinnerIdx ? 'var(--color-gold)' : 'var(--color-charcoal)' }}>
                  <span>{p.emoji || '👤'} {p.name}</span>
                  <span style={{ color: cumulativeScores[i] >= 0 ? 'var(--color-gold)' : 'var(--color-burgundy)' }}>{cumulativeScores[i] >= 0 ? '+' : ''}{cumulativeScores[i]}{T.ui.ptsLabel}</span>
                </div>
              ))}
            </div>

            {/* 統計（1行に集約） */}
            <div style={{ fontSize: 'var(--menu-text-size)', color: 'var(--color-warm-gray)', marginBottom: 'calc(1 * var(--unit-y))', textAlign: 'center' }}>
              {T.ui.statsGame(statistics.gamesPlayed, statistics.gamesWon, winRate)}
            </div>

            {showDebugOptions && <div style={{ marginBottom: '4px', fontSize: 'var(--menu-text-size)', color: 'var(--color-warm-gray)' }}>{T.ui.autoPlayProgress(autoPlayCount, maxAutoPlayGames)}</div>}
            <button className="menu-button primary" onClick={() => { setGameNumber(prev => prev + 1); startGame(); }}>{T.ui.nextGame}</button>
            <button className="menu-button" onClick={() => {
              setEffect(null);
              setCumulativeScores([0,0,0,0]);
              setWinCount([0,0,0,0]);
              setGameNumber(1);
              // setConfigを完全リセット
              setSetConfig(prev => ({
                ...prev,
                currentSet: 1,
                currentGame: 0,
                setFirstPlayer: -1
              }));
              setFirstPlayerIndex(0);
              setMenuStep('title');
              setGameState('menu');
            }}>{T.ui.toMenu}</button>
            {showDebugOptions && <button className="menu-button" onClick={() => UnifiedLogger.download()} style={{ marginTop: '4px' }}>{T.ui.saveLog}</button>}
          </div>
        </div>
      </div>
    );
  }

  const player = players[0];
  const opponents = players.slice(1);
  const isMyTurn = currentPlayerIndex === 0;
  // 配札中はcanDraw=false
  const canDraw = isMyTurn && !hasDrawn && !isProcessing && !gameEnded && !autoPlayMode && dealingPhase === 'ready';
  // 市場選択モード中はターン終了不可
  const canEndTurn = isMyTurn && hasDrawn && !isProcessing && !gameEnded && !autoPlayMode && !windTargetMode && !marketSelectMode && !effectMarketSelect;
  const isSelectableTarget = (card) => actionMode === 'house' && selectedCard?.type === 'house' && card.type === 'character';

  // 風カードターゲット判定（WindEffectEngine使用）
  const isWindTargetable = (houseCardId) => {
    if (!selectedWindCard || !windTargetMode) return false;
    return WindEffectEngine.canTarget(selectedWindCard.effect, houseCardId);
  };

  // ============================================
  // 新レイアウト用ヘルパー
  // ============================================

  // プレイヤー人数を取得
  const playerCount = players.length;

  // GameLogicを使用した座標計算関数
  // v2.4.8: 動的カードサイズに対応
  const calcStandardPitch = (cardCount, areaWidthU) => {
    const cardDim = getCurrentCardDimensions();
    return GameLogic.calcStandardPitch(cardCount, areaWidthU, cardDim.w, LAYOUT.minGap);
  };
  const calcHouseSetPitch = (houseCount, areaWidthU) => {
    const cardDim = getCurrentCardDimensions();
    return GameLogic.calcHouseSetPitch(houseCount, areaWidthU, cardDim.w, LAYOUT.minGap, 3);
  };
  const getPlayerBlockWidth = (pIdx) => GameLogic.getPlayerBlockWidth(pIdx, playerCount, LAYOUT.board.w);
  const getHandAreaWidth = (pIdx) => {
    const cardDim = getCurrentCardDimensions();
    // 手札エリア幅 = ブロック幅 - 引札ゾーン(カード幅) - 間隔1U
    return getPlayerBlockWidth(pIdx) - cardDim.w - 1;
  };
  const getHouseAreaWidth = (pIdx) => Math.ceil((getPlayerBlockWidth(pIdx) - 1) / 2);
  const getPlayerPosition = (pIdx) => GameLogic.getPlayerPosition(pIdx, playerCount);
  const isFullWidth = (pIdx) => GameLogic.isFullWidth(pIdx, playerCount);

  // ============================================
  // 新レイアウトJSX（GameBoardV2）
  // ============================================
  const renderGameBoardV2 = () => {
    // 動的な値を計算
    const handAreaWidthP0 = getHandAreaWidth(0);
    const houseAreaWidthP0 = getHouseAreaWidth(0);
    const isP0Full = isFullWidth(0);

    return (
      <div className="game-board" ref={gameBoardRef}>
        {/* オーバーレイ群 */}
        {showConfetti && <ConfettiEffect show={showConfetti} />}
        {showScreenFlash && <div className="screen-flash" />}
        {showGameStartOverlay && (
          <div className="overlay-base game-start-overlay">
            <div className="game-start-box">
              <div className="game-start-title">{T.overlay.gameStart(gameNumber)}</div>
              <div style={{ fontSize: 'var(--overlay-text-size)', color: 'var(--color-warm-gray)', marginTop: 'calc(0.5 * var(--unit-y))' }}>{T.ui.dealing}</div>
            </div>
          </div>
        )}
        <FlyingCardDisplay flyingCard={flyingCard} deckPos={getDeckPosition()} getDrawAreaPosition={getDrawAreaPosition} getPlayerCardPosition={getPlayerCardPosition} getMarketCardPosition={getMarketCardPosition} />
        <HouseExitDisplay houseExitAnimation={houseExitAnimation} />
        <PairAnimationDisplay pairAnimation={pairAnimation} getCardPosition={getPlayerCardPosition} />
        <DangerCardInHandDisplay dangerCardInHand={dangerCardInHand} getCardPosition={getPlayerCardPosition} />
        <VictoryOverlay victoryAnimation={victoryAnimation} />
        <EffectOverlay effect={effect} onClose={() => setEffect(null)} autoPlayMode={autoPlayMode} />
        <BannerOverlay banner={bannerState} />

        {/* v6.6: カウンターモーダル */}
        {counterMode && counterMode.defenderIdx === 0 && counterMode.phase === 'waiting' && (
          <div className="overlay-base counter-modal-overlay">
            <div className="counter-modal anim-fade-in">
              <div className="counter-title">{T.ui.counterTitle}</div>
              <div className="counter-description">
                {T.ui.counterDescription(
                  playersRef.current[counterMode.attackerIdx]?.name || 'AI',
                  counterMode.storedCard?.name || ''
                )}
              </div>
              <div className="counter-buttons">
                <button className="counter-btn counter-yes" onClick={handleCounterConfirm}>
                  {T.ui.counterYes}
                </button>
                <button className="counter-btn counter-no" onClick={handleCounterDecline}>
                  {T.ui.counterNo}
                </button>
              </div>
            </div>
          </div>
        )}

        {/* アクションヒント */}
        {actionMode === 'house' && selectedCard && !autoPlayMode && <div className="action-hint">{T.ui.hintHouse(selectedCard.name)}</div>}
        {marketSelectMode && !autoPlayMode && <div className="action-hint" style={{ background: 'linear-gradient(135deg, #fff8e1 0%, #ffecb3 100%)', borderColor: 'var(--color-gold)' }}>{T.ui.hintStall}</div>}
        {effectMarketSelect && !autoPlayMode && <div className="action-hint" style={{ background: 'linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%)', borderColor: '#4CAF50' }}>{T.ui.hintMerchantGift || `商いの才覚！市場からカードを${effectMarketSelect.count}枚選んでください`}</div>}
        {windTargetMode && selectedWindCard && !autoPlayMode && (
          <>
            <div className="action-hint">{T.ui.hintWind(selectedWindCard.name)}</div>
            <div className="wind-cancel-btn" onClick={handleCancelWind}>{T.ui.cancelIcon}</div>
          </>
        )}
        {/* ============================================
           Row 1: 手札行（上）- P1, P2
           ============================================ */}
        <div className="row row-1">
          {/* P1 手札ブロック */}
          {playerCount >= 2 && players[1] && (
            <div className={`player-block-v2 ${playerCount === 2 ? 'full-width' : 'left'}`}>
              <div className="hand-area-v2" ref={el => playerHandRefs.current[1] = el}>
                {players[1].hand.map((c, i) => {
                  const pitch = calcStandardPitch(players[1].hand.length, getHandAreaWidth(1));
                  const isInPairAnimation = pairAnimation && pairAnimation.playerIdx === 1 && (c.uid === pairAnimation.pairCard?.uid || c.uid === pairAnimation.drawnCard?.uid);
                  if (isInPairAnimation) return null;
                  const isValidTarget = DrawRuleEngine.isClickable(0, 1, players);
                  const requiredIdx = DrawRuleEngine.getRequiredCardIndex(players[1].hand);
                  const isClickableCard = requiredIdx === -1 || requiredIdx === i;
                  const canDrawFromThis = phase === PHASES.BABANUKI && canDraw && isValidTarget && isClickableCard;
                  const isHesitating = hesitationState?.highlightedCards?.some(h => h.playerIdx === 1 && h.cardIdx === i);
                  // ゲーム終了時は全手札公開
                  if (revealAllHands) {
                    return <CardFrontStandard key={c.uid} card={c} style={{ position: 'absolute', left: UNIT.toPixelX(i * pitch), top: 0, zIndex: i }} />;
                  }
                  return <CardBackStandard key={c.uid} highlight={canDrawFromThis} hesitationHover={isHesitating} onClick={canDrawFromThis ? () => handleDrawFromPlayer(1, i) : null} style={{ position: 'absolute', left: UNIT.toPixelX(i * pitch), top: 0, zIndex: i }} />;
                })}
              </div>
              <div className="draw-area-v2" ref={el => playerDrawAreaRefs.current[1] = el}>
                {/* 引札表示エリア（相手用は空） */}
              </div>
            </div>
          )}

          {/* P2 手札ブロック */}
          {playerCount >= 3 && players[2] && (
            <div className="player-block-v2 right">
              <div className="hand-area-v2" ref={el => playerHandRefs.current[2] = el}>
                {players[2].hand.map((c, i) => {
                  const pitch = calcStandardPitch(players[2].hand.length, getHandAreaWidth(2));
                  const isInPairAnimation = pairAnimation && pairAnimation.playerIdx === 2 && (c.uid === pairAnimation.pairCard?.uid || c.uid === pairAnimation.drawnCard?.uid);
                  if (isInPairAnimation) return null;
                  const isValidTarget = DrawRuleEngine.isClickable(0, 2, players);
                  const requiredIdx = DrawRuleEngine.getRequiredCardIndex(players[2].hand);
                  const isClickableCard = requiredIdx === -1 || requiredIdx === i;
                  const canDrawFromThis = phase === PHASES.BABANUKI && canDraw && isValidTarget && isClickableCard;
                  const isHesitating = hesitationState?.highlightedCards?.some(h => h.playerIdx === 2 && h.cardIdx === i);
                  // ゲーム終了時は全手札公開
                  if (revealAllHands) {
                    return <CardFrontStandard key={c.uid} card={c} style={{ position: 'absolute', left: UNIT.toPixelX(i * pitch), top: 0, zIndex: i }} />;
                  }
                  return <CardBackStandard key={c.uid} highlight={canDrawFromThis} hesitationHover={isHesitating} onClick={canDrawFromThis ? () => handleDrawFromPlayer(2, i) : null} style={{ position: 'absolute', left: UNIT.toPixelX(i * pitch), top: 0, zIndex: i }} />;
                })}
              </div>
              <div className="draw-area-v2" ref={el => playerDrawAreaRefs.current[2] = el} />
            </div>
          )}
        </div>

        {/* ============================================
           Row 2: 家行（上）- P1, P2
           ============================================ */}
        <div className="row row-2">
          {/* P1 家ブロック */}
          {playerCount >= 2 && players[1] && (
            <div className={`player-block-v2 ${playerCount === 2 ? 'full-width' : 'left'}`}>
              <div className="house-area-v2" ref={el => playerHouseRefs.current[1] = el}>
                {players[1].houses.map((h, hIdx) => {
                  const pitch = calcHouseSetPitch(players[1].houses.length, getHouseAreaWidth(1));
                  const targetable = windTargetMode && isWindTargetable(h.houseCard.id);
                  const disabled = windTargetMode && !targetable;
                  const isExiting = houseExitAnimation && houseExitAnimation.playerIdx === 1 && houseExitAnimation.houseIdx === hIdx;
                  const isSourceOfFlying = flyingCard && flyingCard.sourcePlayerIdx === 1 && flyingCard.sourceHouseIdx === hIdx;
                  if (isExiting || isSourceOfFlying) return <div key={hIdx} className="house-set-v2" style={{ left: UNIT.toPixelX(hIdx * pitch), opacity: 0 }} />;
                  const isEmpty = h.storedCard === null;  // v6.6.1: 空屋台判定
                  return (
                    <HouseBlockStandard
                      key={hIdx}
                      houseCard={h.houseCard}
                      personCard={h.storedCard}
                      left={UNIT.toPixelX(hIdx * pitch)}
                      zIndex={hIdx}
                      targetable={targetable}
                      disabled={disabled}
                      onTarget={() => handleWindCardUse(1, hIdx)}
                      isEmpty={isEmpty}
                    />
                  );
                })}
              </div>
              <div className="player-info-area-v2">
                <div className={`textbox-v2 ${currentPlayerIndex === 1 ? 'active' : ''}`}>
                  {players[1].emoji} {players[1].name} | <span style={{color: cumulativeScores[1] >= 0 ? 'var(--color-house)' : 'var(--color-burgundy)'}}>{cumulativeScores[1] >= 0 ? '+' : ''}{cumulativeScores[1]}</span> | 🃏{players[1].hand.length}
                </div>
                <div className="chat-box-v2">
                  {(aiSpeechBubbles[1] || []).map((msg, i, arr) => {
                    const isLatest = i === arr.length - 1 && msg !== '💭...';
                    const isTyping = msg === '💭...';
                    return (
                      <div key={i} style={{ 
                        fontSize: isLatest ? 'var(--chat-font-size)' : 'var(--ui-font-size-small)', 
                        lineHeight: 1.3,
                        color: isTyping ? '#A09080' : (isLatest ? '#2d1518' : '#8B7355'),
                        fontWeight: isLatest ? 'bold' : 'normal',
                        transition: 'all 0.3s ease'
                      }}>{msg}</div>
                    );
                  })}
                </div>
              </div>
            </div>
          )}

          {/* P2 家ブロック */}
          {playerCount >= 3 && players[2] && (
            <div className="player-block-v2 right">
              <div className="player-info-area-v2 p2-info">
                <div className={`textbox-v2 ${currentPlayerIndex === 2 ? 'active' : ''}`}>
                  {players[2].emoji} {players[2].name} | <span style={{color: cumulativeScores[2] >= 0 ? 'var(--color-house)' : 'var(--color-burgundy)'}}>{cumulativeScores[2] >= 0 ? '+' : ''}{cumulativeScores[2]}</span> | 🃏{players[2].hand.length}
                </div>
                <div className="chat-box-v2">
                  {(aiSpeechBubbles[2] || []).map((msg, i, arr) => {
                    const isLatest = i === arr.length - 1 && msg !== '💭...';
                    const isTyping = msg === '💭...';
                    return (
                      <div key={i} style={{ 
                        fontSize: isLatest ? 'var(--chat-font-size)' : 'var(--ui-font-size-small)', 
                        lineHeight: 1.3,
                        color: isTyping ? '#A09080' : (isLatest ? '#2d1518' : '#8B7355'),
                        fontWeight: isLatest ? 'bold' : 'normal',
                        transition: 'all 0.3s ease'
                      }}>{msg}</div>
                    );
                  })}
                </div>
              </div>
              <div className="house-area-v2 house-area-right" ref={el => playerHouseRefs.current[2] = el}>
                {players[2].houses.map((h, hIdx) => {
                  const pitch = calcHouseSetPitch(players[2].houses.length, getHouseAreaWidth(2));
                  const targetable = windTargetMode && isWindTargetable(h.houseCard.id);
                  const disabled = windTargetMode && !targetable;
                  const isExiting = houseExitAnimation && houseExitAnimation.playerIdx === 2 && houseExitAnimation.houseIdx === hIdx;
                  const isSourceOfFlying = flyingCard && flyingCard.sourcePlayerIdx === 2 && flyingCard.sourceHouseIdx === hIdx;
                  if (isExiting || isSourceOfFlying) return <div key={hIdx} className="house-set-v2" style={{ left: UNIT.toPixelX(hIdx * pitch), opacity: 0 }} />;
                  const isEmpty = h.storedCard === null;  // v6.6.1: 空屋台判定
                  return (
                    <HouseBlockStandard
                      key={hIdx}
                      houseCard={h.houseCard}
                      personCard={h.storedCard}
                      left={UNIT.toPixelX(hIdx * pitch)}
                      zIndex={hIdx}
                      targetable={targetable}
                      disabled={disabled}
                      onTarget={() => handleWindCardUse(2, hIdx)}
                      isEmpty={isEmpty}
                    />
                  );
                })}
              </div>
            </div>
          )}
        </div>

        {/* ============================================
           Row 3: 中央行 - タイトル・山札・市場・ログ
