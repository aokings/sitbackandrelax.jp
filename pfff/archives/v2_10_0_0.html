function PfffGame() {
  // v2.4.0: 動的サイジングフック
  const boardSize = useBoardSize();
  
  // v2.5.8: 縦持ち検出
  const [isPortraitMode, setIsPortraitMode] = useState(isPortrait());
  
  useEffect(() => {
    const handleOrientationChange = () => {
      setIsPortraitMode(isPortrait());
    };
    
    // resize と orientationchange の両方を監視
    window.addEventListener('resize', handleOrientationChange);
    window.addEventListener('orientationchange', handleOrientationChange);
    
    return () => {
      window.removeEventListener('resize', handleOrientationChange);
      window.removeEventListener('orientationchange', handleOrientationChange);
    };
  }, []);
  
  // v2.3.2: レガシーレイアウト削除、v2レイアウト固定

  // ターンアクションStateをuseReducerで統合
  // turnActionReducer: ドロー/アクション/風ターゲットの状態管理
  const turnActionReducer = (state, action) => {
    switch (action.type) {
      case 'RESET_TURN':
        return {
          hasDrawn: false,
          hasActioned: false,
          selectedCard: null,
          actionMode: null,
          windTargetMode: false,
          selectedWindCard: null,
          refillMode: false,        // v6.6.1: 再格納モード
          refillTargetHouseIdx: null,  // v6.6.1: 再格納対象の空屋台インデックス
        };
      case 'SET_DRAWN':
        return { ...state, hasDrawn: true };
      case 'SET_ACTIONED':
        return { ...state, hasActioned: true };
      case 'SELECT_CARD':
        return { ...state, selectedCard: action.card, actionMode: action.mode };
      case 'CLEAR_SELECTION':
        return { ...state, selectedCard: null, actionMode: null, refillMode: false, refillTargetHouseIdx: null };
      case 'START_WIND_TARGET':
        return { ...state, windTargetMode: true, selectedWindCard: action.card, selectedCard: action.card, actionMode: 'wind' };
      case 'CANCEL_WIND':
        return { ...state, windTargetMode: false, selectedWindCard: null, selectedCard: null, actionMode: null };
      case 'COMPLETE_WIND':
        return { ...state, windTargetMode: false, selectedWindCard: null, selectedCard: null, actionMode: null };
      // v6.6.1: 再格納モード
      case 'START_REFILL':
        return { ...state, refillMode: true, refillTargetHouseIdx: action.houseIdx, actionMode: 'refill' };
      case 'CANCEL_REFILL':
        return { ...state, refillMode: false, refillTargetHouseIdx: null, actionMode: null };
      case 'COMPLETE_REFILL':
        return { ...state, refillMode: false, refillTargetHouseIdx: null, actionMode: null };
      default:
        return state;
    }
  };

  const [turnAction, dispatchTurnAction] = useReducer(turnActionReducer, {
    hasDrawn: false,
    hasActioned: false,
    selectedCard: null,
    actionMode: null,
    windTargetMode: false,
    selectedWindCard: null,
    refillMode: false,        // v6.6.1: 再格納モード
    refillTargetHouseIdx: null,  // v6.6.1: 再格納対象の空屋台インデックス
  });

  // turnActionから個別の値を展開（既存コードとの互換性のため）
  // hasPeekedThisTurn 削除
  const { hasDrawn, hasActioned, selectedCard, actionMode, windTargetMode, selectedWindCard, refillMode, refillTargetHouseIdx } = turnAction;

  // 互換性のためのsetter関数
  // setHasPeekedThisTurn 削除
  const setHasDrawn = (val) => { if (val) dispatchTurnAction({ type: 'SET_DRAWN' }); };
  const setHasActioned = (val) => { if (val) dispatchTurnAction({ type: 'SET_ACTIONED' }); };
  const setSelectedCard = (card, mode) => {
    if (card === null) {
      dispatchTurnAction({ type: 'CLEAR_SELECTION' });
    } else {
      dispatchTurnAction({ type: 'SELECT_CARD', card, mode: mode !== undefined ? mode : (card.type === 'house' ? 'house' : null) });
    }
  };
  const setActionMode = (mode) => {
    // actionModeだけを変更する場合は、現在のselectedCardを維持
    if (mode === null) {
      dispatchTurnAction({ type: 'CLEAR_SELECTION' });
    }
  };
  const setWindTargetMode = (val) => { if (!val) dispatchTurnAction({ type: 'CANCEL_WIND' }); };
  const setSelectedWindCard = (card) => { if (card) dispatchTurnAction({ type: 'START_WIND_TARGET', card }); };
  const resetTurnAction = () => dispatchTurnAction({ type: 'RESET_TURN' });

  const [gameState, setGameState] = useState('menu');
  const [menuStep, setMenuStep] = useState('title'); // 'title', 'player', 'opponent'
  
  // v2.5.10.1: iOS「ホーム画面に追加」誘導バナー
  const [showIOSInstallBanner, setShowIOSInstallBanner] = useState(() => {

      for (let i = start; i < arr.length; i++) {

        combine(i + 1, combo);

  // 引札エリアの位置を取得（DOM参照方式、v2.3.2: v2固定化）

  const getDrawAreaPosition = (playerIdx) => {

    const calcFallbackPosition = (pIdx) => {

      return {
        x: UNIT.toPixelX(baseX + drawAreaLeft),
        y: UNIT.toPixelY(rowPos.row5Top)

    };
    
    if (!gameBoardRef.current) {
      return calcFallbackPosition(playerIdx);
    }

    const boardRect = gameBoardRef.current.getBoundingClientRect();
    const drawArea = playerDrawAreaRefs.current[playerIdx];

    if (!drawArea) {
      return calcFallbackPosition(playerIdx);

  // 家カードの位置を取得（DOM参照方式）

  const getHousePosition = (playerIdx, houseIdx) => {

    const calcV2HousePosition = (pIdx, hIdx) => {
      const rowPos = getRowPositions();
      const isP0 = pIdx === 0;
      const isP3 = pIdx === 3;
      const isBottomPlayer = isP0 || isP3;

      // 家ブロック幅（カード幅 + 1Uギャップ）- v2.4.8: 動的カードサイズ対応
      const cardDim = getCurrentCardDimensions();
      const houseBlockW = cardDim.w + 1;

      // 行位置（動的取得）
      const rowTop = isBottomPlayer ? rowPos.row4Top : rowPos.row2Top;

      // X座標基準
      let baseX = 1;  // デフォルト左端
      if (playerCount >= 3 && pIdx === 2) {
        baseX = (LAYOUT.board.w / 2) + 0.5;
      } else if (playerCount >= 4 && pIdx === 0) {

        baseX = (LAYOUT.board.w / 2) + 0.5;
      }
      // P3は左側（デフォルトのbaseX = 1）

      // 人物カードは家カードの2U下
      const personOffset = 2;

      return {
        x: UNIT.toPixelX(baseX + hIdx * houseBlockW),
        y: UNIT.toPixelY(rowTop + personOffset),  // 人物カード位置
        houseY: UNIT.toPixelY(rowTop),             // 家カード位置
      };
    };

    if (!gameBoardRef.current) {
      // フォールバック
      return calcV2HousePosition(playerIdx, houseIdx);
    }

    const boardRect = gameBoardRef.current.getBoundingClientRect();
    const houseContainer = playerHouseRefs.current[playerIdx];

    if (!houseContainer || houseIdx >= houseContainer.children.length) {
      // フォールバック
      return calcV2HousePosition(playerIdx, houseIdx);
    }

    const houseElement = houseContainer.children[houseIdx];
    const houseRect = houseElement.getBoundingClientRect();
    // 人物カードは家カードの2U下
    const personOffset = UNIT.toPixelY(2);

    return {
      x: houseRect.left - boardRect.left,
      y: houseRect.top - boardRect.top + personOffset,
      houseY: houseRect.top - boardRect.top,
    };
  };

  // 市場カードの位置を取得（強奪特例アニメーション用）
  // DOM参照方式に変更（座標ハードコードを廃止）
  const getMarketCardPosition = (cardIndex) => {
    if (!gameBoardRef.current || !marketCardsRef.current) {
      // フォールバック（refが無い場合）
      return { x: 744, y: 357 };
    }

    const boardRect = gameBoardRef.current.getBoundingClientRect();
    const marketCards = marketCardsRef.current.children;

    if (cardIndex < 0 || cardIndex >= marketCards.length) {
      // インデックスが範囲外の場合、コンテナの位置を返す
      const containerRect = marketCardsRef.current.getBoundingClientRect();
      return {
        x: containerRect.left - boardRect.left,
        y: containerRect.top - boardRect.top
      };
    }

    const cardElement = marketCards[cardIndex];

    return {
      x: cardRect.left - boardRect.left,
      y: cardRect.top - boardRect.top
    };

  // プレイヤーの手札位置を取得（DOM参照方式、v2.3.2: v2固定化）
  // v2.4.0: 動的サイジング対応
  const getPlayerCardPosition = (playerIdx, cardIndex, totalCards) => {
    // v2レイアウト用の計算
    const calcV2Position = (pIdx, cIdx, total) => {
      const rowPos = getRowPositions();
      // v2.4.8: 動的カードサイズに対応
      const cardDim = getCurrentCardDimensions();
      const cardW = cardDim.w;
      const minGap = LAYOUT.minGap;

      let blockW;
      if (playerCount === 2) {
        blockW = LAYOUT.board.w - 2;
      } else if (playerCount === 3 && pIdx === 0) {
        blockW = LAYOUT.board.w - 2;
      } else {
        blockW = (LAYOUT.board.w / 2) - 1.5;
      }

      // 手札エリア幅 = ブロック幅 - 引札ゾーン(カード幅) - 間隔1U
      const handAreaW = blockW - cardW - 1;

      let pitch;
      if (total <= 1) {
        pitch = 0;
      } else {
        const widthWithGap = cardW + (cardW + minGap) * (total - 1);
        if (widthWithGap <= handAreaW) {
          pitch = cardW + minGap;
        } else {
          pitch = Math.max(minGap, (handAreaW - cardW) / (total - 1));
        }
      }

      let baseX = 1;
      if (playerCount >= 3 && pIdx === 2) {
        baseX = (LAYOUT.board.w / 2) + 0.5;
      } else if (playerCount >= 4 && pIdx === 0) {
        // v2.4.8: P0を右側に移動
        baseX = (LAYOUT.board.w / 2) + 0.5;
      }
      // P3は左側（デフォルトのbaseX = 1）

      // 行位置（動的取得）
      let yPos = (pIdx === 0 || pIdx === 3) ? rowPos.row5Top : rowPos.row1Top;

      return {
        x: UNIT.toPixelX(baseX + cIdx * pitch),
        y: UNIT.toPixelY(yPos)
      };
    };

    if (!gameBoardRef.current) {
      return calcV2Position(playerIdx, cardIndex, totalCards);
    }

    const boardRect = gameBoardRef.current.getBoundingClientRect();
    const handContainer = playerHandRefs.current[playerIdx];

    if (!handContainer || cardIndex >= handContainer.children.length) {
      return calcV2Position(playerIdx, cardIndex, totalCards);
    }

    let actualIndex = 0;
    let targetElement = null;
    for (let i = 0; i < handContainer.children.length; i++) {
      const child = handContainer.children[i];
      if (child && child.offsetParent !== null) {
        if (actualIndex === cardIndex) {
          targetElement = child;
          break;
        }
        actualIndex++;
      }
    }

    if (!targetElement) {
      const containerRect = handContainer.getBoundingClientRect();
      // v2.4.8: 動的カードサイズに対応
      const cardDim = getCurrentCardDimensions();
      const cardW = cardDim.w;
      const minGap = LAYOUT.minGap;
      let blockW = playerCount === 2 || (playerCount === 3 && playerIdx === 0)
        ? (LAYOUT.board.w - 2) : ((LAYOUT.board.w / 2) - 1.5);
      // 手札エリア幅 = ブロック幅 - 引札ゾーン(カード幅) - 間隔1U
      const handAreaW = blockW - cardW - 1;
      let pitch = 0;
      if (totalCards > 1) {
        const widthWithGap = cardW + (cardW + minGap) * (totalCards - 1);
        if (widthWithGap <= handAreaW) {
          pitch = UNIT.toPixelX(cardW + minGap);
        } else {
          pitch = UNIT.toPixelX(Math.max(minGap, (handAreaW - cardW) / (totalCards - 1)));
        }
      }
      return {
        x: containerRect.left - boardRect.left + cardIndex * pitch,
        y: containerRect.top - boardRect.top
      };
    }

    const cardRect = targetElement.getBoundingClientRect();
    return {
      x: cardRect.left - boardRect.left,
      y: cardRect.top - boardRect.top
    };
  };

  // 市場交換完了処理（屋台配置時・再格納時）
  // async化＆交換アニメーション追加
  // v6.6.1: type=refill の再格納にも対応
  const handleMarketExchange = useCallback(async (selectedMarketCard) => {
    if (!marketSelectMode) return;

    // v6.6.1: 再格納タイプの場合
    if (marketSelectMode.type === 'refill') {
      const { houseIdx, storedCard, originalCard } = marketSelectMode;
      const house = playersRef.current[0].houses[houseIdx];

      // 市場交換処理
      const updatedMarket = [...marketRef.current.filter(c => c.uid !== selectedMarketCard.uid), originalCard];
      marketRef.current = updatedMarket;
      setMarket(updatedMarket);

      // 屋台に選択したカードを格納

        i === houseIdx ? { ...h, storedCard: selectedMarketCard, retrievedTurn: null } : h
      ));

      // ログ出力
      addLog(T.log.sentToMarket(playerName, originalCard.name, selectedMarketCard.name), 'action');
      GameLogger.full(`[T${turn}] P0 refill stall exchange: ${originalCard.name} → market, ${selectedMarketCard.name} → stall`);
      NotationLogger.recordRefillStall(house.houseCard, selectedMarketCard, true, { sent: originalCard, got: selectedMarketCard });

      // 市場選択モード終了
      setMarketSelectMode(null);
      setHasActioned(true);
      handleEndTurn();
      return;
    }

    const { stallCard, characterCard, playerIdx, stallHouseIdx } = marketSelectMode;
    const playerName = players[playerIdx]?.name || `P${playerIdx}`;

    // 交換アニメーション（市場カード→屋台、屋台カード→市場が同時に飛行）
    const skipAnim = !animSettings.dealingAnim;
    if (!skipAnim && playerIdx === 0) {
      const t = getT();

      // 市場内のカード位置を取得
      const marketIdx = marketRef.current.findIndex(c => c.uid === selectedMarketCard.uid);
      const marketCardPos = getMarketCardPosition(marketIdx);

      // 屋台の位置を取得
      const houseIdx = stallHouseIdx !== undefined ? stallHouseIdx : players[playerIdx].houses.length - 1;
      const stallPos = getHousePosition(playerIdx, houseIdx);

      // 屋台の中身（characterCard）を一時的に非表示にする
      setHousesForPlayer(playerIdx, prev => prev.map((h, i) => {
        if (i === houseIdx) {
          return { ...h, storedCard: null };  // 一時的に空に
        }
        return h;
      }));

      // 両方のカードを同時に飛行させる（exchangeモード）
      // 市場カード→屋台へ
      setFlyingCard({
        card: selectedMarketCard,
        target: 'stallExchange',
        playerIdx: playerIdx,
        phase: 'exchange',
        sourceX: marketCardPos.x,
        sourceY: marketCardPos.y,
        stallX: stallPos.x,
        stallY: stallPos.y,  // getHousePositionで既に人物カード位置を返している
        forceFront: true,
        // 交換用：もう一枚のカード情報
        exchangeCard: characterCard,
        exchangeFromX: stallPos.x,
        exchangeFromY: stallPos.y,  // 同上
        exchangeToX: marketCardPos.x,
        exchangeToY: marketCardPos.y
      });
      await delay(150);  // 浮かぶタメ（150ms）

      // 市場から選択されたカードを除外
      const updatedMarket = marketRef.current.filter(c => c.uid !== selectedMarketCard.uid);
      marketRef.current = updatedMarket;
      setMarket(updatedMarket);

      // 飛行開始
      setFlyingCard(prev => prev ? { ...prev, phase: 'exchangeFlying' } : null);
      await delay(350);  // 飛行時間（350ms）

      setFlyingCard(null);

      // 市場に人物カードを追加
      const finalMarket = [...updatedMarket, characterCard];
      marketRef.current = finalMarket;
      setMarket(finalMarket);
    } else {
      // アニメなしの場合
      const updatedMarket = [...marketRef.current.filter(c => c.uid !== selectedMarketCard.uid), characterCard];
      marketRef.current = updatedMarket;
      setMarket(updatedMarket);
    }

    // v6.4: 家に選択したカードを入れる
    setHousesForPlayer(playerIdx, prev => prev.map((h, i) => {
      if (i === (stallHouseIdx !== undefined ? stallHouseIdx : prev.length - 1) && HOUSE_PROPERTIES[h.houseCard.id]?.marketExchange) {
        return { ...h, storedCard: selectedMarketCard };
      }
      return h;
    }));

  // トリプルクリックでクイックメニュー表示（ログDL・終了ボタン）

  const addLog = useCallback((msg, type = 'action') => { setLog(prev => [...prev.slice(-50), { message: msg, type, time: Date.now() }]); }, []);

  const getHand = (idx) => playersRef.current[idx]?.hand || [];

  // v6.6: カウンター可能かチェック（手札に風カードがあるか）
  const canCounter = (defenderHand) => {

  // v6.6: AIカウンター判定（屋台の中身価値 vs 風カードの防御価値）
  const shouldAiCounter = (defenderIdx, storedCard, defenderHand) => {
    const windCard = defenderHand.find(c => c.type === 'wind');
    if (!windCard) return { shouldCounter: false, windCard: null };

    const storedValue = storedCard.points || 0;

    // 特殊カード（WIT/HOL/KIN/QUE）は必ず守る
    if (['WIT', 'HOL', 'KIN', 'QUE'].includes(storedCard.id)) {
      return { shouldCounter: true, windCard };
    }

    // 5点以上のカードは80%でカウンター
    if (storedValue >= 5) {
      return { shouldCounter: Math.random() < 0.8, windCard };
    }

    // 3点のカードは50%でカウンター
    if (storedValue >= 3) {
      return { shouldCounter: Math.random() < 0.5, windCard };

    // 1点のカードは20%でカウンター
    return { shouldCounter: Math.random() < 0.2, windCard };

  // v6.6.1: AIカウンター判定（空屋台用）
  const shouldAiCounterEmptyStall = (defenderIdx, defenderHand) => {
    const windCard = defenderHand.find(c => c.type === 'wind');
    if (!windCard) return { countered: false, counterWindCard: null };

    const currentMarket = marketRef.current;
    const charCards = defenderHand.filter(c => c.type === 'character');

    // === 100%カウンター条件: 市場にペア相手がいる ===
    // 手札のキャラカードと市場カードでペアが成立するか確認
    const hasPairInMarket = charCards.some(handCard => {
      // 同名ペア
      if (currentMarket.some(mc => mc.id === handCard.id)) return true;
      // 効果ペア
      const effectPairKey = Object.keys(EFFECT_PAIRS).find(k => k.includes(handCard.id));
      if (effectPairKey) {
        const pairIds = effectPairKey.split('_');
        const partnerId = pairIds.find(id => id !== handCard.id);
        if (currentMarket.some(mc => mc.id === partnerId)) return true;
      }
      return false;
    });

    if (hasPairInMarket && charCards.length > 0) {
      // 市場にペア相手がいる → 空屋台を守って再格納すればペア獲得確定
      return { countered: true, counterWindCard: windCard };
    }

    // === 高確率カウンター条件: 高得点キャラを格納予定 ===
    const hasHighValueChar = charCards.some(c => c.points >= 5);
    if (hasHighValueChar) {
      // 5点以上のキャラを持っている → 80%でカウンター
      const shouldCounter = Math.random() < 0.80;
      return { countered: shouldCounter, counterWindCard: windCard };
    }

    // === 通常判定 ===
    // 基本カウンター確率 = 50%（屋台カード3点の価値）
    let counterChance = 0.50;

    // 風カードが2枚以上 → +20%
    const windCount = defenderHand.filter(c => c.type === 'wind').length;
    if (windCount >= 2) {
      counterChance += 0.20;
    }

    // 風が1枚しかない → -15%（貴重な風カードを消費するのは痛い）
    if (windCount === 1) {
      counterChance -= 0.15;
    }

    // 格納できるキャラカードがない → -20%（守っても意味が薄い）
    if (charCards.length === 0) {
      counterChance -= 0.20;
    }

    // 0-100%にクランプ
    counterChance = Math.max(0, Math.min(1, counterChance));

    return {
      countered: Math.random() < counterChance,
      counterWindCard: windCard
    };
  };

  // v6.6: P0用カウンター待ち（Promise化）
  const waitForP0CounterDecision = (attackerIdx, storedCard) => {

  // v6.5: 効果ペアの効果を解決（使用済みプール/市場からカードを取得）
  // excludeUids: 商いの才覚で市場に追加したペアカードのUIDセット（選択対象から除外）
  const resolveEffectPair = (effectType, playerIndex, excludeUids = new Set()) => {
    const pool = discardPoolRef.current;
    const currentMarket = marketRef.current;
    const effectEntry = Object.values(EFFECT_PAIRS).find(e => e.effectType === effectType);
    if (!effectEntry) return [];

    const gained = [];

    // 風カード取得
    for (let i = 0; i < effectEntry.wind && pool.wind.length > 0; i++) {
      gained.push(pool.wind.pop());
    }
    // 家カード取得
    for (let i = 0; i < effectEntry.house && pool.house.length > 0; i++) {
      gained.push(pool.house.pop());
    }
    // 市場から取得（商いの才覚）
    if (effectEntry.market > 0) {
      // 選択可能な市場カード（ペアカード自身は除外）
      const selectableMarket = currentMarket.filter(c => !excludeUids.has(c.uid));
      if (selectableMarket.length > 0) {

          // 選択可能なカードのみをUIに渡す

          setEffectMarketSelect({ count, selected: [], effectType, playerIndex: 0, excludeUids });
          // 市場カードの取得は handleEffectMarketConfirm で実行される
        } else {
          // AI / オートプレイ: ペア相方 > 高得点の順に自動選択
          const aiHand = playersRef.current[playerIndex]?.hand || [];
          const sorted = [...selectableMarket].sort((a, b) => {
            // ペア相方があれば最優先
            const aHasPair = aiHand.some(h => h.id === a.id) || Object.keys(EFFECT_PAIRS).some(k => k.includes(a.id) && aiHand.some(h => k.includes(h.id) && h.id !== a.id));
            const bHasPair = aiHand.some(h => h.id === b.id) || Object.keys(EFFECT_PAIRS).some(k => k.includes(b.id) && aiHand.some(h => k.includes(h.id) && h.id !== b.id));
            if (aHasPair && !bHasPair) return -1;
            if (!aHasPair && bHasPair) return 1;
            return (b.points || 0) - (a.points || 0); // 高得点順
          });
          const count = Math.min(effectEntry.market, selectableMarket.length);
          const taken = sorted.slice(0, count);
          const takenUids = new Set(taken.map(c => c.uid));
          gained.push(...taken);
          // 市場から取得したカードを除去（ペアカードは残る）

  // 同期的ペア処理（高速化の核心）— v6.5: 効果ペア対応
  const processPairsSync = (hand, playerIndex, options = {}) => {
    const { fireBanner = false } = options;
    let currentHand = [...hand];
    let safetyCounter = 0; // v6.5: 無限ループ防止
    let bannerFired = false; // バナーは最初の効果ペアのみ

    while (safetyCounter++ < 20) {
      const pairs = GameLogic.findPairs(currentHand);
      if (pairs.length === 0) break;
      const pair = pairs[0];
      const card0 = pair.cards[0];
      const card1 = pair.cards[1];
      if (!card0 || !card1) break; // 防御: カードがundefinedの場合は終了
      currentHand = currentHand.filter(c => c && c.uid !== card0.uid && c.uid !== card1.uid);
      // v6.5: 商いの才覚のペアカードは市場へ（resolveEffectPairの前に追加）
      // ペアカードのUIDを記録（resolveEffectPairで除外するため）
      const pairUids = new Set([card0.uid, card1.uid]);
      if (pair.effectType === 'merchantGift') {
        const newMarket = [...marketRef.current, card0, card1];
        setMarket(newMarket);
        marketRef.current = newMarket;
      }
      addLog(T.log.madeAPair(getPlayerName(playerIndex), card0.name), 'pair');
      // v2.6.0: 相棒ナレーション - ペア成立
      CompanionNarrator.processEvent('pair', {
        playerIdx: playerIndex, playerName: getPlayerName(playerIndex), cardName: card0.name,
      }, showCompanionHint);
      // v6.5: 効果ペア処理
      if (pair.effectType) {
        // バナー表示（fire-and-forget、最初の効果ペアのみ）
        if (fireBanner && !bannerFired) {
          showBanner(pair.effectType, { settingKey: 'pairEffect' });
          bannerFired = true;
        }
        // 商いの才覚の場合、ペアカード自身は選択対象から除外
        const excludeUids = pair.effectType === 'merchantGift' ? pairUids : new Set();
        const gained = resolveEffectPair(pair.effectType, playerIndex, excludeUids);
        const gainedNames = gained.length > 0 ? gained.map(c => c.name).join(', ') : '';
        const effectName = T.effectPairs?.[pair.effectType] || pair.effectType;
        // NotationLogger - 効果ペア記録

  // ペア演出付きペア処理（ドロー時専用）

  const processPairWithAnimation = async (drawnCard, hand, playerIndex, skipAnim) => {

          await delay(t.dangerSettle);

    const drawnIsInPair = pair.cards.some(c => c && c.uid === drawnCard.uid);

    if (!drawnIsInPair) {
      // 引いたカードがペアに関与していない（手札内の別ペア）
      // → 同期処理にフォールバック（効果ペアの場合はバナー発火）

      }
      const result = processPairsSync(tempHand, playerIndex);
      return { ...result, hadPair: true };

    const pairCard = pair.cards.find(c => c && c.uid !== drawnCard.uid);

      const result = processPairsSync(tempHand, playerIndex);

    const pairCardIndex = hand.findIndex(c => c && c.uid === pairCard.uid);

    if (!skipAnim && animSettings.pairEffect) {

      const gained = resolveEffectPair(pair.effectType, playerIndex, excludeUids);
      const gainedNames = gained.length > 0 ? gained.map(c => c.name).join(', ') : '';
      const effectName = T.effectPairs?.[pair.effectType] || pair.effectType;
      // NotationLogger - 効果ペア記録

  // 配札アニメーション付きゲーム開始（飛行カード対応）
  const startGameWithDealing = useCallback(async () => {

            ...player,

          // ペア判定
          const tempHand = [...currentHands[p]];
          const pairs = GameLogic.findPairs(tempHand);

    // P0が先手かつ通常プレイ → 何もしない（UIで操作を待つ）
  }, [selectedOpponents, playerName, firstPlayerIndex, setConfig, addLog, animSettings.dealingAnim, animSettings.pairEffect, animSettings.autoPlayAnim, animSettings.phaseOverlay, autoPlayMode, endGame, handleDraw, clearSpeechBubbles, showSpeechBubble, showSpeechBubbleWithTyping]);
