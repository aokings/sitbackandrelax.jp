           ============================================ */}
        <div className="row row-3">
          <div className="title-area-v2">
            <div className="title-row-v2" style={{ display: 'flex', alignItems: 'stretch', gap: 0 }}>
              <div className="textbox-v2 game-title-v2" style={{ flex: 1 }} onClick={handleTitleClick}>pfff! {VERSION.string}</div>
              {/* 終了ボタン（常時表示） */}
              <button
                onClick={handleForceEnd}
                title={T.ui.exitGameHint}
                style={{
                  width: 'calc(3 * var(--unit-x))',
                  height: 'var(--textbox-h)',
                  border: '1px solid var(--color-burgundy)',
                  borderLeft: 'none',
                  background: '#fff',
                  color: 'var(--color-burgundy)',
                  fontSize: 'var(--ui-font-size)',
                  cursor: 'pointer',
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                }}
              >🚪</button>
              {/* v2.6.0: 詳細ログモーダルボタン */}
              <button
                onClick={() => setShowLogModal(prev => !prev)}
                title={T.ui.sectionLog}
                style={{
                  width: 'calc(3 * var(--unit-x))',
                  height: 'var(--textbox-h)',
                  border: '1px solid var(--color-burgundy)',
                  borderLeft: 'none',
                  background: showLogModal ? 'var(--color-burgundy)' : '#fff',
                  color: showLogModal ? '#fff' : 'var(--color-burgundy)',
                  fontSize: 'var(--ui-font-size)',
                  cursor: 'pointer',
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                }}
              >📋</button>
              {/* ログ保存ボタン（ゲーム中トリプルクリックで表示） */}
              {showQuickMenu && (
                <button
                  onClick={() => UnifiedLogger.download()}
                  title={T.ui.saveLogHint}
                  style={{
                    width: 'calc(3 * var(--unit-x))',
                    height: 'var(--textbox-h)',
                    border: '1px solid var(--color-gold)',
                    borderLeft: 'none',
                    background: '#fff',
                    color: 'var(--color-gold)',
                    fontSize: 'var(--ui-font-size)',
                    cursor: 'pointer',
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                  }}
                >📥</button>
              )}
            </div>
            <div className="textbox-v2 game-info" style={{ marginTop: -1 }}>
              {setConfig.totalSets > 0 ? `🏆S${setConfig.currentSet} G${setConfig.currentGame}/${setConfig.gamesPerSet}` : `G${gameNumber}`} T:{turn}
            </div>
          </div>

          {/* フェーズ表示（タイトル右端に張り付き）- タイトルと上辺揃え */}
          <div className="textbox-v2" style={{ position: 'absolute', left: UNIT.toPixelX(35), top: 0 }}>{phase === PHASES.EXPLORATION ? T.ui.phaseExploration : T.ui.phaseBabanuki}</div>

          {/* 山札エリア */}
          <div className="deck-area-v2" ref={deckCardsRef}>
            {/* 山札カード（重なり表示）- top:0で他のテキストボックス上辺と揃える */}
            {deck.length > 2 && <CardBackStandard style={{ position: 'absolute', left: UNIT.X * 1.5, top: UNIT.Y * 1.5 }} />}
            {deck.length > 1 && <CardBackStandard style={{ position: 'absolute', left: UNIT.X * 0.75, top: UNIT.Y * 0.75 }} />}
            {deck.length > 0 && <CardBackStandard style={{ position: 'absolute', left: 0, top: 0 }} />}
            {deck.length === 0 && <div style={{ position: 'absolute', left: 0, top: 0, width: UNIT.toPixelX(getCurrentCardDimensions().w), height: UNIT.toPixelY(getCurrentCardDimensions().h), border: '2px dashed var(--color-dusty-pink)', borderRadius: 4, display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--color-warm-gray)', fontSize: 'var(--ui-font-size-small)' }}>{T.ui.empty}</div>}
            {/* 残数テキストボックス: 1枚目カード下辺に上辺接触、左端はカード右端から2U左（2U被り） */}
            <div className="textbox-v2" style={{ 
              position: 'absolute', 
              left: UNIT.toPixelX(getCurrentCardDimensions().w - 2),
              top: UNIT.toPixelY(getCurrentCardDimensions().h),
              fontSize: 'var(--ui-font-size-small)',
              whiteSpace: 'nowrap'
            }}>{ T.ui.remaining(deck.length)}</div>
          </div>

          <div className="bazaar-area-v2">
            <div className="textbox-v2" style={{ position: 'absolute', top: 0, left: 0 }}>
              {T.ui.sectionMarket}
            </div>
            <div className="bazaar-cards-v2" style={{ marginTop: 'var(--textbox-h)' }} ref={marketCardsRef}>
              {market.map((card, i) => {
                const isEffectSelectable = !!effectMarketSelect;
                // 商いの才覚: ペアカード（商人・天秤）自身は選択不可
                const isExcluded = effectMarketSelect?.excludeUids?.has(card.uid);
                const isEffectSelected = effectMarketSelect?.selected?.some(c => c.uid === card.uid);
                const canSelect = isEffectSelectable && !isExcluded;
                return (
                <div
                  key={card.uid || i}
                  className={`market-card-slot ${marketSelectMode ? 'market-selectable' : ''} ${canSelect ? 'market-selectable effect-select' : ''} ${isEffectSelected ? 'effect-selected' : ''} ${isExcluded ? 'market-excluded' : ''}`}
                  onClick={marketSelectMode ? () => handleMarketExchange(card) : (canSelect ? () => handleEffectMarketToggle(card) : undefined)}
                  style={{ cursor: (marketSelectMode || canSelect) ? 'pointer' : 'default', opacity: isExcluded ? 0.4 : 1 }}
                >
                  <CardFrontStandard card={card} />
                </div>
                );
              })}
            </div>
            {/* v6.5: 商いの才覚 — 選択確定ボタン */}
            {effectMarketSelect && (
              <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, display: 'flex', justifyContent: 'center', gap: '8px' }}>
                <button
                  onClick={handleEffectMarketConfirm}
                  disabled={effectMarketSelect.selected.length === 0}
                  style={{
                    padding: '4px 16px',
                    background: effectMarketSelect.selected.length > 0 ? 'var(--color-gold)' : '#ccc',
                    border: '1px solid var(--color-burgundy)',
                    borderRadius: '4px',
                    cursor: effectMarketSelect.selected.length > 0 ? 'pointer' : 'default',
                    fontSize: 'var(--ui-font-size-small)',
                    fontWeight: 'bold',
                  }}
                >
                  {T.ui.confirm || '確定'} ({effectMarketSelect.selected.length}/{effectMarketSelect.count})
                </button>
              </div>
            )}
          </div>

          {/* v2.6.0: ログエリア廃止（市場拡張のため。詳細ログはモーダルで確認可能） */}

          {/* v2.6.0: 詳細ログモーダル */}
          {showLogModal && (
            <div style={{
              position: 'absolute',
              right: 'calc(1 * var(--unit-x))',
              top: 0,
              width: 'calc(30 * var(--unit-x))',
              height: '100%',
              background: 'rgba(255,255,255,0.97)',
              border: 'var(--border-width) solid var(--color-burgundy)',
              borderRadius: '4px',
              zIndex: 100,
              display: 'flex',
              flexDirection: 'column',
              boxShadow: '0 2px 8px rgba(0,0,0,0.15)',
            }}>
              <div style={{
                display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                padding: 'calc(0.5 * var(--unit-y)) calc(1 * var(--unit-x))',
                borderBottom: '1px solid var(--color-burgundy)',
                fontWeight: 'bold', fontSize: 'var(--ui-font-size)',
              }}>
                <span>📋 {T.ui.sectionLog}</span>
                <button onClick={() => setShowLogModal(false)} style={{
                  background: 'none', border: 'none', cursor: 'pointer',
                  fontSize: 'var(--ui-font-size)', color: 'var(--color-burgundy)',
                }}>✕</button>
              </div>
              <div style={{
                flex: 1, overflowY: 'auto',
                padding: 'calc(0.5 * var(--unit-y)) calc(1 * var(--unit-x))',
                fontSize: 'var(--ui-font-size-small, 10px)',
              }}>
                {log.map((e, i) => <div key={i} className={`log-entry ${e.type}`} style={{ marginBottom: '2px' }}>{e.message}</div>)}
              </div>
            </div>
          )}
        </div>

        {/* ============================================
           Row 4: 家行（下）- P3(左), P0(右)
           v2.4.8: P0を右下に移動
           ============================================ */}
        <div className="row row-4">
          {/* P3 家ブロック（4人戦のみ・左側） */}
          {playerCount >= 4 && players[3] && (
            <div className="player-block-v2 left">
              <div className="house-area-v2" ref={el => playerHouseRefs.current[3] = el}>
                {players[3].houses.map((h, hIdx) => {
                  const pitch = calcHouseSetPitch(players[3].houses.length, getHouseAreaWidth(3));
                  const targetable = windTargetMode && isWindTargetable(h.houseCard.id);
                  const disabled = windTargetMode && !targetable;
                  const isExiting = houseExitAnimation && houseExitAnimation.playerIdx === 3 && houseExitAnimation.houseIdx === hIdx;
                  const isSourceOfFlying = flyingCard && flyingCard.sourcePlayerIdx === 3 && flyingCard.sourceHouseIdx === hIdx;
                  if (isExiting || isSourceOfFlying) return <div key={hIdx} className="house-set-v2" style={{ left: UNIT.toPixelX(hIdx * pitch), opacity: 0 }} />;
                  const isEmpty = h.storedCard === null;  // v6.6.1: 空屋台判定
                  return (
                    <HouseBlockStandard
                      key={hIdx}
                      houseCard={h.houseCard}
                      personCard={h.storedCard}
                      left={UNIT.toPixelX(hIdx * pitch)}
                      zIndex={hIdx}
                      targetable={targetable}
                      disabled={disabled}
                      onTarget={() => handleWindCardUse(3, hIdx)}
                      isEmpty={isEmpty}
                    />
                  );
                })}
              </div>
              <div className="player-info-area-v2">
                <div className={`textbox-v2 ${currentPlayerIndex === 3 ? 'active' : ''}`}>
                  {players[3].emoji} {players[3].name} | <span style={{color: cumulativeScores[3] >= 0 ? 'var(--color-house)' : 'var(--color-burgundy)'}}>{cumulativeScores[3] >= 0 ? '+' : ''}{cumulativeScores[3]}</span> | 🃏{players[3].hand.length}
                </div>
                <div className="chat-box-v2">
                  {(aiSpeechBubbles[3] || []).map((msg, i, arr) => {
                    const isLatest = i === arr.length - 1 && msg !== '💭...';
                    const isTyping = msg === '💭...';
                    return (
                      <div key={i} style={{ 
                        fontSize: isLatest ? 'var(--chat-font-size)' : 'var(--ui-font-size-small)', 
                        lineHeight: 1.3,
                        color: isTyping ? '#A09080' : (isLatest ? '#2d1518' : '#8B7355'),
                        fontWeight: isLatest ? 'bold' : 'normal',
                        transition: 'all 0.3s ease'
                      }}>{msg}</div>
                    );
                  })}
                </div>
              </div>
            </div>
          )}

          {/* P0 家ブロック（右側） */}
          {player && (
            <div className={`player-block-v2 ${isP0Full ? 'full-width' : 'right'}`}>
              {/* 4人戦: 情報が左、家が右 / 2-3人戦: 家が左、情報が右 */}
              {!isP0Full && (
                <div className="player-info-area-v2 p0-info-right">
                  <div className={`textbox-v2 ${currentPlayerIndex === 0 ? 'active' : ''}`}>
                    ❤️ {playerName} | <span style={{color: cumulativeScores[0] >= 0 ? 'var(--color-house)' : 'var(--color-burgundy)'}}>{cumulativeScores[0] >= 0 ? '+' : ''}{cumulativeScores[0]}</span> | 🃏{player?.hand.length || 0}
                  </div>
                  <div className="chat-box-v2" style={{ display: 'flex', flexDirection: 'column', minHeight: 'calc(4 * var(--unit-y))' }}>
                    {/* チャットログ領域（スクロール可能）- 4人戦用 */}
                    <div ref={p0ChatLogRef} style={{ flex: 1, overflowY: 'auto', paddingRight: 2 }}>
                      {(aiSpeechBubbles[0] || []).map((msg, i, arr) => {
                        const isLatest = i === arr.length - 1 && msg !== '💭...';
                        const isTyping = msg === '💭...';
                        const isCompanionMsg = msg.startsWith(COMPANION.emoji);
                        const isUserMsg = msg.startsWith('❤️');
                        return (
                          <div key={i} style={{ 
                            fontSize: isLatest ? 'var(--chat-font-size)' : 'var(--ui-font-size-small)', 
                            lineHeight: 1.3,
                            color: isTyping ? '#A09080' : (isCompanionMsg ? '#5D4E37' : (isUserMsg ? '#8B2252' : '#8B7355')),
                            fontWeight: isLatest ? 'bold' : 'normal',
                            transition: 'all 0.3s ease',
                            marginBottom: 2,
                          }}>
                            {msg}
                            {/* 相棒の提案がある場合、「はい」ボタンを表示 */}
                            {isLatest && isCompanionMsg && companionSuggestion && (
                              <span 
                                onClick={executeCompanionSuggestion}
                                style={{
                                  marginLeft: 8,
                                  color: 'var(--color-burgundy)',
                                  textDecoration: 'underline',
                                  cursor: 'pointer',
                                  fontWeight: 'bold',
                                }}
                              >
                                👉 {T.ui.companion.strategicAdvice?.suggest?.yes || 'はい'}
                              </span>
                            )}
                          </div>
                        );
                      })}
                    </div>
                    {/* 入力欄（最下部に固定） */}
                    <div style={{ display: 'flex', gap: 2, marginTop: 'auto', paddingTop: 2, borderTop: '1px solid #e0d8d0' }}>
                      <input
                        type="text"
                        value={chatInput}
                        onChange={(e) => setChatInput(e.target.value)}
                        onKeyDown={(e) => { if (e.key === 'Enter') { sendP0Chat(chatInput); } }}
                        placeholder={T.ui.chatPlaceholder}
                        style={{ flex: 1, fontSize: 'var(--menu-text-size)', padding: '2px 4px', border: '1px solid var(--color-warm-gray)', borderRadius: 2 }}
                      />
                      <button
                        onClick={() => sendP0Chat(chatInput)}
                        style={{ fontSize: 'var(--menu-text-size)', padding: '2px 6px', background: 'var(--color-burgundy)', color: '#fff', border: 'none', borderRadius: 2, cursor: 'pointer' }}
                      >💬</button>
                    </div>
                  </div>
                </div>
              )}
              <div className={`house-area-v2 ${!isP0Full ? 'house-area-right' : ''}`} ref={el => playerHouseRefs.current[0] = el}>
                {player.houses.map((h, hIdx) => {
                  const pitch = calcHouseSetPitch(player.houses.length, houseAreaWidthP0);
                  const isExiting = houseExitAnimation && houseExitAnimation.playerIdx === 0 && houseExitAnimation.houseIdx === hIdx;
                  const isSourceOfFlying = flyingCard && flyingCard.sourcePlayerIdx === 0 && flyingCard.sourceHouseIdx === hIdx;
                  if (isExiting || isSourceOfFlying) return <div key={hIdx} className="house-set-v2" style={{ left: UNIT.toPixelX(hIdx * pitch), opacity: 0 }} />;
                  // v6.6.1: 空屋台判定と再格納可能判定
                  const isEmpty = h.storedCard === null;
                  const canRefill = isEmpty && isMyTurn && hasDrawn && !hasActioned && !isProcessing && !windTargetMode && h.retrievedTurn !== turn;
                  const hasCharCards = player.hand.some(c => c.type === 'character');
                  return (
                    <HouseBlockStandard
                      key={hIdx}
                      houseCard={h.houseCard}
                      personCard={h.storedCard}
                      left={UNIT.toPixelX(hIdx * pitch)}
                      zIndex={hIdx}
                      breakable={isMyTurn && hasDrawn && !hasActioned && !isProcessing && !windTargetMode && !isEmpty}
                      onBreak={() => handleBreakOwnHouse(hIdx)}
                      isEmpty={isEmpty}
                      refillable={canRefill && hasCharCards}
                      onRefill={() => handleClickEmptyStall(hIdx)}
                    />
                  );
                })}
              </div>
              {/* 2-3人戦用の情報エリア（フル幅の場合） */}
              {isP0Full && (
                <div className="player-info-area-v2">
                  <div className={`textbox-v2 ${currentPlayerIndex === 0 ? 'active' : ''}`}>
                    ❤️ {playerName} | <span style={{color: cumulativeScores[0] >= 0 ? 'var(--color-house)' : 'var(--color-burgundy)'}}>{cumulativeScores[0] >= 0 ? '+' : ''}{cumulativeScores[0]}</span> | 🃏{player?.hand.length || 0}
                  </div>
                  <div className="chat-box-v2" style={{ display: 'flex', flexDirection: 'column', minHeight: 'calc(4 * var(--unit-y))' }}>
                    {/* チャットログ領域（スクロール可能）- 2-3人戦用 */}
                    <div ref={p0ChatLogRef} style={{ flex: 1, overflowY: 'auto', paddingRight: 2 }}>
                      {(aiSpeechBubbles[0] || []).map((msg, i, arr) => {
                        const isLatest = i === arr.length - 1 && msg !== '💭...';
                        const isTyping = msg === '💭...';
                        const isCompanionMsg = msg.startsWith(COMPANION.emoji);
                        const isUserMsg = msg.startsWith('❤️');
                        return (
                          <div key={i} style={{ 
                            fontSize: isLatest ? 'var(--chat-font-size)' : 'var(--ui-font-size-small)', 
                            lineHeight: 1.3,
                            color: isTyping ? '#A09080' : (isCompanionMsg ? '#5D4E37' : (isUserMsg ? '#8B2252' : '#8B7355')),
                            fontWeight: isLatest ? 'bold' : 'normal',
                            transition: 'all 0.3s ease',
                            marginBottom: 2,
                          }}>
                            {msg}
                            {/* 相棒の提案がある場合、「はい」ボタンを表示 */}
                            {isLatest && isCompanionMsg && companionSuggestion && (
                              <span 
                                onClick={executeCompanionSuggestion}
                                style={{
                                  marginLeft: 8,
                                  color: 'var(--color-burgundy)',
                                  textDecoration: 'underline',
                                  cursor: 'pointer',
                                  fontWeight: 'bold',
                                }}
                              >
                                👉 {T.ui.companion.strategicAdvice?.suggest?.yes || 'はい'}
                              </span>
                            )}
                          </div>
                        );
                      })}
                    </div>
                    {/* 入力欄（最下部に固定） */}
                    <div style={{ display: 'flex', gap: 2, marginTop: 'auto', paddingTop: 2, borderTop: '1px solid #e0d8d0' }}>
                      <input
                        type="text"
                        value={chatInput}
                        onChange={(e) => setChatInput(e.target.value)}
                        onKeyDown={(e) => { if (e.key === 'Enter') { sendP0Chat(chatInput); } }}
                        placeholder={T.ui.chatPlaceholder}
                        style={{ flex: 1, fontSize: 'var(--menu-text-size)', padding: '2px 4px', border: '1px solid var(--color-warm-gray)', borderRadius: 2 }}
                      />
                      <button
                        onClick={() => sendP0Chat(chatInput)}
                        style={{ fontSize: 'var(--menu-text-size)', padding: '2px 6px', background: 'var(--color-burgundy)', color: '#fff', border: 'none', borderRadius: 2, cursor: 'pointer' }}
                      >💬</button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          )}
        </div>

        {/* ============================================
           Row 5: 手札行（下）- P3(左), P0(右)
           v2.4.8: P0を右下に移動
           ============================================ */}
        <div className="row row-5">
          {/* P3 手札ブロック（4人戦のみ・左側） */}
          {playerCount >= 4 && players[3] && (
            <div className="player-block-v2 left">
              <div className="hand-area-v2" ref={el => playerHandRefs.current[3] = el}>
                {players[3].hand.map((c, i) => {
                  const pitch = calcStandardPitch(players[3].hand.length, getHandAreaWidth(3));
                  const isInPairAnimation = pairAnimation && pairAnimation.playerIdx === 3 && (c.uid === pairAnimation.pairCard?.uid || c.uid === pairAnimation.drawnCard?.uid);
                  if (isInPairAnimation) return null;
                  const isValidTarget = DrawRuleEngine.isClickable(0, 3, players);
                  const requiredIdx = DrawRuleEngine.getRequiredCardIndex(players[3].hand);
                  const isClickableCard = requiredIdx === -1 || requiredIdx === i;
                  const canDrawFromThis = phase === PHASES.BABANUKI && canDraw && isValidTarget && isClickableCard;
                  const isHesitating = hesitationState?.highlightedCards?.some(h => h.playerIdx === 3 && h.cardIdx === i);
                  // ゲーム終了時は全手札公開
                  if (revealAllHands) {
                    return <CardFrontStandard key={c.uid} card={c} style={{ position: 'absolute', left: UNIT.toPixelX(i * pitch), top: 0, zIndex: i }} />;
                  }
                  return <CardBackStandard key={c.uid} highlight={canDrawFromThis} hesitationHover={isHesitating} onClick={canDrawFromThis ? () => handleDrawFromPlayer(3, i) : null} style={{ position: 'absolute', left: UNIT.toPixelX(i * pitch), top: 0, zIndex: i }} />;
                })}
              </div>
              <div className="draw-area-v2" ref={el => playerDrawAreaRefs.current[3] = el} />
            </div>
          )}

          {/* P0 手札ブロック（右側） */}
          {player && (
            <div className={`player-block-v2 ${isP0Full ? 'full-width' : 'right'}`}>
              <div className="hand-area-v2" ref={el => playerHandRefs.current[0] = el}>
                {player.hand.map((c, i) => {
                  const pitch = calcStandardPitch(player.hand.length, handAreaWidthP0);
                  const isInPairAnimation = pairAnimation && pairAnimation.playerIdx === 0 && (c.uid === pairAnimation.pairCard?.uid || c.uid === pairAnimation.drawnCard?.uid);
                  if (isInPairAnimation) return null;
                  const isInDangerAnimation = dangerCardInHand && dangerCardInHand.cardIndex === i;
                  if (isInDangerAnimation) return null;
                  const isWindFloating = windCardFloating && windCardFloating.cardIdx === i;
                  if (isWindFloating) {
                    const windFloatingClass = `wind-card-floating ${windCardFloating.phase === 'hovering' ? 'hovering' : ''}`;
                    return (
                      <div key={c.uid} className={windFloatingClass} style={{ position: 'absolute', left: UNIT.toPixelX(i * pitch), top: 0, zIndex: 100 }}>
                        <CardFrontStandard card={c} selected={true} onClick={() => handleCardClick(c)} />
                      </div>
                    );
                  }
                  const isHesitating = hesitationState?.highlightedCards?.some(h => h.playerIdx === 0 && h.cardIdx === i);
                  return <CardFrontStandard key={c.uid} card={c} selected={selectedCard?.uid === c.uid} selectableTarget={isSelectableTarget(c)} hesitationHover={isHesitating} onClick={() => handleCardClick(c)} style={{ position: 'absolute', left: UNIT.toPixelX(i * pitch), top: 0, zIndex: i }} />;
                })}
              </div>
              <div className="draw-area-v2" ref={el => playerDrawAreaRefs.current[0] = el} style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'center' }}>
                {hesitationState ? (
                  <div className="draw-zone-v2" onClick={handleHesitationSkip} style={{ background: 'rgba(201, 162, 39, 0.1)' }}>
                    <div style={{ fontSize: 'var(--draw-zone-icon-size)', marginBottom: 4 }}>👋</div>
                    <div style={{ fontSize: 'var(--draw-zone-text-size)', color: 'var(--color-warm-gray)', textAlign: 'center' }}>{T.misc.hurry}</div>
                  </div>
                ) : canEndTurn ? (
                  <div className="draw-zone-v2" onClick={handleEndTurn} style={{ background: 'var(--color-dusty-pink)', borderColor: 'var(--color-burgundy)', color: 'white', fontWeight: 'bold', fontSize: 'var(--draw-zone-text-size)' }}>{T.ui.endTurn}</div>
                ) : canDraw ? (
                  <div className="draw-zone-v2" onClick={phase === PHASES.EXPLORATION ? handleDraw : null}>
                    <div style={{ fontSize: 'var(--draw-zone-icon-size)', marginBottom: 4 }}>{phase === PHASES.EXPLORATION ? '🃏' : '👆'}</div>
                    <div style={{ fontSize: 'var(--draw-zone-text-size)', color: 'var(--color-warm-gray)', textAlign: 'center' }}>{phase === PHASES.EXPLORATION ? T.ui.drawFromDeck : T.ui.drawFromPlayer}</div>
                  </div>
                ) : (
                  <div className="draw-zone-v2" style={{ cursor: 'default', borderStyle: 'dashed', fontSize: 'var(--draw-zone-text-size)' }}>{autoPlayMode ? T.ui.auto : T.ui.wait}</div>
                )}
              </div>
            </div>
          )}
        </div>
      </div>
    );
  };

  return (
    <div style={{ height: '100vh', width: '100vw', display: 'flex', alignItems: 'center', justifyContent: 'center', background: '#f5f5f5', overflow: 'hidden', boxSizing: 'border-box', border: 'none', outline: 'none' }}>
      {renderGameBoardV2()}
      {/* v2.5.8: 縦持ちオーバーレイ */}
      {isPortraitMode && (
        <div className="portrait-overlay">
          <div className="portrait-icon">📱</div>
          <div className="portrait-message">{T.overlay.portrait.message}</div>
          <div className="portrait-subtext">{T.overlay.portrait.subtext}</div>
        </div>
      )}
    </div>
  );
}

// v2.4.7: アプリケーション起動時に初期サイズを適用
let initialBoardSizeApplied = false;

// CSSが適用された後（1フレーム後）にサイズを計算
requestAnimationFrame(() => {
  requestAnimationFrame(() => {
    if (initialBoardSizeApplied) return; // 既に適用済みならスキップ
    
    // v2.5.8.3: getEffectiveScreenSize内でlocalStorageとキャッシュを管理
    const { width, height } = getEffectiveScreenSize();
    const { boardW, boardH } = calcOptimalBoardSize(width, height);
    applyBoardSize(boardW, boardH);
    initialBoardSizeApplied = true;
  });
});

ReactDOM.render(<PfffGame />, document.getElementById('root'));
  </script>
</body>
</html>
